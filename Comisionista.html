// ---------- AGENDA (visitas y tareas del día) ----------
function Agenda({toast}){
  const HOY="2026-06-13";
  const inicial=[
    {id:1, fecha:"2026-06-13", hora:"08:30", cli:"Comercial Mendoza", tipo:"Visita", nota:"Tomar pedido mensual de arroz", hecho:false},
    {id:2, fecha:"2026-06-13", hora:"10:00", cli:"Bodega El Agricultor", tipo:"Cobro", nota:"Retirar cheque · factura vence hoy", hecho:false},
    {id:3, fecha:"2026-06-15", hora:"11:30", cli:"Distribuidora Ríos", tipo:"Stock", nota:"Revisar bodega y reportar existencias", hecho:false},
    {id:4, fecha:"2026-06-13", hora:"15:00", cli:"Tienda La Esquina", tipo:"Entrega", nota:"Coordinar descarga con encargado", hecho:true},
    {id:5, fecha:"2026-06-17", hora:"09:00", cli:"Mayorista Santa Rosa", tipo:"Visita", nota:"Presentar nueva línea de harina", hecho:false},
  ];
  const [tareas,setTareas]=useState(inicial);
  const [nueva,setNueva]=useState(false);
  // filtros
  const [verFiltros,setVerFiltros]=useState(false);
  const [periodo,setPeriodo]=useState("todas"); // hoy | semana | todas
  const [ubic,setUbic]=useState("");
  const [tPeriodo,setTPeriodo]=useState("todas");
  const [tUbic,setTUbic]=useState("");
  // formulario de tarea nueva
  const [fecha,setFecha]=useState("");
  const [hora,setHora]=useState("");
  const [cli,setCli]=useState(null);
  const [tipo,setTipo]=useState("Visita");
  const [nota,setNota]=useState("");
  const TIPOS=["Visita","Cobro","Stock","Entrega","Otro"];

  const toggle=id=>setTareas(tareas.map(t=>t.id===id?{...t,hecho:!t.hecho}:t));
  const colorTipo={Visita:"#15392B",Cobro:"#2E7D52",Stock:"#C77F00",Entrega:"#7A6F50",Otro:"#555"};

  // fin de semana (7 días desde hoy) para el filtro "esta semana"
  const finSemana=(()=>{const d=new Date(HOY);d.setDate(d.getDate()+7);return d.toISOString().slice(0,10);})();
  const norm=s=>(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const ubicCliente=(c)=>{const f=FICHA_CLIENTE[c];return f?`${f.prov} ${f.ciudad} ${f.zona} ${f.barrio}`:"";};

  const filtradas=tareas.filter(t=>{
    const perOk = periodo==="todas" ? true
      : periodo==="hoy" ? t.fecha===HOY
      : (t.fecha>=HOY && t.fecha<=finSemana); // semana
    const ubicOk = ubic==="" || norm(ubicCliente(t.cli)).includes(norm(ubic));
    return perOk && ubicOk;
  });
  const pend=filtradas.filter(t=>!t.hecho).length;
  const PER_LBL={todas:"Todas",hoy:"Hoy",semana:"Esta semana"};
  const nFiltros=(periodo!=="todas"?1:0)+(ubic?1:0);
  const abrirFiltros=()=>{setTPeriodo(periodo);setTUbic(ubic);setVerFiltros(true);};
  const aplicar=()=>{setPeriodo(tPeriodo);setUbic(tUbic);setVerFiltros(false);};

  const guardar=()=>{
    const nuevaTarea={id:Date.now(), fecha:fecha||"", hora:hora||"--:--", cli:cli||"Sin cliente", tipo, nota:nota||"", hecho:false};
    setTareas([...tareas, nuevaTarea].sort((a,b)=>a.hora.localeCompare(b.hora)));
    setFecha("");setHora("");setCli(null);setTipo("Visita");setNota("");setNueva(false);
    toast("Tarea agregada a tu agenda.");
  };

  return (<>
    <div className="h1">Agenda</div>
    <div className="sub">Tus visitas y tareas · {pend} pendientes de {filtradas.length}.</div>

    <div className="row" style={{gap:10,marginBottom:14,alignItems:"stretch"}}>
      <button className="cta" style={{flex:1,marginTop:0}} onClick={()=>setNueva(true)}>+ Nueva tarea</button>
      <button className="filtrar-btn" onClick={abrirFiltros}>⚙ Filtrar{nFiltros>0?` · ${nFiltros}`:""}</button>
    </div>

    {(periodo!=="todas"||ubic) && (
      <div className="row" style={{margin:"0 2px 14px",alignItems:"center",flexWrap:"wrap",gap:6}}>
        {periodo!=="todas" && <span className="fchip on" style={{fontSize:11.5}}>{PER_LBL[periodo]}</span>}
        {ubic && <span className="fchip on" style={{fontSize:11.5}}>📍 {ubic}</span>}
        <button className="mini-link" onClick={()=>{setPeriodo("todas");setUbic("");}}>Quitar</button>
      </div>
    )}

    {filtradas.map(t=>(
      <div className="card" key={t.id} style={{opacity:t.hecho?.6:1}}>
        <div className="row" style={{alignItems:"flex-start"}}>
          <button onClick={()=>toggle(t.id)} style={{
            width:26,height:26,borderRadius:8,flexShrink:0,marginTop:2,
            border:"2px solid "+(t.hecho?"var(--ok)":"var(--line)"),
            background:t.hecho?"var(--ok)":"#fff",color:"#fff",fontSize:15,fontWeight:700,
            display:"flex",alignItems:"center",justifyContent:"center"}}>
            {t.hecho?"✓":""}</button>
          <div style={{flex:1,marginLeft:12}}>
            <div className="cli" style={{fontSize:14,textDecoration:t.hecho?"line-through":"none"}}>{t.cli}</div>
            <div className="meta">{t.nota}</div>
            {FICHA_CLIENTE[t.cli] && <div className="meta" style={{fontSize:11,marginTop:2}}>📍 {FICHA_CLIENTE[t.cli].ciudad}, {FICHA_CLIENTE[t.cli].zona}</div>}
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div className="num" style={{fontSize:14,fontWeight:600}}>{t.hora}</div>
            {t.fecha && <div className="meta" style={{fontSize:11}}>{t.fecha}</div>}
            <span className="chip" style={{background:"#EDEAE0",color:colorTipo[t.tipo],marginTop:4}}>
              {t.tipo}</span>
          </div>
        </div>
      </div>
    ))}
    {filtradas.length===0 && <div className="ph">Sin tareas que coincidan con los filtros.</div>}

    {/* ventana de filtros */}
    {verFiltros && (
      <div className="ov" onClick={()=>setVerFiltros(false)}>
        <div className="sheet" onClick={e=>e.stopPropagation()}>
          <h3>Filtrar agenda</h3>

          <div className="ficha-sec" style={{marginTop:6}}>Periodo</div>
          <div className="chip-row" style={{flexWrap:"wrap",overflow:"visible"}}>
            {[["todas","Todas"],["hoy","Hoy"],["semana","Esta semana"]].map(([k,l])=>(
              <button key={k} className={"fchip"+(tPeriodo===k?" on":"")} onClick={()=>setTPeriodo(k)}>{l}</button>
            ))}
          </div>

          <div className="ficha-sec">Ubicación (provincia, ciudad, zona o barrio)</div>
          <div className="ss" style={{marginBottom:0}}>
            <div className="box"><span className="mag">⌕</span>
              <input value={tUbic} placeholder="Ej. Guayaquil, Norte, Alborada…" onChange={e=>setTUbic(e.target.value)}/>
              {tUbic && <button className="clr" onClick={()=>setTUbic("")}>×</button>}</div>
          </div>

          <button className="cta" onClick={aplicar} style={{marginTop:18}}>Aplicar filtros</button>
          <button className="back" style={{width:"100%",marginTop:10}} onClick={()=>{setTPeriodo("todas");setTUbic("");}}>Limpiar</button>
        </div>
      </div>
    )}

    {/* ventana de tarea nueva */}
    {nueva && (
      <div className="ov" onClick={()=>setNueva(false)}>
        <div className="sheet" onClick={e=>e.stopPropagation()}>
          <h3>Nueva visita o tarea</h3>

          <div className="field"><label>Tipo</label>
            <div className="tipogrid" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
              {TIPOS.map(tp=>(
                <button key={tp} className={"tipobtn"+(tipo===tp?" on":"")} onClick={()=>setTipo(tp)}>
                  <span className="tnom">{tp}</span></button>
              ))}
            </div>
          </div>

          <SearchSelect label="Cliente" items={CLIENTES} value={cli} multiPalabra
            onPick={c=>setCli(c)} onClear={()=>setCli(null)}
            render={{
              text:c=>c,
              option:c=>(<div className="o1">{c}</div>),
              picked:c=>(<><div className="p1">{c}</div><div className="p2">Cliente de la tarea</div></>)
            }}/>

          <div className="fecha-row">
            <div className="fcol"><label>Fecha</label>
              <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/></div>
            <div className="fcol"><label>Hora</label>
              <input type="time" value={hora} onChange={e=>setHora(e.target.value)}/></div>
          </div>

          <div className="field"><label>Nota</label>
            <input className="inp" value={nota} onChange={e=>setNota(e.target.value)} placeholder="Ej. Retirar cheque, tomar pedido…"/></div>

          <button className="cta" onClick={guardar} style={{marginTop:8}}>Agregar a la agenda</button>
          <button className="back" style={{width:"100%",marginTop:10}} onClick={()=>setNueva(false)}>Cancelar</button>
        </div>
      </div>
    )}
  </>);
}

// ---------- MI CUENTA ----------

  const [modo,setModo]=useState("estandar"); // estandar | gamificada

  const neto=2.00, liberadas=64.00, pendientes=125.00, descuentos=62.00;

  const metaPct=80, ventaActual=40000, metaTotal=50000;
  const rankPos=3, rankTotal=15;
  const variacion=12; // % vs mes anterior
  const cierre="30-jun-2026", pagoEstimado=125.00;
  const logros=[
    {ic:"🔥", t:"Racha de 5 días vendiendo", ok:true},
    {ic:"💰", t:"Primer cobro del mes validado", ok:true},
    {ic:"🎯", t:"80% de la meta alcanzado", ok:true},
    {ic:"⭐", t:"Top 3 del ranking", ok:true},
    {ic:"🏅", t:"Meta mensual completada", ok:false},

    <div className="cu-head">
      <div><div className="h1" style={{marginBottom:2}}>Comisiones</div>

    {/* HERO: neto a recibir */}

      <div className="cu-hero-lbl">Neto a recibir en la liquidación</div>
      <div className="cu-hero-big num">{money(neto)}</div>
      <div className="cu-hero-sub">📅 La liquidación cierra el {cierre}</div>
      <div className="cu-var">
        <span className={"cu-var-pill "+(variacion>=0?"up":"down")}>{variacion>=0?"▲":"▼"} {Math.abs(variacion)}%</span>
        <span className="cu-var-txt">vs. mes anterior</span>
      </div>
    </div>

    {/* 4 métricas */}
    <div className="cu-grid">
      <div className="cu-card"><div className="cu-ic" style={{background:"#E4F1E9"}}>✅</div>
        <div className="cu-v num">{money(liberadas)}</div><div className="cu-k">Comisiones liberadas</div></div>
      <div className="cu-card"><div className="cu-ic" style={{background:"#EAF0F6"}}>⏳</div>
        <div className="cu-v num">{money(pendientes)}</div><div className="cu-k">Comisiones pendientes</div></div>
      <div className="cu-card"><div className="cu-ic" style={{background:"#FBE9E4"}}>➖</div>
        <div className="cu-v num">{money(descuentos)}</div><div className="cu-k">Descuentos</div></div>
      <div className="cu-card"><div className="cu-ic" style={{background:"#FBF0D8"}}>🧾</div>
        <div className="cu-v num">{nFactPend}</div><div className="cu-k">Facturas pendientes</div></div>
    </div>

    {modo==="estandar" ? (<>
      {/* meta */}
      <div className="cu-block">
        <div className="cu-block-h"><span>Meta de ventas</span><span className="cu-pct">{metaPct}%</span></div>
        <div className="cu-bar"><div className="cu-bar-fill" style={{width:metaPct+"%"}}></div></div>
        <div className="cu-block-sub">{money(ventaActual)} de {money(metaTotal)}</div>
      </div>

      {/* cobranza */}
      <div className="ficha-sec">Cobranza pendiente</div>
      <div className="cu-block">
        <div className="cu-line"><span>👥 Clientes pendientes de cobro</span><b>{clientesPorCobrar}</b></div>
        <div className="cu-line"><span>🧾 Facturas pendientes</span><b>{nFactPend}</b></div>
        <div className="cu-line"><span>💰 Valor pendiente de cobro</span><b className="num">{money(valorPorCobrar)}</b></div>
        <div className="cu-hint">Cobrar estas facturas libera {money(pendientes)} en comisiones pendientes.</div>
      </div>

      {/* liquidación */}
      <div className="ficha-sec">Próxima liquidación</div>
      <div className="cu-block">
        <div className="cu-line"><span>📅 Cierre</span><b>{cierre}</b></div>
        <div className="cu-line"><span>💵 Pago estimado</span><b className="num">{money(pagoEstimado)}</b></div>
      </div>

      {/* ranking */}
      <div className="cu-rank"><span className="cu-rank-ic">🏆</span>
        <div style={{flex:1}}><div className="cu-rank-t">Ranking #{rankPos} de {rankTotal} vendedores</div>
          <div className="cu-rank-s">Vas mejor que el {Math.round((1-rankPos/rankTotal)*100)}% del equipo</div></div>
      </div>
    </>) : (<>
      {/* GAMIFICADA */}
      <div className="cu-game-hero">
        <div className="cu-game-rank">🏆 #{rankPos}</div>
        <div className="cu-game-rank-lbl">de {rankTotal} vendedores</div>
        <div className="cu-bar" style={{marginTop:14}}><div className="cu-bar-fill gold" style={{width:metaPct+"%"}}></div></div>
        <div className="cu-game-meta">{metaPct}% de tu meta · faltan {money(metaTotal-ventaActual)} para el 100%</div>
      </div>

      <div className="cu-streak">
        <div className="cu-streak-n">🔥 5</div>
        <div><div className="cu-streak-t">días seguidos vendiendo</div>
          <div className="meta">¡No rompas la racha! Vende hoy para llegar a 6.</div></div>
      </div>

      <div className="ficha-sec">Tus logros</div>
      <div className="cu-logros">
        {logros.map((l,i)=>(
          <div className={"cu-logro"+(l.ok?"":" off")} key={i}>
            <div className="cu-logro-ic">{l.ok?l.ic:"🔒"}</div>
            <div className="cu-logro-t">{l.t}</div>
          </div>))}
      </div>

      <div className="cu-reto">
        <div className="cu-reto-h">🎯 Reto del mes</div>
        <div className="cu-reto-t">Completa tu meta de {money(metaTotal)} y sube al podio.</div>
        <div className="cu-bar" style={{marginTop:10}}><div className="cu-bar-fill gold" style={{width:metaPct+"%"}}></div></div>
        <div className="cu-block-sub">Te falta {money(metaTotal-ventaActual)} · vas #{rankPos}</div>
      </div>
    </>)}

    <div className="lock"><span>ℹ️</span>
      <span>Tu comisión se libera cuando el cliente paga el 100% de la factura y el proveedor valida el cobro.</span></div>
    {onDemoBloquear && (
      <button className="ba-demo" style={{marginTop:14}} onClick={onDemoBloquear}>
        ● Demo: simular bloqueo del freelance</button>
    )}
  </>);
}

// ---------- NOVEDADES (solicitudes al proveedor) ----------
function Novedades({toast, go}){
  const [cli,setCli]=useState(null);
  const [prov,setProv]=useState(null);
  const [tipo,setTipo]=useState(null);       // cambio-mismo | cambio-otro | producto | descuento
  const [paso,setPaso]=useState("menu");      // menu | form
  const [lista,setLista]=useState(NOVEDADES_INI);

  const [prodSel,setProdSel]=useState(null);
  const [prodDestino,setProdDestino]=useState(null);
  const [factSel,setFactSel]=useState(null);
  const [busca,setBusca]=useState("");
  const [montos,setMontos]=useState({});      // pid -> valor
  const [cantCambio,setCantCambio]=useState("");
  const [llevar,setLlevar]=useState({});       // pid -> cantidad a llevar (cambio-otro)
  const [resol,setResol]=useState(null);        // resolución caso 3: cobrar | credito

  const reset=()=>{setTipo(null);setPaso("menu");setProdSel(null);setProdDestino(null);setFactSel(null);setBusca("");setMontos({});setCantCambio("");setLlevar({});setResol(null);};
  const resetDesdeCli=()=>{setProv(null);reset();};

  const provId = prov?.id;
  const vendidosIds = (cli&&provId)
    ? PRESENTACIONES.filter(p=>p.provId===provId && HISTORIAL[cli+"|"+p.id]).map(p=>p.id) : [];
  const prodsVendidos = PRESENTACIONES.filter(p=>vendidosIds.includes(p.id));
  const prodsProveedor = (provId? PRESENTACIONES.filter(p=>p.provId===provId):[])
    .slice().sort((a,b)=>{
      const av=vendidosIds.includes(a.id)?0:1, bv=vendidosIds.includes(b.id)?0:1;
      return av-bv || a.nombre.localeCompare(b.nombre);
    });
  const facturasCli = (cli&&prov)
    ? FACTURAS.filter(f=>f.cli===cli && f.prov===prov.nombre)
        .filter(f=> busca==="" || f.num.includes(busca.trim()))
        .sort((a,b)=>a.fecha<b.fecha?1:-1) : [];

  const delCliProv = (cli&&prov) ? lista.filter(n=>n.cli===cli) : [];

  // precio al que se le vendió la presentación a este cliente (última factura de este proveedor; si no, historial)
  const precioVendido=(pid)=>{
    const fs=FACTURAS.filter(f=>f.cli===cli && f.prov===prov?.nombre).sort((a,b)=>a.fecha<b.fecha?1:-1);
    for(const f of fs){ const it=f.items.find(i=>i.pid===pid); if(it) return it.precio; }
    const h=HISTORIAL[cli+"|"+pid]; if(h) return h.precio;
    const pr=PRESENTACIONES.find(p=>p.id===pid); return pr?pr.baseCredito:0;
  };
  // precio del producto a llevar (base de crédito de venta)
  const precioLlevar=(pid)=>{ const pr=PRESENTACIONES.find(p=>p.id===pid); return pr?pr.baseCredito:0; };

  // cuadre del cambio por otro producto
  const valorAFavor = (prodSel && parseFloat(cantCambio)>0) ? precioVendido(prodSel.id)*parseFloat(cantCambio) : 0;
  const valorLlevado = Object.keys(llevar).reduce((s,pid)=>{ const c=parseFloat(llevar[pid])||0; return s + c*precioLlevar(pid); },0);
  const saldo = valorAFavor - valorLlevado; // >0 a favor cliente, <0 a favor proveedor, 0 cuadra

  const enviar=(detalle)=>{
    const nueva={id:Date.now(), cli, tipo, detalle, fecha:"hoy", estado:"enviada"};
    setLista([nueva,...lista]); reset();
    toast("Solicitud enviada al proveedor. Quedó en seguimiento.");
  };

  const totalFactura=()=>{
    if(!factSel) return 0;
    return factSel.items.reduce((s,it)=>{
      const v=parseFloat(montos[it.pid])||0;
      if(tipo==="descuento") return s + v*it.cant;
      if(tipo==="producto") return s + v*it.precio;
      return s;
    },0);
  };

  return (<>
    <div className="h1">Novedades</div>
    <div className="sub">Solicitudes al proveedor: cambios, devoluciones y notas de crédito.</div>

    <SearchSelect label="Cliente" items={CLIENTES} value={cli} multiPalabra
      onPick={c=>{setCli(c);resetDesdeCli();}} onClear={()=>{setCli(null);resetDesdeCli();}}
      render={{text:c=>c, option:c=>(<div className="o1">{c}</div>),
        picked:c=>(<><div className="p1">{c}</div><div className="p2">Cliente de la novedad</div></>)}}/>

    {cli && (
      <SearchSelect label="Proveedor" items={PROVEEDORES} value={prov}
        onPick={p=>{setProv(p);reset();}} onClear={()=>{setProv(null);reset();}}
        render={{text:p=>p.nombre, option:p=>(<div className="o1">{p.nombre}</div>),
          picked:p=>(<><div className="p1">{p.nombre}</div><div className="p2">Proveedor de la factura/producto</div></>)}}/>
    )}

    {cli && prov && paso==="menu" && (<>
      <div className="ficha-sec">¿Qué deseas solicitar?</div>
      <button className="sol-op" onClick={()=>{setTipo("cambio-mismo");setPaso("form");}}>
        <span className="sol-ic" style={{background:"#E4F1E9"}}>🔄</span>
        <div style={{flex:1,textAlign:"left"}}><div className="sync-t">Cambio · mismo producto</div>
          <div className="meta">Reponer el mismo producto (dañado, vencido)</div></div>
        <span className="av-arrow">›</span></button>
      <button className="sol-op" onClick={()=>{setTipo("cambio-otro");setPaso("form");}}>
        <span className="sol-ic" style={{background:"#EAF0F6"}}>🔁</span>
        <div style={{flex:1,textAlign:"left"}}><div className="sync-t">Cambio · otro producto del proveedor</div>
          <div className="meta">Devuelve uno y se lleva otro del mismo proveedor</div></div>
        <span className="av-arrow">›</span></button>
      <button className="sol-op" onClick={()=>{setTipo("producto");setPaso("form");}}>
        <span className="sol-ic" style={{background:"#FBF0D8"}}>📦</span>
        <div style={{flex:1,textAlign:"left"}}><div className="sync-t">Nota de crédito por producto</div>
          <div className="meta">Devolución: elige factura e ítems a devolver</div></div>
        <span className="av-arrow">›</span></button>
      <button className="sol-op" onClick={()=>{setTipo("descuento");setPaso("form");}}>
        <span className="sol-ic" style={{background:"#FBE9E4"}}>🏷️</span>
        <div style={{flex:1,textAlign:"left"}}><div className="sync-t">Nota de crédito por descuento</div>
          <div className="meta">Elige factura e ítems a descontar</div></div>
        <span className="av-arrow">›</span></button>
    </>)}

    {cli && prov && paso==="form" && tipo==="cambio-mismo" && (<>
      <div className="sol-elegido">🔄 Cambio · mismo producto<div className="meta" style={{fontWeight:400}}>Para {cli} · {prov.nombre}</div></div>
      <div className="ficha-sec">Producto a cambiar (vendidos a este cliente)</div>
      {prodsVendidos.length===0 ? <div className="ph">No hay productos vendidos a este cliente con este proveedor.</div>
        : prodsVendidos.map(p=>(
          <button key={p.id} className={"sol-op"+(prodSel&&prodSel.id===p.id?" sel":"")} onClick={()=>setProdSel(p)}>
            <span className="sol-ic" style={{background:"var(--paper)"}}>{EMOJI_LINEA[p.linea]||"📦"}</span>
            <div style={{flex:1,textAlign:"left"}}><div className="sync-t">{p.nombre}</div>
              <div className="meta">Última: {HISTORIAL[cli+"|"+p.id]?.cant} und · {HISTORIAL[cli+"|"+p.id]?.fecha}</div></div>
          </button>))}
      {prodSel && (
        <div className="field" style={{marginTop:12}}><label>Cantidad a cambiar</label>
          <input className="inp" inputMode="numeric" value={cantCambio}
            onChange={e=>setCantCambio(e.target.value)} placeholder="Ej. 5 unidades"/></div>
      )}
      <button className="cta" style={{marginTop:8}} disabled={!prodSel||!(parseFloat(cantCambio)>0)}
        onClick={()=>enviar(`Reponer ${cantCambio} und de ${prodSel.nombre} (mismo producto)`)}>Enviar al proveedor</button>
      <button className="back" style={{width:"100%",marginTop:10}} onClick={reset}>‹ Volver</button>
    </>)}

    {cli && prov && paso==="form" && tipo==="cambio-otro" && (<>
      <div className="sol-elegido">🔁 Cambio · otro producto<div className="meta" style={{fontWeight:400}}>Para {cli} · {prov.nombre}</div></div>

      <div className="ficha-sec">1 · Producto que retira (de los vendidos)</div>
      {prodsVendidos.length===0 ? <div className="ph">No hay productos vendidos a este cliente con este proveedor.</div>
        : prodsVendidos.map(p=>(
          <button key={p.id} className={"sol-op"+(prodSel&&prodSel.id===p.id?" sel":"")} onClick={()=>{setProdSel(p);}}>
            <span className="sol-ic" style={{background:"var(--paper)"}}>{EMOJI_LINEA[p.linea]||"📦"}</span>
            <div style={{flex:1,textAlign:"left"}}><div className="sync-t">{p.nombre}</div>
              <div className="meta">Vendido a {money(precioVendido(p.id))}</div></div>
          </button>))}
      {prodSel && (
        <div className="field" style={{marginTop:10}}><label>Cantidad a retirar</label>
          <input className="inp" inputMode="numeric" value={cantCambio}
            onChange={e=>setCantCambio(e.target.value)} placeholder="Ej. 5 unidades"/></div>
      )}

      {valorAFavor>0 && (<>
        <div className="fact-total" style={{background:"#2E7D52"}}>
          <span>Valor a favor del cliente</span><span className="num">{money(valorAFavor)}</span>
        </div>

        <div className="ficha-sec" style={{marginTop:16}}>2 · Producto que se lleva (mismo proveedor)</div>
        <div className="meta" style={{margin:"0 2px 8px",fontSize:11.5}}>Primero los que ya compra, luego los nuevos. Coloca cantidad y se descuenta del valor a favor.</div>
        {prodsProveedor.map(p=>{
          const yaCompra=vendidosIds.includes(p.id);
          const c=parseFloat(llevar[p.id])||0;
          return (
            <div className={"fact-item"+(c>0?" sel":"")} key={p.id}>
              <div className="row" style={{alignItems:"center"}}>
                <span className="sol-ic" style={{background:"var(--paper)",width:34,height:34,fontSize:17}}>{EMOJI_LINEA[p.linea]||"📦"}</span>
                <div style={{flex:1,marginLeft:10}}><div className="sync-t" style={{fontSize:13.5}}>{p.nombre}</div>
                  <div className="meta">{money(precioLlevar(p.id))} c/u · {yaCompra?"ya compra":"nuevo"}</div></div>
                <input className="fact-inp" inputMode="numeric" value={llevar[p.id]||""}
                  onChange={e=>setLlevar({...llevar,[p.id]:e.target.value})} placeholder="cant"/>
              </div>
              {c>0 && <div className="meta" style={{textAlign:"right",marginTop:4}}>{c} × {money(precioLlevar(p.id))} = <b>{money(c*precioLlevar(p.id))}</b></div>}
            </div>);
        })}

        {/* saldo en vivo */}
        <div className="fact-total" style={{background: saldo===0?"#555":saldo>0?"#2E7D52":"#B0413D"}}>
          <span>{saldo===0?"Cuadra exacto":saldo>0?"A favor del cliente":"A favor del proveedor"}</span>
          <span className="num">{money(Math.abs(saldo))}</span>
        </div>

        {/* resolución según el caso */}
        {valorLlevado>0 && saldo>0 && (
          <div className="resol-box">El cliente se lleva menos de lo que devuelve. Se generará una <b>nota de crédito por {money(saldo)}</b> a su favor.</div>
        )}
        {valorLlevado>0 && saldo<0 && (<>
          <div className="ficha-sec">¿Cómo cubre la diferencia de {money(Math.abs(saldo))}?</div>
          <button className={"sol-op"+(resol==="cobrar"?" sel":"")} onClick={()=>setResol("cobrar")}>
            <span className="sol-ic" style={{background:"#E4F1E9"}}>💵</span>
            <div style={{flex:1,textAlign:"left"}}><div className="sync-t">Cobrar la diferencia</div>
              <div className="meta">Se registra un cobro de contado por {money(Math.abs(saldo))}</div></div></button>
          <button className={"sol-op"+(resol==="credito"?" sel":"")} onClick={()=>setResol("credito")}>
            <span className="sol-ic" style={{background:"#FBF0D8"}}>🧾</span>
            <div style={{flex:1,textAlign:"left"}}><div className="sync-t">Cargar a crédito</div>
              <div className="meta">Se suma {money(Math.abs(saldo))} a la cuenta del cliente</div></div></button>
        </>)}

        <button className="cta" style={{marginTop:14}}
          disabled={valorLlevado<=0 || (saldo<0 && !resol)}
          onClick={()=>{
            const lleva=prodsProveedor.filter(p=>(parseFloat(llevar[p.id])||0)>0)
              .map(p=>`${llevar[p.id]} ${p.nombre}`).join(", ");
            let cierre = saldo===0?"cuadra exacto"
              : saldo>0?`NC a favor del cliente ${money(saldo)}`
              : (resol==="cobrar"?`cobrar diferencia ${money(-saldo)}`:`cargar a crédito ${money(-saldo)}`);
            enviar(`Retira ${cantCambio} ${prodSel.nombre} (${money(valorAFavor)}) → lleva ${lleva} · ${cierre}`);
          }}>Enviar al proveedor</button>
      </>)}
      <button className="back" style={{width:"100%",marginTop:10}} onClick={reset}>‹ Volver</button>
    </>)}

    {cli && prov && paso==="form" && (tipo==="producto"||tipo==="descuento") && (<>
      <div className="sol-elegido">
        {tipo==="producto"?"📦 NC por producto (devolución)":"🏷️ NC por descuento"}
        <div className="meta" style={{fontWeight:400}}>Para {cli} · {prov.nombre}</div>
      </div>

      {!factSel ? (<>

function SparkMini({ vals, w=100, h=28, color="var(--field)" }){
  if(!vals || vals.length<2) return null;
  const mx=Math.max(...vals), mn=Math.min(...vals), rg=(mx-mn)||1;
  const pts=vals.map((v,i)=>[ i*(w-8)/(vals.length-1)+4, h-4-((v-mn)/rg)*(h-8) ]);
  const linea=pts.map(p=>p.join(",")).join(" ");
  const u=pts[pts.length-1];
  return (
    <svg width={w} height={h} style={{display:"block"}}>
      <polyline points={linea} fill="none" stroke={color} strokeWidth="1.8"/>
      <circle cx={u[0]} cy={u[1]} r="2.6" fill={color}/>
    </svg>
  );
}

function Comisiones({toast}){
  // Estado de la comisión de cada pedido, derivado del hito "Comisión liberada".
  const estadoComision=(p)=>{
    const hito=(p.linea||[]).find(x=>x.t==="Comisión liberada");
    if(hito && hito.st==="ok") return {k:"Liberada", bg:"#E4F1E9", col:"#2E7D52"};
    // Canon: el cliente ya pagó, pero la comisión la libera SOLO la confirmación del proveedor.
    if(["Cobrado","Cliente pagó"].includes(p.estado))
      return {k:"Cliente pagó", bg:"#EAF0F6", col:"#3A6EA5"};
    return {k:"Generada", bg:"#FBF0D8", col:"#C77F00"};
  };

  const lista=PEDIDOS_INI.map(p=>({...p, ec:estadoComision(p)}));
  const totalLiberada=lista.filter(p=>p.ec.k==="Liberada").reduce((a,p)=>a+p.comision,0);
  const totalPorLiberar=lista.filter(p=>p.ec.k==="Cliente pagó").reduce((a,p)=>a+p.comision,0);
  const totalProceso=lista.filter(p=>p.ec.k==="Generada").reduce((a,p)=>a+p.comision,0);
  const totalGeneral=totalLiberada+totalPorLiberar+totalProceso;

  const nLiberada=lista.filter(p=>p.ec.k==="Liberada").length;
  const nPorLiberar=lista.filter(p=>p.ec.k==="Cliente pagó").length;
  const nProceso=lista.filter(p=>p.ec.k==="Generada").length;

  const [filtro,setFiltro]=useState("Todas");
  const visibles=filtro==="Todas"?lista:lista.filter(p=>p.ec.k===filtro);

  return (<>
    <div className="sec-h"><h2>Mis comisiones</h2><div className="grain"></div></div>
    <div className="hint" style={{background:"#FBF0D8",border:"1px solid #EAD9A8",borderRadius:10,padding:"10px 12px",margin:"0 0 14px",color:"#7A5B00",fontWeight:600}}>
      🔑 Tu comisión se libera ÚNICAMENTE cuando el proveedor confirma el pago. Cobrar al cliente no la libera.</div>
    {(()=>{ // Tendencia: tu comisión generada por mes (mini-curva sin ejes: sube/baja; el detalle está abajo)
      const porMes={};
      PEDIDOS_INI.forEach(p=>{ if(p.fecha&&p.comision){ const m=p.fecha.slice(0,7); porMes[m]=(porMes[m]||0)+p.comision; }});
      const meses=Object.keys(porMes).sort();
      if(meses.length<2) return null;
      return (
        <div className="card" style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <SparkMini vals={meses.map(m=>porMes[m])} w={110} h={30}/>
          <div>
            <div style={{fontSize:12.5,fontWeight:700}}>Tu tendencia · {meses.length} meses</div>
            <div className="meta">Comisión generada mes a mes</div>
          </div>
        </div>
      );
    })()}

    {/* Resumen: tu comisión por estado */}
    <div className="cu-resumen">
      <div className="cu-total">
        <div className="cu-total-k">Comisión generada · junio</div>
        <div className="cu-total-v num">{money(totalGeneral)}</div>
      </div>
      <div className="cu-split">
        <div className="cu-part">
          <div className="cu-part-ic" style={{background:"#E4F1E9",color:"#2E7D52"}}>✅</div>
          <div style={{flex:1}}>
            <div className="cu-part-k">Liberada</div>
            <div className="cu-part-s">Ya disponible para ti</div>
          </div>
          <div className="cu-part-v num">{money(totalLiberada)}</div>
        </div>
        <div className="cu-part">
          <div className="cu-part-ic" style={{background:"#FBF0D8",color:"#C77F00"}}>⏳</div>
          <div style={{flex:1}}>
            <div className="cu-part-k">Cliente pagó · en espera</div>
            <div className="cu-part-s">Falta la confirmación del proveedor</div>
          </div>
          <div className="cu-part-v num">{money(totalPorLiberar)}</div>
        </div>
        <div className="cu-part">
          <div className="cu-part-ic" style={{background:"#EDEAE0",color:"#7A6F50"}}>🔄</div>
          <div style={{flex:1}}>
            <div className="cu-part-k">Generada</div>
            <div className="cu-part-s">Pedidos todavía en curso</div>
          </div>
          <div className="cu-part-v num">{money(totalProceso)}</div>
        </div>
      </div>
      <div className="cu-nota">Tu comisión se libera cuando el proveedor confirma el pago de la factura.</div>
    </div>

    {/* Filtros por estado */}
    <div className="cu-chips">
      {[["Todas",lista.length],["Liberada",nLiberada],["Cliente pagó",nPorLiberar],["Generada",nProceso]].map(([f,n])=>(
        <button key={f} className={"cu-chip"+(filtro===f?" on":"")} onClick={()=>setFiltro(f)}>{f} · {n}</button>
      ))}
    </div>

    {/* Lista de comisiones por pedido */}
    <div className="cu-lista">
      {visibles.map(p=>(
        <div className="cu-item" key={p.id}>
          <div className="cu-item-top">
            <div style={{flex:1}}>
              <div className="cu-item-cli">{p.cli}</div>
              <div className="cu-item-prod">{p.prod} · {p.cant} qq</div>
            </div>
            <span className="cu-badge" style={{background:p.ec.bg,color:p.ec.col}}>{p.ec.k}</span>
          </div>
          <div className="cu-item-bot">
            <span className="cu-item-fecha">📅 {p.fecha}</span>
            <span className="cu-item-com num">{money(p.comision)}</span>
          </div>
        </div>
      ))}
      {visibles.length===0 && <div className="cu-vacio">No hay comisiones en este estado.</div>}
    </div>
  </>);
}

      {verDetalle && (
        <div className="ov" onClick={()=>setVerDetalle(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <h3>{verDetalle==="novedades"?"Novedades · respuestas del proveedor"
              :verDetalle==="pedidos"?"Mis pedidos · pendientes"
              :verDetalle==="agenda"?"Agenda · tareas de hoy"
              :"Comisiones · novedades"}</h3>

            {verDetalle==="novedades" && (
              NOVEDADES_INI.filter(n=>n.estado==="aprobada"||n.estado==="rechazada").length===0
                ? <div className="ph">Sin respuestas nuevas.</div>
                : NOVEDADES_INI.filter(n=>n.estado==="aprobada"||n.estado==="rechazada").map(n=>(
                  <div className="det-row" key={n.id}>
                    <span className="sol-ic" style={{background:"var(--paper)",width:34,height:34,fontSize:16}}>{(TIPO_NOVEDAD[n.tipo]||{ic:"📄"}).ic}</span>
                    <div style={{flex:1,marginLeft:10}}><div className="sync-t" style={{fontSize:13.5}}>{n.cli}</div>
                      <div className="meta">{(TIPO_NOVEDAD[n.tipo]||{t:"Solicitud"}).t}</div></div>
                    <span className={"chip "+(EST_NOVEDAD[n.estado]||{c:"c-sync"}).c}><span className="d"></span>{(EST_NOVEDAD[n.estado]||{t:n.estado}).t}</span>
                  </div>))
            )}

            {verDetalle==="pedidos" && (<>
              <div className="det-sub">Pendientes de enviar · {badgePedidos}</div>
              {PEDIDOS_INI.filter(p=>p.sync==="pend").map(p=>(
                <div className="det-row" key={p.id}>
                  <span className="chip c-sync" style={{flexShrink:0}}><span className="d"></span>Sin enviar</span>
                  <div style={{flex:1,marginLeft:10}}><div className="sync-t" style={{fontSize:13.5}}>{p.cli}</div>
                    <div className="meta">{p.cant} × {p.prod}</div></div>
                </div>))}
              <div className="det-sub" style={{marginTop:14}}>Entregados · {badgeEntregados}</div>
              {PEDIDOS_INI.filter(p=>p.estado==="Entregado").map(p=>(
                <div className="det-row" key={p.id}>
                  <span className="chip c-ok" style={{flexShrink:0}}><span className="d"></span>Entregado</span>
                  <div style={{flex:1,marginLeft:10}}><div className="sync-t" style={{fontSize:13.5}}>{p.cli}</div>
                    <div className="meta">{p.cant} × {p.prod} · listo para cobrar</div></div>
                </div>))}
            </>)}

            {verDetalle==="agenda" && (
              <div className="ph">Tienes {badgeAgenda} tarea(s) pendiente(s) hoy. Ábrelas en Agenda.</div>
            )}
            {verDetalle==="cuenta" && (
              <div className="ph">Tienes {badgeComision} comisión(es) recién liberada(s). Revísalas en Comisiones.</div>
            )}

            <button className="back" style={{width:"100%",marginTop:14}} onClick={()=>setVerDetalle(null)}>Cerrar</button>
          </div>
        </div>
      )}

      {verSync && (
        <div className="ov" onClick={()=>setVerSync(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <h3>Sincronización</h3>
            {pendientes.length>0 ? (
              <>
                <p className="sync-intro">Estos registros están guardados en tu teléfono y se subirán al sistema cuando haya conexión. También puedes sincronizar ahora.</p>
                {pendientes.map((p,i)=>(
                  <div className="sync-item" key={i}>
                    <span className="sync-ic">{p.ic}</span>
                    <div style={{flex:1}}>
                      <div className="sync-t">{p.tipo} · {p.cli}</div>
                      <div className="meta">{p.detalle}</div>
                    </div>
                    <div className="meta" style={{fontSize:11}}>{p.cuando}</div>
                  </div>
                ))}
                <button className="cta" style={{marginTop:16}} disabled={sincronizando} onClick={sincronizar}>
                  {sincronizando?"Sincronizando…":"Sincronizar ahora"}</button>
              </>
            ) : (
              <div className="sync-ok">
                <div style={{fontSize:38}}>✅</div>
                <div className="sync-t" style={{marginTop:8}}>Estás al día</div>
                <p className="meta" style={{marginTop:4}}>No hay registros pendientes de enviar.</p>
              </div>
            )}
            <p className="sync-nota">La app sincroniza automáticamente al recuperar la conexión. Lo enviado queda pendiente de validación del proveedor.</p>
            <button className="back" style={{width:"100%",marginTop:10}} onClick={()=>setVerSync(false)}>Cerrar</button>
          </div>
        </div>
      )}
      <div className="nav">
        <button className={tab==="novedades"?"act":""} onClick={()=>tocarTab("novedades")}>
          <span className="nIco">📣{badgeNovedades>0 && <span className="badge">{badgeNovedades}</span>}</span>Novedades</button>
        <button className={tab==="pedidos"?"act":""} onClick={()=>tocarTab("pedidos")}>
          <span className="nIco">🚚{badgePedidosTotal>0 && <span className="badge">{badgePedidosTotal}</span>}</span>Mis pedidos</button>
        <button className={tab==="agenda"?"act":""} onClick={()=>tocarTab("agenda")}>
          <span className="nIco">🗓️{badgeAgenda>0 && <span className="badge">{badgeAgenda}</span>}</span>Agenda</button>
        <button className={tab==="cuenta"?"act":""} onClick={()=>tocarTab("cuenta")}>
          <span className="nIco">📒{badgeComision>0 && <span className="badge">{badgeComision}</span>}</span>Comisiones</button>
      </div>
    </div>
  );
}
function Root(){
  const [sesion,setSesion]=useState(null);
  if(!sesion) return (
    <div className="shell" style={{background:"var(--paper)"}}>
      <div style={{flex:1, display:"flex", flexDirection:"column"}}>
        <PantallaLogin onAutenticado={(u)=>setSesion(u)} />
      </div>
    </div>
  );
  return <App usuario={sesion} onSalir={()=>setSesion(null)} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
<script>
/* ═ Nivel 2 de notificaciones: el service worker se registra SOLO al vivir en HTTPS (GitHub Pages).
   Abriendo el archivo local no hace nada (ni molesta): el candado espera su momento. ═ */
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("./sw.js").catch(function(){ /* sin permiso o sin red: la app sigue normal */ });
}
</script>
</body>
</html>
