<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Ventas Freelance · Subcomisionista</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;800&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --field:#15392B; --field-700:#1E4D3A; --maize:#F2A900; --maize-deep:#C77F00;
    --field-soft:#EEF3EF; --field-soft-line:#CFE0D5; --field-soft-txt:#1E4D3A;
    --paper:#F7F5EF; --card:#FFFFFF; --ink:#18211C; --muted:#6F7A6F;
    --line:#E7E1D3; --clay:#B5613C; --ok:#2E7D52;
    --shadow:0 1px 2px rgba(21,57,43,.06),0 8px 24px rgba(21,57,43,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  /* Blindaje anti-desborde: en filas flex, los campos ceden espacio en vez de empujar botones fuera */
  input,select,textarea{min-width:0;max-width:100%}
  button{max-width:100%}
  html,body{height:100%}
  body{background:#0d2018;font-family:Inter,system-ui,sans-serif;color:var(--ink)}
  #root{height:100%}
  .num{font-family:'Space Grotesk',sans-serif;font-feature-settings:"tnum" 1;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select{font-family:inherit;font-size:16px}
  /* phone shell */
  .shell{max-width:430px;margin:0 auto;min-height:100dvh;background:var(--paper);
    position:relative;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.4)}
  @media(min-width:480px){.shell{min-height:auto;height:100dvh;margin:0 auto;border-radius:0}}
  /* top bar */
  .top{background:var(--field-soft);color:var(--field-soft-txt);padding:14px 20px 16px;
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .top .who{font-size:12px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
  .top .name{font-size:16px;font-weight:600;margin-top:2px;color:var(--field)}
  .top-nav{display:flex;align-items:center;gap:8px}
  .topbtn{display:flex;align-items:center;gap:5px;color:var(--field-soft-txt);font-size:14px;font-weight:600;
    background:rgba(30,77,58,.08);border-radius:999px;padding:7px 14px}
  .topbtn:active{background:rgba(30,77,58,.16)}
  .net{display:flex;align-items:center;gap:6px;font-size:12px;background:rgba(30,77,58,.06);
    padding:6px 10px;border-radius:999px;color:var(--field-soft-txt);font-weight:600}
  .net:active{background:rgba(30,77,58,.12)}
  .dot{width:7px;height:7px;border-radius:50%}
  .dot.on{background:#6FD39B} .dot.off{background:var(--maize)}
  .sync-intro{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5}
  .sync-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
  .sync-ic{font-size:22px;width:38px;height:38px;border-radius:10px;background:var(--paper);
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .sync-t{font-size:14px;font-weight:600;color:var(--ink)}
  .sync-ok{text-align:center;padding:18px 0}
  .sync-nota{font-size:11.5px;color:var(--muted);margin-top:14px;line-height:1.5;
    background:var(--paper);border-radius:10px;padding:10px 12px}
  /* alerta de clientes por visitar */
  .alerta-visita{display:flex;align-items:center;gap:12px;width:100%;background:#FBF0D8;
    border:1px solid #E8C98A;border-radius:14px;padding:14px;margin-bottom:14px}
  .alerta-visita:active{background:#F6E8C4}
  .av-ic{font-size:22px}
  .av-t{font-size:14px;font-weight:700;color:var(--field)}
  .av-s{font-size:12px;color:#9A7B2E;margin-top:1px}
  .av-arrow{font-size:20px;color:#B79235}
  .visita-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .sem{width:14px;height:14px;border-radius:50%;flex-shrink:0}
  .sem.rojo{background:#D9534F;box-shadow:0 0 0 4px rgba(217,83,79,.15)}
  .sem.ambar{background:#E0A33A;box-shadow:0 0 0 4px rgba(224,163,58,.15)}
  .sem-lbl{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .sem-lbl.rojo{background:#FBE3E2;color:#B0413D}
  .sem-lbl.ambar{background:#FBF0D8;color:#9A7B2E}
  .visita-leyenda{display:flex;flex-direction:column;gap:6px;margin-top:14px;font-size:11.5px;color:var(--muted)}
  .visita-leyenda span{display:flex;align-items:center;gap:8px}
  .visita-leyenda .sem{width:11px;height:11px;box-shadow:none}
  /* solicitudes al proveedor */
  .sol-op{display:flex;align-items:center;gap:12px;width:100%;background:var(--card);
    border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px}
  .sol-op:active{background:var(--paper)}
  .sol-ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-size:20px;flex-shrink:0}
  .sol-elegido{background:var(--paper);border-radius:11px;padding:11px 13px;font-size:14px;font-weight:700;
    color:var(--field);margin-bottom:14px}
  .adjuntar{width:100%;background:var(--paper);border:1px dashed var(--line);border-radius:11px;
    padding:13px;font-size:13.5px;font-weight:600;color:var(--field)}
  .adjuntar:active{background:var(--card)}
  .sol-op.sel{border-color:var(--field);background:#EAF0EA}
  .fact-item{border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:8px}
  .fact-inp{width:72px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-size:14px;text-align:right}
  .fact-total{display:flex;justify-content:space-between;align-items:center;background:var(--field-soft);color:var(--field-soft-txt);
    border-radius:12px;padding:13px 15px;margin-top:6px;font-size:14px;font-weight:600}
  .fact-total .num{font-size:19px;font-weight:700}
  .resol-box{background:#E4F1E9;border:1px solid #A9D5BC;border-radius:11px;padding:12px 14px;
    font-size:13px;color:var(--ink);margin-top:10px;line-height:1.5}
  /* scroll body */
  .body{flex:1;overflow-y:auto;padding:18px 18px 96px}
  /* hero commission */
  .hero{background:linear-gradient(155deg,var(--field-soft) 0%,#E4ECE6 100%);
    border-radius:20px;padding:22px;color:var(--field-soft-txt);position:relative;overflow:hidden;border:1px solid var(--field-soft-line)}
  .hero::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;
    background:radial-gradient(circle,rgba(242,169,0,.22),transparent 70%)}
  .hero .lbl{font-size:12px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
  .hero .big{font-size:42px;font-weight:700;margin-top:4px;line-height:1;color:var(--field)}
  .hero .big small{font-size:20px;color:var(--muted);font-weight:500}
  .hero .split{display:flex;gap:14px;margin-top:18px}
  .hero .split div{flex:1;background:rgba(30,77,58,.06);border-radius:12px;padding:11px 13px}
  .hero .split .v{font-size:19px;font-weight:600;margin-top:3px;color:var(--field)}
  .hero .split .k{font-size:11px;color:var(--muted)}
  /* hero ampliado */
  .hero-top{display:flex;gap:14px;align-items:flex-start;position:relative;z-index:1}
  .hero-corte{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-top:12px}
  .meta-ring{position:relative;width:118px;height:118px;flex-shrink:0}
  .meta-ring-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .mr-pct{font-size:24px;font-weight:700;color:var(--field);line-height:1}
  .mr-lbl{font-size:9.5px;color:var(--muted);margin-top:2px;line-height:1.2}
  .meta-mensual{display:flex;align-items:center;gap:10px;background:rgba(30,77,58,.06);border-radius:12px;
    padding:10px 14px;margin-top:14px;position:relative;z-index:1}
  .meta-mensual span{font-size:18px}
  .mm-k{font-size:11px;color:var(--muted)}
  .mm-v{font-size:17px;font-weight:700;color:var(--field)}
  .vermas{width:100%;margin-top:14px;background:rgba(30,77,58,.09);border:1px solid rgba(30,77,58,.14);
    border-radius:11px;padding:11px;font-size:13px;font-weight:600;color:var(--field-soft-txt);position:relative;z-index:1}
  .vermas:active{background:rgba(30,77,58,.14)}
  .hero-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px;position:relative;z-index:1}
  .hg-card{background:rgba(30,77,58,.06);border-radius:14px;padding:12px 8px;text-align:center}
  .hg-ic{width:40px;height:40px;border-radius:999px;display:flex;align-items:center;justify-content:center;
    font-size:19px;margin:0 auto 8px}
  .hg-k{font-size:11.5px;color:var(--muted);line-height:1.25;min-height:16px}
  .hg-v{font-size:18px;font-weight:700;color:var(--field);margin-top:3px}
  .hg-s{font-size:10.5px;color:var(--muted);margin-top:2px}
  .proy{display:flex;align-items:center;gap:12px;background:rgba(30,77,58,.06);border-radius:14px;
    padding:14px;margin-top:14px;width:100%;position:relative;z-index:1}
  .proy-ic{font-size:20px;color:#2E7D52}
  .proy-t{font-size:14px;font-weight:600;color:var(--field-soft-txt)}
  .proy-s{font-size:11.5px;color:var(--muted);margin-top:1px}
  .proy-v{font-size:20px;font-weight:700;color:#2E7D52}
  .proy-arrow{font-size:20px;color:var(--muted)}
  /* ===== Comisiones (módulo subcomisionista) ===== */
  .cu-resumen{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
  .cu-total{text-align:center;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .cu-total-k{font-size:12.5px;color:var(--muted);font-weight:600}
  .cu-total-v{font-size:30px;font-weight:800;color:var(--field);margin-top:3px}
  .cu-split{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .cu-part{display:flex;align-items:center;gap:12px}
  .cu-part-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .cu-part-k{font-size:13.5px;font-weight:700;color:var(--ink)}
  .cu-part-s{font-size:11.5px;color:var(--muted);margin-top:1px}
  .cu-part-v{font-size:16px;font-weight:800;color:var(--field)}
  .cu-nota{font-size:11.5px;color:var(--muted);line-height:1.45;margin-top:13px;background:var(--paper);border-radius:10px;padding:9px 11px}
  .cu-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
  .cu-chips::-webkit-scrollbar{display:none}
  .cu-chip{flex-shrink:0;font-size:12.5px;font-weight:700;padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--muted)}
  .cu-chip.on{background:var(--field-soft);color:var(--field-soft-txt);border-color:var(--field)}
  .cu-lista{display:flex;flex-direction:column;gap:10px}
  .cu-item{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .cu-item-top{display:flex;align-items:flex-start;gap:10px}
  .cu-item-cli{font-size:14.5px;font-weight:700;color:var(--ink)}
  .cu-item-prod{font-size:12px;color:var(--muted);margin-top:2px}
  .cu-badge{font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;flex-shrink:0;white-space:nowrap}
  .cu-item-bot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:11px;border-top:1px solid var(--line)}
  .cu-item-fecha{font-size:12px;color:var(--muted)}
  .cu-item-com{font-size:17px;font-weight:800;color:var(--field)}
  .cu-vacio{text-align:center;color:var(--muted);font-size:13px;padding:30px 0}
  /* section */
  .sec-h{display:flex;align-items:baseline;justify-content:space-between;margin:24px 4px 12px}
  .sec-h h2{font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .sec-h .grain{flex:1;height:1px;background:var(--line);margin:0 12px;position:relative}
  /* quick actions */
  .qa{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .qa button{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:16px;text-align:left;box-shadow:var(--shadow);transition:transform .08s}
  .qa button:active{transform:scale(.97)}
  .qa .ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;
    justify-content:center;font-size:19px;margin-bottom:10px}
  .qa .t{font-size:14px;font-weight:600}
  .qa .s{font-size:12px;color:var(--muted);margin-top:2px}
  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:15px;box-shadow:var(--shadow);margin-bottom:12px}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .cli{font-size:15px;font-weight:600}
  .meta{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.5}
  .amt{font-size:16px;font-weight:600}
  .amt small{font-size:12px;color:var(--muted);font-weight:500}
  /* chips */
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
    padding:4px 9px;border-radius:999px;letter-spacing:.02em;white-space:nowrap}
  .chip .d{width:6px;height:6px;border-radius:50%}
  .c-sync{background:#FBF0D8;color:var(--maize-deep)} .c-sync .d{background:var(--maize)}
  .c-ok{background:#E4F1E9;color:var(--ok)} .c-ok .d{background:var(--ok)}
  .c-wait{background:#EDEAE0;color:#7A6F50} .c-wait .d{background:#A89A6E}
  .c-live{background:#E9EEE9;color:var(--field)} .c-live .d{background:var(--field-700)}
  .c-bad{background:#F6E3DA;color:var(--clay)} .c-bad .d{background:var(--clay)}
  .pipe{display:flex;gap:4px;margin-top:12px}
  .pipe span{flex:1;height:4px;border-radius:2px;background:var(--line)}
  .pipe span.done{background:var(--field-700)} .pipe span.now{background:var(--maize)}
  /* bottom nav */
  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
    background:#fff;border-top:1px solid var(--line);display:flex;padding:8px 8px 20px;z-index:30}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:10.5px;color:var(--muted);font-weight:500;padding:6px 0}
  .nav button.act{color:var(--field)}
  .nav-center .nIco{background:var(--maize);color:var(--field);width:38px;height:38px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:1px}
  .nav-center{color:var(--field);font-weight:700}
  .nav .nIco{font-size:21px;line-height:1;position:relative}
  .nav .badge{position:absolute;top:-6px;left:13px;min-width:17px;height:17px;padding:0 4px;
    background:#D9534F;color:#fff;font-size:10.5px;font-weight:700;border-radius:999px;
    display:flex;align-items:center;justify-content:center;border:2px solid #fff;line-height:1}
  .nav .badge.ok{background:#2E7D52;left:auto;right:13px}
  .det-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
  .det-sub{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:4px 0 4px}
  /* ===== Comisiones rediseñada ===== */
  .cu-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
  .cu-toggle{display:flex;background:var(--paper);border-radius:999px;padding:3px;flex-shrink:0}
  .cu-toggle button{font-size:12px;font-weight:700;padding:7px 13px;border-radius:999px;color:var(--muted)}
  .cu-toggle button.on{background:var(--field-soft);color:var(--field-soft-txt)}
  .cu-hero{background:linear-gradient(150deg,var(--field-soft),#E4ECE6);border-radius:22px;padding:24px 22px;color:var(--field-soft-txt);border:1px solid var(--field-soft-line);
    position:relative;overflow:hidden}
  .cu-hero::after{content:"";position:absolute;right:-40px;top:-40px;width:170px;height:170px;
    background:radial-gradient(circle,rgba(242,169,0,.25),transparent 70%)}
  .cu-hero-lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;position:relative}
  .cu-hero-big{font-size:48px;font-weight:700;line-height:1;margin:8px 0 6px;position:relative}
  .cu-hero-sub{font-size:12.5px;color:var(--muted);position:relative}
  .cu-var{display:flex;align-items:center;gap:8px;margin-top:14px;position:relative}
  .cu-var-pill{font-size:13px;font-weight:700;padding:4px 11px;border-radius:999px}
  .cu-var-pill.up{background:rgba(111,211,155,.2);color:#A9D977}
  .cu-var-pill.down{background:rgba(217,83,79,.25);color:#F0A6A3}
  .cu-var-txt{font-size:12px;color:var(--muted)}
  .cu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .cu-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
  .cu-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:9px}
  .cu-v{font-size:20px;font-weight:700;color:var(--field)}
  .cu-k{font-size:11.5px;color:var(--muted);margin-top:2px}
  .cu-block{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:6px}
  .cu-block-h{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;margin-bottom:10px}
  .cu-pct{font-size:18px;font-weight:700;color:var(--field)}
  .cu-bar{height:12px;background:var(--paper);border-radius:999px;overflow:hidden}
  .cu-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#2E7D52,#A9D977)}
  .cu-bar-fill.gold{background:linear-gradient(90deg,#C77F00,#F2A900,#FFD46B)}
  .cu-block-sub{font-size:12.5px;color:var(--muted);margin-top:8px}
  .cu-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13.5px}
  .cu-line b{font-weight:700;color:var(--field)}
  .cu-hint{font-size:12px;color:var(--ok);background:#E4F1E9;border-radius:10px;padding:9px 11px;margin-top:8px;line-height:1.4}
  .cu-rank{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#FBF0D8,#F6E8C4);
    border:1px solid #E8C98A;border-radius:16px;padding:16px;margin-top:12px}
  .cu-rank-ic{font-size:30px}
  .cu-rank-t{font-size:15px;font-weight:700;color:var(--field)}
  .cu-rank-s{font-size:12px;color:#9A7B2E;margin-top:1px}
  /* gamificada */
  .cu-game-hero{background:linear-gradient(150deg,#F3E6C8,var(--field-soft));border-radius:22px;padding:24px 20px;color:var(--field-soft-txt);text-align:center;margin-bottom:12px;border:1px solid var(--field-soft-line)}
  .cu-game-rank{font-size:46px;font-weight:700;line-height:1;color:#FFD46B}
  .cu-game-rank-lbl{font-size:13px;color:var(--muted);margin-top:2px}
  .cu-game-meta{font-size:12.5px;color:var(--muted);margin-top:8px}
  .cu-streak{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:6px}
  .cu-streak-n{font-size:26px;font-weight:700;color:#C77F00}
  .cu-streak-t{font-size:14px;font-weight:700;color:var(--field)}
  .cu-logros{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:8px}

  .det-head{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;

/* ═══════════ HUELLA REAL (WebAuthn) · el sensor del teléfono, como en la banca ═══════════
   · En HTTPS (la app publicada/instalada): biometría VERDADERA del equipo.
     Primera vez → usuario y clave → se ofrece activar la huella → el sistema registra
     la credencial en el chip seguro del teléfono. Después: un toque y adentro.
   · En archivo local (visor de pruebas): se conserva la simulación de siempre.
   · La verificación contra el servidor (sesión real) llega en Fase 4 con Supabase Auth;
     hoy la huella custodia la ENTRADA a la app en este equipo. */
const HUELLA_KEY = "freelance_huella_v1";
const puedeHuellaReal = () => location.protocol === "https:" && !!window.PublicKeyCredential;
function huellaGuardada(){ try { return JSON.parse(localStorage.getItem(HUELLA_KEY) || "null"); } catch(e){ return null; } }
function guardarHuella(d){ try { localStorage.setItem(HUELLA_KEY, JSON.stringify(d)); } catch(e){} }
function b64h(buf){ return btoa(String.fromCharCode.apply(null, Array.from(new Uint8Array(buf)))); }
function deB64h(s){ return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
function retoAleatorio(){ const a = new Uint8Array(32); crypto.getRandomValues(a); return a; }
async function crearHuella(usuario, nombre){
  try {
    const cred = await navigator.credentials.create({ publicKey: {
      challenge: retoAleatorio(),
      rp: { name: "FREELANCE", id: location.hostname },
      user: { id: new TextEncoder().encode(usuario), name: usuario, displayName: nombre || usuario },
      pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
      authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required", residentKey: "preferred" },
      timeout: 60000, attestation: "none",
    }});
    return cred ? b64h(cred.rawId) : null;
  } catch(e){ return null; }
}
async function verificarHuella(credId){
  try {
    const res = await navigator.credentials.get({ publicKey: {
      challenge: retoAleatorio(),
      allowCredentials: [{ id: deB64h(credId), type: "public-key", transports: ["internal"] }],
      userVerification: "required", timeout: 60000, rpId: location.hostname,
    }});
    return !!res;
  } catch(e){ return false; }
}
/* Ícono de huella dactilar (SVG de crestas, estilo banca) */
const HuellaIcono = ({ t = 22, c = "currentColor", g = 1.7, marco = false }) => (

);

function PantallaLogin({ onAutenticado }) {
  const [paso, setPaso]                 = useState("login");
  const [usr, setUsr]                   = useState("");
  const [pwd, setPwd]                   = useState("");
  const [verPwd, setVerPwd]             = useState(false);
  const [error, setError]               = useState("");
  const [cargando, setCargando]         = useState(false);
  const [huellaEstado, setHuellaEstado] = useState("espera");
  const [syncing, setSyncing]           = useState(false);
  const [syncDone, setSyncDone]         = useState(false);
  const [focusField, setFocusField]     = useState(null);

  const usuarioAuthRef = React.useRef(null);
  const syncRef        = React.useRef(false);
  const pwdRef         = React.useRef(null);

  const syncItems = ["Precios y promociones","Clientes (284)","Agenda · 4 visitas hoy","Stock actualizado"];

  const usrValido = USUARIOS[usr.toUpperCase()];
  const usrColor  = usr.length === 0 ? CL.tinta : usrValido ? CL.tinta : CL.error;
  const pwdColor  = pwd.length === 0 ? CL.tinta : (usrValido && usrValido.clave === pwd) ? CL.tinta : CL.error;

  const [huellaReg, setHuellaReg] = useState(huellaGuardada());
  const [ofrecerHuella, setOfrecerHuella] = useState(false);
  /* Como la banca: si el equipo aún no tiene huella registrada (y estamos en la app real),
     la primera pantalla pide credenciales; ya registrada, recibe con la huella. */
  const [conClave, setConClave] = useState(() => puedeHuellaReal() && !huellaGuardada());
  const handleLogin = (conHuella = false) => {
    /* ── HUELLA REAL: el sensor del sistema aparece, igual que al entrar a tu banca ── */
    if (conHuella && puedeHuellaReal()) {
      const reg = huellaGuardada();
      if (!reg) { setConClave(true); setError("Activa tu huella: ingresa por primera vez con usuario y clave."); return; }
      setError(""); setCargando(true);
      verificarHuella(reg.credId).then((ok) => {
        setCargando(false);
        if (!ok) { setError("No se pudo verificar la huella. Intenta de nuevo o entra con tu clave."); return; }
        const u = USUARIOS[reg.usuario] || { nombre: reg.nombre, codigo: reg.usuario, zona: "—", rol: "subcomisionista", clave: "" };
        usuarioAuthRef.current = u;
        setPaso("sync");   /* la biometría ya verificó: directo a sincronizar */
      });
      return;
    }
    if (!usr.trim()) { setError("Ingresa tu usuario"); return; }
    if (!pwd.trim()) { setError("Ingresa tu contraseña"); return; }
    const u = USUARIOS[usr.toUpperCase()];
    if (!u || u.clave !== pwd) { setError("Usuario o contraseña incorrectos"); return; }
    setError(""); setCargando(true);
    setTimeout(() => {
      setCargando(false);
      usuarioAuthRef.current = u;
      if (!conHuella && puedeHuellaReal() && !huellaGuardada()) { setOfrecerHuella(true); return; }
      setPaso(conHuella ? "huella" : "sync");
    }, 900);
  };

  /* Activar la huella: el sistema registra la credencial en el chip seguro del teléfono */
  const activarHuella = () => {
    const u = usuarioAuthRef.current; if (!u) { setOfrecerHuella(false); setPaso("sync"); return; }
    setCargando(true);
    crearHuella(usr.toUpperCase(), u.nombre).then((credId) => {
      setCargando(false);
      if (credId) { const d = { credId, usuario: usr.toUpperCase(), nombre: u.nombre }; guardarHuella(d); setHuellaReg(d); }
      setOfrecerHuella(false); setPaso("sync");
    });
  };
  const omitirHuella = () => { setOfrecerHuella(false); setPaso("sync"); };

  const simularHuella = () => {
    setHuellaEstado("leyendo");
    setTimeout(() => {
      setHuellaEstado("ok");
      setTimeout(() => setPaso("sync"), 700);
    }, 1400);
  };

  React.useEffect(() => {
    if (paso !== "sync" || syncRef.current) return;
    syncRef.current = true;
    setSyncing(true);
    setTimeout(() => {
      setSyncing(false);
      setSyncDone(true);
      setTimeout(() => {
        const u = usuarioAuthRef.current;
        if (u) onAutenticado(u);
      }, 1500);
    }, 2200);
  }, [paso]);

  const Franja = ({ titulo, subtitulo }) => (
    <div className="fx-entrar" style={{ background:`linear-gradient(160deg, ${CL.tinta} 0%, ${CL.principal} 100%)`, padding:"54px 26px 30px", position:"relative", overflow:"hidden" }}>
      <StatusBar light />
      
      <div style={{ position:"absolute", left:0, right:0, bottom:0, height:3, background:`linear-gradient(90deg, ${CL.ambar}, ${CL.suave})` }} />
      <div style={{ display:"flex", justifyContent:"center", marginBottom:12 }}>
        <LogoFreelance size={84} />
      </div>
      <p style={{ fontFamily:SERIF, fontSize:30, fontWeight:800, color:"#fff", margin:0, letterSpacing:"0.01em", lineHeight:1.05, textAlign:"center" }}>FREELANCE</p>
      <p style={{ fontFamily:BODY, fontSize:11, color:"rgba(255,255,255,0.7)", margin:"5px 0 0", letterSpacing:"0.22em", textTransform:"uppercase", textAlign:"center" }}>Ventas · Distribución · Cobranza</p>
      {titulo && <p style={{ fontFamily:SERIF, fontStyle:"italic", fontSize:15, color:"rgba(255,255,255,0.85)", margin:"12px 0 0", textAlign:"center" }}>{subtitulo}</p>}
      <div style={{ width:64, height:4, borderRadius:2, background:"#7FD69A", margin:"12px auto 0" }} />
    </div>
  );

  if (paso === "sync") return (
    <div style={{ background:CL.fondo, minHeight:"100%", display:"flex", flexDirection:"column" }}>
      <Franja titulo subtitulo={syncDone ? "Sesión establecida" : "Estableciendo sesión segura"} />
      <div style={{ flex:1, padding:"26px 26px 30px", display:"flex", flexDirection:"column" }}>
        <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:24 }}>
          <div style={{ width:54, height:54, borderRadius:"50%", border:`1px solid ${CL.linea}`, background:"#fff", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 2px 10px rgba(46,16,101,0.06)" }}>
            {syncDone ? <LogoFreelance size={34} /> : <span style={{ fontSize:26 }}>🔄</span>}
          </div>
          <div>
            <p style={{ fontFamily:SERIF, fontSize:21, fontWeight:700, color:CL.tinta, margin:"0 0 2px" }}>{syncDone ? "Todo listo" : "Preparando jornada"}</p>
            <p style={{ fontFamily:BODY, fontSize:13, color:CL.grisTexto, margin:0 }}>{syncDone ? "Dispositivo sincronizado" : `Bienvenido, ${usuarioAuthRef.current?.nombre?.split(" ")[0]}`}</p>
          </div>
        </div>

        <div style={{ background:CL.papel, border:`1px solid ${CL.linea}`, borderRadius:14, padding:"18px 20px", marginBottom:14 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, paddingBottom:10, borderBottom:`1px solid ${CL.linea}` }}>
            <span style={{ fontFamily:BODY, fontSize:11, color:CL.grisTenue, fontWeight:600, letterSpacing:"0.14em", textTransform:"uppercase" }}>Sincronización</span>
            {syncing  && <span style={{ fontFamily:BODY, fontSize:11, color:CL.ambar, fontWeight:700 }}>En curso</span>}
            {syncDone && <span style={{ fontFamily:BODY, fontSize:11, color:CL.okVerde, fontWeight:700 }}>Completa</span>}
          </div>
          {syncItems.map((item, i) => (
            <div key={i} style={{ display:"flex", alignItems:"center", gap:12, marginBottom: i < syncItems.length-1 ? 13 : 0 }}>
              <div style={{ width:20, height:20, borderRadius:"50%", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800,
                background: syncDone ? CL.principal : syncing ? CL.ambarBg : "#efeaf8",
                color: syncDone ? "#fff" : syncing ? CL.ambar : CL.grisTenue, transition:"all .3s" }}>
                {syncDone ? "✓" : syncing ? "·" : "○"}
              </div>
              <span style={{ fontFamily:BODY, fontSize:14, color: syncDone ? CL.tinta : syncing ? CL.grisTexto : CL.grisTenue }}>{item}</span>
            </div>
          ))}
        </div>

        {syncDone && (
          <div style={{ background:CL.veloLila, border:`1px solid ${CL.linea}`, borderRadius:12, padding:"12px 16px", marginBottom:14, display:"flex", gap:12, alignItems:"center" }}>
            <span style={{ fontSize:18 }}>📍</span>
            <div>
              <p style={{ fontFamily:BODY, fontSize:13, color:CL.tinta, fontWeight:600, margin:0 }}>GPS registrado · Carcelén, Quito</p>
              <p style={{ fontFamily:BODY, fontSize:11, color:CL.grisTexto, margin:0 }}>Jornada iniciada · {new Date().toLocaleTimeString("es-EC",{hour:"2-digit",minute:"2-digit"})}</p>
            </div>
          </div>
        )}

        <div style={{ marginTop:"auto", textAlign:"center", padding:"15px", borderRadius:12,
          background: syncDone ? CL.tinta : "#fff", border: syncDone ? "none" : `1px solid ${CL.linea}` }}>
          <p style={{ fontFamily:SERIF, fontStyle:"italic", fontSize:14, fontWeight:600, margin:0, color: syncDone ? "#fff" : CL.grisTexto }}>
            {syncDone ? "Ingresando a su cuenta…" : "Sincronizando datos…"}
          </p>
        </div>
      </div>
    </div>
  );

  if (paso === "huella") return (
    <div style={{ background:CL.fondo, minHeight:"100%", display:"flex", flexDirection:"column" }}>
      <Franja titulo subtitulo="Acceso biométrico" />
      <div style={{ flex:1, padding:"24px 26px 28px", display:"flex", flexDirection:"column", alignItems:"center" }}>
        <div style={{ background:CL.papel, border:`1px solid ${CL.linea}`, borderRadius:14, padding:"18px 20px", width:"100%", boxSizing:"border-box", marginBottom:24 }}>
          <p style={{ fontFamily:SERIF, fontSize:17, fontWeight:700, color:CL.tinta, margin:"0 0 4px" }}>Registrar huella dactilar</p>
          <p style={{ fontFamily:BODY, fontSize:13, color:CL.grisTexto, margin:"0 0 16px", lineHeight:1.5 }}>Regístrela una vez para ingresar de forma rápida y segura en adelante.</p>
          {[
            ["Identidad verificada","Usuario y contraseña validados"],
            ["Registrar huella","Toque el sensor para registrar"],
            ["Acceso rápido activado","La próxima vez solo toque el sensor"],
          ].map(([tit,sub],i) => (
            <div key={i} style={{ display:"flex", gap:14, alignItems:"flex-start", padding:"10px 0", borderBottom: i<2 ? `1px solid ${CL.linea}` : "none" }}>
              <span style={{ fontFamily:SERIF, fontSize:13, fontWeight:800, color:CL.medio, width:18, flexShrink:0 }}>{i+1}</span>
              <div>
                <p style={{ fontFamily:BODY, fontSize:14, fontWeight:600, color:CL.tinta, margin:"0 0 1px" }}>{tit}</p>
                <p style={{ fontFamily:BODY, fontSize:12, color:CL.grisTenue, margin:0 }}>{sub}</p>
              </div>
            </div>
          ))}
        </div>
        <button onClick={simularHuella}
          style={{ width:96, height:96, borderRadius:"50%", border:`1px solid ${CL.linea}`, cursor: huellaEstado==="leyendo"?"not-allowed":"pointer", marginBottom:10,
            background: huellaEstado==="ok" ? CL.principal : huellaEstado==="leyendo" ? CL.ambarBg : "#fff",
            boxShadow: huellaEstado==="ok" ? `0 8px 28px ${CL.principal}55` : "0 4px 14px rgba(46,16,101,0.08)", transition:"all .3s" }}>
          <span style={{ fontSize:40 }}>{huellaEstado==="ok"?"✓":huellaEstado==="leyendo"?"·":"☉"}</span>
        </button>
        <p style={{ fontFamily:SERIF, fontStyle:"italic", fontSize:14, textAlign:"center", margin:"0 0 18px",
          color: huellaEstado==="ok" ? CL.okVerde : huellaEstado==="leyendo" ? CL.ambar : CL.grisTexto }}>
          {huellaEstado==="ok" ? "Huella registrada" : huellaEstado==="leyendo" ? "Leyendo huella…" : "Toque el sensor para registrar"}
        </p>
        {huellaEstado !== "ok" && (
          <button onClick={() => setPaso("sync")} style={{ background:"none", border:"none", fontFamily:BODY, fontSize:13, color:CL.grisTexto, cursor:"pointer", textDecoration:"underline", textUnderlineOffset:3 }}>
            Continuar sin huella
          </button>
        )}
      </div>
    </div>
  );

  const lineInput = (focused, color) => ({
    width:"100%", boxSizing:"border-box", background:"transparent",
    border:"none", borderBottom:`1.5px solid ${focused ? CL.medio : CL.linea}`,
    borderRadius:0, padding:"9px 30px 9px 2px", fontSize:15, color,
    outline:"none", fontFamily:BODY, transition:"border-color .2s",
  });

  return (
    <div style={{ background:`linear-gradient(180deg, ${CL.principal} 0%, #15392B 100%)`, minHeight:"100%", display:"flex", flexDirection:"column" }}>
      <Franja titulo subtitulo="Conectamos el campo con tu negocio" />

      <div style={{ flex:1, padding:"0 22px 22px", marginTop:-16, position:"relative", zIndex:2 }}>
        <div style={{ background:CL.papel, borderRadius:16, padding:"24px 22px", boxShadow:"0 10px 30px rgba(46,16,101,0.10)", border:`1px solid ${CL.linea}` }}>

          <div style={{ display:"flex", justifyContent:"center", marginBottom:10 }}>
            <div style={{ width:54, height:54, borderRadius:27, background:"#EAF3ED", display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, color:CL.principal }}>{conClave ? "👤" : <HuellaIcono t={34} c="#15181B" g={1.5} marco />}</div>
          </div>
          {ofrecerHuella ? (<>

// Se sincronizan automáticamente al recuperar conexión, o manualmente con "Sincronizar ahora".

/* ═══════════ 4.4 · COLA OFFLINE IDEMPOTENTE — "ningún cobro se pierde" ═══════════
   Tres garantías:
   1) IDENTIDAD: cada operación nace con un op_id único e irrepetible. Al conectar Supabase,
      la tabla ops_procesadas rechaza cualquier op_id ya visto → reintentar JAMÁS duplica.
   2) PERSISTENCIA: la cola se guarda en el almacenamiento del teléfono (localStorage).
      Cerrar la app, quedarse sin señal o reiniciar NO borra lo pendiente.
      Honestidad técnica: algunos visores de archivos locales aíslan el almacenamiento;
      al publicar la app en internet (HTTPS) la persistencia queda garantizada al 100%.
   3) TODO-O-NADA: una operación sale de la cola SOLO cuando el servidor confirma que la
      procesó. Falla el envío → sigue en la cola → se reintenta con el MISMO op_id.       */
const COLA_KEY = "freelance_cola_ops_v1";
function opId(){ return "OP-" + Date.now().toString(36).toUpperCase() + "-" + Math.random().toString(36).slice(2,8).toUpperCase(); }
function colaPuedePersistir(){
  try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; } catch(e){ return false; }
}
function colaLeer(){
  try { return JSON.parse(localStorage.getItem(COLA_KEY) || "[]"); } catch(e){ return []; }
}
function colaEscribir(lista){
  try { localStorage.setItem(COLA_KEY, JSON.stringify(lista)); } catch(e){ /* visor sin almacenamiento: la cola vive en memoria esta sesión */ }
}
function colaAgregar(op){
  /* op = { op_id, comando, datos, tipo, cli, detalle, cuando } — nace ANTES de intentar enviar */
  const lista = colaLeer();
  if (lista.some(x => x.op_id === op.op_id)) return lista;   /* idempotencia también local */
  lista.push(op);
  colaEscribir(lista);
  return lista;
}
function colaConfirmar(op_id){
  /* SOLO se llama cuando el servidor confirmó la operación */
  const lista = colaLeer().filter(x => x.op_id !== op_id);
  colaEscribir(lista);
  return lista;
}

// Buscador con autocompletar (cliente, proveedor, producto)
function SearchSelect({label, hint, items, value, onPick, onClear, disabled, placeholder, render, sortBy, multiPalabra, maxItems, sinLabel}){
  const [q,setQ]=useState("");
  const [open,setOpen]=useState(false);
  const ocultarLabel = sinLabel || (label && placeholder && label.trim().toLowerCase()===placeholder.trim().toLowerCase());
  if(value){
    return (<div className="field">{!ocultarLabel && <label>{label}</label>}
      <div className="ss"><div className={"pick"+(disabled?" dis":"")}>
        <div>{render.picked(value)}</div>
        {!disabled && <button className="chg" onClick={()=>{onClear();setQ("");}}>Cambiar</button>}
      </div></div></div>);
  }
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  // multiPalabra: cada palabra en cualquier orden (nombre de cliente + sus referenciales). Si no, texto seguido.
  const coincide=(texto)=>{
    if(multiPalabra){
      const refs=(typeof REFERENCIALES!=="undefined" && REFERENCIALES[texto]) ? REFERENCIALES[texto].join(" ") : "";
      const t=norm(texto+" "+refs);
      return norm(q).split(/\s+/).filter(Boolean).every(w=>t.includes(w));
    }
    return norm(texto).includes(norm(q));
  };
  let filtrados = q.trim()==="" ? items : items.filter(it=>coincide(render.text(it)));
  if(sortBy) filtrados = [...filtrados].sort(sortBy);
  const totalFiltrados = filtrados.length;
  const visibles = maxItems ? filtrados.slice(0, maxItems) : filtrados;
  const hayMas = maxItems ? (totalFiltrados > maxItems) : false;
  return (<div className="field">{!ocultarLabel && <label>{label}</label>}
    <div className="ss">
      <div className={"box"+(disabled?" dis":"")}>
        <span className="mag">⌕</span>
        <input value={q} disabled={disabled}
          placeholder={placeholder||"Buscar…"}
          onChange={e=>{setQ(e.target.value);setOpen(true);}}
          onFocus={()=>setOpen(true)}
          onBlur={()=>setTimeout(()=>setOpen(false),150)}/>
        {q && <button className="clr" onMouseDown={e=>{e.preventDefault();setQ("");}}>×</button>}
      </div>
      {open && !disabled && (
        <div className="pop">
          {visibles.length===0
            ? <div className="none">Sin resultados para “{q}”</div>
            : <>
              {visibles.map((it,i)=>(
                <div className="opt" key={i} onMouseDown={e=>{e.preventDefault();onPick(it);setOpen(false);setQ("");}}>
                  {render.option(it)}
                </div>))}
              {hayMas && <div className="opt-mas">Mostrando {maxItems} de {totalFiltrados}. Escribe para buscar el que necesitas.</div>}
            </>}
        </div>)}
    </div>
    {hint && <div className="hint">{hint}</div>}
  </div>);
}

const CONSUMO_DIARIO = {

// Clientes próximos a pedir: por cada cliente toma el producto más urgente (menos días de stock).
// rojo = quedan ≤5 días (visitar ya); ámbar = ≤10 días (se acerca). Más de 10 no aparece.
function clientesPorVisitar(){
  const porCli={};
  Object.keys(STOCK_ANTERIOR).forEach(k=>{
    const cons=CONSUMO_DIARIO[k]; if(!cons) return;
    const [cli]=k.split("|");
    const dias=Math.round(STOCK_ANTERIOR[k].cant/cons);
    if(!porCli[cli] || dias<porCli[cli].dias) porCli[cli]={cli, dias};
  });
  return Object.values(porCli)
    .filter(x=>x.dias<=10)
    .map(x=>({...x, nivel: x.dias<=5?"rojo":"ambar"}))
    .sort((a,b)=>a.dias-b.dias);
}

// evalúa el bloqueo de un cliente; devuelve lista de motivos (vacía = sin bloqueo)
function motivosBloqueo(nombreCliente){
  const f = FICHA_CLIENTE[nombreCliente];
  const r = RIESGO_CLIENTE[nombreCliente] || {vencidas:0, protestados:0};
  if(!f) return [];
  const usado = (f.facturasPend||0) + (f.chequesPosf||0);
  const motivos = [];
  if(usado > f.cupo) motivos.push(`Cupo excedido: usa ${money(usado)} de ${money(f.cupo)}`);
  if((f.nFacturas||0) > MAX_FACTURAS) motivos.push(`Demasiadas facturas pendientes: ${f.nFacturas} (máx. ${MAX_FACTURAS})`);
  if(r.vencidas > 0) motivos.push(`${r.vencidas} factura(s) vencida(s)`);
  if(r.protestados > 0) motivos.push(`${r.protestados} cheque(s) protestado(s)`);
  return motivos;
}
