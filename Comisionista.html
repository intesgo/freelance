// Mini gráfico de línea (sparkline): evolución del precio neto en orden cronológico (antiguo→reciente)
function Sparkline({valores}){
  if(!valores || valores.length<2) return null;
  const w=260, h=40, pad=4;
  const min=Math.min(...valores), max=Math.max(...valores);
  const rango=(max-min)||1;
  const pts=valores.map((v,i)=>{
    const x=pad+(i*(w-pad*2)/(valores.length-1));
    const y=pad+(h-pad*2)*(1-(v-min)/rango);
    return [Math.round(x*100)/100, Math.round(y*100)/100];
  });
  const linea=pts.map((p,i)=>(i===0?"M":"L")+p[0]+" "+p[1]).join(" ");
  const area=linea+" L"+pts[pts.length-1][0]+" "+h+" L"+pts[0][0]+" "+h+" Z";
  const sube=valores[valores.length-1]>=valores[0];
  const col=sube?"#B5613C":"#2E7D52";
  return (
    <svg viewBox={"0 0 "+w+" "+h} preserveAspectRatio="none">
      <path d={area} fill={col} opacity="0.08"/>
      <path d={linea} fill="none" stroke={col} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r={i===pts.length-1?3:2} fill={col}/>)}
    </svg>
  );
}

const TIPOS_PRECIO=[
  {id:"P1", nombre:"Crédito", desc:"Base de crédito (venta habitual)"},
  {id:"P2", nombre:"Contado", desc:"Base de contado"},
  {id:"P3", nombre:"Promoción vendedor", desc:"Tú armas el producto gratis"},
  {id:"P4", nombre:"Promoción freelance", desc:"Eliges una promo de la lista"},
  {id:"P5", nombre:"Precio especial", desc:"Propones precio y comisión"},
];

// ── Medidor de arco del cupo (comité UI): la aguja se mueve en vivo mientras digitas ──
function ArcCupo({ total, usado, excede, money }){
  if(!total || total<=0) return null;
  const p = Math.max(0, Math.min(1.12, usado/total));      // la aguja se clava un poco más allá del 100%
  const pa = Math.min(1, p);                                // el arco de progreso no pasa del 100%
  const color = excede ? "#C0392B" : p>=0.7 ? "#C77F00" : "var(--field)";
  const ang = -90 + 180*Math.min(1, p/1.0)*1.0;             // aguja: -90° (vacío) → +90° (lleno)
  const disp = Math.round((total-usado)*100)/100;
  return (
    <div className={excede?"arc-sacudida":""} style={{display:"flex",justifyContent:"center",marginBottom:6}}>
      <svg viewBox="0 0 200 112" style={{width:190,display:"block"}}>
        {/* zonas: verde hasta 70%, ámbar hasta 100% */}
        <path d="M 16 100 A 84 84 0 0 1 184 100" fill="none" stroke="#DDF0E6" strokeWidth="13" pathLength="1"
          strokeDasharray="0.7 1" strokeLinecap="round"/>
        <path d="M 16 100 A 84 84 0 0 1 184 100" fill="none" stroke="#FBF0D8" strokeWidth="13" pathLength="1"
          strokeDasharray="0.3 1" strokeDashoffset="-0.7"/>
        {/* progreso */}
        <path d="M 16 100 A 84 84 0 0 1 184 100" fill="none" stroke={color} strokeWidth="13" pathLength="1"
          strokeDasharray={`${pa} 1`} strokeLinecap="round" style={{transition:"stroke-dasharray .35s ease, stroke .35s ease"}}/>
        {/* aguja */}
        <g style={{transform:`rotate(${ang}deg)`, transformOrigin:"100px 100px", transition:"transform .35s cubic-bezier(.3,1.2,.4,1)"}}>
          <line x1="100" y1="100" x2="100" y2="36" stroke="#3A342A" strokeWidth="3" strokeLinecap="round"/>
        </g>
        <circle cx="100" cy="100" r="6" fill="#3A342A"/>
        {/* cifra central */}
        <text x="100" y="82" textAnchor="middle" className="num"
          style={{fontSize:17, fontWeight:700, fill: excede?"#C0392B":"var(--field)"}}>
          {excede ? "−"+money(usado-total) : money(disp)}</text>
        <text x="100" y="95" textAnchor="middle" style={{fontSize:8.5, fill:"#6B6455", fontWeight:600, letterSpacing:".04em"}}>
          {excede ? "EXCEDE EL CUPO" : "DISPONIBLE"}</text>
      </svg>
    </div>
  );
}

function Pedido({toast, prodInicial, onConsumir, go, irGuardado, paso, setPaso}){
  const [cli,setCli]=useState(null);
  const [prov,setProv]=useState(null);
  const [prod,setProd]=useState(null);
  // Origen del producto elegido: "favorito" (recompra) o "nuevo" (campo Producto nuevo → arranca limpio)
  const origenProd = React.useRef(null);
  const [tipo,setTipo]=useState("P1"); // crédito por defecto (90% de las ventas)
  const [cant,setCant]=useState(0);
  const [histAbierto,setHistAbierto]=useState(false); // historial 3 meses colapsado por defecto
  const [favAbierto,setFavAbierto]=useState(false);   // panel de productos que ya compró el cliente
  const [precio,setPrecio]=useState("");
  const [gratis,setGratis]=useState("");        // unidades gratis (P3)
  const [condP3,setCondP3]=useState("contado"); // P3: piso contado o crédito
  const [promoF,setPromoF]=useState(null);       // promo elegida del freelance (P4)
  const [comProp,setComProp]=useState("");       // comisión propuesta (P5)
  const [motivo,setMotivo]=useState("");
  const [carrito,setCarrito]=useState([]);        // productos del pedido (carrito)
  const [verCarrito,setVerCarrito]=useState(false); // ventana tras guardar
  const [codigo,setCodigo]=useState("");           // código de desbloqueo ingresado
  const [desbloqueado,setDesbloqueado]=useState(false);

  // bloqueo automático del cliente
  const motivos = cli ? motivosBloqueo(cli) : [];
  const bloqueado = motivos.length>0 && !desbloqueado;

  // precarga desde Productos: fija proveedor y producto, deja al vendedor elegir cliente y precio
  React.useEffect(()=>{
    if(prodInicial){
      const pv=PROVEEDORES.find(x=>x.id===prodInicial.provId);
      if(pv) setProv(pv);
      setProd(prodInicial);
      if(onConsumir) onConsumir();
    }
  },[prodInicial]);

  const reset=()=>{setTipo("P1");setPrecio("");setGratis("");setCondP3("contado");setPromoF(null);setComProp("");setMotivo("");};
  // agregar el producto actual al carrito y limpiar para el siguiente
  const resetProducto=()=>{setProd(null);setCant(0);reset();};
  // cerrar pedido completo: vuelve de cero
  const cerrarPedido=()=>{setCli(null);setProv(null);setCarrito([]);setVerCarrito(false);setCodigo("");setDesbloqueado(false);resetProducto();setPaso(1);};
  const totalComisionCarrito = carrito.reduce((s,it)=>s+it.comisionTotal,0);
  // Valor total de la factura del pedido (precio x cantidad de cada item)
  const totalFacturaCarrito = Math.round(carrito.reduce((s,it)=>s+(it.precio*it.cant),0)*100)/100;
  // Total en quintales reales: cada presentacion se convierte a qq por peso (1 qq = 45.4 kg)
  const qqDeUnidad = (u)=>{
    if(!u) return 1;
    if(/quintal/i.test(u)) return 1;
    const m = u.match(/([\d.]+)\s*kg/i);
    if(m) return (parseFloat(m[1])||0)/45.4;
    return 1;
  };
  const totalQuintalesCarrito = Math.round(carrito.reduce((s,it)=>s+(qqDeUnidad(it.unidad)*it.cant),0)*100)/100;
  const productosDelProv = prov ? PRESENTACIONES.filter(p=>p.provId===prov.id) : [];
  // Productos que ESE cliente ya compró antes (con este proveedor), según su historial.
  // Se ocultan los que ya están en el pedido para no elegirlos dos veces.
  const enCarrito = new Set(carrito.map(it=>it.prod?it.prod.id:it.prodId));
  const favoritos = (cli && prov) ? productosDelProv
    .map(p=>{ const h=HISTORIAL_3M[cli+"|"+p.id]; return h&&h.length>0 ? {prod:p, ultima:h[0], nCompras:h.length} : null; })
    .filter(Boolean)
    .filter(f=>!enCarrito.has(f.prod.id))
    .sort((a,b)=>b.nCompras-a.nCompras) : [];

  // base según el tipo de precio elegido
  const base = !prod ? 0
    : tipo==="P1" ? prod.baseCredito
    : tipo==="P2" ? prod.baseContado
    : tipo==="P3" ? (condP3==="credito"?prod.baseCredito:prod.baseContado) // piso según condición
    : tipo==="P4" ? (promoF?promoF.base:0)
    : 0;                                         // P5: no hay base, se propone
  const precioNum = parseFloat(precio)||0;
  const dif = (prod && precio!=="") ? Math.round((precioNum-base)*100)/100 : 0;
  const bajoBase = tipo!=="P5" && prod && precio!=="" && precioNum < base;
  const comPropNum = parseFloat(comProp)||0;

  const esP5 = tipo==="P5";
  const gratisNum = tipo==="P3" ? (parseInt(gratis)||0) : 0;
  // P3: la comisión = diferencia × cantidad − (base × unidades gratis)
  const costoGratis = tipo==="P3" ? Math.round(base*gratisNum*100)/100 : 0;
  const cantN = Math.max(0, parseInt(cant)||0);   // cantidad como número seguro (cant puede ser texto mientras se escribe)
  const comisionUnidad = esP5 ? comPropNum : dif;
  const comisionBruta = Math.round(comisionUnidad*cantN*100)/100;
  const comisionTotal = Math.round((comisionBruta - costoGratis)*100)/100;
  const comisionPromedio = cantN>0 ? Math.round((comisionTotal/cantN)*100)/100 : 0;

  // ── Control de cupo de crédito ──
  const fichaCli = cli ? FICHA_CLIENTE[cli] : null;
  const esCredito = tipo==="P1" || (tipo==="P3" && condP3==="credito"); // P1=crédito; contado (P2) no consume cupo
  const cupoTotal = fichaCli ? (fichaCli.cupo||0) : 0;
  const deudaActual = fichaCli ? (fichaCli.debe||0) : 0;
  const cupoDisponible = Math.round((cupoTotal - deudaActual)*100)/100;
  // Crédito ya comprometido en el carrito (ítems a crédito)
  const creditoEnCarrito = carrito.filter(it=>it.esCredito).reduce((s,it)=>s+(it.precio*it.cant),0);
  const montoLinea = esCredito ? Math.round(precioNum*cantN*100)/100 : 0;
  const expuestoTotal = Math.round((deudaActual + creditoEnCarrito + montoLinea)*100)/100;
  const excedeCupo = esCredito && cupoTotal>0 && expuestoTotal > cupoTotal;
  const excesoMonto = excedeCupo ? Math.round((expuestoTotal - cupoTotal)*100)/100 : 0;

  const requiereAutorizacion = esP5 || excedeCupo;   // P5 o exceder cupo → requiere autorización del freelance

  // validaciones por tipo
  const baseLista = esP5 || (tipo==="P4"? !!promoF : true);
  const precioOk = precio!=="" && precioNum>0 && (esP5 || !bajoBase);
  const p5Ok = !esP5 || (comProp!=="" && motivo.trim().length>2);
  const p3Ok = tipo!=="P3" || (parseInt(gratis)||0)>=0;
  const valido = cli && prov && prod && cantN>0 && baseLista && precioOk && p5Ok && p3Ok && !bloqueado;

  const tInfo=TIPOS_PRECIO.find(t=>t.id===tipo);
  // Arma el producto actual como item del carrito (se usa al agregar y al guardar directo)
  const construirItem = ()=>({
    id:Date.now(), prod, prodNombre:prod.nombre, unidad:prod.unidad,
    tipo, tipoNombre:tInfo.nombre, cant:cantN,
    precio:precioNum, gratis:gratisNum, esCredito,
    comisionTotal, requiere:requiereAutorizacion,
    motivoAuth: excedeCupo ? "Excede cupo de crédito" : (esP5 ? "Precio especial" : null)
  });
  const histo = (cli && prod) ? HISTORIAL[cli+"|"+prod.id] : null;
  // Historial extendido 3 meses (igualado con app Freelance)
  const histo3m = (cli && prod) ? (HISTORIAL_3M[cli+"|"+prod.id]||[]) : [];
  const ultimaCompra = histo3m.length>0 ? histo3m[0] : null;
  // Producto nuevo para este cliente: hay producto elegido pero sin compras previas
  const esProductoNuevo = !!(cli && prod && !ultimaCompra);
  // Al ELEGIR un producto: fija el tipo, el precio y la cantidad de la última compra (o base/50 si es nuevo)
  const prodPrevio = React.useRef(null);
  const tipoPrevio = React.useRef(tipo);
  React.useEffect(()=>{
    if(prod && prod.id !== prodPrevio.current){
      prodPrevio.current = prod.id;
      // Producto elegido desde "Producto nuevo": SIEMPRE arranca limpio (P1, cantidad 0, precio base)
      if(origenProd.current === "nuevo"){
        setTipo("P1");
        tipoPrevio.current = "P1";
        setCant(0);
        if(prod.baseCredito>0) setPrecio(prod.baseCredito.toFixed(2));
      } else if(ultimaCompra){
        const t = (ultimaCompra.tipo && TIPOS_PRECIO.some(x=>x.id===ultimaCompra.tipo)) ? ultimaCompra.tipo : tipo;
        setTipo(t);
        tipoPrevio.current = t;   // sincroniza para que el PRIMER cambio manual sí se detecte
        setPrecio(String(ultimaCompra.precio));
        if(ultimaCompra.cant) setCant(ultimaCompra.cant);
      } else {
        // Sin historial y sin origen definido: también limpio (P1, cantidad 0, precio base)
        setTipo("P1");
        tipoPrevio.current = "P1";
        setCant(0);
        if(prod.baseCredito>0) setPrecio(prod.baseCredito.toFixed(2));
      }
    }
    if(!prod) prodPrevio.current = null;
  }, [prod]);
  // Al CAMBIAR el tipo: si vuelve al tipo de la última compra → último precio; si es otro → base de ese tipo
  React.useEffect(()=>{
    if(prod && tipo !== tipoPrevio.current){
      tipoPrevio.current = tipo;
      if(esP5){ setCant(0); setPrecio(""); return; }
      if(ultimaCompra && tipo === ultimaCompra.tipo){
        // volvió al tipo de la última venta → precio y cantidad tal cual esa venta
        setPrecio(String(ultimaCompra.precio));
        setCant(ultimaCompra.cant || 0);
      } else {
        // otro tipo → cantidad en cero y precio a la base de ese tipo
        setCant(0);
        if(base>0) setPrecio(base.toFixed(2));
      }
    }
  }, [tipo]);
  const imgProd = prod ? (EMOJI_LINEA[prod.linea]||"📦") : null;
  const netoDe = h => Math.round((h.precio-(h.nc||0))*100)/100;
  let resumen=null;
  if(histo3m.length>0){
    const netos=histo3m.map(netoDe);
    const prom=Math.round((netos.reduce((a,b)=>a+b,0)/netos.length)*100)/100;
    const reciente=netos[0], antiguo=netos[netos.length-1];
    const deltaTend=Math.round((reciente-antiguo)*100)/100;
    const totalQ=histo3m.reduce((a,h)=>a+h.cant,0);
    resumen={prom, deltaTend, totalQ, nCompras:histo3m.length};
  }

  return (<>
    <div className="h1">Tomar pedido</div>
    <div className="sub">{paso===1?"Elige cliente, proveedor y producto.":"Define el precio y la cantidad."}</div>

    {paso===1 && <>
    <SearchSelect label="Cliente" items={CLIENTES} value={cli} multiPalabra placeholder="Cliente"
      onPick={c=>{setCli(c);setCodigo("");setDesbloqueado(false);}} onClear={()=>{if(carrito.length===0){setCli(null);setCodigo("");setDesbloqueado(false);}}}
      hint={carrito.length>0?"Para cambiar de cliente, cierra primero el pedido en curso.":null}
      render={{
        text:c=>c,
        option:c=>(<><div className="o1">{c}</div>
          {(REFERENCIALES[c]||[]).length>0 && <div className="o2">Factura a: {REFERENCIALES[c].join(" · ")}</div>}</>),
        picked:c=>(<><div className="p1">{c}</div>
          <div className="p2">{(REFERENCIALES[c]||[]).length>0?`Factura a: ${REFERENCIALES[c].join(" · ")}`:"Cliente comprador"}</div></>)
      }}/>

    {cli && motivos.length>0 && (
      <div className={"bloqueo"+(desbloqueado?" ok":"")}>
        {desbloqueado ? (
          <>
            <div className="bq-h"><span className="bq-ic">🔓</span> Pedido desbloqueado por el proveedor</div>
            <div className="bq-sub">Puedes continuar con este pedido.</div>
          </>
        ) : (
          <>
            <div className="bq-h"><span className="bq-ic">🚫</span> Cliente bloqueado para pedidos</div>
            <ul className="bq-list">
              {motivos.map((m,i)=><li key={i}>{m}</li>)}
            </ul>
            <div className="bq-sub">El bloqueo es automático. Solicita al proveedor el código de validación para desbloquear este pedido.</div>
            <div className="bq-code">
              <input value={codigo} onChange={e=>setCodigo(e.target.value)} placeholder="Código del proveedor" inputMode="numeric"/>
              <button onClick={()=>{
                if(codigo.trim()===CODIGO_DESBLOQUEO){ setDesbloqueado(true); toast("Pedido desbloqueado por el proveedor."); }
                else toast("Código incorrecto. Verifica con el proveedor.");
              }}>Desbloquear</button>
            </div>
          </>
        )}
      </div>
    )}

    <SearchSelect label="Proveedor" items={PROVEEDORES} value={prov} placeholder="Proveedor"
      onPick={p=>{setProv(p);setProd(null);reset();}} onClear={()=>{if(carrito.length===0){setProv(null);setProd(null);reset();}}}
      hint={carrito.length>0?"Un pedido es de un solo proveedor. Cierra el pedido para cambiarlo.":null}
      render={{
        text:p=>p.nombre,
        option:p=>(<div className="o1">{p.nombre}</div>),
        picked:p=>(<><div className="p1">{p.nombre}</div><div className="p2">Un pedido por proveedor</div></>)
      }}/>

    {/* Productos que el cliente ya compró antes (favoritos) */}
    {prov && favoritos.length>0 && (
      <div className="fav-wrap">
        <button className={"fav-toggle"+(favAbierto?" abierto":"")} onClick={()=>setFavAbierto(v=>!v)}>
          <span>⭐ Recompra <span className="fav-n">{favoritos.length}</span></span>
          <span className="fav-ar">{favAbierto?"▲":"▼"}</span>
        </button>
        {favAbierto && (
          <div className="fav-lista">
            {favoritos.map(f=>(
              <button key={f.prod.id} className="fav-item"
                onClick={()=>{ origenProd.current="favorito"; setProd(f.prod); reset(); setFavAbierto(false); setPaso(2); }}>
                <div className="fav-emoji">{EMOJI_LINEA[f.prod.linea]||"📦"}</div>
                <div className="fav-info">
                  <div className="fav-nom">{f.prod.marca}</div>
                  <div className="fav-pres">{f.prod.unidad}</div>
                  <div className="fav-det">
                    Últ. {f.ultima.fecha} · <b>{money(f.ultima.precio)}</b>
                    {f.ultima.tipo && <span className="fav-tipo">{f.ultima.tipo}</span>}
                  </div>
                  <div className="fav-det2">{f.ultima.cant} {f.prod.unidad} · {f.nCompras} compra{f.nCompras>1?"s":""} en 3 meses</div>
                </div>
                <span className="fav-add">Agregar ›</span>
              </button>
            ))}
          </div>
        )}
      </div>
    )}

    <SearchSelect label="Producto nuevo" sinLabel items={productosDelProv} value={prod} maxItems={5}
      disabled={!prov} placeholder={prov?"Producto nuevo":"Elige primero el proveedor"}
      onPick={p=>{origenProd.current="nuevo";setProd(p);reset();setPaso(2);}} onClear={()=>{setProd(null);reset();}}
      hint={prov?`${productosDelProv.length} productos autorizados de ${prov.nombre}`:null}
      render={{
        text:p=>p.nombre,
        option:p=>(
          <div className="prod-ficha">
            <div className="pf-img">{EMOJI_LINEA[p.linea]||"📦"}</div>
            <div className="pf-info">
              <div className="pf-nom">{p.marca}</div>
              <div className="pf-pres">{p.unidad}</div>
            </div>
            <span className="pf-ar">›</span>
          </div>),
        picked:p=>(<><div className="p1">{p.nombre}</div>
          <div className="p2">por {p.unidad}</div></>)
      }}/>

    </>}

    {/* ── PASO 2: precio y cantidad ── */}
    {paso===2 && <>
    <button className="volver-paso" onClick={()=>setPaso(1)}>‹ Cambiar producto</button>
    <div className="prod-elegido">
      <div className="pe-emoji">{prod?(EMOJI_LINEA[prod.linea]||"📦"):"📦"}</div>
      <div style={{flex:1}}>
        <div className="pe-nom">
          {prod?prod.marca:""}
          {esProductoNuevo && (
            <span style={{marginLeft:8,fontSize:11,fontWeight:700,color:"#fff",background:"var(--field)",
              padding:"2px 8px",borderRadius:999,verticalAlign:"middle"}}>Producto nuevo</span>
          )}
        </div>
        <div className="pe-sub">{prod?prod.unidad:""} · {cli}</div>
      </div>
    </div>

    <div className={"stepwrap"+(prod?"":" off")}>
      {/* Selector de tipo de precio */}
      <div className="field"><label>Tipo de precio</label>
        <div className="tipogrid">
          {TIPOS_PRECIO.map(t=>(
            <button key={t.id} className={"tipobtn"+(tipo===t.id?" on":"")}
              onClick={()=>{setTipo(t.id);setPrecio("");setGratis("");setCondP3("contado");setPromoF(null);setComProp("");setMotivo("");}}>
              <span className="tcod">{t.id}</span>
              <span className="tnom">{t.nombre}</span>
            </button>
          ))}
        </div>
      </div>

      {/* P4: elegir promoción de la lista del freelance */}
      {tipo==="P4" && (
        <div className="field"><label>Promoción del freelance</label>
          {prod && prod.promosFreelance.length>0 ? (
            <SearchSelect label="" items={prod.promosFreelance} value={promoF}
              onPick={pm=>{setPromoF(pm);setPrecio("");}} onClear={()=>{setPromoF(null);setPrecio("");}}
              render={{
                text:pm=>pm.nombre,
                option:pm=>(<><div className="o1">{pm.nombre}</div><div className="o2">{pm.detalle} · base {money(pm.base)}</div></>),
                picked:pm=>(<><div className="p1">{pm.nombre}</div><div className="p2">{pm.detalle}</div></>)
              }}/>
          ) : <div className="hint">Este producto no tiene promociones del freelance disponibles.</div>}
        </div>
      )}

      <div className="field"><label>Cantidad ({prod?prod.unidad:"unidad"})</label>
        <input className="num qty-input" type="number" inputMode="numeric" min="1" value={cant}
          placeholder="Escribe la cantidad"
          onChange={e=>setCant(e.target.value)}
          onBlur={e=>{ const n=parseInt(e.target.value); setCant(!n||n<1?1:n); }}/></div>

      {/* P3: condición (define el piso) + unidades gratis que arma el vendedor */}
      {tipo==="P3" && (<>
        <div className="field"><label>Condición de la promoción</label>
          <div className="seg">
            <button className={condP3==="contado"?"on":""} onClick={()=>{setCondP3("contado");setPrecio("");}}>Contado · piso P2</button>
            <button className={condP3==="credito"?"on":""} onClick={()=>{setCondP3("credito");setPrecio("");}}>Crédito · piso P1</button>
          </div>
          <div className="hint">El precio no puede bajar del piso {condP3==="credito"?"de crédito (P1)":"de contado (P2)"}{prod?": "+money(base):""}.</div>
        </div>
        <div className="field"><label>Unidades gratis (promoción)</label>
          <div className="stepper">
            <button onClick={()=>setGratis(Math.max(0,(parseInt(gratis)||0)-1))}>−</button>
            <input className="num" type="number" placeholder="0" value={gratis}
              onChange={e=>setGratis(e.target.value)}/>
            <button onClick={()=>setGratis((parseInt(gratis)||0)+1)}>+</button>
          </div>
          <div className="hint">Ej.: compra {cantN} lleva {gratis||0} gratis. El cliente recibe {cantN+(parseInt(gratis)||0)} y paga {cantN}.</div>
        </div>
      </>)}

      {/* Precio de venta (no aplica como input en P5: ahí se propone) */}
      <div className="field">
        <label style={{marginBottom:6,display:"block"}}>Precio de venta</label>

        {/* Barra informativa: precio base · o "Nueva compra" si es primera vez */}
        {prod && !esP5 && (
          <div className={"base-barra"+(histo3m.length===0?" nueva":"")}>
            {histo3m.length>0
              ? <><span>Precio base</span><b className="num">{money(base)}</b></>
              : <><span>✨ Nueva compra</span><b className="num">base {money(base)}</b></>}
          </div>
        )}

        {/* Precio con botones − / + de $0,50 */}
        <div className="precio-row">
          {!esP5 && <button type="button" className="pm-btn"
            onClick={()=>{ const v=Math.max(0,(parseFloat(precio)|| (base||0))-0.5); setPrecio(v.toFixed(2)); }}>−</button>}
          <input className={"num precio-in"+(bajoBase?" warn":"")} type="number" inputMode="decimal"
            placeholder={prod&&base>0?"Precio base "+money(base):"Precio negociado"}
            value={precio} onChange={e=>setPrecio(e.target.value)}/>
          {!esP5 && <button type="button" className="pm-btn"
            onClick={()=>{ const v=(parseFloat(precio)|| (base||0))+0.5; setPrecio(v.toFixed(2)); }}>+</button>}
        </div>

        {bajoBase
          ? <div className="hint err">No puedes vender bajo tu base ({money(base)}).</div>
          : !esP5 && precio!==""
            ? <div className="hint">Tu comisión: <b style={{color:"var(--field)"}}>{money(dif)}</b> × {cantN} = <b style={{color:"var(--field)"}}>{money(comisionTotal)}</b></div>
            : esP5
              ? <div className="hint">Precio que negociaste. El freelance lo autoriza.</div>
              : null}
      </div>

    {/* Historial de compras (debajo del precio de venta) */}
    {prod && histo3m.length>0 && (
      <div className="prodcard">
        <div className="pc-head">
          <div className="pc-img">{imgProd}</div>
          <div style={{flex:1}}>
            <div className="pc-nom">{prod.nombre}</div>
            <div className="pc-sub">{prod.marca} · por {prod.unidad}</div>
          </div>
        </div>

        <button className="pc-toggle" onClick={()=>setHistAbierto(v=>!v)}>
          <span>🕘 Historial de compras {resumen && <span className="pc-toggle-sub">· {resumen.nCompras} en 3 meses · prom {money(resumen.prom)}</span>}</span>
          <span className="pc-toggle-ar">{histAbierto?"▲":"▼"}</span>
        </button>

        {histAbierto && <>
        {resumen && (
          <div className="pc-resumen">
            <div className="pc-rcell">
              <div className="pc-rk">Precio promedio</div>
              <div className="pc-rv num">{money(resumen.prom)}</div>
            </div>
            <div className="pc-rcell">
              <div className="pc-rk">Tendencia</div>
              <div className={"pc-rv num "+(resumen.deltaTend>0?"up":resumen.deltaTend<0?"down":"")}>
                {resumen.deltaTend>0?"▲":resumen.deltaTend<0?"▼":"="} {money(Math.abs(resumen.deltaTend))}
              </div>
            </div>
            <div className="pc-rcell">
              <div className="pc-rk">Total comprado</div>
              <div className="pc-rv num">{resumen.totalQ} <span className="pc-ru">{prod.unidad.split(" ")[0].toLowerCase()}</span></div>
            </div>
          </div>
        )}

        {resumen && histo3m.length>=2 && (
          <div className="pc-spark">
            <div className="pc-spark-t">📈 Evolución del precio neto</div>
            <Sparkline valores={histo3m.slice().reverse().map(netoDe)} />
            <div className="pc-spark-lbl">
              <span>{histo3m[histo3m.length-1].fecha}</span>
              <span>{histo3m[0].fecha}</span>
            </div>
          </div>
        )}

        {histo3m.length>0 ? (
          <div className="pc-hist" style={{maxHeight:220,overflowY:"auto"}}>
            <div className="pc-row pc-row-h">
              <span style={{flex:1}}>Fecha</span>
              <span style={{width:58,textAlign:"center"}}>Tipo</span>
              <span style={{width:40,textAlign:"right"}}>Cant.</span>
              <span style={{width:80,textAlign:"right"}}>P. neto</span>
            </div>
            {histo3m.map((h,i)=>{
              const neto=Math.round((h.precio-(h.nc||0))*100)/100;
              return (
                <div className={"pc-row"+(i===0?" pc-row-last":"")} key={i}>
                  <span style={{flex:1}}>
                    {h.fecha}
                    {i===0 && <span className="pc-ultima">última</span>}
                  </span>
                  <span style={{width:58,textAlign:"center"}}><span className="pc-tag">{h.tipo}</span></span>
                  <span className="num" style={{width:40,textAlign:"right"}}>{h.cant}</span>
                  <span style={{width:80,textAlign:"right"}}>
                    <span className="num">{money(neto)}</span>
                    {h.nc>0 && (
                      <div className="pc-ncline">
                        <span className="pc-ncbruto num">{money(h.precio)}</span>
                        <span className="pc-ncbadge">NC −{money(h.nc)}</span>
                      </div>
                    )}
                  </span>
                </div>
              );
            })}
          </div>
        ) : (
          <div className="pc-empty">{cli} no ha comprado {prod.nombre} en los últimos 3 meses.</div>
        )}
        </>}
      </div>
    )}

    {/* Cliente/producto nuevo: sin historial */}
    {prod && histo3m.length===0 && (
      <div className="primera-compra">✨ Primera compra de este producto para {cli}.</div>
    )}

      {/* P5: comisión propuesta + motivo */}
      {esP5 && (<>
        <div className="field"><label>Comisión que propones (por {prod?prod.unidad:"unidad"})</label>
          <input className="num" type="number" inputMode="decimal" placeholder="Ej.: 1.50"
            value={comProp} onChange={e=>setComProp(e.target.value)}/>
          <div className="hint">El freelance puede aprobarla, ajustarla o rechazarla.</div>
        </div>
        <div className="field"><label>Motivo de la solicitud</label>
          <input type="text" placeholder="Ej.: cliente mayorista, cierre de mes…"
            value={motivo} onChange={e=>setMotivo(e.target.value)}/>
        </div>
      </>)}
    </div>

    {prod && precio!=="" && (
      <div className="calc">
        <div className="cr"><span className="k">{tInfo.id} · {tInfo.nombre}</span>
          <span className="v num">{money(precioNum)} / {prod.unidad}</span></div>
        <div className="cr"><span className="k">Venta ({cant} × {money(precioNum)})</span>
          <span className="v num">{money(precioNum*cantN)}</span></div>
        {tipo==="P3" && (parseInt(gratis)||0)>0 &&
          <div className="cr"><span className="k">Más {gratis} gratis</span>
            <span className="v num">{cantN+(parseInt(gratis)||0)} entregados</span></div>}
        {requiereAutorizacion ? (
          <div className="cr tot"><span className="k">Tu comisión</span>
            <span className="v" style={{fontSize:16,color:"var(--maize)"}}>
              {comProp!=="" ? money(comisionTotal)+" · a confirmar" : "La define el freelance"}</span></div>
        ) : tipo==="P3" ? (
          <>
            <div className="cr"><span className="k">Diferencia sobre tu base</span>
              <span className="v num">{money(comisionUnidad)} / {prod.unidad}</span></div>
            <div className="cr"><span className="k">Comisión por {cant} vendidos</span>
              <span className="v num">{money(comisionBruta)}</span></div>
            {gratisNum>0 &&
              <div className="cr"><span className="k">− Costo de {gratisNum} gratis ({money(base)} c/u)</span>
                <span className="v num" style={{color:"var(--clay)"}}>−{money(costoGratis)}</span></div>}
            <div className="cr tot"><span className="k">Tu comisión total</span>
              <span className="v num">{money(comisionTotal)}</span></div>
            <div className="cr"><span className="k">Comisión promedio por {prod.unidad}</span>
              <span className="v num" style={{color:comisionPromedio>0?"var(--field)":"var(--clay)"}}>{money(comisionPromedio)}</span></div>
          </>
        ) : (
          <>
            <div className="cr"><span className="k">Diferencia sobre tu base</span>
              <span className="v num">{money(comisionUnidad)} / {prod.unidad}</span></div>
            <div className="cr tot"><span className="k">Tu comisión</span>
              <span className="v num">{money(comisionTotal)}</span></div>
          </>
        )}
      </div>
    )}

    {prod && esCredito && fichaCli && cupoTotal>0 && (
      <div className={"cupo-box"+(excedeCupo?" cupo-excede":"")}>
        <div className="cupo-head">
          <span>💳 Cupo de crédito · {cli}</span>
          <span className={"cupo-badge "+(excedeCupo?"bad":cupoDisponible>0?"ok":"warn")}>
            {excedeCupo?"Excedido":"Disponible"}
          </span>
        </div>
        <ArcCupo total={cupoTotal} usado={expuestoTotal} excede={excedeCupo} money={money}/>
        <div className="cupo-barra">
          <div className="cupo-fill" style={{width:Math.min(100,Math.round(expuestoTotal/cupoTotal*100))+"%"}}></div>
        </div>
        <div className="cupo-lines">
          <div className="cupo-l"><span>Límite autorizado</span><b className="num">{money(cupoTotal)}</b></div>
          <div className="cupo-l"><span>Ya debe</span><b className="num">{money(deudaActual)}</b></div>
          {creditoEnCarrito>0 && <div className="cupo-l"><span>En este pedido</span><b className="num">{money(creditoEnCarrito)}</b></div>}
          {montoLinea>0 && <div className="cupo-l"><span>Producto actual</span><b className="num">{money(montoLinea)}</b></div>}
          <div className="cupo-l cupo-disp">
            <span>{excedeCupo?"Excede el cupo en":"Cupo disponible"}</span>
            <b className="num">{excedeCupo?("−"+money(excesoMonto)):money(Math.round((cupoTotal-expuestoTotal)*100)/100)}</b>
          </div>
        </div>
        {excedeCupo && (
          <div className="cupo-aviso">
            ⚠️ Este pedido supera el cupo de {cli}. Puedes tomarlo, pero quedará <b>pendiente de autorización del freelance</b> para ampliar el crédito.
          </div>
        )}
      </div>
    )}

    <button className="cta" disabled={!valido}
      onClick={()=>{
        setCarrito([...carrito, construirItem()]);
        toast(requiereAutorizacion
          ? "Producto agregado · espera autorización del freelance."
          : "Producto agregado al pedido ✓");
        resetProducto();
        setPaso(1);
      }}>
      {requiereAutorizacion ? "Agregar producto (con autorización)" : "Agregar producto"}</button>

    {/* Guardar pedido: sirve aunque solo se haya definido un producto en pantalla */}
    {(valido || carrito.length>0) && (
      <button className="cta cta-guardar"
        onClick={()=>{
          const items = valido ? [...carrito, construirItem()] : carrito;
          const n = items.length;
          toast(`Pedido guardado · ${n} producto${n>1?"s":""}.`);
          cerrarPedido();
          if(irGuardado) irGuardado(); else if(go) go("pedidos");
        }}>
        Guardar pedido{valido ? " · "+(carrito.length+1)+" producto"+((carrito.length+1)>1?"s":"") : " · "+carrito.length+" producto"+(carrito.length>1?"s":"")}</button>
    )}

    <div className="lock"><span>🔒</span>
      <span>Trabajas sobre tu base por tipo de precio. El costo del proveedor y el margen del freelance no son visibles para tu perfil.</span></div>
    </>}

    {/* ── PASO 3: resumen del pedido (pantalla completa) ── */}
    {paso===3 && <>
      <button className="volver-paso" onClick={()=>setPaso(1)}>‹ Volver</button>
      <div className="h1">Resumen del pedido</div>
      <div className="sub">{cli} · {prov?prov.nombre:""}</div>

      {carrito.length===0
        ? <div className="ph">Aún no agregas productos.</div>
        : <>
          <div style={{display:"flex",gap:10,margin:"6px 0 14px"}}>
            <div style={{flex:1.4,background:"var(--field-soft)",color:"var(--field-soft-txt)",borderRadius:14,padding:"14px 16px",
              border:"2px solid var(--maize)",boxShadow:"0 4px 14px rgba(21,57,43,.10)"}}>
              <div style={{fontSize:12,fontWeight:700,color:"var(--maize-deep)",letterSpacing:".02em",marginBottom:3}}>VALOR FACTURA</div>
              <div className="num" style={{fontSize:28,fontWeight:700,lineHeight:1.1}}>{money(totalFacturaCarrito)}</div>
            </div>
            <div style={{flex:1,background:"var(--maize)",color:"var(--field)",borderRadius:14,padding:"14px 16px"}}>
              <div style={{fontSize:12,opacity:.9,marginBottom:3}}>Cantidad</div>
              <div className="num" style={{fontSize:22,fontWeight:700}}>{totalQuintalesCarrito} qq</div>
            </div>
          </div>
          {carrito.map(it=>(
            <div className="ped-item" key={it.id}>
              <div className="ped-emoji">{it.prod?(EMOJI_LINEA[it.prod.linea]||"📦"):"📦"}</div>
              <div className="ped-info">
                <div className="ped-nom">{it.prod?it.prod.marca:it.prodNombre}</div>
                <div className="ped-det">{it.unidad} · {it.cant} × {money(it.precio)}
                  {" · "}<span className="tag">{it.tipo}</span></div>
                <div className="ped-com">{it.requiere?"comisión a confirmar":"comisión "+money(it.comisionTotal)}</div>
              </div>
              <button className="ped-del" onClick={()=>setCarrito(carrito.filter(x=>x.id!==it.id))}>Quitar</button>
            </div>
          ))}
          <div className="ped-tot">
            <span>Comisión total del pedido</span>
            <b className="num">{money(totalComisionCarrito)}</b>
          </div>
          <button className="cta" onClick={()=>{
            /* 4.4: ANTES de cualquier otra cosa, cada producto entra a la cola persistente con su op_id.
               Si el teléfono muere aquí mismo, el pedido ya está a salvo en el almacenamiento. */
            carrito.forEach(it=>colaAgregar({ op_id:opId(), tipo:"Pedido", ic:"📋",
              cli:(cli && cli.nombre) || cli || "—",
              detalle:`${it.cant || "—"} × ${it.prodNombre || it.prod || "producto"}`,
              cuando:"recién" }));
            toast(`Pedido guardado · ${carrito.length} producto(s) · protegido en la cola ✓`);
            cerrarPedido();if(irGuardado)irGuardado();else if(go)go("pedidos");}}>
            Guardar pedido · {carrito.length} producto{carrito.length>1?"s":""}</button>
          <button onClick={()=>setPaso(1)}
            style={{width:"100%",marginTop:10,padding:"15px",borderRadius:12,border:"2px dashed var(--field)",
              background:"#fff",color:"var(--field)",fontSize:15,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>
            ＋ Agregar otro producto</button>
        </>}
    </>}

    {/* Botón fijo abajo: mostrar pedido (visible en pasos 1 y 2 si hay productos) */}
    {carrito.length>0 && paso!==3 && (
      <button className="mostrar-pedido" onClick={()=>setPaso(3)}>
        🛒 Mostrar pedido · {carrito.length} producto{carrito.length>1?"s":""} · {money(totalComisionCarrito)}
      </button>
    )}
  </>);
}

// ---------- COBROS ----------
const MODALIDADES=["Efectivo","Depósito","Transferencia","Cheque"];

function Cobros({toast}){
  const [paso,setPaso]=useState(1);
  const [cli,setCli]=useState(null);
  const [prov,setProv]=useState(null);
  const [aplic,setAplic]=useState({});
  const [lineas,setLineas]=useState([]);
  const [modal,setModal]=useState(null);
  const [enviado,setEnviado]=useState(null);  // datos del recibo enviado

  const reset=()=>{setPaso(1);setCli(null);setProv(null);setAplic({});setLineas([]);};
  const provsDelCliente = cli
    ? PROVEEDORES.filter(pv => COBROS_INI.some(c=>c.cli===cli && c.provId===pv.id)) : [];
  const facturas = (cli && prov)
    ? COBROS_INI.filter(c=>c.cli===cli && c.provId===prov.id) : [];

  const setAplicado=(id,v)=>setAplic({...aplic,[id]:v});
  const factSel = facturas.filter(f=>aplic[f.id]!==undefined && aplic[f.id]!=="");
  const sobregiro = facturas.some(f=>(parseFloat(aplic[f.id])||0) > f.valor);
  // el total del cobro nace de lo aplicado a las facturas
  const monto = Math.round(factSel.reduce((s,f)=>s+(parseFloat(aplic[f.id])||0),0)*100)/100;
  const totalLineas = lineas.reduce((s,l)=>s+(parseFloat(l.monto)||0),0);
  const restanteLineas = Math.round((monto-totalLineas)*100)/100;

  const PASOS=["Datos del cobro","Facturas y montos","Formas de pago"];
  const paso1Ok = cli && prov;
  const paso2Ok = factSel.length>0 && !sobregiro && monto>0;
  const paso3Ok = restanteLineas===0 && lineas.length>0;
  const puedeAvanzar = paso===1?paso1Ok : paso===2?paso2Ok : paso3Ok;

  // Pantalla de recibo enviado por WhatsApp
  if(enviado){
    return (<>
      <div className="recibo">
        <div className="rh">
          <div className="chk-big">✓</div>
          <div className="rt">Cobro reportado</div>
          <div className="rmonto num">{money(enviado.monto)}</div>
          <div className="meta" style={{marginTop:4}}>{enviado.cli} · {enviado.prov}</div>
        </div>
        <div className="rsec">Facturas aplicadas</div>
        {enviado.facturas.map((f,i)=>(
          <div className="rrow" key={i}>
            <span className="rk">Factura {f.factura} {f.estado==="cancelada"?"· Cancelada":"· Abono"}</span>
            <span className="num" style={{fontWeight:600}}>{money(f.aplicado)}</span>
          </div>
        ))}
        <div className="rsec">Formas de pago</div>
        {enviado.lineas.map((l,i)=>(
          <div className="rrow" key={i}>
            <span className="rk">{l.modalidad}{l.numero?` · ${l.numero}`:""}{l.banco?` · ${l.banco}`:""}</span>
            <span className="num" style={{fontWeight:600}}>{money(parseFloat(l.monto)||0)}</span>
          </div>
        ))}
      </div>

      <div className="rsec" style={{marginLeft:4}}>Recibo enviado por WhatsApp</div>
      <div className="enviados">
        {enviado.destinatarios.map((d,i)=>(
          <div className="enviado" key={i}>
            <span className="wa">✓</span>
            <div><div className="who-r">{d.rol}</div><div className="num-r">{d.nombre}</div></div>
            <span className="est-r">Enviado</span>
          </div>
        ))}
      </div>
      <div className="lock"><span>ℹ️</span>
        <span>El recibo se envió como comprobante del cobro reportado. El proveedor lo conciliará desde su portal.</span></div>

      <button className="cta" onClick={()=>{setEnviado(null);reset();}} style={{marginTop:6}}>Reportar otro cobro</button>
    </>);
  }

  return (<>
    <div className="h1">Reportar cobro</div>
    <div className="sub">Paso {paso} de 3 · {PASOS[paso-1]}</div>

    <div className="wz-prog">
      {PASOS.map((s,i)=>(
        <div className={"stp "+(i+1<paso?"done":i+1===paso?"cur":"")} key={i}>
          <div className="bar"></div><span className="lbl-s">{s}</span>
        </div>
      ))}
    </div>

    {/* PASO 1 — cliente y proveedor */}
    {paso===1 && (<>
      <SearchSelect label="Cliente" items={[...new Set(COBROS_INI.map(c=>c.cli))]} value={cli} multiPalabra
        onPick={c=>{setCli(c);setProv(null);setAplic({});setLineas([]);}} onClear={()=>{setCli(null);setProv(null);setAplic({});setLineas([]);}}
        render={{
          text:c=>c,
          option:c=>(<div className="o1">{c}</div>),
          picked:c=>(<><div className="p1">{c}</div><div className="p2">Cliente con cobros pendientes</div></>)
        }}/>
      {cli && (
        <SearchSelect label="Proveedor" items={provsDelCliente} value={prov}
          onPick={p=>{setProv(p);setAplic({});setLineas([]);}} onClear={()=>{setProv(null);setAplic({});setLineas([]);}}
          hint={`${provsDelCliente.length} ${provsDelCliente.length===1?"proveedor con facturas":"proveedores con facturas"} de ${cli}`}
          render={{
            text:p=>p.nombre,
            option:p=>(<><div className="o1">{p.nombre}</div>
              <div className="o2">{COBROS_INI.filter(c=>c.cli===cli&&c.provId===p.id).length} factura(s) pendiente(s)</div></>),
            picked:p=>(<><div className="p1">{p.nombre}</div><div className="p2">Facturas de este proveedor</div></>)
          }}/>
      )}
    </>)}

    {/* PASO 2 — elegir facturas y escribir el monto de cada una */}
    {paso===2 && (<>
      <div className="sub" style={{marginTop:-6}}>Marca las facturas a cobrar y escribe cuánto cobras de cada una.</div>
      {facturas.map(f=>{
        const aplicado=aplic[f.id];
        const activo=aplicado!==undefined && aplicado!=="";
        const valAp=parseFloat(aplicado)||0;
        const exceso=valAp>f.valor;
        const estado = activo ? (valAp>=f.valor?"cancelada":"abono") : null;
        return (
          <div className={"fsel"+(activo?" on":"")} key={f.id}>
            <div className="top" onClick={()=>{
              if(activo){const n={...aplic};delete n[f.id];setAplic(n);}
              else setAplicado(f.id, String(f.valor)); // por defecto, su saldo completo (cancela)
            }} style={{cursor:"pointer"}}>
              <span className="chk">{activo?"✓":""}</span>
              <div style={{flex:1}}>
                <div className="fi-nom">Factura {f.factura}</div>
                <div className="fi-sal">Saldo {money(f.valor)} · {f.vence}</div>
              </div>
              {estado && <span className={"estado-f "+(estado==="cancelada"?"ef-canc":"ef-abon")}>
                {estado==="cancelada"?"Cancela":"Abono"}</span>}
            </div>
            {activo && (
              <div className="aplica">
                <label>Cobro</label>

                  value={aplicado} onChange={e=>setAplicado(f.id,e.target.value)}/>

            )}
            {exceso && <div className="hint err" style={{marginTop:8}}>No puedes cobrar más que el saldo ({money(f.valor)}).</div>}

      {factSel.length>0 && (

          <div className="tv num">{money(monto)}</div>
        </div>
      )}
    </>)}

    {/* PASO 3 — formas de pago */}
    {paso===3 && (<>
      <div className="montobox" style={{marginBottom:14}}>
        <label>Total a cubrir con formas de pago</label>
        <div className="num" style={{fontSize:26,fontWeight:700,textAlign:"center"}}>{money(monto)}</div>
      </div>
      {lineas.length===0 && <div className="ph">Agrega las formas de pago hasta sumar {money(monto)}. Puedes combinar cheques, depósitos y transferencias.</div>}

        <div className="pline" key={i}>

            <span className="mod"><span className="tag">{l.modalidad}</span>

          <div className="det">
            {l.modalidad==="Cheque"
              ? `Cheque ${l.numero||"—"} · ${l.banco||"—"} · posfechado ${l.fecha||"—"}`
              : `Op. ${l.numero||"—"} · ${l.banco||"—"} · ${l.fecha||"—"}`}
            {" · "}<span className="ok-foto">✓ foto</span>
          </div>
        </div>
      ))}
      <div className="addbar">
        {MODALIDADES.map(m=> <button key={m} onClick={()=>setModal(m)}>+ {m}</button>)}
      </div>
      <div className={"restante "+(restanteLineas===0?"ok":restanteLineas<0?"over":"pend")}>
        {restanteLineas>0 ? `Falta cubrir ${money(restanteLineas)} en formas de pago`
          : restanteLineas<0 ? `Las formas de pago superan en ${money(-restanteLineas)}`
          : `✓ Las formas de pago suman ${money(monto)}`}
      </div>
      <div className="lock" style={{marginTop:14}}><span>ℹ️</span>
        <span>Solo el dinero recibido cuenta; las retenciones no. Cada factura libera su comisión cuando llega al 100% y el proveedor valida.</span></div>
    </>)}

    {/* navegación */}
    <div className="wz-nav">
      {paso>1 && <button className="back" onClick={()=>setPaso(paso-1)}>‹ Atrás</button>}
      {paso<3
        ? <button className="cta next" disabled={!puedeAvanzar} onClick={()=>setPaso(paso+1)}>Siguiente</button>
        : <button className="cta next" disabled={!paso3Ok}
            onClick={()=>{
              const facturasRecibo = factSel.map(f=>({
                factura:f.factura, aplicado:parseFloat(aplic[f.id])||0,
                estado:(parseFloat(aplic[f.id])||0)>=f.valor?"cancelada":"abono"
              }));
              setEnviado({
                cli, prov:prov.nombre, monto,
                facturas:facturasRecibo, lineas,
                destinatarios:[
                  {rol:"Cliente", nombre:cli},
                  {rol:"Proveedor", nombre:prov.nombre},
                  {rol:"Freelance", nombre:"Administrador"}
                ]
              });
            }}>
            Reportar y enviar recibo</button>}
    </div>

    {modal && <LineaPago modalidad={modal}
      onCancel={()=>setModal(null)}
      onSave={l=>{setLineas([...lineas,l]);setModal(null);}}/>}
  </>);
}

// Modal para capturar una línea de pago según su modalidad
function LineaPago({modalidad, onSave, onCancel}){
  const esCheque = modalidad==="Cheque";
  const esEfectivo = modalidad==="Efectivo";
  const [monto,setMonto]=useState("");
  const [numero,setNumero]=useState("");
  const [banco,setBanco]=useState("");
  const [fecha,setFecha]=useState("");
  const [foto,setFoto]=useState(false);
  const valido = esEfectivo
    ? (parseFloat(monto)||0)>0
    : (parseFloat(monto)||0)>0 && numero && banco && fecha && foto;
  return (
    <div className="ov" onClick={onCancel}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <h3>{modalidad}</h3>
        <div className="sh-sub">{esEfectivo?"Dinero recibido en mano":esCheque?"Datos del cheque recibido":"Datos del comprobante"}</div>

        <div className="field"><label>Monto</label>
          <input className="num" type="number" inputMode="decimal" placeholder="0.00"
            value={monto} onChange={e=>setMonto(e.target.value)}/></div>

        {esEfectivo && <div className="hint" style={{background:"#FBF0D8",border:"1px solid #EAD9A8",borderRadius:10,padding:"10px 12px",margin:"0 0 12px",color:"#7A5B00",fontWeight:600}}>
          ⏱ Regla del canal: el efectivo cobrado se deposita en máximo 24 horas.</div>}
        {esCheque && <div className="hint" style={{background:"#EAF0F6",border:"1px solid #C9D8E6",borderRadius:10,padding:"10px 12px",margin:"0 0 12px",color:"#3A6EA5",fontWeight:600}}>
          🔒 El cheque entra a custodia de documentos; su depósito requiere autorización.</div>}

        {!esEfectivo && (<>
        <div className="field"><label>{esCheque?"Número de cheque":"Número de operación"}</label>
          <input type="text" value={numero} onChange={e=>setNumero(e.target.value)}/></div>

        <SearchSelect label="Banco" items={BANCOS} value={banco}
          sortBy={(a,b)=>(USO_BANCOS[b]||0)-(USO_BANCOS[a]||0)}
          onPick={b=>{setBanco(b);USO_BANCOS[b]=(USO_BANCOS[b]||0)+1;}} onClear={()=>setBanco("")}
          render={{
            text:b=>b,
            option:b=>(<div className="o1">{b}{USO_BANCOS[b]?<span style={{color:"var(--muted)",fontWeight:500,fontSize:12}}>  · usado {USO_BANCOS[b]}×</span>:null}</div>),
            picked:b=>(<><div className="p1">{b}</div></>)
          }}/>

        <div className="field"><label>{esCheque?"Fecha posfechada (cuándo se puede depositar)":"Fecha"}</label>
          <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/></div>

        <div className="field"><label>Foto del comprobante</label>
          {foto ? (
            <label className="photo has">
              <input type="file" accept="image/*" style={{display:"none"}} onChange={()=>setFoto(true)}/>
              ✓ Comprobante cargado · toca para reemplazar
            </label>
          ) : (
            <div className="fotopick">
              <label>
                <input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={()=>setFoto(true)}/>
                <span className="fi">📷</span>Tomar foto
              </label>
              <label>
                <input type="file" accept="image/*" style={{display:"none"}} onChange={()=>setFoto(true)}/>
                <span className="fi">🖼️</span>Adjuntar archivo
              </label>
            </div>
          )}
        </div>
        </>)}

        <button className="cta" disabled={!valido}
          onClick={()=>onSave({modalidad,monto,numero,banco,fecha,foto:!esEfectivo})}>
          Agregar {modalidad.toLowerCase()}</button>
        <button className="ghost" onClick={onCancel}>Cancelar</button>
      </div>
    </div>
  );
}

// ---------- MIS PEDIDOS ----------
function Pedidos({irInicio}){
  const [sel,setSel]=useState(null);
  const [q,setQ]=useState("");
  const [estado,setEstado]=useState("Todos");
  const [desde,setDesde]=useState("");
  const [hasta,setHasta]=useState("");
  const [verFiltros,setVerFiltros]=useState(false);
  const [orden,setOrden]=useState("recientes"); // recientes | antiguos | comision
  // estados temporales dentro de la ventana (se aplican al confirmar)
  const [tEstado,setTEstado]=useState("Todos");
  const [tDesde,setTDesde]=useState("");
  const [tHasta,setTHasta]=useState("");
  const [tOrden,setTOrden]=useState("recientes");
  if(sel){
    const p=PEDIDOS_INI.find(x=>x.id===sel);
    return <DetallePedido p={p} volver={()=>setSel(null)}/>;
  }
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const ESTADOS=["Todos","Esperando aprobación","Enviado al proveedor","Facturado","Despachado","Entregado","Cobrado"];
  const lista=PEDIDOS_INI.filter(p=>{
    const t=norm(q);
    const txtOk = t==="" || t.split(/\s+/).filter(Boolean).every(w=>norm(p.cli).includes(w)) || norm(p.prov).includes(t);
    const estOk = estado==="Todos" || p.estado===estado;
    const fechaOk = (!desde || p.fecha>=desde) && (!hasta || p.fecha<=hasta);
    return txtOk && estOk && fechaOk;
  });
  const ordenada=[...lista].sort((a,b)=>{
    if(orden==="comision") return b.comision-a.comision;
    if(orden==="antiguos") return a.fecha<b.fecha?-1:a.fecha>b.fecha?1:0;
    return a.fecha<b.fecha?1:a.fecha>b.fecha?-1:0; // recientes (por defecto)
  });
  const ORDEN_LBL={recientes:"Más recientes",antiguos:"Más antiguos",comision:"Mayor comisión"};
  const nFiltros = (estado!=="Todos"?1:0) + (desde||hasta?1:0);
  const abrirFiltros=()=>{setTEstado(estado);setTDesde(desde);setTHasta(hasta);setTOrden(orden);setVerFiltros(true);};
  const aplicar=()=>{setEstado(tEstado);setDesde(tDesde);setHasta(tHasta);setOrden(tOrden);setVerFiltros(false);};
  const limpiarEnVentana=()=>{setTEstado("Todos");setTDesde("");setTHasta("");setTOrden("recientes");};

  return (<>
    <div className="h1">Mis pedidos</div>
    <div className="sub">Toca un pedido para ver su estado paso a paso.</div>

    <div className="row" style={{gap:10,marginBottom:14,alignItems:"stretch"}}>
      <div className="ss" style={{flex:"1 1 auto",minWidth:0,marginBottom:0}}>
        <div className="box"><span className="mag">⌕</span>
          <input value={q} placeholder="Cliente o proveedor…" onChange={e=>setQ(e.target.value)}/>
          {q && <button className="clr" onClick={()=>setQ("")}>×</button>}</div>
      </div>
      <button className="filtrar-btn" onClick={abrirFiltros}>
        ⚙ Filtrar{nFiltros>0?` · ${nFiltros}`:""}</button>
    </div>

    {(estado!=="Todos"||desde||hasta) && (
      <div className="row" style={{margin:"0 2px 14px",alignItems:"center",flexWrap:"wrap",gap:6}}>
        {estado!=="Todos" && <span className="fchip on" style={{fontSize:11.5}}>{estado}</span>}
        {(desde||hasta) && <span className="fchip on" style={{fontSize:11.5}}>{desde||"…"} → {hasta||"…"}</span>}
        <button className="mini-link" onClick={()=>{setEstado("Todos");setDesde("");setHasta("");}}>Quitar</button>
      </div>
    )}

    <div className="meta" style={{margin:"0 2px 10px"}}>{ordenada.length} pedido(s) · {ORDEN_LBL[orden]}</div>

    {ordenada.map(p=>(
      <div className="card" key={p.id} onClick={()=>setSel(p.id)} style={{cursor:"pointer"}}>
        <div className="row">
          <div><div className="cli">{p.cli}</div>
            <div className="meta">{p.cant} × {p.prod} · {p.prov} · {p.cond} · {money(p.precio)}</div></div>
          <div style={{textAlign:"right"}}><div className="amt num">{money(p.comision)}</div>
            <div className="meta">tu comisión</div></div>
        </div>
        <div className="row" style={{marginTop:10,alignItems:"center"}}>
          <span className={"chip "+(p.sync==="pend"?"c-sync":"c-ok")}>
            <span className="d"></span>{p.sync==="pend"?"Pendiente de enviar":"Sincronizado"}</span>
          <span className="meta" style={{fontWeight:600,color:"var(--field)"}}>{p.estado} ›</span>
        </div>
        <Pipe n={p.etapa}/>
      </div>
    ))}
    {ordenada.length===0 && <div className="ph">Sin pedidos que coincidan con los filtros.</div>}

    {/* ventana de filtros */}
    {verFiltros && (
      <div className="ov" onClick={()=>setVerFiltros(false)}>
        <div className="sheet" onClick={e=>e.stopPropagation()}>
          <h3>Filtrar pedidos</h3>

          <div className="ficha-sec" style={{marginTop:6}}>Estado</div>
          <div className="chip-row" style={{flexWrap:"wrap",overflow:"visible"}}>
            {ESTADOS.map(e=>(
              <button key={e} className={"fchip"+(tEstado===e?" on":"")} onClick={()=>setTEstado(e)}>{e}</button>
            ))}
          </div>

          <div className="ficha-sec">Rango de fechas (toma del pedido)</div>
          <div className="fecha-row">
            <div className="fcol"><label>Desde</label>
              <input type="date" value={tDesde} onChange={e=>setTDesde(e.target.value)}/></div>
            <div className="fcol"><label>Hasta</label>
              <input type="date" value={tHasta} onChange={e=>setTHasta(e.target.value)}/></div>
          </div>

          <div className="ficha-sec">Ordenar por</div>
          <div className="chip-row" style={{flexWrap:"wrap",overflow:"visible"}}>
            {[["recientes","Más recientes"],["antiguos","Más antiguos"],["comision","Mayor comisión"]].map(([k,l])=>(
              <button key={k} className={"fchip"+(tOrden===k?" on":"")} onClick={()=>setTOrden(k)}>{l}</button>
            ))}
          </div>

          <button className="cta" onClick={aplicar} style={{marginTop:18}}>Aplicar filtros</button>
          <button className="back" style={{width:"100%",marginTop:10}} onClick={limpiarEnVentana}>Limpiar</button>
        </div>
      </div>
    )}
  </>);
}

  return (<>
    <button className="ghost" onClick={volver} style={{marginTop:0,marginBottom:16,textAlign:"left"}}>‹ Volver a mis pedidos</button>
    <div className="det-head">
      <div className="row">
        <div><div className="cli" style={{fontSize:17}}>{p.cli}</div>
          <div className="meta">{p.cant} × {p.prod} · {p.prov} · {p.cond} · {money(p.precio)}</div></div>
        <div style={{textAlign:"right"}}><div className="amt num">{money(p.comision)}</div>
          <div className="meta">tu comisión</div></div>
      </div>
      <div className="row" style={{marginTop:12,alignItems:"center"}}>
        <span className={"chip "+(p.sync==="pend"?"c-sync":"c-ok")}>
          <span className="d"></span>{p.sync==="pend"?"Pendiente de enviar":"Sincronizado"}</span>
        <span className="meta" style={{fontWeight:600}}>{cumplidos} de {p.linea.length} pasos</span>
      </div>
    </div>

    <div className="sec-h"><h2>Seguimiento del pedido</h2><div className="grain"></div></div>
    <div className="tl">
      {p.linea.map((x,i)=>(
        <div className={"item "+x.st} key={i}>
          <div className="node">{x.st==="ok"?"✓":x.st==="now"?"●":i+1}</div>
          <div className="c">
            <div className="tt">{x.t}</div>
            {x.d && <div className="dd">{x.d}</div>}
            <div className="ff">{x.f}</div>
          </div>
        </div>
      ))}
    </div>
    <div className="lock"><span>ℹ️</span>
      <span>El estado avanza solo cuando se cumple cada paso: el acuerdo aprobado libera el envío, y la comisión se libera cuando el cobro es validado por el proveedor.</span></div>
  </>);
}

// ---------- REGISTRAR STOCK (bodega del cliente) ----------
function Stock({toast}){
  const [cli,setCli]=useState(null);
  const [prov,setProv]=useState(null);
  const [cant,setCant]=useState({}); // productoId -> unidades en bodega del cliente
  const set=(id,v)=>setCant({...cant,[id]:v});
  const conDato = Object.values(cant).filter(v=>v!=="" && v!==undefined).length;

  // registro de compra del cliente: productos que ya ha comprado (del HISTORIAL)
  const compradosIds = cli ? PRESENTACIONES.filter(p=>HISTORIAL[cli+"|"+p.id]).map(p=>p.id) : [];
  // proveedores que el cliente suele tener: los que surten algún producto que ya compró
  const provsDelCliente = cli ? PROVEEDORES.filter(pv =>
    PRESENTACIONES.some(p => p.provId===pv.id && compradosIds.includes(p.id))
  ) : [];
  // dentro del proveedor, solo los productos que el cliente ya compró
  const productosProv = (cli && prov)
    ? PRESENTACIONES.filter(p=>p.provId===prov.id && compradosIds.includes(p.id)) : [];

  return (<>
    <div className="h1">Registrar stock</div>
    <div className="sub">Anota lo que le queda al cliente en bodega. Sube para que el proveedor sepa cuándo reabastecer.</div>

    <SearchSelect label="Cliente visitado" items={CLIENTES} value={cli} multiPalabra
      onPick={c=>{setCli(c);setProv(null);setCant({});}} onClear={()=>{setCli(null);setProv(null);setCant({});}}
      render={{
        text:c=>c,
        option:c=>(<div className="o1">{c}</div>),
        picked:c=>(<><div className="p1">{c}</div><div className="p2">Bodega del cliente</div></>)
      }}/>

    {cli && (
      provsDelCliente.length>0 ? (
        <SearchSelect label="Proveedor" items={provsDelCliente} value={prov}
          onPick={p=>{setProv(p);setCant({});}} onClear={()=>{setProv(null);setCant({});}}
          hint={`${provsDelCliente.length} proveedor(es) con productos que ${cli} ya ha comprado`}
          render={{
            text:p=>p.nombre,
            option:p=>(<div className="o1">{p.nombre}</div>),
            picked:p=>(<><div className="p1">{p.nombre}</div><div className="p2">Productos que el cliente ya compra</div></>)
          }}/>
      ) : (
        <div className="ph">{cli} no tiene compras registradas todavía. El stock se registra sobre productos que el cliente ya ha comprado.</div>
      )
    )}

    {cli && prov && (<>
      <div className="sec-h"><h2>Unidades en bodega</h2><div className="grain"></div></div>
      {productosProv.length===0 && <div className="ph">{cli} no ha comprado productos de {prov.nombre}.</div>}
      {productosProv.map(p=>{
        const ant = STOCK_ANTERIOR[cli+"|"+p.id];
        const actual = cant[p.id]!==""&&cant[p.id]!==undefined ? parseInt(cant[p.id])||0 : null;
        const dif = (ant && actual!==null) ? actual-ant.cant : null;
        return (
          <div className="card" key={p.id} style={{padding:"12px 14px"}}>
            <div className="row" style={{alignItems:"center"}}>
              <div style={{flex:1}}>
                <div className="cli" style={{fontSize:14}}>{p.nombre}</div>
                <div className="meta">
                  {ant ? `Última vez: ${ant.cant} ${p.unidad} · ${ant.fecha}` : `Sin registro anterior · por ${p.unidad}`}
                </div>
              </div>
              <div className="stepper" style={{width:150}}>
                <button onClick={()=>set(p.id,Math.max(0,(parseInt(cant[p.id])||0)-1))}>−</button>
                <input className="num" type="number" placeholder="0" value={cant[p.id]??""}
                  onChange={e=>set(p.id,e.target.value)}/>
                <button onClick={()=>set(p.id,(parseInt(cant[p.id])||0)+1)}>+</button>
              </div>
            </div>
            {dif!==null && (
              <div className="meta" style={{marginTop:8,fontWeight:600,
                color: dif<0?"var(--field)":dif>0?"var(--maize-deep)":"var(--muted)"}}>
                {dif<0 ? `▼ Bajó ${Math.abs(dif)} desde la última visita (rota bien)`
                  : dif>0 ? `▲ Subió ${dif} (acumuló stock)`
                  : "= Igual que la última visita"}
              </div>
            )}
          </div>
        );
      })}
      <button className="cta" disabled={conDato===0}
        onClick={()=>{toast("Stock registrado. Se enviará al proveedor al recuperar señal.");setCli(null);setProv(null);setCant({});}}>
        Guardar stock del cliente</button>
      <div className="lock"><span>📡</span>
        <span>{prov.nombre} verá el stock de sus productos en la bodega de {cli} para planificar despachos y promociones.</span></div>
    </>)}
  </>);
}

    const ubic = norm(`${it.prov} ${it.ciudad} ${it.zona} ${it.barrio}`);
    return clienteOk || ubic.includes(t);
  });
  // orden por prioridad de cobro: vencida (bad) → vence hoy (warn) → por cobrar (ok)
  const prio={bad:0,warn:1,ok:2};
  const listaOrd=[...lista].sort((a,b)=> prio[a.v]-prio[b.v] || b.saldo-a.saldo);
  const total=lista.reduce((s,i)=>s+i.saldo,0);
  const nVenc=lista.filter(i=>i.v==="bad").length;
  const montoVenc=lista.filter(i=>i.v==="bad").reduce((s,i)=>s+i.saldo,0);
  return (<>
    <div className="h1">Cartera</div>
    <div className="sub">Lo que tus clientes deben en las ventas que registraste.</div>
    <div className="hero">
      <div className="lbl">{q?`Por cobrar · ${q}`:"Total por cobrar"}</div>
      <div className="big num">{money(total)}</div>
      <div className="split">
        <div>
          <div className="k">Pendientes · {lista.length}</div>
          <div className="v num">{money(total)}</div>
        </div>
        <div>
          <div className="k" style={{color:nVenc>0?"#F2C9B8":undefined}}>Vencidas · {nVenc}</div>
          <div className="v num" style={{color:nVenc>0?"#F2C9B8":undefined}}>{money(montoVenc)}</div>
        </div>
      </div>
    </div>

    <div className="ss" style={{marginBottom:16}}>
      <div className="box"><span className="mag">⌕</span>
        <input value={q} placeholder="Buscar por provincia, ciudad, zona, barrio o cliente…" onChange={e=>setQ(e.target.value)}/>
        {q && <button className="clr" onClick={()=>setQ("")}>×</button>}</div>
    </div>

    <div className="sec-h"><h2>Facturas · más urgentes primero</h2><div className="grain"></div></div>
    {listaOrd.map((it,i)=>(
      <div className="card" key={i}>
        <div className="row">
          <div><div className="cli">{it.cli}</div>
            <div className="meta">📍 {it.barrio}, {it.zona} · {it.ciudad}, {it.prov} · Fact. {it.fac}</div></div>
          <div style={{textAlign:"right"}}><div className="amt num">{money(it.saldo)}</div>
            <div className="meta">{it.venc}</div></div>
        </div>
        <div className="row" style={{marginTop:10,alignItems:"center"}}>
          <span className={"chip "+(it.v==="bad"?"c-bad":it.v==="warn"?"c-sync":"c-wait")}>
            <span className="d"></span>{it.estado}</span>
          <button className="mini-cta" onClick={()=>toast(`Cobrar ${it.cli} · ${money(it.saldo)}. Te lleva a reportar el cobro.`)}>
            Cobrar →</button>
        </div>
      </div>
    ))}
    {listaOrd.length===0 && <div className="ph">Sin facturas que coincidan con “{q}”.</div>}
  </>);
}

// ---------- CLIENTES ----------
function Clientes({toast}){
  const [q,setQ]=useState("");
  const [sel,setSel]=useState(null);
  const [nuevo,setNuevo]=useState(false);
  const [verSolic,setVerSolic]=useState(false);
  const [verBloq,setVerBloq]=useState(false);
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const palabras=norm(q).split(/\s+/).filter(Boolean);
  const texto=c=>norm(c+" "+((REFERENCIALES[c]||[]).join(" ")));
  const lista=CLIENTES.filter(c=>palabras.every(w=>texto(c).includes(w)));

  if(nuevo) return <ClienteNuevo volver={()=>setNuevo(false)} toast={toast}/>;
  if(verSolic) return <SolicitudesCredito volver={()=>setVerSolic(false)}/>;
  if(verBloq) return <ClientesBloqueados volver={()=>setVerBloq(false)} ver={c=>{setVerBloq(false);setSel(c);}}/>;
  if(sel) return <FichaCliente nombre={sel} volver={()=>setSel(null)} toast={toast}/>;

  const enTramite=SOLICITUDES_CREDITO.filter(s=>s.etapa<3||s.devuelta).length;
  const nBloq=CLIENTES.filter(c=>motivosBloqueo(c).length>0).length;

  return (<>
    <div className="h1">Clientes</div>
    <div className="sub">Tus clientes asignados. Toca uno para ver su ficha.</div>
    <button className="ghost" style={{width:"100%",margin:"0 0 10px"}} onClick={()=>setVerSolic(true)}>
      Solicitudes de crédito{enTramite>0?` · ${enTramite} en trámite`:""}</button>
    <button className="ghost" style={{width:"100%",margin:"0 0 14px"}} onClick={()=>setVerBloq(true)}>
      Clientes bloqueados{nBloq>0?` · ${nBloq}`:""}</button>
    <div className="ss" style={{marginBottom:16}}>
      <div className="box"><span className="mag">⌕</span>
        <input value={q} placeholder="Buscar cliente…" onChange={e=>setQ(e.target.value)}/>
        {q && <button className="clr" onClick={()=>setQ("")}>×</button>}</div>
    </div>
    {lista.map((c,i)=>{
      const f=FICHA_CLIENTE[c];
      const refs=REFERENCIALES[c]||[];

        <div className="card" key={i} style={{padding:"13px 15px",cursor:"pointer"}} onClick={()=>setSel(c)}>

}

function SolicitudesCredito({volver}){

    <div className="h1">Solicitudes de crédito</div>

    {SOLICITUDES_CREDITO.map((s,i)=>{
      const estadoTxt = s.devuelta ? "Devuelta" : ETAPAS_CREDITO[s.etapa];
      const cls = s.devuelta ? "c-bad" : s.etapa>=3 ? "c-ok" : "c-sync";
      return (
        <div className="card" key={i} style={{marginBottom:12}}>
          <div className="row">
            <div><div className="cli">{s.cli}</div>
              <div className="meta">Solicitó {money(s.cupoPedido)} de cupo · {s.fecha}</div></div>
            <span className={"chip "+cls}><span className="d"></span>{estadoTxt}</span>
          </div>

          {/* línea de tiempo de etapas */}
          <div className="cred-steps">
            {ETAPAS_CREDITO.map((et,j)=>{
              const done = !s.devuelta && j<s.etapa;
              const now = !s.devuelta && j===s.etapa;
              return (
                <div className="cred-step" key={j}>
                  <div className={"cs-dot"+(done?" done":now?" now":"")}>{done?"✓":j+1}</div>
                  <div className={"cs-lbl"+(now?" now":"")}>{et}</div>
                </div>
              );
            })}
          </div>

          <div className={"cred-nota"+(s.devuelta?" dev":"")}>{s.nota}</div>
        </div>
      );
    })}

    <div className="lock"><span>🔒</span>
      <span>El crédito se activa solo cuando el proveedor lo aprueba. Mientras tanto, el cliente compra de contado.</span></div>
  </>);
}

// Productos que el cliente compra y no compra, agrupados por línea (grano)
// Acordeón de dos niveles: sección → líneas → productos
function HistorialLineas({nombre, toast}){
  const [abreCompra,setAbreCompra]=useState(false);
  const [abreNo,setAbreNo]=useState(false);
  const [lineaAbierta,setLineaAbierta]=useState({}); // clave "compra|Arroz" -> bool
  const toggleLinea=(k)=>setLineaAbierta(s=>({...s,[k]:!s[k]}));

  const compraId = new Set(PRESENTACIONES.filter(p=>HISTORIAL[nombre+"|"+p.id]).map(p=>p.id));
  const lineas={};
  PRESENTACIONES.forEach(p=>{ (lineas[p.linea]=lineas[p.linea]||[]).push(p); });
  const ordenLineas=Object.keys(lineas).sort();

  const compra=[], noCompra=[];
  ordenLineas.forEach(ln=>{
    const dentro=lineas[ln];
    const c=dentro.filter(p=>compraId.has(p.id));
    const n=dentro.filter(p=>!compraId.has(p.id));
    if(c.length) compra.push([ln,c]);
    if(n.length) noCompra.push([ln,n]);
  });
  const totalCompra=compra.reduce((s,[,ps])=>s+ps.length,0);
  const totalNo=noCompra.reduce((s,[,ps])=>s+ps.length,0);

  // fila de línea plegable; modo "si" (compra) o "no" (oportunidad)
  const LineaFila=(grupo,modo)=>grupo.map(([ln,ps])=>{
    const k=modo+"|"+ln;
    const abierta=!!lineaAbierta[k];
    return (
      <div className="linea-blk" key={k}>
        <button className="linea-h2" onClick={()=>toggleLinea(k)}>
          <span className="linea-nom">{ln}</span>
          <span className={"linea-n"+(modo==="no"?" op":"")}>{ps.length}</span>
          <span className="acc-fl" style={{marginLeft:"auto"}}>{abierta?"▲":"▼"}</span>
        </button>
        {abierta && ps.map(p=>{
          if(modo==="si"){
            const h=HISTORIAL[nombre+"|"+p.id];
            return (
              <div className="linea-prod si" key={p.id}>
                <span className="lp-ic">✓</span>
                <div style={{flex:1}}><div className="lp-nom">{p.nombre}</div>
                  <div className="meta">Última: {h.cant} {p.unidad} · {h.fecha}</div></div>
              </div>
            );
          }
          return (
            <div className="linea-prod no" key={p.id} onClick={()=>toast(`Ofrécele ${p.nombre} a ${nombre}`)} style={{cursor:"pointer"}}>
              <span className="lp-ic op">+</span>
              <div style={{flex:1}}><div className="lp-nom">{p.nombre}</div>
                <div className="meta">Nunca lo ha comprado · oportunidad de venta</div></div>
              <span className="meta" style={{fontSize:18,color:"var(--maize-deep)"}}>›</span>
            </div>
          );
        })}
      </div>
    );
  });

  return (<>
    <button className="acc-h" onClick={()=>setAbreCompra(!abreCompra)}>
      <span className="acc-ic ok">✓</span>
      <div style={{flex:1,textAlign:"left"}}>
        <div className="acc-t">Productos que compra</div>
        <div className="acc-s">{totalCompra} producto(s) en {compra.length} línea(s)</div>
      </div>
      <span className="acc-fl">{abreCompra?"▲":"▼"}</span>
    </button>
    {abreCompra && (
      <div className="acc-body">
        {compra.length===0 ? <div className="ph">Aún no ha comprado productos.</div> : LineaFila(compra,"si")}
      </div>
    )}

    <button className="acc-h" onClick={()=>setAbreNo(!abreNo)} style={{marginTop:10}}>
      <span className="acc-ic op">+</span>
      <div style={{flex:1,textAlign:"left"}}>
        <div className="acc-t">No compra · oportunidades</div>
        <div className="acc-s">{totalNo} producto(s) en {noCompra.length} línea(s)</div>
      </div>
      <span className="acc-fl">{abreNo?"▲":"▼"}</span>
    </button>
    {abreNo && (
      <div className="acc-body">
        {noCompra.length===0 ? <div className="ph">Ya compra de todas las líneas. ¡Cliente completo!</div> : LineaFila(noCompra,"no")}
      </div>
    )}
  </>);
}

// ---------- LISTA DE PRECIOS (consulta rápida por línea/marca) ----------

  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const lineas=["Todas",...Array.from(new Set(PRESENTACIONES.map(p=>p.linea)))];

  const lista=PRESENTACIONES.filter(p=>{
    if(lineaSel!=="Todas" && p.linea!==lineaSel) return false;
    return norm(`${p.marca} ${p.linea} ${p.unidad}`).includes(norm(q));
  });
  const porLinea={};
  lista.forEach(p=>{ (porLinea[p.linea]=porLinea[p.linea]||[]).push(p); });
  const lineasOrd=Object.keys(porLinea).sort();

  return (<>

    {/* Filtro por línea (chips) */}

          flex:"0 0 auto",padding:"8px 14px",borderRadius:999,fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer",
          border:lineaSel===ln?"1px solid var(--field)":"1px solid var(--line)",
          background:lineaSel===ln?"var(--field)":"#fff",color:lineaSel===ln?"#fff":"var(--grisTexto,#555)"}}>
          {ln==="Todas"?ln:`${EMOJI_LINEA[ln]||""} ${ln}`}
        </button>
      ))}

    {lineasOrd.map(ln=>(

        {/* Cabecera de columnas */}
        <div style={{display:"grid",gridTemplateColumns:"1.7fr .8fr .8fr .7fr",gap:6,padding:"4px 12px",fontSize:10.5,fontWeight:700,color:"var(--muted,#999)",textTransform:"uppercase",letterSpacing:.3}}>
          <span>Producto</span><span style={{textAlign:"right"}}>Contado</span><span style={{textAlign:"right"}}>Crédito</span><span style={{textAlign:"right"}}>Stock</span>
        </div>

        {porLinea[ln].map((p,i)=>{

                </div>
                <div style={{textAlign:"right"}}>
                  <div className="amt num" style={{fontSize:15}}>{money(p.baseContado)}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div className="num" style={{fontSize:14,fontWeight:700,color:"var(--grisTexto,#555)"}}>{money(p.baseCredito)}</div>
                </div>

                  <div className="num" style={{fontSize:13,fontWeight:700,color:sinStock?"#c0392b":"#2E7D52"}}>{sinStock?"0":p.stock}</div>
                </div>
              </div>

// ---------- PRODUCTOS ----------
function Productos({vender}){
  const [q,setQ]=useState("");
  const [sel,setSel]=useState(null); // marca seleccionada
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const provName=id=>PROVEEDORES.find(x=>x.id===id)?.nombre||"";

  if(sel) return <FichaMarca marca={sel} volver={()=>setSel(null)} vender={vender}/>;

  const lista=PRODUCTOS.filter(m=>{
    if(m.inhabilitada) return false; // inhabilitada por proveedor/freelance
    if(m.presentaciones.every(p=>p.inhabilitada)) return false; // todas sus presentaciones inhabilitadas
    const campos=norm(`${m.marca} ${m.linea} ${provName(m.provId)}`);
    return campos.includes(norm(q));
  });
  // agrupar marcas por línea
  const porLinea={};
  lista.forEach(m=>{ (porLinea[m.linea]=porLinea[m.linea]||[]).push(m); });
  const lineasOrd=Object.keys(porLinea).sort();

  return (<>
    <div className="h1">Productos</div>
    <div className="sub">Marcas por línea de grano. Toca una marca para ver sus presentaciones.</div>
    <div className="ss" style={{marginBottom:16}}>
      <div className="box"><span className="mag">⌕</span>
        <input value={q} placeholder="Buscar por marca, línea o proveedor…" onChange={e=>setQ(e.target.value)}/>
        {q && <button className="clr" onClick={()=>setQ("")}>×</button>}</div>
    </div>

    {lineasOrd.map(ln=>(
      <div key={ln} style={{marginBottom:18}}>
        <div className="sec-h"><h2>{ln}</h2><div className="grain"></div></div>
        {porLinea[ln].map((m,i)=>{
          const activas=m.presentaciones.filter(p=>!p.inhabilitada);
          const nPres=activas.length;
          const nPromos=activas.reduce((s,p)=>s+p.promosFreelance.length,0);
          const desde=activas.length?Math.min(...activas.map(p=>p.baseContado)):0;
          return (
            <div className="card" key={i} style={{cursor:"pointer"}} onClick={()=>setSel(m)}>
              <div className="row" style={{alignItems:"center"}}>
                <div style={{flex:1}}>
                  <div className="cli">{m.marca}</div>
                  <div className="meta">{provName(m.provId)} · {nPres} presentación(es){nPromos>0?` · ${nPromos} promo(s)`:""}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div className="amt num">{money(desde)}</div>
                  <div className="meta">desde · contado</div>
                </div>
                <span className="meta" style={{fontSize:18,color:"var(--muted)",marginLeft:8}}>›</span>
              </div>
            </div>
          );
        })}
      </div>
    ))}
    {lista.length===0 && <div className="ph">Sin marcas que coincidan con “{q}”.</div>}
    <div className="lock"><span>🔒</span>
      <span>Solo ves tu base de venta. El costo del proveedor y el margen no son visibles para tu perfil.</span></div>
  </>);
}
