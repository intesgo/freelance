<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0E2A20" />
<title>FREELANCE · Proveedor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&family=Lora:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --tinta:#0E2A20;
  --tinta-2:#15392B;
  --maiz:#F2A900;
  --maiz-suave:#FBE9C0;
  --papel:#F6F4EF;
  --papel-2:#FFFFFF;
  --linea:#E6E1D6;
  --linea-2:#D6CFBE;
  --texto:#1C2620;
  --texto-2:#5C6660;
  --texto-3:#8C948D;
  --ok:#2E7D5B;
  --ok-suave:#DDF0E6;
  --espera:#C8841B;
  --espera-suave:#FBEFD4;
  --alerta:#B03A2E;
  --alerta-suave:#F6DEDA;
  --azul:#2C5B8A;
  --azul-suave:#DCE7F2;
  --sombra:0 1px 2px rgba(14,42,32,.06), 0 6px 18px rgba(14,42,32,.05);
  --sombra-alta:0 10px 40px rgba(14,42,32,.18);
  --r:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--papel);color:var(--texto);-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
.num{font-family:'Space Grotesk',monospace;font-feature-settings:"tnum" 1;letter-spacing:-.01em;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;font-size:16px;}
::-webkit-scrollbar{display:none;}

#root{min-height:100vh;}
.phone{max-width:430px;margin:0 auto;min-height:100vh;background:var(--papel);position:relative;display:flex;flex-direction:column;box-shadow:0 0 80px rgba(0,0,0,.12);}

.top{background:var(--tinta);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;}
.top .rol{font-size:11px;color:var(--maiz);font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.top .nombre{font-weight:600;font-size:15px;margin-top:1px;}
.top .avatar{margin-left:auto;width:40px;height:40px;border-radius:12px;background:var(--maiz);color:var(--tinta);display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:15px;}
.top .navbtn{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.1);color:#fff;display:grid;place-items:center;font-size:22px;line-height:1;flex-shrink:0;}
.top .navbtn:active{background:rgba(255,255,255,.2);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.scroll{flex:1;overflow-y:auto;padding:18px 16px 110px;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--texto-3);}
.h1{font-family:'Space Grotesk';font-weight:700;font-size:26px;letter-spacing:-.02em;margin:2px 0 0;}
.h2{font-family:'Space Grotesk';font-weight:600;font-size:18px;letter-spacing:-.01em;margin:0;}
.sub{color:var(--texto-2);font-size:13.5px;line-height:1.45;}

.card{background:var(--papel-2);border:1px solid var(--linea);border-radius:var(--r);box-shadow:var(--sombra);}
.card-pad{padding:16px;}
.row{display:flex;align-items:center;gap:12px;}
.between{justify-content:space-between;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.muted{color:var(--texto-2);}
.tiny{font-size:11.5px;}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:999px;border:1px solid var(--linea-2);color:var(--texto-2);}
.chip-ok{background:var(--ok-suave);color:#1E5B40;border-color:transparent;}
.chip-esp{background:var(--espera-suave);color:#8A5A12;border-color:transparent;}
.chip-al{background:var(--alerta-suave);color:#8A2A20;border-color:transparent;}
.chip-az{background:var(--azul-suave);color:#234A6E;border-color:transparent;}
.chip-maiz{background:var(--maiz-suave);color:#7A5400;border-color:transparent;}

.hero{background:linear-gradient(155deg,var(--tinta) 0%,var(--tinta-2) 100%);color:#fff;border-radius:22px;padding:20px;position:relative;overflow:hidden;box-shadow:var(--sombra-alta);}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(242,169,0,.28),transparent 70%);}
.hero .lbl{font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6);font-weight:600;}
.hero .big{font-family:'Space Grotesk';font-weight:700;font-size:38px;letter-spacing:-.02em;margin:4px 0 0;line-height:1;}
.hero .split{display:flex;gap:18px;margin-top:18px;}
.hero .split>div{flex:1;}
.hero .split .v{font-family:'Space Grotesk';font-weight:600;font-size:18px;margin-top:2px;}
.hero .split .k{font-size:11px;color:rgba(255,255,255,.6);}
.hr-line{height:1px;background:rgba(255,255,255,.14);margin:16px 0 0;}

.tile{background:var(--papel-2);border:1px solid var(--linea);border-radius:16px;padding:13px 14px;}
.tile .k{font-size:11.5px;color:var(--texto-2);font-weight:500;}
.tile .v{font-family:'Space Grotesk';font-weight:700;font-size:22px;margin-top:3px;letter-spacing:-.02em;}
.tile .d{font-size:11px;font-weight:600;margin-top:3px;}
.up{color:var(--ok);}.down{color:var(--alerta);}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:15px;padding:13px 16px;border-radius:14px;width:100%;transition:transform .06s ease;}
.btn:active{transform:scale(.985);}
.btn-maiz{background:var(--maiz);color:var(--tinta);}
.btn-tinta{background:var(--tinta);color:#fff;}
.btn-ghost{background:transparent;border:1.5px solid var(--linea-2);color:var(--texto);}
.btn-al{background:var(--alerta);color:#fff;}
.btn[disabled]{opacity:.45;}

.item{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid var(--linea);}
.item:last-child{border-bottom:none;}
.ava{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:15px;flex-shrink:0;}
.ava-m{background:var(--maiz-suave);color:#7A5400;}
.bar{height:7px;border-radius:99px;background:var(--linea);overflow:hidden;}
.bar>i{display:block;height:100%;border-radius:99px;}

.nav{position:fixed;left:0;right:0;bottom:0;max-width:430px;margin:0 auto;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-top:1px solid var(--linea);display:flex;z-index:40;padding:8px 6px calc(8px + env(safe-area-inset-bottom));}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:var(--texto-3);position:relative;}
.nav button.on{color:var(--tinta);}
.nav .ico{font-size:21px;line-height:1;}
.nav .lab{font-size:10.5px;font-weight:600;}
.nav .badge{position:absolute;top:0;right:50%;transform:translateX(16px);background:var(--maiz);color:var(--tinta);font-family:'Space Grotesk';font-weight:700;font-size:10px;min-width:17px;height:17px;border-radius:99px;display:grid;place-items:center;padding:0 4px;}

.scrim{position:fixed;inset:0;background:rgba(14,42,32,.5);z-index:50;display:flex;align-items:flex-end;max-width:430px;margin:0 auto;animation:fade .2s ease;}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheet{background:var(--papel);width:100%;border-radius:24px 24px 0 0;max-height:92vh;overflow-y:auto;animation:up .26s cubic-bezier(.2,.8,.2,1);padding:8px 16px calc(20px + env(safe-area-inset-bottom));}
.grip{width:38px;height:4px;border-radius:99px;background:var(--linea-2);margin:8px auto 14px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--texto-2);margin:14px 0 6px;}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;border:1.5px solid var(--linea-2);border-radius:13px;background:var(--papel-2);color:var(--texto);}
.field textarea{min-height:80px;resize:vertical;line-height:1.5;}
.seg{display:flex;gap:8px;flex-wrap:wrap;}
.seg button{padding:9px 13px;border-radius:11px;border:1.5px solid var(--linea-2);font-size:13px;font-weight:600;color:var(--texto-2);background:var(--papel-2);}
.seg button.on{background:var(--tinta);color:#fff;border-color:var(--tinta);}

.login{min-height:100vh;background:linear-gradient(160deg,var(--tinta) 0%,#08160F 100%);color:#fff;display:flex;flex-direction:column;justify-content:center;padding:32px 28px calc(32px + env(safe-area-inset-bottom));position:relative;overflow:hidden;}
.login::before{content:"";position:absolute;top:-80px;right:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(242,169,0,.22),transparent 70%);}
.login .brand{font-family:'Space Grotesk';font-weight:700;letter-spacing:.16em;font-size:14px;color:var(--maiz);}
.login h1{font-family:'Space Grotesk';font-weight:700;font-size:32px;line-height:1.1;margin:10px 0 6px;letter-spacing:-.02em;}
.login p{color:rgba(255,255,255,.62);font-size:14px;line-height:1.5;margin:0 0 28px;max-width:300px;}
.login .field label{color:rgba(255,255,255,.7);}
.login .field input{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.16);color:#fff;}
.login .field input::placeholder{color:rgba(255,255,255,.4);}
.huella{margin:22px auto 0;width:60px;height:60px;border-radius:18px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);display:grid;place-items:center;font-size:26px;}
.divider{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.4);font-size:12px;margin:24px 0 4px;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.16);}

.sec-gap{height:22px;}
.list-card{background:var(--papel-2);border:1px solid var(--linea);border-radius:var(--r);overflow:hidden;box-shadow:var(--sombra);}
.empty{text-align:center;padding:38px 20px;color:var(--texto-3);}
.empty .ico{font-size:34px;opacity:.5;}
/* Documentos de crédito */
.doc-thumb{width:44px;height:44px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;font-size:18px;overflow:hidden;position:relative;}
.doc-img{background:linear-gradient(135deg,#cfe3d6,#a9c9b6);color:#1E5B40;}
.doc-pdf{background:var(--alerta-suave);color:#8A2A20;font-weight:700;font-family:'Space Grotesk';font-size:11px;}
.doc-falta{background:var(--linea);color:var(--texto-3);}
.visor{position:fixed;inset:0;background:rgba(8,16,12,.94);z-index:60;display:flex;flex-direction:column;max-width:430px;margin:0 auto;animation:fade .2s ease;}
.visor-top{display:flex;align-items:center;gap:12px;padding:16px;color:#fff;}
.visor-top .x{margin-left:auto;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.12);display:grid;place-items:center;font-size:20px;color:#fff;}
.visor-body{flex:1;display:flex;align-items:center;justify-content:center;padding:0 20px 30px;}
.foto-mock{width:100%;max-width:340px;aspect-ratio:3/4;border-radius:16px;background:linear-gradient(135deg,#3a5547,#23362c);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:rgba(255,255,255,.7);box-shadow:var(--sombra-alta);}
.pdf-mock{width:100%;max-width:340px;aspect-ratio:3/4;border-radius:16px;background:#fff;display:flex;flex-direction:column;box-shadow:var(--sombra-alta);overflow:hidden;}
.pdf-mock .pg{flex:1;padding:24px;display:flex;flex-direction:column;gap:9px;}
.pdf-mock .ln{height:9px;border-radius:4px;background:#E6E1D6;}
.fab{position:fixed;right:calc(50% - 215px + 16px);bottom:calc(76px + env(safe-area-inset-bottom));z-index:35;background:var(--maiz);color:var(--tinta);font-weight:700;font-size:14px;padding:14px 18px;border-radius:16px;box-shadow:var(--sombra-alta);display:inline-flex;align-items:center;gap:8px;}
@media(max-width:430px){.fab{right:20px;}}
  @keyframes fxEntrar{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fx-entrar{animation:fxEntrar .5s cubic-bezier(.2,.8,.2,1) both}
  button:active:not([disabled]){transform:translateY(1px)}
  @media (prefers-reduced-motion:reduce){.fx-entrar{animation:none!important}}
</style>
<link rel="manifest" href="./pwa/manifest-proveedor.json">
<meta name="theme-color" content="#123B2C">
<link rel="apple-touch-icon" href="./pwa/proveedor-192.png">

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo} = React;

/* ===== LOGIN UNIFICADO (usuarios del proveedor) ===== */
const SERIF   = "'Playfair Display', Georgia, serif";  // títulos / marca
const BODY    = "'Lora', Georgia, serif";              // texto / inputs / labels

const USUARIOS = {
  "PROVEEDOR": { nombre:"Ing. Carmen Salas", codigo:"PROV-A", zona:"Agrícola del Valle", rol:"proveedor", clave:"1234" },
  "VENTAS":    { nombre:"Luis Pérez",        codigo:"PROV-A", zona:"Despachos",          rol:"proveedor", clave:"1234" },
  "VALLE":     { nombre:"Ing. Carmen Salas", codigo:"PROV-A", zona:"Agrícola del Valle", rol:"proveedor", clave:"1234" },
  "ADMIN":     { nombre:"Ing. Carmen Salas", codigo:"PROV-A", zona:"Agrícola del Valle", rol:"proveedor", clave:"admin123" },
};

const CL = {
  tinta:"#15392B",      // verde institucional (texto fuerte / franja)
  principal:"#1E4D3A",  // verde principal
  medio:"#2E7D52",      // verde medio
  suave:"#7FB89A",      // verde suave (bordes activos)
  veloLila:"#E4F1E9",   // verde muy claro (antes lila)
  papel:"#ffffff",      // tarjeta
  fondo:"#F7F5EF",      // fondo de pantalla (papel de la app)
  linea:"#E7E1D3",      // líneas / divisores
  grisTexto:"#6F7A6F",  // texto secundario
  grisTenue:"#9AA89A",  // texto terciario
  ambar:"#C77F00",      // acento maíz (sello / estados)
  ambarBg:"#FBF0D8",
  error:"#B5613C",
  okVerde:"#2E7D52",
};

const S = {
  phone:  { width:390, minHeight:844, background:CL.fondo, fontFamily:BODY, position:"relative", overflow:"hidden", borderRadius:40, boxShadow:"0 32px 80px rgba(0,0,0,0.35)", margin:"0 auto" },
  screen: { height:844, overflowY:"auto", overflowX:"hidden", scrollbarWidth:"none" },
};

function LogoFreelance({ size = 64 }) {
  // Isotipo oficial FREELANCE: la F con la hoja (diseño de Richard, jul-2026)
  return (
    <svg viewBox="0 0 64 64" width={size} height={size} style={{ display:"block" }}>
      <rect width="64" height="64" rx="16" fill="#1E4D3A"/>
      <path d="M22 16 H45 V25 H32 V31 H42 V40 H32 V50 H22 Z" fill="#fff"/>
      <path d="M43 9 Q54 4 56 15 Q46 19 43 9" fill="#F2A900"/>
      <path d="M50 18 Q58 16 57 24 Q51 25 50 18" fill="#8FCBA8"/>
    </svg>
  );
}

function StatusBar({ light = true }) {
  const col = light ? "rgba(255,255,255,0.85)" : "rgba(0,0,0,0.45)";
  return (
    <div style={{ display:"flex", justifyContent:"space-between", padding:"12px 24px 0", position:"absolute", top:0, left:0, right:0, zIndex:20 }}>
      <span style={{ fontSize:13, fontWeight:700, color:col, fontFamily:BODY }}>9:41</span>
      <span style={{ fontSize:12, color:col }}>●●● WiFi 🔋</span>
    </div>
  );
}

function SelloLineas() {
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:4, alignItems:"flex-end", opacity:0.5 }}>
      <span style={{ display:"block", width:34, height:1, background:"rgba(255,255,255,0.5)" }} />
      <span style={{ display:"block", width:22, height:1, background:"rgba(255,255,255,0.5)" }} />
      <span style={{ display:"block", width:28, height:1, background:"rgba(255,255,255,0.5)" }} />
    </div>
  );
}

function PantallaLogin({ onAutenticado }) {
  const [paso, setPaso]                 = useState("login");
  const [usr, setUsr]                   = useState("");
  const [pwd, setPwd]                   = useState("");
  const [verPwd, setVerPwd]             = useState(false);
  const [error, setError]               = useState("");
  const [cargando, setCargando]         = useState(false);
  const [huellaEstado, setHuellaEstado] = useState("espera");
  const [syncing, setSyncing]           = useState(false);
  const [syncDone, setSyncDone]         = useState(false);
  const [focusField, setFocusField]     = useState(null);

  const usuarioAuthRef = React.useRef(null);
  const syncRef        = React.useRef(false);
  const pwdRef         = React.useRef(null);

  const syncItems = ["Precios y promociones","Clientes (284)","Agenda · 4 visitas hoy","Stock actualizado"];

  const usrValido = USUARIOS[usr.toUpperCase()];
  const usrColor  = usr.length === 0 ? CL.tinta : usrValido ? CL.tinta : CL.error;
  const pwdColor  = pwd.length === 0 ? CL.tinta : (usrValido && usrValido.clave === pwd) ? CL.tinta : CL.error;

  const [conClave, setConClave] = useState(false);   /* huella = puerta principal diaria; clave = solo primera vez / nuevo equipo */
  const handleLogin = (conHuella = false) => {
    if (!usr.trim()) { setError("Ingresa tu usuario"); return; }
    if (!pwd.trim()) { setError("Ingresa tu contraseña"); return; }
    const u = USUARIOS[usr.toUpperCase()];
    if (!u || u.clave !== pwd) { setError("Usuario o contraseña incorrectos"); return; }
    setError(""); setCargando(true);
    setTimeout(() => {
      setCargando(false);
      usuarioAuthRef.current = u;
      setPaso(conHuella ? "huella" : "sync");
    }, 900);
  };

  const simularHuella = () => {
    setHuellaEstado("leyendo");
    setTimeout(() => {
      setHuellaEstado("ok");
      setTimeout(() => setPaso("sync"), 700);
    }, 1400);
  };

  React.useEffect(() => {
    if (paso !== "sync" || syncRef.current) return;
    syncRef.current = true;
    setSyncing(true);
    setTimeout(() => {
      setSyncing(false);
      setSyncDone(true);
      setTimeout(() => {
        const u = usuarioAuthRef.current;
        if (u) onAutenticado(u);
      }, 1500);
    }, 2200);
  }, [paso]);

  const Franja = ({ titulo, subtitulo }) => (
    <div className="fx-entrar" style={{ background:`linear-gradient(160deg, ${CL.tinta} 0%, ${CL.principal} 100%)`, padding:"54px 26px 30px", position:"relative", overflow:"hidden" }}>
      <StatusBar light />
      
      <div style={{ position:"absolute", left:0, right:0, bottom:0, height:3, background:`linear-gradient(90deg, ${CL.ambar}, ${CL.suave})` }} />
      <div style={{ display:"flex", justifyContent:"center", marginBottom:12 }}>
        <LogoFreelance size={84} />
      </div>
      <p style={{ fontFamily:SERIF, fontSize:30, fontWeight:800, color:"#fff", margin:0, letterSpacing:"0.01em", lineHeight:1.05, textAlign:"center" }}>FREELANCE</p>
      <p style={{ fontFamily:BODY, fontSize:11, color:"rgba(255,255,255,0.7)", margin:"5px 0 0", letterSpacing:"0.22em", textTransform:"uppercase", textAlign:"center" }}>Ventas · Distribución · Cobranza</p>
      {titulo && <p style={{ fontFamily:SERIF, fontStyle:"italic", fontSize:15, color:"rgba(255,255,255,0.85)", margin:"12px 0 0", textAlign:"center" }}>{subtitulo}</p>}
      <div style={{ width:64, height:4, borderRadius:2, background:"#7FD69A", margin:"12px auto 0" }} />
    </div>
  );

  if (paso === "sync") return (
    <div style={{ background:CL.fondo, minHeight:"100%", display:"flex", flexDirection:"column" }}>
      <Franja titulo subtitulo={syncDone ? "Sesión establecida" : "Estableciendo sesión segura"} />
      <div style={{ flex:1, padding:"26px 26px 30px", display:"flex", flexDirection:"column" }}>
        <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:24 }}>
          <div style={{ width:54, height:54, borderRadius:"50%", border:`1px solid ${CL.linea}`, background:"#fff", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 2px 10px rgba(46,16,101,0.06)" }}>
            {syncDone ? <LogoFreelance size={34} /> : <span style={{ fontSize:26 }}>🔄</span>}
          </div>
          <div>

    </div>

function Decisiones({ctx}){
  const [facturar,setFacturar]=useState(FACTURAR_INI);
  const [pagos,setPagos]=useState(PAGOS_CONF_INI);
  const [solics,setSolics]=useState(SOLIC_PROV_INI);
  const [cheques,setCheques]=useState(CHEQ_AUT_INI);
  const [numFac,setNumFac]=useState({});          // id → número de factura digitado
  const [rechazo,setRechazo]=useState(null);      // {id, motivo}
  const [aviso,setAviso]=useState("");
  const toca=(m)=>{ setAviso(m); setTimeout(()=>setAviso(""),3400); if(ctx&&ctx.accion) ctx.accion(()=>{}); };
  const money=n=>"$"+Number(n).toLocaleString("es-EC",{minimumFractionDigits:2,maximumFractionDigits:2});

  const card={background:"#fff",border:"1px solid var(--linea)",borderRadius:14,padding:"14px 15px",marginBottom:10};
  const secH={fontFamily:"Space Grotesk",fontWeight:700,fontSize:13,letterSpacing:".04em",textTransform:"uppercase",color:"var(--ok)",margin:"18px 2px 8px"};
  const btnOk={width:"100%",padding:"12px",border:"none",borderRadius:11,background:"var(--ok)",color:"#fff",fontWeight:700,fontSize:13.5,fontFamily:"inherit",marginTop:10};
  const btn2={flex:1,padding:"11px",border:"1px solid var(--linea)",borderRadius:11,background:"#fff",fontWeight:700,fontSize:13,fontFamily:"inherit"};
  const chip=(bg,c,t)=><span style={{fontSize:10.5,fontWeight:700,padding:"3px 9px",borderRadius:20,background:bg,color:c,whiteSpace:"nowrap"}}>{t}</span>;

  const hacerFactura=(p)=>{
    const num=(numFac[p.id]||"").trim();
    if(!num){ toca("Digita el número de factura para "+p.id+"."); return; }
    setFacturar(fs=>fs.map(x=>x.id===p.id?{...x,estado:"facturado",factura:num}:x));
    toca("Facturado ✓ Nace la comisión de Daniel y el pedido entra a Logística.");
  };
  const confirmarPago=(p)=>{
    setPagos(ps=>ps.map(x=>x.id===p.id?{...x,estado:"confirmado"}:x));
    toca("Pago confirmado ✓ La comisión "+p.comId+" ("+money(p.comision)+") queda LIBERADA para Daniel.");
  };
  const aprobarSol=(s)=>{
    setSolics(ss=>ss.map(x=>x.id===s.id?{...x,estado:"aprobada",motivoResp:"Aprobada"}:x));
    toca("Solicitud aprobada · Daniel lo ve en su sistema.");
  };
  const confirmarRechazo=()=>{
    if(!rechazo.motivo.trim()){ toca("El motivo es obligatorio: Daniel lo leerá tal cual."); return; }
    setSolics(ss=>ss.map(x=>x.id===rechazo.id?{...x,estado:"rechazada",motivoResp:rechazo.motivo.trim()}:x));
    setRechazo(null); toca("Rechazada con motivo · queda en el historial.");
  };
  const autorizarCheque=(c,ok)=>{
    setCheques(cs=>cs.map(x=>x.id===c.id?{...x,estado:ok?"autorizado":"denegado"}:x));
    toca(ok?"Depósito autorizado ✓ Daniel puede depositar el cheque (culmina su custodia).":"Depósito denegado · avisa a Daniel el nuevo acuerdo.");
  };

  const pendF=facturar.filter(x=>x.estado==="pendiente");
  const pendP=pagos.filter(x=>x.estado==="pendiente");
  const pendS=solics.filter(x=>x.estado==="pendiente");
  const pendC=cheques.filter(x=>x.estado==="pendiente");

  return (
    <div style={{padding:"14px 16px 90px"}}>
      <div style={{fontSize:12.5,color:"var(--tinta-suave, #6B6455)",background:"var(--maiz-suave)",border:"1px solid #EAD9A8",borderRadius:12,padding:"11px 13px",fontWeight:600}}>
        🔑 Dos actos tuyos mueven la plata del canal: <b>facturar</b> hace nacer la comisión de Daniel, y <b>confirmar el pago efectivo</b> es la única vía que la libera.
      </div>

      {/* ══ 1 · PEDIDOS POR FACTURAR ══ */}
      <div style={secH}>🧾 Pedidos por facturar {pendF.length>0 && "· "+pendF.length}</div>
      {facturar.map(p=>(
        <div key={p.id} style={card}>
          <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{p.cliente} <span className="num" style={{fontWeight:600,fontSize:11.5,color:"#6B6455"}}>· {p.id}</span></div>
              <div style={{fontSize:12.5,color:"#6B6455",marginTop:2}}>{p.detalle}</div>
              <div className="num" style={{fontSize:12,color:"#6B6455",marginTop:2}}>{p.fecha} · {money(p.monto)}</div>
            </div>
            {p.estado==="facturado" ? chip("var(--ok-suave)","var(--ok)","Facturada · "+p.factura) : chip("var(--maiz-suave)","#8A6A00","Por facturar")}
          </div>
          {p.estado==="pendiente" && (<>
            <input value={numFac[p.id]||""} onChange={e=>setNumFac(n=>({...n,[p.id]:e.target.value}))}
              placeholder="N° de factura · ej: 001-001-0004777" inputMode="numeric"
              style={{width:"100%",boxSizing:"border-box",padding:"11px 12px",border:"1px solid var(--linea)",borderRadius:10,fontSize:13.5,fontFamily:"inherit",marginTop:10,outline:"none"}}/>
            <button style={btnOk} onClick={()=>hacerFactura(p)}>Facturar ✓ · nace la comisión y entra a Logística</button>
          </>)}
        </div>
      ))}

      {/* ══ 2 · PAGOS POR CONFIRMAR (el gatillo de la comisión) ══ */}
      <div style={secH}>💵 Pagos por confirmar {pendP.length>0 && "· "+pendP.length}</div>
      {pagos.map(p=>(
        <div key={p.id} style={card}>
          <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{p.cliente} <span className="num" style={{fontWeight:600,fontSize:11.5,color:"#6B6455"}}>· {p.fac}</span></div>
              <div style={{fontSize:12.5,color:"#6B6455",marginTop:2}}>{p.via}</div>
              <div className="num" style={{fontSize:12,color:"#6B6455",marginTop:2}}>{money(p.monto)} · comisión retenida {p.comId} ({money(p.comision)})</div>
            </div>
            {p.estado==="confirmado" ? chip("var(--ok-suave)","var(--ok)","Confirmado ✓") : chip("#EAF0F6","#3A6EA5","Cliente pagó")}
          </div>
          {p.estado==="pendiente" &&
            <button style={btnOk} onClick={()=>confirmarPago(p)}>Confirmar pago efectivo ✓ · libera {money(p.comision)} a Daniel</button>}
        </div>
      ))}
      <div style={{fontSize:11.5,color:"#6B6455",margin:"2px 2px 0"}}>Ni el cobro al cliente ni el depósito del cheque liberan la comisión: solo tu confirmación.</div>

      {/* ══ 3 · SOLICITUDES ELEVADAS ══ */}
      <div style={secH}>📨 Solicitudes de Daniel {pendS.length>0 && "· "+pendS.length}</div>
      {solics.map(s=>(
        <div key={s.id} style={card}>
          <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{s.tipo} <span className="num" style={{fontWeight:600,fontSize:11.5,color:"#6B6455"}}>· {s.id}</span></div>
              <div style={{fontSize:12.5,color:"#6B6455",marginTop:2}}>{s.detalle}</div>
              {s.motivoResp && s.estado!=="pendiente" &&
                <div style={{fontSize:12,color:s.estado==="rechazada"?"#C0392B":"var(--ok)",marginTop:5,paddingTop:5,borderTop:"1px solid var(--linea)"}}>↳ {s.motivoResp}</div>}
            </div>
            {s.estado==="pendiente" ? chip("var(--maiz-suave)","#8A6A00","Pendiente")
              : s.estado==="aprobada" ? chip("var(--ok-suave)","var(--ok)","Aprobada ✓")
              : chip("#F8E3DC","#C0392B","Rechazada")}
          </div>
          {s.estado==="pendiente" && (
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button style={{...btn2,color:"#C0392B",borderColor:"#E3B7A8",background:"#FBEFEA"}} onClick={()=>setRechazo({id:s.id,motivo:""})}>Rechazar</button>
              <button style={{...btn2,background:"var(--ok)",color:"#fff",border:"none"}} onClick={()=>aprobarSol(s)}>Aprobar ✓</button>
            </div>
          )}
        </div>
      ))}

      {/* ══ 4 · CHEQUES A LA FECHA · AUTORIZAR DEPÓSITO ══ */}
      <div style={secH}>🏦 Depósitos por autorizar {pendC.length>0 && "· "+pendC.length}</div>
      {cheques.map(c=>(
        <div key={c.id} style={card}>
          <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{c.cheque}</div>
              <div style={{fontSize:12.5,color:"#6B6455",marginTop:2}}>{c.cliente} · {money(c.monto)} · a la fecha del {c.fechaCobro}</div>
              <div style={{fontSize:12,color:"#6B6455",marginTop:2}}>Pide: {c.pide}</div>
            </div>
            {c.estado==="pendiente" ? chip("var(--maiz-suave)","#8A6A00","Por autorizar")
              : c.estado==="autorizado" ? chip("var(--ok-suave)","var(--ok)","Autorizado ✓")
              : chip("#F8E3DC","#C0392B","Denegado")}
          </div>
          {c.estado==="pendiente" && (
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button style={{...btn2,color:"#C0392B",borderColor:"#E3B7A8",background:"#FBEFEA"}} onClick={()=>autorizarCheque(c,false)}>Denegar</button>
              <button style={{...btn2,background:"var(--ok)",color:"#fff",border:"none"}} onClick={()=>autorizarCheque(c,true)}>Autorizar depósito ✓</button>
            </div>
          )}
        </div>
      ))}

      {/* Rechazo con motivo obligatorio */}
      {rechazo && (
        <div onClick={()=>setRechazo(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:80,padding:22}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:"18px 16px",width:"100%",maxWidth:360}}>
            <div style={{fontFamily:"Space Grotesk",fontWeight:700,fontSize:15,marginBottom:8}}>Rechazar solicitud</div>
            <div style={{fontSize:12.5,color:"#6B6455",marginBottom:8}}>El motivo le llega a Daniel tal cual lo escribas:</div>
            <input value={rechazo.motivo} onChange={e=>setRechazo(x=>({...x,motivo:e.target.value}))}
              placeholder="Ej: se ofrece descuento del 5% en su lugar"
              style={{width:"100%",boxSizing:"border-box",padding:"12px",border:"1px solid var(--linea)",borderRadius:10,fontSize:13.5,fontFamily:"inherit",marginBottom:12,outline:"none"}}/>
            <div style={{display:"flex",gap:8}}>
              <button style={btn2} onClick={()=>setRechazo(null)}>Cancelar</button>
              <button style={{...btn2,background:"#C0392B",color:"#fff",border:"none"}} onClick={confirmarRechazo}>Rechazar con motivo</button>
            </div>
          </div>
        </div>
      )}

      {aviso && (
        <div style={{position:"fixed",bottom:86,left:"50%",transform:"translateX(-50%)",zIndex:90,background:"#1E1B14",color:"#fff",
          borderRadius:12,padding:"12px 18px",fontSize:13,fontWeight:600,boxShadow:"0 6px 18px rgba(0,0,0,.35)",maxWidth:"88%"}}>{aviso}</div>
      )}
    </div>
  );
}

function App({usuario, onSalir}){
  const [logueado,setLogueado]=useState(true); // el login lo maneja Root (PantallaLogin)
  const [tab,setTab]=useState("inicio");
  const [pila,setPila]=useState([]);            // historial de pestañas visitadas
  const [prop,setProp]=useState(PROP_INI);
  const [cat,setCat]=useState(CAT_INI);
  const [cred,setCred]=useState(CRED_INI);
  const [contado]=useState(CONTADO_INI);
  const [cola,setCola]=useState(0);
  const [online,setOnline]=useState(true);

  const pendientes = prop.filter(p=>p.estado==="pendiente").length;
  const preciosPend = cat.filter(p=>p.propuesto!=null).length;
  const credPend = cred.filter(c=>c.estado==="pendiente").length;
  // ═══ NOTIFICACIONES · tareas del rol Proveedor ═══
  const [verNotifs,setVerNotifs]=useState(false);
  const TAREAS_NOTIF=[
    {tipo:"facturar", icono:"🧾", titulo:"Pedidos por facturar", detalle:"Al facturar, el pedido entra a logística", destino:"decidir", n:FACTURAR_INI.filter(x=>x.estado==="pendiente").length},
    {tipo:"pagos", icono:"💵", titulo:"Pagos por confirmar", detalle:"Tu confirmación libera la comisión del vendedor", destino:"decidir", n:PAGOS_CONF_INI.filter(x=>x.estado==="pendiente").length},
    {tipo:"creditos", icono:"✅", titulo:"Créditos por aprobar", detalle:"Solicitudes de cupo con documentos", destino:"creditos", n:CRED_INI.filter(c=>c.estado==="pendiente").length},
    {tipo:"propuestas", icono:"✎", titulo:"Solicitudes del freelance", detalle:"Precios especiales y permisos por resolver", destino:"decidir", n:SOLIC_PROV_INI.filter(x=>x.estado==="pendiente").length},
  ];
  const tareasActivas=TAREAS_NOTIF.filter(t=>t.n>0);   // qué llega lo define el Freelance
  const totalNotifs=tareasActivas.reduce((a,t)=>a+t.n,0);

  const decidirPend = FACTURAR_INI.filter(x=>x.estado==="pendiente").length
    + PAGOS_CONF_INI.filter(x=>x.estado==="pendiente").length
    + SOLIC_PROV_INI.filter(x=>x.estado==="pendiente").length
    + CHEQ_AUT_INI.filter(x=>x.estado==="pendiente").length;
  const accion = (fn)=>{ fn(); setCola(c=>c+1); };

  // Navegar a una pestaña apilando la actual en el historial
  const irTab = (destino)=>{
    if(destino===tab) return;
    setPila(p=>[...p,tab]);
    setTab(destino);
  };
  // Atrás: vuelve a la última pestaña del historial
  const atras = ()=>{
    setPila(p=>{
      if(!p.length){ setTab("inicio"); return p; }
      setTab(p[p.length-1]);
      return p.slice(0,-1);
    });
  };
  // Inicio: salta directo y limpia el historial
  const irInicio = ()=>{ setPila([]); setTab("inicio"); };

  useEffect(()=>{
    if(online && cola>0){ const t=setTimeout(()=>setCola(0),1600); return ()=>clearTimeout(t); }
  },[online,cola]);

  if(!logueado) return <Login onEntrar={()=>setLogueado(true)} />;
  const TITULOS={inicio:"Inicio",decidir:"Por decidir",creditos:"Créditos",precios:"Precios",prop:"Propuestas",catalogo:"Catálogo",reportes:"Reportes",cuenta:"Acuerdos"};
  const ctx={prop,setProp,cat,setCat,cred,setCred,contado,accion,pendientes,online};
  return (
    <div className="phone">
      <div className="top">
        {tab==="inicio"
          ? <>
              <div style={{width:40,height:40,borderRadius:12,background:"rgba(255,255,255,.1)",display:"grid",placeItems:"center",fontFamily:"Space Grotesk",fontWeight:700,color:"var(--maiz)"}}>DV</div>
              <div>
                <div className="rol">Proveedor · {PROVEEDOR.linea}</div>
                <div className="nombre">{PROVEEDOR.nombre}</div>
              </div>
            </>
          : <>
              <button className="navbtn" onClick={atras} aria-label="Atrás">‹</button>
              <button className="navbtn" onClick={irInicio} aria-label="Inicio" title="Ir a Inicio">⌂</button>
              <div className="nombre" style={{marginLeft:2}}>{TITULOS[tab]}</div>
            </>}
        <button className="avatar" onClick={()=>irTab("cuenta")} title="Acuerdos y cuenta" aria-label="Acuerdos">
          {cola>0||!online ? <span className="num" style={{fontSize:13}}>{cola}</span> : "RM"}
        </button>
      </div>


        {/* ═══ Campana de notificaciones · tareas del rol, ajustables con ⚙ ═══ */}
        <button onClick={()=>setVerNotifs(true)} aria-label="Notificaciones"
          style={{position:"fixed", top:"calc(env(safe-area-inset-top, 0px) + 58px)", right:12, zIndex:1200, width:42, height:42, borderRadius:21, background:"#fff", border:"1px solid #E2E8E2", boxShadow:"0 4px 14px rgba(0,0,0,.18)", fontSize:17, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center"}}>
          🔔{totalNotifs>0 && <span style={{position:"absolute", top:-4, right:-4, minWidth:18, height:18, borderRadius:9, background:"#C0392B", color:"#fff", fontSize:10.5, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", padding:"0 4px"}}>{totalNotifs}</span>}
        </button>
        {verNotifs && (
          <div onClick={()=>setVerNotifs(false)} style={{position:"fixed", inset:0, background:"rgba(10,20,15,.45)", zIndex:1300, display:"flex", alignItems:"flex-start", justifyContent:"flex-end", padding:"calc(env(safe-area-inset-top,0px) + 104px) 12px 0"}}>

              <div style={{padding:"14px 16px 10px", borderBottom:"1px solid #EEF2EE", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                <strong style={{fontFamily:SERIF, fontSize:16, color:CL.tinta}}>🔔 Tus tareas de hoy</strong>
              </div>
              {(<>
              {tareasActivas.length===0 && <p style={{fontFamily:BODY, fontSize:13, color:CL.grisTexto, padding:"18px 16px", margin:0}}>Todo al día ✨ Nada espera tu acción.</p>}
              {tareasActivas.map(t=>(
                <button key={t.tipo} onClick={()=>{setVerNotifs(false); irTab(t.destino);}}
                  style={{display:"flex", gap:12, alignItems:"center", width:"100%", textAlign:"left", background:"none", border:"none", borderBottom:"1px solid #F3F6F3", padding:"12px 16px", cursor:"pointer"}}>
                  <span style={{fontSize:20}}>{t.icono}</span>
                  <span style={{flex:1, minWidth:0}}>
                    <span style={{display:"block", fontFamily:BODY, fontSize:13.5, fontWeight:700, color:CL.tinta}}>{t.titulo}</span>
                    <span style={{display:"block", fontFamily:BODY, fontSize:11.5, color:CL.grisTexto}}>{t.detalle}</span>
                  </span>
                  <span style={{minWidth:22, height:22, borderRadius:11, background:CL.principal, color:"#fff", fontSize:11.5, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", padding:"0 6px"}}>{t.n}</span>
                </button>
              ))}
              </>)}
              <p style={{fontFamily:BODY, fontSize:10.5, color:CL.grisTenue, padding:"10px 16px", margin:0, background:"#FAFBF9", borderRadius:"0 0 16px 16px"}}>👤 Qué avisos llegan aquí lo define tu freelance. Al publicar la app también aparecerán en la pantalla de tu teléfono.</p>
            </div>
          </div>
        )}

      <div className="scroll" key={tab}>
        {tab==="inicio"   ? <Inicio ctx={ctx} irTab={irTab} credPend={credPend} />
        : tab==="decidir" ? <Decisiones ctx={ctx} />
        : tab==="creditos"? <Creditos ctx={ctx} />
        : tab==="precios" ? <Precios ctx={ctx} irTab={irTab} />
        : tab==="prop"    ? <Propuestas ctx={ctx} />
        : tab==="catalogo"? <Catalogo ctx={ctx} irTab={irTab} />
        : tab==="reportes"? <Reportes ctx={ctx} irTab={irTab} />
        : <Cuenta ctx={ctx} setLogueado={setLogueado} onSalir={onSalir} setOnline={setOnline} online={online} cola={cola} />}
      </div>

      <nav className="nav">
        <NavBtn on={tab==="inicio"}   ico="◧" lab="Inicio"     onClick={()=>irInicio()} />
        <NavBtn on={tab==="decidir"}  ico="⚡" lab="Decidir"    badge={decidirPend} onClick={()=>irTab("decidir")} />
        <NavBtn on={tab==="creditos"} ico="✓" lab="Créditos"   badge={credPend} onClick={()=>irTab("creditos")} />
        <NavBtn on={tab==="precios"}  ico="$" lab="Precios"    badge={preciosPend} onClick={()=>irTab("precios")} />
        <NavBtn on={tab==="prop"}     ico="✎" lab="Propuestas" badge={pendientes} onClick={()=>irTab("prop")} />
        <NavBtn on={tab==="reportes"} ico="◔" lab="Reportes"   onClick={()=>irTab("reportes")} />
      </nav>
    </div>
  );
}

function NavBtn({on,ico,lab,onClick,badge}){
  return (
    <button className={on?"on":""} onClick={onClick}>
      <span className="ico">{ico}</span>
      <span className="lab">{lab}</span>
      {badge>0 && <span className="badge num">{badge}</span>}
    </button>
  );
}

/* ====== PRECIOS · el proveedor ajusta, el freelance aprueba ====== */
function Precios({ctx,irTab}){
  const {cat,setCat,accion}=ctx;
  const [edit,setEdit]=useState(null);

  // Solo productos ya aceptados tienen precio base que usa el subcomisionista
  const vendibles = cat.filter(p=>p.estado==="aceptado");
  const pendientes = vendibles.filter(p=>p.propuesto!=null);

  const proponer=(id,valor)=> accion(()=> setCat(prev=>prev.map(p=>p.id===id?{...p,propuesto:valor}:p)));
  const retirar =(id)=> accion(()=> setCat(prev=>prev.map(p=>p.id===id?{...p,propuesto:null}:p)));

  return (
    <>
      <div className="eyebrow">Precio base de venta</div>
      <h1 className="h1">Precios</h1>
      <div className="sub" style={{marginTop:4}}>Ajustas el precio base; el freelance lo aprueba y queda como el precio con el que vende su fuerza de subcomisionistas.</div>

      {pendientes.length>0 &&
        <div className="card card-pad" style={{margin:"16px 0 0",background:"var(--espera-suave)",border:"none"}}>
          <div style={{fontWeight:600,color:"#8A5A12"}}>{pendientes.length} {pendientes.length===1?"ajuste":"ajustes"} en espera</div>
          <div className="sub tiny" style={{marginTop:4}}>{FREELANCE.nombre} debe aprobarlos para que rijan.</div>
        </div>}

      <div className="sec-gap" style={{height:16}} />
      <div className="list-card">
        {vendibles.map(p=>{
          const pend = p.propuesto!=null;
          const sube = pend && p.propuesto>p.base;
          return (
            <button key={p.id} className="item" style={{width:"100%",textAlign:"left"}} onClick={()=>setEdit(p)}>
              <div className="ava ava-m">{p.nombre[0]}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:14}}>{p.nombre}</div>
                <div className="tiny muted">{p.pres}</div>
                {pend &&
                  <span className="chip chip-esp tiny" style={{padding:"2px 7px",marginTop:4}}>Propuesto · espera al freelance</span>}
              </div>
              <div style={{textAlign:"right"}}>
                <div className="num" style={{fontWeight:600,color:pend?"var(--texto-3)":"var(--texto)",textDecoration:pend?"line-through":"none"}}>{f(p.base)}</div>
                {pend &&
                  <div className="num tiny" style={{fontWeight:700,color:sube?"var(--alerta)":"var(--ok)"}}>→ {f(p.propuesto)}</div>}
              </div>
            </button>
          );
        })}
      </div>

      <div className="tiny muted" style={{textAlign:"center",marginTop:14}}>Solo los productos aceptados en el catálogo del equipo tienen precio base de venta.</div>

      {edit && <PrecioSheet p={edit} onClose={()=>setEdit(null)}
        onProponer={(v)=>{proponer(edit.id,v);setEdit(null);}}
        onRetirar={()=>{retirar(edit.id);setEdit(null);}} />}
    </>
  );
}

function PrecioSheet({p,onClose,onProponer,onRetirar}){
  const pend=p.propuesto!=null;
  const [val,setVal]=useState(pend? String(p.propuesto): String(p.base));
  const n=+val;
  const valido = val && n>0 && n!==p.base;
  const dif = valido ? ((n-p.base)/p.base*100) : 0;

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={ev=>ev.stopPropagation()}>
        <div className="grip" />
        <span className="chip chip-maiz">{PROVEEDOR.linea}</span>
        <div className="h2" style={{margin:"12px 0 4px"}}>{p.nombre}</div>
        <div className="sub">{p.pres}</div>

        <div className="card card-pad" style={{margin:"16px 0"}}>
          <Dato k="Precio base vigente" v={f(p.base)} />
          {pend && <Dato k="Propuesto (en espera)" v={f(p.propuesto)} alerta={p.propuesto>p.base} />}
        </div>

        {pend
          ? <>
              <div className="card card-pad" style={{background:"var(--espera-suave)",border:"none",marginBottom:14}}>
                <div style={{fontWeight:600,color:"#8A5A12"}}>Esperando aprobación de {FREELANCE.nombre}</div>
                <div className="sub tiny" style={{marginTop:4}}>El precio vigente sigue rigiendo hasta que lo apruebe. Puedes retirar el ajuste.</div>
              </div>
              <button className="btn btn-ghost" onClick={onRetirar}>Retirar ajuste propuesto</button>
            </>
          : <>
              <div className="field">
                <label>Nuevo precio base</label>
                <input type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder={String(p.base)} />
              </div>
              {valido &&
                <div className="tiny num" style={{fontWeight:600,margin:"8px 2px 0",color:dif>0?"var(--alerta)":"var(--ok)"}}>
                  {dif>0?"Sube":"Baja"} {Math.abs(dif).toFixed(1)}% · {f(Math.abs(n-p.base))} {dif>0?"más caro":"más barato"}
                </div>}
              <div className="row" style={{gap:10,marginTop:16}}>
                <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
                <button className="btn btn-maiz" disabled={!valido} onClick={()=>onProponer(n)}>Enviar al freelance</button>
              </div>
            </>}
      </div>
    </div>
  );
}

/* ====== PROPUESTAS ====== */
function Propuestas({ctx}){
  const {prop,setProp,accion}=ctx;
  const [filtro,setFiltro]=useState("activas");
  const [nueva,setNueva]=useState(false);
  const [ver,setVer]=useState(null);

  const pend=prop.filter(p=>p.estado==="pendiente");
  const hist=prop.filter(p=>p.estado!=="pendiente");
  const lista=filtro==="activas"?pend:hist;

  const enviar=(p)=> accion(()=>{ setProp(prev=>[{...p,id:"PR-"+(209+prev.length),fecha:"Ahora",estado:"pendiente"},...prev]); setNueva(false); });
  const retirar=(id)=> accion(()=> setProp(prev=>prev.filter(p=>p.id!==id)));

  return (
    <>
      <div className="eyebrow">Negociación con tu freelance</div>
      <h1 className="h1">Propuestas</h1>
      <div className="sub" style={{marginTop:4}}>Promociones, condiciones y productos nuevos que propones; tu freelance los aprueba para su equipo. Los precios se gestionan en su pestaña.</div>

      <div className="seg" style={{margin:"16px 0 14px"}}>
        <button className={filtro==="activas"?"on":""} onClick={()=>setFiltro("activas")}>Activas · {pend.length}</button>
        <button className={filtro==="historial"?"on":""} onClick={()=>setFiltro("historial")}>Historial · {hist.length}</button>
      </div>

      {lista.length===0
        ? <div className="empty"><div className="ico">✎</div><div style={{marginTop:8,fontWeight:600}}>Sin propuestas {filtro==="activas"?"activas":"en historial"}</div><div className="tiny" style={{marginTop:4}}>Crea una nueva con el botón +</div></div>
        : <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {lista.map(p=> <PropCard key={p.id} p={p} onClick={()=>setVer(p)} />)}
          </div>}

      <button className="fab" onClick={()=>setNueva(true)}>＋ Nueva propuesta</button>
      {nueva && <NuevaProp onClose={()=>setNueva(false)} onEnviar={enviar} />}
      {ver && <VerProp p={ver} onClose={()=>setVer(null)} onRetirar={(id)=>{retirar(id);setVer(null);}} />}
    </>
  );
}

function PropCard({p,onClick}){
  const t=TIPO[p.tipo], e=ESTADO[p.estado];
  return (
    <button className="card card-pad" style={{width:"100%",textAlign:"left"}} onClick={onClick}>
      <div className="row between">
        <span className={"chip "+t.clase}>{t.ico} {t.lbl}</span>
        <span className={"chip "+e.chip}>{e.lbl}</span>
      </div>
      <div style={{fontWeight:600,fontSize:15,margin:"10px 0 4px"}}>{p.titulo}</div>
      <div className="sub tiny" style={{display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{p.detalle}</div>
      <div className="tiny muted" style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--linea)"}}>{p.fecha}</div>
    </button>
  );
}

function VerProp({p,onClose,onRetirar}){
  const t=TIPO[p.tipo], e=ESTADO[p.estado];
  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={ev=>ev.stopPropagation()}>
        <div className="grip" />
        <div className="row between">
          <span className={"chip "+t.clase}>{t.ico} {t.lbl}</span>
          <span className={"chip "+e.chip}>{e.lbl}</span>
        </div>
        <div className="h2" style={{margin:"12px 0 4px"}}>{p.titulo}</div>
        <div className="sub">{p.detalle}</div>

        <div className="card card-pad" style={{margin:"16px 0"}}>
          {p.tipo==="producto" && <>
            <Dato k="Presentación" v={p.unidad} />
            <Dato k="Precio base (tu oferta)" v={f(p.base)} />
            <Dato k="Precio sugerido de venta" v={f(p.nuevo)} />
          </>}
          {p.tipo==="precio" && <>
            <Dato k="Precio base actual" v={f(p.base)+" · "+p.unidad} />
            <Dato k="Precio propuesto" v={f(p.nuevo)+" · "+p.unidad} alerta={p.nuevo>p.base} />
            <Dato k="Variación" v={((p.nuevo-p.base)/p.base*100).toFixed(1)+"%"} alerta={p.nuevo>p.base} />
          </>}
          {p.tipo==="promo" && <>
            <Dato k="Producto base" v={f(p.base)+" · "+p.unidad} />
            <Dato k="Promoción" v={p.promo} />
          </>}
          {p.tipo==="condicion" && <>
            <Dato k="Cupo actual" v={f(p.cupoActual)} />
            <Dato k="Cupo propuesto" v={f(p.cupoNuevo)} />
          </>}
        </div>

        {p.estado==="pendiente" &&
          <div className="card card-pad" style={{background:"var(--espera-suave)",border:"none",marginBottom:14}}>
            <div style={{fontWeight:600,color:"#8A5A12"}}>Esperando aprobación de {FREELANCE.nombre}</div>
            <div className="sub tiny" style={{marginTop:4}}>Puedes retirarla mientras siga pendiente.</div>
          </div>}
        {p.estado==="aprobada" &&
          <div className="card card-pad" style={{background:"var(--ok-suave)",border:"none",marginBottom:14}}>
            <div style={{fontWeight:600,color:"#1E5B40"}}>Aprobada por {FREELANCE.nombre} · {p.resuelta}</div>
            <div className="sub tiny" style={{marginTop:4}}>Ya rige para el equipo del freelance.</div>
          </div>}
        {p.estado==="rechazada" &&
          <div className="card card-pad" style={{background:"var(--alerta-suave)",border:"none",marginBottom:14}}>
            <div style={{fontWeight:600,color:"#8A2A20"}}>Rechazada · {p.resuelta}</div>
            {p.motivoFreelance && <div className="sub tiny" style={{marginTop:4}}>“{p.motivoFreelance}”</div>}
          </div>}

        {p.estado==="pendiente"
          ? <button className="btn btn-ghost" onClick={()=>onRetirar(p.id)}>Retirar propuesta</button>
          : <button className="btn btn-ghost" onClick={onClose}>Cerrar</button>}
      </div>
    </div>
  );
}

function NuevaProp({onClose,onEnviar}){
  const [tipo,setTipo]=useState("promo");
  const [titulo,setTitulo]=useState("");
  const [detalle,setDetalle]=useState("");
  const [base,setBase]=useState("");
  const [nuevo,setNuevo]=useState("");
  const [unidad,setUnidad]=useState("");
  const [promoTxt,setPromoTxt]=useState("");
  const [cupoActual,setCupoActual]=useState("");
  const [cupoNuevo,setCupoNuevo]=useState("");

  const valido = titulo.trim() && detalle.trim() && (
    tipo==="precio"? base&&nuevo&&unidad :
    tipo==="promo"? base&&unidad&&promoTxt :
    cupoActual&&cupoNuevo);

  const armar=()=>{
    const com={tipo,titulo:titulo.trim(),detalle:detalle.trim()};
    if(tipo==="precio") return {...com,base:+base,nuevo:+nuevo,unidad};
    if(tipo==="promo")  return {...com,base:+base,unidad,promo:promoTxt};
    return {...com,cupoActual:+cupoActual,cupoNuevo:+cupoNuevo};
  };

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={ev=>ev.stopPropagation()}>
        <div className="grip" />
        <div className="h2">Nueva propuesta</div>
        <div className="sub" style={{marginTop:4}}>Se enviará a {FREELANCE.nombre} para su aprobación.</div>

        <div className="field"><label>Tipo</label></div>
        <div className="seg">
          {Object.entries(TIPO).filter(([k])=>k!=="producto"&&k!=="precio").map(([k,v])=>(
            <button key={k} className={tipo===k?"on":""} onClick={()=>setTipo(k)}>{v.ico} {v.lbl}</button>
          ))}
        </div>

        <div className="field"><label>Título</label>
          <input value={titulo} onChange={e=>setTitulo(e.target.value)} placeholder="Ej: Nuevo precio · Arroz Conejo" />
        </div>
        <div className="field"><label>Detalle para el freelance</label>
          <textarea value={detalle} onChange={e=>setDetalle(e.target.value)} placeholder="Explica el motivo y el beneficio para su equipo…" />
        </div>

        {tipo==="precio" && <>
          <div className="field"><label>Precio base actual</label><input type="number" value={base} onChange={e=>setBase(e.target.value)} placeholder="1450" /></div>
          <div className="field"><label>Precio propuesto</label><input type="number" value={nuevo} onChange={e=>setNuevo(e.target.value)} placeholder="1380" /></div>
          <div className="field"><label>Unidad</label><input value={unidad} onChange={e=>setUnidad(e.target.value)} placeholder="$/quintal" /></div>
        </>}
        {tipo==="promo" && <>
          <div className="field"><label>Precio base</label><input type="number" value={base} onChange={e=>setBase(e.target.value)} placeholder="24000" /></div>
          <div className="field"><label>Unidad</label><input value={unidad} onChange={e=>setUnidad(e.target.value)} placeholder="quintal" /></div>

/* ====== CATÁLOGO ====== */
function Catalogo({ctx,irTab}){
  const {cat,setCat,setProp,accion}=ctx;
  const [edit,setEdit]=useState(null);
  const [nuevo,setNuevo]=useState(false);

  // Ofrecer un producto al freelance = crear una propuesta tipo "producto"
  const ofrecer=(p)=> accion(()=>{
    setProp(prev=>[{
      id:"PR-"+(209+prev.length), tipo:"producto", estado:"pendiente", fecha:"Ahora",
      titulo:"Producto nuevo · "+p.nombre,
      detalle:"Propongo sumar "+p.nombre+" ("+p.pres+") al catálogo de tu equipo.",
      base:p.base, nuevo:p.sugerido, unidad:p.pres, refProducto:p.id,
    },...prev]);
  });

  // Crear producto nuevo: entra al catálogo como "ofrecido" y se propone al freelance en un paso
  const crear=(datos)=> accion(()=>{
    const id="C-"+String(cat.length+1).padStart(2,"0");
    const prod={id, nombre:datos.nombre, pres:datos.pres, base:datos.base, sugerido:datos.sugerido, stock:datos.stock, promo:false, estado:"ofrecido", propuesto:null};
    setCat(prev=>[...prev,prod]);
    setProp(prev=>[{
      id:"PR-"+(209+prev.length), tipo:"producto", estado:"pendiente", fecha:"Ahora",
      titulo:"Producto nuevo · "+prod.nombre,
      detalle:"Propongo sumar "+prod.nombre+" ("+prod.pres+") al catálogo de tu equipo.",
      base:prod.base, nuevo:prod.sugerido, unidad:prod.pres, refProducto:prod.id,
    },...prev]);
    setNuevo(false);
    irTab("prop");
  });

  const orden={aceptado:0,ofrecido:1,rechazado:2};
  const lista=[...cat].sort((a,b)=>orden[a.estado]-orden[b.estado]);
  const cuenta=(e)=>cat.filter(p=>p.estado===e).length;

  return (
    <>
      <div className="eyebrow">Tu línea · {PROVEEDOR.linea}</div>
      <h1 className="h1">Catálogo</h1>
      <div className="sub" style={{marginTop:4}}>Ofreces tu catálogo; el freelance elige qué entra al de su equipo.</div>

      <button className="btn btn-tinta" style={{marginTop:16}} onClick={()=>setNuevo(true)}>＋ Nuevo producto</button>

      <div className="row" style={{gap:8,margin:"14px 0"}}>
        <ResumenChip n={cuenta("aceptado")} lbl="aceptados" clase="chip-ok" />
        <ResumenChip n={cuenta("ofrecido")} lbl="ofrecidos" clase="chip-esp" />
        <ResumenChip n={cuenta("rechazado")} lbl="no acept." clase="chip-al" />
      </div>

      <div className="list-card">
        {lista.map(p=>{
          const ce=CAT_ESTADO[p.estado];
          return (
            <button key={p.id} className="item" style={{width:"100%",textAlign:"left"}} onClick={()=>setEdit(p)}>
              <div className="ava ava-m">{p.nombre[0]}</div>
              <div style={{flex:1,minWidth:0}}>
                <div className="row" style={{gap:6}}>
                  <span style={{fontWeight:600,fontSize:14}}>{p.nombre}</span>
                  {p.promo && <span className="chip chip-maiz tiny" style={{padding:"2px 7px"}}>Promo</span>}
                </div>
                <div className="row" style={{gap:6,marginTop:3}}>
                  <span className={"chip tiny "+ce.chip} style={{padding:"2px 7px"}}>{ce.corto}</span>
                  {p.stock===0 && <span className="tiny" style={{color:"var(--alerta)"}}>Agotado</span>}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div className="num" style={{fontWeight:600}}>{f(p.base)}</div>
                <div className="tiny muted">{p.pres}</div>
              </div>
            </button>
          );
        })}
      </div>

      {edit && <ProdSheet p={edit} onClose={()=>setEdit(null)}
        onOfrecer={()=>{ofrecer(edit);setEdit(null);irTab("prop");}} />}
      {nuevo && <NuevoProducto onClose={()=>setNuevo(false)} onCrear={crear} />}
    </>
  );
}

function NuevoProducto({onClose,onCrear}){

        <div className="field"><label>Nombre del producto</label>

        </div>
        <div className="field"><label>Presentación</label>

        </div>
        <div className="field"><label>Precio base (tu oferta)</label>

    </div>
  );

/* ====== CRÉDITOS · el proveedor aprueba el crédito del cliente final ====== */

  const resolver=(id,estado,extra)=> accion(()=>{
    setCred(prev=>prev.map(c=>c.id===id?{...c,estado,resuelta:"Hoy",...extra}:c));

  });

  return (
    <>
      <div className="eyebrow">Crédito de clientes</div>

          <div className="row between" style={{marginBottom:8}}>
            <div className="h2" style={{fontSize:16}}>Clientes de contado</div>
            <span className="chip chip-ok tiny" style={{padding:"3px 9px"}}>Sin aprobación</span>

          <div className="sub tiny" style={{marginBottom:10}}>Compran de contado; no generan riesgo de cartera ni requieren tu visto bueno.</div>
          <div className="list-card">
            {contado.map(c=>(
              <div key={c.id} className="item">
                <div className="ava" style={{background:"var(--ok-suave)",color:"#1E5B40"}}>$</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:14}}>{c.cliente}</div>

                </div>

      {ver && <CredSheet c={ver} onClose={()=>setVer(null)} onResolver={resolver} />}

  );

/* ====== REPORTES ====== */
function Reportes({ctx,irTab}){
  const {prop,cat}=ctx;
  const fl=FREELANCE;
  const R=REPORTE;

  // Ventas/pedidos en el tiempo
  const maxPed=Math.max(...R.pedidos);
  const totalPed=R.pedidos.reduce((a,b)=>a+b,0);
  const totalPag=R.pagado.reduce((a,b)=>a+b,0);
  const recaudoPeriodo=pct(totalPag,totalPed);

  // Top productos por monto
  const topOrden=[...R.topProductos].sort((a,b)=>b.monto-a.monto);
  const maxMonto=Math.max(...topOrden.map(p=>p.monto));

  // Propuestas y precios
  const propAprob=prop.filter(p=>p.estado==="aprobada").length;
  const propRech =prop.filter(p=>p.estado==="rechazada").length;
  const propPend =prop.filter(p=>p.estado==="pendiente").length;
  const preciosPend=cat.filter(p=>p.propuesto!=null).length;

  return (
    <>
      <div className="eyebrow">Tu desempeño con {fl.nombre}</div>
      <h1 className="h1">Reportes</h1>

      {/* Resumen del periodo */}
      <div className="grid2" style={{margin:"16px 0 0"}}>
        <div className="tile">
          <div className="k">Pedidos · 6 meses</div>
          <div className="v num">{fk(totalPed)}</div>
          <div className="d up">Tu línea</div>
        </div>
        <div className="tile">
          <div className="k">Recaudo periodo</div>
          <div className="v num">{recaudoPeriodo}%</div>
          <div className="d muted">{fk(totalPag)} cobrado</div>
        </div>
      </div>

      {/* Pedidos de mi línea en el tiempo */}
      <div className="sec-gap" />
      <div className="h2" style={{marginBottom:4}}>Pedidos de tu línea</div>
      <div className="sub tiny" style={{marginBottom:12}}>Mensual · pedido vs. pagado</div>
      <div className="card card-pad">
        <div style={{display:"flex",alignItems:"flex-end",gap:10,height:140}}>
          {R.meses.map((m,i)=>(
            <div key={m} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
              <div style={{flex:1,width:"100%",display:"flex",alignItems:"flex-end",justifyContent:"center",gap:3}}>
                <div title={"Pedido "+f(R.pedidos[i])} style={{width:"42%",height:(R.pedidos[i]/maxPed*100)+"%",background:"var(--tinta)",borderRadius:"5px 5px 0 0"}} />
                <div title={"Pagado "+f(R.pagado[i])} style={{width:"42%",height:(R.pagado[i]/maxPed*100)+"%",background:"var(--maiz)",borderRadius:"5px 5px 0 0"}} />
              </div>
              <div className="tiny muted">{m}</div>
            </div>
          ))}
        </div>
        <div className="row" style={{gap:16,marginTop:12,paddingTop:12,borderTop:"1px solid var(--linea)"}}>
          <Leyenda color="var(--tinta)" lbl="Pedido" />
          <Leyenda color="var(--maiz)" lbl="Pagado" />
        </div>
      </div>

      {/* Recaudo y cartera */}
      <div className="sec-gap" />
      <div className="h2" style={{marginBottom:10}}>Recaudo y cartera</div>
      <div className="card card-pad">
        <div className="row between" style={{marginBottom:8}}>
          <span className="tiny muted">Pagado este mes</span>
          <span className="tiny num" style={{fontWeight:600,color:"var(--ok)"}}>{f(fl.pagado)}</span>
        </div>
        <div className="bar" style={{marginBottom:14}}><i style={{width:pct(fl.pagado,fl.pedidoMes)+"%",background:"var(--ok)"}}/></div>
        <div className="row between" style={{marginBottom:8}}>
          <span className="tiny muted">Por cobrar</span>
          <span className="tiny num" style={{fontWeight:600,color:"var(--maiz)"}}>{f(fl.porCobrar)}</span>
        </div>
        <div className="bar" style={{marginBottom:14}}><i style={{width:pct(fl.porCobrar,fl.pedidoMes)+"%",background:"var(--maiz)"}}/></div>
        <div className="row between" style={{marginBottom:8}}>
          <span className="tiny muted">Vencido</span>
          <span className="tiny num" style={{fontWeight:600,color:"var(--alerta)"}}>{f(fl.vencido)}</span>
        </div>
        <div className="bar"><i style={{width:pct(fl.vencido,fl.pedidoMes)+"%",background:"var(--alerta)"}}/></div>
      </div>

      {/* Productos más pedidos */}
      <div className="sec-gap" />
      <div className="h2" style={{marginBottom:10}}>Productos más pedidos</div>
      <div className="card" style={{padding:"4px 16px 8px"}}>
        {topOrden.map((p,i)=>(
          <div key={p.nombre} style={{padding:"13px 0",borderBottom:i<topOrden.length-1?"1px solid var(--linea)":"none"}}>
            <div className="row between" style={{marginBottom:8}}>
              <div style={{fontWeight:600,fontSize:14}}>{p.nombre}</div>
              <div className="num" style={{fontWeight:600}}>{fk(p.monto)}</div>
            </div>
            <div className="bar"><i style={{width:(p.monto/maxMonto*100)+"%",background:"var(--tinta)"}}/></div>
            <div className="tiny muted" style={{marginTop:5}}>{p.unidades.toLocaleString("es-CO")} unidades</div>
          </div>
        ))}
      </div>

      {/* Propuestas y precios */}
      <div className="sec-gap" />
      <div className="h2" style={{marginBottom:10}}>Propuestas y precios</div>
      <button className="card card-pad row between" style={{width:"100%",textAlign:"left"}} onClick={()=>irTab("prop")}>
        <div className="row" style={{gap:18}}>
          <Cifra n={propAprob} lbl="aprobadas" color="var(--ok)" />
          <Cifra n={propRech} lbl="rechazadas" color="var(--alerta)" />
          <Cifra n={propPend} lbl="en espera" color="var(--espera)" />
        </div>
        <span style={{color:"var(--texto-3)",fontSize:22}}>›</span>
      </button>
      {preciosPend>0 &&
        <button className="card card-pad row between" style={{width:"100%",textAlign:"left",marginTop:12,borderColor:"var(--espera)"}} onClick={()=>irTab("precios")}>
          <div className="row" style={{gap:13}}>
            <div className="ava ava-m" style={{background:"var(--espera-suave)",color:"#8A5A12"}}>{preciosPend}</div>
            <div>
              <div style={{fontWeight:600,fontSize:14}}>Ajustes de precio en espera</div>
              <div className="sub tiny">Esperan aprobación del freelance</div>
            </div>
          </div>
          <span style={{color:"var(--texto-3)",fontSize:22}}>›</span>
        </button>}
    </>
  );
}
function Leyenda({color,lbl}){
  return <div className="row" style={{gap:6}}><span style={{width:11,height:11,borderRadius:3,background:color}}/><span className="tiny muted">{lbl}</span></div>;
}
function Cifra({n,lbl,color}){
  return <div><div className="num" style={{fontWeight:700,fontSize:22,color}}>{n}</div><div className="tiny muted">{lbl}</div></div>;
}

/* ====== CUENTA / ACUERDOS ====== */
function Cuenta({ctx,setLogueado,onSalir,setOnline,online,cola}){
  const {prop}=ctx;
  const fl=FREELANCE;
  const aprobadas=prop.filter(p=>p.estado==="aprobada").length;
  return (
    <>
      <div className="eyebrow">Relación comercial</div>
      <h1 className="h1">Acuerdos</h1>
      <div className="sec-gap" style={{height:16}} />

      <div className="card card-pad" style={{marginBottom:14}}>
        <div className="row" style={{gap:13}}>
          <div className="ava" style={{width:50,height:50,background:"var(--tinta)",color:"var(--maiz)",fontSize:17,borderRadius:14}}>DR</div>
          <div>
            <div className="eyebrow">Tu freelance</div>
            <div className="h2">{fl.nombre}</div>
            <div className="tiny muted">{fl.proyecto}</div>
          </div>
        </div>
      </div>

      <div className="card" style={{padding:"4px 16px"}}>
        <Dato k="Línea que abasteces" v={PROVEEDOR.linea} />
        <Dato k="Cupo de crédito acordado" v={f(fl.cupo)} />
        <Dato k="Saldo a tu favor" v={f(fl.porCobrar)} alerta={fl.vencido>0} />
        <Dato k="Propuestas aprobadas" v={aprobadas} />
        <Dato k="Relación desde" v={PROVEEDOR.desde} />
      </div>

      <div className="sec-gap" />
      <div className="card card-pad">
        <div className="row between">
          <div>
            <div style={{fontWeight:600,fontSize:14}}>{online?"Conectado":"Sin conexión"}</div>
            <div className="tiny muted">{cola>0? `${cola} cambios por sincronizar` : "Última sincronización: hoy · 09:20"}</div>
          </div>
          <button className={"btn btn-sm "+(online?"btn-ghost":"btn-maiz")} onClick={()=>setOnline(o=>!o)}>
            {online?"Simular sin conexión":"Reconectar"}
          </button>
        </div>
      </div>

      <div className="sec-gap" />
      <div className="list-card">
        {["Datos de mi empresa","Condiciones de pago","Notificaciones","Seguridad y huella","Ayuda"].map(x=>(
          <div key={x} className="item"><div style={{flex:1,fontWeight:500}}>{x}</div><span style={{color:"var(--texto-3)"}}>›</span></div>
        ))}
      </div>

      <div className="sec-gap" />
      <button className="btn btn-ghost" onClick={()=> onSalir ? onSalir() : setLogueado(false)}>Cerrar sesión</button>
      <div style={{textAlign:"center",marginTop:16,fontSize:11.5,color:"var(--texto-3)"}}>FREELANCE · Proveedor v2.0 · offline-first</div>
    </>
  );
}

function Root(){
  const [sesion,setSesion]=useState(null);
  if(!sesion) return (
    <div style={{minHeight:"100vh", background:CL.fondo, display:"flex", flexDirection:"column", maxWidth:480, margin:"0 auto"}}>
      <PantallaLogin onAutenticado={(u)=>setSesion(u)} />
    </div>
  );
  return <App usuario={sesion} onSalir={()=>setSesion(null)} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
<script>
/* ═ Nivel 2 de notificaciones: el service worker se registra SOLO al vivir en HTTPS (GitHub Pages).
   Abriendo el archivo local no hace nada (ni molesta): el candado espera su momento. ═ */
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("./sw.js").catch(function(){ /* sin permiso o sin red: la app sigue normal */ });
}
</script>
</body>
