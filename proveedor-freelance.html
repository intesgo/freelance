              <div className="sub tiny" style={{marginTop:3}}>
                Volvió mercadería a tu bodega</div>
            </button>
            <button className="card card-pad" style={{width:"100%",textAlign:"left",marginBottom:10,
              borderColor:tipo==="descuento"?"var(--maiz)":"var(--linea)"}}
              onClick={()=>{setTipo("descuento");setMotivo("");}}>
              <div style={{fontWeight:600,fontSize:15}}>% Descuento en el precio</div>
              <div className="sub tiny" style={{marginTop:3}}>
                No vuelve nada, solo baja el valor</div>
            </button>
            <button className="btn btn-maiz" style={{width:"100%",marginTop:8}}
              disabled={!tipo} onClick={()=>setPaso(2)}>Continuar</button>
            <button className="btn btn-ghost" style={{width:"100%",marginTop:10}}
              onClick={reset}>Cancelar</button>
          </>)}

          {paso===2 && (<>
            <h3>¿De qué factura?</h3>
            <div className="sub tiny" style={{margin:"6px 0 14px"}}>
              La nota de crédito corrige una factura ya emitida.</div>
            {FACTURAS_PROV.map(x=>(
              <button key={x.num} className="card card-pad"
                style={{width:"100%",textAlign:"left",marginBottom:8,
                  borderColor:fac&&fac.num===x.num?"var(--maiz)":"var(--linea)"}}
                onClick={()=>setFac(x)}>
                <div className="row between">
                  <div>
                    <div style={{fontWeight:600,fontSize:14}}>{x.cli}</div>
                    <div className="sub tiny">{x.num} · {fCorta(x.fecha)}</div>
                  </div>
                  <b className="num" style={{fontSize:15}}>{money(x.total)}</b>
                </div>
              </button>
            ))}
            <button className="btn btn-maiz" style={{width:"100%",marginTop:8}}
              disabled={!fac} onClick={()=>{ setPaso(3); if(tipo==="devolucion" && items.length===0) agregarItem(); }}>
              Continuar</button>
            <button className="btn btn-ghost" style={{width:"100%",marginTop:10}}
              onClick={()=>setPaso(1)}>Atrás</button>
          </>)}

          {paso===3 && (<>
            <h3>{tipo==="devolucion" ? "¿Qué te devolvió?" : "¿Cuánto le bajas?"}</h3>
            <div className="sub tiny" style={{margin:"6px 0 14px"}}>
              {fac.cli} · factura {fac.num} de {money(fac.total)}</div>

            <div className="sub tiny" style={{marginBottom:8}}>Motivo</div>
            {(tipo==="devolucion"?MOTIVOS_NC_DEV:MOTIVOS_NC_DESC).map(m=>(
              <button key={m} className="btn btn-ghost"
                style={{width:"100%",marginBottom:8,textAlign:"left",
                  fontWeight:motivo===m?700:500,
                  borderColor:motivo===m?"var(--maiz)":undefined}}
                onClick={()=>setMotivo(m)}>{motivo===m?"✓ ":""}{m}</button>
            ))}

            {tipo==="devolucion" ? (<>
              <div className="sub tiny" style={{margin:"14px 0 8px"}}>Producto que volvió</div>
              {items.map((it,i)=>(
                <div key={i} className="card card-pad" style={{marginBottom:8}}>
                  <input value={it.prod} onChange={e=>cambiarItem(i,"prod",e.target.value)}
                    placeholder="Producto · presentación"
                    style={{width:"100%",padding:"10px 12px",borderRadius:9,
                      border:"1px solid var(--linea)",fontSize:14,fontFamily:"inherit",marginBottom:8}}/>
                  <div className="row" style={{gap:8}}>
                    <input value={it.qq} inputMode="decimal"
                      onChange={e=>cambiarItem(i,"qq",e.target.value)} placeholder="Quintales"
                      style={{flex:1,padding:"10px 12px",borderRadius:9,
                        border:"1px solid var(--linea)",fontSize:14,fontFamily:"inherit"}}/>
                    <input value={it.precio} inputMode="decimal"
                      onChange={e=>cambiarItem(i,"precio",e.target.value)} placeholder="Precio"
                      style={{flex:1,padding:"10px 12px",borderRadius:9,
                        border:"1px solid var(--linea)",fontSize:14,fontFamily:"inherit"}}/>
                    {items.length>1 && (
                      <button className="btn btn-ghost" style={{padding:"10px 14px"}}
                        onClick={()=>quitarItem(i)}>×</button>
                    )}
                  </div>
                </div>
              ))}
              <button className="btn btn-ghost" style={{width:"100%",marginBottom:14}}
                onClick={agregarItem}>+ Otro producto</button>
            </>) : (<>
              <div className="sub tiny" style={{margin:"14px 0 6px"}}>Cuánto le bajas</div>
              <input value={monto} inputMode="decimal"
                onChange={e=>setMonto(e.target.value)} placeholder="0.00"
                style={{width:"100%",padding:"12px 14px",borderRadius:10,
                  border:"1px solid var(--linea)",fontSize:18,textAlign:"center",
                  fontFamily:"inherit",marginBottom:14}}/>
            </>)}

            <div className="sub tiny" style={{marginBottom:6}}>Detalle (opcional)</div>
            <input value={detalle} onChange={e=>setDetalle(e.target.value)}
              placeholder="Explica brevemente qué pasó"
              style={{width:"100%",padding:"12px 14px",borderRadius:10,
                border:"1px solid var(--linea)",fontSize:14,fontFamily:"inherit",marginBottom:14}}/>

            {totalNC>0 && (
              <div className="card card-pad" style={{marginBottom:14,borderColor:"var(--maiz)"}}>
                <div className="row between" style={{padding:"4px 0"}}>
                  <span className="sub tiny">La factura era</span>
                  <span className="num" style={{fontSize:14}}>{money(fac.total)}</span>
                </div>
                <div className="row between" style={{padding:"4px 0"}}>
                  <span className="sub tiny">Le bajas</span>
                  <span className="num" style={{fontSize:14,fontWeight:700}}>− {money(totalNC)}</span>
                </div>
                <div className="row between" style={{padding:"6px 0",
                  borderTop:"1px solid var(--linea)",marginTop:4}}>
                  <span style={{fontSize:14,fontWeight:700}}>Queda debiendo</span>
                  <b className="num" style={{fontSize:17,color:"var(--maiz)"}}>{money(quedaFactura)}</b>
                </div>
                <div className="row between" style={{padding:"6px 0 0",
                  borderTop:"1px solid var(--linea)",marginTop:4}}>
                  <span className="sub tiny">Se revierte de comisión</span>
                  <span className="num" style={{fontSize:14}}>− {money(comisionRev)}</span>
                </div>
              </div>
            )}

            <button className="btn btn-maiz" style={{width:"100%"}}
              disabled={!motivo || totalNC<=0} onClick={()=>setPaso(4)}>Continuar</button>
            <button className="btn btn-ghost" style={{width:"100%",marginTop:10}}
              onClick={()=>setPaso(2)}>Atrás</button>
          </>)}

          {paso===4 && (<>
            <h3>Datos de la nota</h3>
            <div className="sub tiny" style={{margin:"6px 0 14px"}}>
              {fac.cli} · le bajas {money(totalNC)}</div>

            <div className="sub tiny" style={{marginBottom:6}}>Número de la nota de crédito</div>
            <input value={numero} onChange={e=>setNumero(e.target.value)}
              placeholder="001-001-000000"
              style={{width:"100%",padding:"12px 14px",borderRadius:10,
                border:"1px solid var(--linea)",fontSize:15,fontFamily:"inherit",marginBottom:12}}/>

            <div className="sub tiny" style={{marginBottom:6}}>Autorización del SRI (opcional)</div>
            <input value={autoriz} onChange={e=>setAutoriz(e.target.value)}
              placeholder="Si aún no la tienes, déjalo vacío"
              style={{width:"100%",padding:"12px 14px",borderRadius:10,
                border:"1px solid var(--linea)",fontSize:14,fontFamily:"inherit",marginBottom:10}}/>
            <div className="sub tiny" style={{marginBottom:14,lineHeight:1.5}}>
              Sin autorización queda como "falta confirmar", pero la deuda del cliente
              baja igual desde ahora.</div>

            <button className="btn btn-maiz" style={{width:"100%"}} onClick={guardar}>
              Emitir nota de crédito</button>
            <button className="btn btn-ghost" style={{width:"100%",marginTop:10}}
              onClick={()=>setPaso(3)}>Atrás</button>
          </>)}

        </div>
      </div>
    )}
    <Aviso/>
  </>);
}

function Retenciones({irTab}){
  const [rets,setRets]=useState(RETENCIONES_INI);
  const [sel,setSel]=useState(null);
  const [nueva,setNueva]=useState(false);
  const [paso,setPaso]=useState(1);          // 1 factura · 2 porcentajes · 3 número
  const [fac,setFac]=useState(null);
  const [pRenta,setPRenta]=useState(0);
  const [pIva,setPIva]=useState(0);
  const [numero,setNumero]=useState("");
  const [autoriz,setAutoriz]=useState("");
  const [aviso,setAviso]=useState("");
  const toast=(m)=>{ setAviso(m); setTimeout(()=>setAviso(""),3400); };

  const r2=(n)=>Math.round(n*100)/100;
  /* La retención de renta se calcula sobre la base imponible, no sobre el total con IVA.
     Los granos no gravan IVA, así que en esta línea base = total. */
  const baseRenta = fac ? fac.total : 0;
  const mRenta = r2(baseRenta * pRenta/100);
  const mIva   = 0;   // línea sin IVA: no hay retención de IVA que calcular
  const mTotal = r2(mRenta + mIva);
  const quedaPorCobrar = fac ? r2(fac.total - mTotal) : 0;

  const sinConfirmar = rets.filter(r=>!r.confirmada);
  const totalMes = rets.reduce((a,r)=>a+r.total,0);
  const fCorta=(d)=>{
    if(!d) return "—";
    const M=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
    const p=String(d).slice(0,10).split("-");
    return `${parseInt(p[2])} ${M[parseInt(p[1])-1]}`;
  };
  const nuevoAu=()=>"AU-260720-"+Math.floor(1000+Math.random()*9000);

  const reset=()=>{ setNueva(false); setPaso(1); setFac(null); setPRenta(0); setPIva(0);
                    setNumero(""); setAutoriz(""); };

  const guardar=()=>{
    if(!numero.trim()){ toast("Escribe el número del comprobante"); return; }
    const au=nuevoAu();
    const r={ id:"RT-"+String(rets.length+1).padStart(3,"0"), numero:numero.trim(),
      factura:fac.num, cli:fac.cli, ruc:fac.ruc, fecha:"2026-07-20",
      pctRenta:pRenta, pctIva:pIva, montoRenta:mRenta, montoIva:mIva, total:mTotal,
      autorizacion:autoriz.trim(), confirmada:!!autoriz.trim(), au };
    setRets(p=>[r,...p]);
    reset();
    toast(`Retención registrada · la cartera de ${r.cli} baja ${money(r.total)} · ${au}`);
  };

  const confirmarSri=(r)=>{
    const au=nuevoAu();
    setRets(p=>p.map(x=>x.id===r.id ? {...x, confirmada:true, au} : x));
    setSel(null);
    toast(`Confirmada en el SRI · ${au}`);
  };

  const Aviso = () => aviso ? (
    <div style={{position:"fixed",bottom:86,left:"50%",transform:"translateX(-50%)",zIndex:90,
      background:"#1E1B14",color:"#fff",borderRadius:12,padding:"12px 18px",fontSize:13,
      fontWeight:600,boxShadow:"0 6px 18px rgba(0,0,0,.35)",maxWidth:"88%"}}>{aviso}</div>
  ) : null;

  /* ── FICHA DE UNA RETENCIÓN ── */
  if(sel){
    const r = rets.find(x=>x.id===sel) || {};
    const f = FACTURAS_PROV.find(x=>x.num===r.factura) || {};
    return (<>
      <div className="eyebrow">Comprobante de retención</div>
      <h1 className="h1">{r.cli}</h1>
      <div className="sub" style={{marginTop:4}}>N° {r.numero} · {fCorta(r.fecha)}</div>

      <div className="sec-gap" style={{height:16}} />
      <div className="hero">
        <div className="lbl">Le retuvieron</div>
        <div className="big num">{money(r.total)}</div>
        <div className="split">
          <div><div className="k">Factura</div><div className="v num">{r.factura}</div></div>
          <div><div className="k">Valor factura</div><div className="v num">{money(f.total||0)}</div></div>
          <div><div className="k">Queda por cobrar</div>
            <div className="v num" style={{color:"var(--maiz)"}}>{money((f.total||0)-r.total)}</div></div>
        </div>
      </div>

      <div className="sec-gap" style={{height:12}} />
      <div className="card card-pad">
        <div className="row between" style={{padding:"5px 0"}}>
          <span className="sub tiny">Retención de renta</span>
          <span className="num" style={{fontSize:14,fontWeight:600}}>
            {r.pctRenta}% · {money(r.montoRenta)}</span>
        </div>
        {r.montoIva>0 && (
          <div className="row between" style={{padding:"5px 0"}}>
            <span className="sub tiny">Retención de IVA</span>
            <span className="num" style={{fontSize:14,fontWeight:600}}>
              {r.pctIva}% · {money(r.montoIva)}</span>
          </div>
        )}
        <div className="row between" style={{padding:"5px 0"}}>
          <span className="sub tiny">RUC del cliente</span>
          <span className="num" style={{fontSize:14}}>{r.ruc}</span>
        </div>
        {r.au && (
          <div className="row between" style={{padding:"5px 0"}}>
            <span className="sub tiny">Auditoría</span>
            <span className="num sub tiny">{r.au}</span>
          </div>
        )}
      </div>

      <div className="sec-gap" style={{height:12}} />
      <div className="card card-pad" style={{borderColor: r.confirmada ? "#2E7D52" : "var(--maiz)"}}>
        <div style={{fontWeight:700,fontSize:14,color: r.confirmada ? "#2E7D52" : "var(--tinta)"}}>
          {r.confirmada ? "✓ Confirmada en el SRI" : "Falta confirmarla en el SRI"}</div>
        {r.confirmada && r.autorizacion
          ? <div className="sub tiny num" style={{marginTop:6,wordBreak:"break-all"}}>
              Autorización {r.autorizacion}</div>
          : <div className="sub tiny" style={{marginTop:6,lineHeight:1.5}}>
              Ya se descontó de la cartera del cliente. Confírmala cuando el SRI la autorice.</div>}
      </div>

      <div className="sec-gap" style={{height:16}} />
      {!r.confirmada && (
        <>
          <button className="btn btn-maiz" style={{width:"100%"}}
            onClick={()=>confirmarSri(r)}>Ya está confirmada en el SRI</button>
          <div className="sec-gap" style={{height:10}} />
        </>
      )}
      <button className="btn btn-ghost" style={{width:"100%"}} onClick={()=>setSel(null)}>Volver</button>
      <Aviso/>
    </>);
  }

  /* ── LISTA ── */
  return (<>
    <div className="eyebrow">Lo que el cliente retiene para el SRI</div>
    <h1 className="h1">Retenciones</h1>
    <div className="sub" style={{marginTop:4}}>
      Bajan la deuda del cliente sin ser un cobro: ese dinero se fue al Estado.</div>

    <div className="sec-gap" style={{height:16}} />
    <div className="hero">
      <div className="lbl">Retenido este mes</div>

function CuentasBancarias({irTab}){
  const [cuentas,setCuentas]=useState(CUENTAS_INI);
  const [sel,setSel]=useState(null);        // cuenta abierta
  const [nueva,setNueva]=useState(false);
  const [f,setF]=useState({banco:"",tipo:"Corriente",ult4:"",titular:PROVEEDOR.nombre,
                           ruc:"",dep:true,tra:true});
  const [aviso,setAviso]=useState("");
  const toast=(m)=>{ setAviso(m); setTimeout(()=>setAviso(""),3200); };

  const HOY="2026-07-20";
  const vigente=(c)=> c.activa && (!c.hasta || c.hasta>=HOY);
  const activas =cuentas.filter(vigente);
  const cerradas=cuentas.filter(c=>!vigente(c));
  const fCorta=(d)=>{
    if(!d) return "sin fecha de fin";
    const M=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
    const p=String(d).slice(0,10).split("-");
    return `${parseInt(p[2])} ${M[parseInt(p[1])-1]} ${p[0]}`;
  };
  const nuevoAu=()=>"AU-260720-"+Math.floor(1000+Math.random()*9000);

  const guardar=()=>{
    if(!f.banco){ toast("Elige el banco"); return; }
    if(f.ult4.replace(/\D/g,"").length!==4){ toast("Escribe los 4 últimos dígitos"); return; }
    if(!f.dep && !f.tra){ toast("Marca al menos una operación"); return; }
    const ops=[]; if(f.dep) ops.push("Depósito"); if(f.tra) ops.push("Transferencia");
    const c={ id:"CB-"+String(cuentas.length+1).padStart(2,"0"), banco:f.banco, tipo:f.tipo,
      ult4:f.ult4.replace(/\D/g,""), titular:f.titular.trim()||PROVEEDOR.nombre,
      ruc:f.ruc.trim(), operaciones:ops, desde:HOY, hasta:null, activa:true, au:nuevoAu() };
    setCuentas(p=>[c,...p]);
    setNueva(false);
    setF({banco:"",tipo:"Corriente",ult4:"",titular:PROVEEDOR.nombre,ruc:"",dep:true,tra:true});
    toast(`Cuenta autorizada · las apps ya pueden depositar ahí · ${c.au}`);
  };

  const cerrarCuenta=(c)=>{
    const au=nuevoAu();
    setCuentas(p=>p.map(x=>x.id===c.id ? {...x, activa:false, hasta:HOY, au} : x));
    setSel(null);
    toast(`Cuenta dada de baja · ya no se puede depositar ahí · ${au}`);
  };
  const reabrir=(c)=>{
    const au=nuevoAu();
    setCuentas(p=>p.map(x=>x.id===c.id ? {...x, activa:true, hasta:null, au} : x));
    setSel(null);
    toast(`Cuenta reactivada · ${au}`);
  };

  const Aviso = () => aviso ? (
    <div style={{position:"fixed",bottom:86,left:"50%",transform:"translateX(-50%)",zIndex:90,
      background:"#1E1B14",color:"#fff",borderRadius:12,padding:"12px 18px",fontSize:13,
      fontWeight:600,boxShadow:"0 6px 18px rgba(0,0,0,.35)",maxWidth:"88%"}}>{aviso}</div>
  ) : null;

  /* ── FICHA DE UNA CUENTA ── */
  if(sel){
    const c = cuentas.find(x=>x.id===sel) || {};
    const viva = vigente(c);
    return (<>
      <div className="eyebrow">Cuenta autorizada</div>
      <h1 className="h1">{c.banco}</h1>
      <div className="sub" style={{marginTop:4}}>{c.tipo} · termina en {c.ult4}</div>

      <div className="sec-gap" style={{height:16}} />
      <div className="card card-pad" style={{borderColor: viva ? "#2E7D52" : "var(--linea)"}}>
        <div style={{fontWeight:700,fontSize:14,color: viva ? "#2E7D52" : "var(--texto-3)"}}>
          {viva ? "✓ Activa · las apps pueden depositar aquí" : "Dada de baja · no se puede depositar"}</div>
        <div className="sub tiny" style={{marginTop:6}}>
          Desde {fCorta(c.desde)} · hasta {c.hasta ? fCorta(c.hasta) : "sin fecha de fin"}</div>
      </div>

      <div className="sec-gap" style={{height:12}} />
      <div className="card card-pad">
        <div className="row between" style={{padding:"5px 0"}}>
          <span className="sub tiny">Titular</span>
          <span style={{fontSize:14,fontWeight:600,textAlign:"right"}}>{c.titular}</span>
        </div>
        {c.ruc && (
          <div className="row between" style={{padding:"5px 0"}}>
            <span className="sub tiny">RUC</span>
            <span className="num" style={{fontSize:14}}>{c.ruc}</span>
          </div>
        )}
        <div className="row between" style={{padding:"5px 0"}}>
          <span className="sub tiny">Número</span>
          <span className="num" style={{fontSize:14}}>•••• {c.ult4}</span>
        </div>
        <div className="row between" style={{padding:"5px 0"}}>
          <span className="sub tiny">Se puede usar para</span>
          <span style={{fontSize:14,fontWeight:600,textAlign:"right"}}>
            {(c.operaciones||[]).join(" · ")}</span>
        </div>
        {c.au && (
          <div className="row between" style={{padding:"5px 0"}}>
            <span className="sub tiny">Auditoría</span>
            <span className="num sub tiny">{c.au}</span>
          </div>
        )}
      </div>

      <div className="sec-gap" style={{height:12}} />
      <div className="card card-pad">
        <div className="sub tiny" style={{lineHeight:1.5}}>
          El número completo nunca se guarda ni se muestra: solo estos 4 dígitos, que sirven
          para cruzar el comprobante que sube el cobrador.</div>
      </div>

      <div className="sec-gap" style={{height:16}} />
      {viva
        ? <button className="btn btn-ghost" style={{width:"100%",color:"#B5432E",borderColor:"#B5432E"}}
            onClick={()=>cerrarCuenta(c)}>Dar de baja esta cuenta</button>
        : <button className="btn btn-ghost" style={{width:"100%"}}
            onClick={()=>reabrir(c)}>Reactivar esta cuenta</button>}
      <div className="sec-gap" style={{height:10}} />
      <button className="btn btn-ghost" style={{width:"100%"}} onClick={()=>setSel(null)}>Volver</button>
      <Aviso/>
    </>);
  }

  /* ── LISTA ── */
  return (<>
    <div className="eyebrow">Dónde te pueden depositar</div>
    <h1 className="h1">Mis cuentas</h1>
    <div className="sub" style={{marginTop:4}}>
      Los cobros de tus facturas solo pueden ir a estas cuentas.</div>

    <div className="sec-gap" style={{height:16}} />
    {activas.length===0 && (
      <div className="card card-pad" style={{borderColor:"#B5432E"}}>
        <div style={{fontWeight:700,fontSize:14,color:"#B5432E"}}>No tienes cuentas activas</div>
        <div className="sub tiny" style={{marginTop:4}}>
          Sin una cuenta autorizada, el equipo no sabe dónde depositarte.</div>
      </div>
    )}

    {activas.map(c=>(
      <button key={c.id} className="card card-pad" onClick={()=>setSel(c.id)}
        style={{width:"100%",textAlign:"left",marginBottom:10}}>
        <div className="row between">
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontWeight:600,fontSize:15}}>{c.banco}</div>
            <div className="sub tiny">{c.tipo} · •••• {c.ult4}</div>
            <div className="sub tiny">{(c.operaciones||[]).join(" · ")}</div>
          </div>
          <span style={{color:"var(--texto-3)",fontSize:22,flexShrink:0}}>›</span>
        </div>
      </button>
    ))}

    <div className="sec-gap" style={{height:6}} />
    <button className="btn btn-maiz" style={{width:"100%"}} onClick={()=>setNueva(true)}>
      + Autorizar otra cuenta</button>

    {cerradas.length>0 && (<>
      <div className="sec-gap" />
      <div className="eyebrow">Dadas de baja</div>
      <div className="sec-gap" style={{height:10}} />
      {cerradas.map(c=>(
        <button key={c.id} className="card card-pad" onClick={()=>setSel(c.id)}
          style={{width:"100%",textAlign:"left",marginBottom:10,opacity:.65}}>
          <div className="row between">
            <div style={{minWidth:0,flex:1}}>
              <div style={{fontWeight:600,fontSize:15}}>{c.banco}</div>
              <div className="sub tiny">•••• {c.ult4} · hasta {fCorta(c.hasta)}</div>
            </div>
            <span style={{color:"var(--texto-3)",fontSize:22,flexShrink:0}}>›</span>
          </div>
        </button>
      ))}
    </>)}

    {/* alta de cuenta */}
    {nueva && (
      <div className="scrim" onClick={()=>setNueva(false)}>
        <div className="sheet" onClick={e=>e.stopPropagation()}>
          <h3>Autorizar una cuenta</h3>
          <div className="sub tiny" style={{margin:"6px 0 14px"}}>
            Solo los 4 últimos dígitos: con eso basta para cruzar los comprobantes.</div>

          <div className="sub tiny" style={{marginBottom:6}}>Banco</div>
          <select value={f.banco} onChange={e=>setF({...f,banco:e.target.value})}
            style={{width:"100%",padding:"12px 14px",borderRadius:10,
              border:"1px solid var(--linea)",fontSize:14,fontFamily:"inherit",marginBottom:12}}>
            <option value="">Elige el banco…</option>
            {BANCOS_EC.map(b=><option key={b} value={b}>{b}</option>)}
          </select>

          <div className="sub tiny" style={{marginBottom:6}}>Tipo de cuenta</div>
          <div className="row" style={{gap:10,marginBottom:12}}>
            {["Corriente","Ahorros"].map(t=>(
              <button key={t} className="btn btn-ghost" style={{flex:1,
                borderColor:f.tipo===t?"var(--maiz)":undefined,
                fontWeight:f.tipo===t?700:500}}
                onClick={()=>setF({...f,tipo:t})}>{f.tipo===t?"✓ ":""}{t}</button>
            ))}
          </div>

          <div className="sub tiny" style={{marginBottom:6}}>4 últimos dígitos</div>
          <input value={f.ult4} inputMode="numeric" maxLength={4}
            onChange={e=>setF({...f,ult4:e.target.value.replace(/\D/g,"")})}
            placeholder="0000"
            style={{width:"100%",padding:"12px 14px",borderRadius:10,letterSpacing:".2em",
              border:"1px solid var(--linea)",fontSize:18,textAlign:"center",
              fontFamily:"inherit",marginBottom:12}}/>

          <div className="sub tiny" style={{marginBottom:6}}>Titular</div>
          <input value={f.titular} onChange={e=>setF({...f,titular:e.target.value})}
            style={{width:"100%",padding:"12px 14px",borderRadius:10,
              border:"1px solid var(--linea)",fontSize:14,fontFamily:"inherit",marginBottom:12}}/>

          <div className="sub tiny" style={{marginBottom:6}}>RUC (opcional)</div>
          <input value={f.ruc} inputMode="numeric"
            onChange={e=>setF({...f,ruc:e.target.value.replace(/\D/g,"")})}
            placeholder="0991234567001"
            style={{width:"100%",padding:"12px 14px",borderRadius:10,
              border:"1px solid var(--linea)",fontSize:14,fontFamily:"inherit",marginBottom:12}}/>

          <div className="sub tiny" style={{marginBottom:6}}>Se puede usar para</div>
          <div className="row" style={{gap:10,marginBottom:16}}>
            <button className="btn btn-ghost" style={{flex:1,
              borderColor:f.dep?"var(--maiz)":undefined,fontWeight:f.dep?700:500}}
              onClick={()=>setF({...f,dep:!f.dep})}>{f.dep?"✓ ":""}Depósito</button>
            <button className="btn btn-ghost" style={{flex:1,
              borderColor:f.tra?"var(--maiz)":undefined,fontWeight:f.tra?700:500}}
              onClick={()=>setF({...f,tra:!f.tra})}>{f.tra?"✓ ":""}Transferencia</button>
          </div>

          <button className="btn btn-maiz" style={{width:"100%"}} onClick={guardar}>
            Autorizar cuenta</button>
          <button className="btn btn-ghost" style={{width:"100%",marginTop:10}}
            onClick={()=>setNueva(false)}>Cancelar</button>
        </div>
      </div>
    )}
    <Aviso/>
  </>);
}

function Conciliacion({irTab}){
  const [tab,setTab]=useState("pendiente");   // pendiente | aprobado | observado | rechazado
  const [aviso,setAviso]=useState("");
  const toast=(m)=>{ setAviso(m); setTimeout(()=>setAviso(""),3200); };
  const [sel,setSel]=useState(null);          // cobro abierto
  const [accion,setAccion]=useState(null);    // observar | rechazar
  const [motivo,setMotivo]=useState("");
  const [nota,setNota]=useState("");
  const [tick,setTick]=useState(0);

  const COL={pendiente:"var(--maiz)", aprobado:"#2E7D52", observado:"#C77F00", rechazado:"#B5432E"};
  const LBL={pendiente:"Por revisar", aprobado:"Aprobados", observado:"Observados", rechazado:"Rechazados"};

  const cuenta=(e)=>COBROS_REPORTADOS.filter(c=>c.estado===e).length;
  const suma  =(e)=>COBROS_REPORTADOS.filter(c=>c.estado===e).reduce((a,c)=>a+c.monto,0);
  const lista = COBROS_REPORTADOS.filter(c=>c.estado===tab);

  const nuevoAu = ()=>"AU-260720-"+Math.floor(1000+Math.random()*9000);
  const ahora   = ()=>"20 jul 2026 "+new Date().toTimeString().slice(0,5);

  /* APROBAR: la única acción que libera la comisión */
  const aprobar=(c)=>{
    c.estado="aprobado"; c.verFecha=ahora(); c.au=nuevoAu();
    c.motivo=null; c.nota=null;
    setSel(null); setTick(t=>t+1);
    toast(`Cobro aprobado · la comisión queda liberada · ${c.au}`);
  };
  /* OBSERVAR: vuelve al cobrador para que él corrija el dato */
  const observar=()=>{
    const c=sel; if(!c) return;
    c.estado="observado"; c.motivo=motivo; c.nota=nota.trim();
    c.verFecha=ahora(); c.au=nuevoAu(); c.intentos=(c.intentos||0)+1;
    setAccion(null); setMotivo(""); setNota(""); setSel(null); setTick(t=>t+1);
    toast(`Observado · vuelve a ${c.cobrador} para que lo corrija`);
  };
  /* RECHAZAR: es un aviso al Freelance, no una anulación */
  const rechazar=()=>{
    const c=sel; if(!c) return;
    c.estado="rechazado"; c.motivo=motivo; c.nota=nota.trim();
    c.verFecha=ahora(); c.au=nuevoAu();
    setAccion(null); setMotivo(""); setNota(""); setSel(null); setTick(t=>t+1);
    toast("Rechazado · el Freelance decide si lo anula o lo devuelve");
  };

  /* ── FICHA DE UN COBRO ── */
  if(sel){
    const c = COBROS_REPORTADOS.find(x=>x.id===sel.id) || sel;
    return (<>
      <div className="eyebrow">Cobro reportado</div>
      <h1 className="h1">{c.cli}</h1>
      <div className="sub" style={{marginTop:4}}>{c.id} · {c.fecha} · {c.hora}</div>

      <div className="sec-gap" style={{height:16}} />
      <div className="hero">
        <div className="lbl">Monto reportado</div>
        <div className="big num">{money(c.monto)}</div>
        <div className="split">
          <div><div className="k">Forma</div><div className="v">{c.forma}</div></div>
          <div><div className="k">Banco</div><div className="v">{c.banco}</div></div>
          <div><div className="k">N° operación</div><div className="v num">{c.numero}</div></div>
        </div>
      </div>

      <div className="sec-gap" style={{height:12}} />
      <div className="card card-pad">
        <div className="sub tiny">Quién cobró</div>
        <div style={{fontWeight:600,fontSize:15,marginTop:2}}>{c.cobrador}</div>
        <div className="sub tiny">{c.rol}</div>
      </div>

      <div className="sec-gap" style={{height:12}} />
      <div className="card card-pad">
        <div className="sub tiny" style={{marginBottom:8}}>Facturas que cancela</div>
        {c.facturas.map((f,i)=>(
          <div className="row between" key={i} style={{padding:"5px 0"}}>
            <span style={{fontSize:14}}>{f.f}</span>
            <b className="num" style={{fontSize:14}}>{money(f.m)}</b>
          </div>
        ))}
      </div>

      {(c.estado==="observado"||c.estado==="rechazado") && (
        <>
          <div className="sec-gap" style={{height:12}} />
          <div className="card card-pad" style={{borderColor:COL[c.estado]}}>
            <div style={{fontWeight:700,fontSize:14,color:COL[c.estado]}}>
              {c.estado==="observado" ? "Observado" : "Rechazado"} · {c.motivo}</div>
            {c.nota && <div className="sub tiny" style={{marginTop:4}}>{c.nota}</div>}
            <div className="sub tiny" style={{marginTop:6}}>{c.verFecha} · {c.au}</div>

              <div className="sub tiny" style={{marginTop:8,fontWeight:600}}>

        </>
      )}

      {c.estado==="aprobado" && (
        <>
          <div className="sec-gap" style={{height:12}} />
          <div className="card card-pad" style={{borderColor:"#2E7D52"}}>
            <div style={{fontWeight:700,fontSize:14,color:"#2E7D52"}}>✓ Aprobado · comisión liberada</div>
            <div className="sub tiny" style={{marginTop:6}}>{c.verFecha} · {c.au}</div>
          </div>
        </>
      )}

      {c.intentos>=3 && (
        <>
          <div className="sec-gap" style={{height:12}} />
          <div className="card card-pad" style={{borderColor:"var(--maiz)"}}>
            <div style={{fontWeight:700,fontSize:14}}>Observado {c.intentos} veces</div>
            <div className="sub tiny" style={{marginTop:4}}>
              Conviene que lo revise el Freelance directamente.</div>
          </div>
        </>
      )}

      {c.estado==="pendiente" && (<>
        <div className="sec-gap" style={{height:16}} />
        <div className="card card-pad">
          <div className="sub tiny" style={{marginBottom:10}}>
            Compara con tu estado de cuenta y decide. Aprobar libera la comisión del cobrador.</div>
          <button className="btn btn-maiz" onClick={()=>aprobar(c)}>✓ Aprobar</button>
          <div className="row" style={{gap:10,marginTop:10}}>
            <button className="btn btn-ghost" style={{flex:1}}
              onClick={()=>{setMotivo("");setNota("");setAccion("observar");}}>Observar</button>
            <button className="btn btn-ghost" style={{flex:1,color:"#B5432E",borderColor:"#B5432E"}}
              onClick={()=>{setMotivo("");setNota("");setAccion("rechazar");}}>Rechazar</button>
          </div>
        </div>
      </>)}

      <div className="sec-gap" style={{height:12}} />
      <button className="btn btn-ghost" style={{width:"100%"}} onClick={()=>setSel(null)}>Volver</button>

    {aviso && (
      <div style={{position:"fixed",bottom:86,left:"50%",transform:"translateX(-50%)",zIndex:90,
        background:"#1E1B14",color:"#fff",borderRadius:12,padding:"12px 18px",fontSize:13,
        fontWeight:600,boxShadow:"0 6px 18px rgba(0,0,0,.35)",maxWidth:"88%"}}>{aviso}</div>
    )}

      {/* observar o rechazar: motivo obligatorio */}
      {accion && (
        <div className="scrim" onClick={()=>setAccion(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <h3>{accion==="observar" ? "¿Qué no calza?" : "¿Por qué lo rechazas?"}</h3>
            <div className="sub tiny" style={{margin:"6px 0 14px"}}>
              {accion==="observar"
                ? `Vuelve a ${c.cobrador} para que corrija el dato. Él tiene la foto del comprobante.`
                : "Se avisa al Freelance. Tú no anulas el cobro: él decide qué hacer."}
            </div>
            {(accion==="observar"?MOTIVOS_OBSERVAR:MOTIVOS_RECHAZAR).map(m=>(
              <button key={m} className="btn btn-ghost"
                style={{width:"100%",marginBottom:8,textAlign:"left",
                  fontWeight:motivo===m?700:500,
                  borderColor:motivo===m?"var(--maiz)":undefined}}
                onClick={()=>setMotivo(m)}>{motivo===m?"✓ ":""}{m}</button>
            ))}
            <input value={nota} onChange={e=>setNota(e.target.value)}
              placeholder="Explica brevemente (opcional)"
              style={{width:"100%",padding:"12px 14px",borderRadius:10,
                border:"1px solid var(--linea)",fontSize:14,marginTop:6,fontFamily:"inherit"}}/>
            <button className="btn btn-maiz" style={{marginTop:14}} disabled={!motivo}
              onClick={accion==="observar"?observar:rechazar}>
              {accion==="observar" ? "Devolver al cobrador" : "Avisar al Freelance"}</button>
            <button className="btn btn-ghost" style={{width:"100%",marginTop:10}}
              onClick={()=>setAccion(null)}>Cancelar</button>
          </div>
        </div>
      )}
    </>);
  }

  /* ── LISTA ── */
  return (<>
    <div className="eyebrow">Tu banco por fuera, tu decisión aquí</div>
    <h1 className="h1">Conciliación</h1>
    <div className="sub" style={{marginTop:4}}>
      Aprobar un cobro libera la comisión de quien lo hizo.</div>

    <div className="sec-gap" style={{height:14}} />
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {["pendiente","aprobado","observado","rechazado"].map(k=>(
        <button key={k} onClick={()=>setTab(k)}
          style={{background:tab===k?COL[k]:"var(--card)",
            border:`1px solid ${tab===k?COL[k]:"var(--linea)"}`,borderRadius:14,
            padding:"12px 13px",textAlign:"left",cursor:"pointer",fontFamily:"inherit"}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".03em",
            color:tab===k?"#fff":"var(--texto-3)"}}>{LBL[k]}</div>
          <div className="num" style={{fontSize:19,fontWeight:700,marginTop:3,
            color:tab===k?"#fff":COL[k]}}>{cuenta(k)}</div>
          <div className="num" style={{fontSize:12,
            color:tab===k?"rgba(255,255,255,.85)":"var(--texto-3)"}}>{money(suma(k))}</div>
        </button>

    </div>

    <div className="sec-gap" style={{height:16}} />
    {lista.length===0 && (
      <div className="card card-pad" style={{textAlign:"center"}}>
        <div className="sub">
          {tab==="pendiente" ? "Nada por revisar. Todo al día."

           : tab==="observado" ? "Sin cobros observados."
           : "Sin cobros rechazados."}</div>
      </div>
    )}
    {lista.map(c=>(
      <button key={c.id} className="card card-pad" onClick={()=>setSel(c)}
        style={{width:"100%",textAlign:"left",marginBottom:10,
          borderColor:c.estado==="pendiente"?"var(--maiz)":"var(--linea)"}}>
        <div className="row between">
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontWeight:600,fontSize:15,overflow:"hidden",
              textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.cli}</div>
            <div className="sub tiny">{c.forma} · {c.fecha}</div>
            <div className="sub tiny">👤 {c.cobrador}</div>
            {c.motivo && <div className="sub tiny" style={{color:COL[c.estado],fontWeight:600,
              marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.motivo}</div>}
          </div>
          <b className="num" style={{fontSize:16,flexShrink:0,marginLeft:10}}>{money(c.monto)}</b>
        </div>
      </button>
    ))}

    {aviso && (
      <div style={{position:"fixed",bottom:86,left:"50%",transform:"translateX(-50%)",zIndex:90,
        background:"#1E1B14",color:"#fff",borderRadius:12,padding:"12px 18px",fontSize:13,
        fontWeight:600,boxShadow:"0 6px 18px rgba(0,0,0,.35)",maxWidth:"88%"}}>{aviso}</div>
    )}
  </>);
}

function Creditos({ctx}){
  const {cred,setCred,contado,accion}=ctx;
  const [filtro,setFiltro]=useState("pendientes");
  const [ver,setVer]=useState(null);

  const pend=cred.filter(c=>c.estado==="pendiente");
  const hist=cred.filter(c=>c.estado!=="pendiente");
  const lista=filtro==="pendientes"?pend:hist;

  const resolver=(id,estado,extra)=> accion(()=>{
    setCred(prev=>prev.map(c=>c.id===id?{...c,estado,resuelta:"Hoy",...extra}:c));
    setVer(null);
  });

  return (
    <>
      <div className="eyebrow">Crédito de clientes</div>
      <h1 className="h1">Créditos</h1>
      <div className="sub" style={{marginTop:4}}>Clientes que piden comprar a crédito.</div>

      <div className="seg" style={{margin:"16px 0 14px"}}>
        <button className={filtro==="pendientes"?"on":""} onClick={()=>setFiltro("pendientes")}>Por aprobar · {pend.length}</button>
        <button className={filtro==="historial"?"on":""} onClick={()=>setFiltro("historial")}>Historial · {hist.length}</button>
      </div>

      {lista.length===0
        ? <div className="empty"><div className="ico">✓</div><div style={{marginTop:8,fontWeight:600}}>Sin créditos {filtro==="pendientes"?"por aprobar":"en historial"}</div></div>
        : <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {lista.map(c=> <CredCard key={c.id} c={c} onClick={()=>setVer(c)} />)}
          </div>}

      {/* Clientes de contado — solo referencia, sin aprobación */}
      {contado.length>0 &&
        <>
          <div className="sec-gap" />
          <div className="row between" style={{marginBottom:8}}>
            <div className="h2" style={{fontSize:16}}>Clientes de contado</div>
            <span className="chip chip-ok tiny" style={{padding:"3px 9px"}}>Sin aprobación</span>
          </div>
          <div className="sub tiny" style={{marginBottom:10}}>Compran de contado; no generan riesgo de cartera ni requieren tu visto bueno.</div>
          <div className="list-card">
            {contado.map(c=>(
              <div key={c.id} className="item">
                <div className="ava" style={{background:"var(--ok-suave)",color:"#1E5B40"}}>$</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:14}}>{c.cliente}</div>
                  <div className="tiny muted">{c.ciudad} · {c.origen} · {c.fecha}</div>
                </div>
                <span className="tiny" style={{color:"var(--ok)",fontWeight:600}}>Contado</span>
              </div>
            ))}
          </div>
        </>}

      {ver && <CredSheet c={ver} onClose={()=>setVer(null)} onResolver={resolver} />}
    </>
  );
}

function CredCard({c,onClick}){
  const e=ESTADO[c.estado];
  const docsOk=c.docs.filter(d=>d.ok).length;
  return (
    <button className="card card-pad" style={{width:"100%",textAlign:"left"}} onClick={onClick}>
      <div className="row between">
        <span className="chip chip-az">💳 Crédito cliente</span>
        <span className={"chip "+e.chip}>{c.estado==="pendiente"?"Por aprobar":c.estado==="aprobada"?"Aprobado":"Rechazado"}</span>
      </div>
      <div style={{fontWeight:600,fontSize:15,margin:"10px 0 2px"}}>{c.cliente}</div>
      <div className="sub tiny">{c.ciudad} · RUC {c.ruc}</div>
      <div className="row between" style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--linea)"}}>
        <div className="tiny muted">{c.origen}</div>
        <div style={{textAlign:"right"}}>
          <div className="tiny muted">Cupo sugerido</div>
          <div className="num" style={{fontWeight:600}}>{f(c.cupoSugerido)}</div>
        </div>
      </div>
      <div className="tiny muted" style={{marginTop:8}}>{docsOk}/{c.docs.length} documentos · {c.fecha}</div>
    </button>
  );
}

function CredSheet({c,onClose,onResolver}){
  const e=ESTADO[c.estado];
  const ro=c.estado!=="pendiente";
  const [modo,setModo]=useState(null);          // null | aprobar | rechazar
  const [monto,setMonto]=useState(String(c.cupoSugerido));
  const [motivo,setMotivo]=useState("");
  const [doc,setDoc]=useState(null);             // documento abierto en el visor
  const montoN=+monto;
  const montoValido=monto && montoN>0;
  const ajustado=montoValido && montoN!==c.cupoSugerido;
  const docsOk=c.docs.filter(d=>d.ok).length;

  return (
    <div className="scrim" onClick={onClose}>
      <div className="sheet" onClick={ev=>ev.stopPropagation()}>
        <div className="grip" />
        <div className="row between">
          <span className="chip chip-az">💳 Crédito de cliente</span>
          <span className={"chip "+e.chip}>{c.estado==="pendiente"?"Por aprobar":c.estado==="aprobada"?"Aprobado":"Rechazado"}</span>
        </div>
        <div className="h2" style={{margin:"12px 0 2px"}}>{c.cliente}</div>
        <div className="sub">{c.ciudad} · RUC {c.ruc}</div>

        {/* Datos del cliente */}
        <div className="card card-pad" style={{margin:"16px 0"}}>
          <Dato k="Solicitado por" v={c.origen} />
          <Dato k="Revisado por" v={c.revisadoPor} />
          <Dato k="Antigüedad del cliente" v={c.antiguedad} />
          <Dato k="Venta mensual estimada" v={f(c.ventaMensual)} />
          <Dato k="Cupo sugerido por el freelance" v={f(c.cupoSugerido)} />
        </div>

        {/* Documentos — abribles */}
        <div className="row between" style={{marginBottom:8}}>
          <div className="h2" style={{fontSize:15}}>Documentos y fotos</div>
          <span className="tiny muted">{docsOk}/{c.docs.length} recibidos</span>
        </div>
        <div className="list-card" style={{marginBottom:16}}>
          {c.docs.map(d=>(
            <button key={d.n} className="item" style={{width:"100%",textAlign:"left",cursor:d.ok?"pointer":"default"}}
              onClick={()=> d.ok && setDoc(d)} disabled={!d.ok}>
              <div className={"doc-thumb "+(!d.ok?"doc-falta":d.tipo==="img"?"doc-img":"doc-pdf")}>
                {!d.ok ? "—" : d.tipo==="img" ? "🖼" : "PDF"}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:500,fontSize:14}}>{d.n}</div>
                <div className="tiny" style={{color:d.ok?"var(--azul)":"var(--alerta)",fontWeight:600}}>
                  {d.ok? "Toca para ver · "+d.archivo : "Falta este documento"}
                </div>
              </div>
              {d.ok && <span style={{color:"var(--texto-3)",fontSize:18}}>⤢</span>}
            </button>
          ))}
        </div>

        {/* Nota del freelance */}
        {c.nota &&
          <div className="card card-pad" style={{background:"var(--azul-suave)",border:"none",marginBottom:16}}>
            <div className="tiny" style={{fontWeight:700,color:"#234A6E",marginBottom:4}}>NOTA DE {c.revisadoPor.toUpperCase()}</div>
            <div className="sub" style={{color:"#234A6E"}}>“{c.nota}”</div>
          </div>}

        {/* Resolución */}
        {ro
          ? <div className="card card-pad" style={{background:c.estado==="aprobada"?"var(--ok-suave)":"var(--alerta-suave)",border:"none"}}>
              <div style={{fontWeight:600,color:c.estado==="aprobada"?"#1E5B40":"#8A2A20"}}>
                {c.estado==="aprobada"? `Aprobado · cupo ${f(c.cupoAprobado)}` : "Rechazado"} · {c.resuelta}
              </div>
              {c.estado==="aprobada" && c.cupoAprobado!==c.cupoSugerido &&
                <div className="sub tiny" style={{marginTop:4}}>Ajustado desde el sugerido de {f(c.cupoSugerido)}.</div>}
              {c.motivoRechazo && <div className="sub tiny" style={{marginTop:4}}>{c.motivoRechazo}</div>}
            </div>
          : modo==="aprobar"
            ? <div>
                <div className="field">
                  <label>Cupo a aprobar</label>
                  <input type="number" value={monto} onChange={ev=>setMonto(ev.target.value)} placeholder={String(c.cupoSugerido)} />
                </div>
                {ajustado &&
                  <div className="tiny num" style={{fontWeight:600,margin:"8px 2px 0",color:montoN<c.cupoSugerido?"var(--espera)":"var(--ok)"}}>
                    {montoN<c.cupoSugerido?"Menor":"Mayor"} al sugerido · {f(Math.abs(montoN-c.cupoSugerido))} de diferencia
                  </div>}
                <div className="row" style={{gap:10,marginTop:16}}>
                  <button className="btn btn-ghost" onClick={()=>setModo(null)}>Atrás</button>
                  <button className="btn btn-ok" disabled={!montoValido} onClick={()=>onResolver(c.id,"aprobada",{cupoAprobado:montoN})}>Confirmar crédito</button>
                </div>
              </div>
          : modo==="rechazar"
            ? <div>
                <div className="field">
                  <label>Motivo del rechazo</label>
                  <textarea value={motivo} onChange={ev=>setMotivo(ev.target.value)} placeholder="Explica por qué no se aprueba el crédito…" />
                </div>
                <div className="row" style={{gap:10,marginTop:14}}>
                  <button className="btn btn-ghost" onClick={()=>setModo(null)}>Atrás</button>
                  <button className="btn btn-al" disabled={!motivo.trim()} onClick={()=>onResolver(c.id,"rechazada",{motivoRechazo:motivo.trim()})}>Confirmar rechazo</button>
                </div>
              </div>
          : <div className="row" style={{gap:10}}>
              <button className="btn btn-al" onClick={()=>setModo("rechazar")}>Rechazar</button>
              <button className="btn btn-ok" onClick={()=>setModo("aprobar")}>Aprobar crédito</button>
            </div>}
      </div>

      {doc && <VisorDoc doc={doc} cliente={c.cliente} onClose={()=>setDoc(null)} />}
    </div>
  );
}

function VisorDoc({doc,cliente,onClose}){

        <div>

        <button className="x" onClick={onClose} aria-label="Cerrar">✕</button>

              <div className="pg">
                <div className="ln" style={{width:"60%",height:13}} />
                <div className="ln" style={{width:"100%"}} />
                <div className="ln" style={{width:"95%"}} />
                <div className="ln" style={{width:"88%"}} />
                <div className="ln" style={{width:"100%"}} />
                <div className="ln" style={{width:"70%"}} />
                <div style={{height:10}} />
                <div className="ln" style={{width:"100%"}} />
                <div className="ln" style={{width:"92%"}} />
                <div className="ln" style={{width:"45%"}} />
              </div>
            </div>}
      </div>
    </div>
  );
}

  const totalPed=R.pedidos.reduce((a,b)=>a+b,0);
  const totalPag=R.pagado.reduce((a,b)=>a+b,0);
  const recaudoPeriodo=pct(totalPag,totalPed);

  // Top productos por monto
  const topOrden=[...R.topProductos].sort((a,b)=>b.monto-a.monto);
  const maxMonto=Math.max(...topOrden.map(p=>p.monto));

  // Propuestas y precios
  const propAprob=prop.filter(p=>p.estado==="aprobada").length;
  const propRech =prop.filter(p=>p.estado==="rechazada").length;
  const propPend =prop.filter(p=>p.estado==="pendiente").length;
  const preciosPend=cat.filter(p=>p.propuesto!=null).length;

  return (
    <>
      <div className="eyebrow">Tu desempeño con {fl.nombre}</div>

      {/* Resumen del periodo */}
      <div className="grid2" style={{margin:"16px 0 0"}}>

          <div className="d up">Tu línea</div>

        <div className="tile">
          <div className="k">Recaudo periodo</div>

          <div className="d muted">{fk(totalPag)} cobrado</div>
        </div>

        </div>
        <div className="bar" style={{marginBottom:14}}><i style={{width:pct(fl.porCobrar,fl.pedidoMes)+"%",background:"var(--maiz)"}}/></div>
        <div className="row between" style={{marginBottom:8}}>
          <span className="tiny muted">Vencido</span>
          <span className="tiny num" style={{fontWeight:600,color:"var(--alerta)"}}>{f(fl.vencido)}</span>
        </div>
        <div className="bar"><i style={{width:pct(fl.vencido,fl.pedidoMes)+"%",background:"var(--alerta)"}}/></div>
      </div>

      {/* Productos más pedidos */}
      <div className="sec-gap" />
      <div className="h2" style={{marginBottom:10}}>Productos más pedidos</div>
      <div className="card" style={{padding:"4px 16px 8px"}}>
        {topOrden.map((p,i)=>(
          <div key={p.nombre} style={{padding:"13px 0",borderBottom:i<topOrden.length-1?"1px solid var(--linea)":"none"}}>
            <div className="row between" style={{marginBottom:8}}>
              <div style={{fontWeight:600,fontSize:14}}>{p.nombre}</div>
              <div className="num" style={{fontWeight:600}}>{fk(p.monto)}</div>
            </div>
            <div className="bar"><i style={{width:(p.monto/maxMonto*100)+"%",background:"var(--tinta)"}}/></div>
            <div className="tiny muted" style={{marginTop:5}}>{p.unidades.toLocaleString("es-CO")} unidades</div>
          </div>
        ))}
      </div>

      {/* Propuestas y precios */}
      <div className="sec-gap" />
      <div className="h2" style={{marginBottom:10}}>Propuestas y precios</div>
      <button className="card card-pad row between" style={{width:"100%",textAlign:"left"}} onClick={()=>irTab("prop")}>
        <div className="row" style={{gap:18}}>
          <Cifra n={propAprob} lbl="aprobadas" color="var(--ok)" />
          <Cifra n={propRech} lbl="rechazadas" color="var(--alerta)" />
          <Cifra n={propPend} lbl="en espera" color="var(--espera)" />
        </div>
        <span style={{color:"var(--texto-3)",fontSize:22}}>›</span>
      </button>
      {preciosPend>0 &&
        <button className="card card-pad row between" style={{width:"100%",textAlign:"left",marginTop:12,borderColor:"var(--espera)"}} onClick={()=>irTab("precios")}>
          <div className="row" style={{gap:13}}>
            <div className="ava ava-m" style={{background:"var(--espera-suave)",color:"#8A5A12"}}>{preciosPend}</div>
            <div>
              <div style={{fontWeight:600,fontSize:14}}>Ajustes de precio en espera</div>
              <div className="sub tiny">Esperan aprobación del freelance</div>
            </div>
          </div>
          <span style={{color:"var(--texto-3)",fontSize:22}}>›</span>
        </button>}
    </>
  );
}
function Leyenda({color,lbl}){
  return <div className="row" style={{gap:6}}><span style={{width:11,height:11,borderRadius:3,background:color}}/><span className="tiny muted">{lbl}</span></div>;
}
function Cifra({n,lbl,color}){
  return <div><div className="num" style={{fontWeight:700,fontSize:22,color}}>{n}</div><div className="tiny muted">{lbl}</div></div>;
}

/* ====== CUENTA / ACUERDOS ====== */
function Cuenta({ctx,setLogueado,onSalir,setOnline,online,cola}){
  const {prop}=ctx;
  const fl=FREELANCE;
  const aprobadas=prop.filter(p=>p.estado==="aprobada").length;
  return (
    <>
      <div className="eyebrow">Relación comercial</div>
      <h1 className="h1">Acuerdos</h1>
      <div className="sec-gap" style={{height:16}} />

      <div className="card card-pad" style={{marginBottom:14}}>
        <div className="row" style={{gap:13}}>
          <div className="ava" style={{width:50,height:50,background:"var(--tinta)",color:"var(--maiz)",fontSize:17,borderRadius:14}}>DR</div>
          <div>
            <div className="eyebrow">Tu freelance</div>
            <div className="h2">{fl.nombre}</div>
            <div className="tiny muted">{fl.proyecto}</div>
          </div>
        </div>
      </div>

      <div className="card" style={{padding:"4px 16px"}}>
        <Dato k="Línea que abasteces" v={PROVEEDOR.linea} />
        <Dato k="Cupo de crédito acordado" v={f(fl.cupo)} />
        <Dato k="Saldo a tu favor" v={f(fl.porCobrar)} alerta={fl.vencido>0} />
        <Dato k="Propuestas aprobadas" v={aprobadas} />
        <Dato k="Relación desde" v={PROVEEDOR.desde} />
      </div>

      <div className="sec-gap" />
      <div className="card card-pad">
        <div className="row between">
          <div>
            <div style={{fontWeight:600,fontSize:14}}>{online?"Conectado":"Sin conexión"}</div>
            <div className="tiny muted">{cola>0? `${cola} cambios por sincronizar` : "Última sincronización: hoy · 09:20"}</div>
          </div>
          <button className={"btn btn-sm "+(online?"btn-ghost":"btn-maiz")} onClick={()=>setOnline(o=>!o)}>
            {online?"Simular sin conexión":"Reconectar"}
          </button>
        </div>
      </div>

      <div className="sec-gap" />
      <div className="list-card">
        {["Datos de mi empresa","Condiciones de pago","Notificaciones","Seguridad y huella","Ayuda"].map(x=>(
          <div key={x} className="item"><div style={{flex:1,fontWeight:500}}>{x}</div><span style={{color:"var(--texto-3)"}}>›</span></div>
        ))}
      </div>

      <div className="sec-gap" />
      <button className="btn btn-ghost" onClick={()=> onSalir ? onSalir() : setLogueado(false)}>Cerrar sesión</button>
      <div style={{textAlign:"center",marginTop:16,fontSize:11.5,color:"var(--texto-3)",lineHeight:1.6}}>
        FREELANCE · Proveedor · offline-first<br/>
        Versión {VERSION.fecha} b{VERSION.n} · {VERSION.desc}</div>
    </>
  );
}

function Root(){
  const [sesion,setSesion]=useState(null);
  if(!sesion) return (
    <div style={{minHeight:"100vh", background:CL.fondo, display:"flex", flexDirection:"column", maxWidth:480, margin:"0 auto"}}>
      <PantallaLogin onAutenticado={(u)=>setSesion(u)} />
    </div>
  );
  return <App usuario={sesion} onSalir={()=>setSesion(null)} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
<script>
/* ═ Nivel 2 de notificaciones: el service worker se registra SOLO al vivir en HTTPS (GitHub Pages).
   Abriendo el archivo local no hace nada (ni molesta): el candado espera su momento. ═ */
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("./sw.js").catch(function(){ /* sin permiso o sin red: la app sigue normal */ });
}
</script>
</body>
</html>
