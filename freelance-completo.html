      <button className={"selmini"+((desde||hasta)?" on":"")} onClick={()=>setVerFechas(v=>!v)}>
        {(desde||hasta) ? `${desde?desde.slice(5):"…"}→${hasta?hasta.slice(5):"…"}` : "Fecha"} ▾
      </button>
      <FiltroBuscador estilo={{flex:1,minWidth:110}} items={["recientes","antiguos","comision"]}
        value={orden} onPick={v=>{setOrden(v==="__"?"recientes":v);setPagina(1);}}
        todos="__" etiquetaTodos="Ordenar…"
        render={v=>({recientes:"Recientes",antiguos:"Antiguos",comision:"Mayor comisión"})[v]||v}/>
    </div>

    {verFechas && (
      <div className="card" style={{padding:"12px 14px",marginBottom:12}}>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}><label className="meta" style={{fontSize:10.5,display:"block",marginBottom:3}}>Desde</label>
            <input type="date" value={desde} onChange={e=>{setDesde(e.target.value);setPagina(1);}} style={{width:"100%",padding:"8px 10px",border:"1px solid var(--line)",borderRadius:9,fontFamily:"inherit"}}/></div>
          <div style={{flex:1}}><label className="meta" style={{fontSize:10.5,display:"block",marginBottom:3}}>Hasta</label>
            <input type="date" value={hasta} onChange={e=>{setHasta(e.target.value);setPagina(1);}} style={{width:"100%",padding:"8px 10px",border:"1px solid var(--line)",borderRadius:9,fontFamily:"inherit"}}/></div>
        </div>
        {(desde||hasta) && <button className="mini-link" style={{marginTop:8}} onClick={()=>{setDesde("");setHasta("");}}>Quitar fechas</button>}
      </div>
    )}

    {visibles.map(p=>{
      const monto=p.cant*p.precio;
      const fechaCorta=(()=>{ const d=new Date(p.fecha+"T00:00:00"); const ms=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
        return isNaN(d)?p.fecha:`${d.getDate()} ${ms[d.getMonth()]}`; })();
      const abrir=(comoVer)=>{ setVerComo(comoVer); setSel(p.id); };
      return (
      <div className="card" key={p.id} style={{padding:0,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"stretch",minWidth:0}}>
          {/* mitad izquierda → factura */}
          <button onClick={()=>abrir("factura")}
            style={{flex:1,minWidth:0,display:"flex",alignItems:"center",gap:8,padding:"12px 10px 12px 14px",
              background:"none",border:"none",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
            <span className="d" style={{flexShrink:0,width:8,height:8,borderRadius:"50%",
              background:p.sync==="pend"?"var(--maize-deep)":"var(--ok)"}}></span>
            <span style={{flexShrink:0,fontSize:12.5,fontWeight:600,color:"var(--muted)"}}>{fechaCorta}</span>
            <span style={{flex:1,minWidth:0,fontSize:13.5,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.cli}</span>
          </button>
          {/* mitad derecha → seguimiento */}
          <button onClick={()=>abrir("seguimiento")}
            style={{flexShrink:0,display:"flex",alignItems:"center",gap:8,padding:"12px 14px 12px 10px",
              background:"none",border:"none",borderLeft:"1px solid #F0ECE2",cursor:"pointer",fontFamily:"inherit"}}>
            <span style={{fontSize:12.5,color:"var(--muted)"}}>{p.cant} qq</span>
            <span className="num" style={{fontSize:14,fontWeight:800,color:"var(--field)"}}>{money(monto)}</span>
            <span style={{color:"var(--muted)",fontSize:15}}>›</span>
          </button>
        </div>
      </div>
      );
    })}
    {ordenada.length===0 && <div className="ph">{pestana==="historial"?"Aún no tienes pedidos con comisión liberada.":"Sin pedidos que coincidan."}</div>}

    {/* paginación */}
    {totalPag>1 && (
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,margin:"14px 0 4px"}}>
        <button className="selmini" style={{width:"auto",opacity:pagActual<=1?.4:1}} disabled={pagActual<=1}
          onClick={()=>setPagina(p=>Math.max(1,p-1))}>‹ Anterior</button>
        <span className="meta" style={{fontSize:12}}>Página {pagActual} de {totalPag}</span>
        <button className="selmini" style={{width:"auto",opacity:pagActual>=totalPag?.4:1}} disabled={pagActual>=totalPag}
          onClick={()=>setPagina(p=>Math.min(totalPag,p+1))}>Siguiente ›</button>
      </div>
    )}
  </>);
}

function DetallePedido({p, modo="factura", volver}){
  const [vista,setVista]=useState(modo); // factura | seguimiento
  const cumplidos = p.linea.filter(x=>x.st==="ok").length;
  const monto=p.cant*p.precio;
  const fmt=f=>{ const d=new Date(f+"T00:00:00"); const ms=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
    return isNaN(d)?f:`${d.getDate()} ${ms[d.getMonth()]} ${d.getFullYear()}`; };
  return (<>
    <button className="ghost" onClick={volver} style={{marginTop:0,marginBottom:14,textAlign:"left"}}>‹ Volver a mis pedidos</button>

    {/* toggle entre Factura y Seguimiento */}
    <div className="eq-tabs" style={{marginBottom:16}}>
      <button className={vista==="factura"?"on":""} onClick={()=>setVista("factura")}>🧾 Factura</button>
      <button className={vista==="seguimiento"?"on":""} onClick={()=>setVista("seguimiento")}>📍 Seguimiento</button>
    </div>

    {vista==="factura" ? (
      <div className="card" style={{padding:"16px 16px 14px"}}>
        {/* encabezado tipo factura */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:8,marginBottom:2}}>
          <span style={{fontWeight:800,fontSize:16}}>{p.cli}</span>
          <span className="meta" style={{fontSize:11.5,whiteSpace:"nowrap"}}>{fmt(p.fecha)}</span>
        </div>
        <div className="meta" style={{fontSize:11.5,marginBottom:12}}>{p.prov} · {p.cond}</div>

        {/* líneas de producto: 3 columnas alineadas */}
        <div style={{borderTop:"1px solid #EFEBE0",paddingTop:10}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:10,fontSize:10,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em",marginBottom:7}}>
            <span>Producto</span><span style={{textAlign:"right"}}>Cant.</span><span style={{textAlign:"right"}}>Precio / Total</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:10,alignItems:"start",padding:"2px 0"}}>
            <span style={{minWidth:0,fontSize:13,fontWeight:600,lineHeight:1.3}}>{(p.prod||"").replace(" · "," ")}</span>
            <span className="num" style={{textAlign:"right",fontSize:13,whiteSpace:"nowrap"}}>{p.cant} qq</span>
            <span style={{textAlign:"right",whiteSpace:"nowrap"}}>
              <span className="num" style={{display:"block",fontSize:14,fontWeight:800}}>{money(monto)}</span>
              <span className="meta" style={{fontSize:10.5}}>{money(p.precio)} c/u</span>
            </span>
          </div>
        </div>

        {/* totales */}
        <div style={{borderTop:"1px solid #EFEBE0",marginTop:12,paddingTop:10}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"3px 0"}}>
            <span className="meta">Monto del pedido</span><span className="num" style={{fontWeight:700}}>{money(monto)}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:14,padding:"6px 0 0",borderTop:"1px dashed #E0DBCE",marginTop:6}}>
            <span style={{fontWeight:700}}>Tu comisión</span>
            <span className="num" style={{fontWeight:800,color:"var(--field)"}}>{money(p.comision)}</span>
          </div>
        </div>

        <div style={{marginTop:12}}>
          <span className={"chip "+(p.sync==="pend"?"c-sync":"c-ok")}>
            <span className="d"></span>{p.estado}</span>
        </div>
      </div>
    ) : (
      <>
        <div className="det-head">
          <div className="row" style={{alignItems:"center"}}>
            <span className={"chip "+(p.sync==="pend"?"c-sync":"c-ok")}>
              <span className="d"></span>{p.sync==="pend"?"Pendiente de enviar":"Sincronizado"}</span>
            <span className="meta" style={{fontWeight:600}}>{cumplidos} de {p.linea.length} pasos</span>
          </div>
        </div>
        <div className="sec-h"><h2>Seguimiento del pedido</h2><div className="grain"></div></div>
        <div className="tl">
          {p.linea.map((x,i)=>(
            <div className={"item "+x.st} key={i}>
              <div className="node">{x.st==="ok"?"✓":x.st==="now"?"●":i+1}</div>
              <div className="c">
                <div className="tt">{x.t}</div>
                {x.d && <div className="dd">{x.d}</div>}
                <div className="ff">{x.f}</div>
              </div>
            </div>
          ))}
        </div>
      </>
    )}
  </>);
}

function Stock({toast}){
  useRetroceso(()=>{
      if(prov){ setProv(null); return true; }
      if(cli){ setCli(null); return true; }
      return false;
    });
  const [cli,setCli]=useState(null);
  const [prov,setProv]=useState(null);
  const [cant,setCant]=useState({}); // productoId -> unidades en bodega del cliente
  const set=(id,v)=>setCant({...cant,[id]:v});
  const conDato = Object.values(cant).filter(v=>v!=="" && v!==undefined).length;

  const compradosIds = cli ? PRESENTACIONES.filter(p=>HISTORIAL[cli+"|"+p.id]).map(p=>p.id) : [];
  const provsDelCliente = cli ? PROVEEDORES.filter(pv =>
    PRESENTACIONES.some(p => p.provId===pv.id && compradosIds.includes(p.id))
  ) : [];
  const productosProv = (cli && prov)
    ? PRESENTACIONES.filter(p=>p.provId===prov.id && compradosIds.includes(p.id)) : [];

  return (<>
    <div className="h1">Registrar stock</div>
    <div className="sub">Anota lo que le queda al cliente en bodega. Sube para que el proveedor sepa cuándo reabastecer.</div>

    <SearchSelect label="Cliente visitado" items={CLIENTES} value={cli} multiPalabra
      onPick={c=>{setCli(c);setProv(null);setCant({});}} onClear={()=>{setCli(null);setProv(null);setCant({});}}
      render={{
        text:c=>c,
        option:c=>(<div className="o1">{c}</div>),
        picked:c=>(<><div className="p1">{c}</div><div className="p2">Bodega del cliente</div></>)
      }}/>

    {cli && (
      provsDelCliente.length>0 ? (
        <SearchSelect label="Proveedor" items={provsDelCliente} value={prov}
          onPick={p=>{setProv(p);setCant({});}} onClear={()=>{setProv(null);setCant({});}}
          hint={`${provsDelCliente.length} proveedor(es) con productos que ${cli} ya ha comprado`}
          render={{
            text:p=>p.nombre,
            option:p=>(<div className="o1">{p.nombre}</div>),
            picked:p=>(<><div className="p1">{p.nombre}</div><div className="p2">Productos que el cliente ya compra</div></>)
          }}/>
      ) : (
        <div className="ph">{cli} no tiene compras registradas todavía. El stock se registra sobre productos que el cliente ya ha comprado.</div>
      )
    )}

    {cli && prov && (<>
      <div className="sec-h"><h2>Unidades en bodega</h2><div className="grain"></div></div>
      {productosProv.length===0 && <div className="ph">{cli} no ha comprado productos de {prov.nombre}.</div>}
      {productosProv.map(p=>{
        const ant = STOCK_ANTERIOR[cli+"|"+p.id];
        const actual = cant[p.id]!==""&&cant[p.id]!==undefined ? parseInt(cant[p.id])||0 : null;
        const dif = (ant && actual!==null) ? actual-ant.cant : null;
        return (
          <div className="card" key={p.id} style={{padding:"12px 14px"}}>
            <div className="row" style={{alignItems:"center"}}>
              <div style={{flex:1}}>
                <div className="cli" style={{fontSize:14}}>{p.nombre}</div>
                <div className="meta">
                  {ant ? `Última vez: ${ant.cant} ${p.unidad} · ${ant.fecha}` : `Sin registro anterior · por ${p.unidad}`}
                </div>
              </div>
              <div className="stepper" style={{width:150}}>
                <button onClick={()=>set(p.id,Math.max(0,(parseInt(cant[p.id])||0)-1))}>−</button>
                <input className="num" type="number" placeholder="0" value={cant[p.id]??""}
                  onChange={e=>set(p.id,e.target.value)}/>
                <button onClick={()=>set(p.id,(parseInt(cant[p.id])||0)+1)}>+</button>
              </div>
            </div>
            {dif!==null && (
              <div className="meta" style={{marginTop:8,fontWeight:600,
                color: dif<0?"var(--field)":dif>0?"var(--maize-deep)":"var(--muted)"}}>
                {dif<0 ? `▼ Bajó ${Math.abs(dif)} desde la última visita (rota bien)`
                  : dif>0 ? `▲ Subió ${dif} (acumuló stock)`
                  : "= Igual que la última visita"}
              </div>
            )}
          </div>
        );
      })}
      <button className="cta" disabled={conDato===0}
        onClick={()=>{toast("Stock registrado. Se enviará al proveedor al recuperar señal.");setCli(null);setProv(null);setCant({});}}>
        Guardar stock del cliente</button>
      <div className="lock"><span>📡</span>
        <span>{prov.nombre} verá el stock de sus productos en la bodega de {cli} para planificar despachos y promociones.</span></div>
    </>)}
  </>);
}

function DetalleFactura({it, volver, toast, onCobrar}){
  const [verImg,setVerImg]=useState(null);
  useModal(verImg, React.useCallback(()=>setVerImg(null),[])); // "guia" | "factura" | null
  const d=detalleDe(it.fac, it.saldo, it.cli);
  const sumAbonos=d.abonos.reduce((s,a)=>s+a.monto,0);
  const sumRet=d.retenciones.reduce((s,r)=>s+r.monto,0);
  const sumNC=d.notasCredito.reduce((s,n)=>s+n.monto,0);
  const saldoCalc=(d.total||it.saldo)-sumAbonos-sumRet-sumNC;

  const Imagen=({tipo})=>{
    const firmada = tipo==="guia" ? (d.guia&&d.guia.firmada) : d.facturaFirmada;
    const titulo = tipo==="guia" ? "Guía de remisión" : "Factura";
    return (
      <div className="ov" onClick={()=>setVerImg(null)}>
        <div className="sheet" onClick={e=>e.stopPropagation()}>
          <h3>{titulo} firmada</h3>
          <div className="sh-sub">Subida por el transportista al entregar</div>
          <div style={{background:"#0E2A20",borderRadius:12,padding:"14px",margin:"4px 0 12px",textAlign:"center"}}>
            <div style={{background:"var(--card)",borderRadius:8,minHeight:280,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,padding:"24px 16px"}}>
              <div style={{fontSize:42}}>{tipo==="guia"?"📄":"🧾"}</div>
              <div style={{fontSize:13,color:"#555",fontWeight:600}}>{titulo} {tipo==="guia"?d.guia?.num:it.fac}</div>
              <div style={{fontSize:12,color:"#888",maxWidth:200}}>Imagen del documento físico recibido en bodega del cliente</div>
              {firmada && <div style={{borderTop:"2px solid #333",marginTop:18,paddingTop:4,fontFamily:"cursive",fontSize:22,color:"#1a3a8a"}}>{d.guia?.recibidoPor||it.cli}</div>}
              <div style={{fontSize:11,color:"#aaa"}}>Firma de recepción del cliente</div>
            </div>
          </div>
          <button className="back" style={{width:"100%"}} onClick={()=>setVerImg(null)}>Cerrar</button>
        </div>
      </div>
    );
  };

  const [vista,setVista]=useState("factura"); // factura | entrega
  return (<>
    <button className="ghost" onClick={volver} style={{marginTop:0,marginBottom:14,textAlign:"left"}}>‹ Volver a cartera</button>

    {/* encabezado destacado */}
    <div className="card" style={{padding:"16px 16px 14px",marginBottom:12,
      borderLeft:`4px solid ${it.v==="bad"?"var(--clay)":it.v==="warn"?"#C9A227":"var(--field)"}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
        <div style={{minWidth:0}}>
          <div style={{fontWeight:800,fontSize:17,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.cli}</div>
          <div className="meta" style={{fontSize:11.5,marginTop:2}}>Factura {(it.fac||"").replace(/^001-001-/,"")}</div>
          {it.vendedor && <div className="meta" style={{fontSize:11.5}}>👤 {it.vendedor}</div>}
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div className="num" style={{fontSize:22,fontWeight:800,color:"var(--field)"}}>{money(saldoCalc>0?saldoCalc:0)}</div>
          <div className="meta" style={{fontSize:10.5}}>saldo por cobrar</div>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,marginTop:12}}>
        <span className={"chip "+(it.v==="bad"?"c-bad":it.v==="warn"?"c-sync":"c-wait")}>
          <span className="d"></span>{it.estado}</span>
        <button className="mini-cta" onClick={()=>{ if(onCobrar) onCobrar(it); else toast(`Cobrar ${it.cli} · ${money(saldoCalc>0?saldoCalc:0)}.`); }}>Cobrar →</button>
      </div>
    </div>

    {/* 2 pestañas */}
    <div className="eq-tabs" style={{marginBottom:14}}>
      <button className={vista==="factura"?"on":""} onClick={()=>setVista("factura")}>🧾 Factura</button>
      <button className={vista==="entrega"?"on":""} onClick={()=>setVista("entrega")}>🚚 Entrega y pagos</button>
    </div>

    {vista==="factura" ? (<>
      {(d.items&&d.items.length>0) && (
      <div className="card">
        {d.pedido && <div className="meta" style={{marginBottom:10}}>{d.pedido.prov} · {d.pedido.cond} · facturado {d.pedido.fecha}</div>}
        <div className="fac-row fac-head">
          <span style={{flex:1}}>Producto</span>
          <span style={{width:34,textAlign:"right"}}>Cant.</span>
          <span style={{width:62,textAlign:"right"}}>P. unit.</span>
          <span style={{width:70,textAlign:"right"}}>Subtotal</span>
        </div>
        {d.items.map((it2,i)=>(
          <div className="fac-row" key={i}>
            <span style={{flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis"}}>{(it2.prod||"")}</span>
            <span className="num" style={{width:34,textAlign:"right"}}>{it2.cant}</span>
            <span className="num" style={{width:62,textAlign:"right"}}>{money(it2.precio)}</span>
            <span className="num" style={{width:70,textAlign:"right"}}>{money(it2.cant*it2.precio)}</span>
          </div>
        ))}
        <div className="fac-row" style={{borderTop:"1px solid var(--line)",marginTop:6,paddingTop:8,fontWeight:700}}>
          <span style={{flex:1}}>Total facturado</span>
          <span className="num">{money(d.total)}</span>
        </div>
      </div>
      )}

function AgingDetalle({tramos, tramoIni, base, totalCartera, volver, onFactura}){
  const [modo,setModo]=useState("cliente"); // cliente | factura
  const [chip,setChip]=useState(tramoIni||"Todos"); // Todos | nombre de tramo
  // chips: Todos + los 5 tramos
  const CHIPS=[{k:"Todos",color:"var(--field)",monto:totalCartera,test:()=>true},...tramos];
  const chipSel=CHIPS.find(c=>c.k===chip)||CHIPS[0];
  const facturas=base.filter(chipSel.test).sort((a,b)=>b.dias-a.dias);
  const totChip=chipSel.k==="Todos"?totalCartera:facturas.reduce((s,f)=>s+f.saldo,0);
  // agrupar por cliente dentro del chip
  const porCli=Array.from(new Set(facturas.map(f=>f.cli))).map(cli=>{
    const fsChip=facturas.filter(f=>f.cli===cli);
    const todasCli=base.filter(f=>f.cli===cli);
    const vencCli=fsChip.filter(f=>f.dias>0).reduce((s,f)=>s+f.saldo,0);
    return {
      cli,
      saldoTotal: todasCli.reduce((s,f)=>s+f.saldo,0),   // toda la deuda del cliente
      saldoVenc: chipSel.k==="Todos" ? vencCli : fsChip.reduce((s,f)=>s+f.saldo,0), // vencido real en Todos; tramo completo si es un tramo
      diasMax: Math.max(...fsChip.map(f=>f.dias),0),
      nFac: fsChip.length,
    };
  }).sort((a,b)=>b.saldoVenc-a.saldoVenc);

  return (<>
    <button className="ghost" onClick={volver} style={{marginTop:0,marginBottom:14,textAlign:"left"}}>‹ Volver al resumen</button>

    <div className="card" style={{padding:"14px 16px",marginBottom:12,borderLeft:`4px solid ${chipSel.color}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
        <div style={{minWidth:0}}>
          <div style={{fontWeight:800,fontSize:16}}>{chipSel.k==="Todos"?"Cartera total":chipSel.k}</div>
          <div className="meta" style={{fontSize:11.5}}>{facturas.length} factura(s) · {porCli.length} cliente(s)</div>
        </div>
        <div className="num" style={{fontSize:20,fontWeight:800,color:chipSel.color,whiteSpace:"nowrap"}}>{money(totChip)}</div>
      </div>
    </div>

    {/* chips de tramo (deslizables) */}
    <div className="tipochips" style={{marginBottom:14}}>
      {CHIPS.map(c=>(
        <button key={c.k} className={"tchip"+(chip===c.k?" on":"")} onClick={()=>setChip(c.k)}>
          <span className="tchip-nom" style={chip===c.k?{color:"#fff"}:{color:"var(--ink)"}}>{c.k}</span>
        </button>
      ))}
    </div>

    {/* conmutador Por cliente / Por factura */}
    <div className="eq-tabs" style={{marginBottom:14}}>
      <button className={modo==="cliente"?"on":""} onClick={()=>setModo("cliente")}>Por cliente</button>
      <button className={modo==="factura"?"on":""} onClick={()=>setModo("factura")}>Por factura</button>
    </div>

    {/* encabezado de columnas */}
    <div style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:8,padding:"0 12px 6px",
      fontSize:9.5,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".02em"}}>
      <span>Cliente</span>
      <span style={{textAlign:"right",width:84}}>S. Vencido</span>
      <span style={{textAlign:"right",width:44}}>Días</span>
    </div>

    {modo==="cliente"
      ? porCli.map((c,i)=>(
        <div className="card" key={i} style={{padding:"11px 12px",marginBottom:8}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:8,alignItems:"center"}}>
            <span style={{minWidth:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {c.cli}{c.nFac>1 && <span className="meta" style={{fontWeight:600,fontSize:10.5}}> · {c.nFac} fac.</span>}</span>
            <span className="num" style={{textAlign:"right",width:84,fontSize:13,fontWeight:700,color:chipSel.color}}>{money(c.saldoVenc)}</span>
            <span className="num" style={{textAlign:"right",width:44,fontSize:12.5,fontWeight:700}}>{c.diasMax>0?c.diasMax:"—"}</span>
          </div>
        </div>
      ))
      : facturas.map((f,i)=>(
        <button className="card" key={i} onClick={()=>onFactura(f)}
          style={{display:"block",width:"100%",padding:"11px 12px",marginBottom:8,textAlign:"left",cursor:"pointer",fontFamily:"inherit",border:"1px solid var(--line)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:8,alignItems:"center"}}>
            <span style={{minWidth:0}}>
              <span style={{display:"block",fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.cli}</span>
              <span className="meta" style={{fontSize:10}}>Fact. {(f.fac||"").replace(/^001-001-/,"")}</span>
            </span>
            <span className="num" style={{textAlign:"right",width:84,fontSize:13,fontWeight:700,color:chipSel.color}}>{money(f.saldo)}</span>
            <span className="num" style={{textAlign:"right",width:44,fontSize:12.5,fontWeight:700}}>{f.dias>0?f.dias:"—"}</span>
          </div>
        </button>
      ))}
    {facturas.length===0 && <div className="ph">Sin facturas en este tramo.</div>}
  </>);
}

function Cartera({toast, onCobrar, clienteIni, onClienteConsumido}){
  const [verFac,setVerFac]=useState(null); // factura abierta en detalle
  const [q,setQ]=useState("");
  const [pestana,setPestana]=useState("resumen"); // resumen | facturas | analisis | cheques
  const [fZona,setFZona]=useState("Todas");
  const [fVend,setFVend]=useState("Todos");
  const [fProv,setFProv]=useState("Todos");
  const [fCiudad,setFCiudad]=useState("Todas");
  const [fCli,setFCli]=useState("Todos");
  const [fEstado,setFEstado]=useState("Todos");   // Todos | porvencer | vencidas
  const [fAging,setFAging]=useState("Todos");      // Todos | 1-30 | 31-60 | 61-90 | +90
  const [verFiltros,setVerFiltros]=useState(false);
  useModal(verFiltros, React.useCallback(()=>setVerFiltros(false),[])); // panel de filtros plegable
  const [secAbierta,setSecAbierta]=useState("deudores"); // sección de análisis abierta (acordeón)
  const [verAging,setVerAging]=useState(null); // tramo abierto al tocar la dona
  const [pagFac,setPagFac]=useState(1); // paginación de facturas
  const [subCheque,setSubCheque]=useState("resumen"); // resumen | historial
  const [verChq,setVerChq]=useState(null); // cheque abierto
  const [qChq,setQChq]=useState(""); // búsqueda en historial de cheques
  const [qCart,setQCart]=useState(""); // búsqueda en cheques en cartera
  /* si se abre desde la ficha de un cliente, filtra Facturas por ese cliente */
  React.useEffect(()=>{
    if(clienteIni){ setQ(clienteIni); setPestana("facturas"); if(onClienteConsumido) onClienteConsumido(); }
  // eslint-disable-next-line
  },[clienteIni]);
  /* botón atrás inteligente: cierra de adentro hacia afuera dentro del módulo */
  useRetroceso(()=>{
      if(verChq){ setVerChq(null); return true; }        // cierra detalle de cheque
      if(verFac){ setVerFac(null); return true; }        // cierra detalle de factura
      if(verAging){ setVerAging(null); return true; }    // cierra ventana de antigüedad
      if(verFiltros){ setVerFiltros(false); return true; } // cierra panel de filtros
      if(pestana!=="resumen"){ setPestana("resumen"); return true; } // vuelve a Resumen
      return false;  // ya en la raíz: deja salir del módulo
    });
  const items=[...CARTERA_INI, ...CARTERA_CHEQUES];
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const opc=(campo)=>Array.from(new Set(items.map(i=>i[campo]))).sort();
  const tramoDe=d=> d<=0?"porvencer" : d<=30?"30" : d<=45?"45" : d<=60?"60" : "venc";

  const base = items.filter(it=>{
    if(fZona!=="Todas"   && it.zona!==fZona)        return false;
    if(fVend!=="Todos"   && it.vendedor!==fVend)    return false;
    if(fProv!=="Todos"   && it.proveedor!==fProv)   return false;
    if(fCiudad!=="Todas" && it.ciudad!==fCiudad)    return false;
    if(fCli!=="Todos"    && it.cli!==fCli)          return false;
    if(fEstado==="vencidas"  && it.dias<=0)         return false;
    if(fEstado==="porvencer" && it.dias>0)          return false;
    if(fAging!=="Todos"  && tramoDe(it.dias)!==fAging) return false;
    if(q.trim()!==""){
      const t=norm(q);
      const txt=norm(`${it.cli} ${it.vendedor} ${it.proveedor} ${it.prov} ${it.ciudad} ${it.zona} ${it.barrio} ${it.fac}`);
      if(!t.split(/\s+/).filter(Boolean).every(w=>txt.includes(w))) return false;
    }
    return true;
  });
  const nFiltros=[fZona!=="Todas",fVend!=="Todos",fProv!=="Todos",fCiudad!=="Todas",fCli!=="Todos",fEstado!=="Todos",fAging!=="Todos"].filter(Boolean).length;
  const limpiarFiltros=()=>{setFZona("Todas");setFVend("Todos");setFProv("Todos");setFCiudad("Todas");setFCli("Todos");setFEstado("Todos");setFAging("Todos");setQ("");};

  const prio={bad:0,warn:1,ok:2};
  const lista=base;
  const listaOrd=[...base].sort((a,b)=> prio[a.v]-prio[b.v] || b.saldo-a.saldo);
  const total=base.reduce((s,i)=>s+i.saldo,0);
  const nVenc=base.filter(i=>i.v==="bad").length;
  const montoVenc=base.filter(i=>i.v==="bad").reduce((s,i)=>s+i.saldo,0);

  const totalCartera=base.reduce((s,i)=>s+i.saldo,0);
  const vencido=base.filter(i=>i.dias>0).reduce((s,i)=>s+i.saldo,0);
  const morosidadPct=totalCartera>0?Math.round(vencido/totalCartera*100):0;
  const factVenc=base.filter(i=>i.dias>0);
  const diasProm=factVenc.length>0
    ? Math.round(factVenc.reduce((s,i)=>s+i.dias*i.saldo,0)/factVenc.reduce((s,i)=>s+i.saldo,0)) : 0;
  const tramos=[
    {k:"Al día", test:i=>i.dias<=0, color:"#2E7D52"},
    {k:"30 días",  test:i=>i.dias>0&&i.dias<=30, color:"#C9A227"},
    {k:"45 días", test:i=>i.dias>30&&i.dias<=45, color:"#D98324"},
    {k:"60 días", test:i=>i.dias>45&&i.dias<=60, color:"#C2603A"},
    {k:"Vencidos",   test:i=>i.dias>60, color:"#A33B2A"},
  ].map(t=>({...t, monto:base.filter(t.test).reduce((s,i)=>s+i.saldo,0)}));
  const maxTramo=Math.max(...tramos.map(t=>t.monto),1);
  const vendedores=Array.from(new Set(base.map(i=>i.vendedor))).map(v=>{
    const fs=base.filter(i=>i.vendedor===v);
    const tot=fs.reduce((s,i)=>s+i.saldo,0);
    const ven=fs.filter(i=>i.dias>0).reduce((s,i)=>s+i.saldo,0);
    return {v, total:tot, vencido:ven, mor:tot>0?Math.round(ven/tot*100):0, n:fs.length};
  }).sort((a,b)=>b.vencido-a.vencido);
  const topDeudores=[...base].filter(i=>i.dias>0).sort((a,b)=>b.saldo-a.saldo).slice(0,4);
  const porCliente=Array.from(new Set(base.map(i=>i.cli))).map(c=>({
    cli:c, monto:base.filter(i=>i.cli===c).reduce((s,i)=>s+i.saldo,0)
  })).sort((a,b)=>b.monto-a.monto);
  const concentracion=totalCartera>0?Math.round((porCliente.slice(0,2).reduce((s,c)=>s+c.monto,0))/totalCartera*100):0;
  const proximos=base.filter(i=>i.dias<0&&i.dias>=-7).sort((a,b)=>b.dias-a.dias);

  if(verChq) return <ChequeDetalle cheque={verChq} volver={()=>setVerChq(null)} toast={toast}
    subActual={subCheque} irA={(sub)=>{ setSubCheque(sub); setVerChq(null); }}/>;
  if(verFac) return <DetalleFactura it={verFac} volver={()=>setVerFac(null)} toast={toast} onCobrar={onCobrar}/>;
  if(verAging){
    return <AgingDetalle tramos={tramos} tramoIni={verAging} base={base} totalCartera={totalCartera}
      volver={()=>setVerAging(null)} onFactura={f=>{setVerAging(null);setVerFac(f);}}/>;
  }

  return (<>
    <div className="h1">Cartera</div>
    <div className="eq-tabs">
      <button className={pestana==="facturas"?"on":""} onClick={()=>setPestana("facturas")}>Facturas</button>
      <button className={pestana==="cheques"?"on":""} onClick={()=>setPestana("cheques")}>Cheques</button>
    </div>

    {pestana==="resumen" && <div className="hero-mini" style={{marginTop:0,marginBottom:14}}>
      <div>
        <div className="hm-lbl">Total por cobrar</div>
        <div className="hm-big num">{money(total)}</div>
      </div>
      <div className="hm-side">
        <div className="hm-k">Pendientes · {lista.length}</div>
        <div className="hm-k" style={{color:nVenc>0?"#C2603A":"var(--muted)"}}>Vencidas · {nVenc} · {money(montoVenc)}</div>
      </div>
    </div>}

    {pestana==="facturas" && <div className="cf-barra">
      <div className="ss" style={{flex:1,margin:0}}>
        <div className="box"><span className="mag">⌕</span>
          <input value={q} placeholder="Buscar…" onChange={e=>setQ(e.target.value)}/>
          {q && <button className="clr" onClick={()=>setQ("")}>×</button>}
          <MicBtn onTexto={setQ}/></div>
      </div>
      <button className={"cf-btn"+((verFiltros||nFiltros>0)?" on":"")} onClick={()=>setVerFiltros(v=>!v)}>
        ⚙ Filtros{nFiltros>0 && <span className="cf-btn-n">{nFiltros}</span>}
      </button>
    </div>}

    {verFiltros && (
      <div className="cf-grid">
        <FiltroBuscador items={opc("zona")} value={fZona} onPick={setFZona}
          todos="Todas" etiquetaTodos="Todas las zonas" render={z=>`Zona ${z}`}/>
        <FiltroBuscador items={opc("vendedor")} value={fVend} onPick={setFVend}
          todos="Todos" etiquetaTodos="Todos los vendedores"/>
        <FiltroBuscador items={opc("proveedor")} value={fProv} onPick={setFProv}
          todos="Todos" etiquetaTodos="Todos los proveedores"/>
        <FiltroBuscador items={opc("ciudad")} value={fCiudad} onPick={setFCiudad}
          todos="Todas" etiquetaTodos="Todas las ciudades"/>
        <FiltroBuscador items={opc("cli")} value={fCli} onPick={setFCli}
          todos="Todos" etiquetaTodos="Todos los clientes"/>
        <FiltroBuscador items={[["porvencer","Al día"],["vencidas","Vencidas"]]}
          value={fEstado} onPick={v=>setFEstado(Array.isArray(v)?v[0]:v)}
          todos="Todos" etiquetaTodos="Todo estado"
          render={o=>Array.isArray(o)?o[1]:(o==="porvencer"?"Al día":o==="vencidas"?"Vencidas":o)}/>
        <FiltroBuscador estilo={{gridColumn:"1 / -1"}}
          items={[["porvencer","Al día"],["30","Hasta 30 días"],["45","31–45 días"],
                  ["60","46–60 días"],["venc","Vencidos (+60 días)"]]}
          value={fAging} onPick={v=>setFAging(Array.isArray(v)?v[0]:v)}
          todos="Todos" etiquetaTodos="Toda antigüedad"
          render={o=>{ if(Array.isArray(o)) return o[1];
            const m={porvencer:"Al día","30":"Hasta 30 días","45":"31–45 días",
                     "60":"46–60 días",venc:"Vencidos (+60 días)"};
            return m[o]||o; }}/>
      </div>
    )}
    {nFiltros>0 && (
      <div className="cf-activos">
        <span>{base.length} factura(s) · {nFiltros} filtro(s) activo(s)</span>
        <button onClick={limpiarFiltros}>Limpiar</button>
      </div>
    )}


    {pestana==="resumen" && (()=>{
      const porVencer=base.filter(i=>i.dias<=0).reduce((s,i)=>s+i.saldo,0);
      const clientesDeuda=new Set(base.map(i=>i.cli)).size;
      const clientesBloq=Array.from(new Set(base.map(i=>i.cli))).filter(c=>{
        try{ return motivosBloqueo(c).length>0; }catch(e){ return false; }
      }).length;
      const segDona=tramos.filter(t=>t.monto>0);
      const totDona=segDona.reduce((s,t)=>s+t.monto,0)||1;
      // geometría de la dona
      const r=52,c=2*Math.PI*r,cx=65,cy=65; let off=0;
      const arcos=segDona.map((t,i)=>{
        const largo=(t.monto/totDona)*c;
        const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={t.color} strokeWidth="22"
          strokeDasharray={`${largo} ${c-largo}`} strokeDashoffset={-off} transform={`rotate(-90 ${cx} ${cy})`}/>;
        off+=largo; return el;
      });
      return (<>
        {/* 4 mini-tarjetas */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:4}}>
          {[
            {ic:"⚠️", lbl:"Vencida", val:money(vencido), col:"var(--clay)"},
            {ic:"⏳", lbl:"Al día", val:money(porVencer), col:"#C9A227"},
            {ic:"👥", lbl:"Clientes con deuda", val:String(clientesDeuda), col:"var(--field)"},
            {ic:"🔒", lbl:"Clientes bloqueados", val:String(clientesBloq), col:"var(--clay)"},
          ].map((m,i)=>(
            <div key={i} className="card" style={{padding:"13px 14px",margin:0,display:"flex",alignItems:"center",gap:11}}>
              <span style={{fontSize:20,flexShrink:0}}>{m.ic}</span>
              <span style={{minWidth:0}}>
                <span className="meta" style={{display:"block",fontSize:11,fontWeight:600}}>{m.lbl}</span>
                <span className="num" style={{display:"block",fontSize:17,fontWeight:800,color:m.col}}>{m.val}</span>
              </span>
            </div>
          ))}
        </div>

        {/* Antigüedad de cartera: leyenda + dona (clicables) */}
        <div className="card" style={{padding:"16px 18px",marginTop:12}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>Antigüedad de cartera</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:16}}>
            <div style={{flex:1,minWidth:0}}>
              {tramos.map((t,i)=>(
                <button key={i} onClick={()=>t.monto>0 && setVerAging(t.k)} disabled={t.monto<=0}
                  style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"6px 0",opacity:t.monto>0?1:.5,
                    background:"none",border:"none",borderBottom:"1px solid #F4F1E9",cursor:t.monto>0?"pointer":"default",fontFamily:"inherit"}}>
                  <span style={{width:10,height:10,borderRadius:3,background:t.color,flexShrink:0}}></span>
                  <span style={{flex:1,minWidth:0,fontSize:12.5,fontWeight:600,textAlign:"left",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.k}</span>
                  <span className="num" style={{fontSize:12.5,fontWeight:700,whiteSpace:"nowrap"}}>{money(t.monto)}</span>
                  {t.monto>0 && <span style={{color:"var(--muted)",fontSize:13,flexShrink:0}}>›</span>}
                </button>
              ))}
            </div>
            <svg viewBox="0 0 130 130" style={{width:120,height:120,flexShrink:0,cursor:"pointer"}}
              onClick={()=>{ const may=segDona.slice().sort((a,b)=>b.monto-a.monto)[0]; if(may) setVerAging(may.k); }}>{arcos}</svg>
          </div>
          <div className="meta" style={{fontSize:10.5,marginTop:10,textAlign:"center"}}>Toca un tramo para ver los clientes y facturas</div>
        </div>

        {/* ── Calendario de vencimientos (kit neumórfico) ── */}
        {(()=>{
          const HOY=new Date(2026,5,12);                 // 12 jun 2026 (fecha de trabajo del demo)
          const anioC=HOY.getFullYear(), mesC=HOY.getMonth();
          /* junta las facturas que vencen en el mes en curso */
          const porDia={};
          base.forEach(f=>{
            const v=new Date(HOY); v.setDate(v.getDate()-f.dias);   // dias>0 = ya vencida
            if(v.getFullYear()!==anioC || v.getMonth()!==mesC) return;
            const d=v.getDate();
            if(!porDia[d]) porDia[d]={dia:d, monto:0, n:0, vencido:false};
            porDia[d].monto+=f.saldo; porDia[d].n++;
            if(f.dias>0) porDia[d].vencido=true;
          });
          const marcados=Object.values(porDia).map(x=>({
            ...x, color: x.vencido?"#C2603A":"#2E7D52"
          }));
          if(marcados.length===0) return null;
          const totalMes=marcados.reduce((s,x)=>s+x.monto,0);
          const MES=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"][mesC];
          return (
            <div className="neu" style={{marginTop:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div>
                  <div className="neu-t">Vencimientos de {MES}</div>
                  <div className="neu-s" style={{marginBottom:0}}>{marcados.length} día(s) con cobros</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div className="num" style={{fontSize:16,fontWeight:800,color:"var(--field)"}}>{money(totalMes)}</div>
                  <div className="meta" style={{fontSize:9.5}}>del mes</div>
                </div>
              </div>
              <NeuCalendario anio={anioC} mes={mesC} marcados={marcados}
                onDia={(m)=>toast(`${m.dia} de ${MES}: ${m.n} factura(s) · ${money(m.monto)}`)}/>
              <div style={{display:"flex",justifyContent:"center",gap:16,marginTop:12}}>
                <span style={{display:"flex",alignItems:"center",gap:5,fontSize:10.5}}>
                  <span style={{width:9,height:9,borderRadius:3,background:"#2E7D52"}}></span>Por vencer</span>
                <span style={{display:"flex",alignItems:"center",gap:5,fontSize:10.5}}>
                  <span style={{width:9,height:9,borderRadius:3,background:"#C2603A"}}></span>Vencido</span>
              </div>
            </div>
          );
        })()}
      </>);
    })()}

    {pestana==="facturas" && (()=>{
      const POR_PAG=4;
      const totalPagF=Math.max(1,Math.ceil(listaOrd.length/POR_PAG));
      const pagF=Math.min(pagFac,totalPagF);
      const visiblesF=listaOrd.slice((pagF-1)*POR_PAG, pagF*POR_PAG);
      return (<>
      <div className="sec-h"><h2>Facturas · más urgentes primero</h2><div className="grain"></div></div>
      {visiblesF.map((it,i)=>{
        const colVenc = it.v==="bad"?"var(--clay)":it.v==="warn"?"#B8860B":"var(--muted)";
        return (
        <div className="card" key={i} onClick={()=>setVerFac(it)} style={{cursor:"pointer"}}>
          <div className="row" style={{alignItems:"flex-start"}}>
            <div style={{minWidth:0,flex:1}}>
              <div className="cli" style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.cli}{it.chequeDevuelto && <span className="chq-badge">⚠️ Cheque devuelto</span>}</div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:2}}>
                <span className="meta" style={{fontSize:11,flexShrink:0}}>{it.vendedor}</span>
                <span className="meta" style={{fontSize:11,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Fact. {(it.fac||"").replace(/^001-001-/,"")}</span>
              </div>
            </div>
            <div style={{flexShrink:0,textAlign:"right",marginLeft:10}}>
              <div className="amt num">{money(it.saldo)}</div>
              <div style={{fontSize:11,fontWeight:700,color:it.dias>0?"var(--clay)":"var(--ink)",marginTop:2}}>
                {it.diasFact!=null && <span>{it.diasFact}d · </span>}
                {it.dias>0 ? `${it.dias}v` : it.estado}
              </div>
            </div>
          </div>
        </div>
        );
      })}
      {listaOrd.length===0 && <div className="ph">Ninguna factura coincide con los filtros aplicados.</div>}

      {totalPagF>1 && (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,margin:"14px 0 4px"}}>
          <button className="selmini" style={{width:"auto",opacity:pagF<=1?.4:1}} disabled={pagF<=1}
            onClick={()=>setPagFac(p=>Math.max(1,p-1))}>‹ Anterior</button>
          <span className="meta" style={{fontSize:12}}>Página {pagF} de {totalPagF}</span>
          <button className="selmini" style={{width:"auto",opacity:pagF>=totalPagF?.4:1}} disabled={pagF>=totalPagF}
            onClick={()=>setPagFac(p=>Math.min(totalPagF,p+1))}>Siguiente ›</button>
        </div>
      )}
      </>);
    })()}

    {pestana==="cheques" && (()=>{
      const HOY="2026-06-12";
      const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      const pendientes=CHEQUES_POSF.filter(c=>c.estado!=="efectivizado")
        .filter(c=>norm(c.cli).includes(norm(qCart)))
        .slice().sort((a,b)=>a.fecha<b.fecha?-1:1);
      const efectivos=CHEQUES_POSF.filter(c=>c.estado==="efectivizado")
        .filter(c=>norm(c.cli).includes(norm(qChq)))
        .sort((a,b)=>(b.fechaEfect||"")<(a.fechaEfect||"")?-1:1);
      const pendTodos=CHEQUES_POSF.filter(c=>c.estado!=="efectivizado");
      const totPend=pendTodos.reduce((s,c)=>s+c.valor,0);
      const listos=pendTodos.filter(c=>c.fecha<=HOY);
      const dm=f=>{ if(!f) return "—"; const d=new Date(f+"T00:00:00"); const ms=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
        return isNaN(d)?f:`${d.getDate()} ${ms[d.getMonth()]}`; };
      const ESTADO_LBL={recibido:"Recibido",custodia:"En custodia",deposito:"Depósito solicitado"};
      return (<>
        {/* sub-pestañas (segundo nivel, chips pequeños) */}
        <div className="tipochips" style={{marginBottom:14}}>
          <button className={"tchip"+(subCheque==="resumen"?" on":"")} onClick={()=>setSubCheque("resumen")}>
            <span className="tchip-nom" style={subCheque==="resumen"?{color:"#fff"}:{color:"var(--ink)"}}>En cartera</span></button>
          <button className={"tchip"+(subCheque==="historial"?" on":"")} onClick={()=>setSubCheque("historial")}>
            <span className="tchip-nom" style={subCheque==="historial"?{color:"#fff"}:{color:"var(--ink)"}}>Historial</span></button>
        </div>

        {subCheque==="resumen" ? (<>
          {/* tarjeta de total de pendientes */}
          <div className="montobox" style={{margin:"0 0 12px",padding:"12px 16px"}}>
            <div className="row" style={{justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:800,fontSize:13}}>{pendTodos.length} cheque{pendTodos.length!==1?"s":""} en cartera</span>
              <b className="num" style={{fontSize:21,fontWeight:800}}>{money(totPend)}</b>
            </div>
            {listos.length>0 && <div className="meta" style={{marginTop:5,color:"var(--ok)",fontWeight:700}}>✓ {listos.length} listo{listos.length!==1?"s":""} para depositar</div>}
          </div>

          {/* buscador con voz */}
          <div className="ss" style={{marginBottom:12}}>
            <div className="box"><span className="mag">⌕</span>
              <input value={qCart} placeholder="Buscar por cliente…" onChange={e=>setQCart(e.target.value)}/>
              <MicBtn onTexto={setQCart}/>
              {qCart && <button className="clr" onClick={()=>setQCart("")}>×</button>}</div>
          </div>

          {/* encabezado de columnas */}
          <div style={{display:"grid",gridTemplateColumns:"auto 1fr auto",gap:10,padding:"0 12px 6px",
            fontSize:9.5,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".02em"}}>
            <span style={{width:52}}>Fecha</span><span>Cliente</span><span style={{textAlign:"right"}}>Valor</span>
          </div>
          {pendientes.map((c,i)=>{
            const listo=c.fecha<=HOY;
            return (
              <button className="card" key={i} onClick={()=>setVerChq(c)}
                style={{display:"block",width:"100%",padding:"11px 12px",marginBottom:8,textAlign:"left",cursor:"pointer",border:"1px solid var(--line)",fontFamily:"inherit"}}>
                <div style={{display:"grid",gridTemplateColumns:"auto 1fr auto",gap:10,alignItems:"center"}}>
                  <span style={{width:52,fontWeight:800,fontSize:12.5,color:listo?"var(--ok)":"var(--field)",whiteSpace:"nowrap"}}>{dm(c.fecha)}</span>
                  <span style={{minWidth:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.cli}</span>
                  <span className="num" style={{textAlign:"right",fontWeight:800,fontSize:13.5,whiteSpace:"nowrap"}}>{money(c.valor)}</span>
                </div>
              </button>
            );
          })}
          {pendientes.length===0 && <div className="ph">{qCart?"Ningún cheque coincide.":"No hay cheques en cartera."}</div>}
          <div className="meta" style={{margin:"10px 2px 0",fontSize:11}}>Toca un cheque para ver su estado, la foto y reprogramar la fecha.</div>
        </>) : (<>
          {/* historial de efectivizados con búsqueda */}
          <div className="ss" style={{marginBottom:12}}>
            <div className="box"><span className="mag">⌕</span>
              <input value={qChq} placeholder="Buscar por cliente…" onChange={e=>setQChq(e.target.value)}/>
              <MicBtn onTexto={setQChq}/>
              {qChq && <button className="clr" onClick={()=>setQChq("")}>×</button>}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"auto 1fr auto",gap:10,padding:"0 12px 6px",
            fontSize:9.5,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".02em"}}>
            <span style={{width:52}}>Efectiv.</span><span>Cliente</span><span style={{textAlign:"right"}}>Valor</span>
          </div>
          {efectivos.map((c,i)=>(
            <button className="card" key={i} onClick={()=>setVerChq(c)}
              style={{display:"block",width:"100%",padding:"11px 12px",marginBottom:8,textAlign:"left",cursor:"pointer",border:"1px solid var(--line)",fontFamily:"inherit"}}>
              <div style={{display:"grid",gridTemplateColumns:"auto 1fr auto",gap:10,alignItems:"center"}}>
                <span style={{width:52,fontWeight:800,fontSize:12.5,color:"var(--ok)",whiteSpace:"nowrap"}}>{dm(c.fechaEfect)}</span>
                <span style={{minWidth:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.cli}</span>
                <span className="num" style={{textAlign:"right",fontWeight:800,fontSize:13.5,whiteSpace:"nowrap"}}>{money(c.valor)}</span>
              </div>
              <div className="meta" style={{fontSize:10.5,marginTop:3}}>{c.numero} · {c.banco} · ✓ efectivizado</div>
            </button>
          ))}
          {efectivos.length===0 && <div className="ph">{qChq?"Ningún cheque coincide.":"Aún no hay cheques efectivizados."}</div>}
        </>)}
      </>);})()}

  </>);
}

function clienteActivo(nombre){ /* compró en los últimos 30 días (fecha demo: 12 jun 2026) */
  const f=FICHA_CLIENTE[nombre];
  if(!f || !f.ultimaCompra || f.ultimaCompra==="—") return false;
  const m=f.ultimaCompra.match(/(\d{1,2})\s+(ene|feb|mar|abr|may|jun|jul|ago|sep|oct|nov|dic)\s+(\d{4})/i);
  if(!m) return false;
  const MES={ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
  const fecha=new Date(+m[3], MES[m[2].toLowerCase()], +m[1]);
  return (new Date(2026,5,12)-fecha)/(1000*60*60*24) <= 30;
}

/* ── Dictado por voz: botón de micrófono reutilizable para campos de búsqueda ── */
function MicBtn({onTexto, toast}){
  const [rec,setRec]=useState(false);
  const refRec=React.useRef(null);
  const Reconocedor = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!Reconocedor) return null; /* navegador sin dictado: el botón no aparece */
  const dictar=()=>{
    if(rec){ try{ refRec.current && refRec.current.stop(); }catch(e){} setRec(false); return; }
    const r=new Reconocedor();
    r.lang="es-EC"; r.interimResults=false; r.maxAlternatives=1;
    r.onresult=ev=>{ const t=ev.results[0][0].transcript.trim(); if(t) onTexto(t); };
    r.onerror=ev=>{ setRec(false); if(ev.error==="not-allowed" && toast) toast("Permite el micrófono en el navegador para dictar"); };
    r.onend=()=>setRec(false);
    refRec.current=r; setRec(true);
    try{ r.start(); }catch(e){ setRec(false); }
  };
  return (
    <button type="button" className={"micb"+(rec?" rec":"")} onClick={dictar} aria-label="Buscar por voz">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
        stroke={rec?"#C2603A":"var(--muted)"} strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">
        <rect x="9" y="2.5" width="6" height="11" rx="3"/>
        <path d="M5.5 11a6.5 6.5 0 0013 0"/><path d="M12 17.5V21M9 21h6"/>
      </svg>
    </button>
  );
}

/* Cartera de clientes: total por cobrar y antigüedad */
function CarteraClientes({volver, ver}){
  const tot=k=>CLIENTES.reduce((s,c)=>s+((CARTERA_EDAD[c]||{})[k]||0),0);
  const alDia=tot("alDia"), porVencer=tot("porVencer"), vencido=tot("vencido");
  const deudores=CLIENTES.map(c=>({c, e:CARTERA_EDAD[c]})).filter(x=>x.e && (x.e.alDia+x.e.porVencer+x.e.vencido)>0)
    .sort((a,b)=>(b.e.alDia+b.e.porVencer+b.e.vencido)-(a.e.alDia+a.e.porVencer+a.e.vencido));
  return (<>
    <div className="h1">Cartera de clientes</div>
    <div className="sub">Cuánto te deben y qué tan vieja es la deuda.</div>
    <div className="ncard" style={{cursor:"default",marginBottom:14}}>
      <div className="nk">Total por cobrar</div>
      <div className="nv money">{money(alDia+porVencer+vencido)}</div>
      <div className="nbars">
        {[["Al día",alDia,"var(--field-700)"],["Por vencer",porVencer,"var(--maize)"],["Vencido",vencido,"var(--clay)"]].map(([t,v,col],i)=>{
          const max=Math.max(alDia,porVencer,vencido,1);
          return (<div className="nbar" key={i}><span>{t}</span>
            <div className="tr"><div className="fl" style={{width:Math.round(v/max*100)+"%",background:col}}></div></div>
            <span className="vv">{money(v)}</span></div>);
        })}
      </div>
    </div>
    {deudores.map(({c,e},i)=>
      <FilaCliente key={i} c={c} ver={ver} extra={
        <div className="meta" style={{marginTop:3}}>
          {e.alDia>0 && <span style={{color:"var(--field-700)",fontWeight:600}}>Al día {money(e.alDia)} </span>}

          {e.vencido>0 && <span style={{color:"var(--clay)",fontWeight:600}}>· Vencido {money(e.vencido)}</span>}
        </div>}/>)}

}

function Clientes({toast, nuevoPedido, verCartera, cliIni, onCliConsumido}){
  const [q,setQ]=useState("");
  const [sel,setSel]=useState(null);
  const [sec,setSec]=useState(null);            /* sub-pantalla de la ficha (vive aquí por el retroceso jerárquico) */
  const [nuevo,setNuevo]=useState(false);
  const [verSolic,setVerSolic]=useState(false);
  const [verBloq,setVerBloq]=useState(false);
  const [vista,setVista]=useState(null);        /* null | {tipo:"lista", filtro} | {tipo:"cartera"} */
  const verCliente=c=>{ setSec(null); setSel(c); };
  /* si viene del buscador global, abre esa ficha directo */
  React.useEffect(()=>{
    if(cliIni){ setSec(null); setSel(cliIni); if(onCliConsumido) onCliConsumido(); }
  // eslint-disable-next-line
  },[cliIni]);

  /* Retroceso jerárquico: el Atrás del app baja un nivel a la vez dentro del módulo */
  useRetroceso(()=>{
      if(sel && sec){ setSec(null); return true; }
      if(sel){ setSel(null); return true; }
      if(nuevo){ setNuevo(false); return true; }
      if(verSolic){ setVerSolic(false); return true; }
      if(verBloq){ setVerBloq(false); return true; }
      if(vista){ setVista(null); return true; }
      return false; /* entrada del módulo: que el app retroceda de módulo */
    });

  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const palabras=norm(q).split(/\s+/).filter(Boolean);
  const texto=c=>norm(c+" "+((REFERENCIALES[c]||[]).join(" ")));
  const lista=CLIENTES.filter(c=>palabras.every(w=>texto(c).includes(w)));

  if(nuevo) return <ClienteNuevo volver={()=>setNuevo(false)} toast={toast}/>;
  if(verSolic) return <SolicitudesCredito volver={()=>setVerSolic(false)}/>;
  if(verBloq) return <ClientesBloqueados volver={()=>setVerBloq(false)} ver={c=>{setVerBloq(false);verCliente(c);}}/>;
  if(sel) return <FichaCliente key={sel} nombre={sel} sec={sec} setSec={setSec} volver={()=>setSel(null)} toast={toast} nuevoPedido={nuevoPedido} verCartera={verCartera}/>;
  if(vista && vista.tipo==="lista") return <ListaClientes filtroIni={vista.filtro} volver={()=>setVista(null)} ver={c=>{setVista(null);verCliente(c);}}/>;
  if(vista && vista.tipo==="cartera") return <CarteraClientes volver={()=>setVista(null)} ver={c=>{setVista(null);verCliente(c);}}/>;

  const enTramite=SOLICITUDES_CREDITO.filter(s=>s.etapa<3||s.devuelta).length;
  const nBloq=CLIENTES.filter(c=>motivosBloqueo(c).length>0).length;
  const nAct=CLIENTES.filter(c=>clienteActivo(c)).length;
  const nInact=CLIENTES.length-nAct;
  const pctAct=Math.round(nAct/Math.max(CLIENTES.length,1)*100);
  const totK=k=>CLIENTES.reduce((s,c)=>s+((CARTERA_EDAD[c]||{})[k]||0),0);
  const alDia=totK("alDia"), porVencer=totK("porVencer"), vencido=totK("vencido");
  const maxB=Math.max(alDia,porVencer,vencido,1);
  /* Sparkline de crecimiento */
  const cr=CRECIMIENTO_CLIENTES, maxCr=Math.max(...cr,1);
  const pts=cr.map((v,i)=>`${(i/(cr.length-1)*100).toFixed(1)},${(30-v/maxCr*26).toFixed(1)}`).join(" ");

  return (<>
    <div className="h1">Clientes</div>
    <div className="sub">Busca por nombre o dictado, o toca una tarjeta.</div>
    <div className="ss">
      <div className="box"><span className="mag">⌕</span>
        <input value={q} placeholder="Buscar cliente…" onChange={e=>setQ(e.target.value)}/>
        {q && <button className="clr" onClick={()=>setQ("")}>×</button>}
        <MicBtn onTexto={setQ} toast={toast}/></div>
    </div>

    {q ? (<>
      <div style={{marginTop:14}}>
        {lista.map((c,i)=><FilaCliente key={i} c={c} ver={verCliente}/>)}
        {lista.length===0 && <div className="ph">Sin clientes que coincidan con “{q}”.</div>}
      </div>
    </>) : (
      <div className="ndash">
        <div className="ncard" onClick={()=>setVista({tipo:"lista",filtro:"todos"})}>
          <div className="nk">Clientes totales</div>
          <div className="nv">{CLIENTES.length}</div>
          <svg className="nspark" viewBox="0 0 100 32" preserveAspectRatio="none">
            <polyline points={pts} fill="none" stroke="var(--field-700)" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/>
            <polygon points={`0,32 ${pts} 100,32`} fill="rgba(30,77,58,.12)" stroke="none"/>
          </svg>
          <div className="nsub">Crecimiento en 2026</div>
        </div>

        <div className="ncard" onClick={()=>setVista({tipo:"lista",filtro:"activos"})}>
          <div className="nk">Activos</div>
          <div className="nring-wrap">
            <div className="nring" style={{background:`conic-gradient(var(--field-700) 0 ${pctAct}%, #EFEBE0 ${pctAct}% 100%)`}}>
              <div className="hole"><b>{nAct}</b><span>activos</span></div>
            </div>
            <div className="nleg">
              <span><span className="d" style={{background:"var(--field-700)"}}></span>{nAct} activos</span>
              <span><span className="d" style={{background:"#D9D3C4"}}></span>{nInact} inactivos</span>
            </div>
          </div>
          <div className="nsub">Compraron en los últimos 30 días</div>
        </div>

        <div className="ncard" onClick={()=>setVista({tipo:"cartera"})}>
          <div className="nk">Por cobrar</div>
          <div className="nv money">{money(alDia+porVencer+vencido)}</div>
          <div className="nbars">
            {[["Al día",alDia,"var(--field-700)"],["Por vencer",porVencer,"var(--maize)"],["Vencido",vencido,"var(--clay)"]].map(([t,v,col],i)=>
              <div className="nbar" key={i}><span>{t}</span>
                <div className="tr"><div className="fl" style={{width:Math.round(v/maxB*100)+"%",background:col}}></div></div>
                <span className="vv">{money(v)}</span></div>)}
          </div>
        </div>

        <div className="nmini">
          <div className="ncard" onClick={()=>setVerSolic(true)}>
            <div className="nk">Solicitudes de crédito<div className="nsub">En trámite</div></div>
            <div className="nv" style={{color:enTramite>0?"var(--maize-deep)":"var(--field)"}}>{enTramite}</div>
          </div>
          <div className="ncard" onClick={()=>setVerBloq(true)}>
            <div className="nk">Bloqueados<div className="nsub">Sin poder comprar</div></div>
            <div className="nv" style={{color:nBloq>0?"var(--clay)":"var(--field)"}}>{nBloq}</div>
          </div>
        </div>
      </div>
    )}
    <button className="fab" onClick={()=>setNuevo(true)} aria-label="Agregar cliente nuevo">+</button>
  </>);
}

function Anillo({pct, color, label, valor}){
  const r=26, c=2*Math.PI*r, off=c*(1-Math.max(0,Math.min(100,pct))/100);
  return (
    <div className="anillo">
      <svg viewBox="0 0 64 64" width="64" height="64">
        <circle cx="32" cy="32" r={r} fill="none" stroke="#E9EEE9" strokeWidth="7"/>
        <circle cx="32" cy="32" r={r} fill="none" stroke={color} strokeWidth="7" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={off} transform="rotate(-90 32 32)"/>
        <text x="32" y="36" textAnchor="middle" fontSize="15" fontWeight="700" fill="#15392B" fontFamily="'Space Grotesk',sans-serif">{Math.round(pct)}%</text>
      </svg>
      <div className="an-lbl">{label}</div>
      {valor && <div className="an-val">{valor}</div>}
    </div>
  );
}

function IndicadoresCliente({nombre, f}){
  const data=COMPRAS_MENSUALES[nombre];
  const anios=data?Object.keys(data).map(Number).sort((a,b)=>b-a):[];
  const ANIO_ACTUAL=new Date().getFullYear();
  const inicial=anios.includes(ANIO_ACTUAL)?ANIO_ACTUAL:(anios[0]||ANIO_ACTUAL);
  const [anio,setAnio]=useState(inicial);

  const cupoUsado=f.facturasPend+f.chequesPosf;
  const pctCupo=f.cupo>0?Math.round(cupoUsado/f.cupo*100):0;
  const pctDisp=100-pctCupo;
  const disp=f.cupo-cupoUsado;

  const prods=data?(data[anio]||[]):[];
  const mensual=Array(12).fill(0);
  const pedidosMes=Array(12).fill(0);
  prods.forEach(p=>{ p.monto.forEach((m,i)=>mensual[i]+=m); (p.ped||[]).forEach((q,i)=>pedidosMes[i]+=q); });
  const totalAnio=mensual.reduce((a,b)=>a+b,0);
  const mesesConCompra=mensual.filter(x=>x>0).length;
  const totalPedidos=pedidosMes.reduce((a,b)=>a+b,0);

  const frecuencia=Math.round(mesesConCompra/12*100);
  const buenComprador=Math.min(100, frecuencia+ (totalAnio>0?10:0));
  const buenPagador=totalAnio>0?Math.max(20, 100-pctCupo):0;
  const comVendedor=Math.round(totalAnio*0.05);
  const comFreelance=Math.round(totalAnio*0.03);
  const totalComVendTodos=Object.keys(COMPRAS_MENSUALES).reduce((s,cli)=>{
    const ps=COMPRAS_MENSUALES[cli][anio]||[];
    const tot=ps.reduce((a,p)=>a+p.monto.reduce((x,y)=>x+y,0),0);
    return s+tot*0.05;
  },0);
  const ventasEmpresaAnual=EQUIPO_INI.reduce((s,sc)=>s+(sc.ventasMes||0),0)*12;
  const totalComFreeEmpresa=ventasEmpresaAnual*0.03;
  const pctComVend=totalComVendTodos>0?Math.round(comVendedor/totalComVendTodos*100):0;
  const pctComFree=totalComFreeEmpresa>0?Math.round(comFreelance/totalComFreeEmpresa*100):0;
  const ticket=totalPedidos>0?totalAnio/totalPedidos:0;
  const prodsPrev=data?(data[anio-1]||[]):[];
  const totalPrev=prodsPrev.reduce((s,p)=>s+p.monto.reduce((a,b)=>a+b,0),0);
  const tendencia=totalPrev>0?Math.round((totalAnio-totalPrev)/totalPrev*100):(totalAnio>0?100:0);

  return (
    <div style={{marginBottom:16}}>
      <div className="ficha-sec" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>Indicadores del cliente</span>
        <select className="cm-anio" value={anio} onChange={e=>setAnio(Number(e.target.value))}>
          {anios.map(a=><option key={a} value={a}>{a}</option>)}
        </select>
      </div>
      <div className="fcard">
        
        <div className="ind-cupo">
          <Anillo pct={pctCupo} color={pctCupo>=90?"#C2603A":pctCupo>=70?"#F2A900":"#2E7D52"} label="Cupo usado"/>
          <div className="ind-cupo-info">
            <div className="cu-line"><span>Cupo asignado</span><b className="num">{money(f.cupo)}</b></div>
            <div className="cu-line"><span>Utilizado ({pctCupo}%)</span><b className="num" style={{color:"#C2603A"}}>{money(cupoUsado)}</b></div>
            <div className="cu-line"><span>Disponible ({pctDisp}%)</span><b className="num" style={{color:"#2E7D52"}}>{money(disp)}</b></div>
          </div>
        </div>
        <div className="ind-nota-cupo">El cupo refleja el estado actual del cliente (a hoy).</div>

        <div className="ind-anillos">
          <Anillo pct={buenComprador} color="#2E7D52" label="Buen comprador"/>
          <Anillo pct={buenPagador} color="#3A6EA5" label="Buen pagador"/>
        </div>
        <div className="ind-anillos">
          <Anillo pct={pctComVend} color="#7A5BA8" label="% comisión vendedor" valor={money(comVendedor)}/>
          <Anillo pct={pctComFree} color="#C9A227" label="% comisión freelance" valor={money(comFreelance)}/>
        </div>
        <div className="ind-ctx">
          <div className="cu-line"><span>Total comisión vendedor (su cartera · {anio})</span><b className="num">{money(totalComVendTodos)}</b></div>
          <div className="cu-line"><span>Total comisión freelance (toda la empresa · {anio} est.)</span><b className="num">{money(totalComFreeEmpresa)}</b></div>
        </div>

        <div className="ind-nums">
          <div className="ind-num"><div className="fk">Frecuencia</div><div className="fv num">{mesesConCompra}/12 meses</div></div>
          <div className="ind-num"><div className="fk">Ticket promedio</div><div className="fv num">{money(ticket)}</div></div>
          <div className="ind-num"><div className="fk">Tendencia vs {anio-1}</div>
            <div className="fv num" style={{color:tendencia>0?"#2E7D52":tendencia<0?"#C2603A":"var(--muted)"}}>
              {tendencia>0?"▲ ":tendencia<0?"▼ ":""}{Math.abs(tendencia)}%</div></div>
        </div>

        <div className="meta" style={{marginTop:8,fontSize:10.5,textAlign:"center"}}>Cálculos sobre el año {anio}. El % del vendedor es la participación sobre su cartera; el del freelance, sobre las ventas de toda la empresa (todos los subcomisionistas, estimado). Puntajes estimados.</div>
      </div>
    </div>
  );
}

function ComprasMensuales({nombre}){
  const data=COMPRAS_MENSUALES[nombre];
  const anios=data?Object.keys(data).map(Number).sort((a,b)=>b-a):[];
  const [anio,setAnio]=useState(anios[0]||2026);
  const [unidad,setUnidad]=useState("monto"); // monto | qq
  const [fLinea,setFLinea]=useState("Todas");
  const [fProd,setFProd]=useState("Todos");
  if(!data) return null;

  const prods=data[anio]||[];
  const lineas=Array.from(new Set(prods.map(p=>p.linea)));
  const prodsDeLinea=prods.filter(p=>fLinea==="Todas"||p.linea===fLinea);
  const productos=Array.from(new Set(prodsDeLinea.map(p=>p.marca)));

  const visibles=prods.filter(p=>(fLinea==="Todas"||p.linea===fLinea) && (fProd==="Todos"||p.marca===fProd));
  const vals=Array(12).fill(0);
  visibles.forEach(p=>{ const arr=p[unidad]; for(let i=0;i<12;i++) vals[i]+=arr[i]||0; });
  const esQQ=unidad==="qq";
  const esPed=unidad==="ped";
  const fmt=v=>esQQ?(Math.round(v*10)/10+" qq"):esPed?(Math.round(v)+(Math.round(v)===1?" pedido":" pedidos")):money(v);
  const total=vals.reduce((a,b)=>a+b,0);
  const max=Math.max(...vals,0.0001);
  const conCompra=vals.filter(v=>v>0).length;
  const prom=conCompra>0?total/conCompra:0;
  const mejorIdx=vals.indexOf(Math.max(...vals));
  const lblBarra=v=>esQQ?(v>0?String(Math.round(v)):""):esPed?(v>0?String(Math.round(v)):""):(v>=1000?(v/1000).toFixed(1)+"k":(v>0?String(v):""));

  return (
    <div style={{marginBottom:16}}>
      <div className="ficha-sec" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>Compras por mes</span>
        <select className="cm-anio" value={anio} onChange={e=>{setAnio(Number(e.target.value));setFLinea("Todas");setFProd("Todos");}}>
          {anios.map(a=><option key={a} value={a}>{a}</option>)}
        </select>
      </div>

      <div className="cm-unidad">
        <button className={unidad==="monto"?"on":""} onClick={()=>setUnidad("monto")}>Dólares</button>
        <button className={unidad==="qq"?"on":""} onClick={()=>setUnidad("qq")}>Quintales</button>
        <button className={unidad==="ped"?"on":""} onClick={()=>setUnidad("ped")}>Unidades</button>
      </div>

      <div className="cm-filtros">
        <FiltroBuscador items={lineas} value={fLinea}
          onPick={v=>{setFLinea(v);setFProd("Todos");}}
          todos="Todas" etiquetaTodos="Toda línea"/>
        <FiltroBuscador items={productos} value={fProd} onPick={setFProd}
          todos="Todos" etiquetaTodos="Todo producto"/>
      </div>

      <div className="fcard">
        <div className="cm-resumen">
          <div><div className="fk">Total {anio}</div><div className="fv num">{fmt(total)}</div></div>
          <div><div className="fk">Promedio mensual</div><div className="fv num">{fmt(prom)}</div></div>
          <div><div className="fk">Mejor mes</div><div className="fv">{total>0?MESES_CORTO[mejorIdx]:"—"}</div></div>
        </div>
        <div className="cm-chart">
          {vals.map((v,i)=>(
            <div className="cm-col" key={i}>
              <div className="cm-bar-wrap">
                {v>0 && <span className="cm-val">{lblBarra(v)}</span>}
                <div className="cm-bar" style={{height:Math.round(v/max*100)+"%",
                  background:i===mejorIdx&&v>0?"var(--maize)":(esQQ?"#3A6EA5":esPed?"#7A5BA8":"var(--field-700)")}}></div>
              </div>
              <div className="cm-mes">{MESES_CORTO[i]}</div>
            </div>
          ))}
        </div>
        {total===0 && <div className="ph" style={{padding:"6px 0 0"}}>Sin compras{fProd!=="Todos"?` de ${fProd}`:fLinea!=="Todas"?` de ${fLinea}`:""} en {anio}.</div>}
      </div>
    </div>
  );
}

      <div className="cupo-bar"><div className="cupo-fill" style={{width:pct+"%",
        background:pct>=90?"var(--clay)":pct>=70?"var(--maize)":"var(--field-700)"}}></div></div>
      <div className="row" style={{marginTop:6}}>
        <span className="meta">Usado {money(cupoUsado)} ({pct}%)</span>
        <span className="meta" style={{fontWeight:700,color:disp>0?"var(--field)":"var(--clay)"}}>Disponible {money(disp)}</span>
      </div>
      <div className="cupo-desglose">
        <div className="row"><span className="meta">Facturas pendientes · {f.nFacturas}</span><span className="dg-v num">{money(f.facturasPend)}</span></div>
        <div className="row"><span className="meta">Cheques posfechados · {f.nCheques}</span><span className="dg-v num">{money(f.chequesPosf)}</span></div>
        <div className="row" style={{borderTop:"1px solid var(--line)",paddingTop:6,marginTop:4}}>

      : solicCli.map((s,i)=>{
        const estadoTxt = s.devuelta ? "Devuelta" : ETAPAS_CREDITO[s.etapa];

    <div className="ficha-grid">

      <div className="fcard"><div className="fk">Última compra</div>
        <div className="fv">{f.ultimaCompra}</div></div>

    <div className="ficha-sec">Antigüedad de la deuda</div>
    <div className="ncard" style={{cursor:"default",marginBottom:14}}>
      <div className="nbars">
        {[["Al día",edad.alDia,"var(--field-700)"],["Por vencer",edad.porVencer,"var(--maize)"],["Vencido",edad.vencido,"var(--clay)"]].map(([t,v,col],i)=>{

  /* ── 4 · PEDIDOS ── */
  if(sec==="pedidos") return (<>{cabecera}
    <div className="ficha-grid">

    <button className="cta" style={{margin:"4px 0 14px"}} onClick={()=>{ nuevoPedido ? nuevoPedido(nombre) : toast("Abre el módulo Pedido"); }}>

      : pedidosCli.map((p,i)=>(

              <div className="meta">{p.fecha} · {p.prov} · {p.cond}</div></div>
            <span className="chip c-sync" style={{alignSelf:"flex-start"}}><span className="d"></span>{p.estado}</span>

      ))}

    <div className="ficha-grid">

  /* ── 6 · ESTADÍSTICAS ── */

    <IndicadoresCliente nombre={nombre} f={f}/>

  </>);

  /* ── 8 · ESTADO DE CUENTA ── */
  if(sec==="estado"){
    const factCli=COBROS_INI.filter(c=>c.cli===nombre);
    const ordenVence=v=>{ const m=/Vencida\s+(\d+)/i.exec(v); if(m) return -Number(m[1]); if(/hoy/i.test(v)) return 0; const n=/En\s+(\d+)/i.exec(v); return n?Number(n[1]):999; };
    const factOrden=[...factCli].sort((a,b)=>ordenVence(a.vence)-ordenVence(b.vence));
    const deudaTotal=edad.alDia+edad.porVencer+edad.vencido;
    const sugerido = edad.vencido>0 ? "cobro" : edad.porVencer>0 ? "recordatorio" : "neutro";
    const tono = tonoEC || sugerido;
    const FORMATOS=[["simple","Simple"],["resumen","Resumen"],["factura","Por factura"],["calendario","Calendario"],["cuenta","Cta. corriente"],["liq","Liquidación"]];
    const TONOS=[["neutro","Informativo"],["recordatorio","Recordatorio"],["cobro","Cobro cordial"],["abono","Proponer abonos"]];
    /* movimientos ordenados y fecha sugerida de partida (última vez que la cuenta estuvo en cero) */
    const movsCli=(MOVIMIENTOS_CLIENTE[nombre]||[]).slice().sort((a,b)=>a.fecha<b.fecha?-1:1);
    let acum=0, ultCero=null;
    movsCli.forEach(m=>{ acum+=(m.debe||0)-(m.haber||0); if(Math.abs(acum)<0.005) ultCero=m.fecha; });
    const partida = fPart || ultCero || (movsCli.length?movsCli[0].fecha:"2026-01-01");
    const ddmm=x=>x.slice(8,10)+"/"+x.slice(5,7);
    /* datos estructurados para las tablas del PDF */
    const factsConTot=(FACTURAS_DETALLE[nombre]||[]).map(fa=>{
      const sub=fa.items.reduce((s,it)=>s+it.cant*it.precio,0);
      let tot=sub-(fa.retencion||0)-(fa.descuento||0);
      (fa.ncs||[]).forEach(n=>tot-=n.valor);
      const cob=COBROS_INI.find(x=>x.cli===nombre && x.factura===fa.factura);
      return {...fa, sub, tot, vence:cob?cob.vence:""};
    });
    const netoFacturas=factsConTot.reduce((s,x)=>s+x.tot,0);
    const cta=(()=>{
      let s=movsCli.filter(m=>m.fecha<fDesde).reduce((a,m)=>a+(m.debe||0)-(m.haber||0),0);
      const ini=s;
      const filas=movsCli.filter(m=>m.fecha>=fDesde && m.fecha<=fHasta).map(m=>{ s+=(m.debe||0)-(m.haber||0); return {...m, saldo:s}; });
      return {saldoIni:ini, filas, saldoFin:s};
    })();
    const liq=(()=>{
      const rows=movsCli.filter(m=>m.debe && m.fecha>partida).map(m=>{
        const num=m.concepto.replace("Fact ","");
        const det=(FACTURAS_DETALLE[nombre]||[]).find(x=>x.factura.endsWith(num));
        const ncP=det?(det.descuento||0)+((det.ncs)||[]).filter(n=>n.tipo!=="devolucion").reduce((s,n)=>s+n.valor,0):0;
        const rte=det?(det.retencion||0):0;
        return {num, valor:m.debe, ncP, rte, neto:m.debe-ncP-rte, det};
      });
      const totF=rows.reduce((s,r)=>s+r.neto,0);
      const devs=[]; rows.forEach(r=>{ ((r.det&&r.det.ncs)||[]).filter(n=>n.tipo==="devolucion").forEach(n=>devs.push(n)); });
      const totD=devs.reduce((s,n)=>s+n.valor,0);
      const abs=movsCli.filter(m=>m.haber && /^Abono/.test(m.concepto) && m.fecha>partida);
      const totA=abs.reduce((s,m)=>s+m.haber,0);
      return {rows, totF, devs, totD, abs, totA, total:totF-totD-totA};
    })();

    /* tabla monoespaciada: etiqueta a la izquierda, valor alineado a la derecha */
    const fila=(a,b,w=12)=>String(a).padEnd(w).slice(0,w)+String(b).padStart(11);
    const raya="―".repeat(23);
    const numF=x=>"…"+x.factura.slice(-3); /* factura corta para que la tabla no se rompa */
    const tabla=()=>{
      if(fmtEC==="simple"){
        const prox=factOrden[0];
        return [fila("Saldo",money(deudaTotal))].concat(prox?[fila("Vence",prox.vence.replace("Vencida","Venció hace"))]:[]).join("\n");
      }
      if(fmtEC==="factura"){
        const facts=FACTURAS_DETALLE[nombre]||[];
        if(!facts.length) return "Sin facturas pendientes";
        const col=(p,c,pr,t)=>String(p).padEnd(17).slice(0,17)+String(c).padStart(5)+String(pr).padStart(9)+String(t).padStart(11);
        const out=[]; let neto=0;
        facts.forEach((fa,ix)=>{
          const cob=COBROS_INI.find(x=>x.cli===nombre && x.factura===fa.factura);
          out.push(`FACT ${fa.factura} · ${fa.fecha}${cob?` · ${cob.vence}`:""}`);
          out.push(col("PRODUCTO","CANT","PRECIO","TOTAL"));
          let sub=0;
          fa.items.forEach(it=>{ const t=it.cant*it.precio; sub+=t; out.push(col(it.prod,it.cant,money(it.precio),money(t))); });
          out.push(raya);
          out.push(fila("Subtotal",money(sub),14));
          let tot=sub;

        });
        const c=(a,b,cc,d,e)=>String(a).padEnd(8)+String(b).padStart(10)+String(cc).padStart(9)+String(d).padStart(8)+String(e).padStart(11);

        out.push(raya, fila("TOTAL A PAGAR",money(totF-totD-totA),18));
        return out.join("\n");
      }
      return [fila("Al día",money(edad.alDia)),fila("Por vencer",money(edad.porVencer)),fila("Vencido",money(edad.vencido)),raya,
        fila("TOTAL",money(deudaTotal)),fila("Facturas",f.nFacturas),fila("Cheq. posf.",f.nCheques),fila("Crédito",f.diasCredito+" días")].join("\n");

           cols:{1:{halign:"right"},2:{halign:"right"},3:{halign:"right"},4:{halign:"right"}}});

  /* ── 9 · STOCK ── */
  if(sec==="stock"){

  /* ── MENÚ DE LA FICHA (3×3, compacto) ── */

    ["pedidos","pedidos","#7C5CBF","Pedidos",{n:pedidosCli.length||null}],

}
