function HistorialLineas({nombre, toast}){
  const [abreCompra,setAbreCompra]=useState(false);
  const [abreNo,setAbreNo]=useState(false);
  const [lineaAbierta,setLineaAbierta]=useState({}); // clave "compra|Arroz" -> bool
  const toggleLinea=(k)=>setLineaAbierta(s=>({...s,[k]:!s[k]}));

  const compraId = new Set(PRESENTACIONES.filter(p=>HISTORIAL[nombre+"|"+p.id]).map(p=>p.id));
  const lineas={};
  PRESENTACIONES.forEach(p=>{ (lineas[p.linea]=lineas[p.linea]||[]).push(p); });
  const ordenLineas=Object.keys(lineas).sort();

  const compra=[], noCompra=[];
  ordenLineas.forEach(ln=>{
    const dentro=lineas[ln];
    const c=dentro.filter(p=>compraId.has(p.id));
    const n=dentro.filter(p=>!compraId.has(p.id));
    if(c.length) compra.push([ln,c]);
    if(n.length) noCompra.push([ln,n]);
  });
  const totalCompra=compra.reduce((s,[,ps])=>s+ps.length,0);
  const totalNo=noCompra.reduce((s,[,ps])=>s+ps.length,0);

  const LineaFila=(grupo,modo)=>grupo.map(([ln,ps])=>{
    const k=modo+"|"+ln;
    const abierta=!!lineaAbierta[k];
    return (
      <div className="linea-blk" key={k}>
        <button className="linea-h2" onClick={()=>toggleLinea(k)}>
          <span className="linea-nom">{ln}</span>
          <span className={"linea-n"+(modo==="no"?" op":"")}>{ps.length}</span>
          <span className="acc-fl" style={{marginLeft:"auto"}}>{abierta?"▲":"▼"}</span>
        </button>
        {abierta && ps.map(p=>{
          if(modo==="si"){
            const h=HISTORIAL[nombre+"|"+p.id];
            return (
              <div className="linea-prod si" key={p.id}>
                <span className="lp-ic">✓</span>
                <div style={{flex:1}}><div className="lp-nom">{p.nombre}</div>
                  <div className="meta">Última: {h.cant} {p.unidad} · {h.fecha}</div></div>
              </div>
            );
          }
          return (
            <div className="linea-prod no" key={p.id} onClick={()=>toast(`Ofrécele ${p.nombre} a ${nombre}`)} style={{cursor:"pointer"}}>
              <span className="lp-ic op">+</span>
              <div style={{flex:1}}><div className="lp-nom">{p.nombre}</div>
                <div className="meta">Nunca lo ha comprado · oportunidad de venta</div></div>
              <span className="meta" style={{fontSize:18,color:"var(--maize-deep)"}}>›</span>
            </div>
          );
        })}
      </div>
    );
  });

  return (<>
    <button className="acc-h" onClick={()=>setAbreCompra(!abreCompra)}>
      <span className="acc-ic ok">✓</span>
      <div style={{flex:1,textAlign:"left"}}>
        <div className="acc-t">Productos que compra</div>
        <div className="acc-s">{totalCompra} producto(s) en {compra.length} línea(s)</div>
      </div>
      <span className="acc-fl">{abreCompra?"▲":"▼"}</span>
    </button>
    {abreCompra && (
      <div className="acc-body">
        {compra.length===0 ? <div className="ph">Aún no ha comprado productos.</div> : LineaFila(compra,"si")}
      </div>
    )}

    <button className="acc-h" onClick={()=>setAbreNo(!abreNo)} style={{marginTop:10}}>
      <span className="acc-ic op">+</span>
      <div style={{flex:1,textAlign:"left"}}>
        <div className="acc-t">No compra · oportunidades</div>
        <div className="acc-s">{totalNo} producto(s) en {noCompra.length} línea(s)</div>
      </div>
      <span className="acc-fl">{abreNo?"▲":"▼"}</span>
    </button>
    {abreNo && (
      <div className="acc-body">
        {noCompra.length===0 ? <div className="ph">Ya compra de todas las líneas. ¡Cliente completo!</div> : LineaFila(noCompra,"no")}
      </div>
    )}
  </>);
}

// ---------- LISTA DE PRECIOS (dashboard + consulta por línea/marca) ----------
function ListaPrecios({pedirCon}){
  const [q,setQ]=useState("");
  const [lineaSel,setLineaSel]=useState("Todas");
  const [vista,setVista]=useState("inicio"); // inicio | lista
  const [prodSel,setProdSel]=useState(null); // producto abierto en dashboard
  const [modoEnvio,setModoEnvio]=useState(false); // seleccionar productos para enviar
  const [marcados,setMarcados]=useState([]); // ids seleccionados
  const [verHist,setVerHist]=useState(false); // historial de precios del producto
  const [tipoHist,setTipoHist]=useState("contado"); // tipo de precio en el historial
  const [pagHist,setPagHist]=useState(1); // paginación del historial general
  /* botón atrás inteligente: producto → lista → inicio → sale */
  useRetroceso(()=>{
      if(verHist){ setVerHist(false); return true; }
      if(prodSel){ setProdSel(null); return true; }
      if(modoEnvio){ setModoEnvio(false); setMarcados([]); setVista("inicio"); return true; }
      if(vista!=="inicio"){ setVista("inicio"); return true; }
      return false;
    });
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const lineas=["Todas",...Array.from(new Set(PRESENTACIONES.map(p=>p.linea)))];

  /* utilidades por producto */
  const conUtil=PRESENTACIONES.map(p=>{
    const bruta=Math.round((p.baseCredito-(p.costo||0))*100)/100;
    const neta=Math.round((bruta-(p.costosOper||0))*100)/100;
    const pct=p.baseCredito>0?Math.round(neta/p.baseCredito*1000)/10:0;
    return {...p, bruta, neta, pct};
  });

  const lista=conUtil.filter(p=>{
    if(lineaSel!=="Todas" && p.linea!==lineaSel) return false;
    return norm(`${p.marca} ${p.linea} ${p.unidad}`).includes(norm(q));
  });
  const porLinea={};
  lista.forEach(p=>{ (porLinea[p.linea]=porLinea[p.linea]||[]).push(p); });
  const lineasOrd=Object.keys(porLinea).sort();

  /* datos del dashboard (filtrados por la línea elegida) */
  const baseDash = lineaSel==="Todas" ? conUtil : conUtil.filter(p=>p.linea===lineaSel);
  const utilPorLinea=Array.from(new Set(baseDash.map(p=>p.linea))).map(ln=>{
    const ps=baseDash.filter(p=>p.linea===ln);
    const prom=ps.reduce((s,p)=>s+p.neta,0)/(ps.length||1);
    return {linea:ln, prom:Math.round(prom*100)/100, n:ps.length};
  }).sort((a,b)=>b.prom-a.prom);
  const maxProm=Math.max(...utilPorLinea.map(x=>x.prom),1);
  const top3=[...baseDash].sort((a,b)=>b.neta-a.neta).slice(0,3);
  const sinStock=baseDash.filter(p=>p.stock<=0);

  /* envío del informe de precios por WhatsApp */
  const toggleMarca=(id)=>setMarcados(m=>m.includes(id)?m.filter(x=>x!==id):[...m,id]);
  const marcarLinea=(ln)=>{
    const ids=(porLinea[ln]||[]).map(p=>p.id);
    const todos=ids.every(i=>marcados.includes(i));
    setMarcados(m=>todos?m.filter(x=>!ids.includes(x)):Array.from(new Set([...m,...ids])));
  };
  const enviarInforme=()=>{
    const sel=conUtil.filter(p=>marcados.includes(p.id));
    if(!sel.length) return;
    if(!window.jspdf){ alert("El generador de PDF aún está cargando; intenta de nuevo."); return; }
    const doc=new window.jspdf.jsPDF();
    const VERDE=[21,57,43], GRIS=[110,120,110], CREMA=[244,240,229];
    const limpia=t=>String(t).replace(/[\u{1F300}-\u{1FAFF}\u2600-\u27BF\uFE0F]/gu,"").trim();
    /* membrete */
    doc.setFont("helvetica","bold"); doc.setFontSize(16); doc.setTextColor(...VERDE);
    doc.text("FREELANCE",14,18);
    doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(...GRIS);
    doc.text("12 jun 2026",196,18,{align:"right"});
    doc.setFontSize(12); doc.setFont("helvetica","bold"); doc.setTextColor(30,30,30);
    doc.text("LISTA DE PRECIOS",14,28);
    doc.setDrawColor(...VERDE); doc.setLineWidth(.6); doc.line(14,33,196,33);
    let y=42;

    if(sel.length===1){
      /* ── ficha de un solo producto, con imagen grande ── */
      const p=sel[0];
      doc.setDrawColor(225,222,210); doc.setFillColor(248,246,239);
      doc.roundedRect(14,y,58,58,4,4,"FD");
      doc.setFontSize(30); doc.setTextColor(150,150,150);
      doc.text("[  ]",43,y+34,{align:"center"});   /* espacio de la foto (Fase 4) */
      doc.setFontSize(7); doc.setTextColor(...GRIS);
      doc.text("imagen del producto",43,y+48,{align:"center"});
      doc.setFont("helvetica","bold"); doc.setFontSize(15); doc.setTextColor(30,30,30);
      doc.text(limpia(p.marca),80,y+12);
      doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.setTextColor(...GRIS);
      doc.text(limpia(p.unidad),80,y+20);
      doc.text("Codigo: "+p.id,80,y+27);
      doc.setTextColor(p.stock>0?46:194, p.stock>0?125:96, p.stock>0?82:58);
      doc.setFont("helvetica","bold");
      doc.text(p.stock>0?`Disponible - ${p.stock} qq`:"Sin stock",80,y+36);
      y+=66;
      const filas=[
        ["Contado",{content:money(p.baseContado),styles:{halign:"right"}}],
        ["Credito",{content:money(p.baseCredito),styles:{halign:"right",fontStyle:"bold"}}],
      ];
      /* la promoción solo aparece si el producto realmente la tiene */
      if(p.promosFreelance && p.promosFreelance[0])
        filas.push([limpia("Promocion "+p.promosFreelance[0].nombre),
          {content:money(p.promosFreelance[0].base),styles:{halign:"right"}}]);
      doc.autoTable({ startY:y, margin:{left:14,right:14}, theme:"grid",
        styles:{font:"helvetica",fontSize:10,cellPadding:3,lineColor:[196,202,194],lineWidth:.25},
        headStyles:{fillColor:VERDE,textColor:255,fontStyle:"bold"},
        head:[["TIPO DE PRECIO","VALOR"]], body:filas, columnStyles:{0:{cellWidth:120}} });
      y=doc.lastAutoTable.finalY+8;
      /* detalle de la promoción, si aplica */
      if(p.promosFreelance && p.promosFreelance[0] && p.promosFreelance[0].detalle){
        doc.setFont("helvetica","italic"); doc.setFontSize(9); doc.setTextColor(...GRIS);
        doc.text(limpia("Promocion: "+p.promosFreelance[0].detalle),14,y); y+=7;
      }
    } else {
      /* ── resumen por línea, tabla profesional ── */
      const porLn={};
      sel.forEach(p=>{ (porLn[p.linea]=porLn[p.linea]||[]).push(p); });
      Object.keys(porLn).sort().forEach(ln=>{
        if(y>250){ doc.addPage(); y=20; }
        doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(...VERDE);
        doc.text(limpia(ln).toUpperCase(),14,y+4); y+=7;
        doc.autoTable({ startY:y, margin:{left:14,right:14}, theme:"grid",
          styles:{font:"helvetica",fontSize:9,cellPadding:2.6,lineColor:[196,202,194],lineWidth:.25},
          headStyles:{fillColor:VERDE,textColor:255,fontStyle:"bold"},
          head:[["PRODUCTO","PRESENTACION","CONTADO","CREDITO"]],
          body:porLn[ln].map(p=>[limpia(p.marca),limpia(p.unidad),
            {content:money(p.baseContado),styles:{halign:"right"}},
            {content:money(p.baseCredito),styles:{halign:"right",fontStyle:"bold"}}]),
          columnStyles:{0:{cellWidth:62},1:{cellWidth:44},2:{halign:"right"},3:{halign:"right"}} });
        y=doc.lastAutoTable.finalY+7;

      promos:(c)=>(<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke={c} strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">

                <span style={{flex:1,minWidth:0,fontSize:12.5,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>

        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{flex:1,minWidth:0}}>
            <span style={{display:"block",fontWeight:700,fontSize:13}}>Elige los productos a enviar</span>
            <span className="meta" style={{fontSize:11}}>{marcados.length} seleccionado{marcados.length!==1?"s":""}</span>
          </span>

        </div>
      </div>

      <div className="box"><span className="mag">⌕</span>
        <input value={q} placeholder="Buscar producto…" onChange={e=>setQ(e.target.value)}/>

    </div>
    <div style={{marginBottom:14}}>
      <FiltroBuscador items={lineas.filter(l=>l!=="Todas")} value={lineaSel}
        onPick={setLineaSel} todos="Todas" etiquetaTodos="Todas las líneas"
        render={ln=>`${EMOJI_LINEA[ln]||""} ${ln}`}/>
    </div>

    {lineasOrd.map(ln=>(
      <div key={ln} style={{marginBottom:18}}>
        <div style={{display:"flex",alignItems:"center",gap:9,margin:"0 2px 8px"}}>
          {modoEnvio && (()=>{
            const todos=(porLinea[ln]||[]).every(p=>marcados.includes(p.id));
            return (
              <button onClick={()=>marcarLinea(ln)} aria-label={"Seleccionar toda la línea "+ln}
                style={{flexShrink:0,width:20,height:20,borderRadius:6,padding:0,cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit",
                  border:todos?"none":"2px solid #C9D2C9",
                  background:todos?"var(--field)":"#fff",color:"#fff",fontSize:13,fontWeight:800}}>
                {todos?"✓":""}
              </button>
            );
          })()}
          <span style={{fontWeight:800,fontSize:12,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".04em"}}>
            {EMOJI_LINEA[ln]||""} {ln}</span>
          <span style={{flex:1,height:1,background:"#E6E1D4"}}></span>
        </div>

        {porLinea[ln].map((p,i)=>{
          const sin=p.stock<=0;
          return (
            <div className="card" key={i} onClick={()=>modoEnvio?toggleMarca(p.id):setProdSel(p)}
              style={{padding:"12px 13px",marginBottom:8,cursor:"pointer",

                background:modoEnvio&&marcados.includes(p.id)?"#F4F9F5":"#fff"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {modoEnvio && (
                  <span style={{flexShrink:0,width:20,height:20,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",

                    background:marcados.includes(p.id)?"var(--field)":"#fff",color:"#fff",fontSize:13,fontWeight:800}}>
                    {marcados.includes(p.id)?"✓":""}
                  </span>
                )}
                <span style={{fontSize:20,flexShrink:0}}>{EMOJI_LINEA[p.linea]||"📦"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div className="cli" style={{fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.marca}</div>
                  <div className="meta" style={{fontSize:11}}>{(p.unidad||"")}{sin?" · sin stock":""}</div>
                </div>
                <div style={{flexShrink:0,display:"flex",gap:14,alignItems:"center"}}>
                  <div style={{textAlign:"right"}}>
                    <div className="meta" style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:".02em"}}>Compra</div>
                    <div className="num" style={{fontSize:13.5,fontWeight:700,color:"var(--muted)"}}>{money(p.costo)}</div>
                  </div>

                    <div className="meta" style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:".02em"}}>Crédito</div>
                    <div className="num" style={{fontSize:15,fontWeight:800,color:"var(--field)"}}>{money(p.baseCredito)}</div>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    ))}
    {lista.length===0 && <div className="ph">Sin productos que coincidan con “{q}”.</div>}

    {modoEnvio && marcados.length>0 && (
      <div style={{position:"fixed",left:12,right:12,bottom:78,zIndex:60}}>
        <button className="cta" style={{width:"100%",boxShadow:"0 8px 24px rgba(0,0,0,.22)"}} onClick={enviarInforme}>
          📄 Compartir {marcados.length===1?"ficha del producto":`lista (${marcados.length})`}
        </button>
      </div>
    )}
    {modoEnvio && <div style={{height:70}}></div>}
  </>);
}

function Productos({vender}){

  const lista=PRODUCTOS.filter(m=>{
    if(m.inhabilitada) return false; // inhabilitada por proveedor/freelance
    if(m.presentaciones.every(p=>p.inhabilitada)) return false; // todas sus presentaciones inhabilitadas
    const campos=norm(`${m.marca} ${m.linea} ${provName(m.provId)}`);
    return campos.includes(norm(q));
  });
  const porLinea={};
  lista.forEach(m=>{ (porLinea[m.linea]=porLinea[m.linea]||[]).push(m); });
  const lineasOrd=Object.keys(porLinea).sort();

  return (<>
    <div className="h1">Productos</div>
    <div className="sub">Marcas por línea de grano. Toca una marca para ver sus presentaciones.</div>
    <div className="ss" style={{marginBottom:16}}>
      <div className="box"><span className="mag">⌕</span>
        <input value={q} placeholder="Buscar por marca, línea o proveedor…" onChange={e=>setQ(e.target.value)}/>
        {q && <button className="clr" onClick={()=>setQ("")}>×</button>}
        <MicBtn onTexto={setQ}/></div>
    </div>

    {lineasOrd.map(ln=>(
      <div key={ln} style={{marginBottom:18}}>
        <div className="sec-h"><h2>{ln}</h2><div className="grain"></div></div>
        {porLinea[ln].map((m,i)=>{
          const activas=m.presentaciones.filter(p=>!p.inhabilitada);
          const nPres=activas.length;
          const nPromos=activas.reduce((s,p)=>s+p.promosFreelance.length,0);
          const desde=activas.length?Math.min(...activas.map(p=>p.baseContado)):0;
          return (
            <div className="card" key={i} style={{cursor:"pointer"}} onClick={()=>setSel(m)}>
              <div className="row" style={{alignItems:"center"}}>
                <div style={{flex:1}}>
                  <div className="cli">{m.marca}</div>
                  <div className="meta">{provName(m.provId)} · {nPres} presentación(es){nPromos>0?` · ${nPromos} promo(s)`:""}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div className="amt num">{money(desde)}</div>
                  <div className="meta">desde · contado</div>
                </div>
                <span className="meta" style={{fontSize:18,color:"var(--muted)",marginLeft:8}}>›</span>
              </div>
            </div>
          );
        })}
      </div>
    ))}
    {lista.length===0 && <div className="ph">Sin marcas que coincidan con “{q}”.</div>}
    <div className="lock"><span>🔒</span>
      <span>Solo ves tu base de venta. El costo del proveedor y el margen no son visibles para tu perfil.</span></div>
  </>);
}

function FichaMarca({marca, volver, vender}){
  const provName=id=>PROVEEDORES.find(x=>x.id===id)?.nombre||"";
  const activas=marca.presentaciones.filter(p=>!p.inhabilitada);
  const ini=AGRUPACION_INI[marca.marca]||{base:"quintal", uxCaja:0, uxFardo:0, precioBase:40};
  const [agr,setAgr]=useState(ini);
  const [editAgr,setEditAgr]=useState(false);
  const [guardado,setGuardado]=useState(false);
  const unidadNom=id=>UNIDADES_MEDIDA.find(u=>u.id===id)?.nombre||id;
  const guardarAgr=()=>{ AGRUPACION_INI[marca.marca]={...agr}; setEditAgr(false); setGuardado(true); setTimeout(()=>setGuardado(false),2000); };

  return (<>
    <button className="ghost" onClick={volver} style={{marginTop:0,marginBottom:16,textAlign:"left"}}>‹ Volver a productos</button>
    <span className="prod-linea">{marca.linea}</span>
    <div className="h1" style={{marginTop:8,marginBottom:4}}>{marca.marca}</div>
    <div className="sub">{provName(marca.provId)} · {activas.length} presentación(es)</div>

    <div className="ficha-sec">Unidades y agrupación</div>
    <div className="fcard" style={{marginBottom:14}}>
      {!editAgr ? (<>
        <div className="cu-line"><span>Unidad base de venta</span><b>{unidadNom(agr.base)}</b></div>
        {agr.uxCaja>0 && <div className="cu-line"><span>1 caja contiene</span><b className="num">{agr.uxCaja} unidades</b></div>}
        {agr.uxFardo>0 && <div className="cu-line"><span>1 fardo contiene</span><b className="num">{agr.uxFardo} unidades</b></div>}
        {agr.uxCaja===0 && agr.uxFardo===0 && <div className="meta" style={{marginTop:4}}>Sin agrupación en cajas o fardos (se vende por {unidadNom(agr.base).toLowerCase()}).</div>}
        <button className="ghost" style={{width:"100%",marginTop:10}} onClick={()=>setEditAgr(true)}>Editar agrupación</button>
        {guardado && <div className="part-ok" style={{marginTop:8}}>✓ Agrupación guardada</div>}
      </>) : (<>
        <div style={{marginBottom:10}}><div className="ficha-sec" style={{marginBottom:6}}>Unidad base de venta</div>
          <FiltroBuscador items={UNIDADES_MEDIDA.map(u=>u.id)} value={agr.base||""}
            onPick={v=>setAgr({...agr,base:v==="__"?"":v})}
            todos="__" etiquetaTodos="Elige unidad…"
            render={id=>{const u=UNIDADES_MEDIDA.find(x=>x.id===id);return u?u.nombre:id;}}/></div>
        <div className="field"><label>Unidades por caja (0 si no aplica)</label>
          <input type="number" value={agr.uxCaja} onChange={e=>setAgr({...agr,uxCaja:Number(e.target.value)||0})} placeholder="Ej. 48"/></div>
        <div className="field"><label>Unidades por fardo (0 si no aplica)</label>
          <input type="number" value={agr.uxFardo} onChange={e=>setAgr({...agr,uxFardo:Number(e.target.value)||0})} placeholder="Ej. 20"/></div>
        <div style={{display:"flex",gap:8}}>
          <button className="back" style={{flex:1}} onClick={()=>{setAgr(AGRUPACION_INI[marca.marca]||ini);setEditAgr(false);}}>Cancelar</button>
          <button className="cta" style={{flex:1,margin:0}} onClick={guardarAgr}>Guardar</button>
        </div>
        <div className="meta" style={{marginTop:8}}>Define cómo se agrupa este producto. Se aplicará en ventas, pedidos y stock al conectar el sistema.</div>
      </>)}
    </div>

    {activas.map((pr,i)=>(
      <div className="card prod-card" key={i}>
        <div className="pres-head">
          <div className="pres-img">{EMOJI_LINEA[marca.linea]||"📦"}</div>
          <div style={{flex:1}}>
            <div className="cli">{pr.tam}</div>
            <div className="meta">{marca.marca}</div>
          </div>
        </div>
        <div className="prod-bases">
          <div className="pb">
            <div className="pb-k">Base contado</div>
            <div className="pb-v num">{money(pr.baseContado)}</div>
          </div>
          <div className="pb">
            <div className="pb-k">Base crédito</div>
            <div className="pb-v num">{money(pr.baseCredito)}</div>
          </div>
        </div>
        {pr.promosFreelance.length>0 ? (
          <div className="prod-promos">
            <div className="pp-h">Promociones del freelance · {pr.promosFreelance.length}</div>
            {pr.promosFreelance.map(p=>(
              <div className="pp-row" key={p.id}>
                <span className="pp-tag">P4</span>
                <div style={{flex:1}}><div className="pp-nom">{p.nombre}</div>
                  <div className="meta">{p.detalle}</div></div>
                <div style={{textAlign:"right"}}><div className="pp-base num">{money(p.base)}</div>
                  <div className="meta">base</div></div>
              </div>
            ))}
          </div>
        ) : (
          <div className="meta" style={{marginTop:10}}>Sin promociones del freelance para esta presentación.</div>
        )}
        <button className="mini-cta" style={{marginTop:12,marginLeft:0,width:"100%",textAlign:"center"}}
          onClick={()=>vender(PRESENTACIONES.find(x=>x.id===pr.id))}>
          Vender →</button>
      </div>
    ))}
    <div className="lock"><span>🔒</span>
      <span>Solo ves tu base de venta. El costo del proveedor y el margen no son visibles para tu perfil.</span></div>
  </>);
}

function Agenda({toast, verCliente}){
  const HOY="2026-06-13";
  /* ── datos demo enriquecidos ── */
  const inicial=[
    {id:1, fecha:"2026-06-11", hora:"15:00", cli:"Bodega El Agricultor", tipo:"Cobro",
     objetivo:"Cobrar factura 000091", ubic:"Quevedo, San Camilo", estado:"pendiente", dur:30, recordatorio:15},
    {id:2, fecha:"2026-06-12", hora:"09:00", cli:"Mayorista Santa Rosa", tipo:"Stock",
     objetivo:"Revisar existencias de arroz", ubic:"Santa Rosa, El Cambio", estado:"pendiente", dur:45, recordatorio:15},
    {id:3, fecha:"2026-06-13", hora:"08:30", cli:"Comercial Mendoza", tipo:"Visita",
     objetivo:"Tomar pedido mensual de arroz", ubic:"Milagro, Las Piñas", estado:"camino", dur:30, recordatorio:15},
    {id:4, fecha:"2026-06-13", hora:"10:00", cli:"Distribuidora Ríos", tipo:"Cobro",
     objetivo:"Retirar cheque · factura vence hoy", ubic:"Ambato, Ficoa", estado:"pendiente", dur:20, recordatorio:15},
    {id:5, fecha:"2026-06-13", hora:"15:00", cli:"Tienda La Esquina", tipo:"Entrega",
     objetivo:"Coordinar descarga con encargado", ubic:"Milagro, Centro", estado:"completada", dur:60, recordatorio:30,
     resultado:"Entregado conforme", obs:"Recibió el encargado"},
    {id:6, fecha:"2026-06-14", hora:"09:30", cli:"Abarrotes Don Pepe", tipo:"Visita",
     objetivo:"Presentar nueva línea de harina", ubic:"Guayaquil, Sur", estado:"pendiente", dur:40, recordatorio:15},
    {id:7, fecha:"2026-06-17", hora:"11:00", cli:"Comisariato La Y", tipo:"Visita",
     objetivo:"Negociar espacio en góndola", ubic:"Guayaquil, Norte", estado:"pendiente", dur:60, recordatorio:30},
  ];
  const [tareas,setTareas]=useState(inicial);
  const [nueva,setNueva]=useState(false);
  const [sel,setSel]=useState(null);          // actividad abierta (acciones rápidas)
  const [completando,setCompletando]=useState(null);  // actividad en proceso de completar
  const [reprog,setReprog]=useState(null);    // actividad a reprogramar
  const [noReal,setNoReal]=useState(null);    // actividad no realizada
  const [vista,setVista]=useState("lista");   // lista | dia
  const [q,setQ]=useState("");
  const [verFiltros,setVerFiltros]=useState(false);
  const [fTipo,setFTipo]=useState("Todos");
  const [fEstado,setFEstado]=useState("Todos");
  const [fZona,setFZona]=useState("Todas");
  /* formulario de nueva actividad */
  const [fecha,setFecha]=useState("");
  const [hora,setHora]=useState("");
  const [cli,setCli]=useState(null);
  const [tipo,setTipo]=useState("Visita");
  const [objetivo,setObjetivo]=useState("");
  const [ubicF,setUbicF]=useState("");
  const [dur,setDur]=useState(30);
  const [recor,setRecor]=useState(15);
  const [todoDia,setTodoDia]=useState(false);
  const [recurrente,setRecurrente]=useState(false);
  const [detalleTipo,setDetalleTipo]=useState("");   // campo dinámico según tipo
  /* evidencia al completar */
  const [evResultado,setEvResultado]=useState("");
  const [evObs,setEvObs]=useState("");
  const [evValor,setEvValor]=useState("");
  const [evForma,setEvForma]=useState("Efectivo");
  const [motivoR,setMotivoR]=useState("");
  const [nuevaFechaR,setNuevaFechaR]=useState("");

  useModal(nueva, React.useCallback(()=>setNueva(false),[]));
  useModal(!!sel, React.useCallback(()=>setSel(null),[]));
  useModal(!!completando, React.useCallback(()=>setCompletando(null),[]));
  useModal(!!reprog, React.useCallback(()=>setReprog(null),[]));
  useModal(!!noReal, React.useCallback(()=>setNoReal(null),[]));
  useModal(verFiltros, React.useCallback(()=>setVerFiltros(false),[]));
  useRetroceso(()=>{
    if(completando){ setCompletando(null); return true; }
    if(reprog){ setReprog(null); return true; }
    if(noReal){ setNoReal(null); return true; }
    if(sel){ setSel(null); return true; }
    if(nueva){ setNueva(false); return true; }
    if(verFiltros){ setVerFiltros(false); return true; }
    return false;
  });

  /* ── configuración de tipos ── */
  const TIPOS=[
    {k:"Visita",  ico:"clientes", col:"#2B6CB0", bg:"#E9F0F8"},
    {k:"Cobro",   ico:"cobros",   col:"#2E7D52", bg:"#E4F1E9"},
    {k:"Stock",   ico:"stock",    col:"#D98324", bg:"#FBF0E4"},
    {k:"Entrega", ico:"pedidos",  col:"#7C5CBF", bg:"#F3ECF9"},
    {k:"Otro",    ico:"datos",    col:"#6B7280", bg:"#EFF1F3"},
  ];
  const tipoDe=k=>TIPOS.find(t=>t.k===k)||TIPOS[4];
  const ESTADOS={
    pendiente:{t:"Pendiente",     col:"#6B7280", bg:"#EFF1F3"},
    camino:   {t:"En camino",     col:"#2B6CB0", bg:"#E9F0F8"},
    proceso:  {t:"En proceso",    col:"#C9A227", bg:"#FBF3DC"},
    completada:{t:"Completada",   col:"#2E7D52", bg:"#E4F1E9"},
    norealizada:{t:"No realizada",col:"#C2603A", bg:"#FBE9E4"},
    reprogramada:{t:"Reprogramada",col:"#7C5CBF", bg:"#F3ECF9"},
  };
  const estadoDe=k=>ESTADOS[k]||ESTADOS.pendiente;

  /* ── utilidades de fecha ── */
  const DIAS=["Dom.","Lun.","Mar.","Mié.","Jue.","Vie.","Sáb."];
  const MES3=["ene.","feb.","mar.","abr.","may.","jun.","jul.","ago.","sep.","oct.","nov.","dic."];
  const dObj=f=>new Date(f+"T00:00:00");
  const fAmable=f=>{ const d=dObj(f); return isNaN(d)?f:`${DIAS[d.getDay()]} ${d.getDate()} ${MES3[d.getMonth()]}`; };
  const maniana=(()=>{ const d=dObj(HOY); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); })();

  /* ── filtrado y agrupación ── */
  const norm=s=>String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const zonas=["Todas",...Array.from(new Set(tareas.map(t=>(t.ubic||"").split(",")[0]).filter(Boolean)))];
  const filtradas=tareas.filter(t=>{
    if(fTipo!=="Todos" && t.tipo!==fTipo) return false;
    if(fEstado!=="Todos" && t.estado!==fEstado) return false;
    if(fZona!=="Todas" && !(t.ubic||"").startsWith(fZona)) return false;
    if(q.trim()){ const s=norm(t.cli+" "+t.objetivo+" "+t.ubic); if(!s.includes(norm(q))) return false; }
    return true;
  }).sort((a,b)=> (a.fecha+a.hora) < (b.fecha+b.hora) ? -1 : 1);

  const grupos=(()=>{
    const g={vencidas:[],hoy:[],maniana:[],proximas:[],completadas:[]};
    filtradas.forEach(t=>{
      if(t.estado==="completada"||t.estado==="norealizada"){ g.completadas.push(t); return; }
      if(t.fecha<HOY) g.vencidas.push(t);
      else if(t.fecha===HOY) g.hoy.push(t);
      else if(t.fecha===maniana) g.maniana.push(t);
      else g.proximas.push(t);
    });
    return g;
  })();
  const nPend=tareas.filter(t=>t.estado!=="completada"&&t.estado!=="norealizada").length;
  const nHechas=tareas.filter(t=>t.estado==="completada").length;
  const nVenc=grupos.vencidas.length;
  const proxima=[...grupos.hoy].filter(t=>t.hora>="00:00").sort((a,b)=>a.hora<b.hora?-1:1)[0];

  /* ── acciones ── */
  const actualizar=(id,cambios)=>setTareas(ts=>ts.map(t=>t.id===id?{...t,...cambios}:t));
  const iniciar=(t)=>{ actualizar(t.id,{estado:"proceso"}); setSel(null); toast("Actividad iniciada"); };
  const abrirMapa=(t)=>{ window.open("https://www.google.com/maps/search/?api=1&query="+encodeURIComponent((t.ubic||t.cli)+", Ecuador"),"_blank"); };
  const llamar=(t)=>{ const f=FICHA_CLIENTE[t.cli]||{}; if(!f.tel){ toast("Este cliente no tiene teléfono registrado"); return; } window.location.href="tel:"+f.tel; };
  const guardarCompletada=()=>{
    const t=completando;
    if(!evResultado.trim()){ toast("Indica el resultado de la actividad"); return; }
    const extra={resultado:evResultado, obs:evObs};
    if(t.tipo==="Cobro"){ extra.valorCobrado=evValor; extra.forma=evForma; }
    actualizar(t.id,{estado:"completada",...extra});
    setCompletando(null); setSel(null); setEvResultado(""); setEvObs(""); setEvValor("");
    toast("Actividad completada");
  };
  const guardarReprog=()=>{
    if(!nuevaFechaR){ toast("Elige la nueva fecha"); return; }
    if(!motivoR.trim()){ toast("Indica el motivo de la reprogramación"); return; }
    actualizar(reprog.id,{fecha:nuevaFechaR, estado:"pendiente", motivoReprog:motivoR});
    setReprog(null); setSel(null); setMotivoR(""); setNuevaFechaR("");
    toast("Actividad reprogramada");
  };
  const guardarNoReal=()=>{
    if(!motivoR.trim()){ toast("Indica por qué no se realizó"); return; }
    actualizar(noReal.id,{estado:"norealizada", motivoNo:motivoR});
    setNoReal(null); setSel(null); setMotivoR("");
    toast("Marcada como no realizada");
  };
  /* validación del formulario */
  const cruce=tareas.some(t=>t.fecha===fecha && t.hora===hora && t.estado!=="completada");
  const fechaPasada=fecha && fecha<HOY;
  const formOk = cli && fecha && tipo && objetivo.trim().length>0;
  const agregar=()=>{
    if(!formOk) return;
    const id=Math.max(0,...tareas.map(t=>t.id))+1;
    setTareas([...tareas,{id, fecha, hora:todoDia?"":(hora||"08:00"), cli, tipo, objetivo,
      ubic:ubicF||((FICHA_CLIENTE[cli]||{}).ciudad||""), estado:"pendiente", dur, recordatorio:recor,
      todoDia, recurrente, detalle:detalleTipo}]);
    setNueva(false);
    setCli(null); setFecha(""); setHora(""); setObjetivo(""); setUbicF(""); setDetalleTipo("");
    setTodoDia(false); setRecurrente(false);
    toast("Actividad agregada a la agenda");
  };

  /* ── tarjeta de actividad ── */
  const Tarjeta=({t})=>{
    const tp=tipoDe(t.tipo), es=estadoDe(t.estado);
    const venc=t.fecha<HOY && t.estado!=="completada" && t.estado!=="norealizada";
    return (
      <div className="card" onClick={()=>setSel(t)}
        style={{padding:"11px 12px",marginBottom:8,cursor:"pointer",
          borderLeft:`3px solid ${venc?"#C2603A":tp.col}`}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
          <span style={{width:30,height:30,borderRadius:9,background:tp.bg,flexShrink:0,
            display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ico n={tp.ico} c={tp.col} s={16}/></span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <span style={{flex:1,minWidth:0,fontSize:13.5,fontWeight:700,overflow:"hidden",
                textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.cli}</span>
              <span style={{flexShrink:0,fontSize:9.5,fontWeight:700,padding:"2px 7px",borderRadius:7,
                background:es.bg,color:es.col}}>{es.t}</span>
            </div>
            <div className="meta" style={{fontSize:11.5,marginTop:2,overflow:"hidden",
              textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.objetivo}</div>
            <div className="meta" style={{fontSize:10.5,marginTop:3,display:"flex",gap:8,flexWrap:"wrap"}}>
              <span style={{color:venc?"#C2603A":"inherit",fontWeight:venc?700:400}}>
                {fAmable(t.fecha)}{t.hora?" · "+t.hora:" · todo el día"}</span>
              {t.ubic && <span>· {t.ubic}</span>}
            </div>
          </div>
        </div>
      </div>
    );
  };
  const Grupo=({titulo, items, alerta})=>{
    if(!items.length) return null;
    return (
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8,margin:"0 2px 7px"}}>
          <span style={{fontSize:11,fontWeight:800,letterSpacing:".04em",textTransform:"uppercase",
            color:alerta?"#C2603A":"var(--muted)"}}>{titulo} ({items.length})</span>
          <span style={{flex:1,height:1,background:"#E6E1D4"}}></span>
        </div>
        {items.map(t=><Tarjeta key={t.id} t={t}/>)}
      </div>
    );
  };

  /* ══ VISTA DÍA ══ */
  if(vista==="dia"){
    const delDia=filtradas.filter(t=>t.fecha===HOY);
    const HORAS=["07:00","08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00"];
    return (<>
      <div className="h1">Agenda</div>
      <div className="eq-tabs" style={{marginBottom:12}}>
        <button className={vista==="lista"?"on":""} onClick={()=>setVista("lista")}>Lista</button>
        <button className={vista==="dia"?"on":""} onClick={()=>setVista("dia")}>Día</button>
      </div>
      <div className="neu" style={{padding:"12px 14px",marginBottom:12}}>
        <div className="neu-t">{fAmable(HOY)}</div>
        <div className="neu-s" style={{marginBottom:0}}>{delDia.length} actividad(es) programadas</div>
      </div>
      {HORAS.map(h=>{
        const enHora=delDia.filter(t=>(t.hora||"").slice(0,2)===h.slice(0,2));
        return (
          <div key={h} style={{display:"flex",gap:10,marginBottom:enHora.length?8:2}}>
            <span style={{width:42,flexShrink:0,fontSize:10.5,fontWeight:700,color:"var(--muted)",paddingTop:3}}>{h}</span>
            <div style={{flex:1,minWidth:0,borderTop:"1px solid #EFEBE0",paddingTop:enHora.length?0:4}}>
              {enHora.map(t=><Tarjeta key={t.id} t={t}/>)}
            </div>
          </div>
        );
      })}
      <button className="cta" style={{marginTop:10}} onClick={()=>setNueva(true)}>+ Nueva actividad</button>
    </>);
  }

  /* ══ VISTA LISTA (principal) ══ */
  return (<>
    <div className="h1">Agenda</div>

    {/* resumen compacto */}
    <div className="neu" style={{padding:"12px 14px",marginBottom:11}}>
      <div style={{display:"flex",justifyContent:"space-between",textAlign:"center"}}>
        <span style={{flex:1}}>
          <span className="num" style={{display:"block",fontSize:18,fontWeight:800,color:"var(--field)"}}>{nPend}</span>
          <span className="meta" style={{fontSize:9.5}}>Pendientes</span></span>
        <span style={{flex:1}}>
          <span className="num" style={{display:"block",fontSize:18,fontWeight:800,color:"#2E7D52"}}>{nHechas}</span>
          <span className="meta" style={{fontSize:9.5}}>Completadas</span></span>
        <span style={{flex:1}}>
          <span className="num" style={{display:"block",fontSize:18,fontWeight:800,color:nVenc?"#C2603A":"var(--muted)"}}>{nVenc}</span>
          <span className="meta" style={{fontSize:9.5}}>Vencidas</span></span>
      </div>
      {proxima && (
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,paddingTop:9,borderTop:"1px dashed #E0DBCE"}}>
          <Ico n="reloj" c="#C9A227" s={15}/>
          <span style={{flex:1,minWidth:0,fontSize:11.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            <b>Próxima {proxima.hora}</b> · {proxima.cli}</span>
        </div>
      )}
    </div>

    {/* vistas */}
    <div className="eq-tabs" style={{marginBottom:10}}>
      <button className={vista==="lista"?"on":""} onClick={()=>setVista("lista")}>Lista</button>
      <button className={vista==="dia"?"on":""} onClick={()=>setVista("dia")}>Día</button>
    </div>

    {/* buscador y filtros */}
    <div className="row" style={{gap:9,marginBottom:12,alignItems:"stretch",minWidth:0}}>
      <div className="ss" style={{flex:1,minWidth:0,marginBottom:0}}>
        <div className="box"><span className="mag">⌕</span>
          <input value={q} placeholder="Buscar…" onChange={e=>setQ(e.target.value)}/>
          <MicBtn onTexto={setQ}/>
          {q && <button className="clr" onClick={()=>setQ("")}>×</button>}</div>
      </div>
      <button className="filtrar-btn" onClick={()=>setVerFiltros(v=>!v)}>Filtros</button>
    </div>
    {verFiltros && (
      <div className="card" style={{padding:"13px 14px",marginBottom:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
          <FiltroBuscador items={TIPOS.map(t=>t.k)} value={fTipo} onPick={setFTipo}
            todos="Todos" etiquetaTodos="Tipo: todos"/>
          <FiltroBuscador items={Object.keys(ESTADOS)} value={fEstado} onPick={setFEstado}
            todos="Todos" etiquetaTodos="Estado: todos" render={k=>ESTADOS[k]?ESTADOS[k].t:k}/>
          <FiltroBuscador estilo={{gridColumn:"1 / -1"}}
            items={zonas.filter(z=>z!=="Todas")} value={fZona} onPick={setFZona}
            todos="Todas" etiquetaTodos="Zona: todas"/>
        </div>
        {(fTipo!=="Todos"||fEstado!=="Todos"||fZona!=="Todas") && (
          <button className="mini-link" style={{marginTop:9}}
            onClick={()=>{setFTipo("Todos");setFEstado("Todos");setFZona("Todas");}}>Quitar filtros</button>
        )}
      </div>
    )}

    <Grupo titulo="Vencidas" items={grupos.vencidas} alerta/>
    <Grupo titulo={"Hoy · "+fAmable(HOY)} items={grupos.hoy}/>
    <Grupo titulo={"Mañana · "+fAmable(maniana)} items={grupos.maniana}/>
    <Grupo titulo="Próximas" items={grupos.proximas}/>
    <Grupo titulo="Completadas" items={grupos.completadas}/>
    {filtradas.length===0 && <div className="ph">No hay actividades que coincidan.</div>}

    <button className="cta" style={{marginTop:6}} onClick={()=>setNueva(true)}>+ Nueva actividad</button>

    {/* ══ ACCIONES RÁPIDAS ══ */}
    {sel && (()=>{
      const tp=tipoDe(sel.tipo), es=estadoDe(sel.estado);
      const fin = sel.estado==="completada"||sel.estado==="norealizada";
      const Fila=({ico,col,txt,onClick,destac})=>(
        <button onClick={onClick} style={{display:"flex",width:"100%",alignItems:"center",gap:11,
          padding:"12px 4px",background:"none",border:"none",borderTop:"1px solid #F2EFE6",
          cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
          <Ico n={ico} c={col} s={18}/>
          <span style={{flex:1,fontSize:13.5,fontWeight:destac?800:600,color:destac?col:"var(--ink)"}}>{txt}</span>
          <span style={{color:"var(--muted)",fontSize:15}}>›</span>
        </button>
      );
      return (
        <div className="ov" onClick={()=>setSel(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:4}}>
              <span style={{width:36,height:36,borderRadius:10,background:tp.bg,flexShrink:0,
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Ico n={tp.ico} c={tp.col} s={18}/></span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sel.cli}</div>
                <div className="meta" style={{fontSize:11}}>{sel.tipo} · {fAmable(sel.fecha)}{sel.hora?" · "+sel.hora:""}</div>
              </div>
              <span style={{flexShrink:0,fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:7,
                background:es.bg,color:es.col}}>{es.t}</span>
            </div>
            <div className="meta" style={{fontSize:11.5,marginBottom:10}}>{sel.objetivo}</div>

            <Fila ico="clientes" col="#2B6CB0" txt="Ver ficha del cliente"
              onClick={()=>{ setSel(null); verCliente && verCliente(sel.cli); }}/>
            <Fila ico="datos" col="#2E7D52" txt="Llamar" onClick={()=>llamar(sel)}/>
            <Fila ico="ruta" col="#C2603A" txt="Abrir ubicación" onClick={()=>abrirMapa(sel)}/>

            {!fin && (<>
              {sel.estado!=="proceso" && <Fila ico="ok" col="#C9A227" txt="Iniciar actividad" onClick={()=>iniciar(sel)} destac/>}
              <Fila ico="ok" col="#2E7D52" txt="Completar actividad" destac
                onClick={()=>{ setCompletando(sel); setEvResultado(""); setEvObs(""); setEvValor(""); }}/>
              <Fila ico="visitas" col="#7C5CBF" txt="Reprogramar"
                onClick={()=>{ setReprog(sel); setMotivoR(""); setNuevaFechaR(""); }}/>
              <Fila ico="menos" col="#C2603A" txt="Marcar como no realizada"
                onClick={()=>{ setNoReal(sel); setMotivoR(""); }}/>
            </>)}
            {fin && sel.resultado && (
              <div className="neu-in" style={{marginTop:10}}>
                <div className="meta" style={{fontSize:10}}>Resultado</div>
                <div style={{fontSize:13,fontWeight:700}}>{sel.resultado}</div>
                {sel.obs && <div className="meta" style={{fontSize:11,marginTop:3}}>{sel.obs}</div>}
              </div>
            )}
            <button className="back" style={{width:"100%",marginTop:12}} onClick={()=>setSel(null)}>Cerrar</button>
          </div>
        </div>
      );
    })()}

    {/* ══ COMPLETAR: evidencia según tipo ══ */}
    {completando && (
      <div className="ov" onClick={()=>setCompletando(null)}>
        <div className="sheet" onClick={e=>e.stopPropagation()}>
          <h3>Completar actividad</h3>

function BarrasComision({valores, color, unidad, unidadLbl}){
  const esOtra=unidad==="qq"||unidad==="otra";
  const suf=unidadLbl||"qq";
  const fmt=v=>esOtra?(Math.round(v*10)/10+" "+suf):money(v);
  const lblBarra=v=>{
    if(v<=0) return "";
    if(esOtra) return Math.round(v)+"";
    return v>=1000?(v/1000).toFixed(1)+"k":String(Math.round(v));
  };
  const max=Math.max(...valores,0.0001);
  const total=valores.reduce((a,b)=>a+b,0);
  const conVal=valores.filter(v=>v>0).length;
  const mejorIdx=valores.indexOf(Math.max(...valores));
  return (
    <div className="fcard" style={{marginBottom:14}}>
      <div className="cm-resumen">
        <div><div className="fk">Total</div><div className="fv num">{fmt(total)}</div></div>
        <div><div className="fk">Promedio</div><div className="fv num">{fmt(conVal>0?total/conVal:0)}</div></div>
        <div><div className="fk">Mejor mes</div><div className="fv">{total>0?MESES_COM[mejorIdx]:"—"}</div></div>
      </div>
      <div className="cm-chart">
        {valores.map((v,i)=>(
          <div className="cm-col" key={i}>
            <div className="cm-bar-wrap">
              {v>0 && <span className="cm-val">{lblBarra(v)}</span>}
              <div className="cm-bar" style={{height:Math.round(v/max*100)+"%",
                background:i===mejorIdx&&v>0?"var(--maize)":(color||"var(--field-700)")}}></div>
            </div>
            <div className="cm-mes">{MESES_COM[i]}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Cuenta({usuario, onSalir}){
  useRetroceso(()=>{
      if(verFiltrosR){ setVerFiltrosR(false); return true; }
      if(verProv){ setVerProv(null); return true; }
      if(verVend){ setVerVend(null); return true; }

  const liberadas=64.00, pendientes=125.00, descuentos=62.00;

  const neto=liberadas+margenEquipo-descuentos;
  const nFactPend=14, clientesPorCobrar=8, valorPorCobrar=4500.00;
  const metaPct=80, ventaActual=40000, metaTotal=50000;
  const variacion=12;
  const cierre="30-jun-2026", pagoEstimado=125.00;

  const dataAnio=COMISIONES_EQUIPO[anio]||{};
  const resumenVend=EQUIPO_INI.map(sc=>{
    const d=dataAnio[sc.id];
    if(!d) return {sc, generada:0, liberada:0, retenida:0, pagado:0, pendiente:0, anticipo:0, meses:[]};
    const generada=d.meses.reduce((a,m)=>a+m.generada,0);
    const liberada=d.meses.reduce((a,m)=>a+m.liberada,0);
    const retenida=d.meses.reduce((a,m)=>a+m.retenida,0);
    const pagado=d.meses.reduce((a,m)=>a+m.pagado,0);
    const pendiente=liberada-pagado-d.anticipo; // lo que falta pagar (liberado − pagado − anticipos)
    return {sc, generada, liberada, retenida, pagado, pendiente:Math.max(0,pendiente), anticipo:d.anticipo, meses:d.meses};
  }).sort((a,b)=>b.generada-a.generada); // ordenado mayor a menor por comisión generada

  const totalGenerada=resumenVend.reduce((a,v)=>a+v.generada,0);
  const totalPagar=resumenVend.reduce((a,v)=>a+v.pendiente,0);
  const totalRetenida=resumenVend.reduce((a,v)=>a+v.retenida,0);

  const comFreelanceMes=COMISION_FREELANCE[anio]||Array(12).fill(0);
  /* Reporte filtrable de comisión mes a mes */

    (fProvR==="Todos"    || m.provId===fProvR) &&

  const ctxR=[ fProvR!=="Todos" ? (PROVEEDORES.find(p=>p.id===fProvR)||{}).nombre : null,
    fProdR!=="Todos"?fProdR:null, fCliR!=="Todos"?fCliR:null,

  }).sort((a,b)=>b.generada-a.generada);
  const provGenerada=resumenProv.reduce((a,p)=>a+p.generada,0);

function Novedades({toast, go}){
  useRetroceso(()=>{
      if(prodSel){ setProdSel(null); return true; }
      if(paso!=="menu"){ setPaso("menu"); return true; }
      return false;
    });
  const [cli,setCli]=useState(null);
  const [prov,setProv]=useState(null);
  const [tipo,setTipo]=useState(null);       // cambio-mismo | cambio-otro | producto | descuento
  const [paso,setPaso]=useState("menu");      // menu | form
  const [lista,setLista]=useState(NOVEDADES_INI);
  const [cheques,setCheques]=useState(CHEQUES_DEVUELTOS);
  const [pestana,setPestana]=useState("recibidas"); // recibidas | enviadas

  const [prodSel,setProdSel]=useState(null);
  const [prodDestino,setProdDestino]=useState(null);
  const [factSel,setFactSel]=useState(null);
  const [busca,setBusca]=useState("");
  const [montos,setMontos]=useState({});      // pid -> valor
  const [cantCambio,setCantCambio]=useState("");
  const [llevar,setLlevar]=useState({});       // pid -> cantidad a llevar (cambio-otro)
  const [resol,setResol]=useState(null);        // resolución caso 3: cobrar | credito

  const reset=()=>{setTipo(null);setPaso("menu");setProdSel(null);setProdDestino(null);setFactSel(null);setBusca("");setMontos({});setCantCambio("");setLlevar({});setResol(null);};
  const resetDesdeCli=()=>{setProv(null);reset();};

  const provId = prov?.id;
  const vendidosIds = (cli&&provId)
    ? PRESENTACIONES.filter(p=>p.provId===provId && HISTORIAL[cli+"|"+p.id]).map(p=>p.id) : [];
  const prodsVendidos = PRESENTACIONES.filter(p=>vendidosIds.includes(p.id));
  const prodsProveedor = (provId? PRESENTACIONES.filter(p=>p.provId===provId):[])
    .slice().sort((a,b)=>{
      const av=vendidosIds.includes(a.id)?0:1, bv=vendidosIds.includes(b.id)?0:1;
      return av-bv || a.nombre.localeCompare(b.nombre);
    });
  const facturasCli = (cli&&prov)
    ? FACTURAS.filter(f=>f.cli===cli && f.prov===prov.nombre)
        .filter(f=> busca==="" || f.num.includes(busca.trim()))
        .sort((a,b)=>a.fecha<b.fecha?1:-1) : [];

  const delCliProv = (cli&&prov) ? lista.filter(n=>n.cli===cli) : [];

  const precioVendido=(pid)=>{
    const fs=FACTURAS.filter(f=>f.cli===cli && f.prov===prov?.nombre).sort((a,b)=>a.fecha<b.fecha?1:-1);
    for(const f of fs){ const it=f.items.find(i=>i.pid===pid); if(it) return it.precio; }
    const h=HISTORIAL[cli+"|"+pid]; if(h) return h.precio;
    const pr=PRESENTACIONES.find(p=>p.id===pid); return pr?pr.baseCredito:0;
  };
  const precioLlevar=(pid)=>{ const pr=PRESENTACIONES.find(p=>p.id===pid); return pr?pr.baseCredito:0; };

  const valorAFavor = (prodSel && parseFloat(cantCambio)>0) ? precioVendido(prodSel.id)*parseFloat(cantCambio) : 0;
  const valorLlevado = Object.keys(llevar).reduce((s,pid)=>{ const c=parseFloat(llevar[pid])||0; return s + c*precioLlevar(pid); },0);
  const saldo = valorAFavor - valorLlevado; // >0 a favor cliente, <0 a favor proveedor, 0 cuadra

  const enviar=(detalle)=>{
    const nueva={id:Date.now(), cli, tipo, detalle, fecha:"hoy", estado:"enviada"};
    setLista([nueva,...lista]); reset();
    toast("Solicitud enviada al proveedor. Quedó en seguimiento.");
  };

  const totalFactura=()=>{
    if(!factSel) return 0;
    return factSel.items.reduce((s,it)=>{
      const v=parseFloat(montos[it.pid])||0;
      if(tipo==="descuento") return s + v*it.cant;
      if(tipo==="producto") return s + v*it.precio;
      return s;
    },0);
  };

  return (<>
    <div className="h1">Novedades</div>
    <div className="sub">Lo que el proveedor te comunica y las solicitudes que tú le envías.</div>

    <div className="eq-tabs">
      <button className={pestana==="recibidas"?"on":""} onClick={()=>setPestana("recibidas")}>
        Recibidas{cheques.filter(c=>c.estado==="pendiente").length>0 && <span className="eq-tab-badge">{cheques.filter(c=>c.estado==="pendiente").length}</span>}
      </button>
      <button className={pestana==="enviadas"?"on":""} onClick={()=>setPestana("enviadas")}>Enviadas</button>
    </div>

    {pestana==="recibidas" && (<>
      
      {cheques.filter(c=>c.estado==="pendiente").length>0 && (
        <div style={{marginBottom:18}}>
          <div className="sec-h"><h2>⚠️ Cheques devueltos · {cheques.filter(c=>c.estado==="pendiente").length}</h2><div className="grain"></div></div>
          {cheques.filter(c=>c.estado==="pendiente").map((c,i)=>(
            <div className="card chq-card" key={i}>
              <div className="row" style={{marginBottom:8}}>
                <div><div className="cli" style={{fontSize:14}}>{c.cli}</div>
                  <div className="meta">👤 {c.vendedor} · reportado {c.fecha}</div></div>
                <div className="amt num" style={{color:"#C2603A"}}>{money(c.monto)}</div>
              </div>
              <div className="chq-datos">
                <div><span>Cheque</span><b>{c.numero}</b></div>
                <div><span>Banco</span><b>{c.banco}</b></div>
                <div><span>Factura</span><b>{c.fac}</b></div>
                <div><span>Motivo</span><b style={{color:"#C2603A"}}>{c.motivo}</b></div>
              </div>
              <div className="chq-nota">📌 Reabierto como cuenta por cobrar en {c.cli}. {c.vendedor} debe gestionar el reposicionamiento.</div>
              <button className="cta" style={{margin:"10px 0 0",width:"100%"}}
                onClick={()=>{ setCheques(cc=>cc.map(x=>x.numero===c.numero?{...x,estado:"gestionado"}:x)); toast(`Cheque ${c.numero} marcado en gestión`); }}>
                Marcar en gestión
              </button>
            </div>
          ))}
        </div>
      )}

      <div className="sec-h"><h2>Respuestas del proveedor</h2><div className="grain"></div></div>
      {lista.filter(n=>n.estado==="aprobada"||n.estado==="rechazada").length===0
        ? <div className="card"><div className="ph" style={{padding:"8px 0"}}>Sin respuestas nuevas del proveedor.</div></div>
        : lista.filter(n=>n.estado==="aprobada"||n.estado==="rechazada").map((n,i)=>(
          <div className="card" key={i} style={{padding:"14px 16px"}}>
            <div className="row">
              <div><div className="cli" style={{fontSize:14}}>{n.cli||n.tipo}</div>
                <div className="meta">{n.detalle||n.t}</div></div>
              <span className={"chip "+(n.estado==="aprobada"?"c-ok":"c-bad")}><span className="d"></span>{n.estado==="aprobada"?"Aprobada":"Rechazada"}</span>
            </div>
          </div>
        ))}

      {cheques.filter(c=>c.estado==="pendiente").length===0 && lista.filter(n=>n.estado==="aprobada"||n.estado==="rechazada").length===0 && (
        <div className="card"><div className="ph" style={{padding:"8px 0"}}>No hay novedades recibidas por ahora.</div></div>
      )}
    </>)}

    {pestana==="enviadas" && (<>
    <div className="sub" style={{margin:"0 2px 14px",fontSize:12.5}}>Solicita al proveedor: cambios, devoluciones y notas de crédito.</div>

    <SearchSelect label="Cliente" items={CLIENTES} value={cli} multiPalabra

        <button className="cta" style={{marginTop:14}}

      <button className="back" style={{width:"100%",marginTop:10}} onClick={reset}>‹ Volver</button>

    {cli && prov && paso==="form" && (tipo==="producto"||tipo==="descuento") && (<>

        {tipo==="producto"?"📦 NC por producto (devolución)":"🏷️ NC por descuento"}

      {!factSel ? (<>

        </div>
        {facturasCli.length===0 ? <div className="ph">Sin facturas para este cliente y proveedor.</div>

              <span className="sol-ic" style={{background:"var(--paper)"}}>🧾</span>

                <div className="meta">{f.fecha} · {f.items.length} ítem(s)</div></div>
              <span className="av-arrow">›</span></button>))}

      </>) : (<>
        <div className="ficha-sec">Factura {factSel.num} · {factSel.fecha}</div>
        <div className="meta" style={{margin:"0 2px 10px",fontSize:11.5}}>
          {tipo==="producto"?"Indica la cantidad a devolver de cada ítem.":"Indica el valor a descontar por unidad en cada ítem."}
        </div>
        {factSel.items.map(it=>{
          const v=parseFloat(montos[it.pid])||0;
          const sub = tipo==="descuento" ? v*it.cant : v*it.precio;
          return (
            <div className="fact-item" key={it.pid}>
              <div className="row" style={{alignItems:"flex-start"}}>
                <div style={{flex:1}}><div className="sync-t" style={{fontSize:13.5}}>{it.nombre}</div>
                  <div className="meta">{it.cant} und × {money(it.precio)}</div></div>
                <div style={{textAlign:"right"}}>
                  <input className="fact-inp" inputMode="decimal" value={montos[it.pid]||""}
                    onChange={e=>setMontos({...montos,[it.pid]:e.target.value})}
                    placeholder={tipo==="descuento"?"$/und":"cant"}/>
                  {v>0 && <div className="meta" style={{marginTop:3}}>{tipo==="descuento"?`${money(v)}×${it.cant}`:`${v}×${money(it.precio)}`} = <b>{money(sub)}</b></div>}
                </div>
              </div>
            </div>);
        })}
        <div className="fact-total">
          <span>Total a {tipo==="producto"?"devolver":"descontar"}</span>
          <span className="num">{money(totalFactura())}</span>
        </div>
        {tipo==="descuento" && <div className="meta" style={{margin:"8px 2px 0",fontSize:11.5}}>El descuento baja el precio efectivo de cada ítem en el historial de precios del cliente.</div>}
        <button className="cta" style={{marginTop:14}} disabled={totalFactura()<=0}
          onClick={()=>{
            const items=factSel.items.filter(it=>(parseFloat(montos[it.pid])||0)>0)
              .map(it=>tipo==="descuento"?`${it.nombre} −${money(parseFloat(montos[it.pid]))}/und`:`${montos[it.pid]} und ${it.nombre}`).join("; ");
            enviar(`Factura ${factSel.num}: ${items} · total ${money(totalFactura())}`);
          }}>Enviar al proveedor</button>
        <button className="back" style={{width:"100%",marginTop:10}} onClick={()=>{setFactSel(null);setMontos({});}}>‹ Otra factura</button>
      </>)}
    </>)}

    {cli && prov && paso==="menu" && (<>
      <div className="ficha-sec" style={{marginTop:22}}>Solicitudes de {cli}</div>
      {delCliProv.length===0 ? <div className="ph">Sin solicitudes para este cliente.</div>
        : delCliProv.map(n=>{
          const ti=TIPO_NOVEDAD[n.tipo]||{ic:"📄", t:"Solicitud"};
          const es=EST_NOVEDAD[n.estado]||{t:n.estado, c:"c-sync"};
          return (
          <div className="card" key={n.id}>
            <div className="row" style={{alignItems:"flex-start"}}>
              <span className="sol-ic" style={{background:"var(--paper)",width:36,height:36,fontSize:18}}>{ti.ic}</span>
              <div style={{flex:1,marginLeft:10}}>
                <div className="sync-t">{ti.t}</div>
                <div className="meta">{n.detalle}</div>
                <div className="meta" style={{fontSize:11,marginTop:2}}>{n.fecha}</div>
              </div>
              <span className={"chip "+es.c}><span className="d"></span>{es.t}</span>
            </div>
          </div>);
        })}
    </>)}

    {!cli && <div className="ph">Elige un cliente y un proveedor para crear una solicitud.</div>}
    </>)}
  </>);
}

    </div>

    {/* ═══ NOTIFICACIONES: cuáles avisos llegan (alimenta la campana 🔔 y, al publicar, los avisos del teléfono) ═══ */}
    <div style={{fontFamily:SERIF, fontSize:15, fontWeight:700, color:CL.tinta, margin:"22px 0 4px"}}>🔔 Notificaciones</div>
    <div style={{fontFamily:BODY, fontSize:11.5, color:CL.grisTexto, marginBottom:8}}>Elige qué avisos quieres recibir. Aplican a la campana de la app y, cuando publiquemos, también a la pantalla de tu teléfono.</div>
    {prefsNotif && [
      ["autorizaciones","🔐","Autorizaciones pendientes","Anulaciones que esperan tu código"],
      ["solicitudes","🙋","Solicitudes del equipo","Precios especiales, crédito y permisos"],
      ["cartera","⏰","Facturas vencidas","Cobros que pasaron su fecha"],
      ["cheques","🧾","Cheques en custodia","Devueltos o próximos a depositar"],
      ["novedades","📦","Novedades abiertas","Cambios y devoluciones en revisión"],
    ].map(([k,ic,tt,ss])=>(
      <div className="aj-row" key={k}>
        <div><div className="aj-k">{ic} {tt}</div><div className="aj-s">{ss}</div></div>
        <button className={"aj-switch"+(prefsNotif[k]?" on":"")} onClick={()=>setPrefsNotif(p=>({...p,[k]:!p[k]}))}>
          <span className="aj-knob"></span></button>
      </div>
    ))}
    <div style={{fontFamily:BODY, fontSize:11, color:CL.grisTenue, margin:"6px 0 0", lineHeight:1.5}}>📲 Avisos en la pantalla del teléfono (aunque la app esté cerrada): se encienden al publicar la app en internet — el archivo del sistema ya está preparado. Tus elecciones de arriba se respetarán ahí también.</div>

    {/* ═══ NOTIFICACIONES DEL EQUIPO · el Freelance gobierna los avisos de sus roles ═══ */}
    <div style={{fontFamily:SERIF, fontSize:15, fontWeight:700, color:CL.tinta, margin:"22px 0 4px"}}>👥 Notificaciones del equipo</div>
    <div style={{fontFamily:BODY, fontSize:11.5, color:CL.grisTexto, marginBottom:8}}>Tú decides qué avisos recibe cada rol en su app. Ellos no pueden cambiarlos.</div>
    {CATALOGO_NOTIF_EQUIPO.map(g=>(
      <div key={g.rol} style={{marginBottom:10}}>
        <div style={{fontFamily:BODY, fontSize:12.5, fontWeight:700, color:CL.tinta, margin:"8px 0 2px"}}>{g.nombre}</div>
        {g.tipos.map(([k,ic,tt])=>(
          <div className="aj-row" key={k}>
            <div><div className="aj-k">{ic} {tt}</div></div>
            <button className={"aj-switch"+(notifEquipo[g.rol][k]?" on":"")}
              onClick={()=>setNotifEquipo(p=>({...p, [g.rol]:{...p[g.rol], [k]:!p[g.rol][k]}}))}>
              <span className="aj-knob"></span></button>
          </div>
        ))}
      </div>
    ))}
    <div style={{fontFamily:BODY, fontSize:11, color:CL.grisTenue, margin:"4px 0 0", lineHeight:1.5}}>ℹ Hoy esta elección es demostrativa (cada app es un archivo independiente). Al conectar la base de datos, tu interruptor gobernará el teléfono de cada miembro del equipo al instante.</div>

    <div className="ficha-sec">Datos del perfil / negocio</div>
    <div className="fcard" style={{marginBottom:14}}>
      {!editPerfil ? (<>
        <div className="cu-line"><span>Nombre</span><b>{perfil.nombre}</b></div>
        <div className="cu-line"><span>RUC</span><b className="num">{perfil.ruc}</b></div>
        <div className="cu-line"><span>Teléfono</span><b className="num">{perfil.tel}</b></div>
        <div className="cu-line"><span>Correo</span><b style={{fontSize:12}}>{perfil.correo}</b></div>
        <button className="ghost" style={{width:"100%",marginTop:8}} onClick={()=>setEditPerfil(true)}>Editar datos</button>
      </>) : (<>
        <div className="field"><label>Nombre</label><input value={perfil.nombre} onChange={e=>setPerfil({...perfil,nombre:e.target.value})}/></div>
        <div className="field"><label>RUC</label><input value={perfil.ruc} onChange={e=>setPerfil({...perfil,ruc:e.target.value})}/></div>
        <div className="field"><label>Teléfono</label><input value={perfil.tel} onChange={e=>setPerfil({...perfil,tel:e.target.value})}/></div>
        <div className="field"><label>Correo</label><input value={perfil.correo} onChange={e=>setPerfil({...perfil,correo:e.target.value})}/></div>
        <div style={{display:"flex",gap:8}}>
          <button className="back" style={{flex:1}} onClick={()=>setEditPerfil(false)}>Cancelar</button>
          <button className="cta" style={{flex:1,margin:0}} onClick={()=>{setEditPerfil(false);toast("Datos guardados");}}>Guardar</button>
        </div>
        <div className="meta" style={{marginTop:8}}>Se guardarán de forma permanente al conectar el sistema.</div>
      </>)}
    </div>

    <div className="ficha-sec">Preferencias</div>
    <div className="fcard" style={{marginBottom:14}}>
      <div className="aj-row" style={{padding:"4px 0"}}>
        <div className="aj-k">Sonidos de avisos</div>
        <button className={"aj-switch"+(prefSonido?" on":"")} onClick={()=>setPrefSonido(v=>!v)}><span className="aj-knob"></span></button>
      </div>
      <div className="aj-row" style={{padding:"4px 0"}}>
        <div className="aj-k">Vibración</div>
        <button className={"aj-switch"+(prefVibrar?" on":"")} onClick={()=>setPrefVibrar(v=>!v)}><span className="aj-knob"></span></button>
      </div>
      <div className="cu-line" style={{marginTop:6}}><span>Formato de fecha</span>
        <select value={formatoFecha} onChange={e=>setFormatoFecha(e.target.value)} className="aj-sel">
          <option value="dd/mm/aaaa">dd/mm/aaaa</option><option value="mm/dd/aaaa">mm/dd/aaaa</option><option value="aaaa-mm-dd">aaaa-mm-dd</option>
        </select></div>
    </div>

    <div className="ficha-sec">Idioma</div>
    <div className="fcard" style={{marginBottom:14}}>
      <div className="cu-line"><span>Idioma de la app</span>
        <select value={idioma} onChange={e=>{setIdioma(e.target.value); if(e.target.value!=="es-EC") toast("Por ahora solo español (Ecuador)");}} className="aj-sel">
          <option value="es-EC">Español (Ecuador)</option><option value="es">Español</option><option value="en">English</option>
        </select></div>
    </div>

    <div className="ficha-sec">Notificaciones</div>
    <div className="fcard" style={{marginBottom:14}}>
      <div className="aj-row" style={{padding:"4px 0"}}>
        <div className="aj-k">Cobros por vencer</div>
        <button className={"aj-switch"+(notif.cobros?" on":"")} onClick={()=>setNotif({...notif,cobros:!notif.cobros})}><span className="aj-knob"></span></button>
      </div>
      <div className="aj-row" style={{padding:"4px 0"}}>
        <div className="aj-k">Solicitudes por aprobar</div>
        <button className={"aj-switch"+(notif.solicitudes?" on":"")} onClick={()=>setNotif({...notif,solicitudes:!notif.solicitudes})}><span className="aj-knob"></span></button>
      </div>
      <div className="aj-row" style={{padding:"4px 0"}}>
        <div className="aj-k">Respuestas del proveedor</div>
        <button className={"aj-switch"+(notif.novedades?" on":"")} onClick={()=>setNotif({...notif,novedades:!notif.novedades})}><span className="aj-knob"></span></button>
      </div>
      <div className="meta" style={{marginTop:6}}>Los avisos push se activan al conectar el sistema.</div>
    </div>

    <div className="ficha-sec">Sincronización y datos</div>
    <div className="fcard" style={{marginBottom:14}}>
      <div className="cu-line"><span>Última sincronización</span><b style={{fontSize:12}}>Hoy · {new Date().toLocaleTimeString("es-EC",{hour:"2-digit",minute:"2-digit"})}</b></div>
      <button className="ghost" style={{width:"100%",marginTop:8}} onClick={()=>toast("Sincronizando…")}>🔄 Sincronizar ahora</button>
      <button className="ghost" style={{width:"100%",marginTop:8}} onClick={()=>toast("Datos locales limpiados")}>🗑️ Limpiar datos locales</button>
    </div>

    <div className="aj-about">
      <div className="aj-about-t">FREELANCE</div>
      <div className="aj-about-s">Versión 1.0 · Prototipo</div>
      <div className="aj-about-s">Ventas · Distribución · Cobranza</div>
    </div>
  </>);
}

function Ruta({toast}){
  useRetroceso(()=>{
      if(verNuevo){ setVerNuevo(false); return true; }
      if(sel){ setSel(null); return true; }
      if(verVisitados){ setVerVisitados(false); return true; }
      if(verConfig){ setVerConfig(false); return true; }
      if(expandida){ setExpandida(null); return true; }
      return false;
    });
  const [vista,setVista]=useState("lista");    // lista | armar | ver
  const [verVisitados,setVerVisitados]=useState(false); // mostrar las paradas ya visitadas
  const [expandida,setExpandida]=useState(null);          // cliente con tarjeta desplegada
  const [verConfig,setVerConfig]=useState(false);         // panel de orden y horario
  const [gpsCargando,setGpsCargando]=useState(false);     // capturando ubicación GPS
  const usarMiUbicacion=()=>{
    if(!navigator.geolocation){toast("Tu dispositivo no permite ubicación.");return;}
    setGpsCargando(true);
    navigator.geolocation.getCurrentPosition(
      pos=>{
        const {latitude,longitude}=pos.coords;
        const url="https://www.google.com/maps/search/?api=1&query="+latitude+","+longitude;
        setCfg("partidaUrl",url); setCfg("ordenManual",null);
        setGpsCargando(false);
        toast("Ubicación actual capturada");
      },
      err=>{
        setGpsCargando(false);
        toast(err.code===1?"Permiso de ubicación denegado. Actívalo o pega el enlace.":"No se pudo obtener la ubicación.");
      },
      {enableHighAccuracy:true, timeout:10000}
    );
  };
  const setCfg=(campo,val)=>{
    setRutaActiva(r=>{
      const nr={...r,[campo]:val};
      setRutas(rs=>rs.map(x=>x.id===r.id?nr:x));
      return nr;
    });
  };
  const moverCliente=(cli,dir)=>{
    setRutaActiva(r=>{
      const arr=[...ordenarRuta(r)];
      const i=arr.findIndex(c=>c.cli===cli);
      const j=i+dir;
      if(i<0||j<0||j>=arr.length) return r;
      [arr[i],arr[j]]=[arr[j],arr[i]];
      const nr={...r, ordenManual:arr.map(c=>c.cli)};
      setRutas(rs=>rs.map(x=>x.id===r.id?nr:x));
      return nr;
    });
  };
  const setNota=(cli,txt)=>{
    setRutaActiva(r=>{
      const nn={...(r.notas||{}),[cli]:txt};
      const nr={...r,notas:nn};
      setRutas(rs=>rs.map(x=>x.id===r.id?nr:x));
      return nr;
    });
  };
  const addMedio=(cli,tipo,file)=>{
    const url=URL.createObjectURL(file);
    setRutaActiva(r=>{
      const lista=[...((r.medios||{})[cli]||[]), {tipo,url}];
      const nm={...(r.medios||{}),[cli]:lista};
      const nr={...r,medios:nm};
      setRutas(rs=>rs.map(x=>x.id===r.id?nr:x));
      return nr;
    });
    toast(tipo==="foto"?"Foto adjuntada":"Audio adjuntado");
  };
  const [rutas,setRutas]=useState([]);          // rutas guardadas
  const [rutaActiva,setRutaActiva]=useState(null); // ruta en edición/visualización (objeto)

  const [fecha,setFecha]=useState("");
  const [nombre,setNombre]=useState("");
  const [provs,setProvs]=useState([]);
  const [qProv,setQProv]=useState("");          // texto predictivo de provincia
  const [sel,setSel]=useState({});              // cli -> true
  const [prospectos,setProspectos]=useState([]);
  const [verNuevo,setVerNuevo]=useState(false);
  const [pn,setPn]=useState({nombre:"",ciudad:"",prov:"",dir:"",tel:"",cobro:""});
  const [editandoId,setEditandoId]=useState(null); // id de ruta guardada que se edita

  const ordenar=arr=>[...arr].sort((a,b)=>a.prov.localeCompare(b.prov)||a.ciudad.localeCompare(b.ciudad)||b.vencido-a.vencido);
  const distKm=(la1,ln1,la2,ln2)=>{
    const R=6371, rad=Math.PI/180;
    const dLa=(la2-la1)*rad, dLn=(ln2-ln1)*rad;
    const x=Math.sin(dLa/2)**2 + Math.cos(la1*rad)*Math.cos(la2*rad)*Math.sin(dLn/2)**2;
    return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
  };
  const coordsDeUrl=(url)=>{
    if(!url) return null;
    const m=url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/) || url.match(/[?&]query=(-?\d+\.\d+),(-?\d+\.\d+)/) || url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/) || url.match(/(-?\d+\.\d+),(-?\d+\.\d+)/);
    return m?[parseFloat(m[1]),parseFloat(m[2])]:null;
  };
  const ordenarRuta=(r)=>{
    const cls=[...r.clientes];
    if(r.ordenManual && r.ordenManual.length){
      const pos=c=>{const i=r.ordenManual.indexOf(c.cli);return i<0?999:i;};
      return cls.sort((a,b)=>pos(a)-pos(b));
    }
    const pc=coordsDeUrl(r.partidaUrl);
    if(pc){ // distancia directa real desde el punto de partida
      const d=c=>(c.lat!=null&&c.lng!=null)?distKm(pc[0],pc[1],c.lat,c.lng):99999;
      return cls.sort((a,b)=>d(a)-d(b));
    }
    const base=r.partida?idxCiudad(r.partida):(r.dir==="sur-norte"?999:-1);
    return cls.sort((a,b)=>{
      const da=Math.abs(idxCiudad(a.ciudad)-base), db=Math.abs(idxCiudad(b.ciudad)-base);
      return da-db || idxCiudad(a.ciudad)-idxCiudad(b.ciudad);
    });
  };
  const horaParada=(r,i)=>{
    if(!r.horaInicio) return null;
    const [hh,mm]=r.horaInicio.split(":").map(Number);
    const intv=r.intervalo||30;
    const t=hh*60+mm+i*intv;
    const h=Math.floor(t/60)%24, m=t%60;
    return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
  };
  const mapsUrl=(c)=>"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent((c.dir||c.ciudad)+", "+c.prov+", Ecuador");
  const mapsRutaUrl=(arr,partidaUrl)=>{
    const pts=arr.map(c=>encodeURIComponent((c.dir||c.ciudad)+", "+c.prov+", Ecuador"));
    let origen="";
    if(partidaUrl){
      const m=partidaUrl.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/) || partidaUrl.match(/q=(-?\d+\.\d+),(-?\d+\.\d+)/);
      if(m) origen=m[1]+","+m[2];
    }
    return "https://www.google.com/maps/dir/"+(origen?origen+"/":"")+pts.join("/");
  };

  const nuevaRuta=()=>{
    setEditandoId(null); setFecha(""); setNombre(""); setProvs([]); setSel({}); setProspectos([]);
    setVista("armar");
  };
  const editarRuta=(r)=>{
    setEditandoId(r.id); setFecha(r.fecha); setNombre(r.nombre);
    setProvs(r.provs);
    const selObj={}; r.clientes.forEach(c=>selObj[c.cli]=true); setSel(selObj);
    setProspectos(r.clientes.filter(c=>c.prospecto));
    setVista("armar");
  };

  const toggleProv=(p)=>setProvs(ps=>ps.includes(p)?ps.filter(x=>x!==p):[...ps,p]);
  const toggleSel=(cli)=>setSel(s=>({...s,[cli]:!s[cli]}));

  const potencialesRuta=POTENCIALES_INI.filter(p=>p.etapa!=="Ganado"&&p.etapa!=="Perdido").map(p=>({
    cli:p.nombre, prov:p.prov, ciudad:p.ciudad, vendedor:"Prospecto", dir:p.dir, tel:p.tel,
    cobro:0, vencido:0, motivo:"🎯 Potencial · "+p.etapa, prospecto:true, esPotencial:true,
  }));
  const candidatos=[...CLIENTES_RUTA, ...potencialesRuta, ...prospectos].filter(c=>provs.includes(c.prov));
  const seleccionados=candidatos.filter(c=>sel[c.cli]);

  const agregarProspecto=()=>{
    if(!pn.nombre.trim()||!pn.prov||!pn.ciudad.trim()){toast("Completa nombre, provincia y ciudad.");return;}
    const np={cli:pn.nombre, prov:pn.prov, ciudad:pn.ciudad, vendedor:"Manual", dir:pn.dir, tel:pn.tel,
      cobro:parseFloat(pn.cobro)||0, vencido:0, motivo:(parseFloat(pn.cobro)>0?"Cobro":"Posible cliente · concretar"), prospecto:true};
    setProspectos(p=>[...p,np]);
    setSel(s=>({...s,[pn.nombre]:true}));
    if(!provs.includes(pn.prov)) setProvs(ps=>[...ps,pn.prov]);
    toast("Cliente agregado a la ruta");
    setVerNuevo(false); setPn({nombre:"",ciudad:"",prov:"",dir:"",tel:"",cobro:""});
  };

  const guardarRuta=()=>{
    if(!fecha){toast("Elige la fecha de la ruta.");return;}
    if(seleccionados.length===0){toast("Marca al menos un cliente.");return;}
    const r={
      id: editandoId||Date.now(),
      nombre: nombre.trim()||(provs.join(" + ")),
      fecha, provs, clientes: seleccionados,
      hechas: editandoId ? (rutas.find(x=>x.id===editandoId)?.hechas||{}) : {},
    };
    setRutas(rs=> editandoId ? rs.map(x=>x.id===editandoId?r:x) : [r,...rs]);
    toast(editandoId?"Ruta actualizada":"Ruta guardada");
    setRutaActiva(r); setVista("ver");
  };

  const toggleHecha=(cli)=>{
    setRutaActiva(r=>{
      const nh={...r.hechas,[cli]:!r.hechas[cli]};
      const nr={...r,hechas:nh};
      setRutas(rs=>rs.map(x=>x.id===r.id?nr:x));
      return nr;
    });
  };

  if(vista==="lista"){
    return (<>
      <div className="h1">Rutas de visita</div>
      <div className="sub">Arma tu recorrido por provincia: cobros, pedidos y prospectos.</div>
      <button className="cta" style={{width:"100%",marginTop:4,marginBottom:18}} onClick={nuevaRuta}>+ Crear nueva ruta</button>

      {rutas.length===0 ? <div className="ph">No tienes rutas guardadas. Crea tu primera ruta.</div>
        : rutas.map(r=>{
          const done=r.clientes.filter(c=>r.hechas[c.cli]).length;
          const cobro=r.clientes.reduce((s,c)=>s+c.cobro,0);
          const ft=r.fecha?new Date(r.fecha+"T00:00").toLocaleDateString("es-EC",{weekday:"short",day:"numeric",month:"short"}):"";
          return (
            <div className="card" key={r.id} style={{padding:"14px 16px"}}>
              <div className="row" style={{marginBottom:8}}>
                <div><div className="cli" style={{fontSize:15}}>{r.nombre}</div>
                  <div className="meta" style={{textTransform:"capitalize"}}>📅 {ft} · {r.clientes.length} paradas</div>
                  <div className="meta">📍 {r.provs.join(", ")}</div></div>
                <div style={{textAlign:"right"}}><div className="amt num">{money(cobro)}</div>
                  <div className="meta">{done}/{r.clientes.length} hechas</div></div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button className="back" style={{flex:1}} onClick={()=>editarRuta(r)}>Editar / agregar</button>
                <button className="cta" style={{flex:1,margin:0}} onClick={()=>{setRutaActiva(r);setVista("ver");}}>Ver ruta</button>
              </div>
            </div>
          );
        })}
    </>);
  }

  if(vista==="armar"){
    const porProv={};
    ordenar(candidatos).forEach(c=>{(porProv[c.prov]=porProv[c.prov]||[]).push(c);});
    const provsConClientes=Array.from(new Set(CLIENTES_RUTA.map(c=>c.prov)));
    return (<>
      <button className="ghost" onClick={()=>setVista("lista")} style={{marginTop:0,marginBottom:14,textAlign:"left"}}>‹ Mis rutas</button>
      <div className="h1">{editandoId?"Editar ruta":"Nueva ruta"}</div>
      <div className="sub">Elige fecha, provincias y marca los clientes a visitar.</div>

      <div className="field"><label>📅 Fecha de la ruta</label>
        <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/></div>
      <div className="field"><label>Nombre de la ruta (opcional)</label>
        <input value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Ej. Sierra norte · semana 2"/></div>

      <div className="ficha-sec">Provincias de esta ruta</div>
      <div className="prov-buscar">
        <div className="prov-input">
          <span className="prov-lupa">⌕</span>
          <input value={qProv} onChange={e=>setQProv(e.target.value)}
            placeholder="Buscar provincia… ej. Tun, Chimb, Pich"/>
          {qProv && <button className="prov-clr" onClick={()=>setQProv("")}>×</button>}
          <MicBtn onTexto={setQProv}/>
        </div>
        {qProv.trim() && (
          <div className="prov-sug">
            {PROVINCIAS_EC
              .filter(p=>!provs.includes(p) && p.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").includes(qProv.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")))
              .map(p=>(
                <button key={p} className="prov-sug-it" onClick={()=>{toggleProv(p);setQProv("");}}>
                  <span className="prov-sug-mas">+</span>
                  <span className="prov-sug-nom">{p}</span>
                  {!provsConClientes.includes(p) && <span className="prov-sin">sin clientes</span>}
                </button>
              ))}
            {PROVINCIAS_EC.filter(p=>!provs.includes(p) && p.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").includes(qProv.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""))).length===0 &&
              <div className="prov-sug-vacio">Sin coincidencias</div>}
          </div>
        )}
      </div>
      {provs.length>0 && (
        <div className="prov-chips" style={{marginTop:10}}>
          {provs.map(p=>(
            <button key={p} className="prov-chip on" onClick={()=>toggleProv(p)}>{p} ✕</button>
          ))}
        </div>
      )}

      {provs.length===0 ? <div className="ph">Agrega una o varias provincias para empezar.</div>
        : (<>
          <div className="ficha-sec">Clientes · marca los que visitarás</div>
          {Object.keys(porProv).length===0 && <div className="ph">Estas provincias no tienen clientes cargados. Agrégalos manualmente abajo.</div>}
          {Object.keys(porProv).map(pv=>(
            <div key={pv} style={{marginBottom:14}}>

      <div className="card" style={{textAlign:"center",marginTop:8}}>

function ciudadesBloques(porCiudad, hechas, toggleHecha, mapsUrl, verVisitados, notas, setNota, medios, addMedio, expandida, setExpandida, listaOrden, horaParada, ruta, moverCliente, partidaCoords, distKm){

  const telVend=(nombre)=>{const v=EQUIPO_INI.find(x=>x.nombre===nombre);return v?v.tel:null;};
  const numGlobal=(cli)=>listaOrden.findIndex(c=>c.cli===cli)+1; // número de parada en el recorrido
  const distDe=(p)=>(partidaCoords&&p.lat!=null&&p.lng!=null)?distKm(partidaCoords[0],partidaCoords[1],p.lat,p.lng):null;
  return Object.keys(porCiudad).map(ck=>{
    const grupo=porCiudad[ck];
