<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>FREELANCE · App del Freelance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --field:#15392B; --field-700:#1E4D3A; --maize:#F2A900; --maize-deep:#C77F00;
    --paper:#F7F5EF; --card:#FFFFFF; --ink:#18211C; --muted:#6F7A6F;
    --line:#E7E1D3; --clay:#B5613C; --ok:#2E7D52;
    --shadow:0 1px 2px rgba(21,57,43,.06),0 8px 24px rgba(21,57,43,.06);
    --fs:1; /* escala de fuente (Ajustes: normal=1, grande=1.12) */
  }
  /* ═══ TEMAS (Ajustes) ═══ */
  /* Sol · alto contraste para leer bajo sol directo */
  [data-tema="sol"]{
    --field:#0B2A1E; --field-700:#123B2A; --maize:#F59E00; --maize-deep:#B36B00;
    --paper:#FFFFFF; --card:#FFFFFF; --ink:#0A0F0C; --muted:#4A554C;
    --line:#D6D2C4; --clay:#A34A28; --ok:#1F6B41;
    --shadow:0 1px 2px rgba(0,0,0,.10),0 6px 18px rgba(0,0,0,.08);
  }
  /* Noche · oscuro, para madrugada y poca luz */
  [data-tema="noche"]{
    --field:#0E1A14; --field-700:#16261D; --maize:#E9B44C; --maize-deep:#C08F2E;
    --paper:#111A15; --card:#182420; --ink:#E6EDE8; --muted:#93A399;
    --line:#26332C; --clay:#D08160; --ok:#57A773;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.35);
  }
  /* Grafito · neutro y serio, para reuniones */
  [data-tema="grafito"]{
    --field:#22262A; --field-700:#2F353A; --maize:#D9A441; --maize-deep:#AD7F2A;
    --paper:#F4F5F6; --card:#FFFFFF; --ink:#1A1E21; --muted:#6C757D;
    --line:#DFE3E6; --clay:#B5613C; --ok:#2E7D52;
    --shadow:0 1px 2px rgba(20,25,30,.07),0 8px 22px rgba(20,25,30,.07);
  }
  /* Arena · cálido, menos fatiga en uso prolongado */
  [data-tema="arena"]{
    --field:#4A3B22; --field-700:#5E4B2C; --maize:#E0A82E; --maize-deep:#B4801C;
    --paper:#FAF4E8; --card:#FFFCF6; --ink:#2A2317; --muted:#7A6E58;
    --line:#E8DCC4; --clay:#B26A3C; --ok:#5C7C48;
    --shadow:0 1px 2px rgba(74,59,34,.07),0 8px 22px rgba(74,59,34,.08);
  }
  /* Sol y Grafito: fondo de tarjetas blanco puro, texto bien oscuro */
  [data-tema="sol"] .card{border-color:#DAD6C8}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  /* Blindaje anti-desborde: en filas flex, los campos ceden espacio en vez de empujar botones fuera */
  input,select,textarea{min-width:0;max-width:100%}
  button{max-width:100%}
  html,body{height:100%;overscroll-behavior-y:contain}   /* apaga el "recargar" de Chrome: el arrastre lo maneja la app */
  body{background:var(--field);font-family:Inter,system-ui,sans-serif;color:var(--ink);
    font-size:calc(16px * var(--fs))}
  #root{height:100%}
  .num{font-family:'Space Grotesk',sans-serif;font-feature-settings:"tnum" 1;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:16px}
  /* phone shell — de borde a borde en el teléfono, centrado en pantallas anchas */
  .shell{width:100%;max-width:100%;margin:0 auto;min-height:100dvh;background:var(--paper);
    position:relative;display:flex;flex-direction:column;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right)}
  /* en tablets/escritorio: centrar con un ancho cómodo */
  @media(min-width:560px){
    .shell{max-width:480px;min-height:auto;height:100dvh;box-shadow:0 0 60px rgba(0,0,0,.4)}
  }
  /* top bar */
  .top{background:var(--field);color:#EAF0EA;padding:14px 20px 16px;
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .top .who{font-size:12px;color:#9DB6A6;letter-spacing:.04em;text-transform:uppercase}
  .top .name{font-size:16px;font-weight:600;margin-top:2px}
  .top-nav{display:flex;align-items:center;gap:8px}
  .ham{background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:10px;
    font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .drawer-ov{position:fixed;inset:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(0,0,0,0);visibility:hidden;z-index:60;transition:background .25s}
  .drawer-ov.on{background:rgba(0,0,0,.45);visibility:visible}
  .drawer{position:absolute;top:0;left:0;bottom:0;width:80%;max-width:320px;background:var(--paper);
    transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;box-shadow:2px 0 20px rgba(0,0,0,.2)}
  .drawer.on{transform:translateX(0)}
  .drawer-head{background:var(--field);padding:14px 18px 13px;display:flex;align-items:center;justify-content:space-between}
  .drawer-x{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:8px;font-size:20px;cursor:pointer}
  .drawer-body{flex:1;overflow-y:auto;padding:12px 14px}
  .drawer-salir{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:14px;
    background:#FBE9E4;color:#B5613C;border:1px solid #E8C0B0;border-radius:12px;padding:11px;
    font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer}
  .drawer-salir:active{background:#F6DDD4}
  .drawer-sec{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:2px 4px 7px}
  .drawer-acc{width:100%;display:flex;align-items:center;justify-content:space-between;
    background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:8px;
    font-size:13px;font-weight:700;color:var(--field);font-family:inherit;cursor:pointer;text-align:left}
  .drawer-acc.on{background:#E9EEE9;border-color:#CFE0D4}
  .drawer-acc-fl{font-size:11px;color:var(--muted)}
  .drawer-it{width:100%;display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);
    border-radius:12px;padding:9px 12px;margin-bottom:7px;cursor:pointer;text-align:left}
  .di-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .di-t{font-size:13px;font-weight:600;color:var(--field)}
  .di-s{font-size:10.5px;color:var(--muted);margin-top:0}
  .di-a{font-size:16px;color:var(--muted)}
  .prov-cab{display:flex;align-items:center;gap:13px}
  .prov-logo{width:52px;height:52px;border-radius:14px;color:#fff;font-weight:800;font-size:18px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Space Grotesk',sans-serif}
  .prov-tipo{font-size:11px;font-weight:700;color:var(--field);background:var(--paper);border-radius:6px;padding:3px 9px}
  .prov-chips{display:flex;flex-wrap:wrap;gap:7px}
  .prov-chip{font-size:12px;font-weight:600;color:var(--field);background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:6px 11px}
  .prov-doc-ic{width:38px;height:38px;border-radius:10px;background:#FBE9E4;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .wa-btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;
    background:#E8F3EC;color:#3B7355;border:1px solid #CDE6D6;border-radius:9px;
    padding:7px 12px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
  .wa-btn:active{background:#DCEDE2}
  .wa-btn.full{width:100%;margin-top:10px}
  .doc-alertas{background:#FBF0D8;border:1px solid #EBD9A8;border-radius:13px;padding:12px 14px;margin-bottom:12px}
  .doc-al-row{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:12.5px;color:#7A5B12;padding:3px 0}
  .doc-al-row b{font-size:14px;color:#C77F00}
  .doc-item .doc-estado{display:inline-block;color:#fff;font-size:10px;font-weight:700;border-radius:6px;padding:2px 8px;margin-top:6px}
  .doc-foto{display:inline-block;font-size:10.5px;color:var(--muted);margin-left:8px}
  .doc-chk{width:34px;height:34px;border-radius:10px;border:2px solid var(--line);background:var(--paper);
    font-size:16px;font-weight:700;color:var(--muted);margin-top:8px}
  .doc-chk.on{background:#E4F1E9;border-color:#2E7D52;color:#2E7D52}
  .doc-foto-btn{width:100%;margin-top:6px;background:var(--paper);border:1px dashed var(--line);border-radius:10px;
    padding:11px;font-size:12.5px;font-weight:600;color:var(--muted);font-family:inherit;cursor:pointer}
  .doc-foto-btn.on{background:#E4F1E9;border-color:#2E7D52;border-style:solid;color:#2E7D52}
  .doc-acc{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  .doc-acc-b{font-size:12px;font-weight:600;font-family:inherit;color:var(--field);background:var(--paper);
    border:1px solid var(--line);border-radius:9px;padding:8px 12px;cursor:pointer}
  .doc-acc-b.prim{background:#EAF0F6;color:#3A6EA5;border-color:#CADBEB}
  .doc-dep-aviso{margin-top:6px;font-size:11.5px;color:#7A5BA8;background:#F3EDF9;border-radius:8px;padding:6px 10px}
  .doc-bita{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
  .doc-bita-row{display:flex;align-items:center;gap:8px;font-size:11px;padding:2px 0}
  .doc-bita-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .doc-bita-e{font-weight:600;color:var(--ink)}
  .doc-bita-m{color:var(--muted);margin-left:auto}
  .c-info{background:#EAF0F6;color:#3A6EA5} .c-info .d{background:#3A6EA5}
  .dest-sug{margin-top:6px;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--card)}
  .dest-sug-it{display:flex;flex-direction:column;align-items:flex-start;width:100%;padding:10px 13px;
    background:none;border-bottom:1px solid var(--line);cursor:pointer;text-align:left}
  .dest-sug-it:last-child{border-bottom:none}
  .dest-sug-it b{font-size:13.5px;color:var(--ink)}
  .dest-sug-it span{font-size:11.5px;color:var(--muted)}
  .dest-sel{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#E4F1E9;
    border:1px solid #CDE6D6;border-radius:11px;padding:11px 13px;font-size:13.5px;font-weight:600;color:var(--field)}
  .acta{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .acta-h{font-size:13px;font-weight:800;text-align:center;color:var(--field);letter-spacing:.02em;line-height:1.3}
  .acta-sub{font-size:11px;text-align:center;color:var(--muted);margin:4px 0 14px}
  .acta-row{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:4px 0;border-bottom:1px dashed var(--line)}
  .acta-row span{color:var(--muted)}
  .acta-tabla{width:100%;border-collapse:collapse;margin:12px 0;font-size:11px}
  .acta-tabla th,.acta-tabla td{border:1px solid var(--line);padding:5px 6px;text-align:left}
  .acta-tabla th{background:var(--paper);font-weight:700;color:var(--muted)}
  .acta-firmas{display:flex;gap:18px;margin-top:24px}
  .acta-firma{flex:1;text-align:center;font-size:10.5px;color:var(--muted)}
  .acta-linea{border-top:1.5px solid var(--ink);margin-bottom:6px}
  .acta-novedad{margin-top:14px;font-size:11.5px;color:#B5613C;background:#FBE9E4;border-radius:8px;padding:8px 11px}
  .aj-paletas{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
  .aj-pal{position:relative;display:flex;flex-direction:column;align-items:flex-start;gap:8px;
    background:var(--card);border:2px solid var(--line);border-radius:13px;padding:13px;cursor:pointer;text-align:left}
  .aj-pal.on{border-color:var(--field)}
  .aj-pal-muestra{display:flex;gap:5px}
  .aj-pal-muestra span{width:26px;height:26px;border-radius:7px;display:block}
  .aj-pal-nom{font-size:12.5px;font-weight:600;color:var(--ink)}
  .aj-pal-check{position:absolute;top:10px;right:11px;color:var(--field);font-weight:800}
  .aj-row{display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:10px}
  .aj-k{font-size:14px;font-weight:600;color:var(--ink)}
  .aj-s{font-size:11.5px;color:var(--muted);margin-top:1px}
  .aj-switch{width:46px;height:27px;border-radius:999px;background:#CDD4CD;position:relative;flex-shrink:0;transition:background .2s}
  .aj-switch.on{background:var(--ok)}
  .aj-knob{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .aj-switch.on .aj-knob{left:22px}
  .aj-sel{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:12.5px;font-family:inherit;color:var(--field)}
  .aj-salir{width:100%;background:#FBE9E4;color:#B5613C;border:1px solid #E8C0B0;border-radius:13px;
    padding:14px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:18px}
  .aj-about{text-align:center;padding:10px 0 20px;color:var(--muted)}
  .aj-about-t{font-weight:800;color:var(--field);letter-spacing:.04em}
  .aj-about-s{font-size:11.5px;margin-top:2px}
  .topbtn{display:flex;align-items:center;gap:5px;color:#EAF0EA;font-size:14px;font-weight:600;
    background:rgba(255,255,255,.10);border-radius:999px;padding:7px 14px}
  .topbtn:active{background:rgba(255,255,255,.2)}
  .net{display:flex;align-items:center;gap:6px;font-size:12px;background:rgba(255,255,255,.08);
    padding:6px 10px;border-radius:999px;color:#EAF0EA;font-weight:600}
  .net:active{background:rgba(255,255,255,.16)}
  .dot{width:7px;height:7px;border-radius:50%}
  .dot.on{background:#6FD39B;box-shadow:0 0 4px rgba(111,211,155,.45)}   /* en línea: verde suave, luz tenue */
  .dot.off{background:var(--maize)}
  .dot.sync{background:var(--maize);animation:latido .9s ease-in-out infinite}
  @keyframes latido{0%,100%{opacity:1}50%{opacity:.25}}
  /* Refresco propio: no recarga la página, no saca al usuario del sistema */
  .ptr{position:fixed;left:0;right:0;top:0;display:flex;justify-content:center;pointer-events:none;z-index:60}
  .ptr-c{background:#fff;border:1px solid var(--line);border-radius:999px;box-shadow:0 4px 14px rgba(21,57,43,.16);
    width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--field)}
  .ptr-c.gira{animation:girar .8s linear infinite}
  @keyframes girar{to{transform:rotate(360deg)}}
  .sync-intro{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5}
  .sync-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
  .sync-ic{font-size:22px;width:38px;height:38px;border-radius:10px;background:var(--paper);
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .sync-t{font-size:14px;font-weight:600;color:var(--ink)}
  .sync-ok{text-align:center;padding:18px 0}
  .sync-nota{font-size:11.5px;color:var(--muted);margin-top:14px;line-height:1.5;
    background:var(--paper);border-radius:10px;padding:10px 12px}
  /* alerta de clientes por visitar */
  .alerta-visita{display:flex;align-items:center;gap:12px;width:100%;background:#FBF0D8;
    border:1px solid #E8C98A;border-radius:14px;padding:14px;margin-bottom:14px}
  .alerta-visita:active{background:#F6E8C4}
  .av-ic{font-size:22px}
  .av-t{font-size:14px;font-weight:700;color:var(--field)}
  .av-s{font-size:12px;color:#9A7B2E;margin-top:1px}
  .av-arrow{font-size:20px;color:#B79235}
  .visita-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .sem{width:14px;height:14px;border-radius:50%;flex-shrink:0}
  .sem.rojo{background:#D9534F;box-shadow:0 0 0 4px rgba(217,83,79,.15)}
  .sem.ambar{background:#E0A33A;box-shadow:0 0 0 4px rgba(224,163,58,.15)}
  .sem-lbl{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .sem-lbl.rojo{background:#FBE3E2;color:#B0413D}
  .sem-lbl.ambar{background:#FBF0D8;color:#9A7B2E}
  .visita-leyenda{display:flex;flex-direction:column;gap:6px;margin-top:14px;font-size:11.5px;color:var(--muted)}
  .visita-leyenda span{display:flex;align-items:center;gap:8px}
  .visita-leyenda .sem{width:11px;height:11px;box-shadow:none}
  /* solicitudes al proveedor */
  .sol-op{display:flex;align-items:center;gap:12px;width:100%;background:var(--card);
    border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:10px}
  .sol-op:active{background:var(--paper)}
  .sol-ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-size:20px;flex-shrink:0}
  .sol-elegido{background:var(--paper);border-radius:11px;padding:11px 13px;font-size:14px;font-weight:700;
    color:var(--field);margin-bottom:14px}
  .adjuntar{width:100%;background:var(--paper);border:1px dashed var(--line);border-radius:11px;
    padding:13px;font-size:13.5px;font-weight:600;color:var(--field)}
  .adjuntar:active{background:var(--card)}
  .sol-op.sel{border-color:var(--field);background:#EAF0EA}
  .fact-item{border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:8px}
  .fact-inp{width:72px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-size:14px;text-align:right}
  .fact-total{display:flex;justify-content:space-between;align-items:center;background:var(--field);color:#EAF0EA;
    border-radius:12px;padding:13px 15px;margin-top:6px;font-size:14px;font-weight:600}
  .fact-total .num{font-size:19px;font-weight:700}
  .resol-box{background:#E4F1E9;border:1px solid #A9D5BC;border-radius:11px;padding:12px 14px;
    font-size:13px;color:var(--ink);margin-top:10px;line-height:1.5}
  /* scroll body */
  .body{flex:1;overflow-y:auto;padding:18px 18px 96px}
  /* hero commission */
  .hero{background:linear-gradient(155deg,var(--field) 0%,var(--field-700) 100%);
    border-radius:20px;padding:22px;color:#EAF0EA;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;
    background:radial-gradient(circle,rgba(242,169,0,.22),transparent 70%)}
  .hero .lbl{font-size:12px;color:#9DB6A6;letter-spacing:.05em;text-transform:uppercase}
  .hero .big{font-size:42px;font-weight:700;margin-top:4px;line-height:1}
  .hero .big small{font-size:20px;color:#9DB6A6;font-weight:500}
  .hero .split{display:flex;gap:14px;margin-top:18px}
  .hero .split div{flex:1;background:rgba(255,255,255,.07);border-radius:12px;padding:11px 13px}

  .hero-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px;position:relative;z-index:1}

  /* cards */
  /* ═══ UI KIT NEUMÓRFICO (módulos financieros) ═══ */

  .neu-s{font-size:10.5px;color:var(--muted);margin-bottom:14px}

  /* en Sol el relieve se atenúa para no perder contraste bajo el sol */
  [data-tema="sol"] .neu{box-shadow:0 1px 3px rgba(0,0,0,.10),0 6px 16px rgba(0,0,0,.07);border:1px solid #E3E0D4}
  [data-tema="sol"] .neu-in{box-shadow:none;border:1px solid #E3E0D4}

  .card{background:var(--card);border:1px solid rgba(0,0,0,.045);border-radius:16px;
    padding:16px;box-shadow:0 1px 2px rgba(23,43,32,.04),0 4px 12px rgba(23,43,32,.05);
    margin-bottom:12px;transition:transform .14s ease,box-shadow .14s ease}
  .card:active{transform:scale(.988);box-shadow:0 1px 2px rgba(23,43,32,.06)}
  /* pulso suave del indicador En línea */
  @keyframes latido{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(.82)}}
  .net .dot.on{animation:latido 2.4s ease-in-out infinite}
  /* aparición suave de tarjetas */
  @keyframes subir{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:subir .28s ease both}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .cli{font-size:15px;font-weight:600}
  .meta{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.5}
  .amt{font-size:16px;font-weight:600}
  .amt small{font-size:12px;color:var(--muted);font-weight:500}
  /* chips */
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
    padding:4px 9px;border-radius:999px;letter-spacing:.02em;white-space:nowrap}
  .chip .d{width:6px;height:6px;border-radius:50%}
  .c-sync{background:#FBF0D8;color:var(--maize-deep)} .c-sync .d{background:var(--maize)}
  .c-ok{background:#E4F1E9;color:var(--ok)} .c-ok .d{background:var(--ok)}
  .c-wait{background:#EDEAE0;color:#7A6F50} .c-wait .d{background:#A89A6E}
  .c-live{background:#E9EEE9;color:var(--field)} .c-live .d{background:var(--field-700)}
  .c-bad{background:#F6E3DA;color:var(--clay)} .c-bad .d{background:var(--clay)}
  .pipe{display:flex;gap:4px;margin-top:12px}
  .pipe span{flex:1;height:4px;border-radius:2px;background:var(--line)}
  .pipe span.done{background:var(--field-700)} .pipe span.now{background:var(--maize)}
  /* bottom nav */
  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:#fff;border-top:1px solid var(--line);display:flex;
    padding:8px 8px calc(12px + env(safe-area-inset-bottom));z-index:30}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    font-size:10px;color:var(--muted);font-weight:500;padding:6px 1px}
  .nav button.act{color:var(--field)}
  .nav-center .nIco{background:var(--maize);color:var(--field);width:38px;height:38px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:1px}
  .nav-center{color:var(--field);font-weight:700}
  .nav .nIco{font-size:21px;line-height:1;position:relative}
  .nav .badge{position:absolute;top:-6px;left:13px;min-width:17px;height:17px;padding:0 4px;
    background:#D9534F;color:#fff;font-size:10.5px;font-weight:700;border-radius:999px;
    display:flex;align-items:center;justify-content:center;border:2px solid #fff;line-height:1}
  .nav .badge.ok{background:#2E7D52;left:auto;right:13px}
  .det-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
  .det-sub{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:4px 0 4px}
  /* ===== Comisiones rediseñada ===== */
  .cu-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
  .cu-toggle{display:flex;background:var(--paper);border-radius:999px;padding:3px;flex-shrink:0}
  .cu-toggle button{font-size:12px;font-weight:700;padding:7px 13px;border-radius:999px;color:var(--muted)}
  .cu-toggle button.on{background:var(--field);color:#EAF0EA}
  .cu-hero{background:linear-gradient(150deg,#15392B,#0F2A1C);border-radius:22px;padding:24px 22px;color:#EAF0EA;
    position:relative;overflow:hidden}
  .cu-hero::after{content:"";position:absolute;right:-40px;top:-40px;width:170px;height:170px;
    background:radial-gradient(circle,rgba(242,169,0,.25),transparent 70%)}
  .cu-hero-lbl{font-size:12px;color:#9DB6A6;text-transform:uppercase;letter-spacing:.05em;position:relative}

  .cu-var-txt{font-size:12px;color:#9DB6A6}
  .cu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}

  .cev-pagos-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:8px}
  .cev-pago-row{padding:8px 0;border-bottom:1px solid var(--line)}

  .cev-pago-row>div:first-child{font-size:13px;color:var(--ink)}
  .cu-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
  .cu-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:9px}
  .cu-v{font-size:20px;font-weight:700;color:var(--field)}
  .cu-k{font-size:11.5px;color:var(--muted);margin-top:2px}

  const k=PALETAS[paletaKey]?paletaKey:"campo";

/* ── Registro global de modales abiertos ──
   Cualquier ventana emergente se apunta aquí al abrirse. El botón atrás (app o Android)
   cierra SIEMPRE el último modal abierto antes de retroceder de pantalla. */
const MODALES=[];
function useModal(abierto, cerrar){
  React.useEffect(()=>{
    if(!abierto) return;
    const item={cerrar};
    MODALES.push(item);
    return ()=>{ const i=MODALES.indexOf(item); if(i>=0) MODALES.splice(i,1); };
  },[abierto,cerrar]);
}
function cerrarUltimoModal(){
  if(MODALES.length===0) return false;
  const m=MODALES[MODALES.length-1];
  try{ m.cerrar(); }catch(e){}
  return true;
}

/* ── Pila de retrocesos por módulo ──
   Cada módulo montado deja su función aquí. El botón atrás consulta del último al primero.
   Con pila (y no una sola variable) ningún módulo puede borrar el handler de otro. */
const RETROCESOS=[];
function useRetroceso(fn){
  const ref=React.useRef(fn);
  ref.current=fn;
  React.useEffect(()=>{
    const item={ run:()=>ref.current() };
    RETROCESOS.push(item);
    return ()=>{ const i=RETROCESOS.indexOf(item); if(i>=0) RETROCESOS.splice(i,1); };
  },[]);
}
function retrocederEnModulo(){
  for(let i=RETROCESOS.length-1;i>=0;i--){
    try{ if(RETROCESOS[i].run()) return true; }catch(e){}
  }
  return false;
}

/* Anillo de progreso con el monto al centro */
function NeuAnillo({pct=0, valor, etiqueta, sub, color="#2E7D52", tam=150}){
  const R=tam*0.38, C=2*Math.PI*R, cx=tam/2, cy=tam/2;
  const largo=C*Math.min(100,Math.max(0,pct))/100;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      <svg viewBox={`0 0 ${tam} ${tam}`} style={{width:tam,height:tam}}>
        <circle cx={cx} cy={cy} r={R} fill="none" stroke="rgba(23,43,32,.07)" strokeWidth={tam*0.085}/>
        <circle cx={cx} cy={cy} r={R} fill="none" stroke={color} strokeWidth={tam*0.085} strokeLinecap="round"
          strokeDasharray={`${largo} ${C-largo}`} transform={`rotate(-90 ${cx} ${cy})`}
          style={{transition:"stroke-dasharray .9s cubic-bezier(.4,0,.2,1)"}}/>
        <text x={cx} y={cy-2} textAnchor="middle" fontSize={tam*0.155} fontWeight="800"
          fill="var(--ink)" fontFamily="'Space Grotesk',sans-serif">{valor}</text>
        <text x={cx} y={cy+tam*0.115} textAnchor="middle" fontSize={tam*0.075} fill="var(--muted)" fontFamily="inherit">{etiqueta}</text>
      </svg>
      {sub && <div className="meta" style={{fontSize:11,marginTop:4,textAlign:"center"}}>{sub}</div>}
    </div>
  );
}

/* Gráfico de línea suave con área y puntos */
function NeuLinea({datos=[], etiquetas=[], color="#2E7D52", alto=130, formato=(v)=>v}){
  if(!datos.length) return <div className="ph">Sin datos.</div>;
  const W=320, H=alto, PX=8, PY=26, PB=20;   // PY amplio: deja aire para la etiqueta del máximo
  const min=Math.min(...datos), max=Math.max(...datos);
  const rango=(max-min)||1;
  const x=i=>PX+(i*(W-PX*2))/Math.max(1,datos.length-1);
  const y=v=>PY+(H-PY-PB)*(1-(v-min)/rango);
  const pts=datos.map((v,i)=>[x(i),y(v)]);
  /* curva suave */
  let d=`M ${pts[0][0]},${pts[0][1]}`;
  for(let i=1;i<pts.length;i++){
    const [px,py]=pts[i-1], [cx2,cy2]=pts[i];
    const mx=(px+cx2)/2;
    d+=` C ${mx},${py} ${mx},${cy2} ${cx2},${cy2}`;
  }
  const area=d+` L ${pts[pts.length-1][0]},${H-PB} L ${pts[0][0]},${H-PB} Z`;
  const idMax=datos.indexOf(max);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      <defs>
        <linearGradient id={"gr"+color.replace("#","")} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity=".22"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#gr${color.replace("#","")})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map(([px,py],i)=>(
        <circle key={i} cx={px} cy={py} r={i===idMax?4.5:3} fill="var(--card)" stroke={color} strokeWidth="2.4"/>
      ))}
      {idMax>=0 && (
        <text x={pts[idMax][0]} y={pts[idMax][1]-10} textAnchor="middle" fontSize="10" fontWeight="800"
          fill="var(--ink)" fontFamily="'Space Grotesk',sans-serif">{formato(max)}</text>
      )}
      {etiquetas.map((e,i)=>(
        <text key={i} x={x(i)} y={H-5} textAnchor="middle" fontSize="8.5" fill="var(--muted)" fontFamily="inherit">{e}</text>
      ))}
    </svg>
  );
}

/* Calendario del mes con días destacados */
function NeuCalendario({anio, mes, marcados=[], color="#2E7D52", onDia}){
  const DIAS=["L","M","M","J","V","S","D"];
  const primero=new Date(anio,mes,1);
  const desplazamiento=(primero.getDay()+6)%7;      // lunes primero
  const total=new Date(anio,mes+1,0).getDate();
  const celdas=[];
  for(let i=0;i<desplazamiento;i++) celdas.push(null);
  for(let d=1;d<=total;d++) celdas.push(d);
  const marca=(d)=>marcados.find(m=>m.dia===d);
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:5}}>
        {DIAS.map((d,i)=><span key={i} style={{textAlign:"center",fontSize:9.5,fontWeight:700,color:"var(--muted)"}}>{d}</span>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {celdas.map((d,i)=>{
          if(d===null) return <span key={i}></span>;
          const m=marca(d);
          return (
            <button key={i} onClick={()=>onDia&&m&&onDia(m)} disabled={!m}
              style={{aspectRatio:"1",border:"none",borderRadius:9,fontFamily:"inherit",fontSize:11,
                fontWeight:m?800:500,cursor:m?"pointer":"default",
                background:m?(m.color||color):"transparent",
                color:m?"#fff":"var(--ink)",
                boxShadow:m?"2px 2px 6px rgba(23,43,32,.14)":"none",
                display:"flex",alignItems:"center",justifyContent:"center"}}>
              {d}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ── Lector de comprobantes (OCR): el usuario digita el valor, la foto llena el resto ── */
let _OCRW=null;
async function ocrComprobante(img){
  try{
    if(!window.Tesseract) return null;
    if(!_OCRW) _OCRW = window.Tesseract.createWorker("spa");
    const w = await _OCRW;
    const r = await w.recognize(img);
    return extraerComprobante((r && r.data && r.data.text) || "");
  }catch(e){ _OCRW=null; return null; }
}
function parseMontoOCR(s){
  s=String(s).trim();
  const pc=s.lastIndexOf(","), pd=s.lastIndexOf(".");
  if(pc>-1 && pd>-1){ s = pc>pd ? s.replace(/\./g,"").replace(",",".") : s.replace(/,/g,""); }
  else if(pc>-1){ const dec=s.length-pc-1; s = dec===3 ? s.replace(/,/g,"") : s.replace(/,/g,"."); }
  const n=parseFloat(s.replace(/[^\d.]/g,""));
  return (isFinite(n) && n>0) ? Math.round(n*100)/100 : null;
}
function extraerComprobante(txt){
  const T=String(txt).toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  /* diccionario por banco: palabra clave → nombre del catálogo */
  const CLAVES=[["PICHINCHA","Pichincha"],["PACIFICO","Pacífico"],["GUAYAQUIL","Guayaquil"],
    ["PRODUBANCO","Produbanco"],["INTERNACIONAL","Internacional"],["BOLIVARIANO","Bolivariano"],
    ["AUSTRO","Austro"],["MACHALA","Machala"],["JEP","JEP"],["BANECUADOR","BanEcuador"]];
  let banco=null;
  for(const [k,v] of CLAVES){ if(T.includes(k)){ banco=BANCOS.find(x=>x.toUpperCase().includes(k))||null; if(banco) break; } }
  let valor=null;
  const mv=T.match(/(?:VALOR|MONTO|TOTAL|DEBITADO|ACREDITADO|USD)[^\d\-]{0,12}([\d][\d.,]{2,14})/);
  if(mv) valor=parseMontoOCR(mv[1]);
  if(valor==null){
    const todos=[...T.matchAll(/\$\s*([\d][\d.,]{2,14})/g)].map(m=>parseMontoOCR(m[1])).filter(x=>x!=null);
    if(todos.length) valor=todos[0];
  }
  let numero=null;
  const mn=T.match(/(?:COMPROBANTE|TRANSACCION|REFERENCIA|SECUENCIAL|DOCUMENTO|OPERACION|OP)\.?[^\d]{0,10}(\d{5,15})/);
  if(mn) numero=mn[1];
  let fecha=null;
  const mf=T.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})/);
  if(mf){ fecha=`${mf[3]}-${String(mf[2]).padStart(2,"0")}-${String(mf[1]).padStart(2,"0")}`; }
  else{
    const MES={ENE:1,FEB:2,MAR:3,ABR:4,MAY:5,JUN:6,JUL:7,AGO:8,SEP:9,OCT:10,NOV:11,DIC:12};
    const mm=T.match(/(\d{1,2})\s+(ENE|FEB|MAR|ABR|MAY|JUN|JUL|AGO|SEP|OCT|NOV|DIC)[A-Z]*\s+(\d{4})/);
    if(mm) fecha=`${mm[3]}-${String(MES[mm[2]]).padStart(2,"0")}-${String(mm[1]).padStart(2,"0")}`;
  }
  if(!banco && valor==null && !numero && !fecha) return null;
  return {banco, numero, fecha, valor};
}

  <div className="pipe">{ETAPAS.map((_,i)=>

);
/* Semáforo de conexión: en línea (luz verde encendida) · sincronizando (latido) · sin enviar (ámbar).
   Con conexión todo sube solo; el pendiente solo se muestra cuando el teléfono está sin red. */
const Net = ({n, online, sincronizando, onClick})=>{
  if(sincronizando) return (
    <button className="net" onClick={onClick}>
      <span className="dot sync"></span>Sincronizando…</button>
  );
  if(!online && n>0) return (
    <button className="net" onClick={onClick}>
      <span className="dot off"></span>{n} sin enviar</button>
  );
  if(!online) return (
    <button className="net" onClick={onClick}>
      <span className="dot off"></span>Sin conexión</button>
  );
  return (
    <button className="net" onClick={onClick}>
      <span className="dot on"></span>En línea</button>
  );
};

function VentasInicio(){
  const anios=Object.keys(VENTAS_PROVEEDOR).map(Number).sort((a,b)=>b-a);
  const ANIO_ACTUAL=new Date().getFullYear();
  const [anio,setAnio]=useState(anios.includes(ANIO_ACTUAL)?ANIO_ACTUAL:(anios[0]||ANIO_ACTUAL));
  const [prov,setProv]=useState("Todos");
  const [linea,setLinea]=useState("Todas");
  const [unidad,setUnidad]=useState("monto"); // monto | qq | caja | unidad
  const [abierto,setAbierto]=useState(false);

  const lineas=Object.keys(LINEAS_CFG);
  const cfg=linea!=="Todas"?LINEAS_CFG[linea]:null;
  let unidadesDisp;
  if(linea==="Todas") unidadesDisp=[["monto","Dólares"]];
  else if(cfg.unidad==="qq") unidadesDisp=[["monto","Dólares"],["qq","Quintales"]];
  else {
    unidadesDisp=[["monto","Dólares"],["caja","Cajas"]];
    if(cfg.uxFardo) unidadesDisp.push(["fardo","Fardos"]);
    unidadesDisp.push(["unidad","Unidades"]);
  }
  const unidadOk = unidadesDisp.some(u=>u[0]===unidad) ? unidad : "monto";

  const vals=Array(12).fill(0);
  if(linea==="Todas"){
    const dataAnio=VENTAS_PROVEEDOR[anio]||{};
    Object.keys(dataAnio).forEach(pid=>{
      if(prov==="Todos"||prov===pid) dataAnio[pid].forEach((v,i)=>vals[i]+=v);
    });
  } else {
    const arr=(VENTAS_LINEA[anio]||{})[linea]||Array(12).fill(0);
    arr.forEach((usd,i)=>{
      if(unidadOk==="monto") vals[i]=usd;
      else if(unidadOk==="qq") vals[i]=usd/(cfg.precio||40);
      else if(unidadOk==="caja") vals[i]=usd/(cfg.precioCaja||20);
      else if(unidadOk==="fardo") vals[i]=usd/(cfg.precioCaja||20)*(cfg.uxCaja||1)/(cfg.uxFardo||1);
      else if(unidadOk==="unidad") vals[i]=usd/(cfg.precioCaja||20)*(cfg.uxCaja||1);
    });
  }
  const totalAnio=vals.reduce((a,b)=>a+b,0);
  const uLbl={monto:null, qq:"qq", caja:"cajas", fardo:"fardos", unidad:"u"};
  const totalTxt=unidadOk==="monto"?money(totalAnio):Math.round(totalAnio)+" "+uLbl[unidadOk];
  const colorBarra=unidadOk==="monto"?"var(--field-700)":unidadOk==="qq"?"#3A6EA5":unidadOk==="caja"?"#7A5BA8":unidadOk==="fardo"?"#3F7C8C":"#C77F00";

  return (
    <div style={{marginBottom:18}}>
      
      <button className="ventas-cab" onClick={()=>setAbierto(v=>!v)}>
        <span className="ventas-cab-ic">📊</span>
        <div style={{flex:1,textAlign:"left"}}>
          <div className="ventas-cab-t">Ventas mes a mes</div>
          <div className="ventas-cab-s">{anio} · {linea==="Todas"?"todas las líneas":linea} · {totalTxt}</div>
        </div>
        <span className="ventas-cab-fl">{abierto?"▲":"▼"}</span>
      </button>

      {abierto && (<>
        
        <div className="cm-filtros" style={{margin:"10px 0 8px"}}>
          <select value={anio} onChange={e=>setAnio(Number(e.target.value))}>
            {anios.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
          <select value={linea} onChange={e=>{setLinea(e.target.value); setUnidad("monto");}}>
            <option value="Todas">Todas las líneas</option>
            {lineas.map(l=><option key={l} value={l}>{l}</option>)}
          </select>
        </div>

        {linea==="Todas" && (
          <div className="cm-filtros" style={{marginBottom:8}}>
            <select value={prov} onChange={e=>setProv(e.target.value)}>
              <option value="Todos">Todos los proveedores</option>
              {PROVEEDORES.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
            </select>
          </div>
        )}

        <div className="cm-unidad" style={{marginBottom:8}}>
          {unidadesDisp.map(([k,lbl])=>(
            <button key={k} className={unidadOk===k?"on":""} onClick={()=>setUnidad(k)}>{lbl}</button>
          ))}
        </div>
        {linea==="Todas" && <div className="meta" style={{margin:"0 2px 8px",fontSize:11}}>Vista general en dólares. Elige una línea para verla en su unidad (quintales, cajas o unidades).</div>}

        <BarrasComision valores={vals} color={colorBarra} unidad={unidadOk==="monto"?undefined:"otra"} unidadLbl={uLbl[unidadOk]}/>
      </>)}
    </div>
  );
}

/* Buscador predictivo compacto para FILTROS (regla sellada: nada de select nativo).
   Mismo alto que el select que reemplaza, para no romper las cuadrículas de filtros.
   Muestra el valor elegido dentro de la propia caja; se limpia con ×. */
function FiltroBuscador({items, value, onPick, todos, etiquetaTodos, render, estilo}){
  const [q,setQ]=useState("");
  const [open,setOpen]=useState(false);
  const norm=s=>String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const txt=(it)=>render?render(it):String(it);
  const opciones=[{__todos:true}, ...items];
  const filtrados = q.trim()==="" ? opciones
    : opciones.filter(it=>it.__todos ? false
        : norm(q).split(/\s+/).filter(Boolean).every(w=>norm(txt(it)).includes(w)));
  const elegido = value===todos ? "" : txt(value);
  return (
    <div className="fb" style={estilo}>
      <div className="fb-box">
        <span className="fb-mag">⌕</span>
        <input value={open?q:elegido}
          placeholder={etiquetaTodos}
          onChange={e=>{setQ(e.target.value);setOpen(true);}}
          onFocus={()=>{setQ("");setOpen(true);}}
          onBlur={()=>setTimeout(()=>setOpen(false),160)}/>
        {elegido && !open && (
          <button className="fb-clr" onMouseDown={e=>{e.preventDefault();onPick(todos);}}>×</button>
        )}
        <MicBtn onTexto={t=>{setQ(t);setOpen(true);}}/>
      </div>
      {open && (
        <div className="fb-pop">
          {filtrados.length===0
            ? <div className="fb-none">Sin resultados para “{q}”</div>
            : filtrados.map((it,i)=>(
              <div className="fb-opt" key={i}
                onMouseDown={e=>{e.preventDefault();onPick(it.__todos?todos:it);setOpen(false);setQ("");}}>
                {it.__todos ? <span style={{fontWeight:700,color:"var(--muted)"}}>{etiquetaTodos}</span> : txt(it)}
              </div>))}
        </div>)}
    </div>
  );
}

function SearchSelect({label, hint, items, value, onPick, onClear, disabled, placeholder, render, sortBy, multiPalabra, sinLabel}){
  const [q,setQ]=useState("");
  const [open,setOpen]=useState(false);
  if(value){
    return (<div className="field">{!sinLabel && <label>{label}</label>}
      <div className="ss"><div className={"pick"+(disabled?" dis":"")}>
        <div>{render.picked(value)}</div>
        {!disabled && <button className="chg" onClick={()=>{onClear();setQ("");}}>Cambiar</button>}
      </div></div></div>);
  }
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const coincide=(texto)=>{
    if(multiPalabra){
      const refs=(typeof REFERENCIALES!=="undefined" && REFERENCIALES[texto]) ? REFERENCIALES[texto].join(" ") : "";
      const t=norm(texto+" "+refs);
      return norm(q).split(/\s+/).filter(Boolean).every(w=>t.includes(w));
    }
    return norm(texto).includes(norm(q));
  };
  let filtrados = q.trim()==="" ? items : items.filter(it=>coincide(render.text(it)));
  if(sortBy) filtrados = [...filtrados].sort(sortBy);
  return (<div className="field">{!sinLabel && <label>{label}</label>}
    <div className="ss">
      <div className={"box"+(disabled?" dis":"")}>
        <span className="mag">⌕</span>
        <input value={q} disabled={disabled}
          placeholder={disabled ? placeholder : (placeholder || (label ? `Buscar ${label.toLowerCase()}…` : "Escribe para buscar…"))}
          onChange={e=>{setQ(e.target.value);setOpen(true);}}
          onFocus={()=>setOpen(true)}
          onBlur={()=>setTimeout(()=>setOpen(false),150)}/>
        {q && <button className="clr" onMouseDown={e=>{e.preventDefault();setQ("");}}>×</button>}
        {!disabled && <MicBtn onTexto={t=>{setQ(t);setOpen(true);}}/>}
      </div>
      {open && !disabled && (
        <div className="pop">
          {filtrados.length===0
            ? <div className="none">Sin resultados para “{q}”</div>
            : filtrados.map((it,i)=>(
              <div className="opt" key={i} onMouseDown={e=>{e.preventDefault();onPick(it);setOpen(false);setQ("");}}>
                {render.option(it)}
              </div>))}
        </div>)}
    </div>
    {hint && <div className="hint">{hint}</div>}
  </div>);

/* ══ AUTORIZACIONES (norma sellada) ══
   Toda acción frenada por un control sigue el mismo patrón: contexto automático → solicitud con
   motivo y compromiso → decisión del aprobador → CÓDIGO DE UN SOLO USO, con caducidad y atado a la
   operación → auditoría. Prohibido: códigos fijos, autorizaciones verbales, aprobar sin contexto. */
const MOTIVOS_AUT = [
  {k:"paga_hoy",    t:"Pagará hoy mismo"},
  {k:"cheque",      t:"Entrega cheque posfechado"},

  {k:"abono",       t:"Abonará una parte ahora"},
];
const AUTORIZACIONES = [];   /* solicitudes vivas (demo; Fase 4 → Supabase + app del Proveedor) */
const nuevoCodigo = () => String(Math.floor(100000+Math.random()*900000));   /* 6 dígitos, un solo uso */
function crearSolicitudAut(datos){
  const s = {
    id:"SOL-"+String(1000+AUTORIZACIONES.length+1),
    ...datos,
    estado:"pendiente",          // pendiente | aprobada | condicionada | rechazada | usada | vencida
    creada:new Date().toISOString(),
    codigo:null, caduca:null, tope:null, motivoDecision:null,
    au:"AU-260713-"+Math.floor(1000+Math.random()*9000),
  };
  AUTORIZACIONES.unshift(s);
  return s;
}
/* Decisión del proveedor (en el demo se simula; en Fase 4 llega desde su app) */
function decidirSolicitud(sol, decision, opts){
  opts=opts||{};
  sol.estado=decision;
  sol.motivoDecision=opts.motivo||null;
  if(decision==="aprobada" || decision==="condicionada"){
    sol.codigo=nuevoCodigo();
    sol.caduca=Date.now()+30*60*1000;      /* caduca en 30 minutos */
    sol.tope=opts.tope||null;              /* condicionada: hasta cierto monto */
  }
  return sol;
}
/* Validación del código: un solo uso, no vencido, atado a ESE cliente y ESA operación */
function validarCodigoAut(sol, codigo, cli, monto){
  if(!sol || !sol.codigo) return {ok:false, msg:"No hay una autorización aprobada para este cliente."};
  if(sol.estado==="usada")  return {ok:false, msg:"Ese código ya se usó. Solicita una nueva autorización."};
  if(Date.now()>sol.caduca) { sol.estado="vencida"; return {ok:false, msg:"El código caducó. Solicita una nueva autorización."}; }
  if(sol.cli!==cli)         return {ok:false, msg:"El código no corresponde a este cliente."};
  if(sol.tope && monto>sol.tope) return {ok:false, msg:`Autorización condicionada hasta ${money(sol.tope)}. Este pedido la excede.`};
  if(String(codigo).trim()!==sol.codigo) return {ok:false, msg:"Código incorrecto. Verifica con el proveedor."};
  sol.estado="usada"; sol.usada=new Date().toISOString();
  return {ok:true, msg:`Pedido autorizado · solicitud ${sol.id} · auditado ${sol.au}`};
}

/* Detalle del bloqueo: qué factura lo origina, cuántos días vencida, cuánto y de qué proveedor */
/* Todo se mide en quintales: 1 qq = 100 lb ≈ 45,4 kg */
function aQuintales(nombre, cant){
  const n=String(nombre||"").toLowerCase();
  if(/\bqq\b|quintal/.test(n)) return cant;
  const m=/(\d+(?:[.,]\d+)?)\s*kg/.exec(n);
  if(m) return cant * (parseFloat(m[1].replace(",","."))/45.4);
  const l=/(\d+(?:[.,]\d+)?)\s*lb/.exec(n);
  if(l) return cant * (parseFloat(l[1].replace(",","."))/100);
  return cant;
}
function detalleBloqueo(cliente){
  const vencidas=COBROS_INI.filter(c=>c.cli===cliente && /Vencida/i.test(c.vence))
    .map(c=>({...c, dias:Number((/Vencida\s+(\d+)/i.exec(c.vence)||[0,0])[1])}))
    .sort((a,b)=>b.dias-a.dias);
  if(!vencidas.length) return null;
  const f=vencidas[0];
  const pv=PROVEEDORES.find(p=>p.id===f.provId);
  const saldo=saldoRealFactura(f.factura, f.valor);          /* lo que realmente falta (descuenta abonos) */
  const det=(FACTURAS_DETALLE[cliente]||[]).find(x=>x.factura===f.factura);
  let total=f.valor;                                          /* valor original de la factura */
  if(det){
    const sub=det.items.reduce((s,it)=>s+it.cant*it.precio,0);
    total=sub-(det.retencion||0)-(det.descuento||0)-((det.ncs||[]).reduce((s,n)=>s+n.valor,0));
  }
  return {factura:f.factura, dias:f.dias, total:Math.round(total*100)/100, saldo, prov:pv?pv.nombre:"—",
          provId:f.provId, vence:f.vence, nVenc:vencidas.length, totalVenc:vencidas.reduce((s,x)=>s+saldoRealFactura(x.factura,x.valor),0)};
}

function motivosBloqueo(nombreCliente){
  const f = FICHA_CLIENTE[nombreCliente];
  const r = RIESGO_CLIENTE[nombreCliente] || {vencidas:0, protestados:0};
  if(!f) return [];
  const usado = (f.facturasPend||0) + (f.chequesPosf||0);
  const motivos = [];
  if(usado > f.cupo) motivos.push(`Cupo excedido: usa ${money(usado)} de ${money(f.cupo)}`);
  if((f.nFacturas||0) > MAX_FACTURAS) motivos.push(`Demasiadas facturas pendientes: ${f.nFacturas} (máx. ${MAX_FACTURAS})`);
  if(r.vencidas > 0) motivos.push(`${r.vencidas} factura(s) vencida(s)`);
  if(r.protestados > 0) motivos.push(`${r.protestados} cheque(s) protestado(s)`);
  return motivos;
}

/* Movimientos de comisión con dimensiones: permiten filtrar el gráfico por proveedor, producto,
   cliente, provincia, ciudad, año — y verlo en dólares o en quintales. Los totales por mes cuadran
   con COMISION_FREELANCE (2026: 142,138,165,150,180,189). */
const COM_MOV = (()=>{
  const CFG=[
    /* cliente,             provincia,   ciudad,     provId,  producto,        peso */
    ["Comercial Mendoza",   "Guayas",    "Milagro",  "PROV-C","Arroz Gustadina", .22],
    ["Distribuidora Ríos",  "Guayas",    "Guayaquil","PROV-A","Arroz Gustadina", .26],
    ["Bodega El Agricultor","Chimborazo","Riobamba", "PROV-A","Maíz Agripac",    .18],
    ["Tienda La Esquina",   "Pichincha", "Sangolquí","PROV-C","Harina Ya",       .14],
    ["Mayorista Santa Rosa","Pichincha", "Sangolquí","PROV-A","Azúcar Valdez",   .12],
    ["Abarrotes Don Pepe",  "Imbabura",  "Ibarra",   "PROV-B","Azúcar Valdez",   .08],
  ];
  const PRECIO_QQ={"Arroz Gustadina":45, "Maíz Agripac":29, "Harina Ya":38, "Azúcar Valdez":49};
  const out=[];
  Object.entries(COMISION_FREELANCE).forEach(([anio,meses])=>{
    meses.forEach((tot,i)=>{
      if(tot<=0) return;
      CFG.forEach(([cli,prov,ciu,provId,prod,peso],k)=>{
        const valor=Math.round(tot*peso*100)/100;
        if(valor<=0) return;
        const qq=Math.round(valor/(PRECIO_QQ[prod]*0.03));  /* comisión ≈ 3% del precio por quintal */
        out.push({anio:Number(anio), mes:i, valor, qq, cli, provincia:prov, ciudad:ciu, provId, producto:prod});
      });
    });
  });
  return out;
})();

const saldoRealFactura = (fac, saldoBase) => {
  const d = DETALLE_FACTURA[fac];
  if(!d) return saldoBase;
  const ab = (d.abonos||[]).reduce((s,a)=>s+a.monto,0);
  const re = (d.retenciones||[]).reduce((s,r)=>s+r.monto,0);
  const nc = (d.notasCredito||[]).reduce((s,n)=>s+n.monto,0);
  const saldo = (d.total||saldoBase) - ab - re - nc;
  return Math.round((saldo>0?saldo:0)*100)/100;
};

// Mini gráfico de línea (sparkline): evolución del precio neto en orden cronológico (antiguo→reciente)
function Sparkline({valores}){
  if(!valores || valores.length<2) return null;
  const w=260, h=40, pad=4;
  const min=Math.min(...valores), max=Math.max(...valores);
  const rango=(max-min)||1;
  const pts=valores.map((v,i)=>{
    const x=pad+(i*(w-pad*2)/(valores.length-1));
    const y=pad+(h-pad*2)*(1-(v-min)/rango);
    return [Math.round(x*100)/100, Math.round(y*100)/100];
  });
  const linea=pts.map((p,i)=>(i===0?"M":"L")+p[0]+" "+p[1]).join(" ");
  const area=linea+" L"+pts[pts.length-1][0]+" "+h+" L"+pts[0][0]+" "+h+" Z";
  const sube=valores[valores.length-1]>=valores[0];
  const col=sube?"#B5613C":"#2E7D52"; // sube=arcilla, baja=verde
  return (
    <svg viewBox={"0 0 "+w+" "+h} preserveAspectRatio="none">
      <path d={area} fill={col} opacity="0.08"/>
      <path d={linea} fill="none" stroke={col} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r={i===pts.length-1?3:2} fill={col}/>)}
    </svg>
  );
}

// ── Medidor de arco del cupo (comité UI): la aguja se mueve en vivo mientras digitas ──
function ArcCupo({ total, usado, excede, money }){
  if(!total || total<=0) return null;
  const p = Math.max(0, Math.min(1.12, usado/total));      // la aguja se clava un poco más allá del 100%
  const pa = Math.min(1, p);                                // el arco de progreso no pasa del 100%
  const color = excede ? "#C0392B" : p>=0.7 ? "#C77F00" : "var(--field)";
  const ang = -90 + 180*Math.min(1, p/1.0)*1.0;             // aguja: -90° (vacío) → +90° (lleno)
  const disp = Math.round((total-usado)*100)/100;
  return (
    <div className={excede?"arc-sacudida":""} style={{display:"flex",justifyContent:"center",marginBottom:6}}>
      <svg viewBox="0 0 200 112" style={{width:190,display:"block"}}>
        {/* zonas: verde hasta 70%, ámbar hasta 100% */}
        <path d="M 16 100 A 84 84 0 0 1 184 100" fill="none" stroke="#DDF0E6" strokeWidth="13" pathLength="1"
          strokeDasharray="0.7 1" strokeLinecap="round"/>
        <path d="M 16 100 A 84 84 0 0 1 184 100" fill="none" stroke="#FBF0D8" strokeWidth="13" pathLength="1"
          strokeDasharray="0.3 1" strokeDashoffset="-0.7"/>
        {/* progreso */}
        <path d="M 16 100 A 84 84 0 0 1 184 100" fill="none" stroke={color} strokeWidth="13" pathLength="1"
          strokeDasharray={`${pa} 1`} strokeLinecap="round" style={{transition:"stroke-dasharray .35s ease, stroke .35s ease"}}/>
        {/* aguja */}
        <g style={{transform:`rotate(${ang}deg)`, transformOrigin:"100px 100px", transition:"transform .35s cubic-bezier(.3,1.2,.4,1)"}}>
          <line x1="100" y1="100" x2="100" y2="36" stroke="#3A342A" strokeWidth="3" strokeLinecap="round"/>
        </g>
        <circle cx="100" cy="100" r="6" fill="#3A342A"/>
        {/* cifra central */}
        <text x="100" y="82" textAnchor="middle" className="num"
          style={{fontSize:17, fontWeight:700, fill: excede?"#C0392B":"var(--field)"}}>
          {excede ? "−"+money(usado-total) : money(disp)}</text>
        <text x="100" y="95" textAnchor="middle" style={{fontSize:8.5, fill:"#6B6455", fontWeight:600, letterSpacing:".04em"}}>
          {excede ? "EXCEDE EL CUPO" : "DISPONIBLE"}</text>
      </svg>
    </div>
  );
}

  },[cliInicial]);

  const reset=()=>{setTipo("P1");setPrecio("");setGratis("");setCondP3("contado");setPromoF(null);setComProp("");setMotivo("");};
  const resetProducto=()=>{setProd(null);setCant(50);reset();};
  const cerrarPedido=()=>{setCli(null);setProv(null);setCarrito([]);setVerCarrito(false);setCodigo("");setDesbloqueado(false);resetProducto();};
  const totalComisionCarrito = carrito.reduce((s,it)=>s+it.comisionTotal,0);
  const productosDelProv = prov ? PRESENTACIONES.filter(p=>p.provId===prov.id) : [];
  /* unidad tal como viene del catálogo */
  const sinLb = u => (u||"").trim();
  const unidadCorta = prod ? sinLb(prod.unidad) : "";

  /* Botón atrás inteligente: retrocede paso a paso dentro del módulo antes de salir */
  useRetroceso(()=>{
      if(verHist){ setVerHist(false); return true; }
      if(verCarrito){ setVerCarrito(false); return true; }   // cierra el "Pedido en curso"
      if(verFact){ setVerFact(false); return true; }         // cierra el detalle de la última factura
      if(prod){ resetProducto(); return true; }              // vuelve a las 3 tarjetas (quita el producto)
      /* con carrito en curso NO se pierde el pedido: se avisa y no se sale */
      if(carrito.length>0){ toast("Tienes un pedido en curso. Ciérralo o vacíalo para salir."); return true; }
      if(prov){ setProv(null); setProd(null); reset(); return true; }  // quita proveedor
      if(cli){ cerrarPedido(); return true; }                          // quita cliente
      return false;                                          // nada que retroceder: sale del módulo
    });

  const base = !prod ? 0
    : tipo==="P1" ? prod.baseCredito
    : tipo==="P2" ? prod.baseContado
    : tipo==="P3" ? (condP3==="credito"?prod.baseCredito:prod.baseContado) // piso según condición
    : tipo==="P4" ? (promoF?promoF.base:0)
    : 0;                                         // P5: no hay base, se propone
  const precioNum = parseFloat(precio)||0;
  const dif = (prod && precio!=="") ? Math.round((precioNum-base)*100)/100 : 0;
  const bajoBase = tipo!=="P5" && prod && precio!=="" && precioNum < base;
  const comPropNum = parseFloat(comProp)||0;

  const esP5 = tipo==="P5";
  const gratisNum = tipo==="P3" ? (parseInt(gratis)||0) : 0;
  const costoGratis = tipo==="P3" ? Math.round(base*gratisNum*100)/100 : 0;
  const cantN = Math.max(0, parseInt(cant)||0);   // cantidad como número seguro (cant puede ser texto mientras se escribe)
  const comisionUnidad = esP5 ? comPropNum : dif;
  const comisionBruta = Math.round(comisionUnidad*cantN*100)/100;
  const comisionTotal = Math.round((comisionBruta - costoGratis)*100)/100;
  const comisionPromedio = cantN>0 ? Math.round((comisionTotal/cantN)*100)/100 : 0;

  const esCredito = tipo==="P1" || ((tipo==="P3"||tipo==="P4") && condP3==="credito");
  const ficha = cli ? FICHA_CLIENTE[cli] : null;
  const cupoTotal = ficha ? (ficha.cupo||0) : 0;
  const deudaActual = ficha ? (ficha.debe||0) : 0;
  const cupoDisponible = Math.round((cupoTotal - deudaActual)*100)/100;
  const creditoEnCarrito = carrito.filter(it=>it.credito).reduce((s,it)=>s+(it.precio*it.cant),0);
  const montoLinea = (esCredito && prod && precio!=="") ? Math.round(precioNum*cantN*100)/100 : 0;
  const expuestoTotal = Math.round((deudaActual + creditoEnCarrito + montoLinea)*100)/100;
  const excedeCupo = esCredito && cupoTotal>0 && expuestoTotal > cupoTotal;
  const excesoMonto = excedeCupo ? Math.round((expuestoTotal - cupoTotal)*100)/100 : 0;

  const requiereAutorizacion = esP5 || excedeCupo;   // P5 o exceder cupo → requiere proveedor

  const baseLista = esP5 || (tipo==="P4"? !!promoF : true);
  const precioOk = precio!=="" && precioNum>0 && (esP5 || !bajoBase);
  const p5Ok = !esP5 || (comProp!=="" && motivo.trim().length>2);
  const p3Ok = tipo!=="P3" || (parseInt(gratis)||0)>=0;
  const valido = cli && prov && prod && cantN>0 && baseLista && precioOk && p5Ok && p3Ok && !bloqueado;

  const tInfo=TIPOS_PRECIO.find(t=>t.id===tipo);
  const histo = (cli && prod) ? HISTORIAL[cli+"|"+prod.id] : null;
  const histo3m = (cli && prod) ? (HISTORIAL_3M[cli+"|"+prod.id]||[]) : [];
  const imgProd = prod ? (EMOJI_LINEA[prod.linea]||"📦") : null;
  const TIPO_CORTO={P1:"Contado", P2:"Crédito", P3:"Promo vend.", P4:"Promo freel.", P5:"Especial"};
  const ultimaPorTipo={};
  histo3m.forEach(h=>{ if(!ultimaPorTipo[h.tipo]) ultimaPorTipo[h.tipo]=h; });
  const ultimaVenta = histo3m.length>0 ? histo3m[0] : null;
  const netoDe = h => Math.round((h.precio-(h.nc||0))*100)/100;
  let resumen=null;
  if(histo3m.length>0){
    const netos=histo3m.map(netoDe);
    const prom=Math.round((netos.reduce((a,b)=>a+b,0)/netos.length)*100)/100;
    const reciente=netos[0], antiguo=netos[netos.length-1];
    const deltaTend=Math.round((reciente-antiguo)*100)/100; // + sube, − baja
    const totalQ=histo3m.reduce((a,h)=>a+h.cant,0);
    resumen={prom, deltaTend, totalQ, nCompras:histo3m.length};
  }

  return (<>
    <div className="h1">Tomar pedido</div>

    {!prod && <div className="busc-cliente">
    <SearchSelect label="Cliente" items={CLIENTES} sinLabel value={cli} multiPalabra
      onPick={c=>{setCli(c);setCodigo("");setDesbloqueado(false);setProv(null);setProd(null);reset();}}
      onClear={()=>{ if(carrito.length===0){ setCli(null);setCodigo("");setDesbloqueado(false);setProv(null);setProd(null);reset(); } }}
      hint={carrito.length>0?"Para cambiar de cliente, cierra primero el pedido en curso.":null}
      render={{
        text:c=>c,
        option:c=>(<><div className="o1">{c}</div>
          {(REFERENCIALES[c]||[]).length>0 && <div className="o2">Factura a: {REFERENCIALES[c].join(" · ")}</div>}</>),
        picked:c=>(<><div className="p1">{c}</div>
          <div className="p2">Cliente</div></>)
      }}/>
    </div>}

    {cli && !bloqueado && !verFact && !prod && <SearchSelect label="Proveedor" items={PROVEEDORES} sinLabel value={prov}
      onPick={p=>{setProv(p);setProd(null);reset();}} onClear={()=>{if(carrito.length===0){setProv(null);setProd(null);reset();}}}

      render={{
        text:p=>p.nombre,
        option:p=>(<div className="o1">{p.nombre}</div>),
        picked:p=>(<><div className="p1">{p.nombre}</div><div className="p2">Proveedor</div></>)
      }}/>}

    {prov && !bloqueado && !verFact && !prod && <SearchSelect label="Producto autorizado" items={productosDelProv} sinLabel value={prod}
      onPick={p=>{setProd(p);reset();}} onClear={()=>{setProd(null);reset();}}

      render={{
        text:p=>p.nombre,
        option:p=>(<><div className="o1">{p.nombre}</div>
          <div className="o2">por {p.unidad}</div></>),

    {cli && !bloqueado && carrito.length===0 && !prod && (()=>{  /* última factura: venta y posventa, todo a la mano */
      const fs=(FACTURAS_DETALLE[cli]||[]);
      if(!fs.length) return null;
      const f=fs[0];
      const sub=f.items.reduce((s,it)=>s+it.cant*it.precio,0);
      const iva=f.items.reduce((s,it)=>s+it.cant*it.precio*((it.iva||0)/100),0);
      const ncPrecio=(f.ncs||[]).filter(n=>n.tipo!=="devolucion").reduce((s,n)=>s+n.valor,0);
      const ncDev=(f.ncs||[]).filter(n=>n.tipo==="devolucion").reduce((s,n)=>s+n.valor,0);
      const tot=sub+iva-(f.retencion||0)-(f.descuento||0)-ncPrecio-ncDev;
      const F={display:"flex",justifyContent:"space-between",gap:8,padding:"3px 0",fontSize:12.5};
      /* SELECCIÓN POR FACTURA: repite cliente + proveedor + TODOS los productos.
         Los precios se traen VIGENTES (no los viejos de la factura); si cambiaron, se avisa. */
      const buscarPres=(nombre)=> PRESENTACIONES.find(p=>p.nombre===nombre)
        || PRESENTACIONES.find(p=>nombre.startsWith(p.marca))
        || PRESENTACIONES.find(p=>p.nombre.split(" · ")[0]===nombre.split(" · ")[0]);
      const repetir=()=>{
        const lineas=[], fuera=[]; let pv=null, nAjuste=0;
        f.items.forEach((it,k)=>{
          const pres=buscarPres(it.prod);
          if(!pres){ fuera.push(it.prod); return; }
          if(!pv) pv=PROVEEDORES.find(x=>x.id===pres.provId);
          const base=pres.baseCredito;                       /* base VIGENTE hoy (crédito, P1) */
          const precio=it.precio;                            /* precio de la factura repetida */
          const com=Math.round((precio-base)*it.cant*100)/100;
          const ajustar = precio < base-0.004;               /* quedó bajo la base de hoy: hay que corregirlo */
          if(ajustar) nAjuste++;
          lineas.push({ id:Date.now()+k, prod:pres, prodNombre:pres.nombre, unidad:pres.unidad,
            tipo:"P1", tipoNombre:"Crédito", cant:it.cant, precio, gratis:0, credito:true,
            comisionTotal:com, requiere:false, motivoAuth:null,
            baseVigente:base, ajustar, precioFactura:precio });
        });
        if(!lineas.length){ toast("Ninguno de esos productos está en el catálogo; búscalos manualmente."); return; }
        setProv(pv); setProd(null); setCarrito(lineas); setVerCarrito(true); setVerFact(false);
        toast(fuera.length ? `Pedido repetido · ${lineas.length} producto(s). Fuera de catálogo: ${fuera.join(", ")}`
          : nAjuste ? `⚠️ ${nAjuste} precio(s) quedaron bajo la base vigente: ajústalos antes de enviar`
          : `Pedido repetido de ${f.factura} con sus precios y cantidades: revisa y envía.`);
      };
      return (<>
        <button className="ghost" style={{width:"100%",marginBottom:10,padding:"12px 14px",textAlign:"left"}}
          onClick={()=>setVerFact(v=>!v)}>
          <span style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>📄</span>
            <span style={{flex:1,minWidth:0,fontWeight:700,fontSize:14}}>{verFact?"Ocultar":"Ver"} última factura</span>
            <span style={{color:"var(--muted)",fontSize:15}}>{verFact?"▲":"▼"}</span>
          </span>
        </button>

        {verFact && (
          <div className="card" style={{padding:"13px 15px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
              <span style={{fontWeight:800,fontSize:13.5}}>{f.factura}</span>
              <span className="meta" style={{fontSize:11.5}}>{f.fecha}</span>
            </div>

            {/* cuerpo de la factura: columnas alineadas */}
            {(()=>{
              const G="1fr 30px 58px 66px";                 /* producto · cant · p.unit · total */
              const TH={fontSize:9.5,fontWeight:700,color:"var(--muted)",letterSpacing:".04em"};
              const TD={fontSize:12,fontVariantNumeric:"tabular-nums"};
              const R={textAlign:"right"};
              const TOT=(lbl,val,col)=>(
                <div style={{display:"grid",gridTemplateColumns:"1fr 90px",gap:6,padding:"2.5px 0"}}>
                  <span className="meta" style={{...R,fontSize:11.5}}>{lbl}</span>
                  <b className="num" style={{...R,fontSize:12.5,color:col||"var(--field)"}}>{val}</b>
                </div>
              );
              return (<>
                <div style={{display:"grid",gridTemplateColumns:G,gap:6,padding:"0 0 4px",borderBottom:"1px solid var(--line)"}}>
                  <span style={TH}>PRODUCTO</span><span style={{...TH,...R}}>CANT</span>
                  <span style={{...TH,...R}}>P. UNIT</span><span style={{...TH,...R}}>TOTAL</span>
                </div>
                {f.items.map((it,k)=>(
                  <div key={k} style={{display:"grid",gridTemplateColumns:G,gap:6,padding:"5px 0",borderBottom:"1px solid #F2F4F1"}}>
                    <span style={{...TD,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.prod}</span>
                    <span className="num" style={{...TD,...R}}>{it.cant}</span>
                    <span className="num" style={{...TD,...R,color:"var(--muted)"}}>{money(it.precio).replace("$","")}</span>
                    <b className="num" style={{...TD,...R}}>{money(it.cant*it.precio).replace("$","")}</b>
                  </div>
                ))}

                <div style={{marginTop:7}}>
                  {TOT("Subtotal", money(sub))}
                  {iva>0 && TOT("IVA", money(iva))}
                  {f.retencion>0 && TOT("Retención", "−"+money(f.retencion), "var(--clay)")}
                  {f.descuento>0 && TOT("Descuento", "−"+money(f.descuento), "var(--clay)")}
                </div>

                {(f.ncs||[]).length>0 && (<>
                  <div style={{...TH,margin:"9px 0 4px"}}>POSVENTA · NOTAS DE CRÉDITO</div>
                  {(f.ncs||[]).map((n,k)=>(
                    <div key={k} style={{display:"grid",gridTemplateColumns:"1fr 74px",gap:6,padding:"4px 0",borderBottom:"1px solid #F2F4F1"}}>
                      <span style={{fontSize:11.5,lineHeight:1.35,minWidth:0}}>
                        <b>{n.num}</b> <span className="meta">{n.tipo==="devolucion" ? `devolución ${n.cant} ${n.prod}` : n.motivo}</span>
                        <span className="meta" style={{display:"block",fontSize:10.5}}>{n.fecha}</span>
                      </span>
                      <b className="num" style={{...R,fontSize:12.5,color:"var(--clay)",whiteSpace:"nowrap"}}>−{money(n.valor).replace("$","")}</b>
                    </div>
                  ))}
                  {TOT("Total notas de crédito", "−"+money(ncPrecio+ncDev), "var(--clay)")}
                </>)}

                <div style={{display:"grid",gridTemplateColumns:"1fr 100px",gap:6,borderTop:"1.5px solid var(--field)",marginTop:8,paddingTop:8}}>
                  <span style={{textAlign:"right",fontWeight:800,fontSize:13.5}}>TOTAL FACTURADO</span>
                  <b className="num" style={{textAlign:"right",fontSize:16,fontWeight:800}}>{money(tot)}</b>
                </div>
              </>);})()}
          </div>
        )}

        {!verFact && (()=>{
          const qq=f.items.reduce((s,it)=>s+aQuintales(it.prod,it.cant),0);
          return (
            <button className="ghost" style={{width:"100%",marginBottom:14,padding:"12px 14px",textAlign:"left"}} onClick={repetir}>
              <span style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>🔁</span>
                <span style={{flex:1,minWidth:0,fontWeight:700,fontSize:14}}>Repetir último pedido</span>
                <span style={{color:"var(--muted)",fontSize:15}}>›</span>
              </span>
            </button>
          );})()}
      </>);
    })()}

    {cli && !verFact && (bloqueado || (!prov && carrito.length===0)) && (()=>{
      /* La ficha vive SOLO en esta pantalla de entrada; se retira al avanzar en el pedido.
         Excepción: si el cliente está bloqueado, permanece (ahí vive la solicitud de autorización). */
      const pf=PERFIL_CLIENTE[cli]||{};
      const pg=PAGADOR[pf.pagador]||{};
      const bq=detalleBloqueo(cli);
      const rojo = bloqueado;
      const sem = rojo ? ["#B5613C","🔴","Bloqueado"] : ["#2E7D52","🟢","Al día"];
      const MES={ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
      const p=(pf.ultima||"").split(" ");
      const dUlt = p.length===3 ? Math.round((new Date(2026,5,12) - new Date(2026, MES[p[1]]||0, Number(p[0])))/86400000) : null;
      const toca = (dUlt!=null && pf.frecuencia) ? pf.frecuencia-dUlt : null;
      const CH={display:"inline-flex",alignItems:"center",gap:4,borderRadius:20,padding:"3px 9px",fontSize:10.5,fontWeight:700};
      return (
        <div className="card" style={{padding:"11px 13px",marginBottom:12,borderLeft:`4px solid ${sem[0]}`}}>
          {!rojo && (<>
          {/* estado + mini-dashboard gráfico del cliente */}
          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:11,flexWrap:"wrap"}}>
            <span style={{...CH,background:sem[0]+"1A",color:sem[0],fontSize:11.5}}>{sem[1]} Sin facturas vencidas</span>
            {pf.premium && <span style={{...CH,background:"#FBF3DC",color:"#8A6D12"}}>★ Premium</span>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            {(()=>{
              const mini=(ic,num,unidad,lbl,sub,color)=>(
                <div style={{background:"var(--card)",border:"1px solid #EAE6DC",borderRadius:12,padding:"11px 12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <span style={{fontSize:15}}>{ic}</span>
                    <span className="num" style={{fontSize:18,fontWeight:800,lineHeight:1,color:color||"var(--field)"}}>
                      {num}{unidad?<span style={{fontSize:10,fontWeight:600}}> {unidad}</span>:null}</span>
                  </div>
                  <div style={{fontSize:11,fontWeight:700,marginTop:6,color:"var(--ink)"}}>{lbl}</div>
                  {sub && <div className="meta" style={{fontSize:9.5,marginTop:1}}>{sub}</div>}

              return (<>

                {mini("💳", pf.diasPago||"—", "días", "Suele pagar en",
                  `${pg.ic} ${(pg.t||"").replace(" pagador","").toLowerCase()}`, pg.c)}
                {mini("🏆", "#"+(pf.top||"—"), null, "Puesto en compras", "de 30 clientes")}
                {mini("📦", pf.qqAnio||0, "qq", "Compró este año", "acumulado")}
              </>);
            })()}
          </div>
          </>)}

          {rojo && bq && (

              </div>
              <div className="meta" style={{fontSize:11,marginTop:2}}>Proveedor: {bq.prov}{bq.nVenc>1?` · ${bq.nVenc} vencidas por ${money(bq.totalVenc)}`:""}</div>
              {onCobrar && (

              {solAut && solAut.estado==="pendiente" && (

                  <div className="meta" style={{fontSize:11.5,marginTop:3}}>{(MOTIVOS_AUT.find(m=>m.k===solAut.motivo)||{}).t}
                    {solAut.promesaFecha?` · promete ${money(solAut.promesaValor||0)} el ${solAut.promesaFecha.split("-").reverse().join("/")}`:""}</div>
                  {/* En el demo simulamos la respuesta del proveedor; en Fase 4 llega desde su app */}
                  <div style={{display:"flex",gap:8,marginTop:9}}>
                    <button className="ghost" style={{flex:1,margin:0,padding:"9px",fontSize:12}}
                      onClick={()=>{ const s=decidirSolicitud(solAut,"aprobada"); setSolAut({...s});
                        toast(`Proveedor aprobó · código de un solo uso, válido 30 min`); }}>Simular: aprobar</button>
                    <button className="ghost" style={{flex:1,margin:0,padding:"9px",fontSize:12}}

                        toast(`Proveedor aprobó CONDICIONADO: hasta ${money(500)}`); }}>Simular: condicionar</button>
                    <button className="ghost" style={{flex:1,margin:0,padding:"9px",fontSize:12,color:"var(--clay)"}}

        <div className="cr"><span className="k">Venta ({cant} × {money(precioNum)})</span>
          <span className="v num">{money(precioNum*cantN)}</span></div>

          <>
            <div className="cr"><span className="k">Diferencia sobre tu base</span>
              <span className="v num">{money(comisionUnidad)} / {unidadCorta}</span></div>
            <div className="cr"><span className="k">Comisión por {cant} vendidos</span>
              <span className="v num">{money(comisionBruta)}</span></div>
            {gratisNum>0 &&
              <div className="cr"><span className="k">− Costo de {gratisNum} gratis ({money(base)} c/u)</span>
                <span className="v num" style={{color:"var(--clay)"}}>−{money(costoGratis)}</span></div>}
            <div className="cr tot"><span className="k">Tu comisión total</span>
              <span className="v num">{money(comisionTotal)}</span></div>
            <div className="cr"><span className="k">Comisión promedio por {unidadCorta}</span>
              <span className="v num" style={{color:comisionPromedio>0?"var(--field)":"var(--clay)"}}>{money(comisionPromedio)}</span></div>
          </>
        ) : (
          <>
            <div className="cr"><span className="k">Diferencia sobre tu base</span>
              <span className="v num">{money(comisionUnidad)} / {unidadCorta}</span></div>
            <div className="cr tot"><span className="k">Tu comisión</span>
              <span className="v num">{money(comisionTotal)}</span></div>
          </>
        )}
      </div>
    )}

    {prod && esCredito && ficha && (
      <div className={"cupo-box"+(excedeCupo?" cupo-excede":"")}>
        <div className="cupo-head">
          <span>💳 Cupo de crédito · {cli}</span>
          <span className={"cupo-badge "+(excedeCupo?"bad":cupoDisponible>0?"ok":"warn")}>
            {excedeCupo?"Excedido":"Disponible"}
          </span>
        </div>
        <ArcCupo total={cupoTotal} usado={expuestoTotal} excede={excedeCupo} money={money}/>
        <div className="cupo-barra">
          <div className="cupo-fill" style={{width:Math.min(100,Math.round(expuestoTotal/cupoTotal*100))+"%"}}></div>
          {cupoTotal>0 && <div className="cupo-limite" title="Límite"></div>}
        </div>
        <div className="cupo-lines">
          <div className="cupo-l"><span>Límite autorizado</span><b className="num">{money(cupoTotal)}</b></div>

      }}>

                      if(pres){ const pv=PROVEEDORES.find(x=>x.id===pres.provId); if(pv) setProv(pv); setProd(pres); }
                      setCant(it.cant); setTipo(it.tipo||"P1"); setPrecio(String(it.precio));
                      if(it.tipo==="P3") setGratis(String(it.gratis||0));
                      setCarrito(carrito.filter(x=>x.id!==it.id));
                      setVerCarrito(false);
                      toast("Línea cargada al formulario: corrígela y vuelve a agregar.");

                  <div style={{marginTop:5,background:"#FBEDE7",border:"1px solid var(--clay)",borderRadius:9,padding:"7px 9px"}}>

                  </div>
                )}
              </div>
            ))}

          {carrito.length>0 && (
            <div className="totbar">
              <div><div className="tk">Comisión total del pedido</div>
                <div className="saldo">{carrito.length} producto(s)</div></div>
              <div className="tv num">{money(totalComisionCarrito)}</div>
            </div>
          )}

          {carrito.some(x=>x.ajustar) && (
            <div style={{background:"#FBEDE7",border:"1px solid var(--clay)",borderRadius:10,padding:"9px 11px",margin:"8px 0"}}>
              <span style={{fontSize:12,color:"var(--clay)",fontWeight:700}}>

            </div>
          )}
          <button className="cta" disabled={carrito.length===0 || carrito.some(x=>x.ajustar) || bloqueado}

              if(bloqueado){ toast("Cliente bloqueado: solicita autorización antes de cerrar el pedido."); return; }
              if(onGuardarPedido) onGuardarPedido({cli, prov, carrito});
              const resumen = carrito.map(it=>`• ${it.cant} ${it.unidad||""} ${it.prodNombre} · ${money(it.precio)}`).join("\n");
              setGuardadoOk({ cli, n:carrito.length, resumen });
              cerrarPedido();
            }}>
            Cerrar y guardar pedido</button>
          <button className="back" style={{width:"100%",marginTop:10}}
            onClick={()=>setVerCarrito(false)}>+ Agregar otro producto</button>
        </div>
      </div>
    )}
  </>);
}

/* CORTE AUTOMÁTICO: cierra los días vencidos y el día en curso cuando pasa la hora acordada.
   El efectivo pendiente NO se borra al cerrar: arrastra al día siguiente con su reloj de 24h. */
function correrCorteAutomatico(){
  const cerrados=[];
  CIERRES_HIST.forEach(d=>{
    if(d.estado==="abierto"){
      d.estado="cerrado_auto";
      d.cerradoEn=CONFIG_CIERRE.hora;
      d.au="AU-260612-"+Math.floor(1000+Math.random()*9000);
      cerrados.push(d.fechaTxt);
    }
  });
  const ahora=new Date().toTimeString().slice(0,5);
  if(CIERRE_HOY.estado==="abierto" && ahora>=CONFIG_CIERRE.hora){
    CIERRE_HOY.estado="cerrado_auto";
    CIERRE_HOY.cerradoEn=CONFIG_CIERRE.hora;
    CIERRE_HOY.au="AU-260612-"+Math.floor(1000+Math.random()*9000);
    cerrados.push("hoy");
  }
  return cerrados;
}

/* ══ COMPROBANTE DE PAGO ══
   Reutiliza los MISMOS datos y el mismo lenguaje visual de los estados de cuenta del módulo Clientes
   (CARTERA_EDAD, COBROS_INI, FICHA_CLIENTE, FORMATO_EC): no se recalcula nada por separado. */
const r2c = n => Math.round(n*100)/100;
const ordenVenceG = v => { const m=/Vencida\s+(\d+)/i.exec(v||""); if(m) return -Number(m[1]);
  if(/hoy/i.test(v||"")) return 0; const n=/En\s+(\d+)/i.exec(v||""); return n?Number(n[1]):999; };
const carteraDe  = cli => { const e=CARTERA_EDAD[cli]||{alDia:0,porVencer:0,vencido:0};
  return {...e, total:r2c(e.alDia+e.porVencer+e.vencido)}; };
const factsDe    = cli => COBROS_INI.filter(c=>c.cli===cli).slice().sort((a,b)=>ordenVenceG(a.vence)-ordenVenceG(b.vence));
const proxVencDe = cli => factsDe(cli)[0] || null;
const rucMask    = r => !r ? "—" : r.slice(0,4)+"•••••"+r.slice(-3);
const tipoComprobante = d => {
  const parciales=(d.facturas||[]).filter(f=>(f.saldoRest!=null?f.saldoRest:0)>0.004).length;
  if((d.facturas||[]).length>0 && parciales===0 && (d.saldoActual||0)<=0.004) return "Comprobante de cancelación";
  if(parciales>0) return "Comprobante de abono";
  return "Comprobante de pago";
};
const estadoReporte = () => "Pendiente de verificación"; /* el proveedor valida desde su app: nunca "Verificado" antes */
const obsDe = d => { const o=[]; (d.lineas||[]).forEach(l=>(l.obs||[]).forEach(x=>{ if(!o.includes(x)) o.push(x); })); return o; };
const OBS_TXT = {
  OCR_NO_LECTURA:"El comprobante no pudo leerse automáticamente",
  OCR_LECTURA_PARCIAL:"Lectura parcial del comprobante",
  VALOR_NO_COINCIDE:"El valor digitado no coincide con el comprobante",
  BANCO_NO_IDENTIFICADO:"Banco no identificado por el lector",
  CORRECCION_MANUAL:"Datos corregidos manualmente",
  CHEQUE_TERCERO:"Cheque de un tercero",
  EFECTIVO_24H:"Efectivo pendiente de depósito (máx. 24h)",
};
const textoCobroWA = d => {
  const t=tipoComprobante(d), tipo=/cancelaci/i.test(t)?"cancelación":/abono/i.test(t)?"abono":"pago";
  const fs=(d.facturas||[]);
  const det=fs.map(f=>`• Factura ${f.factura}: ${money(f.aplicado)} — ${(f.saldoRest||0)<=0.004?"Cancelada":"Abonada (resta "+money(f.saldoRest||0)+")"}`).join("\n");
  return `Estimado/a ${d.cli}:\n\nHemos registrado un ${tipo} por ${money(d.monto)}.\n\n`
    + `Facturas aplicadas (${fs.length}):\n${det}\n\n`
    + `Saldo anterior: ${money(d.saldoAnterior||0)}\nPago recibido: ${money(d.monto)}\nSaldo actual: ${money(d.saldoActual||0)}\n\n`
    + `Comprobante ${d.nRecibo} · Estado: ${estadoReporte()}\n\n`
    + `Adjuntamos el comprobante virtual y su estado de cuenta actualizado.\n\n`
    + `Gracias por su pago. Si encuentra alguna diferencia, comuníquese con su asesor comercial. 🌾`;
};

      headStyles:{fillColor:VERDE,textColor:255,fontStyle:"bold"},
      head:def.head?[def.head]:undefined, body:def.body.map(r=>r.map(L)), columnStyles:def.cols||{} });
    y=doc.lastAutoTable.finalY+6;
  };
  doc.setFont("helvetica","bold"); doc.setFontSize(15); doc.setTextColor(...VERDE);
  doc.text(P(d.prov||"FREELANCE"),14,18);
  doc.setFontSize(8); doc.setFont("helvetica","normal"); doc.setTextColor(...GRIS);
  doc.text("Distribuye FREELANCE",14,23);

  T({titulo:"RESUMEN DEL PAGO", head:["FORMA","BANCO / DETALLE","N° OPERACIÓN","FECHA","VALOR"],
     body:(d.lineas||[]).map(l=>[l.modalidad, l.modalidad==="Efectivo"?"Dinero en mano":(l.banco||"—"),
        l.numero||"—", l.fecha||"—", {content:money(parseFloat(l.monto)||0),styles:R}])
       .concat([[{content:"TOTAL REPORTADO",colSpan:4,styles:{...R,...TOT}},{content:money(d.monto),styles:{...R,...TOT}}]]),
     cols:{0:{cellWidth:24},2:{cellWidth:28},3:{cellWidth:24},4:{halign:"right",cellWidth:28}}});
  if((d.lineas||[]).some(l=>l.modalidad==="Depósito"||l.modalidad==="Transferencia")){
    doc.setFont("helvetica","italic"); doc.setFontSize(8); doc.setTextColor(...GRIS);
