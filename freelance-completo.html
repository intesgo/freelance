function Documentos({toast, usuario}){
  useRetroceso(()=>{
      if(acta){ setActa(null); return true; }
      if(reenviar){ setReenviar(null); return true; }
      if(crear){ setCrear(false); return true; }
      if(sel){ setSel(null); return true; }
      return false;
    });
  const [entregas,setEntregas]=useState(ENTREGAS_INI);
  const [sel,setSel]=useState(null);          // lote abierto
  const [crear,setCrear]=useState(false);     // form nueva entrega
  const [reenviar,setReenviar]=useState(null); // lote a reenviar (sin reingresar)
  const [acta,setActa]=useState(null);        // lote en vista de acta
  const [q,setQ]=useState("");
  const [fEstado,setFEstado]=useState("Todos"); // Todos | pendiente | recibido
  const yo=usuario?.nombre||"Daniel Ríos";

  const destinatarios=[
    ...EQUIPO_INI.map(s=>({nombre:s.nombre, rol:"Subcomisionista"})),
    ...PROVEEDORES.map(p=>({nombre:p.nombre, rol:"Proveedor"})),
    {nombre:"Patricia Vélez", rol:"Financiero/Cartera"},
  ];

  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const totalLote=l=>l.docs.reduce((a,d)=>a+(d.monto||0),0);
  const wa=(texto)=>window.open("https://wa.me/?text="+encodeURIComponent(texto),"_blank");

  const pendientes=entregas.filter(e=>e.estado==="pendiente");
  const chequesPorVencer=entregas.flatMap(e=>e.docs).filter(d=>d.tipo==="Cheque"&&d.estadoDoc==="En tránsito").length;

  if(acta){
    const l=acta;
    return (<>
      <button className="ghost" onClick={()=>setActa(null)} style={{marginTop:0,marginBottom:16,textAlign:"left"}}>‹ Volver</button>
      <div className="acta">
        <div className="acta-h">ACTA DE ENTREGA-RECEPCIÓN DE DOCUMENTOS</div>
        <div className="acta-sub">FREELANCE · {l.fecha}</div>
        <div className="acta-row"><span>Entrega:</span><b>{l.de} ({l.deRol})</b></div>
        <div className="acta-row"><span>Recibe:</span><b>{l.para} ({l.paraRol})</b></div>
        <div className="acta-row"><span>N° de documentos:</span><b>{l.docs.length}</b></div>
        <div className="acta-row"><span>Monto total:</span><b className="num">{money(totalLote(l))}</b></div>
        <table className="acta-tabla">
          <thead><tr><th>#</th><th>Tipo</th><th>Número</th><th>Cliente</th><th>Monto</th></tr></thead>
          <tbody>
            {l.docs.map((d,i)=>(
              <tr key={i}><td>{i+1}</td><td>{d.tipo}</td><td>{d.numero}</td><td>{d.cliente}</td><td className="num">{money(d.monto)}</td></tr>
            ))}
          </tbody>
        </table>
        <div className="acta-firmas">
          <div className="acta-firma"><div className="acta-linea"></div>Entregué conforme<br/><b>{l.de}</b></div>
          <div className="acta-firma"><div className="acta-linea"></div>Recibí conforme<br/><b>{l.para}</b></div>
        </div>
        {l.conNovedad && <div className="acta-novedad">Observación: {l.novedad}</div>}
      </div>
      <div className="addbar" style={{marginTop:14}}>
        <button onClick={()=>toast("Preparando impresión / PDF…")}>🖨️ Imprimir / PDF</button>
        <button className="wa-btn" onClick={()=>wa(textoActa(l))}>📲 Compartir acta</button>
      </div>
    </>);
  }

  if(sel){
    const l=entregas.find(x=>x.id===sel.id)||sel;
    const confirmar=(conNovedad,novedad)=>{
      setEntregas(es=>es.map(e=>e.id===l.id?{...e,estado:"recibido",recibidoFecha:new Date().toLocaleString("es-EC",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}),conNovedad,novedad:novedad||""}:e));
      toast(conNovedad?"Recibido con novedad · registrado":"Recepción confirmada · registrado");
      setSel(null);
    };
    const toggleVerif=(idx)=>setEntregas(es=>es.map(e=>e.id===l.id?{...e,docs:e.docs.map((d,i)=>i===idx?{...d,verificado:!d.verificado}:d)}:e));
    const todosVerif=l.docs.every(d=>d.verificado);
    const hoyTxt=new Date().toLocaleDateString("es-EC",{day:"numeric",month:"short",year:"numeric"});
    const solicitarDep=(idx)=>setEntregas(es=>es.map(e=>e.id===l.id?{...e,docs:e.docs.map((d,i)=>i===idx?{...d,estadoDoc:"Depósito solicitado",depSolicita:yo,bitacora:[...(d.bitacora||[]),{e:"Depósito solicitado",quien:yo,fecha:hoyTxt}]}:d)}:e));
    const registrarDep=(idx)=>setEntregas(es=>es.map(e=>e.id===l.id?{...e,docs:e.docs.map((d,i)=>i===idx?{...d,estadoDoc:"Depositado",depBanco:d.banco||BANCOS[0],depFecha:hoyTxt,depFoto:true,bitacora:[...(d.bitacora||[]),{e:"Depositado",quien:yo,fecha:hoyTxt}]}:d)}:e));

    return (<>
      <button className="ghost" onClick={()=>setSel(null)} style={{marginTop:0,marginBottom:16,textAlign:"left"}}>‹ Volver</button>
      <div className="h1" style={{marginBottom:4}}>Entrega · {l.fecha}</div>
      <div className="sub">{l.de} → {l.para}</div>

      <div className="fcard" style={{margin:"12px 0 14px"}}>
        <div className="cu-line"><span>De</span><b>{l.de} · {l.deRol}</b></div>
        <div className="cu-line"><span>Para</span><b>{l.para} · {l.paraRol}</b></div>
        <div className="cu-line"><span>Documentos</span><b>{l.docs.length}</b></div>
        <div className="cu-line"><span>Monto total</span><b className="num">{money(totalLote(l))}</b></div>
        <div className="cu-line"><span>Estado</span>
          <b><span className={"chip "+(l.estado==="recibido"?"c-ok":l.estado==="courier"?"c-info":"c-warn")}><span className="d"></span>{l.estado==="recibido"?"Recibido":l.estado==="courier"?"En courier":"Pendiente"}</span></b></div>
        {l.estado==="recibido" && <div className="meta" style={{marginTop:4}}>✓ {l.recibidoFecha}{l.conNovedad?` · ⚠️ ${l.novedad}`:""}</div>}
        {l.estado==="courier" && <div className="meta" style={{marginTop:4}}>🚚 {l.courierEmpresa} · guía {l.courierGuia} · enviado {l.courierFecha}</div>}
      </div>

      <div className="ficha-sec">Documentos {l.estado==="pendiente"?"· verifica uno por uno":""}</div>
      {l.docs.map((d,i)=>(
        <div className="card doc-item" key={i}>
          <div className="row" style={{alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div className="cli" style={{fontSize:13.5}}>{d.tipo} · {d.numero}</div>
              <div className="meta">{d.cliente}{d.banco?` · ${d.banco}`:""}</div>
              <div className="meta">📅 {d.fecha}{d.venc?` · vence ${d.venc}`:""}</div>
              <span className="doc-estado" style={{background:ESTADO_DOC_COLOR[d.estadoDoc]||"#888"}}>{d.estadoDoc}</span>
              {d.foto && <span className="doc-foto">📷 con foto</span>}
              {d.estadoDoc==="Depósito solicitado" && d.depSolicita && <div className="doc-dep-aviso">🔔 {d.depSolicita} solicitó depositar este cheque</div>}
              {d.estadoDoc==="Depositado" && d.depFecha && <div className="meta" style={{marginTop:4,color:"#3A6EA5"}}>✓ Depositado en {d.depBanco} · {d.depFecha}{d.depFoto?" · 📷 evidencia":""}</div>}
            </div>
            <div style={{textAlign:"right"}}>
              <div className="amt num">{money(d.monto)}</div>
              {l.estado==="pendiente" && (
                <button className={"doc-chk"+(d.verificado?" on":"")} onClick={()=>toggleVerif(i)}>{d.verificado?"✓":"○"}</button>
              )}
            </div>
          </div>

          {d.tipo==="Cheque" && l.estado!=="pendiente" && (
            <div className="doc-acc">
              {d.estadoDoc!=="Depositado" && d.estadoDoc!=="Cobrado" && d.estadoDoc!=="Depósito solicitado" && (
                <button className="doc-acc-b" onClick={()=>solicitarDep(i)}>📨 Solicitar depósito</button>
              )}
              {(d.estadoDoc==="Depósito solicitado"||d.estadoDoc==="En tránsito") && (
                <button className="doc-acc-b prim" onClick={()=>registrarDep(i)}>📷 Registrar depósito</button>
              )}
              {d.estadoDoc==="Depositado" && (
                <button className="wa-btn" onClick={()=>wa(`Evidencia de depósito\n${d.tipo} ${d.numero} · ${d.cliente}\nBanco: ${d.depBanco}\nFecha: ${d.depFecha}\nMonto: ${money(d.monto)}`)}>📲 Enviar evidencia</button>
              )}
            </div>
          )}

          {(d.bitacora||[]).length>0 && (
            <div className="doc-bita">
              {d.bitacora.map((b,j)=>(
                <div className="doc-bita-row" key={j}>
                  <span className="doc-bita-dot" style={{background:ESTADO_DOC_COLOR[b.e]||"#888"}}></span>
                  <span className="doc-bita-e">{b.e}</span>
                  <span className="doc-bita-m">{b.quien} · {b.fecha}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}

      {l.estado==="pendiente" ? (
        <div style={{marginTop:14}}>
          {!todosVerif && <div className="meta" style={{marginBottom:8,textAlign:"center"}}>Verifica todos los documentos para confirmar.</div>}
          <button className="cta" style={{width:"100%",marginBottom:8}} disabled={!todosVerif} onClick={()=>confirmar(false)}>✓ Confirmar recepción (todo conforme)</button>
          <button className="back" style={{width:"100%",color:"var(--clay)",borderColor:"#E8C0B0"}} onClick={()=>confirmar(true,"Diferencia o documento faltante al recibir")}>⚠️ Recibir con novedad</button>
        </div>
      ) : l.estado==="courier" ? (
        <div style={{marginTop:14}}>
          <div className="meta" style={{marginBottom:8,textAlign:"center"}}>El destinatario confirma al recibir el envío.</div>
          <button className="cta" style={{width:"100%",marginBottom:8}} onClick={()=>confirmar(false)}>✓ Confirmar recepción del courier</button>
          <div className="addbar">
            <button onClick={()=>setActa(l)}>📄 Ver acta</button>
            <button className="wa-btn" onClick={()=>wa(textoComprobante(l))}>📲 Compartir guía</button>
          </div>
        </div>
      ) : (
        <div style={{marginTop:14}}>
          
          <button className="cta" style={{width:"100%",marginBottom:8}} onClick={()=>{ setReenviar(l); }}>↗️ Reenviar este lote a otro destinatario</button>
          <div className="addbar">
            <button onClick={()=>setActa(l)}>📄 Ver acta</button>
            <button className="wa-btn" onClick={()=>wa(textoComprobante(l))}>📲 Compartir</button>
          </div>
        </div>
      )}
    </>);
  }

  if(crear || reenviar){
    return <NuevaEntrega yo={yo} destinatarios={destinatarios} reenviarDe={reenviar}
      onCancel={()=>{setCrear(false);setReenviar(null);}}
      onCrear={(lote)=>{ setEntregas(es=>[lote,...es]); setCrear(false); setReenviar(null); setSel(null);
        toast(lote.estado==="courier"?"Entrega enviada por courier":"Entrega registrada · pendiente de recepción"); }}/>;
  }

  const lista=entregas.filter(e=>{
    if(fEstado!=="Todos"&&e.estado!==fEstado) return false;
    if(!q) return true;
    const txt=norm(e.de+" "+e.para+" "+e.docs.map(d=>d.numero+" "+d.cliente+" "+d.tipo).join(" "));
    return txt.includes(norm(q));
  });

  return (<>
    <div className="h1">Entrega de documentos</div>
    <div className="sub">Registro de entrega y recepción de cheques, facturas, pagarés y más.</div>

    {(pendientes.length>0||chequesPorVencer>0) && (
      <div className="doc-alertas">
        {pendientes.length>0 && <div className="doc-al-row"><span>⏳ Pendientes de confirmar recepción</span><b>{pendientes.length}</b></div>}
        {chequesPorVencer>0 && <div className="doc-al-row"><span>🔔 Cheques en tránsito (revisar vencimiento)</span><b>{chequesPorVencer}</b></div>}
      </div>
    )}

    <button className="cta" style={{width:"100%",margin:"4px 0 14px"}} onClick={()=>setCrear(true)}>+ Nueva entrega</button>

    <div className="ss" style={{marginBottom:10}}>
      <div className="box"><span className="mag">⌕</span>
        <input value={q} placeholder="Buscar por número, cliente, persona…" onChange={e=>setQ(e.target.value)}/>
        {q && <button className="clr" onClick={()=>setQ("")}>×</button>}</div>
    </div>
    <div className="pot-filtros" style={{marginBottom:14}}>
      <button className={fEstado==="Todos"?"on":""} onClick={()=>setFEstado("Todos")}>Todas <span className="sol-n">{entregas.length}</span></button>
      <button className={fEstado==="pendiente"?"on":""} onClick={()=>setFEstado("pendiente")}>Pendientes <span className="sol-n">{entregas.filter(e=>e.estado==="pendiente").length}</span></button>
      <button className={fEstado==="recibido"?"on":""} onClick={()=>setFEstado("recibido")}>Recibidas <span className="sol-n">{entregas.filter(e=>e.estado==="recibido").length}</span></button>
    </div>

    {lista.length===0 ? <div className="ph">Sin entregas que coincidan.</div>
      : lista.map(e=>(
        <div className="card" key={e.id} style={{cursor:"pointer"}} onClick={()=>setSel(e)}>
          <div className="row" style={{alignItems:"center"}}>
            <div style={{flex:1}}>
              <div className="cli" style={{fontSize:14}}>{e.de} → {e.para}</div>
              <div className="meta">{e.fecha} · {e.docs.length} doc(s) · {money(totalLote(e))}</div>
            </div>
            <span className={"chip "+(e.estado==="recibido"?"c-ok":e.estado==="courier"?"c-info":"c-warn")}><span className="d"></span>{e.estado==="recibido"?"Recibido":e.estado==="courier"?"En courier":"Pendiente"}</span>
          </div>
        </div>
      ))}

    <button className="ghost" style={{width:"100%",marginTop:14}} onClick={()=>toast("Exportando respaldo del registro…")}>⬇️ Exportar respaldo</button>
  </>);
}

function textoComprobante(l){
  return `COMPROBANTE DE ENTREGA · FREELANCE\n${l.fecha}\nDe: ${l.de}\nPara: ${l.para}\n\n`+
    l.docs.map((d,i)=>`${i+1}. ${d.tipo} ${d.numero} · ${d.cliente} · ${money(d.monto)}`).join("\n")+
    `\n\nTotal: ${money(l.docs.reduce((a,d)=>a+d.monto,0))}\nEstado: ${l.estado==="recibido"?"Recibido "+(l.recibidoFecha||""):"Pendiente"}`;
}
function textoActa(l){
  return `ACTA DE ENTREGA-RECEPCIÓN · FREELANCE\n${l.fecha}\nEntrega: ${l.de} (${l.deRol})\nRecibe: ${l.para} (${l.paraRol})\n\n`+
    l.docs.map((d,i)=>`${i+1}. ${d.tipo} ${d.numero} · ${d.cliente} · ${money(d.monto)}`).join("\n")+
    `\n\nN° documentos: ${l.docs.length}\nTotal: ${money(l.docs.reduce((a,d)=>a+d.monto,0))}`+
    (l.conNovedad?`\nObservación: ${l.novedad}`:"");
}

function NuevaEntrega({yo, destinatarios, reenviarDe, onCancel, onCrear}){
  const esReenvio=!!reenviarDe;
  const bancosOrd=[...BANCOS].sort((a,b)=>((USO_BANCOS[b]||0)-(USO_BANCOS[a]||0))||a.localeCompare(b));
  const [para,setPara]=useState("");
  const [busca,setBusca]=useState("");        // buscador predictivo del destinatario
  const [docs,setDocs]=useState(esReenvio?reenviarDe.docs.map(d=>({...d,verificado:false})):[]);
  const [d,setD]=useState({tipo:"Cheque", numero:"", cliente:"", monto:"", banco:bancosOrd[0], fecha:"", venc:"", estadoDoc:"En tránsito", foto:false, verificado:false});
  const [envio,setEnvio]=useState("mano");     // mano | courier
  const [courier,setCourier]=useState({empresa:COURIERS[0], guia:""});

  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const sugerencias=busca?destinatarios.filter(x=>norm(x.nombre+" "+x.rol).includes(norm(busca))).slice(0,6):[];

  const agregarDoc=()=>{
    if(!d.numero.trim()||!d.cliente.trim()){ return; }
    setDocs(ds=>[...ds,{...d, monto:Number(d.monto)||0, bitacora:[{e:d.estadoDoc,quien:yo,fecha:new Date().toLocaleDateString("es-EC",{day:"numeric",month:"short",year:"numeric"})}]}]);
    setD({tipo:"Cheque", numero:"", cliente:"", monto:"", banco:bancosOrd[0], fecha:"", venc:"", estadoDoc:"En tránsito", foto:false, verificado:false});
  };
  const crear=()=>{
    if(!para||docs.length===0) return;
    if(envio==="courier" && !courier.guia.trim()) return;
    const dest=destinatarios.find(x=>x.nombre===para);
    const hoy=new Date().toLocaleDateString("es-EC",{day:"numeric",month:"short",year:"numeric"});
    const lote={id:"E"+Date.now(), de:yo, deRol:"Freelance", para, paraRol:dest?dest.rol:"—", fecha:hoy,
      estado: envio==="courier"?"courier":"pendiente", envio, docs};
    if(envio==="courier"){ lote.courierEmpresa=courier.empresa; lote.courierGuia=courier.guia; lote.courierFecha=hoy; }
    onCrear(lote);
  };
  const totalNuevo=docs.reduce((a,x)=>a+(x.monto||0),0);

  return (<>
    <button className="ghost" onClick={onCancel} style={{marginTop:0,marginBottom:16,textAlign:"left"}}>‹ Cancelar</button>
    <div className="h1">{esReenvio?"Reenviar lote":"Nueva entrega"}</div>
    <div className="sub">{esReenvio?"Reenvías los mismos documentos sin volver a ingresarlos. Solo elige el destinatario.":"Arma el lote de documentos y elige a quién se los entregas."}</div>

    <div className="field"><label>Entregar a</label>
      {para ? (
        <div className="dest-sel"><span>{para} · {destinatarios.find(x=>x.nombre===para)?.rol}</span>
          <button className="clr" onClick={()=>{setPara("");setBusca("");}}>×</button></div>
      ) : (<>
        <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Escribe para buscar destinatario…"/>
        {sugerencias.length>0 && (
          <div className="dest-sug">
            {sugerencias.map((x,i)=>(
              <button key={i} className="dest-sug-it" onClick={()=>{setPara(x.nombre);setBusca("");}}>
                <b>{x.nombre}</b><span>{x.rol}</span></button>
            ))}
          </div>
        )}
      </>)}
    </div>

    <div className="ficha-sec">Forma de envío</div>
    <div className="cm-unidad" style={{marginBottom:10}}>
      <button className={envio==="mano"?"on":""} onClick={()=>setEnvio("mano")}>🤝 En mano</button>
      <button className={envio==="courier"?"on":""} onClick={()=>setEnvio("courier")}>🚚 Courier</button>
    </div>
    {envio==="courier" && (
      <div className="fcard" style={{marginBottom:12}}>
        <div style={{marginBottom:10}}><div className="ficha-sec" style={{marginBottom:6}}>Empresa de courier</div>
          <FiltroBuscador items={COURIERS} value={courier.empresa||""}
            onPick={v=>setCourier({...courier,empresa:v==="__"?"":v})}
            todos="__" etiquetaTodos="Elige courier…"/></div>
        <div className="field"><label>Número de guía</label>
          <input value={courier.guia} onChange={e=>setCourier({...courier,guia:e.target.value})} placeholder="Ej. SRV-558213"/></div>
        <div className="meta">El courier solo traslada. El destinatario final verifica el contenido y confirma al recibir.</div>
      </div>
    )}

    {!esReenvio && (<>
      <div className="ficha-sec">Agregar documento</div>
      <div className="fcard" style={{marginBottom:12}}>
        <div style={{marginBottom:10}}><div className="ficha-sec" style={{marginBottom:6}}>Tipo</div>
          <FiltroBuscador items={TIPOS_DOC} value={d.tipo||""}
            onPick={v=>setD({...d,tipo:v==="__"?"":v})}
            todos="__" etiquetaTodos="Elige tipo…"/></div>
        <div className="field"><label>Número de documento</label>
          <input value={d.numero} onChange={e=>setD({...d,numero:e.target.value})} placeholder="Ej. CHQ-004521"/></div>
        <div style={{marginBottom:10}}><div className="ficha-sec" style={{marginBottom:6}}>Cliente</div>
          <FiltroBuscador items={CLIENTES} value={d.cliente||""}
            onPick={v=>setD({...d,cliente:v==="__"?"":v})}
            todos="__" etiquetaTodos="Busca el cliente…"/></div>
        <div style={{display:"flex",gap:8}}>
          <div className="field" style={{flex:1}}><label>Monto</label>
            <input type="number" value={d.monto} onChange={e=>setD({...d,monto:e.target.value})} placeholder="0.00"/></div>
          <div style={{flex:1,minWidth:0}}><div className="ficha-sec" style={{marginBottom:6}}>Estado</div>
            <FiltroBuscador items={ESTADOS_DOC} value={d.estadoDoc||""}
              onPick={v=>setD({...d,estadoDoc:v==="__"?"":v})}
              todos="__" etiquetaTodos="Estado…"/></div>
        </div>
        {d.tipo==="Cheque" && (
          <div style={{marginBottom:10}}><div className="ficha-sec" style={{marginBottom:6}}>Banco</div>
            <FiltroBuscador items={bancosOrd} value={d.banco||""}
              onPick={v=>setD({...d,banco:v==="__"?"":v})}
              todos="__" etiquetaTodos="Busca el banco…"/></div>
        )}
        <div style={{display:"flex",gap:8}}>
          <div className="field" style={{flex:1}}><label>Fecha</label>
            <input value={d.fecha} onChange={e=>setD({...d,fecha:e.target.value})} placeholder="Ej. 27 jun 2026"/></div>
          <div className="field" style={{flex:1}}><label>Vencimiento</label>
            <input value={d.venc} onChange={e=>setD({...d,venc:e.target.value})} placeholder="Si aplica"/></div>
        </div>
        <button className={"doc-foto-btn"+(d.foto?" on":"")} onClick={()=>setD({...d,foto:!d.foto})}>
          {d.foto?"✓ Foto adjunta":"📷 Adjuntar foto del documento"}</button>
        <button className="cta" style={{width:"100%",marginTop:10}} onClick={agregarDoc}>+ Agregar al lote</button>
      </div>
    </>)}

    {docs.length>0 && (
      <div style={{marginBottom:14}}>
        <div className="ficha-sec">{esReenvio?"Documentos a reenviar":"En este lote"} · {docs.length} · {money(totalNuevo)}</div>
        {docs.map((x,i)=>(
          <div className="card doc-item" key={i}>
            <div className="row"><div style={{flex:1}}>
              <div className="cli" style={{fontSize:13}}>{x.tipo} · {x.numero}</div>
              <div className="meta">{x.cliente} · {money(x.monto)}{x.foto?" · 📷":""}</div></div>
              {!esReenvio && <button className="clr" onClick={()=>setDocs(ds=>ds.filter((_,j)=>j!==i))}>×</button>}
            </div>
          </div>
        ))}
      </div>
    )}

    <button className="cta" style={{width:"100%"}} disabled={!para||docs.length===0||(envio==="courier"&&!courier.guia.trim())} onClick={crear}>
      {esReenvio?"Reenviar lote":envio==="courier"?"Enviar por courier":"Registrar entrega"}</button>
  </>);
}

function Autorizaciones({toast, usuario}){
  useRetroceso(()=>{
      if(verCodigo){ setVerCodigo(null); return true; }
      if(denegar){ setDenegar(null); return true; }
      return false;
    });
  const [auts,setAuts]=useState(AUTORIZACIONES_INI);
  const [pestana,setPestana]=useState("pendientes"); // pendientes | historial
  const [denegar,setDenegar]=useState(null);         // {id, motivo}
  const [verCodigo,setVerCodigo]=useState(null);     // autorización recién aprobada (modal del código)

  const ahora=()=>{const d=new Date();return {fecha:d.toISOString().slice(0,10), hora:d.toTimeString().slice(0,5)};};
  const genCodigo=()=>String(Math.floor(100000+Math.random()*900000)); // 6 dígitos, un solo uso

  const pendientes=auts.filter(a=>a.estado==="pendiente");
  const historial=auts.filter(a=>a.estado!=="pendiente");

  const autorizar=(id)=>{
    const codigo=genCodigo(); const t=ahora();
    setAuts(as=>as.map(a=>a.id===id?{...a, estado:"autorizado", codigo,
      resp:{...t, nota:"Autorizado · código entregado, aún sin usar"}}:a));
    const a=auts.find(x=>x.id===id);
    setVerCodigo({...a, codigo});
  };
  const confirmarDenegar=()=>{
    if(!denegar.motivo.trim()){toast("El motivo es obligatorio: le llega al solicitante.");return;}
    const t=ahora();
    setAuts(as=>as.map(a=>a.id===denegar.id?{...a, estado:"denegado",
      resp:{...t, nota:"Denegado: "+denegar.motivo.trim()}}:a));
    setDenegar(null);
    toast("Denegado con motivo. El solicitante queda notificado.");
  };
  const copiarCodigo=(codigo)=>{
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(codigo).then(()=>toast("Código copiado. Pásaselo al solicitante."))
        .catch(()=>toast("Código: "+codigo));
    } else { toast("Código: "+codigo); }
  };

  const EST={
    pendiente:{t:"Pendiente", bg:"#FBF0D8", c:"#C77F00"},
    autorizado:{t:"Autorizado · sin usar", bg:"#EAF0F6", c:"#3A6EA5"},
    usado:{t:"Usado ✓", bg:"#E4F1E9", c:"#2E7D52"},
    denegado:{t:"Denegado", bg:"#FBE9E4", c:"#B5613C"},
  };
  const chipEst=(e)=>(<span style={{fontSize:10.5,fontWeight:700,padding:"3px 9px",borderRadius:20,background:EST[e].bg,color:EST[e].c,whiteSpace:"nowrap"}}>{EST[e].t}</span>);

  const tarjetaAut=(a, conAcciones)=>(
    <div key={a.id} className="card" style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:6}}>
        <div>
          <div style={{fontSize:13.5,fontWeight:800}}>{a.accion}</div>
          <div className="meta">{a.quien} · {a.rol}</div>
        </div>
        {chipEst(a.estado)}
      </div>
      <div style={{fontSize:12.5,marginBottom:2}}><b>{a.objeto}</b>{a.monto!=null && <> · {money(a.monto)}</>} <span className="meta">· {a.modulo}</span></div>
      <div style={{fontSize:12.5,color:"var(--muted)",marginBottom:6}}>Motivo: {a.motivo}</div>
      <div className="meta">{a.fecha} · {a.hora}</div>
      {a.resp && <div style={{fontSize:12,color:"var(--muted)",marginTop:6,paddingTop:6,borderTop:"1px solid var(--line)"}}>↳ {a.resp.nota} <span className="meta">· {a.resp.fecha} {a.resp.hora}</span></div>}
      {a.codigo && a.estado!=="denegado" && (
        <button onClick={()=>copiarCodigo(a.codigo)} style={{marginTop:8,width:"100%",padding:"9px",border:"1px dashed var(--field)",borderRadius:10,background:"var(--card)",fontFamily:"'Space Grotesk',sans-serif",fontSize:15,fontWeight:700,letterSpacing:"4px",color:"var(--field)",cursor:"pointer"}}>
          🔑 {a.codigo}
        </button>
      )}
      {conAcciones && (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
          <button onClick={()=>autorizar(a.id)} style={{padding:"11px",border:"none",borderRadius:10,background:"var(--field)",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>Autorizar 🔑</button>
          <button onClick={()=>setDenegar({id:a.id, motivo:""})} style={{padding:"11px",border:"1px solid #E3B7A8",borderRadius:10,background:"#FBE9E4",color:"#B5613C",fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>Denegar</button>
        </div>
      )}
    </div>
  );

  return (<>
    <div className="h1">Autorizaciones</div>
    <div className="sub">El equipo pide, tú decides: cada autorización genera un código único de un solo uso para esa operación. Nada se anula sin pasar por ti.</div>

    <div className="eq-tabs">
      <button className={pestana==="pendientes"?"on":""} onClick={()=>setPestana("pendientes")}>
        Pendientes{pendientes.length>0 && <span className="eq-tab-badge">{pendientes.length}</span>}
      </button>
      <button className={pestana==="historial"?"on":""} onClick={()=>setPestana("historial")}>Historial</button>
    </div>

    {pestana==="pendientes" && (<>
      {pendientes.length===0 && <div className="card" style={{textAlign:"center",color:"var(--muted)",fontSize:13}}>🎉 Nada por autorizar. Todo en orden.</div>}
      {pendientes.map(a=>tarjetaAut(a,true))}
    </>)}

    {pestana==="historial" && (<>
      {historial.length===0 && <div className="card" style={{textAlign:"center",color:"var(--muted)",fontSize:13}}>Aún no hay autorizaciones resueltas.</div>}
      {historial.map(a=>tarjetaAut(a,false))}
      <div className="meta" style={{marginTop:4}}>Los códigos son de un solo uso: al usarse en el sistema quedan marcados. Nada se borra.</div>
    </>)}

    {/* Modal: código generado */}
    {verCodigo && (
      <div onClick={()=>setVerCodigo(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:80,padding:24}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"var(--card)",borderRadius:18,padding:"22px 20px",width:"100%",maxWidth:340,textAlign:"center"}}>
          <div style={{fontSize:34,marginBottom:6}}>🔑</div>
          <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>Autorización aprobada</div>
          <div style={{fontSize:12.5,color:"var(--muted)",marginBottom:14}}>{verCodigo.accion} · {verCodigo.objeto}<br/>Solicitó: {verCodigo.quien}</div>
          <button onClick={()=>copiarCodigo(verCodigo.codigo)} style={{width:"100%",padding:"14px",border:"2px dashed var(--field)",borderRadius:12,background:"var(--paper)",fontFamily:"'Space Grotesk',sans-serif",fontSize:26,fontWeight:700,letterSpacing:"6px",color:"var(--field)",cursor:"pointer",marginBottom:10}}>{verCodigo.codigo}</button>
          <div style={{fontSize:11.5,color:"var(--muted)",marginBottom:14}}>Toca el código para copiarlo y pásaselo a {verCodigo.quien.split(" ")[0]}. Es de un solo uso, solo para esta operación. Con el sistema conectado, le llegará directo a su pantalla.</div>
          <button onClick={()=>setVerCodigo(null)} style={{width:"100%",padding:"12px",border:"none",borderRadius:10,background:"var(--field)",color:"#fff",fontSize:13.5,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>Listo</button>
        </div>
      </div>
    )}

    {/* Modal: denegar con motivo */}
    {denegar && (
      <div onClick={()=>setDenegar(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:80,padding:24}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"var(--card)",borderRadius:18,padding:"20px 18px",width:"100%",maxWidth:360}}>
          <div style={{fontSize:15,fontWeight:800,marginBottom:10}}>Denegar autorización</div>
          <div style={{fontSize:12.5,color:"var(--muted)",marginBottom:8}}>El motivo le llega al solicitante:</div>
          <input value={denegar.motivo} onChange={e=>setDenegar(x=>({...x,motivo:e.target.value}))}
            placeholder="Ej: se corrige de otra forma, no anulando"
            style={{width:"100%",boxSizing:"border-box",padding:"12px",border:"1px solid var(--line)",borderRadius:10,fontSize:13.5,fontFamily:"inherit",marginBottom:12,outline:"none"}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <button onClick={()=>setDenegar(null)} style={{padding:"12px",border:"1px solid var(--line)",borderRadius:10,background:"var(--card)",fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>Cancelar</button>
            <button onClick={confirmarDenegar} style={{padding:"12px",border:"none",borderRadius:10,background:"#B5613C",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}>Denegar</button>
          </div>
        </div>
      </div>
    )}
  </>);
}

function App({usuario, onSalir}){
  const [tab,setTab]=useState("inicio");
  const [menuAbierto,setMenuAbierto]=useState(false); // menú lateral (drawer)
  const [secMenu,setSecMenu]=useState("gestion"); // sección abierta del menú (acordeón, una a la vez)
  const [confirmarSalir,setConfirmarSalir]=useState(false);
  useModal(confirmarSalir, React.useCallback(()=>setConfirmarSalir(false),[])); // confirmación de cierre de sesión
  const [tema,setTema]=useState(()=>{ try{ return localStorage.getItem("fl_tema")||"campo"; }catch(e){ return "campo"; } });
  const [oscuro,setOscuro]=useState(false);
  const [fontGrande,setFontGrande]=useState(false);
  const [pedidos,setPedidos]=useState(PEDIDOS_INI); // lista viva de pedidos (Mis pedidos)
  const badgeSolicitudes=SOLICITUDES_INI.filter(s=>s.estado==="pendiente").length; // pendientes por aprobar
  const [toast,setToast]=useState(null);
  const [prodInicial,setProdInicial]=useState(null); // presentación precargada desde Productos
  const [cobroInicial,setCobroInicial]=useState(null); // cliente precargado desde Cartera → Cobrar
  const [cliInicial,setCliInicial]=useState(null); // cliente precargado desde Ficha de cliente → Nuevo pedido
  const [carteraCliente,setCarteraCliente]=useState(null);
  const [cliFicha,setCliFicha]=useState(null); // abrir ficha de cliente desde el buscador global // cliente para filtrar Cartera desde su ficha
  const [pendientes,setPendientes]=useState(PENDIENTES_SYNC);
  const [verSync,setVerSync]=useState(false);
  useModal(verSync, React.useCallback(()=>setVerSync(false),[]));
  const [verAyuda,setVerAyuda]=useState(false);   // sección "Cómo funciona" de la campanilla
  const [online,setOnline]=useState(typeof navigator!=="undefined" ? navigator.onLine!==false : true);
  const [sincronizando,setSincronizando]=useState(false);
  const show=m=>{setToast(m);setTimeout(()=>setToast(null),2600);};
  const sincronizar=(auto)=>{
    if(pendientes.length===0){ if(!auto) show("No hay nada pendiente. Estás al día."); return; }
    const n=pendientes.length;
    setSincronizando(true);
    setTimeout(()=>{
      setPendientes([]); setSincronizando(false); setVerSync(false);
      show(auto ? `Conexión recuperada: ${n} registro${n!==1?"s":""} sincronizado${n!==1?"s":""} ✓`
                : "Todo sincronizado con el sistema.");
    },1400);
  };
  /* Arrastrar hacia abajo = refrescar la app SIN recargar la página (no saca al usuario del sistema) */
  const [ptr,setPtr]=useState(0);            // desplazamiento del gesto (px)
  const [refrescando,setRefrescando]=useState(false);
  const tocRef=React.useRef(null);
  const refrescar=()=>{
    setRefrescando(true);
    const c=correrCorteAutomatico();                       // aplica el corte si pasó la hora
    if(navigator.onLine!==false && pendientes.length>0) sincronizar(true);   // sube lo pendiente
    setTimeout(()=>{
      setRefrescando(false); setPtr(0); setTick(t=>t+1);   // refresca contadores y vistas
      show(c.length ? `Actualizado ✓ · corte automático: ${c.join(", ")}` : "Actualizado ✓");
    }, 900);
  };
  React.useEffect(()=>{
    const inicio=(e)=>{ if(window.scrollY<=0 && e.touches.length===1) tocRef.current=e.touches[0].clientY; else tocRef.current=null; };
    const mover=(e)=>{
      if(tocRef.current==null || refrescando) return;
      const d=e.touches[0].clientY-tocRef.current;
      if(d>0 && window.scrollY<=0){ setPtr(Math.min(90, d*0.55)); }
    };
    const soltar=()=>{
      if(tocRef.current==null) return;
      tocRef.current=null;
      setPtr(p=>{ if(p>=60 && !refrescando){ refrescar(); return 60; } return 0; });
    };
    window.addEventListener("touchstart",inicio,{passive:true});
    window.addEventListener("touchmove",mover,{passive:true});
    window.addEventListener("touchend",soltar,{passive:true});
    return ()=>{ window.removeEventListener("touchstart",inicio); window.removeEventListener("touchmove",mover); window.removeEventListener("touchend",soltar); };
  });

  /* Al recuperar la conexión, lo pendiente se sube SOLO (sin que nadie toque nada) */
  const syncRef=React.useRef(null); syncRef.current=sincronizar;
  React.useEffect(()=>{
    const subir=()=>{ setOnline(true); syncRef.current && syncRef.current(true); };
    const caer =()=>{ setOnline(false); };
    window.addEventListener("online",subir);
    window.addEventListener("offline",caer);
    return ()=>{ window.removeEventListener("online",subir); window.removeEventListener("offline",caer); };
  },[]);
  const vender=(pres)=>{setProdInicial(pres);navegar("pedido");};
  const [hist,setHist]=useState([]);
  const backHandlerRef = React.useRef(null); // retroceso interno del módulo activo (modelo: Clientes)
  const navegar=(t)=>{ if(t===tab) return; setHist(h=>[...h,tab]); setTab(t); };
  const [escuchando,setEscuchando]=useState(false);
  /* navegación por voz: mapa de sinónimos hablados → módulo */
  const VOZ_MODULOS=[
    {tab:"inicio",       claves:["inicio","principal","casa","menu"]},
    {tab:"pedido",       claves:["tomar pedido","nuevo pedido","hacer pedido","tomar un pedido","pedido nuevo"]},
    {tab:"pedidos",      claves:["mis pedidos","pedidos","lista de pedidos"]},
    {tab:"cobros",       claves:["cobros","cobrar","cobranza"]},
    {tab:"cartera",      claves:["cartera","cuentas por cobrar","por cobrar"]},
    {tab:"clientes",     claves:["clientes","cliente"]},
    {tab:"agenda",       claves:["agenda","calendario","visitas"]},
    {tab:"stock",        claves:["stock","registrar stock","bodega","inventario"]},
    {tab:"solicitudes",  claves:["solicitudes","autorizaciones","permisos"]},
    {tab:"novedades",    claves:["novedades","avisos","noticias"]},
    {tab:"productos",    claves:["productos","catalogo","catálogo"]},
    {tab:"equipo",       claves:["equipo","mi equipo","vendedores"]},
    {tab:"cuenta",       claves:["cuenta","mi cuenta","perfil"]},
    {tab:"ajustes",      claves:["ajustes","configuracion","configuración","opciones"]},
  ];
  const navegarPorVoz=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ show("Tu teléfono no permite navegación por voz."); return; }
    const r=new SR(); r.lang="es-EC"; r.interimResults=false; r.maxAlternatives=1;
    setEscuchando(true);
    r.onerror=()=>{ setEscuchando(false); show("No te escuché bien, intenta de nuevo."); };
    r.onend=()=>setEscuchando(false);
    r.onresult=e=>{
      setEscuchando(false);
      const dicho=(e.results[0][0].transcript||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
      // buscar el módulo cuyo alias esté contenido en lo dicho (los más largos primero)
      let destino=null, mejor=0;
      VOZ_MODULOS.forEach(m=>m.claves.forEach(c=>{
        const cc=c.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
        if(dicho.includes(cc) && cc.length>mejor){ destino=m.tab; mejor=cc.length; }
      }));
      if(destino){ if(destino==="inicio") irInicio(); else navegar(destino); show("Abriendo "+destino); }
      else show(`No reconocí "${dicho}". Prueba: "cobros", "mis pedidos", "clientes"…`);
    };
    r.start();
  };
  const atras=()=>{
    if(cerrarUltimoModal()) return;      // primero cierra modales abiertos
    if(retrocederEnModulo()) return;      // luego pregunta a los módulos montados
    setHist(h=>{ if(h.length===0){ setTab("inicio"); return h; } setTab(h[h.length-1]); return h.slice(0,-1); });
  };
  /* Botón físico "atrás" del celular = mismo retroceso inteligente. En el inicio: doble toque para salir */
  const atrasRef=React.useRef(null);
  const tabRef=React.useRef("inicio");
  const histRef=React.useRef([]);
  const salirRef=React.useRef(0);
  atrasRef.current=atras; tabRef.current=tab; histRef.current=hist;
  React.useEffect(()=>{
    /* Blindaje del botón físico de Android.
       Chrome limita cuántos pushState acepta seguidos (los rechaza en silencio),
       por eso los ponemos ESPACIADOS en el tiempo y mantenemos un contador propio
       de cuántos colchones creemos tener. */
    const MARCA={fl:1};
    let colchones=0;
    const poner=()=>{ try{ history.pushState(MARCA,""); colchones++; }catch(e){} };
    try{ history.replaceState(MARCA,""); }catch(e){}
    poner();                                   // el primero, inmediato
    /* los siguientes, espaciados cada 120 ms hasta tener 12 */
    const sembrar=setInterval(()=>{ if(colchones>=12){ clearInterval(sembrar); return; } poner(); },120);

    const onPop=()=>{
      colchones=Math.max(0,colchones-1);
      /* repone uno de inmediato y otro diferido (dos oportunidades) */
      poner();
      setTimeout(poner,60);
      /* 0) modal abierto */
      if(cerrarUltimoModal()) return;
      /* 1) algún módulo tiene algo abierto */
      if(retrocederEnModulo()) return;
      /* 2) hay módulos anteriores */
      if(histRef.current.length>0){
        setHist(h=>{ if(h.length===0){ setTab("inicio"); return h; } setTab(h[h.length-1]); return h.slice(0,-1); });
        return;
      }
      /* 3) estamos en un módulo sin historial: al inicio, NUNCA salir */
      if(tabRef.current!=="inicio"){ setTab("inicio"); setHist([]); return; }
      /* 4) raíz del inicio: avisamos que el siguiente atrás cierra la app */
      show("Presiona atrás de nuevo para salir");
    };
    window.addEventListener("popstate",onPop);
    /* vigilante: mantiene el colchón por encima de 8, de a uno para no ser rechazado */
    const vigilante=setInterval(()=>{ if(colchones<8) poner(); },300);
    const onVis=()=>{ if(document.visibilityState==="visible" && colchones<8) poner(); };
    document.addEventListener("visibilitychange",onVis);
    return ()=>{
      window.removeEventListener("popstate",onPop);
      document.removeEventListener("visibilitychange",onVis);
      clearInterval(vigilante); clearInterval(sembrar);
    };
  },[]);
  const irInicio=()=>{ setHist([]); setTab("inicio"); };
  const subPantallas={cobros:"Cobros",stock:"Registrar stock",cartera:"Cartera",clientes:"Clientes",productos:"Productos"};
  const enSub = tab in subPantallas;

  const HOY="2026-06-13";
  const badgeNovedades = NOVEDADES_INI.filter(n=>n.estado==="aprobada"||n.estado==="rechazada").length; // respuestas del proveedor
  const badgePedidos = pedidos.filter(p=>p.sync==="pend").length;                                    // pendientes de enviar
  const badgeEntregados = pedidos.filter(p=>p.estado==="Entregado").length;                          // entregados (para el panel del Inicio)
  const badgePedidosTotal = badgePedidos;                                                            // la barra solo refleja lo que sí se lista (en proceso)
  const [verDetalle,setVerDetalle]=useState(null);
  useModal(verDetalle, React.useCallback(()=>setVerDetalle(null),[])); // "novedades" | "pedidos" | "agenda" | "cuenta"
  const ultClic=React.useRef({tab:null,t:0});
  const tocarTab=(t)=>{
    const ahora=Date.now();
    if(ultClic.current.tab===t && ahora-ultClic.current.t<400){ setVerDetalle(t); ultClic.current={tab:null,t:0}; return; }
    ultClic.current={tab:t,t:ahora};
    navegar(t);
  };
  const badgeAgenda = 2;   // tareas pendientes de hoy (ejemplo del prototipo)
  const badgeComision = 1; // comisiones recién liberadas (ejemplo del prototipo)
  const badgeEquipo = SOLICITUDES_INI.filter(s=>s.estado==="pendiente").length; // solicitudes por aprobar

  // ═══ NOTIFICACIONES · Nivel 1 — tareas del rol Freelance, ajustables en Ajustes → Notificaciones ═══
  const [prefsNotif,setPrefsNotif]=useState({autorizaciones:true, solicitudes:true, cartera:true, cheques:true, novedades:true});
  const [verNotifs,setVerNotifs]=useState(false);
  const TAREAS_NOTIF=[
    {tipo:"autorizaciones", icono:"🔐", titulo:"Autorizaciones esperan tu código", detalle:"Anulaciones y cambios que piden tu visto bueno", destino:"autorizaciones", n:AUTORIZACIONES_INI.filter(a=>a.estado==="pendiente").length},
    {tipo:"solicitudes", icono:"🙋", titulo:"Solicitudes del equipo por resolver", detalle:"Precios especiales, crédito y permisos", destino:"equipo", n:SOLICITUDES_INI.filter(x=>x.estado==="pendiente").length},
    {tipo:"cartera", icono:"⏰", titulo:"Facturas vencidas por gestionar", detalle:"Cobros que ya pasaron su fecha", destino:"cartera", n:CARTERA_INI.filter(f=>f.dias>0).length},
    {tipo:"cheques", icono:"🧾", titulo:"Cheques en custodia por revisar", detalle:"Devueltos o próximos a depositar", destino:"cartera", n:CHEQUES_DEVUELTOS.length},
    {tipo:"novedades", icono:"📦", titulo:"Novedades abiertas", detalle:"Cambios y devoluciones en revisión", destino:"novedades", n:NOVEDADES_INI.filter(x=>x.estado==="revision").length},
  ];
  const tareasActivas=TAREAS_NOTIF.filter(t=>prefsNotif[t.tipo] && t.n>0);
  const totalNotifs=tareasActivas.reduce((a,t)=>a+t.n,0);

  const guardarPedido=({cli, prov, carrito})=>{
    const ahora=new Date();
    const dd=String(ahora.getDate()).padStart(2,"0");
    const meses=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
    const fechaCorta=`${dd} ${meses[ahora.getMonth()]} · ${String(ahora.getHours()).padStart(2,"0")}:${String(ahora.getMinutes()).padStart(2,"0")}`;
    const fechaISO=`${ahora.getFullYear()}-${String(ahora.getMonth()+1).padStart(2,"0")}-${dd}`;
    const quien=usuario?.nombre || "Freelance";
    const nuevos=carrito.map((it,i)=>{
      const credito = it.tipoNombre && /créd/i.test(it.tipoNombre);
      return {
        id:Date.now()+i,
        cli, prov: prov?prov.nombre:"—", fecha:fechaISO,
        prod:it.prodNombre, cant:it.cant, precio:it.precio,
        cond: credito?"Crédito":"Contado",
        comision: it.requiere?0:it.comisionTotal,
        estado: it.requiere?"Esperando aprobación":"Enviado al proveedor",
        etapa: it.requiere?1:2,
        sync:"pend",
        linea:[
          {t:"Pedido ingresado", f:fechaCorta, st:"ok", d:`Tomado por ${quien}`},
          {t:"Acuerdo de comisión", f:fechaCorta, st:"ok", d: it.requiere?"Comisión propuesta · por confirmar":"Comisión "+money(it.comisionTotal)},
          {t:"Aprobación del freelance", f: it.requiere?"En espera":fechaCorta, st: it.requiere?"now":"ok", d: it.requiere?"Pendiente de aprobar el acuerdo":"Aprobado"},
          {t:"Aprobación de crédito", f: credito?"En espera":"No aplica", st: credito?"wait":"ok", d: credito?"Cupo del cliente por validar":"Venta de contado"},
          {t:"Enviado al proveedor", f: it.requiere?"—":fechaCorta, st: it.requiere?"wait":"now", d: it.requiere?"":"Esperando aceptación y fecha de despacho"},
          {t:"Facturado", f:"—", st:"wait", d:""},
          {t:"Despachado", f:"—", st:"wait", d:""},
          {t:"Entregado", f:"—", st:"wait", d:""},
          {t:"Cobrado y validado", f:"—", st:"wait", d:""},
          {t:"Comisión liberada", f:"—", st:"wait", d:""},
        ],
      };
    });
    setPedidos(prev=>[...nuevos, ...prev]); // los nuevos arriba
    setPendientes(prev=>[
      ...nuevos.map(n=>({tipo:"Pedido", ic:"📋", cli:n.cli, detalle:`${n.cant} × ${n.prod}`, cuando:fechaCorta})),
      ...prev
    ]);
  };

  return (
    <div className="shell">
      <div className="top">
        {tab==="inicio" ? (
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button className="ham" onClick={()=>setMenuAbierto(true)} aria-label="Abrir menú">☰</button>
            <div><div className="who">Freelance</div><div className="name">{usuario?.nombre || "Daniel Ríos"}</div></div>
          </div>
        ) : (
          <div className="top-nav">
            <button className="topbtn" onClick={atras}><span style={{fontSize:18}}>‹</span> Atrás</button>
            <button className="topbtn" onClick={irInicio}><span style={{fontSize:15}}>⌂</span> Inicio</button>
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:"auto"}}>
          <span style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,.55)",padding:"5px 9px",
            background:"rgba(255,255,255,.10)",borderRadius:20,letterSpacing:".02em"}}>v{VERSION.n}</span>
          <Net n={pendientes.length} online={online} sincronizando={sincronizando} onClick={()=>setVerSync(true)}/>
        </div>
      </div>
      <div className="body">
        {tab==="inicio" && <Inicio go={navegar}
          irCliente={(c)=>{ setCliFicha(c); navegar("clientes"); }}
          irProducto={(p)=>{ setProdInicial(p); navegar("pedido"); }}
          irFactura={(f)=>{ setCarteraCliente(f.cli); navegar("cartera"); }}/>}
        {tab==="pedido" && <Pedido toast={show} prodInicial={prodInicial} onConsumir={()=>setProdInicial(null)}
          cliInicial={cliInicial} onConsumirCli={()=>setCliInicial(null)}
          onCobrar={(fac)=>{ setCobroInicial(fac); navegar("cobros"); }}
          onGuardarPedido={(data)=>{ guardarPedido(data); navegar("pedidos"); }}/>}
        {tab==="pedidos" && <Pedidos pedidos={pedidos} toast={show}/>}
        {tab==="cobros" && <Cobros toast={show} go={navegar} cobroInicial={cobroInicial} onConsumir={()=>setCobroInicial(null)}/>}
        {tab==="cuenta" && <Cuenta usuario={usuario} onSalir={onSalir}/>}
        {tab==="equipo" && <Equipo toast={show}/>}
        {tab==="solicitudes" && <Solicitudes toast={show} verCliente={(c)=>{ setCliFicha(c); navegar("clientes"); }}/>}
        {tab==="autorizaciones" && <Autorizaciones toast={show} usuario={usuario}/>}
        {tab==="ruta" && <Ruta toast={show}/>}
        {tab==="agenda" && <Agenda toast={show} verCliente={(c)=>{ setCliFicha(c); navegar("clientes"); }}/>}
        {tab==="stock" && <Stock toast={show}/>}
        {tab==="cartera" && <Cartera toast={show} clienteIni={carteraCliente} onClienteConsumido={()=>setCarteraCliente(null)} onCobrar={(fac)=>{ setCobroInicial(fac); navegar("cobros"); }}/>}
        {tab==="clientes" && <Clientes toast={show} cliIni={cliFicha} onCliConsumido={()=>setCliFicha(null)} nuevoPedido={(c)=>{setCliInicial(c);navegar("pedido");}} verCartera={(c)=>{setCarteraCliente(c);navegar("cartera");}}/>}
        {tab==="potenciales" && <Potenciales toast={show}/>}
        {tab==="proveedores" && <Proveedores toast={show}/>}
        {tab==="documentos" && <Documentos toast={show} usuario={usuario}/>}
        {/* ═══ Campana de notificaciones (flotante, visible en toda la app) ═══ */}
        <button onClick={()=>setVerNotifs(true)} aria-label="Notificaciones"
          style={{position:"fixed", top:"calc(env(safe-area-inset-top, 0px) + 58px)", right:12, zIndex:1200, width:42, height:42, borderRadius:21, background:"var(--card)", border:"1px solid #E2E8E2", boxShadow:"0 4px 14px rgba(0,0,0,.18)", fontSize:17, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center"}}>
          🔔{totalNotifs>0 && <span style={{position:"absolute", top:-4, right:-4, minWidth:18, height:18, borderRadius:9, background:"#C0392B", color:"#fff", fontSize:10.5, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", padding:"0 4px"}}>{totalNotifs}</span>}
        </button>
        {verNotifs && (
          <div onClick={()=>setVerNotifs(false)} style={{position:"fixed", inset:0, background:"rgba(10,20,15,.45)", zIndex:1300, display:"flex", alignItems:"flex-start", justifyContent:"flex-end", padding:"calc(env(safe-area-inset-top,0px) + 104px) 12px 0"}}>
            <div onClick={e=>e.stopPropagation()} style={{width:"min(340px,92vw)", maxHeight:"70vh", overflowY:"auto", background:"var(--card)", borderRadius:16, boxShadow:"0 18px 50px rgba(0,0,0,.3)"}}>
              <div style={{padding:"14px 16px 10px", borderBottom:"1px solid #EEF2EE", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                <strong style={{fontFamily:SERIF, fontSize:16, color:CL.tinta}}>🔔 Tus tareas de hoy</strong>
                <button onClick={()=>{setVerNotifs(false); navegar("ajustes");}} title="Ajustar cuáles llegan"
                  style={{background:"none", border:"none", fontSize:16, cursor:"pointer", padding:6}}>⚙</button>
              </div>
              {tareasActivas.length===0 && <p style={{fontFamily:BODY, fontSize:13, color:CL.grisTexto, padding:"18px 16px", margin:0}}>Todo al día ✨ Nada espera tu acción.</p>}
              {tareasActivas.map(t=>(
                <button key={t.tipo} onClick={()=>{setVerNotifs(false); navegar(t.destino);}}
                  style={{display:"flex", gap:12, alignItems:"center", width:"100%", textAlign:"left", background:"none", border:"none", borderBottom:"1px solid #F3F6F3", padding:"12px 16px", cursor:"pointer"}}>
                  <span style={{fontSize:20}}>{t.icono}</span>
                  <span style={{flex:1, minWidth:0}}>
                    <span style={{display:"block", fontFamily:BODY, fontSize:13.5, fontWeight:700, color:CL.tinta}}>{t.titulo}</span>

<script>
/* ═ Nivel 2 de notificaciones + aviso de versión nueva ═
   El service worker se registra SOLO en HTTPS (GitHub Pages).
   Si detecta una versión más nueva publicada, muestra una barra "Actualizar"
   para que el usuario cargue lo último con un toque (sin borrar caché a mano). ═ */
if ("serviceWorker" in navigator && location.protocol === "https:") {
  var mostrarAvisoActualizar = function(reg){
    if (document.getElementById("aviso-actualizar")) return;
    var barra = document.createElement("div");
    barra.id = "aviso-actualizar";
    barra.style.cssText = "position:fixed;left:12px;right:12px;bottom:78px;z-index:99999;"+
      "background:#1E3A2B;color:#EAF0EA;border-radius:14px;padding:12px 14px;"+
      "display:flex;align-items:center;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,.28);"+
      "font-family:inherit;font-size:13.5px";
    barra.innerHTML =
      '<span style="flex:1;line-height:1.3">Hay una versión nueva disponible.</span>'+
      '<button id="btn-actualizar" style="flex-shrink:0;background:#E9C46A;color:#1E3A2B;'+
      'border:none;border-radius:10px;padding:8px 16px;font-weight:800;font-size:13px;'+
      'font-family:inherit;cursor:pointer">Actualizar</button>';
    document.body.appendChild(barra);
    document.getElementById("btn-actualizar").onclick = function(){
      var esperando = reg.waiting;
      if (esperando) { esperando.postMessage({ tipo: "activar-ya" }); }
      /* recargamos con un pequeño retardo para dar tiempo al service worker nuevo */
      setTimeout(function(){ location.reload(); }, 350);
    };
  };
  navigator.serviceWorker.register("./sw.js").then(function(reg){
    /* si ya hay uno esperando al cargar, avisa */
    if (reg.waiting && navigator.serviceWorker.controller) mostrarAvisoActualizar(reg);
    /* cuando aparece uno nuevo y termina de instalarse, avisa */
    reg.addEventListener("updatefound", function(){
      var nuevo = reg.installing;
      if (!nuevo) return;
      nuevo.addEventListener("statechange", function(){
        if (nuevo.state === "installed" && navigator.serviceWorker.controller) {
          mostrarAvisoActualizar(reg);
        }
      });
    });
    /* revisa si hay versión nueva cada vez que se abre la app y al volver a primer plano */
    reg.update();
    document.addEventListener("visibilitychange", function(){
      if (document.visibilityState === "visible") reg.update();
    });
  }).catch(function(){ /* sin permiso o sin red: la app sigue normal */ });

  /* cuando el service worker nuevo toma el control, recarga una sola vez */
  var recargado = false;
  /* NO recargamos solos al cambiar el service worker: eso puede entrar en bucle
     y dejar la app cargando para siempre. El usuario decide con el botón "Actualizar". */
}
</script>
