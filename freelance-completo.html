    const hechasCiudad=grupo.filter(p=>hechas[p.cli]).length;
    const visibles=grupo.filter(p=>verVisitados || !hechas[p.cli]);
    if(visibles.length===0) return null;
    return (
      <div className="ruta-ciudad" key={ck}>
        <div className="rc-cab">
          <span>📍 {ck}</span>
          <span className="rc-meta">{hechasCiudad}/{grupo.length} · {money(cobroCiudad)}</span>
        </div>
        {visibles.map((p,i)=>{
          const hecha=!!hechas[p.cli];
          const tv=telVend(p.vendedor);
          const abierta=expandida===p.cli;
          return (
            <div className={"rcli"+(hecha?" rcli-hecha":"")+(abierta?" rcli-open":"")} key={p.cli}>
              
              <div className="rcli-linea">
                <div className="rcli-orden">
                  <button className="rcli-mv" onClick={()=>moverCliente(p.cli,-1)}>▲</button>
                  <span className="ruta-num">{numGlobal(p.cli)}</span>
                  <button className="rcli-mv" onClick={()=>moverCliente(p.cli,1)}>▼</button>
                </div>
                <button className="rcli-head" onClick={()=>setExpandida(abierta?null:p.cli)}>
                  <div style={{flex:1,minWidth:0}}>
                    <span className="rcli-nom-c">{p.cli}{p.prospecto&&<span className="rsel-prosp">prospecto</span>}</span>
                    <span className="rcli-sub">
                      {horaParada(ruta,numGlobal(p.cli)-1) && <span className="rcli-hora">🕐 {horaParada(ruta,numGlobal(p.cli)-1)}</span>}
                      {distDe(p)!=null && <span className="rcli-dist">· {distDe(p)<1?Math.round(distDe(p)*1000)+" m":distDe(p).toFixed(1)+" km"}</span>}
                    </span>
                  </div>
                  {p.cobro>0 && <span className="rcli-monto num">{money(p.cobro)}</span>}

                <button className={"ruta-chk"+(hecha?" on":"")} onClick={()=>toggleHecha(p.cli)}>{hecha?"✓":""}</button>
              </div>

              {abierta && (
                <div className="rcli-detalle">
                  <div className="rcli-dir">📍 {p.dir||p.ciudad}</div>
                  <div className="rcli-tags">
                    {p.cobro>0 && <span className="ruta-tag cobro">💰 Cobrar {money(p.cobro)}{p.vencido>0?` · ${money(p.vencido)} vencido`:""}</span>}
                    <span className="ruta-tag pedido">🛒 {p.motivo}</span>
                  </div>

                  {p.tel && (
                    <div className="rcli-cliente">
                      <span className="rcli-cli-num">📞 {p.tel}</span>
                      <div className="rcli-cli-btns">
                        <a className="rc-call" href={"tel:"+p.tel}>Llamar</a>
                        <a className="rc-wa" href={waUrl(p.tel)} target="_blank" rel="noreferrer">WhatsApp</a>
                      </div>
                    </div>

                  <div className="rcli-vend">
                    <span>👤 {p.vendedor}</span>
                    {tv && (<span className="rcli-vend-acc">
                      <a href={"tel:"+tv}>📞</a><a href={waUrl(tv)} target="_blank" rel="noreferrer">💬</a>
                    </span>)}
                  </div>

                  <div className="rcli-acciones">
                    <a className="rcli-maps" href={mapsUrl(p)} target="_blank" rel="noreferrer">📍 Maps</a>
                    <label className="rcli-adj">📷 Foto
                      <input type="file" accept="image/*" capture="environment" style={{display:"none"}}
                        onChange={e=>{const f=e.target.files[0]; if(f) addMedio(p.cli,"foto",f); e.target.value="";}}/>
                    </label>
                    <label className="rcli-adj">🎤 Audio
                      <input type="file" accept="audio/*" capture style={{display:"none"}}
                        onChange={e=>{const f=e.target.files[0]; if(f) addMedio(p.cli,"audio",f); e.target.value="";}}/>
                    </label>
                  </div>

                  {(medios[p.cli]||[]).length>0 && (
                    <div className="rcli-medios">
                      {(medios[p.cli]||[]).map((m,k)=>(
                        m.tipo==="foto"

                          : <audio key={k} className="rcli-audio" controls src={m.url}/>

                  )}

                  <textarea className="rcli-nota" value={notas[p.cli]||""} onChange={e=>setNota(p.cli,e.target.value)}

                </div>
              )}

          );
        })}
      </div>
    );
  });
}

function GraficoBarras({datos}){
  const W=300, H=150, padX=14, padTop=18, padBot=26;
  const max=Math.max(...datos.map(d=>d.v),1);
  const innerW=W-padX*2, innerH=H-padTop-padBot;
  const n=datos.length, gap=12;
  const bw=(innerW-gap*(n-1))/n;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:"block"}}>
      {[0.5,1].map((f,i)=>{
        const y=padTop+innerH*(1-f);
        return <line key={i} x1={padX} y1={y} x2={W-padX} y2={y} stroke="#E4DDD0" strokeWidth="1"/>;
      })}
      {datos.map((d,i)=>{
        const h=Math.max(2,Math.round(innerH*(d.v/max)));
        const x=padX+i*(bw+gap), y=padTop+innerH-h;
        const ultima=i===datos.length-1;
        return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={h} rx="4" fill={ultima?"#2E7D52":"#A9C7B0"}/>
            <text x={x+bw/2} y={y-5} textAnchor="middle" fontSize="9" fill="#15392B" fontFamily="'Space Grotesk',sans-serif">${d.v}</text>
            <text x={x+bw/2} y={H-9} textAnchor="middle" fontSize="10" fill="#8A8270">{d.m}</text>
          </g>
        );
      })}
    </svg>
  );
}
function GraficoDona({cobrado, porCobrar}){
  const total=cobrado+porCobrar;
  const pct=total>0?cobrado/total:0;
  const R=46, sw=18, C=2*Math.PI*R, cx=70, cy=70;
  const off=C*(1-pct);
  return (
    <div style={{display:"flex",alignItems:"center",gap:16}}>
      <svg viewBox="0 0 140 140" width="120" height="120" style={{flexShrink:0}}>
        <circle cx={cx} cy={cy} r={R} fill="none" stroke="#EDE3D4" strokeWidth={sw}/>
        <circle cx={cx} cy={cy} r={R} fill="none" stroke="#2E7D52" strokeWidth={sw} strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={off} transform="rotate(-90 70 70)"/>
        <text x="70" y="66" textAnchor="middle" fontSize="26" fontWeight="700" fill="#15392B" fontFamily="'Space Grotesk',sans-serif">{Math.round(pct*100)}%</text>
        <text x="70" y="84" textAnchor="middle" fontSize="11" fill="#8A8270">cobrado</text>
      </svg>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>

          <div><div className="meta">Cobrado</div><div className="num" style={{fontSize:15,fontWeight:700,color:"#15392B"}}>{money(cobrado)}</div></div>

  );
}

function Solicitudes({toast, verCliente}){
  const [sols,setSols]=useState(SOLICITUDES_INI);
  const [mias,setMias]=useState(MIS_SOLICITUDES_INI);
  const [pestana,setPestana]=useState("aprobar");   // aprobar | mias
  const [sel,setSel]=useState(null);                // solicitud abierta (detalle)
  const [accion,setAccion]=useState(null);          // aprobar | rechazar | correccion | comentar
  const [motivo,setMotivo]=useState("");
  const [q,setQ]=useState("");
  const [verFiltros,setVerFiltros]=useState(false);
  const [fTipo,setFTipo]=useState("Todos");
  const [fEstado,setFEstado]=useState("Todos");
  const [crear,setCrear]=useState(false);
  /* formulario de nueva solicitud */
  const [nTipo,setNTipo]=useState("posfechar");
  const [nCli,setNCli]=useState("");
  const [nDetalle,setNDetalle]=useState("");
  const [nMotivo,setNMotivo]=useState("");
  const [nBorrador,setNBorrador]=useState(null);    // id del borrador que se está editando (null = nuevo)
  const [borrAEliminar,setBorrAEliminar]=useState(null);  // borrador en confirmación de eliminar
  const [avisoDup,setAvisoDup]=useState(null);            // solicitud activa detectada como duplicado

  useModal(!!sel, React.useCallback(()=>setSel(null),[]));
  useModal(!!accion, React.useCallback(()=>setAccion(null),[]));
  useModal(crear, React.useCallback(()=>setCrear(false),[]));
  useModal(verFiltros, React.useCallback(()=>setVerFiltros(false),[]));
  useModal(!!borrAEliminar, React.useCallback(()=>setBorrAEliminar(null),[]));
  useModal(!!avisoDup, React.useCallback(()=>setAvisoDup(null),[]));
  useRetroceso(()=>{
    if(avisoDup){ setAvisoDup(null); return true; }
    if(borrAEliminar){ setBorrAEliminar(null); return true; }
    if(accion){ setAccion(null); return true; }
    if(sel){ setSel(null); return true; }
    if(crear){ setCrear(false); setNBorrador(null); setNCli(""); setNDetalle(""); setNMotivo(""); setNTipo("posfechar"); return true; }
    if(verFiltros){ setVerFiltros(false); return true; }
    return false;
  });

  const tipoDe=k=>TIPO_SOL[k]||TIPO_SOL.otro;
  const estDe=k=>ESTADO_SOL[k]||ESTADO_SOL.pendiente;
  const au=()=>"AU-260718-"+Math.floor(1000+Math.random()*9000);

  /* ── borradores ── */
  const limpiarForm=()=>{ setNBorrador(null); setNCli(""); setNDetalle(""); setNMotivo(""); setNTipo("posfechar"); };
  const cerrarCrear=()=>{ setCrear(false); limpiarForm(); };
  const abrirNueva=()=>{ limpiarForm(); setCrear(true); };
  const abrirBorrador=(s)=>{
    setNBorrador(s.id);
    setNTipo(s.tipo||"posfechar");
    setNCli(s.cli||"");
    setNDetalle(s.detalle||"");
    setNMotivo((s.d&&s.d.motivo)||"");
    setCrear(true);
  };
  /* hay algo escrito que valga la pena guardar */
  const hayContenido = !!nCli || !!nDetalle.trim() || !!nMotivo;
  const guardarBorrador=()=>{
    if(!hayContenido){ toast("Escribe algo antes de guardar el borrador"); return; }
    const datos={tipo:nTipo, cli:nCli||"Sin cliente", detalle:nDetalle||"Sin detalle",
      estado:"borrador", prioridad:"normal", d:{motivo:nMotivo}, proveedor:"Agrícola del Valle",
      nivel:"Aprueba: Proveedor"};
    if(nBorrador){
      setMias(arr=>arr.map(s=>s.id===nBorrador?{...s,...datos,fecha:"ahora"}:s));
      toast("Borrador actualizado");
    }else{
      const id=Math.max(100,...mias.map(s=>s.id))+1;
      const num="BOR-"+String(1+mias.filter(s=>s.estado==="borrador").length).padStart(6,"0");
      setMias([{id, num, ...datos, fecha:"ahora", comentarios:[]}, ...mias]);
      toast("Guardado en borradores");
    }
    cerrarCrear();
  };
  const eliminarBorrador=(s)=>{
    setMias(arr=>arr.filter(x=>x.id!==s.id));
    setBorrAEliminar(null);
    toast("Borrador eliminado");
  };

  /* ── duplicados: misma solicitud viva para el mismo cliente y tipo ── */
  const ESTADOS_VIVOS=["enviada","pendiente","revision","correccion"];
  const duplicada = mias.find(s=>
    s.id!==nBorrador &&                       // el borrador que estoy enviando no se cuenta a sí mismo
    s.cli===nCli &&
    s.tipo===nTipo &&
    ESTADOS_VIVOS.includes(s.estado)
  ) || null;

  /* envío real de la solicitud (se usa directo o tras confirmar el duplicado) */
  const enviarSolicitud=()=>{
    const num="SOL-"+String(145+mias.filter(s=>s.estado!=="borrador").length).padStart(6,"0");
    const nuevaId=Math.max(100,...mias.map(s=>s.id))+1;
    const reg={id:nBorrador||nuevaId, num, tipo:nTipo, cli:nCli, proveedor:"Agrícola del Valle",
      detalle:nDetalle, fecha:"ahora", estado:"enviada", prioridad:"normal",
      d:{motivo:nMotivo}, nivel:"Aprueba: Proveedor", comentarios:[]};
    if(nBorrador) setMias(arr=>arr.map(s=>s.id===nBorrador?reg:s));
    else setMias(arr=>[reg,...arr]);
    setAvisoDup(null);
    cerrarCrear();
    toast(`Solicitud enviada al proveedor · auditado ${au()}`);
  };
  const norm=s=>String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const lista = pestana==="aprobar" ? sols : mias;

  const filtradas=lista.filter(s=>{
    if(fTipo!=="Todos" && s.tipo!==fTipo) return false;
    if(fEstado!=="Todos" && s.estado!==fEstado) return false;
    if(q.trim()){
      const t=norm(`${s.cli} ${s.num} ${s.sc||""} ${s.detalle} ${(s.d&&s.d.factura)||""} ${(s.d&&s.d.cheque)||""}`);
      if(!t.includes(norm(q))) return false;
    }
    return true;
  });

  /* indicadores */
  const cuenta=(e)=>lista.filter(s=>s.estado===e).length;
  const nPend=cuenta("pendiente")+cuenta("enviada");
  const nRev=cuenta("revision"), nApr=cuenta("aprobada"), nRech=cuenta("rechazada"), nCorr=cuenta("correccion");
  const nBorr=cuenta("borrador");
  const urgentes=lista.filter(s=>s.prioridad==="urgente").length;
  const vencidas=lista.filter(s=>s.prioridad==="vencida").length;

  /* acciones */
  const setEstado=(id,estado,extra)=>{
    const upd=(arr)=>arr.map(s=>s.id===id?{...s,estado,...(extra||{})}:s);
    if(pestana==="aprobar") setSols(upd); else setMias(upd);
  };
  const agregarComentario=(id,txt)=>{
    const c={de:"Daniel Ríos", txt, f:"ahora"};
    const upd=(arr)=>arr.map(s=>s.id===id?{...s,comentarios:[...(s.comentarios||[]),c]}:s);
    if(pestana==="aprobar") setSols(upd); else setMias(upd);
  };
  const confirmarAccion=()=>{
    const s=sel, a=accion;
    if(a==="aprobar"){
      setEstado(s.id,"aprobada");
      if(motivo.trim()) agregarComentario(s.id,motivo);
      toast(`${s.num} aprobada · auditado AU-260718-${Math.floor(1000+Math.random()*9000)}`);
    }
    if(a==="rechazar"){
      if(!motivo.trim()){ toast("El motivo del rechazo es obligatorio"); return; }
      setEstado(s.id,"rechazada");
      agregarComentario(s.id,"Rechazada: "+motivo);
      toast(`${s.num} rechazada · auditado AU-260718-${Math.floor(1000+Math.random()*9000)}`);
    }
    if(a==="correccion"){
      if(!motivo.trim()){ toast("Indica qué debe corregir"); return; }
      setEstado(s.id,"correccion");
      agregarComentario(s.id,"Corrección pedida: "+motivo);
      toast(`Corrección solicitada a ${s.sc||"el solicitante"}`);
    }
    if(a==="comentar"){
      if(!motivo.trim()){ toast("Escribe el comentario"); return; }
      agregarComentario(s.id,motivo);
      toast("Comentario enviado");
      setAccion(null); setMotivo("");
      setSel(sl=>sl?{...sl,comentarios:[...(sl.comentarios||[]),{de:"Daniel Ríos",txt:motivo,f:"ahora"}]}:sl);
      return;
    }
    setAccion(null); setSel(null); setMotivo("");
  };

  /* ── tarjeta compacta ── */
  const Tarjeta=({s})=>{
    const tp=tipoDe(s.tipo), es=estDe(s.estado);
    const alerta = s.prioridad==="urgente"||s.prioridad==="vencida";
    return (
      <div className="card" style={{padding:"11px 12px",marginBottom:8,
        borderLeft:`3px solid ${alerta?"#C2603A":tp.col}`}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
          <span style={{width:30,height:30,borderRadius:9,background:tp.bg,flexShrink:0,
            display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ico n={tp.ico} c={tp.col} s={16}/></span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <span className="meta" style={{fontSize:10,fontWeight:700,flexShrink:0}}>{s.num}</span>
              <span style={{flex:1,minWidth:0,fontSize:10.5,color:tp.col,fontWeight:700,overflow:"hidden",
                textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tp.t}</span>
              <span style={{flexShrink:0,fontSize:9.5,fontWeight:700,padding:"2px 7px",borderRadius:7,
                background:es.bg,color:es.col}}>{es.t}</span>
            </div>
            <div style={{fontSize:13.5,fontWeight:700,marginTop:2,overflow:"hidden",
              textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.cli}</div>
            <div className="meta" style={{fontSize:10.5,marginTop:2}}>
              {s.sc?`${s.sc} · `:""}{s.fecha}
              {alerta && <span style={{color:"#C2603A",fontWeight:700}}> · {s.prioridad==="urgente"?"urgente":"sin respuesta"}</span>}
            </div>
          </div>
        </div>
        {s.estado==="borrador" ? (
          <div style={{display:"flex",gap:8,marginTop:9}}>
            <button className="mini-cta" style={{flex:1,textAlign:"center"}}
              onClick={()=>abrirBorrador(s)}>Continuar</button>
            <button className="mini-cta" style={{flex:1,textAlign:"center",color:"#C2603A"}}
              onClick={()=>setBorrAEliminar(s)}>Eliminar</button>
          </div>
        ) : (
          <button className="mini-cta" style={{width:"100%",marginTop:9,textAlign:"center"}}
            onClick={()=>setSel(s)}>Revisar solicitud</button>
        )}
      </div>
    );
  };

  /* ── filas del detalle ── */
  const F=({k,v,destac,col})=>(
    <div style={{display:"flex",justifyContent:"space-between",gap:10,padding:"5px 0",
      borderBottom:"1px solid #F4F1E9"}}>
      <span className="meta" style={{fontSize:11.5,flexShrink:0}}>{k}</span>
      <span className="num" style={{fontSize:12.5,fontWeight:destac?800:600,textAlign:"right",
        color:col||"var(--ink)"}}>{v}</span>
    </div>
  );
  const Sec=({children})=>(
    <div style={{fontSize:10.5,fontWeight:800,color:"var(--field)",textTransform:"uppercase",
      letterSpacing:".04em",margin:"14px 0 5px"}}>{children}</div>
  );

  /* ── detalle según tipo ── */
  const Detalle=({s})=>{
    const d=s.d||{};
    if(s.tipo==="precio"){
      const dif=Math.round((d.pPedido-d.pVigente)*100)/100;
      const pct=d.pVigente?Math.round(dif/d.pVigente*1000)/10:0;
      const total=Math.round(d.pPedido*d.cant*100)/100;
      const margenAntes=Math.round((d.pVigente-d.costo)*100)/100;
      const margenDesp=Math.round((d.pPedido-d.costo)*100)/100;
      return (<>
        <Sec>Datos de la operación</Sec>
        <F k="Producto" v={d.producto}/>
        <F k="Cantidad" v={d.cant+" qq"}/>
        <F k="Precio vigente" v={money(d.pVigente)}/>
        <F k="Precio solicitado" v={money(d.pPedido)} destac/>
        <F k="Diferencia" v={`${money(dif)} (${pct}%)`} col="#C2603A" destac/>
        <F k="Total de la operación" v={money(total)} destac/>
        <Sec>Impacto</Sec>
        <F k="Costo" v={money(d.costo)}/>
        <F k="Margen antes" v={money(margenAntes)+"/qq"}/>
        <F k="Margen resultante" v={money(margenDesp)+"/qq"} destac col={margenDesp>0?"#2E7D52":"#C2603A"}/>
        <F k="Comisión antes" v={money(d.comAntes)+"/qq"}/>
        <F k="Comisión después" v={money(d.comDespues)+"/qq"} destac/>
        <F k="Último precio al cliente" v={`${money(d.ultimoPrecio)} · ${d.ultimaFecha}`}/>
        <F k="Vigencia solicitada" v={d.vigencia}/>
      </>);
    }
    if(s.tipo==="credito"){
      const exposicion=Math.round((d.carteraPend+d.cupoPedido-d.cupoActual)*100)/100;
      return (<>
        <Sec>Cupo</Sec>
        <F k="Cupo actual" v={money(d.cupoActual)}/>
        <F k="Cupo disponible" v={money(d.cupoDisp)}/>
        <F k="Cupo solicitado" v={money(d.cupoPedido)} destac/>
        <Sec>Riesgo</Sec>
        <F k="Cartera pendiente" v={money(d.carteraPend)}/>
        <F k="Cartera vencida" v={money(d.carteraVenc)} destac={d.carteraVenc>0}
          col={d.carteraVenc>0?"#C2603A":"#2E7D52"}/>
        <F k="Exposición resultante" v={money(exposicion)} destac/>
        <F k="Días promedio de pago" v={d.diasPago+" días"}/>
        <F k="Ranking pagador" v={d.ranking} col={d.ranking.includes("Buen")?"#2E7D52":"#C9A227"}/>
        <F k="Vigencia" v={d.vigencia}/>
        {d.carteraVenc>0 && (
          <div style={{background:"#FBE9E4",borderRadius:10,padding:"9px 11px",marginTop:10,
            fontSize:11.5,color:"#B5613C",fontWeight:600}}>
            ⚠️ El cliente tiene {money(d.carteraVenc)} vencidos. Considera exigir un abono antes de ampliar.</div>
        )}
      </>);
    }
    if(s.tipo==="descuento"){
      return (<>
        <Sec>Operación</Sec>
        <F k="Factura o pedido" v={(d.factura||"").replace(/^001-001-/,"")}/>
        <F k="Producto" v={d.producto}/>
        <F k="Valor original" v={money(d.valorOriginal)}/>
        <F k="Descuento solicitado" v={money(d.descuento)} destac col="#C2603A"/>
        <Sec>Impacto</Sec>
        <F k="Margen antes" v={money(d.margenAntes)}/>
        <F k="Margen después" v={money(d.margenDespues)} destac/>
        <F k="Comisión antes" v={money(d.comAntes)}/>
        <F k="Comisión después" v={money(d.comDespues)} destac/>
        <F k="Autoriza" v={d.responsable}/>
      </>);
    }
    if(s.tipo==="nc"){
      const bloqueada=/descuento comercial/i.test(d.motivoNC||"");
      return (<>
        {bloqueada && (
          <div style={{background:"#FBE9E4",borderRadius:10,padding:"10px 12px",marginBottom:10,
            fontSize:12,color:"#B5613C",fontWeight:700}}>
            🚫 Bloqueada por política: no se emiten notas de crédito por descuento comercial.</div>
        )}
        <Sec>Nota de crédito</Sec>
        <F k="Factura relacionada" v={(d.factura||"").replace(/^001-001-/,"")}/>
        <F k="Motivo autorizado" v={d.motivoNC} destac/>
        <F k="Producto" v={d.producto}/>
        <F k="Cantidad" v={d.cant+" qq"}/>
        <F k="Valor" v={money(d.valor)} destac col="#C2603A"/>
        <F k="Responsable" v={d.responsable}/>
        <F k="Resultado esperado" v={d.resultado}/>
        <F k="Evidencia" v={d.fotos?`${d.fotos} foto(s)`:"sin adjuntos"}
          col={d.fotos?"#2E7D52":"#C2603A"}/>
      </>);
    }
    if(s.tipo==="devolucion"){
      return (<>
        <Sec>Devolución</Sec>
        <F k="Factura" v={(d.factura||"").replace(/^001-001-/,"")}/>
        <F k="Producto" v={d.producto}/>
        <F k="Lote" v={d.lote}/>
        <F k="Cantidad" v={d.cant}/>
        <F k="Valor" v={money(d.valor)} destac/>
        <Sec>Estado y solución</Sec>
        <F k="Motivo" v={d.motivoDev}/>
        <F k="Estado del producto" v={d.estadoProd}/>
        <F k="Solución solicitada" v={d.solucion} destac/>
        <F k="Responsable del retiro" v={d.responsableRetiro}/>
        <F k="Evidencia" v={d.fotos?`${d.fotos} foto(s)`:"sin adjuntos"}
          col={d.fotos?"#2E7D52":"#C2603A"}/>
      </>);
    }
    if(s.tipo==="posfechar"){
      return (<>
        <Sec>Cheque</Sec>
        <F k="Número" v={d.cheque}/>
        <F k="Monto" v={money(d.monto)} destac/>
        <F k="Facturas relacionadas" v={(d.facturas||"").replace(/^001-001-/,"")}/>
        <Sec>Reprogramación</Sec>
        <F k="Fecha actual" v={d.fechaActual}/>
        <F k="Nueva fecha" v={d.fechaNueva} destac/>
        <F k="Días adicionales" v={d.diasExtra+" días"} destac
          col={d.diasExtra>20?"#C2603A":"#C9A227"}/>
        <Sec>Antecedentes del cliente</Sec>
        <F k="Posfechados anteriores" v={d.posfechadosAntes}
          col={d.posfechadosAntes>0?"#C9A227":"#2E7D52"}/>
        <F k="Cartera pendiente" v={money(d.carteraPend)}/>
        <F k="Cartera vencida" v={money(d.carteraVenc)}
          col={d.carteraVenc>0?"#C2603A":"#2E7D52"} destac={d.carteraVenc>0}/>
        {(d.posfechadosAntes>0 || d.carteraVenc>0) && (
          <div style={{background:"#FBF3DC",borderRadius:10,padding:"9px 11px",marginTop:10,
            fontSize:11.5,color:"#8A6D12",fontWeight:600}}>
            ⚠️ {d.posfechadosAntes>0?`Ya tuvo ${d.posfechadosAntes} posfechamiento(s). `:""}
            {d.carteraVenc>0?`Tiene ${money(d.carteraVenc)} de cartera vencida.`:""}</div>
        )}
      </>);
    }
    if(s.tipo==="muestras"){
      return (<>
        <Sec>Cliente</Sec>
        <F k="Nombre" v={d.nombre||s.cli}/>
        <F k="Cédula o RUC" v={d.ruc||"—"}/>
        <F k="Dirección" v={d.direccion||"—"}/>
        <F k="Teléfono" v={d.tel||"—"}/>
        <F k="Zona" v={d.zona||"—"}/>
        <Sec>Muestra</Sec>
        <F k="Producto" v={d.producto}/>
        <F k="Cantidad" v={d.cant}/>
        <F k="Motivo" v={d.motivoM} destac/>
        <F k="Vendedor responsable" v={d.vendedor}/>
        <F k="Responsable de bodega" v={d.bodeguero}/>
      </>);
    }
    return (<>
      <Sec>Detalle</Sec>
      <div style={{fontSize:12.5,lineHeight:1.5}}>{s.detalle}</div>
    </>);
  };

  /* ══ RENDER ══ */
  return (<>
    <div className="h1">Solicitudes</div>
    <div className="sub">Revisa, aprueba y consulta el estado de las solicitudes comerciales.</div>

    {/* resumen compacto */}
    <div className="neu" style={{padding:"12px 14px",marginBottom:11,marginTop:10}}>
      <div style={{display:"flex",justifyContent:"space-between",textAlign:"center"}}>
        {[...(pestana==="mias"?[[nBorr,"Borr.","#6B7280"]]:[]),
          [nPend,"Pend.","#C9A227"],[nRev,"Revisión","#2B6CB0"],[nApr,"Aprob.","#2E7D52"],
          [nRech,"Rech.","#C2603A"],[nCorr,"Corrig.","#D98324"]].map(([n,l,c],i)=>(
          <span key={i} style={{flex:1}}>
            <span className="num" style={{display:"block",fontSize:17,fontWeight:800,color:c}}>{n}</span>
            <span className="meta" style={{fontSize:9}}>{l}</span></span>
        ))}
      </div>
      {(urgentes>0||vencidas>0) && (
        <div style={{marginTop:9,paddingTop:8,borderTop:"1px dashed #E0DBCE",fontSize:11,
          color:"#C2603A",fontWeight:700}}>
          ⚠️ {urgentes>0?`${urgentes} urgente(s)`:""}{urgentes>0&&vencidas>0?" · ":""}
          {vencidas>0?`${vencidas} sin respuesta`:""}</div>
      )}
    </div>

    <div className="eq-tabs" style={{marginBottom:10}}>
      <button className={pestana==="aprobar"?"on":""} onClick={()=>{setPestana("aprobar");setFTipo("Todos");setFEstado("Todos");}}>Mi aprobación</button>
      <button className={pestana==="mias"?"on":""} onClick={()=>{setPestana("mias");setFTipo("Todos");setFEstado("Todos");}}>Mis solicitudes</button>
    </div>

    {/* buscador y filtros */}
    <div className="row" style={{gap:9,marginBottom:12,alignItems:"stretch",minWidth:0}}>
      <div className="ss" style={{flex:1,minWidth:0,marginBottom:0}}>
        <div className="box"><span className="mag">⌕</span>
          <input value={q} placeholder="Buscar…" onChange={e=>setQ(e.target.value)}/>
          <MicBtn onTexto={setQ}/>
          {q && <button className="clr" onClick={()=>setQ("")}>×</button>}</div>
      </div>
      <button className="filtrar-btn" onClick={()=>setVerFiltros(v=>!v)}>Filtrar</button>
    </div>
    {verFiltros && (
      <div className="card" style={{padding:"13px 14px",marginBottom:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
          <FiltroBuscador items={ORDEN_TIPO_SOL} value={fTipo} onPick={setFTipo}
            todos="Todos" etiquetaTodos="Tipo: todos" render={k=>TIPO_SOL[k]?TIPO_SOL[k].t:k}/>
          <FiltroBuscador items={Object.keys(ESTADO_SOL)} value={fEstado} onPick={setFEstado}
            todos="Todos" etiquetaTodos="Estado: todos" render={k=>ESTADO_SOL[k]?ESTADO_SOL[k].t:k}/>
        </div>
        {(fTipo!=="Todos"||fEstado!=="Todos") && (
          <button className="mini-link" style={{marginTop:9}}
            onClick={()=>{setFTipo("Todos");setFEstado("Todos");}}>Quitar filtros</button>
        )}
      </div>
    )}

    {(()=>{
      const borrs = filtradas.filter(s=>s.estado==="borrador");
      const resto = filtradas.filter(s=>s.estado!=="borrador");
      return (<>
        {borrs.length>0 && (<>
          <div className="ficha-sec" style={{marginTop:2,marginBottom:7}}>
            Borradores · {borrs.length}</div>
          {borrs.map(s=><Tarjeta key={s.id} s={s}/>)}
          <div style={{height:1,background:"#E0DBCE",margin:"12px 0 12px"}}></div>
        </>)}
        {resto.map(s=><Tarjeta key={s.id} s={s}/>)}
        {filtradas.length===0 && (
          <div className="ph">{pestana==="aprobar"?"No hay solicitudes por aprobar.":"No has enviado solicitudes."}</div>
        )}
      </>);
    })()}

    {pestana==="mias" && (
      <button className="cta" style={{marginTop:6}} onClick={abrirNueva}>+ Nueva solicitud</button>
    )}

    {/* ══ DETALLE ══ */}
    {sel && (()=>{
      const tp=tipoDe(sel.tipo), es=estDe(sel.estado);
      const fin = ["aprobada","rechazada","ejecutada","anulada"].includes(sel.estado);
      const bloqueada = sel.tipo==="nc" && /descuento comercial/i.test((sel.d||{}).motivoNC||"");
      return (
        <div className="ov" onClick={()=>setSel(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()} style={{maxHeight:"88vh",overflowY:"auto"}}>
            {/* cabecera */}
            <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:8}}>
              <span style={{width:36,height:36,borderRadius:10,background:tp.bg,flexShrink:0,
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Ico n={tp.ico} c={tp.col} s={18}/></span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,fontSize:14}}>{sel.num}</div>
                <div className="meta" style={{fontSize:11}}>{tp.t}</div>
              </div>
              <span style={{flexShrink:0,fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:7,
                background:es.bg,color:es.col}}>{es.t}</span>
            </div>

            <F k="Cliente" v={sel.cli} destac/>
            <F k="Solicitante" v={sel.sc?`${sel.sc} · ${sel.cargo||""}`:(sel.proveedor||"—")}/>
            <F k="Fecha" v={sel.fecha}/>
            <F k="Nivel de aprobación" v={sel.nivel}/>

            <Detalle s={sel}/>

            {(sel.d&&sel.d.motivo) && (<>
              <Sec>Motivo</Sec>
              <div style={{fontSize:12.5,lineHeight:1.5,fontStyle:"italic",color:"var(--ink)"}}>"{sel.d.motivo}"</div>
            </>)}

            {/* comentarios: la comunicación del equipo */}
            <Sec>Comentarios</Sec>
            {(sel.comentarios||[]).length===0 && <div className="meta" style={{fontSize:11.5}}>Sin comentarios todavía.</div>}
            {(sel.comentarios||[]).map((c,i)=>(
              <div key={i} style={{background:"var(--paper)",borderRadius:10,padding:"9px 11px",marginBottom:7}}>
                <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                  <span style={{fontSize:11.5,fontWeight:700}}>{c.de}</span>
                  <span className="meta" style={{fontSize:10}}>{c.f}</span>
                </div>
                <div style={{fontSize:12,marginTop:3,lineHeight:1.45}}>{c.txt}</div>
              </div>
            ))}
            <button className="back" style={{width:"100%",marginTop:6}}
              onClick={()=>{setAccion("comentar");setMotivo("");}}>+ Añadir comentario</button>

            {/* acciones del aprobador */}
            {pestana==="aprobar" && !fin && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginTop:14}}>
                <button className="cta" style={{margin:0,gridColumn:"1 / -1"}} disabled={bloqueada}
                  onClick={()=>{setAccion("aprobar");setMotivo("");}}>Aprobar</button>
                <button className="back" style={{margin:0}}
                  onClick={()=>{setAccion("correccion");setMotivo("");}}>Solicitar corrección</button>
                <button style={{margin:0,background:"#FBE9E4",color:"#B5613C",border:"1px solid #E8C0B0",
                  borderRadius:12,padding:"11px",fontSize:13,fontWeight:700,fontFamily:"inherit",cursor:"pointer"}}
                  onClick={()=>{setAccion("rechazar");setMotivo("");}}>Rechazar</button>
              </div>
            )}
            {fin && (
              <div style={{background:es.bg,borderRadius:10,padding:"10px 12px",marginTop:14,
                fontSize:12,color:es.col,fontWeight:700,textAlign:"center"}}>
                Solicitud {es.t.toLowerCase()}</div>
            )}
            <button className="back" style={{width:"100%",marginTop:9}} onClick={()=>setSel(null)}>Cerrar</button>
          </div>
        </div>
      );
    })()}

    {/* ══ CONFIRMACIÓN DE ACCIÓN ══ */}
    {accion && (
      <div className="ov" onClick={()=>setAccion(null)}>
        <div className="sheet" onClick={e=>e.stopPropagation()}>
          <h3>{accion==="aprobar"?"Confirmar aprobación"
            : accion==="rechazar"?"Rechazar solicitud"
            : accion==="correccion"?"Solicitar corrección"
            : "Añadir comentario"}</h3>
          <div className="meta" style={{marginBottom:12}}>{sel&&sel.num} · {sel&&sel.cli}</div>

          {accion==="aprobar" && (
            <div style={{background:"#E4F1E9",borderRadius:10,padding:"10px 12px",marginBottom:12,
              fontSize:12,color:"#2E7D52",fontWeight:600}}>
              Al aprobar se emite un código de un solo uso y queda auditado.</div>
          )}

          <div className="field">
            <label>{accion==="aprobar"?"Comentario (opcional)"
              : accion==="rechazar"?"Motivo del rechazo *"
              : accion==="correccion"?"¿Qué debe corregir? *"
              : "Comentario *"}</label>
            <input value={motivo} onChange={e=>setMotivo(e.target.value)}
              placeholder={accion==="rechazar"?"Explica el motivo al solicitante":"Escribe aquí…"}/>
          </div>

          <button className="cta" style={{marginTop:14}}
            disabled={accion!=="aprobar" && !motivo.trim()}
            onClick={confirmarAccion}>
            {accion==="aprobar"?"Confirmar aprobación"
              : accion==="rechazar"?"Rechazar"
              : accion==="correccion"?"Enviar corrección"
              : "Enviar comentario"}</button>
          <button className="back" style={{width:"100%",marginTop:8}} onClick={()=>setAccion(null)}>Cancelar</button>
        </div>
      </div>
    )}

    {/* ══ NUEVA SOLICITUD ══ */}
    {crear && (
      <div className="ov" onClick={cerrarCrear}>
        <div className="sheet" onClick={e=>e.stopPropagation()}>
          <h3>{nBorrador?"Continuar borrador":"Nueva solicitud"}</h3>
          <div className="ficha-sec" style={{marginTop:8}}>Tipo *</div>
          <div className="tipochips">
            {ORDEN_TIPO_SOL.map(k=>(
              <button key={k} className={"tchip"+(nTipo===k?" on":"")} onClick={()=>{setNTipo(k);setNMotivo("");}}>
                <span className="tchip-nom" style={nTipo===k?{color:"#fff"}:{color:"#2C3A32"}}>{TIPO_SOL[k].t}</span>
              </button>
            ))}
          </div>

          <div style={{marginTop:12}}>
            <div className="ficha-sec" style={{marginBottom:6}}>Cliente *</div>
            <SearchSelect label="Cliente" items={CLIENTES} sinLabel value={nCli||null} multiPalabra
              placeholder="Escribe o dicta el cliente…"
              onPick={c=>setNCli(c)}
              onClear={()=>setNCli("")}
              render={{
                text:c=>c,
                option:c=>(<><div className="o1">{c}</div>
                  {(REFERENCIALES[c]||[]).length>0 && <div className="o2">Factura a: {REFERENCIALES[c].join(" · ")}</div>}</>),
                picked:c=>(<div className="p1">{c}</div>)
              }}/>
          </div>

          {nTipo==="nc" && (<>
            <div style={{marginTop:10}}>
              <div className="ficha-sec" style={{marginBottom:6}}>Motivo autorizado *</div>
              <FiltroBuscador items={MOTIVOS_NC} value={nMotivo||""} onPick={v=>setNMotivo(v==="__"?"":v)}
                todos="__" etiquetaTodos="Elige un motivo…"/>
            </div>
            <div style={{background:"#FBF3DC",borderRadius:10,padding:"9px 11px",marginTop:8,
              fontSize:11,color:"#8A6D12",fontWeight:600}}>
              Por política de INTESGO no se emiten notas de crédito por descuento comercial.</div>
          </>)}

          <div className="field" style={{marginTop:10}}><label>Detalle *</label>
            <input value={nDetalle} onChange={e=>setNDetalle(e.target.value)}
              placeholder="Describe lo que solicitas"/></div>

          {nTipo!=="nc" && (
            <div className="field" style={{marginTop:10}}><label>Motivo *</label>
              <input value={nMotivo} onChange={e=>setNMotivo(e.target.value)}
                placeholder="Por qué lo necesitas"/></div>
          )}

          {/* aviso en vivo dentro del formulario */}
          {duplicada && (
            <div style={{background:"#FBF3DC",borderRadius:10,padding:"9px 11px",marginTop:12,
              fontSize:11.5,color:"#8A6D12",fontWeight:600,lineHeight:1.45}}>
              ⚠️ Ya tienes una solicitud activa de <b>{tipoDe(nTipo).t}</b> para {nCli} ({duplicada.num} · {estDe(duplicada.estado).t}).
            </div>
          )}

          <button className="cta" style={{marginTop:14}}
            disabled={!nCli || !nDetalle.trim() || !nMotivo}
            onClick={()=>{ if(duplicada) setAvisoDup(duplicada); else enviarSolicitud(); }}
            >Enviar solicitud</button>

          <button className="back" style={{width:"100%",marginTop:8}}
            disabled={!hayContenido}
            onClick={guardarBorrador}>
            {nBorrador?"Guardar cambios del borrador":"Guardar como borrador"}</button>

          <button className="back" style={{width:"100%",marginTop:8}} onClick={cerrarCrear}>Cancelar</button>
        </div>
      </div>
    )}

    {/* ══ ELIMINAR BORRADOR ══ */}
    {borrAEliminar && (
      <div className="ov" onClick={()=>setBorrAEliminar(null)}>
        <div className="sheet" onClick={e=>e.stopPropagation()}>
          <h3>Eliminar borrador</h3>
          <div className="meta" style={{fontSize:12.5,lineHeight:1.5,marginTop:6}}>
            Se elimina <b>{borrAEliminar.num}</b> de {borrAEliminar.cli}. No se puede recuperar.
          </div>
          <button className="cta" style={{marginTop:14,background:"#C2603A"}}
            onClick={()=>eliminarBorrador(borrAEliminar)}>Sí, eliminar</button>
          <button className="back" style={{width:"100%",marginTop:8}}
            onClick={()=>setBorrAEliminar(null)}>Cancelar</button>
        </div>
      </div>
    )}

    {/* ══ AVISO DE DUPLICADO ══ */}
    {avisoDup && (
      <div className="ov" onClick={()=>setAvisoDup(null)}>
        <div className="sheet" onClick={e=>e.stopPropagation()}>
          <h3>Ya existe una solicitud activa</h3>
          <div className="meta" style={{fontSize:12.5,lineHeight:1.5,marginTop:6}}>
            Para <b>{avisoDup.cli}</b> ya hay una solicitud de <b>{tipoDe(avisoDup.tipo).t}</b> esperando
            respuesta. Puedes revisarla antes de enviar otra.
          </div>

          <div className="card" style={{padding:"11px 12px",marginTop:12,
            borderLeft:`3px solid ${tipoDe(avisoDup.tipo).col}`}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <span className="meta" style={{fontSize:10,fontWeight:700,flexShrink:0}}>{avisoDup.num}</span>
              <span style={{flex:1}}></span>
              <span style={{flexShrink:0,fontSize:9.5,fontWeight:700,padding:"2px 7px",borderRadius:7,
                background:estDe(avisoDup.estado).bg,color:estDe(avisoDup.estado).col}}>
                {estDe(avisoDup.estado).t}</span>
            </div>
            <div style={{fontSize:12.5,marginTop:4,overflow:"hidden",
              textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{avisoDup.detalle}</div>
            <div className="meta" style={{fontSize:10.5,marginTop:2}}>{avisoDup.fecha}</div>
          </div>

          <button className="cta" style={{marginTop:14}}
            onClick={()=>{ const d=avisoDup; setAvisoDup(null); cerrarCrear(); setSel(d); }}>
            Ver la solicitud existente</button>
          <button className="back" style={{width:"100%",marginTop:8}}
            onClick={enviarSolicitud}>Enviar de todos modos</button>
          <button className="back" style={{width:"100%",marginTop:8}}
            onClick={()=>setAvisoDup(null)}>Cancelar</button>
        </div>
      </div>
    )}
  </>);
}

function Equipo({toast}){
  useRetroceso(()=>{
      if(verBloqueo){ setVerBloqueo(null); return true; }
      if(detalle){ setDetalle(null); return true; }
      return false;
    });
  const [equipo,setEquipo]=useState(EQUIPO_INI);
  const [verBloqueo,setVerBloqueo]=useState(null);
  useModal(verBloqueo, React.useCallback(()=>setVerBloqueo(null),[])); // subcomisionista a bloquear
  const [motivo,setMotivo]=useState("");
  const [detalle,setDetalle]=useState(null);       // subcomisionista en pantalla de detalle
  const [q,setQ]=useState("");                     // búsqueda por nombre
  const [fZona,setFZona]=useState("Todas");        // filtro por zona
  const [fEstado,setFEstado]=useState("Todos");    // filtro por estado
  const [pestana,setPestana]=useState("resumen");  // resumen | subs

  const ventasEquipo=equipo.reduce((a,s)=>a+s.ventasMes,0);
  const cobradoEquipo=equipo.reduce((a,s)=>a+s.cobradoMes,0);
  const porCobrarEquipo=equipo.reduce((a,s)=>a+s.porCobrar,0);
  const activos=equipo.filter(s=>s.activo).length;

  const margenEquipo=equipo.reduce((a,s)=>a+s.margenMes,0);
  const metaEquipo=equipo.reduce((a,s)=>a+s.metaMes,0);
  const cumplMeta=metaEquipo>0?Math.round(ventasEquipo/metaEquipo*100):0;
  const ventaHoyEq=equipo.reduce((a,s)=>a+s.ventaHoy,0);
  const visitasHoyEq=equipo.reduce((a,s)=>a+s.visitasHoy,0);
  const clientesEq=equipo.reduce((a,s)=>a+s.clientes,0);
  const sinComprarEq=equipo.reduce((a,s)=>a+s.sinComprar,0);
  const nuevosEq=equipo.reduce((a,s)=>a+s.nuevos,0);
  const facturado=cobradoEquipo+porCobrarEquipo;
  const recuperacion=facturado>0?Math.round(cobradoEquipo/facturado*100):0;
  const hoy=new Date(); const diaMes=hoy.getDate();
  const diasMes=new Date(hoy.getFullYear(),hoy.getMonth()+1,0).getDate();
  const diasRestantes=diasMes-diaMes;
  const proyeccion=diaMes>0?Math.round(ventasEquipo/diaMes*diasMes):ventasEquipo;
  const todasVentas=Object.values(TRABAJO_SC).flatMap(t=>t.ventas);
  const ticketProm=todasVentas.length>0?Math.round(todasVentas.reduce((a,v)=>a+v.monto,0)/todasVentas.length):0;
  const cobrosHoy=Object.values(TRABAJO_SC).flatMap(t=>t.cobros).filter(c=>/hoy/i.test(c.fecha));
  const montoCobrosHoy=cobrosHoy.reduce((a,c)=>a+c.monto,0);
  const ranking=[...equipo].sort((a,b)=>b.metaPct-a.metaPct);
  const chequesDev=CHEQUES_DEVUELTOS.filter(c=>c.estado==="pendiente");

  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const zonas=["Todas",...Array.from(new Set(equipo.map(s=>s.zona)))];
  const equipoFiltrado=equipo.filter(s=>{
    const okQ = q==="" || norm(s.nombre).includes(norm(q));
    const okZ = fZona==="Todas" || s.zona===fZona;
    const okE = fEstado==="Todos" || (fEstado==="Activos"?s.activo:!s.activo);
    return okQ && okZ && okE;
  });

  const toggleAcceso=(sc)=>{
    if(sc.activo){ setVerBloqueo(sc); setMotivo(""); }
    else { setEquipo(e=>e.map(x=>x.id===sc.id?{...x,activo:true,motivo:undefined}:x)); toast(`Acceso reactivado · ${sc.nombre}`); }
  };
  const confirmarBloqueo=()=>{
    if(!motivo.trim()){toast("Indica el motivo del bloqueo.");return;}
    setEquipo(e=>e.map(x=>x.id===verBloqueo.id?{...x,activo:false,motivo}:x));
    toast(`Acceso bloqueado · ${verBloqueo.nombre}`);
    setVerBloqueo(null); setMotivo("");
  };

  if(detalle){
    const t = TRABAJO_SC[detalle.id] || {ventas:[], cobros:[]};
    const totalVentas = t.ventas.reduce((a,v)=>a+v.monto,0);
    const totalCobros = t.cobros.reduce((a,c)=>a+c.monto,0);
    const carteraSc = CARTERA_INI.filter(f=>f.vendedor===detalle.nombre);
    const totalCartSc = carteraSc.reduce((a,f)=>a+f.saldo,0);
    const vencidoSc = carteraSc.filter(f=>f.dias>0).reduce((a,f)=>a+f.saldo,0);
    const morSc = totalCartSc>0?Math.round(vencidoSc/totalCartSc*100):0;
    const tramosSc=[
      {k:"Por vencer", test:f=>f.dias<=0, color:"#2E7D52"},
      {k:"1–30 días",  test:f=>f.dias>0&&f.dias<=30, color:"#C9A227"},
      {k:"31–60 días", test:f=>f.dias>30&&f.dias<=60, color:"#D98324"},
      {k:"61–90 días", test:f=>f.dias>60&&f.dias<=90, color:"#C2603A"},
      {k:"+90 días",   test:f=>f.dias>90, color:"#A33B2A"},
    ].map(tr=>({...tr, monto:carteraSc.filter(tr.test).reduce((a,f)=>a+f.saldo,0)}));
    const maxTrSc=Math.max(...tramosSc.map(tr=>tr.monto),1);
    const topDeudSc=[...carteraSc].filter(f=>f.dias>0).sort((a,b)=>b.saldo-a.saldo).slice(0,3);
    const chequesScDev=CHEQUES_DEVUELTOS.filter(c=>c.vendedor===detalle.nombre && c.estado==="pendiente");
    return (<>
      <button className="ghost" onClick={()=>setDetalle(null)} style={{marginTop:0,marginBottom:16,textAlign:"left"}}>‹ Volver al equipo</button>

      <div className="det-head">
        <div className="row">
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span className="sync-ic" style={{width:44,height:44,fontSize:16,background:detalle.activo?"#E4F1E9":"#FBE9E4"}}>
              {detalle.nombre.split(" ").map(p=>p[0]).slice(0,2).join("")}</span>
            <div><div className="cli" style={{fontSize:17}}>{detalle.nombre}</div>
              <div className="meta">Zona {detalle.zona} · {detalle.clientes} clientes · {detalle.ultima}</div></div>
          </div>
          <span className={"chip "+(detalle.activo?"c-ok":"c-bad")}><span className="d"></span>{detalle.activo?"Activo":"Bloqueado"}</span>
        </div>
      </div>

      <div className="cu-grid">
        <div className="cu-card"><div className="cu-ic" style={{background:"#E4F1E9"}}><Ico n="factura" c="#8A6D12" s={19}/></div>
          <div className="cu-v num">{money(detalle.ventasMes)}</div><div className="cu-k">Ventas del mes</div></div>
        <div className="cu-card"><div className="cu-ic" style={{background:"#EAF0F6"}}><Ico n="billete" c="#8A6D12" s={19}/></div>
          <div className="cu-v num">{money(detalle.cobradoMes)}</div><div className="cu-k">Cobrado</div></div>
        <div className="cu-card"><div className="cu-ic" style={{background:"#FBF0D8"}}><Ico n="reloj" c="#2B6CB0" s={19}/></div>
          <div className="cu-v num">{money(detalle.porCobrar)}</div><div className="cu-k">Por cobrar</div></div>
        <div className="cu-card"><div className="cu-ic" style={{background:"#E9EEE9"}}><Ico n="diana" c="#7A5BA8" s={19}/></div>
          <div className="cu-v num">{detalle.metaPct}%</div><div className="cu-k">Meta</div></div>
      </div>

      {chequesScDev.length>0 && (
        <div className="card chq-card" style={{marginTop:14}}>
          <div className="graf-t" style={{color:"#C2603A"}}>⚠️ Cheques devueltos por gestionar · {chequesScDev.length}</div>
          {chequesScDev.map((c,i)=>(
            <div className="cu-line" key={i}>
              <span>{c.cli} · {c.numero}</span>
              <b className="num" style={{color:"#C2603A"}}>{money(c.monto)}</b>
            </div>
          ))}
          <div className="chq-nota">Debe trabajar el reposicionamiento. El valor ya está reabierto en cartera.</div>
        </div>
      )}

      <div className="sec-h"><h2>Rendimiento</h2><div className="grain"></div></div>
      <div className="card">
        <div className="graf-t">📈 Tendencia de ventas · últimos meses</div>
        <GraficoBarras datos={TENDENCIA_VENTAS[detalle.id] || []}/>
      </div>
      <div className="card">
        <div className="graf-t">💵 Efectividad de cobranza</div>
        <GraficoDona cobrado={detalle.cobradoMes} porCobrar={detalle.porCobrar}/>
        <div className="meta" style={{marginTop:10,textAlign:"center"}}>
          De {money(detalle.cobradoMes+detalle.porCobrar)} facturado, ha recuperado {money(detalle.cobradoMes)}.
        </div>
      </div>

      <div className="sec-h"><h2>Ventas del mes · {money(totalVentas)}</h2><div className="grain"></div></div>
      {t.ventas.length===0 ? <div className="ph">Sin ventas registradas este mes.</div>
        : t.ventas.map((v,i)=>(
          <div className="card" key={i}>
            <div className="row">
              <div><div className="cli" style={{fontSize:14}}>{v.cli}</div>
                <div className="meta">{v.prod} · {v.cond} · {v.fecha}</div></div>
              <div style={{textAlign:"right"}}><div className="amt num">{money(v.monto)}</div>
                <span className="meta">{v.estado}</span></div>
            </div>
          </div>
        ))}

      <div className="sec-h"><h2>Cobros del mes · {money(totalCobros)}</h2><div className="grain"></div></div>
      {t.cobros.length===0 ? <div className="ph">Sin cobros registrados este mes.</div>
        : t.cobros.map((c,i)=>(
          <div className="card" key={i}>
            <div className="row">
              <div><div className="cli" style={{fontSize:14}}>{c.cli}</div>
                <div className="meta">{c.medio} · factura {c.fac} · {c.fecha}</div></div>
              <div className="amt num" style={{color:"var(--ok)"}}>{money(c.monto)}</div>
            </div>
          </div>
        ))}

      <div className="sec-h"><h2>Cartera · {money(totalCartSc)}</h2><div className="grain"></div></div>
      <div className="card">
        <div className="cu-line"><span>Por cobrar total</span><b className="num">{money(totalCartSc)}</b></div>
        <div className="cu-line"><span>Vencido</span><b className="num" style={{color:"#C2603A"}}>{money(vencidoSc)}</b></div>
        <div className="cu-line"><span>Morosidad</span><b className="num" style={{color:morSc>=50?"#C2603A":"var(--field)"}}>{morSc}%</b></div>
      </div>

      {carteraSc.length>0 && (
        <div className="card">
          <div className="graf-t">Antigüedad de su cartera</div>
          {tramosSc.map((tr,i)=>(
            <div key={i} style={{marginBottom:i<tramosSc.length-1?10:0}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
                <span style={{color:"var(--ink)"}}>{tr.k}</span>
                <b className="num" style={{color:tr.color}}>{money(tr.monto)}</b>
              </div>
              <div className="ag-bar"><div className="ag-fill" style={{width:Math.round(tr.monto/maxTrSc*100)+"%",background:tr.color}}></div></div>
            </div>
          ))}
        </div>
      )}

      <div className="sec-h"><h2>Sus deudores vencidos</h2><div className="grain"></div></div>
      {topDeudSc.length===0 ? <div className="ph">Sin deuda vencida. Cartera sana.</div>
        : topDeudSc.map((d,i)=>(
          <div className="card" key={i}>
            <div className="row">
              <div><div className="cli" style={{fontSize:14}}>{d.cli}</div>
                <div className="meta">Fact. {d.fac} · {d.dias} días vencida</div></div>
              <div className="amt num" style={{color:"#C2603A"}}>{money(d.saldo)}</div>
            </div>
          </div>
        ))}

      <button className="back" style={{width:"100%",marginTop:16,color:detalle.activo?"var(--clay)":"var(--ok)",borderColor:detalle.activo?"#E8C0B0":"#B9D9C5"}}
        onClick={()=>{ const sc=equipo.find(x=>x.id===detalle.id); toggleAcceso(sc); if(sc.activo) setDetalle(null); }}>
        {detalle.activo?"Bloquear acceso":"Reactivar acceso"}
      </button>
    </>);
  }

  return (<>
    <div className="cu-head">
      <div><div className="h1" style={{marginBottom:2}}>Mi equipo</div>
        <div className="sub" style={{margin:0}}>{activos} de {equipo.length} subcomisionistas activos</div></div>
    </div>

    <div className="eq-tabs">
      <button className={pestana==="resumen"?"on":""} onClick={()=>setPestana("resumen")}>Resumen</button>
      <button className={pestana==="subs"?"on":""} onClick={()=>setPestana("subs")}>Subcomisionistas</button>
    </div>

    {pestana==="resumen" && (<>
      
      <div className="kpi6">
        <div className="kpi"><div className="kpi-ic">💰</div><div className="kpi-v num">{money(ventasEquipo)}</div><div className="kpi-k">Ventas del mes</div></div>
        <div className="kpi"><div className="kpi-ic">🎯</div><div className="kpi-v num">{cumplMeta}%</div><div className="kpi-k">Cumplimiento meta</div></div>
        <div className="kpi"><div className="kpi-ic">💵</div><div className="kpi-v num">{money(margenEquipo)}</div><div className="kpi-k">Utilidad generada</div></div>
        <div className="kpi"><div className="kpi-ic">👥</div><div className="kpi-v num">{visitasHoyEq}</div><div className="kpi-k">Visitas hoy</div></div>
        <div className="kpi"><div className="kpi-ic">💳</div><div className="kpi-v num" style={{color:"#C2603A"}}>{money(porCobrarEquipo)}</div><div className="kpi-k">Cartera por cobrar</div></div>
        <div className="kpi"><div className="kpi-ic">📈</div><div className="kpi-v num">{money(proyeccion)}</div><div className="kpi-k">Proyección cierre</div></div>
      </div>

      <div className="sec-h"><h2>📊 Ventas</h2><div className="grain"></div></div>
      <div className="card">

/* ═══════════ HUELLA REAL (WebAuthn) · el sensor del teléfono, como en la banca ═══════════
   En HTTPS (app publicada/instalada): biometría verdadera. En archivo local: simulación demo.
   La sesión verificada contra el servidor llega en Fase 4 (portal único). */
const HUELLA_KEY = "freelance_huella_v1";
const puedeHuellaReal = () => location.protocol === "https:" && !!window.PublicKeyCredential;
function huellaGuardada(){ try { return JSON.parse(localStorage.getItem(HUELLA_KEY) || "null"); } catch(e){ return null; } }
function guardarHuella(d){ try { localStorage.setItem(HUELLA_KEY, JSON.stringify(d)); } catch(e){} }
function b64h(buf){ return btoa(String.fromCharCode.apply(null, Array.from(new Uint8Array(buf)))); }
function deB64h(s){ return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
function retoAleatorio(){ const a = new Uint8Array(32); crypto.getRandomValues(a); return a; }
async function crearHuella(usuario, nombre){
  try {
    const cred = await navigator.credentials.create({ publicKey: {
      challenge: retoAleatorio(),
      rp: { name: "FREELANCE", id: location.hostname },
      user: { id: new TextEncoder().encode(usuario), name: usuario, displayName: nombre || usuario },
      pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
      authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required", residentKey: "preferred" },
      timeout: 60000, attestation: "none",
    }});
    return cred ? b64h(cred.rawId) : null;
  } catch(e){ return null; }
}
async function verificarHuella(credId){
  try {
    const res = await navigator.credentials.get({ publicKey: {
      challenge: retoAleatorio(),
      allowCredentials: [{ id: deB64h(credId), type: "public-key", transports: ["internal"] }],
      userVerification: "required", timeout: 60000, rpId: location.hostname,
    }});
    return !!res;
  } catch(e){ return false; }
}

    <path d="M20.9 17v2.2a1.7 1.7 0 0 1-1.7 1.7H17" />
    <path d="M7 20.9H4.8a1.7 1.7 0 0 1-1.7-1.7V17" />
    <path d="M8.5 9.3v1.7" />
    <path d="M15.5 9.3v1.7" />
    <path d="M12 9.6v3.1a1.05 1.05 0 0 1-1 1.05" />
    <path d="M8.7 16.1a4.6 4.6 0 0 0 6.6 0" />
  </svg>
);

function PantallaLogin({ onAutenticado }) {
  const [paso, setPaso]                 = useState("login");
  const [usr, setUsr]                   = useState("");
  const [pwd, setPwd]                   = useState("");
  const [verPwd, setVerPwd]             = useState(false);
  const [error, setError]               = useState("");
  const [cargando, setCargando]         = useState(false);
  const [huellaReg, setHuellaReg] = useState(huellaGuardada());
  const [conClave, setConClave]         = useState(() => puedeHuellaReal() && !huellaGuardada());   // banca: sin huella registrada → credenciales primero
  const [huellaEstado, setHuellaEstado] = useState("espera");
  const [syncing, setSyncing]           = useState(false);
  const [syncDone, setSyncDone]         = useState(false);
  const [focusField, setFocusField]     = useState(null);

  const usuarioAuthRef = React.useRef(null);
  const syncRef        = React.useRef(false);
  const pwdRef         = React.useRef(null);

  const syncItems = ["Precios y promociones","Clientes (284)","Agenda · 4 visitas hoy","Stock actualizado"];

  const usrValido = USUARIOS[usr.toUpperCase()];
  const usrColor  = usr.length === 0 ? CL.tinta : usrValido ? CL.tinta : CL.error;
  const pwdColor  = pwd.length === 0 ? CL.tinta : (usrValido && usrValido.clave === pwd) ? CL.tinta : CL.error;

  const handleLogin = (conHuella = false) => {
    /* ── HUELLA REAL: el sensor del sistema, igual que al entrar a tu banca ── */
    if (conHuella && puedeHuellaReal()) {
      const reg = huellaGuardada();
      if (!reg) { setConClave(true); setError("Activa tu huella: ingresa por primera vez con usuario y clave."); return; }
      setError(""); setCargando(true);
      verificarHuella(reg.credId).then((ok) => {
        setCargando(false);
        if (!ok) { setError("No se pudo verificar la huella. Intenta de nuevo o entra con tu clave."); return; }
        const u = USUARIOS[reg.usuario] || { nombre: reg.nombre, codigo: reg.usuario, zona: "—", rol: "freelance", clave: "" };
        usuarioAuthRef.current = u;
        setPaso("sync");
      });
      return;
    }
    if (!usr.trim()) { setError("Ingresa tu usuario"); return; }
    if (!pwd.trim()) { setError("Ingresa tu contraseña"); return; }
    const u = USUARIOS[usr.toUpperCase()];
    if (!u || u.clave !== pwd) { setError("Usuario o contraseña incorrectos"); return; }
    setError(""); setCargando(true);
    setTimeout(() => {
      setCargando(false);
      usuarioAuthRef.current = u;
      try { localStorage.setItem("freelance_ultimo_usr", JSON.stringify({ usuario: usr.toUpperCase(), nombre: u.nombre })); } catch(e){}
      setPaso(conHuella ? "huella" : "sync");
    }, 900);
  };



  const simularHuella = () => {
    setHuellaEstado("leyendo");
    setTimeout(() => {
      setHuellaEstado("ok");
      setTimeout(() => setPaso("sync"), 700);
    }, 1400);
  };

  React.useEffect(() => {
    if (paso !== "sync" || syncRef.current) return;
    syncRef.current = true;
    setSyncing(true);
    setTimeout(() => {
      setSyncing(false);
      setSyncDone(true);
      setTimeout(() => {
        const u = usuarioAuthRef.current;
        if (u) onAutenticado(u);
      }, 1500);
    }, 2200);
  }, [paso]);

  const Franja = ({ titulo, subtitulo }) => (
    <div className="fx-entrar" style={{ background:`linear-gradient(160deg, ${CL.tinta} 0%, ${CL.principal} 100%)`, padding:"clamp(12px,3vh,36px) 26px clamp(8px,1.6vh,18px)", position:"relative", overflow:"hidden" }}>
      <StatusBar light />
      
      <div style={{ position:"absolute", left:0, right:0, bottom:0, height:3, background:`linear-gradient(90deg, ${CL.ambar}, ${CL.suave})` }} />
      <div style={{ display:"flex", justifyContent:"center", marginBottom:"clamp(4px,1vh,10px)" }}>
        <div style={{ width:"clamp(44px,7.5vh,80px)", aspectRatio:"1" }}><LogoFreelance size="100%" /></div>
      </div>
      <p style={{ fontFamily:SERIF, fontSize:"clamp(21px,3.2vh,30px)", fontWeight:800, color:"#fff", margin:0, letterSpacing:"0.01em", lineHeight:1.05, textAlign:"center" }}>FREELANCE</p>
      <p style={{ fontFamily:BODY, fontSize:"clamp(9px,1.3vh,11px)", color:"rgba(255,255,255,0.7)", margin:"4px 0 0", letterSpacing:"0.22em", textTransform:"uppercase", textAlign:"center" }}>Ventas · Distribución · Cobranza</p>
      {titulo && <p style={{ fontFamily:SERIF, fontStyle:"italic", fontSize:"clamp(12px,1.8vh,15px)", color:"rgba(255,255,255,0.85)", margin:"clamp(5px,1vh,10px) 0 0", textAlign:"center" }}>{subtitulo}</p>}
      <div style={{ width:64, height:4, borderRadius:2, background:"#7FD69A", margin:"clamp(6px,1.2vh,12px) auto 0" }} />
    </div>
  );

  if (paso === "sync") return (
    <div style={{ background:CL.fondo, minHeight:"100%", display:"flex", flexDirection:"column" }}>
      <Franja titulo subtitulo={syncDone ? "Sesión establecida" : "Estableciendo sesión segura"} />
      <div style={{ flex:1, padding:"26px 26px 30px", display:"flex", flexDirection:"column" }}>
        <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:24 }}>
          <div style={{ width:54, height:54, borderRadius:"50%", border:`1px solid ${CL.linea}`, background:"var(--card)", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 2px 10px rgba(46,16,101,0.06)" }}>
            {syncDone ? <LogoFreelance size={34} /> : <span style={{ fontSize:26 }}>🔄</span>}
          </div>
          <div>
            <p style={{ fontFamily:SERIF, fontSize:21, fontWeight:700, color:CL.tinta, margin:"0 0 2px" }}>{syncDone ? "Todo listo" : "Preparando jornada"}</p>
            <p style={{ fontFamily:BODY, fontSize:13, color:CL.grisTexto, margin:0 }}>{syncDone ? "Dispositivo sincronizado" : `Bienvenido, ${usuarioAuthRef.current?.nombre?.split(" ")[0]}`}</p>
            {puedeHuellaReal() && !huellaGuardada() && (
              <p style={{ fontFamily:BODY, fontSize:11.5, color:CL.medio, margin:"10px 0 0", background:"#EAF3ED", borderRadius:8, padding:"8px 12px" }}>💡 Activa el ingreso con huella o rostro en <b>Ajustes → Seguridad</b></p>
            )}
          </div>
        </div>

        <div style={{ background:CL.papel, border:`1px solid ${CL.linea}`, borderRadius:14, padding:"18px 20px", marginBottom:14 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, paddingBottom:10, borderBottom:`1px solid ${CL.linea}` }}>
            <span style={{ fontFamily:BODY, fontSize:11, color:CL.grisTenue, fontWeight:600, letterSpacing:"0.14em", textTransform:"uppercase" }}>Sincronización</span>
            {syncing  && <span style={{ fontFamily:BODY, fontSize:11, color:CL.ambar, fontWeight:700 }}>En curso</span>}
            {syncDone && <span style={{ fontFamily:BODY, fontSize:11, color:CL.okVerde, fontWeight:700 }}>Completa</span>}
          </div>
          {syncItems.map((item, i) => (
            <div key={i} style={{ display:"flex", alignItems:"center", gap:12, marginBottom: i < syncItems.length-1 ? 13 : 0 }}>
              <div style={{ width:20, height:20, borderRadius:"50%", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800,
                background: syncDone ? CL.principal : syncing ? CL.ambarBg : "#efeaf8",
                color: syncDone ? "#fff" : syncing ? CL.ambar : CL.grisTenue, transition:"all .3s" }}>
                {syncDone ? "✓" : syncing ? "·" : "○"}
              </div>
              <span style={{ fontFamily:BODY, fontSize:14, color: syncDone ? CL.tinta : syncing ? CL.grisTexto : CL.grisTenue }}>{item}</span>
            </div>
          ))}
        </div>

        {syncDone && (
          <div style={{ background:CL.veloLila, border:`1px solid ${CL.linea}`, borderRadius:12, padding:"12px 16px", marginBottom:14, display:"flex", gap:12, alignItems:"center" }}>
            <span style={{ fontSize:18 }}>📍</span>
            <div>
              <p style={{ fontFamily:BODY, fontSize:13, color:CL.tinta, fontWeight:600, margin:0 }}>GPS registrado · Carcelén, Quito</p>
              <p style={{ fontFamily:BODY, fontSize:11, color:CL.grisTexto, margin:0 }}>Jornada iniciada · {new Date().toLocaleTimeString("es-EC",{hour:"2-digit",minute:"2-digit"})}</p>
            </div>
          </div>
        )}

        <div style={{ marginTop:"auto", textAlign:"center", padding:"15px", borderRadius:12,
          background: syncDone ? CL.tinta : "#fff", border: syncDone ? "none" : `1px solid ${CL.linea}` }}>
          <p style={{ fontFamily:SERIF, fontStyle:"italic", fontSize:14, fontWeight:600, margin:0, color: syncDone ? "#fff" : CL.grisTexto }}>
            {syncDone ? "Ingresando a su cuenta…" : "Sincronizando datos…"}
          </p>
        </div>
      </div>
    </div>
  );

  if (paso === "huella") return (
    <div style={{ background:CL.fondo, minHeight:"100%", display:"flex", flexDirection:"column" }}>
      <Franja titulo subtitulo="Acceso biométrico" />
      <div style={{ flex:1, padding:"24px 26px 28px", display:"flex", flexDirection:"column", alignItems:"center" }}>
        <div style={{ background:CL.papel, border:`1px solid ${CL.linea}`, borderRadius:14, padding:"18px 20px", width:"100%", boxSizing:"border-box", marginBottom:24 }}>
          <p style={{ fontFamily:SERIF, fontSize:17, fontWeight:700, color:CL.tinta, margin:"0 0 4px" }}>Registrar huella dactilar</p>
          <p style={{ fontFamily:BODY, fontSize:13, color:CL.grisTexto, margin:"0 0 16px", lineHeight:1.5 }}>Regístrela una vez para ingresar de forma rápida y segura en adelante.</p>
          {[
            ["Identidad verificada","Usuario y contraseña validados"],
            ["Registrar huella","Toque el sensor para registrar"],
            ["Acceso rápido activado","La próxima vez solo toque el sensor"],
          ].map(([tit,sub],i) => (
            <div key={i} style={{ display:"flex", gap:14, alignItems:"flex-start", padding:"10px 0", borderBottom: i<2 ? `1px solid ${CL.linea}` : "none" }}>
              <span style={{ fontFamily:SERIF, fontSize:13, fontWeight:800, color:CL.medio, width:18, flexShrink:0 }}>{i+1}</span>
              <div>
                <p style={{ fontFamily:BODY, fontSize:14, fontWeight:600, color:CL.tinta, margin:"0 0 1px" }}>{tit}</p>
                <p style={{ fontFamily:BODY, fontSize:12, color:CL.grisTenue, margin:0 }}>{sub}</p>
              </div>
            </div>
          ))}
        </div>
        <button onClick={simularHuella}
          style={{ width:96, height:96, borderRadius:"50%", border:`1px solid ${CL.linea}`, cursor: huellaEstado==="leyendo"?"not-allowed":"pointer", marginBottom:10,
            background: huellaEstado==="ok" ? CL.principal : huellaEstado==="leyendo" ? CL.ambarBg : "#fff",
            boxShadow: huellaEstado==="ok" ? `0 8px 28px ${CL.principal}55` : "0 4px 14px rgba(46,16,101,0.08)", transition:"all .3s" }}>
          <span style={{ fontSize:40 }}>{huellaEstado==="ok"?"✓":huellaEstado==="leyendo"?"·":"☉"}</span>
        </button>
        <p style={{ fontFamily:SERIF, fontStyle:"italic", fontSize:14, textAlign:"center", margin:"0 0 18px",
          color: huellaEstado==="ok" ? CL.okVerde : huellaEstado==="leyendo" ? CL.ambar : CL.grisTexto }}>
          {huellaEstado==="ok" ? "Huella registrada" : huellaEstado==="leyendo" ? "Leyendo huella…" : "Toque el sensor para registrar"}
        </p>
        {huellaEstado !== "ok" && (
          <button onClick={() => setPaso("sync")} style={{ background:"none", border:"none", fontFamily:BODY, fontSize:13, color:CL.grisTexto, cursor:"pointer", textDecoration:"underline", textUnderlineOffset:3 }}>
            Continuar sin huella
          </button>
        )}
      </div>
    </div>
  );

  const lineInput = (focused, color) => ({
    width:"100%", boxSizing:"border-box", background:"transparent",
    border:"none", borderBottom:`1.5px solid ${focused ? CL.medio : CL.linea}`,
    borderRadius:0, padding:"clamp(4px,0.9vh,8px) 30px clamp(4px,0.9vh,8px) 2px", fontSize:"clamp(13px,1.8vh,15px)", color,
    outline:"none", fontFamily:BODY, transition:"border-color .2s",
  });

  return (
    <div style={{ background:`linear-gradient(180deg, ${CL.principal} 0%, #15392B 100%)`, height:"100dvh", overflow:"hidden", display:"flex", flexDirection:"column" }}>
      <Franja titulo subtitulo="Conectamos el campo con tu negocio" />

      <div style={{ flex:1, minHeight:0, padding:"0 clamp(26px,8vw,44px)", marginTop:-14, position:"relative", zIndex:2, display:"flex", flexDirection:"column", justifyContent:"center" }}>
        <div style={{ background:CL.papel, borderRadius:16, padding:"clamp(10px,1.8vh,18px) 18px", boxShadow:"0 10px 30px rgba(46,16,101,0.10)", border:`1px solid ${CL.linea}`, maxHeight:"100%", overflowY:"auto" }}>

          <div style={{ display:"flex", justifyContent:"center", marginBottom:"clamp(2px,0.8vh,8px)" }}>
            <div style={{ width:"clamp(32px,4.8vh,46px)", height:"clamp(32px,4.8vh,46px)", borderRadius:"50%", background:"#EAF3ED", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"clamp(16px,2.4vh,22px)", color:CL.principal }}>{conClave ? "👤" : <HuellaIcono t={30} c="#15181B" g={1.5} marco />}</div>
          </div>
          <p style={{ fontFamily:SERIF, fontSize:"clamp(18px,2.6vh,23px)", fontWeight:700, color:CL.tinta, margin:"0 0 1px", textAlign:"center" }}>{conClave ? "Iniciar sesión" : (huellaReg && huellaReg.nombre ? "Hola, " + huellaReg.nombre.split(" ")[0] : "Bienvenido")}</p>
          <p style={{ fontFamily:BODY, fontSize:"clamp(11px,1.5vh,12.5px)", color:CL.grisTexto, margin:"0 0 clamp(8px,1.6vh,16px)", textAlign:"center" }}>{conClave ? "Ingrese sus credenciales para continuar" : "Usa tu huella o rostro para ingresar"}</p>

          {conClave && (<>
          <div style={{ marginBottom:"clamp(8px,1.6vh,14px)" }}>
            <label style={{ fontFamily:BODY, fontSize:"clamp(9.5px,1.3vh,11px)", fontWeight:600, color:CL.grisTenue, letterSpacing:"0.14em", textTransform:"uppercase", display:"block", marginBottom:1, paddingLeft:40 }}>Usuario</label>
            <div style={{ position:"relative" }}>
              <span style={{ position:"absolute", left:0, top:"50%", transform:"translateY(-50%)", width:"clamp(24px,3.4vh,30px)", height:"clamp(24px,3.4vh,30px)", borderRadius:"50%", background:"#EAF3ED", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"clamp(11px,1.6vh,13px)" }}>👤</span>
              <input type="text" value={usr}
                onFocus={() => setFocusField("usr")} onBlur={() => setFocusField(null)}
                onChange={e => {
                  const val = e.target.value.toUpperCase();
                  setUsr(val); setError("");
                  if (USUARIOS[val]) setTimeout(() => pwdRef.current && pwdRef.current.focus(), 80);
                }}
                onKeyDown={e => e.key === "Enter" && pwdRef.current && pwdRef.current.focus()}
                autoCapitalize="characters" autoCorrect="off" autoComplete="off" spellCheck="false"
                style={{ ...lineInput(focusField==="usr", usrColor), textTransform:"uppercase", letterSpacing:"0.04em", paddingLeft:40 }} />
            </div>
          </div>

          <div style={{ marginBottom:8 }}>
            <label style={{ fontFamily:BODY, fontSize:"clamp(9.5px,1.3vh,11px)", fontWeight:600, color:CL.grisTenue, letterSpacing:"0.14em", textTransform:"uppercase", display:"block", marginBottom:1, paddingLeft:40 }}>Contraseña</label>
            <div style={{ position:"relative" }}>
              <span style={{ position:"absolute", left:0, top:"50%", transform:"translateY(-50%)", width:"clamp(24px,3.4vh,30px)", height:"clamp(24px,3.4vh,30px)", borderRadius:"50%", background:"#EAF3ED", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"clamp(11px,1.6vh,13px)" }}>🔒</span>
              <input ref={pwdRef} type={verPwd?"text":"password"} value={pwd}
                onFocus={() => setFocusField("pwd")} onBlur={() => setFocusField(null)}
                onChange={e => { setPwd(e.target.value); setError(""); }}
                onKeyDown={e => e.key === "Enter" && handleLogin()}
                autoCapitalize="none" autoCorrect="off" autoComplete="current-password" spellCheck="false"
                style={{ ...lineInput(focusField==="pwd", pwdColor), paddingLeft:40 }} />
              <button onClick={() => setVerPwd(v=>!v)}
                style={{ position:"absolute", right:2, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", fontFamily:BODY, fontSize:11, fontWeight:600, color:CL.medio, padding:"12px 10px", letterSpacing:"0.05em" }}>
                {verPwd ? "OCULTAR" : "VER"}
              </button>
            </div>
          </div>

          {error && (
            <div style={{ background:"#fef2f2", borderLeft:`3px solid ${CL.error}`, borderRadius:"0 6px 6px 0", padding:"8px 12px", margin:"12px 0 0", display:"flex", gap:8, alignItems:"center" }}>
              <p style={{ fontFamily:BODY, fontSize:12.5, color:CL.error, fontWeight:500, margin:0 }}>{error}</p>
            </div>

          <div style={{ textAlign:"right", margin:"clamp(6px,1.2vh,12px) 0 clamp(8px,1.6vh,14px)" }}>
            <button style={{ background:"none", border:"none", fontFamily:BODY, fontSize:"clamp(11px,1.5vh,12.5px)", color:CL.medio, cursor:"pointer", padding:0, textDecoration:"underline", textUnderlineOffset:3 }}>¿Olvidó su contraseña?</button>
          </div>

          <button onClick={() => handleLogin(false)} disabled={cargando}
            style={{ width:"100%", background: cargando ? "#d9d2ec" : CL.tinta,
              border:"none", borderRadius:10, padding:"clamp(9px,1.6vh,13px)", fontFamily:SERIF, fontSize:"clamp(14px,2vh,16px)", fontWeight:700,
              letterSpacing:"0.03em", color: cargando ? CL.grisTexto : "#fff", cursor: cargando ? "not-allowed" : "pointer",
              boxShadow: cargando ? "none" : `0 8px 22px ${CL.tinta}30`, transition:"all .2s" }}>
            {cargando ? "Verificando…" : (<span style={{ display:"inline-flex", alignItems:"center", gap:10, justifyContent:"center" }}>
              <span style={{ display:"inline-flex", width:24, height:24, borderRadius:12, border:"2px solid #F2A900", alignItems:"center", justifyContent:"center", color:"#F2A900", fontSize:12, lineHeight:1 }}>→</span>
              Ingresar</span>)}
          </button>
          <p style={{ fontFamily:BODY, fontSize:"clamp(10px,1.3vh,11.5px)", color:CL.grisTenue, textAlign:"center", margin:"clamp(6px,1.2vh,10px) 0 0", lineHeight:1.4 }}>Al ingresar podrás registrar tu huella para las próximas veces.</p>
          <div style={{ textAlign:"center", marginTop:"clamp(6px,1.2vh,10px)" }}>
            <button onClick={() => { setConClave(false); setError(""); }}

          </div>
          </>)}



          {!conClave && (<>
          <button onClick={() => handleLogin(true)} disabled={cargando}
            style={{ width:"100%", background: cargando ? "#d9d2ec" : CL.tinta, border:"none",

              color: cargando ? CL.grisTexto : "#fff", cursor: cargando ? "not-allowed" : "pointer",
              display:"flex", alignItems:"center", justifyContent:"center", gap:12,
              boxShadow: cargando ? "none" : `0 8px 22px ${CL.tinta}30` }}>
            <span style={{ width:"clamp(30px,4.4vh,38px)", height:"clamp(30px,4.4vh,38px)", borderRadius:"50%", border:"2px solid #F2A900", display:"inline-flex", alignItems:"center", justifyContent:"center", color:"#F2A900", padding:4 }}><HuellaIcono t={19} c="#F2A900" g={2} /></span>
            {cargando ? "Verificando…" : "Ingresar con huella o rostro"}
          </button>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10, margin:"clamp(8px,1.5vh,12px) 0 0" }}>
            <span style={{ display:"inline-flex", alignItems:"center", gap:5, color:CL.grisTexto }}><HuellaIcono t={14} c={CL.grisTexto} g={2} /><span style={{ fontFamily:BODY, fontSize:"clamp(10px,1.3vh,11.5px)", fontWeight:600 }}>Huella</span></span>
            <span style={{ fontFamily:BODY, fontSize:"clamp(10px,1.3vh,11px)", color:CL.grisTenue, fontStyle:"italic" }}>o</span>
            <span style={{ display:"inline-flex", alignItems:"center", gap:5, color:CL.grisTexto }}><RostroIcono t={14} c={CL.grisTexto} g={2} /><span style={{ fontFamily:BODY, fontSize:"clamp(10px,1.3vh,11.5px)", fontWeight:600 }}>Rostro</span></span>
          </div>
          <p style={{ fontFamily:BODY, fontSize:"clamp(10px,1.3vh,11px)", color:CL.grisTenue, textAlign:"center", margin:"4px 0 0", lineHeight:1.4 }}>El teléfono usa la biometría que tengas configurada.</p>
          <div style={{ textAlign:"center", marginTop:"clamp(8px,1.6vh,14px)" }}>
            <button onClick={() => { setConClave(true); setError(""); }}

            {puedeHuellaReal() && huellaReg && (
              <div><button onClick={() => { try{localStorage.removeItem(HUELLA_KEY);}catch(e){}; setHuellaReg(null); setConClave(true); setError(""); }}
                style={{ background:"none", border:"none", fontFamily:BODY, fontSize:"clamp(11px,1.5vh,12px)", fontWeight:600, color:CL.grisTenue, cursor:"pointer", padding:"4px 6px 0", textDecoration:"underline", textUnderlineOffset:3 }}>¿No eres tú? Cambiar de cuenta</button></div>
            )}
          </div>
          {error && (
            <div style={{ background:"#fef2f2", borderLeft:`3px solid ${CL.error}`, borderRadius:"0 6px 6px 0", padding:"8px 12px", margin:"10px 0 0", display:"flex", gap:8, alignItems:"center" }}>
              <p style={{ fontFamily:BODY, fontSize:12.5, color:CL.error, fontWeight:500, margin:0 }}>{error}</p>
            </div>
          )}
          </>)}
        </div>

        <div style={{ textAlign:"center", padding:"clamp(6px,1.4vh,14px) 10px 4px" }}>
          <p style={{ fontFamily:BODY, fontSize:"clamp(10px,1.3vh,11.5px)", color:CL.grisTenue, margin:"0 0 3px" }}>
            Demostración — <strong style={{ color:CL.grisTexto, fontWeight:600 }}>VENDEDOR</strong> / <strong style={{ color:CL.grisTexto, fontWeight:600 }}>1234</strong>
          </p>
          <p style={{ fontFamily:BODY, fontSize:10.5, color:"rgba(255,255,255,0.55)", margin:0, letterSpacing:"0.04em" }}>v1.0.0 · © 2026 FREELANCE</p>
        </div>
      </div>
    </div>
  );
}
