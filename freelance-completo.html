  }
  T({titulo:"APLICACIÓN DEL PAGO", head:["FACTURA","VENCE","SALDO ANT.","APLICADO","SALDO REST.","ESTADO"],
     body:(d.facturas||[]).map(x=>[x.factura, x.vence||"—",
        {content:money(x.saldoAnt!=null?x.saldoAnt:x.aplicado),styles:R},
        {content:money(x.aplicado),styles:R},
        {content:money(x.saldoRest!=null?x.saldoRest:0),styles:R},
        (x.saldoRest!=null?x.saldoRest:0)<=0.004?"Cancelada":"Abonada"]),
     cols:{0:{cellWidth:33},1:{cellWidth:23},2:{halign:"right"},3:{halign:"right"},4:{halign:"right"},5:{cellWidth:22}}});
  const canc=(d.facturas||[]).filter(x=>(x.saldoRest!=null?x.saldoRest:0)<=0.004).length;
  const pend=Math.max(0,(f.nFacturas||0)-canc);
  const pv=d.proxVence;
  T({titulo:"RESUMEN FINANCIERO", body:[
    ["Saldo total anterior",{content:money(d.saldoAnterior||0),styles:R}],
    ["Pago recibido",{content:"-"+money(d.monto),styles:R}],
    [{content:"SALDO TOTAL ACTUAL",styles:TOT},{content:money(d.saldoActual||0),styles:{...R,...TOT}}],
    ["Facturas canceladas con este pago",{content:String(canc),styles:R}],
    ["Facturas que siguen pendientes",{content:String(pend),styles:R}],
  ].concat(pv?[["Próximo vencimiento",{content:money(pv.valor)+" · "+pv.vence,styles:R}]]:[]),
   cols:{0:{cellWidth:110}}});
  const obs=obsDe(d);
  if(obs.length) T({titulo:"OBSERVACIONES PARA VERIFICACIÓN", body:obs.map(o=>[o,(OBS_TXT[o]||"")]), cols:{0:{cellWidth:60,fontStyle:"bold"}}});
  const conFoto=(d.lineas||[]).filter(l=>l.foto);
  if(conFoto.length){
    if(y>195){ doc.addPage(); y=20; }
    doc.setFont("helvetica","bold"); doc.setFontSize(9.5); doc.setTextColor(...VERDE);

      if(y+62>280){ doc.addPage(); y=20; }
      const fmt=String(l.foto).startsWith("data:image/png")?"PNG":"JPEG";

      doc.setFont("helvetica","normal"); doc.setFontSize(7.6); doc.setTextColor(...GRIS);
      doc.text(P(l.modalidad+(l.dueno?" · dueño: "+l.dueno:"")+" · "+money(parseFloat(l.monto)||0)),x,y+59);
    });
    y+=66;
  }
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(...GRIS);
  if(d.hora) doc.text(P("Cobrado el 12 jun 2026 "+d.hora+" · "+(d.lugar||"")),105,279,{align:"center"});
  doc.text("Comprobante virtual · sujeto a verificación del proveedor · No constituye comprobante tributario",105,285,{align:"center"});
  if(conEC){
    doc.addPage(); y=20;
    const fmt=FORMATO_EC[d.cli]||"resumen";
    doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.setTextColor(...VERDE);
    doc.text("ESTADO DE CUENTA ACTUALIZADO",14,y); y+=6;
    doc.setFont("helvetica","normal"); doc.setFontSize(8.5); doc.setTextColor(...GRIS);
    doc.text(P(d.cli+" · después del "+d.nRecibo),14,y); y+=8;
    const rest={}; (d.facturas||[]).forEach(x=>{ rest[x.factura]=(x.saldoRest!=null?x.saldoRest:0); });
    const fs=factsDe(d.cli).map(x=>({...x, saldo: rest[x.factura]!=null ? rest[x.factura] : x.valor})).filter(x=>x.saldo>0.004);
    const tot=r2c(fs.reduce((s,x)=>s+x.saldo,0));
    if(fmt==="calendario"){
      T({head:["VENCE","VALOR"], body:fs.map(x=>[x.vence,{content:money(x.saldo),styles:R}])
        .concat([[{content:"TOTAL",styles:TOT},{content:money(tot),styles:{...R,...TOT}}]]), cols:{1:{halign:"right",cellWidth:44}}});
    } else if(fmt==="simple"){
      T({body:[["Saldo pendiente",{content:money(tot),styles:{...R,fontStyle:"bold"}}]]
        .concat(fs[0]?[["Próximo vencimiento",{content:money(fs[0].saldo)+" · "+fs[0].vence,styles:R}]]:[]), cols:{0:{cellWidth:110}}});
    } else {
      T({head:["FACTURA","VENCE","SALDO"], body:fs.map(x=>[x.factura,x.vence,{content:money(x.saldo),styles:R}])
        .concat([[{content:"TOTAL PENDIENTE",colSpan:2,styles:{...R,...TOT}},{content:money(tot),styles:{...R,...TOT}}]]),
        cols:{2:{halign:"right",cellWidth:34}}});
    }
    doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(...GRIS);
    doc.text("Documento informativo · FREELANCE · No constituye comprobante tributario",105,285,{align:"center"});
  }
  const nombre=tipoComprobante(d)+" "+d.nRecibo+".pdf";
  return {doc, blob:doc.output("blob"), nombre};
}

/* ══ ENVÍO DEL COMPROBANTE ══
   Fase actual: ENVÍO ASISTIDO con el menú nativo del teléfono (Web Share API).
   El navegador NO puede confirmar que el mensaje se envió ni elegir el contacto: por eso
   nunca se afirma "Enviado", solo se reportan los estados verificables.
   Fase 4 (preparado, sin implementar): CANAL_ENVIO="cloud_api" → el servidor despacha el PDF
   a cada destinatario con WhatsApp Business Platform (Cloud API). La UI no cambia. */
const CANAL_ENVIO = "asistido";                 // "asistido" | "cloud_api" (Fase 4)
const ENVIO = { PDF:"pdf_generado", ABIERTO:"compartir_abierto", DESCARGA:"pdf_descargado",
                NO_VERIFICABLE:"envio_no_verificable", ERROR:"error" };
async function enviarPorCloudAPI(){ /* Fase 4: Edge Function → Meta Cloud API */ return {ok:false, motivo:"CANAL_NO_DISPONIBLE"}; }
async function enviarComprobante(d, texto, tel, toast, onEstado){
  const paq = pdfComprobante(d, true, toast);   /* PDF único: parte A comprobante + parte B estado de cuenta ★ del cliente */
  if(!paq) return;
  const fmt = FORMATO_EC[d.cli] || "resumen";
  onEstado && onEstado({paso:ENVIO.PDF, fmt});
  if(CANAL_ENVIO==="cloud_api"){
    const r=await enviarPorCloudAPI(d, paq.blob, texto, tel);
    onEstado && onEstado({paso: r.ok?"enviado_servidor":ENVIO.ERROR, fmt});
    return;
  }
  const archivo=new File([paq.blob], paq.nombre, {type:"application/pdf"});
  if(navigator.canShare && navigator.canShare({files:[archivo]})){
    try{
      await navigator.share({files:[archivo], title:tipoComprobante(d)+" · "+d.cli, text:texto});
      onEstado && onEstado({paso:ENVIO.NO_VERIFICABLE, fmt});   // se abrió y se eligió destino: el envío no es verificable desde el navegador
    }catch(err){
      onEstado && onEstado({paso:ENVIO.ABIERTO, fmt});          // el usuario cerró el menú de compartir
    }
    return;
  }
  /* respaldo: descargar el PDF y abrir el chat con el mensaje, con instrucción clara */
  paq.doc.save(paq.nombre);
  onEstado && onEstado({paso:ENVIO.DESCARGA, fmt, archivo:paq.nombre});
  if(tel){
    const wa=String(tel).replace(/\D/g,"").replace(/^0/,"593");
    window.open("https://wa.me/"+wa+"?text="+encodeURIComponent(texto),"_blank");
  }
  toast && toast("PDF descargado. Adjúntalo con el clip 📎 en el chat de WhatsApp.");
}

function Cobros({toast, cobroInicial, onConsumir, go}){
  const [paso,setPaso]=useState(1);
  const [cli,setCli]=useState(null);
  const [prov,setProv]=useState(null);
  const [aplic,setAplic]=useState({});
  const [lineas,setLineas]=useState([]);
  const [modal,setModal]=useState(null);
  const [enviado,setEnviado]=useState(null);  // datos del recibo enviado
  const [resumen,setResumen]=useState(false); // pantalla de revisión antes de guardar
  const [facUnica,setFacUnica]=useState(null); // si viene de Cartera: solo esta factura
  const [facExterna,setFacExterna]=useState(null); // factura traída de Cartera (puede no estar en COBROS_INI)
  const [verDia,setVerDia]=useState(false);         // cuadre de caja del día
  const [verEfe,setVerEfe]=useState(false);         // vista enfocada: efectivo por depositar
  const [tabCie,setTabCie]=useState("resumen");     // cierre: resumen | detalle | recibos | hist
  const [diaHist,setDiaHist]=useState(null);        // cierre histórico abierto (null = hoy)
  const [expProv,setExpProv]=useState(null);        // proveedor desplegado
  const [menuRec,setMenuRec]=useState(null);        // menú ⋮ de un recibo
  const [cerrando,setCerrando]=useState(false);
  useModal(cerrando, React.useCallback(()=>setCerrando(false),[]));     // confirmación de cierre con pendientes
  const [motivoCie,setMotivoCie]=useState("");
  const [histPag,setHistPag]=useState(1);           // paginación del historial (regla de oro)
  React.useEffect(()=>{  /* corte automático a la hora acordada: nadie tiene que acordarse de cerrar */
    const c=correrCorteAutomatico();
    if(c.length){ setTick(t=>t+1);
      toast(`Corte automático (${CONFIG_CIERRE.hora}): se cerró ${c.join(", ")} · sin confirmar por el cobrador`); }
  },[]);
  const [anulando,setAnulando]=useState(null);

  const [motivoAnu,setMotivoAnu]=useState("");

  const [previa,setPrevia]=useState(false);         // vista previa del comprobante antes de compartir
  const [envio,setEnvio]=useState(null);            // trazabilidad honesta del envío asistido
  const [tick,setTick]=useState(0);                 // refresco tras mutar registros del día
  useRetroceso(()=>{ /* retroceso inteligente: jerarquía interna del módulo */
      if(modal){ setModal(null); return true; }
      if(anulando){ setAnulando(null); return true; }
      if(depEf!=null){ setDepEf(null); return true; }
      if(resumen){ setResumen(false); return true; }
      if(verDia){
        if(menuRec){ setMenuRec(null); return true; }
        if(cerrando){ setCerrando(false); return true; }
        if(diaHist){ setDiaHist(null); setTabCie("hist"); return true; }
        setVerDia(false); setTabCie("resumen"); return true;
      }
      if(verEfe){ setVerEfe(false); return true; }
      if(previa){ setPrevia(false); return true; }
      if(enviado){ setEnviado(null); setResumen(false); setPrevia(false); setEnvio(null); reset(); return true; }
      if(paso>1){ setPaso(paso-1); return true; }
      if(cli){ reset(); return true; }
      return false;
  });

  React.useEffect(()=>{
    if(!cobroInicial) return;
    const fc = cobroInicial; // objeto factura de Cartera
    if(fc.fac && fc.cli){
      const pv = PROVEEDORES.find(p=>p.nombre===fc.proveedor) || PROVEEDORES.find(p=>p.id===fc.provId) || null;
      const saldo = typeof fc.saldo==="number" ? fc.saldo : saldoRealFactura(fc.fac, fc.saldoBase||0);

      setAplic({[idFac]: String(saldo)});
      setLineas([]);
      setPaso(pv?2:1); // si hay proveedor, directo a montos; si no, deja elegir
      if(onConsumir) onConsumir();
      return;
    }
    if(fc.cli){ // solo cliente
      setCli(fc.cli); setProv(null); setFacUnica(null); setFacExterna(null); setAplic({}); setLineas([]); setPaso(1);
    }
    if(onConsumir) onConsumir();
  },[cobroInicial]);

  const reset=()=>{setPaso(1);setCli(null);setProv(null);setAplic({});setLineas([]);setFacUnica(null);setFacExterna(null);};
  const provsDelCliente = cli
    ? PROVEEDORES.filter(pv => (facExterna && facExterna.cli===cli && facExterna.provId===pv.id) || COBROS_INI.some(c=>c.cli===cli && c.provId===pv.id)) : [];

    ? ( facExterna && facExterna.cli===cli && facExterna.provId===prov.id

        : COBROS_INI.filter(c=>c.cli===cli && c.provId===prov.id && (!facUnica || c.factura===facUnica))
            .map(c=>({...c, valor:saldoRealFactura(c.factura, c.valor)})) )
    : [];

  const setAplicado=(id,v)=>setAplic({...aplic,[id]:v});

  const sobregiro = facturas.some(f=>(parseFloat(aplic[f.id])||0) > f.valor);

  const totalLineas = lineas.reduce((s,l)=>s+(parseFloat(l.monto)||0),0);

  const PASOS=["Datos del cobro","Facturas y montos","Formas de pago"];

  const paso2Ok = factSel.length>0 && !sobregiro && monto>0;
  const paso3Ok = restanteLineas===0 && lineas.length>0;

  /* Recibo impreso: PDF de 2 páginas (ORIGINAL · Cliente / COPIA · Vendedor) con firmas */
  const pdfRecibo=(datos, virtual=false)=>{
    if(!window.jspdf){ toast("El generador de PDF aún está cargando; intenta de nuevo"); return; }
    const pdfTxt=t=>String(t).replace(/―/g,"-").replace(/…/g,"...").replace(/[\u{1F300}-\u{1FAFF}\u2600-\u27BF\uFE0F]/gu,"").trim();
    const doc=new window.jspdf.jsPDF();
    const VERDE=[21,57,43], GRIS=[110,120,110], CREMA=[244,240,229];
    const R={halign:"right"}, TOTROW={fillColor:CREMA,fontStyle:"bold"};
    const pagina=(tipo)=>{
      doc.setFont("helvetica","bold"); doc.setFontSize(16); doc.setTextColor(...VERDE); doc.text("FREELANCE",14,18);
      doc.setFontSize(8.5); doc.setFont("helvetica","bold"); doc.setTextColor(...GRIS);
      doc.text(tipo,196,14,{align:"right"});
      doc.setFont("helvetica","normal"); doc.text("12 jun 2026",196,19,{align:"right"});
      doc.setFontSize(12); doc.setFont("helvetica","bold"); doc.setTextColor(30,30,30);
      doc.text(pdfTxt(`RECIBO DE COBRO N° ${datos.nRecibo}`),14,28);
      doc.setFontSize(10); doc.setFont("helvetica","normal");
      doc.text(pdfTxt(`Cliente: ${datos.cli}`),14,36);
      doc.text(pdfTxt(`Proveedor: ${datos.prov}   ·   Cobra: Daniel Ríos (Freelance)`),14,41);
      doc.setDrawColor(...VERDE); doc.setLineWidth(.6); doc.line(14,45,196,45);
      let y=51;
      const T=(def)=>{
        if(def.titulo){ doc.setFont("helvetica","bold"); doc.setFontSize(9.5); doc.setTextColor(...VERDE);
          doc.text(pdfTxt(def.titulo),14,y+4); y+=6.5; }
        const limpia=c=> typeof c==="object" && c!==null ? {...c, content:pdfTxt(c.content)} : pdfTxt(c);
        doc.autoTable({ startY:y, margin:{left:14,right:14}, theme:"grid",
          styles:{font:"helvetica",fontSize:9,cellPadding:2.3,textColor:[30,30,30],lineColor:[196,202,194],lineWidth:0.25},
          headStyles:{fillColor:VERDE,textColor:255,fontStyle:"bold"},
          head:def.head?[def.head]:undefined, body:def.body.map(r=>r.map(limpia)), columnStyles:def.cols||{} });
        y=doc.lastAutoTable.finalY+6;
      };
      T({titulo:"FACTURAS APLICADAS", head:["FACTURA","ESTADO","COBRADO"],
         body:datos.facturas.map(f=>[f.factura, f.estado==="cancelada"?"Cancelada":"Abonada", {content:money(f.aplicado),styles:R}]),
         cols:{2:{halign:"right",cellWidth:36}}});
      T({titulo:"FORMAS DE PAGO", head:["FORMA","DETALLE","VALOR"],
         body:datos.lineas.map(l=>[l.modalidad,
             `${l.numero||"—"} · ${l.banco||"—"} · ${l.fecha||"—"}`,
             {content:money(parseFloat(l.monto)||0),styles:R}])
           .concat([[{content:"TOTAL COBRADO",colSpan:2,styles:{...R,...TOTROW}},{content:money(datos.monto),styles:{...R,...TOTROW}}]]),
         cols:{2:{halign:"right",cellWidth:36}}});
      /* firmas */
      const yF=Math.max(y+22, 240);
      doc.setDrawColor(120,120,120); doc.setLineWidth(.35);
      doc.line(22,yF,92,yF); doc.line(118,yF,188,yF);
      doc.setFontSize(9); doc.setTextColor(...GRIS);
      doc.text("Recibí conforme · Cliente",57,yF+5,{align:"center"});
      doc.text("Entregué · Cobrador",153,yF+5,{align:"center"});
      doc.setFontSize(8);
      if(datos.hora) doc.text(pdfTxt(`Cobrado el 12 jun 2026 ${datos.hora} · ${datos.lugar||""}`),105,280,{align:"center"});
      doc.text("Documento informativo · FREELANCE · La comisión se libera cuando el proveedor valida el cobro",105,285,{align:"center"});
    };
    if(virtual){
      pagina("COPIA VIRTUAL");             /* el recibo virtual va en una sola copia */
    } else {
      pagina("ORIGINAL · CLIENTE");        /* el impreso va por duplicado */
      doc.addPage();
      pagina("COPIA · VENDEDOR");
    }
    const archivo=new File([doc.output("blob")],`Recibo ${datos.nRecibo}${virtual?" (copia virtual)":""}.pdf`,{type:"application/pdf"});
    if(navigator.canShare && navigator.canShare({files:[archivo]})){
      navigator.share({files:[archivo], title:`Recibo ${datos.nRecibo}`}).catch(()=>{});
    } else { doc.save(`Recibo ${datos.nRecibo}.pdf`); toast("Recibo descargado (original + copia)."); }
  };

  /* sello de lugar: se pide al abrir el resumen y se usa al guardar (anti-disputas) */
  const geoRef=React.useRef(null);
  React.useEffect(()=>{
    if(resumen && navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        p=>{ geoRef.current=`${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`; },
        ()=>{}, {timeout:4000, maximumAge:120000});
    }
  },[resumen]);

  /* Guardar, imprimir y enviar: todo con un solo botón desde el resumen */
  const guardarTodo=()=>{
    const nRecibo="REC-260612-"+String(Math.floor(1000+Math.random()*9000));
    const ahora=new Date();
    const hora=String(ahora.getHours()).padStart(2,"0")+":"+String(ahora.getMinutes()).padStart(2,"0");
    const lugar=geoRef.current||"Ubicación no disponible";
    const facturasRecibo = factSel.map(f=>{
      const ap=r2c(parseFloat(aplic[f.id])||0);
      const rest=r2c(Math.max(0,f.valor-ap));
      return {factura:f.factura, vence:f.vence, aplicado:ap, saldoAnt:f.valor, saldoRest:rest,
        estado: rest<=0.004?"cancelada":"abonada"};
    });
    const saldoAnterior = carteraDe(cli).total;
    const saldoActual   = r2c(Math.max(0, saldoAnterior - monto));  /* nunca negativo */
    const proxVence     = proxVencDe(cli);
    const datos={
      nRecibo, cli, prov:prov.nombre, monto,
      facturas:facturasRecibo, lineas,
      saldoAnterior, saldoActual, proxVence,
      destinatarios:[
        {rol:"Cliente", nombre:cli},
        {rol:"Proveedor", nombre:prov.nombre},
        ...DESTINATARIOS_RECIBO.map(d=>({rol:d.rol, nombre:d.nombre+(d.tel?` · ${d.tel}`:"")}))
      ]
    };
    datos.hora=hora; datos.lugar=lugar;
    /* cuadre del día + efectivo pendiente de depósito (regla 24h) */
    const formas={}; lineas.forEach(l=>{ formas[l.modalidad]=(formas[l.modalidad]||0)+(parseFloat(l.monto)||0); });
    COBROS_DIA.push({nRecibo, cli, monto, hora, formas, lugar, anulado:false,
      facturas:datos.facturas, lineas, prov:prov.nombre});
    if(formas["Efectivo"]>0) EFECTIVO_PENDIENTE.push({nRecibo, cli, monto:formas["Efectivo"], limite:`hoy ${hora} + 24h`});
    pdfRecibo(datos);
    setEnviado(datos);
    setResumen(false);
  };
  const puedeAvanzar = paso===1?paso1Ok : paso===2?paso2Ok : paso3Ok;

  if(enviado){
    const e=enviado;
    const titulo=tipoComprobante(e);
    const obs=obsDe(e);
    const fc=FICHA_CLIENTE[e.cli]||{};
    /* ENVÍO ASISTIDO: mensaje + PDF único (comprobante + estado de cuenta ★ del cliente) */
    const enWhats=()=>enviarComprobante(e, textoCobroWA(e), fc.tel, toast, setEnvio);
    const FMT_TXT={simple:"Simple",resumen:"Resumen",factura:"Por factura",calendario:"Calendario",cuenta:"Cta. corriente",liq:"Liquidación"};

    if(previa){ /* vista previa: el mismo comprobante que recibe el cliente */
      return (<>
        <div className="h1">{titulo}</div>
        <div className="sub">Vista previa · así lo recibe el cliente</div>
        <div className="recibo" style={{marginTop:12}}>
          <div className="rh">
            <div className="rt" style={{fontSize:15}}>{e.prov}</div>
            <div className="rmonto num">{money(e.monto)}</div>
            <div className="meta" style={{marginTop:4}}>{e.nRecibo} · 12 jun 2026 {e.hora||""}</div>
            <div className="meta" style={{marginTop:3,color:"var(--maize-deep)",fontWeight:700}}>{estadoReporte()}</div>
          </div>
          <div className="rsec">Cliente</div>
          <div className="rrow"><span className="rk">{e.cli}</span><span className="meta">RUC {rucMask(fc.ruc)}</span></div>
          <div className="rrow"><span className="rk">Atendido por</span><span className="meta">Daniel Ríos · Freelance</span></div>
          <div className="rsec">Resumen del pago</div>
          {e.lineas.map((l,i)=>(
            <div className="rrow" key={i} style={{alignItems:"center"}}>
              <span className="rk" style={{display:"flex",alignItems:"center",gap:8}}>
                {l.foto && <img src={l.foto} alt="ev." style={{width:32,height:24,objectFit:"cover",borderRadius:5,border:"1px solid var(--line)"}}/>}
                {l.modalidad}{l.banco?" · "+l.banco:""}{l.numero?" · "+l.numero:""}{l.dueno?" · dueño: "+l.dueno:""}
              </span>
              <span className="num" style={{fontWeight:600}}>{money(parseFloat(l.monto)||0)}</span>
            </div>
          ))}
          <div className="rsec">Aplicación del pago</div>
          {e.facturas.map((f,i)=>(
            <div className="rrow" key={i}>
              <span className="rk">Factura {f.factura}
                <span className="meta" style={{display:"block"}}>Saldo ant. {money(f.saldoAnt||0)} → resta {money(f.saldoRest||0)} · {(f.saldoRest||0)<=0.004?"Cancelada":"Abonada"}</span>
              </span>
              <span className="num" style={{fontWeight:600}}>{money(f.aplicado)}</span>
            </div>
          ))}
          <div className="rsec">Resumen financiero</div>
          <div className="rrow"><span className="rk">Saldo anterior</span><span className="num">{money(e.saldoAnterior||0)}</span></div>
          <div className="rrow"><span className="rk">Pago recibido</span><span className="num">-{money(e.monto)}</span></div>
          <div className="rrow"><span className="rk" style={{fontWeight:800}}>Saldo actual</span>
            <span className="num" style={{fontWeight:800,color:(e.saldoActual||0)<=0.004?"var(--ok)":"var(--field)"}}>{money(e.saldoActual||0)}</span></div>
          {e.proxVence && (e.saldoActual||0)>0.004 &&
            <div className="rrow"><span className="rk">Próximo vencimiento</span><span className="meta">{money(e.proxVence.valor)} · {e.proxVence.vence}</span></div>}
          {obs.length>0 && (<>
            <div className="rsec">Observaciones</div>
            {obs.map(o=>(<div className="rrow" key={o}><span className="rk" style={{fontSize:12.5}}>{OBS_TXT[o]||o}</span></div>))}
          </>)}
        </div>
        <button className="cta" style={{marginTop:12}} onClick={enWhats}>💬 Compartir por WhatsApp (comprobante + estado de cuenta)</button>
        <button className="ghost" style={{width:"100%",marginTop:8}} onClick={()=>setPrevia(false)}>‹ Volver</button>
      </>);
    }

    return (<>
      <div className="recibo">
        <div className="rh">
          <div className="chk-big">✓</div>
          <div className="rt">{titulo}</div>
          <div className="rmonto num">{money(e.monto)}</div>
          <div className="meta" style={{marginTop:4}}>{e.cli} · {e.prov}</div>
          {e.nRecibo && <div className="meta" style={{marginTop:2,fontWeight:700}}>{e.nRecibo}</div>}
          <div style={{marginTop:6,display:"inline-block",background:"#FBF3DC",color:"var(--maize-deep)",
            fontWeight:700,borderRadius:20,padding:"4px 12px",fontSize:11.5}}>{estadoReporte()}</div>
        </div>
        <div className="rsec">Facturas aplicadas</div>
        {e.facturas.map((f,i)=>(
          <div className="rrow" key={i}>
            <span className="rk">Factura {f.factura}
              <span className="meta" style={{display:"block"}}>{(f.saldoRest||0)<=0.004?"Cancelada":"Abonada · resta "+money(f.saldoRest||0)}</span>
            </span>
            <span className="num" style={{fontWeight:600}}>{money(f.aplicado)}</span>
          </div>
        ))}
        <div className="rsec">Saldo del cliente</div>
        <div className="rrow"><span className="rk">Antes</span><span className="num">{money(e.saldoAnterior||0)}</span></div>
        <div className="rrow"><span className="rk" style={{fontWeight:800}}>Ahora</span>
          <span className="num" style={{fontWeight:800,color:(e.saldoActual||0)<=0.004?"var(--ok)":"var(--field)"}}>{money(e.saldoActual||0)}</span></div>
        {obs.length>0 && (<>
          <div className="rsec">Observaciones para verificación</div>
          {obs.map(o=>(<div className="rrow" key={o}><span className="rk" style={{fontSize:12.5}}>{OBS_TXT[o]||o}</span></div>))}
        </>)}
      </div>

      <button className="cta" style={{marginTop:12}} onClick={enWhats}>💬 Compartir por WhatsApp</button>
      <div className="meta" style={{textAlign:"center",margin:"7px 0 2px",fontSize:11.5}}>
        Un solo PDF: comprobante + estado de cuenta ({FMT_TXT[FORMATO_EC[e.cli]||"resumen"]}), con el mensaje al cliente</div>

      {envio && (
        <div className="card" style={{padding:"12px 15px",marginTop:10}}>
          <div className="rrow" style={{padding:"3px 0"}}>
            <span className="rk" style={{color:"var(--ok)"}}>✓ PDF generado</span>
            <span className="meta">comprobante + estado de cuenta ({FMT_TXT[envio.fmt]||envio.fmt})</span>
          </div>
          {envio.paso===ENVIO.DESCARGA ? (<>
            <div className="rrow" style={{padding:"3px 0"}}><span className="rk" style={{color:"var(--ok)"}}>✓ PDF descargado</span>
              <span className="meta">{envio.archivo}</span></div>
            <div className="meta" style={{marginTop:6,color:"var(--maize-deep)"}}>Este navegador no puede compartir archivos: abre el chat del cliente y adjunta el PDF descargado con el clip 📎.</div>
          </>) : (<>
            <div className="rrow" style={{padding:"3px 0"}}><span className="rk" style={{color:"var(--ok)"}}>✓ Menú de compartir abierto</span>
              <span className="meta">elige WhatsApp y el contacto</span></div>
            <div className="meta" style={{marginTop:6,color:"var(--maize-deep)"}}>
              El envío no se puede confirmar desde el navegador: revisa en WhatsApp que el mensaje salió. En Fase 4 el despacho será automático desde el servidor.</div>
          </>)}
        </div>
      )}

      <div className="rsec" style={{marginLeft:4}}>Copias previstas del comprobante</div>
      <div className="enviados">
        {e.destinatarios.map((d,i)=>(
          <div className="enviado" key={i}>
            <span className="wa" style={{background:"#EFEBE0",color:"var(--muted)"}}>·</span>
            <div><div className="who-r">{d.rol}</div><div className="num-r">{d.nombre}</div></div>
            <span className="est-r" style={{color:"var(--muted)"}}>Pendiente</span>
          </div>
        ))}
      </div>
      <div className="meta" style={{margin:"6px 4px 0",fontSize:11.5}}>El despacho automático a cada destinatario llega en Fase 4 (WhatsApp Business Cloud API). Hoy el envío es asistido: uno por uno desde el menú de compartir.</div>

      <button className="ghost" style={{width:"100%",marginTop:12}} onClick={()=>setPrevia(true)}>📄 Ver comprobante</button>
      <button className="ghost" style={{width:"100%",marginTop:8}} onClick={()=>pdfRecibo(e)}>🖨️ Imprimir recibo (original + copia)</button>
      <button className="ghost" style={{width:"100%",marginTop:8}} onClick={()=>{setEnviado(null);setResumen(false);setPrevia(false);setEnvio(null);reset();}}>Finalizar</button>
    </>);
  }

  /* ── Efectivo por depositar: vista enfocada (regla 24h) ── */
  if(verEfe){
    const tot=EFECTIVO_PENDIENTE.reduce((s,e)=>s+e.monto,0);
    return (<>
      <div className="h1">Efectivo por depositar</div>
      <div className="sub">Regla: el efectivo se deposita en máximo 24 horas</div>
      <div className="montobox" style={{margin:"12px 0 14px",padding:"13px 16px",border:"1.5px solid var(--maize-deep)"}}>
        <div className="row" style={{justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:800,fontSize:13.5,color:"var(--maize-deep)"}}>⏱️ PENDIENTE DE DEPÓSITO</span>
          <b className="num" style={{fontSize:22,fontWeight:800,color:"var(--maize-deep)"}}>{money(tot)}</b>
        </div>
      </div>
      {EFECTIVO_PENDIENTE.length===0
        ? <div className="ph">No hay efectivo pendiente. Todo depositado ✓</div>
        : EFECTIVO_PENDIENTE.map((e,i)=>(
            <div key={e.nRecibo} style={{borderBottom:"1px solid var(--line)",padding:"11px 2px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:10}}>
                <span style={{fontWeight:700,fontSize:14,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.cli}</span>
                <b className="num" style={{whiteSpace:"nowrap",color:"var(--maize-deep)"}}>{money(e.monto)}</b>
              </div>
              <div className="meta" style={{margin:"2px 0 9px"}}>{e.nRecibo} · límite {e.limite}</div>
              <button className="ghost" style={{width:"100%",padding:"9px",fontSize:13}} onClick={()=>setDepEf(i)}>Registrar depósito</button>
            </div>
          ))}
      <button className="ghost" style={{width:"100%",marginTop:14}} onClick={()=>{setVerEfe(false);setVerDia(true);}}>📊 Ver el cuadre del día</button>
      {depEf!=null && (
        <LineaPago modalidad="Depósito" restante={EFECTIVO_PENDIENTE[depEf] ? EFECTIVO_PENDIENTE[depEf].monto : 0} cliente={EFECTIVO_PENDIENTE[depEf] ? EFECTIVO_PENDIENTE[depEf].cli : null}
          onCancel={()=>setDepEf(null)}
          onSave={l=>{
            const e=EFECTIVO_PENDIENTE[depEf];
            const v=parseFloat(l.monto)||0;
            DEPOSITOS_EFECTIVO.push({nRecibo:e.nRecibo, cli:e.cli, monto:v, banco:l.banco, numero:l.numero, fecha:l.fecha, foto:l.foto});
            toast(`Depósito de ${money(v)} registrado: efectivo de ${e.cli} conciliado ✓ (auditado)`);
            EFECTIVO_PENDIENTE.splice(depEf,1);
            setDepEf(null); setTick(t=>t+1);
          }}/>
      )}
    </>);
  }

  /* ══ CIERRE DIARIO DE COBROS ══  4 pestañas: Resumen · Detalle · Recibos · Historial
     Cálculos: total cobrado = recibos no anulados · bancarizado = depósitos + transferencias + efectivo
     ya depositado · pendiente = efectivo sin depositar · el cheque NO es bancarizado (título posfechado). */
  if(verDia){
    const soloLect = !!diaHist;                                  // el histórico es consulta, no acción
    const dia      = diaHist || {fecha:"2026-06-12", fechaTxt:"12 jun 2026", recibos:COBROS_DIA,
                                 estado:CIERRE_HOY.estado, cerradoEn:CIERRE_HOY.cerradoEn, obs:CIERRE_HOY.obs};
    const recibos  = dia.recibos || [];
    const activos  = recibos.filter(r=>!r.anulado);
    const total    = activos.reduce((s,r)=>s+r.monto,0);
    const FORMAS   = ["Transferencia","Depósito","Efectivo","Cheque"];
    const porForma = {}; activos.forEach(r=>Object.entries(r.formas||{}).forEach(([f,v])=>{ porForma[f]=(porForma[f]||0)+v; }));
    const efeRecib = porForma["Efectivo"]||0;
    const efePend  = soloLect ? (dia.efePend||0) : EFECTIVO_PENDIENTE.reduce((s,e)=>s+e.monto,0);
    const efeDep   = Math.max(0, efeRecib-efePend);
    const bancar   = (porForma["Transferencia"]||0) + (porForma["Depósito"]||0) + efeDep;
    const enManos  = efePend + (porForma["Cheque"]||0);
    const auto     = dia.estado==="cerrado_auto";
    const cerrado  = dia.estado==="cerrado" || dia.estado==="cerrado_obs" || auto;
    const confirm  = soloLect ? (dia.confirmado||dia.estado==="cerrado"||dia.estado==="cerrado_obs") : CIERRE_HOY.confirmado;
    const estadoTxt = auto ? (confirm?"Cerrado automáticamente · confirmado":"Cerrado automáticamente · sin confirmar")
                     : cerrado ? (dia.estado==="cerrado_obs" ? "Cerrado con pendientes" : "Cerrado")
                     : activos.length===0 ? "En progreso"
                     : efePend>0 ? "Pendiente de depósito" : "Listo para cerrar";
    const tono = auto ? (confirm?"#2E7D52":"#C98A2B")
               : cerrado ? (dia.estado==="cerrado_obs" ? "#C98A2B" : "#2E7D52")
               : efePend>0 ? "#C98A2B" : activos.length===0 ? "#8B9490" : "#2E7D52";

    const chip=(txt,color)=>(<span style={{display:"inline-block",background:color+"1A",color,fontWeight:700,
      borderRadius:20,padding:"3px 10px",fontSize:11}}>{txt}</span>);
    const KPI=({t,v,c})=>(
      <div style={{background:"var(--card)",border:"1px solid var(--line)",borderRadius:14,padding:"11px 12px"}}>
        <div className="meta" style={{fontSize:10.5,fontWeight:700,textTransform:"uppercase",letterSpacing:".03em"}}>{t}</div>
        <div className="num" style={{fontSize:18,fontWeight:800,marginTop:3,color:c||"var(--field)"}}>{v}</div>
      </div>
    );
    const cerrarJornada=(motivo)=>{
      CIERRE_HOY.confirmado = true;             /* el cobrador confirma su cuadre */
      CIERRE_HOY.estado = efePend>0 ? "cerrado_obs" : "cerrado";
      CIERRE_HOY.cerradoEn = new Date().toTimeString().slice(0,5);
      CIERRE_HOY.obs = motivo||null;
      CIERRE_HOY.au = "AU-260612-"+Math.floor(1000+Math.random()*9000);
      setCerrando(false); setMotivoCie(""); setTick(t=>t+1);
      toast(efePend>0
        ? `Jornada cerrada CON PENDIENTES · ${money(efePend)} sin depositar · auditado ${CIERRE_HOY.au}`
        : `Jornada cerrada sin pendientes ✓ · auditado ${CIERRE_HOY.au}`);
    };
    const anular=()=>{
      if(!motivoAnu.trim()){ toast("El motivo de anulación es obligatorio"); return; }
      anulando.anulado=true; anulando.motivo=motivoAnu.trim();
      const i=EFECTIVO_PENDIENTE.findIndex(e=>e.nRecibo===anulando.nRecibo);
      if(i>-1) EFECTIVO_PENDIENTE.splice(i,1);
      toast(`Recibo ${anulando.nRecibo} anulado con autorización del Freelance · auditado AU-260612-${Math.floor(1000+Math.random()*9000)}`);
      setAnulando(null); setMotivoAnu(""); setTick(t=>t+1);
    };
    const verRecibo=(r)=>{ setMenuRec(null); setEnviado(r); setPrevia(true); };
    const compartirRecibo=(r)=>{ setMenuRec(null); const f=FICHA_CLIENTE[r.cli]||{}; enviarComprobante(r, textoCobroWA(r), f.tel, toast, setEnvio); };

    return (<>
      <div className="h1">Cierre diario de cobros</div>
      <div className="sub">{dia.fechaTxt} · {activos.length} recibo{activos.length!==1?"s":""} · {chip(estadoTxt,tono)}</div>
      {soloLect && <div className="meta" style={{margin:"8px 2px 0",color:"var(--maize-deep)"}}>Consulta del histórico: no se registran acciones sobre días cerrados.</div>}

      <div className="nchips" style={{flexWrap:"wrap",marginTop:12}}>
        {[["resumen","Resumen"],["detalle","Detalle"],["recibos","Recibos"],["hist","Historial"]].map(([k,t])=>(
          <button key={k} className={"nchip"+(tabCie===k?" on":"")} style={{flex:"1 1 22%"}}
            onClick={()=>{ if(k==="hist" && diaHist) setDiaHist(null); setTabCie(k); }}>{t}</button>
        ))}
      </div>

      {/* ── 1 · RESUMEN ── */}
      {tabCie==="resumen" && (<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:12}}>
          <KPI t="Total cobrado" v={money(total)}/>
          <KPI t="Recibos" v={String(activos.length)}/>
          <KPI t="Ya bancarizado" v={money(bancar)} c="#2E7D52"/>
          <KPI t="Por depositar" v={money(efePend)} c={efePend>0?"#C98A2B":"#2E7D52"}/>
        </div>

        {efePend>0 && (
          <div style={{background:"#FDF3E2",border:"1px solid #C98A2B",borderRadius:16,padding:"14px 15px",marginBottom:14}}>
            <div style={{fontWeight:800,fontSize:14,color:"#A06B15",marginBottom:6}}>⏱️ Efectivo pendiente por depositar</div>
            <div className="num" style={{fontSize:24,fontWeight:800,color:"#A06B15",marginBottom:6}}>{money(efePend)}</div>
            {(soloLect?[]:EFECTIVO_PENDIENTE).map((e,i)=>{
              const rec=COBROS_DIA.find(c=>c.nRecibo===e.nRecibo);
              return (<div key={e.nRecibo} className="meta" style={{fontSize:12,marginBottom:2}}>
                {e.cli} · {rec?rec.prov:"—"} · {money(e.monto)}</div>);
            })}
            <div className="meta" style={{fontSize:12,margin:"6px 0 10px"}}>
              {soloLect ? (dia.obs||"Quedó pendiente al cierre") : `${EFECTIVO_PENDIENTE.length} pendiente${EFECTIVO_PENDIENTE.length!==1?"s":""} · plazo máximo 24 horas`}
            </div>
            {!soloLect && (
              <button className="cta" style={{margin:0,background:"#C98A2B"}}
                onClick={()=>{ if(EFECTIVO_PENDIENTE.length===1) setDepEf(0); else { setVerDia(false); setVerEfe(true); } }}>
                Registrar depósito</button>
            )}
          </div>
        )}

        <div className="ficha-sec">Estado del cierre</div>
        <div className="card" style={{padding:"13px 15px"}}>
          <div style={{fontWeight:700,fontSize:13.5,color:tono,marginBottom:4}}>{estadoTxt}</div>
          <div className="meta" style={{fontSize:12.5}}>
            {cerrado ? `Cerrado el ${dia.fecha.split("-").reverse().join("/")} a las ${dia.cerradoEn}${auto?" por corte automático":""}${dia.obs?` · ${dia.obs}`:""}`
             : efePend>0 ? `Pendiente: existe ${money(efePend)} en efectivo sin depositar.`
             : activos.length===0 ? "Aún no se registran cobros hoy."
             : "Listo para cerrar. No existen valores pendientes."}
          </div>
          {efePend>0 && cerrado && <div className="meta" style={{marginTop:5,color:"#C98A2B",fontWeight:700}}>
            El efectivo pendiente no se cancela con el cierre: arrastra al día siguiente con su reloj de 24h.</div>}
          <div className="meta" style={{marginTop:7,fontSize:11.5}}>Corte automático a las {CONFIG_CIERRE.hora} (acordado con el proveedor). Se cambia en Ajustes.</div>
          {!soloLect && !cerrado && (
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button className="ghost" style={{flex:1,margin:0}} onClick={()=>toast("Avance guardado (en Fase 4 se guarda en la base)")}>Guardar avance</button>
              <button className="cta" style={{flex:1,margin:0,background:efePend>0?"#C98A2B":undefined}}
                onClick={()=>{ if(efePend>0) setCerrando(true); else cerrarJornada(null); }}>Cerrar jornada</button>
            </div>
          )}
          {!soloLect && auto && !CIERRE_HOY.confirmado && (
            <button className="cta" style={{marginTop:12}} onClick={()=>{
              CIERRE_HOY.confirmado=true; setTick(t=>t+1);
              toast(`Cuadre confirmado · auditado AU-260612-${Math.floor(1000+Math.random()*9000)}`);
            }}>✓ Confirmar mi cuadre</button>
          )}
        </div>
      </>)}

      {/* ── 2 · DETALLE ── */}
      {tabCie==="detalle" && (()=>{
        const provs={};
        activos.forEach(r=>{ const p=r.prov||"—";
          if(!provs[p]) provs[p]={n:0,total:0,formas:{},recibos:[]};
          provs[p].n++; provs[p].total+=r.monto; provs[p].recibos.push(r);
          Object.entries(r.formas||{}).forEach(([f,v])=>{ provs[p].formas[f]=(provs[p].formas[f]||0)+v; });
        });
        const lista=Object.keys(provs).sort((a,b)=>provs[b].total-provs[a].total);
        const pendDe=(p)=> soloLect ? 0 : EFECTIVO_PENDIENTE.filter(e=>{
          const r=COBROS_DIA.find(c=>c.nRecibo===e.nRecibo); return r && r.prov===p; }).reduce((s,e)=>s+e.monto,0);
        return (<>
          <div className="ficha-sec">Por proveedor</div>
          {lista.length===0 && <div className="ph">Sin cobros este día</div>}
          {lista.map(p=>{
            const d=provs[p], pend=pendDe(p), abierto=expProv===p;
            const est = pend>0 ? ["Pendiente de depósito","#C98A2B"] : ["Completado","#2E7D52"];
            return (
              <div key={p} className="card" style={{padding:"13px 15px",marginBottom:9}}>
                <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setExpProv(abierto?null:p)}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:800,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p}</div>
                    <div className="meta" style={{fontSize:11.5,marginTop:2}}>{d.n} cobro{d.n!==1?"s":""} · {FORMAS.filter(f=>d.formas[f]>0).map(f=>`${f} ${money(d.formas[f])}`).join(" · ")}</div>
                    <div style={{marginTop:5}}>{chip(est[0],est[1])}</div>
                  </div>
                  <b className="num" style={{whiteSpace:"nowrap"}}>{money(d.total)}</b>
                  <span className="meta" style={{fontSize:15,color:"var(--muted)"}}>{abierto?"▾":"▸"}</span>
                </div>
                {abierto && d.recibos.map(r=>(
                  <div key={r.nRecibo} style={{borderTop:"1px solid var(--line)",marginTop:9,paddingTop:9,
                    display:"flex",justifyContent:"space-between",gap:8}}>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.cli}</div>
                      <div className="meta" style={{fontSize:11}}>{r.hora} · {r.nRecibo}</div>
                    </div>
                    <b className="num" style={{whiteSpace:"nowrap",fontSize:13.5}}>{money(r.monto)}</b>
                  </div>
                ))}
              </div>
            );
          })}

          <div className="ficha-sec" style={{marginTop:16}}>Por forma de pago</div>
          <div className="card" style={{padding:"13px 15px"}}>
            <div className="meta" style={{fontWeight:700,fontSize:11,color:"#2E7D52",marginBottom:5}}>DINERO YA BANCARIZADO</div>
            {[["Transferencias",porForma["Transferencia"]||0],["Depósitos",porForma["Depósito"]||0],["Efectivo depositado",efeDep]].map(([t,v])=>(
              <div key={t} className="row" style={{justifyContent:"space-between",padding:"3px 0"}}>
                <span className="meta" style={{fontSize:13}}>{t}</span><b className="num" style={{fontSize:14}}>{money(v)}</b>
              </div>
            ))}
            <div className="row" style={{justifyContent:"space-between",padding:"5px 0",borderTop:"1px solid var(--line)",marginTop:4}}>
              <span style={{fontWeight:700,fontSize:13}}>Subtotal bancarizado</span>
              <b className="num" style={{color:"#2E7D52",fontSize:15}}>{money(bancar)}</b>
            </div>
            <div className="meta" style={{fontWeight:700,fontSize:11,color:"#C98A2B",margin:"11px 0 5px"}}>BAJO TU RESPONSABILIDAD</div>
            {[["Efectivo por depositar",efePend],["Cheques en cartera",porForma["Cheque"]||0]].map(([t,v])=>(
              <div key={t} className="row" style={{justifyContent:"space-between",padding:"3px 0"}}>
                <span className="meta" style={{fontSize:13}}>{t}</span><b className="num" style={{fontSize:14}}>{money(v)}</b>
              </div>
            ))}
            <div className="row" style={{justifyContent:"space-between",padding:"5px 0",borderTop:"1px solid var(--line)",marginTop:4}}>
              <span style={{fontWeight:700,fontSize:13}}>Subtotal en tus manos</span>
              <b className="num" style={{color:"#C98A2B",fontSize:15}}>{money(enManos)}</b>
            </div>
            <div className="row" style={{justifyContent:"space-between",padding:"8px 0 0",borderTop:"1.5px solid var(--field)",marginTop:8}}>
              <span style={{fontWeight:800,fontSize:14}}>TOTAL COBRADO</span>
              <b className="num" style={{fontSize:19,fontWeight:800}}>{money(total)}</b>
            </div>
            <div className="meta" style={{marginTop:6,fontSize:11.5}}>El efectivo recibido hoy fue {money(efeRecib)}. El cheque no cuenta como bancarizado hasta efectivizarse.</div>
          </div>
        </>);})()}

      {/* ── 3 · RECIBOS ── */}
      {tabCie==="recibos" && (<>
        {recibos.length===0 && <div className="ph">Sin recibos este día</div>}
        {recibos.slice().reverse().map(r=>{
          const formas=Object.keys(r.formas||{}).join(" · ");
          const pend=!soloLect && EFECTIVO_PENDIENTE.some(e=>e.nRecibo===r.nRecibo);
          const est = r.anulado ? ["Anulado","#B5613C"] : pend ? ["Pendiente de depósito","#C98A2B"] : ["Completado","#2E7D52"];
          return (
            <div key={r.nRecibo} className="card" style={{padding:"13px 15px",marginBottom:9,opacity:r.anulado?.65:1,position:"relative"}}>
              <div style={{display:"flex",alignItems:"baseline",gap:10}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:800,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                    textDecoration:r.anulado?"line-through":"none"}}>{r.cli}</div>
                  <div className="meta" style={{fontSize:11.5,marginTop:2}}>{r.prov} · {r.hora} · {r.nRecibo}</div>
                  <div className="meta" style={{fontSize:11.5}}>{formas}</div>
                </div>
                <b className="num" style={{whiteSpace:"nowrap",textDecoration:r.anulado?"line-through":"none"}}>{money(r.monto)}</b>
              </div>
              <div style={{marginTop:7,display:"flex",alignItems:"center",gap:8}}>
                {chip(est[0],est[1])}
                <span style={{flex:1}}></span>
                {!r.anulado && (<>
                  <button className="lnk" onClick={()=>verRecibo(r)}>Ver</button>
                  <button className="lnk" onClick={()=>compartirRecibo(r)}>Compartir</button>
                  <button className="lnk" onClick={()=>pdfRecibo(r)}>Imprimir</button>
                  {!soloLect && <button className="lnk" style={{textDecoration:"none",fontSize:17,padding:"0 2px"}}
                    onClick={()=>setMenuRec(menuRec===r.nRecibo?null:r.nRecibo)}>⋮</button>}
                </>)}
              </div>
              {r.anulado && <div className="meta" style={{marginTop:5,color:"var(--clay)",fontWeight:700}}>ANULADO · {r.motivo}</div>}
              {menuRec===r.nRecibo && (
                <div style={{position:"absolute",right:12,bottom:10,background:"var(--card)",border:"1px solid var(--line)",
                  borderRadius:12,boxShadow:"0 6px 20px rgba(21,57,43,.16)",padding:6,zIndex:5}}>
                  <button className="lnk" style={{color:"var(--clay)",textDecoration:"none",padding:"8px 14px",display:"block"}}
                    onClick={()=>{ setMenuRec(null); setAnulando(r); setMotivoAnu(""); }}>Anular recibo</button>
                </div>
              )}
            </div>
          );
        })}
      </>)}

      {/* ── 4 · HISTORIAL ── */}
      {tabCie==="hist" && (()=>{
        const hoyRow={fecha:"2026-06-12", fechaTxt:"12 jun 2026", recibos:COBROS_DIA, estado:CIERRE_HOY.estado,
                      cerradoEn:CIERRE_HOY.cerradoEn, obs:CIERRE_HOY.obs,
                      efePend:EFECTIVO_PENDIENTE.reduce((s,e)=>s+e.monto,0), hoy:true};
        const todos=[hoyRow, ...CIERRES_HIST];
        const POR_PAG=15;                               /* regla de oro: listas largas paginadas */
        const vis=todos.slice(0, histPag*POR_PAG);
        const totMes=todos.reduce((s,d)=>s+(d.recibos||[]).filter(r=>!r.anulado).reduce((a,r)=>a+r.monto,0),0);
        return (<>
          <div className="montobox" style={{margin:"4px 0 10px",padding:"11px 15px"}}>
            <div className="row" style={{justifyContent:"space-between",alignItems:"center"}}>
              <span className="meta" style={{fontWeight:700,fontSize:12.5}}>Cobrado en estos {todos.length} días</span>
              <b className="num" style={{fontSize:18,fontWeight:800}}>{money(totMes)}</b>
            </div>
          </div>
          {vis.map(d=>{
            const act=(d.recibos||[]).filter(r=>!r.anulado);
            const tot=act.reduce((s,r)=>s+r.monto,0);
            const est = d.estado==="cerrado" ? ["Cerrado","#2E7D52"]
                      : d.estado==="cerrado_obs" ? ["Cerrado con pendientes","#C98A2B"]
                      : d.estado==="cerrado_auto" ? (d.confirmado?["Cerrado automáticamente","#2E7D52"]:["Automático · sin confirmar","#C98A2B"])
                      : (d.efePend>0 ? ["Pendiente de depósito","#C98A2B"] : ["Sin cerrar","#8B9490"]);
            return (
              <div key={d.fecha} style={{borderTop:"1px solid var(--line)",padding:"12px 2px",cursor:"pointer"}}
                onClick={()=>{ if(d.hoy){ setDiaHist(null); } else { setDiaHist(d); } setTabCie("resumen"); setExpProv(null); }}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:800,fontSize:13.5}}>{d.fechaTxt}{d.hoy?" · hoy":""}</div>
                    <div className="meta" style={{fontSize:11.5,marginTop:2}}>{act.length} recibo{act.length!==1?"s":""}{d.cerradoEn?` · cerrado ${d.cerradoEn}`:""}</div>
                    <div style={{marginTop:5}}>{chip(est[0],est[1])}</div>
                  </div>
                  <b className="num" style={{whiteSpace:"nowrap"}}>{money(tot)}</b>
                  <span className="meta" style={{fontSize:18,color:"var(--muted)"}}>›</span>
                </div>
              </div>
            );
          })}
          {vis.length<todos.length && (
            <button className="ghost" style={{width:"100%",marginTop:12}} onClick={()=>setHistPag(p=>p+1)}>Ver más días</button>
          )}
          <div className="meta" style={{margin:"12px 2px 0",fontSize:11.5}}>Toca un día para ver su cierre completo.</div>
        </>);})()}

      <button className="ghost" style={{width:"100%",marginTop:16}}
        onClick={()=>{ if(diaHist){ setDiaHist(null); setTabCie("hist"); } else { setVerDia(false); setTabCie("resumen"); } }}>
        {diaHist?"‹ Volver al historial":"‹ Volver a cobros"}</button>

      {/* confirmación de cierre con pendientes: exige motivo y queda auditado */}
      {cerrando && (
        <div className="ov" onClick={()=>setCerrando(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <h3>Cerrar con pendientes</h3>
            <div className="sh-sub">Quedan {money(efePend)} en efectivo sin depositar</div>
            <div className="field"><label>Motivo (obligatorio)</label>
              <input type="text" value={motivoCie} placeholder="Ej.: banco cerrado, se deposita mañana"
                onChange={e=>setMotivoCie(e.target.value)} autoFocus/></div>
            <div className="meta" style={{margin:"0 2px 12px"}}>🔏 El cierre con valores pendientes queda observado en la auditoría con tu autorización.</div>
            <button className="cta" disabled={!motivoCie.trim()} onClick={()=>cerrarJornada(motivoCie.trim())}>Autorizo y cierro la jornada</button>
            <button className="ghost" onClick={()=>setCerrando(false)}>Cancelar</button>
          </div>
        </div>
      )}

      {anulando && (
        <div className="ov" onClick={()=>setAnulando(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <h3>Anular recibo {anulando.nRecibo}</h3>
            <div className="sh-sub">{anulando.cli} · {money(anulando.monto)}</div>
            <div className="field"><label>Motivo (obligatorio)</label>
              <input type="text" value={motivoAnu} placeholder="Ej.: valor mal digitado" onChange={e=>setMotivoAnu(e.target.value)} autoFocus/></div>
            <div className="meta" style={{margin:"0 2px 12px"}}>🔏 La anulación requiere tu autorización como <b>Freelance</b> y queda auditada. El recibo no se borra: queda visible como anulado y la cartera se restituye.</div>
            <button className="cta" disabled={!motivoAnu.trim()} onClick={anular}>Autorizo y anulo el recibo</button>
            <button className="ghost" onClick={()=>setAnulando(null)}>Cancelar</button>
          </div>
        </div>
      )}

      {depEf!=null && (
        <LineaPago modalidad="Depósito" restante={EFECTIVO_PENDIENTE[depEf] ? EFECTIVO_PENDIENTE[depEf].monto : 0}
          cliente={EFECTIVO_PENDIENTE[depEf] ? EFECTIVO_PENDIENTE[depEf].cli : null}
          onCancel={()=>setDepEf(null)}
          onSave={l=>{
            const e=EFECTIVO_PENDIENTE[depEf];
            const v=parseFloat(l.monto)||0;
            DEPOSITOS_EFECTIVO.push({nRecibo:e.nRecibo, cli:e.cli, monto:v, banco:l.banco, numero:l.numero, fecha:l.fecha, foto:l.foto});
            toast(`Depósito de ${money(v)} registrado: efectivo de ${e.cli} conciliado ✓ (auditado)`);
            EFECTIVO_PENDIENTE.splice(depEf,1);
            setDepEf(null); setTick(t=>t+1);
          }}/>
      )}
    </>);
  }

  if(resumen){
    const facturasRev = factSel.map(f=>({
      factura:f.factura, aplicado:parseFloat(aplic[f.id])||0,
      estado:(parseFloat(aplic[f.id])||0)>=f.valor?"cancelada":"abono"
    }));
    return (<>
      <div className="h1">Resumen del cobro</div>
      <div className="sub">Revisa que todo esté bien antes de guardar</div>

      <div className="recibo" style={{marginTop:12}}>
        <div className="rh">
          <div className="rt">{cli}</div>
          <div className="rmonto num">{money(monto)}</div>
          <div className="meta" style={{marginTop:4}}>Proveedor: {prov.nombre}</div>
        </div>
        <div className="rsec">Facturas aplicadas</div>
        {facturasRev.map((f,i)=>(
          <div className="rrow" key={i}>
            <span className="rk">Factura {f.factura} {f.estado==="cancelada"?"· Cancela":"· Abono"}</span>
            <span className="num" style={{fontWeight:600}}>{money(f.aplicado)}</span>
          </div>
        ))}
        <div className="rsec">Formas de pago</div>
        {lineas.map((l,i)=>(
          <div className="rrow" key={i} style={{alignItems:"center"}}>
            <span className="rk" style={{display:"flex",alignItems:"center",gap:8}}>
              {l.foto && <img src={l.foto} alt="comp." style={{width:34,height:26,objectFit:"cover",borderRadius:5,border:"1px solid var(--line)"}}/>}
              {l.modalidad}{l.numero?` · ${l.numero}`:""}{l.banco?` · ${l.banco}`:""}
            </span>
            <span className="num" style={{fontWeight:600}}>{money(parseFloat(l.monto)||0)}</span>
          </div>
        ))}
        <div className="rsec">Recibirán copia del recibo</div>
        <div className="meta" style={{padding:"2px 2px 6px"}}>
          {cli} (cliente) · Daniel Ríos (freelance) · {prov.nombre} (proveedor) · Dpto. Financiero
        </div>
      </div>

      <button className="cta" style={{marginTop:14}} onClick={guardarTodo}>
        💾 Guardar, imprimir y enviar</button>
      <div className="meta" style={{textAlign:"center",margin:"8px 0 4px",fontSize:11.5}}>
        Imprime 2 ejemplares (original + copia) y envía a todos el recibo virtual en 1 copia</div>
      <button className="ghost" style={{width:"100%"}} onClick={()=>setResumen(false)}>‹ Corregir</button>
    </>);
  }

  return (<>
    <div className="h1">Reportar cobro</div>
    <div className="sub">Paso {paso} de 3 · {PASOS[paso-1]}</div>

    <div className="wz-prog">
      {PASOS.map((s,i)=>(
        <div className={"stp "+(i+1<paso?"done":i+1===paso?"cur":"")} key={i}>
          <div className="bar"></div><span className="lbl-s">{s}</span>
        </div>
      ))}
    </div>

    {paso===1 && (<>
      <SearchSelect label="Cliente" items={[...new Set(COBROS_INI.map(c=>c.cli))]} value={cli} multiPalabra
        onPick={c=>{setCli(c);setProv(null);setAplic({});setLineas([]);}} onClear={()=>{setCli(null);setProv(null);setAplic({});setLineas([]);}}
        render={{
          text:c=>c,
          option:c=>(<div className="o1">{c}</div>),
          picked:c=>(<><div className="p1">{c}</div><div className="p2">Cliente con cobros pendientes</div></>)
        }}/>
      {!cli && (()=>{ /* mini-dashboard neumórfico: cómo voy hoy y cómo vengo esta semana */
        const activos=COBROS_DIA.filter(c=>!c.anulado);
        const hoyTot=activos.reduce((s,c)=>s+c.monto,0);
        const pct=Math.min(100, META_DIA>0?Math.round(hoyTot/META_DIA*100):0);
        const efe=EFECTIVO_PENDIENTE.reduce((s,e)=>s+e.monto,0);
        const barras=[...COBROS_SEMANA.slice(0,-1), {d:"Hoy", v:hoyTot}];
        const serie=barras.map(b=>b.v);
        const etiq=barras.map(b=>b.d);
        const totSemana=serie.reduce((s,v)=>s+v,0);
        const mejor=Math.max(...serie);
        return (<>
          {/* meta del día */}
          <div className="neu" style={{padding:14,marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <NeuAnillo pct={pct} valor={money(hoyTot).replace(",00","")} etiqueta={pct+"% de la meta"}
                color={pct>=100?"#2E7D52":pct>=60?"#C9A227":"#C2603A"} tam={104}/>
              <div style={{flex:1,minWidth:0}}>
                <div className="neu-t" style={{marginBottom:8}}>Cobrado hoy</div>
                <div className="neu-in" style={{marginBottom:7,padding:10}}>
                  <div className="meta" style={{fontSize:9.5}}>Meta del día</div>
                  <div className="num" style={{fontSize:14,fontWeight:800}}>{money(META_DIA)}</div>
                </div>
                <div className="neu-in" style={{padding:10}}>
                  <div className="meta" style={{fontSize:9.5}}>Recibos de hoy</div>
                  <div className="num" style={{fontSize:14,fontWeight:800,color:"var(--field)"}}>{activos.length}</div>
                </div>
              </div>
            </div>
          </div>

          {/* evolución de la semana */}
          <div className="neu" style={{padding:14,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
              <span className="neu-t">Últimos 7 días</span>
              <span className="meta" style={{fontSize:10}}>Total {money(totSemana)}</span>
            </div>
            <NeuLinea datos={serie} etiquetas={etiq} color="#2E7D52" alto={112} formato={v=>money(v)}/>
          </div>

          {/* accesos de trabajo del cobrador */}
          <div style={{display:"flex",gap:9,marginBottom:12}}>
            {efe>0 && (
              <button className="neu" style={{flex:1,margin:0,padding:"11px 10px",cursor:"pointer",fontFamily:"inherit",
                display:"flex",alignItems:"center",gap:9,border:"none",textAlign:"left"}}
                onClick={()=>{ if(EFECTIVO_PENDIENTE.length===1) setDepEf(0); else setVerEfe(true); }}>
                <Ico n="reloj" c="#C77F00" s={19}/>
                <span style={{minWidth:0}}>
                  <span style={{display:"block",fontSize:11,fontWeight:800,color:"var(--ink)"}}>Depositar</span>
                  <span className="num" style={{fontSize:12.5,fontWeight:800,color:"#C77F00"}}>{money(efe)}</span>
                </span>
              </button>
            )}
            <button className="neu" style={{flex:1,margin:0,padding:"11px 10px",cursor:"pointer",fontFamily:"inherit",
              display:"flex",alignItems:"center",gap:9,border:"none",textAlign:"left"}}
              onClick={()=>setVerDia(true)}>
              <Ico n="stats" c="#2E7D52" s={19}/>
              <span style={{minWidth:0}}>
                <span style={{display:"block",fontSize:11,fontWeight:800,color:"var(--ink)"}}>Cierre del día</span>
                <span className="meta" style={{fontSize:9.5}}>cuadre de caja</span>
              </span>
            </button>
          </div>
        </>);})()}
      {cli && (
        <SearchSelect label="Proveedor" items={provsDelCliente} value={prov}
          onPick={p=>{setProv(p);setAplic({});setLineas([]);}} onClear={()=>{setProv(null);setAplic({});setLineas([]);}}
          hint={`${provsDelCliente.length} ${provsDelCliente.length===1?"proveedor con facturas":"proveedores con facturas"} de ${cli}`}
          render={{
            text:p=>p.nombre,
            option:p=>(<><div className="o1">{p.nombre}</div>
              <div className="o2">{COBROS_INI.filter(c=>c.cli===cli&&c.provId===p.id).length} factura(s) pendiente(s)</div></>),
            picked:p=>(<><div className="p1">{p.nombre}</div><div className="p2">Facturas de este proveedor</div></>)
          }}/>
      )}
    </>)}

    {paso===2 && (<>
      <div className="sub" style={{marginTop:-6}}>Marca las facturas a cobrar y escribe cuánto cobras de cada una.</div>
      {facturas.map(f=>{
        const aplicado=aplic[f.id];
        const activo=aplicado!==undefined && aplicado!=="";
        const valAp=parseFloat(aplicado)||0;
        const exceso=valAp>f.valor;
        const estado = activo ? (valAp>=f.valor?"cancelada":"abono") : null;
        return (
          <div className={"fsel"+(activo?" on":"")} key={f.id}>
            <div className="top" onClick={()=>{
              if(activo){const n={...aplic};delete n[f.id];setAplic(n);}
              else setAplicado(f.id, String(f.valor)); // por defecto, su saldo completo (cancela)
            }} style={{cursor:"pointer"}}>
              <span className="chk">{activo?"✓":""}</span>
              <div style={{flex:1}}>
                <div className="fi-nom">Factura {f.factura}</div>
                <div className="fi-sal">Saldo {money(f.valor)} · {f.vence}</div>
              </div>
              {estado && <span className={"estado-f "+(estado==="cancelada"?"ef-canc":"ef-abon")}>
                {estado==="cancelada"?"Cancela":"Abono"}</span>}
            </div>
            {activo && (
              <div className="aplica">
                <label>Cobro</label>
                <input className={"num"+(exceso?" warn":"")} type="number" inputMode="decimal"
                  value={aplicado} onChange={e=>setAplicado(f.id,e.target.value)}/>
              </div>
            )}
            {exceso && <div className="hint err" style={{marginTop:8}}>No puedes cobrar más que el saldo ({money(f.valor)}).</div>}
          </div>
        );
      })}
      {factSel.length>0 && (
        <div className="totbar">
          <div><div className="tk">Total a cobrar</div>
            <div className="saldo">{factSel.length} factura(s) seleccionada(s)</div></div>
          <div className="tv num">{money(monto)}</div>
        </div>
      )}
    </>)}

    {paso===3 && (<>
      <div className="montobox" style={{marginBottom:14,padding:"14px 16px",
        border: restanteLineas===0 && monto>0 ? "1.5px solid var(--ok)" : undefined}}>
        <div className="row" style={{justifyContent:"space-between",padding:"3px 0"}}>
          <span className="meta" style={{fontSize:13.5}}>Total</span>
          <b className="num" style={{fontSize:15}}>{money(monto)}</b>
        </div>
        <div className="row" style={{justifyContent:"space-between",padding:"3px 0"}}>
          <span className="meta" style={{fontSize:13.5}}>Abonado</span>
          <b className="num" style={{fontSize:15}}>{money(monto-restanteLineas)}</b>
        </div>
        <div style={{borderTop:"1.5px solid var(--line)",margin:"9px 0 7px"}}></div>
        <div className="row" style={{justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:800,fontSize:14,letterSpacing:".02em"}}>SALDO</span>
          <b className="num" style={{fontSize:24,fontWeight:800,
            color: restanteLineas>0?"var(--maize-deep)":restanteLineas<0?"var(--clay)":"var(--ok)"}}>
            {(restanteLineas<0?"-":"")+money(Math.abs(restanteLineas))}</b>
        </div>
        <div style={{marginTop:10,height:10,background:"#EFEBE0",borderRadius:6,overflow:"hidden",
          boxShadow:"inset 1px 1px 3px rgba(21,57,43,.08)"}}>
          <div style={{width:Math.min(100,monto>0?Math.round((monto-restanteLineas)/monto*100):0)+"%",height:"100%",borderRadius:6,
            transition:"width .45s ease, background-color .45s ease",
            background: restanteLineas<0?"var(--clay)":restanteLineas===0?"var(--ok)":"var(--maize-deep)"}}></div>
        </div>
        <div className="meta" style={{marginTop:4,textAlign:"right",fontSize:11}}>
          {monto>0?Math.min(999,Math.round((monto-restanteLineas)/monto*100)):0}% cubierto</div>
        {restanteLineas===0 && monto>0 && (
          <div style={{marginTop:10,background:"var(--ok)",color:"#fff",borderRadius:12,padding:"11px 12px",
            textAlign:"center",fontWeight:800,fontSize:14.5,letterSpacing:".03em",
            boxShadow:"0 3px 10px rgba(46,125,82,.35)"}}>
            ✓ PAGO COMPLETO — listo para reportar
          </div>
        )}
        {restanteLineas<0 && <div className="meta" style={{color:"var(--clay)",marginTop:5,textAlign:"right"}}>Las formas de pago superan el total</div>}
      </div>
      {lineas.map((l,i)=>(
        <div className="pline" key={i}>
          <div className="ph-row">
            <span className="mod"><span className="tag">{l.modalidad}</span>
              <span className="num">{money(parseFloat(l.monto)||0)}</span></span>
            <button className="del" onClick={()=>setLineas(lineas.filter((_,j)=>j!==i))}>Quitar</button>
          </div>
          <div className="det">
            {l.modalidad==="Efectivo"
              ? <>Dinero en mano · <span style={{color:"var(--maize-deep)",fontWeight:700}}>⏱️ depositar en 24h</span></>
              : <>{l.modalidad==="Cheque"
                  ? `Cheque ${l.numero||"—"} · ${l.banco||"—"} · posfechado ${l.fecha||"—"}`
                  : `Op. ${l.numero||"—"} · ${l.banco||"—"} · ${l.fecha||"—"}`}
                {" · "}<span className="ok-foto">✓ foto</span></>}
          </div>
        </div>
      ))}
      <div className="addbar">
        {MODALIDADES.map(m=> <button key={m} onClick={()=>setModal(m)}>+ {m}</button>)}
      </div>
    </>)}

    <div className="wz-nav">
      {paso>1 && <button className="back" onClick={()=>setPaso(paso-1)}>‹ Atrás</button>}
      {paso<3
        ? <button className="cta next" disabled={!puedeAvanzar} onClick={()=>setPaso(paso+1)}>Siguiente</button>
        : <button className="cta next" disabled={!paso3Ok} onClick={()=>setResumen(true)}>
            Revisar resumen</button>}
    </div>

    {modal && <LineaPago modalidad={modal} restante={Math.max(0,restanteLineas)} cliente={cli}
      onCancel={()=>setModal(null)}
      onSave={l=>{setLineas([...lineas,l]);setModal(null);}}/>}
  </>);
}

function LineaPago({modalidad, onSave, onCancel, restante, cliente}){
  /* este componente ES un modal: al montarse se registra para que el botón atrás lo cierre */
  useModal(true, React.useCallback(()=>{ onCancel && onCancel(); },[onCancel]));
  const esCheque = modalidad==="Cheque";
  const HOY_ISO = new Date().toISOString().slice(0,10);   /* depósito y transferencia: el pago YA ocurrió → sin fechas futuras */
  const esEfectivo = modalidad==="Efectivo";
  const [monto,setMonto]=useState(restante>0 ? String(Math.round(restante*100)/100) : "");
  const [numero,setNumero]=useState("");
  const [banco,setBanco]=useState("");
  const [fecha,setFecha]=useState("");
  const [foto,setFoto]=useState(null);
  const [dueno,setDueno]=useState("");                      // dueño real del cheque (puede ser un tercero)
  const [auto,setAuto]=useState({numero:false,banco:false,fecha:false}); // qué llenó el lector (no si el campo tiene texto)
  const [ocr,setOcr]=useState({estado:"idle", valor:null}); // idle · leyendo · ok · fallo
  const [editar,setEditar]=useState(false);
  const leer=(e)=>{
    const f=e.target.files && e.target.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=async()=>{
      const img=rd.result; setFoto(img); setEditar(false);
      setAuto({numero:false,banco:false,fecha:false});
      if(esCheque) return; /* manuscrito: el lector no es confiable, campos siempre visibles */
      setOcr({estado:"leyendo", valor:null});
      const d=await ocrComprobante(img);
      if(!d){ setOcr({estado:"fallo", valor:null}); return; }  /* falla: los campos quedan visibles y editables */
      /* el lector solo llena lo vacío (jamás pisa lo digitado) y anota qué campos llenó él */
      const a={numero:false,banco:false,fecha:false};
      if(d.banco  && !banco) { setBanco(d.banco);   a.banco=true; }
      if(d.numero && !numero){ setNumero(d.numero); a.numero=true; }
      if(d.fecha && !fecha && d.fecha<=HOY_ISO){ setFecha(d.fecha); a.fecha=true; }  /* fecha futura leída = dato dudoso: se pide a mano */
      if(d.valor!=null && !(parseFloat(monto)>0)) setMonto(String(d.valor));
      setAuto(a);
      setOcr({estado:"ok", valor:(d.valor!=null?d.valor:null)});
    };
    rd.readAsDataURL(f);
  };
  const mv=parseFloat(monto)||0;
  const difiere = ocr.valor!=null && mv>0 && Math.abs(mv-ocr.valor)>0.009;
  const coincide = ocr.valor!=null && mv>0 && !difiere;
  /* Un campo se oculta SOLO si lo llenó el lector. Si lo escribe el usuario, permanece visible
     (antes se ocultaba al teclear el primer carácter y se perdía el foco). Cheque: siempre visibles. */
  const vNum = esCheque || editar || !auto.numero;
  const vBan = esCheque || editar || !auto.banco;
  const vFec = esCheque || editar || !auto.fecha;
  const hayAuto = auto.numero || auto.banco || auto.fecha;
  const detectados=[auto.banco?banco:null, auto.numero?("Op. "+numero):null, auto.fecha?fecha:null].filter(Boolean).join(" · ");
  const fechaFutura = !esCheque && !esEfectivo && !!fecha && fecha>HOY_ISO;   /* el cheque SÍ puede ser posfechado */
  const valido = esEfectivo ? mv>0
    : (mv>0 && numero && banco && fecha && !fechaFutura && !!foto && (!esCheque || !!dueno.trim()));
  const obsAuto=()=>{ /* observaciones automáticas para la verificación del proveedor */
    const o=[];
    if(esEfectivo){ o.push("EFECTIVO_24H"); return o; }
    if(esCheque){
      if(cliente && dueno.trim() && dueno.trim().toLowerCase()!==String(cliente).toLowerCase()) o.push("CHEQUE_TERCERO");
      return o;
    }
    if(ocr.estado==="fallo") o.push("OCR_NO_LECTURA");
    else if(ocr.estado==="ok" && difiere) o.push("VALOR_NO_COINCIDE");
    else if(ocr.estado==="ok" && !ocr.valor) o.push("OCR_LECTURA_PARCIAL");
    if(editar) o.push("CORRECCION_MANUAL");
    if(!banco) o.push("BANCO_NO_IDENTIFICADO");
    return o;
  };
  if(esEfectivo){
    return (
      <div className="ov" onClick={onCancel}>
        <div className="sheet" onClick={e=>e.stopPropagation()}>
          <h3>Efectivo</h3>
          <div className="sh-sub">Dinero recibido en mano</div>
          {restante>0 && <div className="meta" style={{margin:"0 2px 10px",fontWeight:700,color:"var(--field)"}}>Restante por cubrir: {money(restante)}</div>}
          <div className="field"><label>Valor recibido</label>
            <input className="num" type="number" inputMode="decimal" placeholder="0.00"
              value={monto} onChange={e=>setMonto(e.target.value)} autoFocus/></div>
          <div className="meta" style={{margin:"0 2px 12px"}}>⏱️ Regla: el efectivo se deposita en máximo 24 horas. Al guardar el cobro quedará como <b>efectivo por depositar</b> y se cierra registrando el depósito con su comprobante.</div>
          <button className="cta" disabled={!valido} onClick={()=>onSave({modalidad:"Efectivo",monto,obs:["EFECTIVO_24H"]})}>Agregar efectivo</button>
          <button className="ghost" onClick={onCancel}>Cancelar</button>
        </div>
      </div>
    );
  }
  return (
    <div className="ov" onClick={onCancel}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <h3>{modalidad}</h3>
        <div className="sh-sub">{esCheque?"Datos del cheque recibido":"Confirma el valor y toma la foto: el resto se llena solo"}</div>
        {restante>0 && <div className="meta" style={{margin:"0 2px 10px",fontWeight:700,color:"var(--field)"}}>Restante por cubrir: {money(restante)}</div>}

        <div className="field"><label>Valor del pago</label>
          <input className="num" type="number" inputMode="decimal" placeholder="0.00"
            value={monto} onChange={e=>setMonto(e.target.value)}/></div>

        <div className="field"><label>Foto del comprobante (obligatoria)</label>
          {foto ? (
            <label className="photo has" style={{display:"flex",alignItems:"center",gap:10}}>
              <input type="file" accept="image/*" {...(esCheque?{capture:"environment"}:{})} style={{display:"none"}} onChange={leer}/>
              <img src={foto} alt="comprobante" style={{width:46,height:34,objectFit:"cover",borderRadius:6,border:"1px solid var(--line)"}}/>
              <span>✓ Cargada · toca para reemplazar</span>
            </label>
          ) : esCheque ? (
            <div className="fotopick">
              <label>
                <input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={leer}/>
                <span className="fi">📷</span>Tomar foto del cheque
              </label>
            </div>
          ) : (
            <div className="fotopick">
              <label>
                <input type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={leer}/>
                <span className="fi">📷</span>Tomar foto
              </label>
              <label>
                <input type="file" accept="image/*" style={{display:"none"}} onChange={leer}/>
                <span className="fi">🖼️</span>Adjuntar imagen
              </label>
            </div>
          )}
          {esCheque && !foto && <div className="meta" style={{marginTop:6,fontSize:11.5}}>El cheque se recibe físicamente: la foto se toma en el momento, con la cámara.</div>}
        </div>

        {ocr.estado==="leyendo" && <div className="meta" style={{margin:"2px 2px 10px"}}>🔎 Leyendo comprobante…</div>}
        {ocr.estado==="fallo" && <div className="meta" style={{margin:"2px 2px 10px",color:"var(--maize-deep)"}}>No pude leer el comprobante; completa los datos.</div>}
        {coincide && <div className="meta" style={{margin:"2px 2px 10px",color:"var(--ok)",fontWeight:700}}>✓ El comprobante coincide: {money(ocr.valor)}</div>}
        {difiere && (
          <div style={{margin:"2px 0 12px",background:"#FBF3DC",border:"1px solid var(--maize-deep)",borderRadius:12,padding:"10px 12px"}}>
            <div style={{fontSize:13,fontWeight:700,color:"var(--maize-deep)"}}>El comprobante dice {money(ocr.valor)}</div>
            <button className="ghost" style={{width:"100%",marginTop:8}} onClick={()=>setMonto(String(ocr.valor))}>Usar el valor del comprobante</button>
          </div>
        )}
        {!esCheque && !editar && hayAuto && detectados && (
          <div className="meta" style={{margin:"2px 2px 12px",display:"flex",alignItems:"center",gap:6}}>
            <span style={{color:"var(--ok)"}}>✓</span><span style={{flex:1}}>{detectados}</span>
            <button className="ghost" style={{padding:"4px 10px"}} onClick={()=>setEditar(true)}>✎</button>
          </div>
        )}

        {vNum && (
          <div className="field"><label>{esCheque?"Número de cheque":"Número de operación"}</label>
            <input type="text" value={numero} onChange={e=>setNumero(e.target.value)}/></div>
        )}
        {vBan && (
          <SearchSelect label="Banco" items={BANCOS} value={banco}
            sortBy={(a,b)=>(USO_BANCOS[b]||0)-(USO_BANCOS[a]||0)}
            onPick={b=>{setBanco(b);USO_BANCOS[b]=(USO_BANCOS[b]||0)+1;}} onClear={()=>setBanco("")}
            render={{
              text:b=>b,
              option:b=>(<div className="o1">{b}{USO_BANCOS[b]?<span style={{color:"var(--muted)",fontWeight:500,fontSize:12}}>  · usado {USO_BANCOS[b]}×</span>:null}</div>),
              picked:b=>(<><div className="p1">{b}</div></>)
            }}/>
        )}
        {vFec && (
          <div className="field"><label>{esCheque?"Fecha posfechada (cuándo se puede depositar)":"Fecha del comprobante"}</label>
            <input type="date" value={fecha} max={esCheque?undefined:HOY_ISO}
              onChange={e=>setFecha(e.target.value)}/>
            {fechaFutura && <div className="meta" style={{marginTop:5,color:"var(--clay)",fontWeight:700}}>
              La fecha no puede ser futura: el {modalidad.toLowerCase()} ya se realizó.</div>}
          </div>
        )}

        {esCheque && (
          <div className="field"><label>Dueño real del cheque (obligatorio)</label>
            <input type="text" value={dueno} placeholder="Nombre de quien gira el cheque"
              onChange={e=>setDueno(e.target.value)}/>
            {cliente && dueno.trim() && dueno.trim().toLowerCase()!==String(cliente).toLowerCase() &&
              <div className="meta" style={{marginTop:5,color:"var(--maize-deep)"}}>Cheque de un tercero: quedará observado para verificación.</div>}
          </div>
        )}

        <button className="cta" disabled={!valido}
          onClick={()=>onSave({modalidad,monto,numero,banco,fecha,foto,dueno:dueno.trim()||null,valorOcr:ocr.valor,obs:obsAuto()})}>
          Agregar {modalidad.toLowerCase()}</button>
        <button className="ghost" onClick={onCancel}>Cancelar</button>
      </div>
    </div>
  );
}

function Pedidos({pedidos=PEDIDOS_INI, toast}){
  useRetroceso(()=>{
      if(verFechas){ setVerFechas(false); return true; }
      if(sel){ setSel(null); return true; }
      return false;
    });
  const [sel,setSel]=useState(null);
  const [q,setQ]=useState("");
  const [estado,setEstado]=useState("Todos");
  const [desde,setDesde]=useState("");
  const [hasta,setHasta]=useState("");
  const [orden,setOrden]=useState("recientes"); // recientes | antiguos | comision
  const [verFechas,setVerFechas]=useState(false);
  const [pestana,setPestana]=useState("activos"); // activos | historial
  const [verComo,setVerComo]=useState("factura");  // factura | seguimiento (al abrir un pedido)
  const [pagina,setPagina]=useState(1);
  const POR_PAGINA=15;
  if(sel){
    const p=pedidos.find(x=>x.id===sel);
    return <DetallePedido p={p} modo={verComo} volver={()=>setSel(null)}/>;
  }
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const ESTADOS=["Todos","Esperando aprobación","Enviado al proveedor","Facturado","Despachado"];
  const LIBERADOS=["Comisión liberada","Cobrado y validado"]; // van al historial
  const lista=pedidos.filter(p=>{
    const liberado = LIBERADOS.includes(p.estado) || p.comisionLiberada;
    if(pestana==="activos" && liberado) return false;   // liberados salen de Activos
    if(pestana==="historial" && !liberado) return false; // historial solo liberados
    const t=norm(q);
    const txtOk = t==="" || t.split(/\s+/).filter(Boolean).every(w=>norm(p.cli).includes(w)) || norm(p.prov).includes(t);
    const estOk = pestana==="historial" || estado==="Todos" || p.estado===estado;
    const fechaOk = (!desde || p.fecha>=desde) && (!hasta || p.fecha<=hasta);
    return txtOk && estOk && fechaOk;
  });
  const ordenada=[...lista].sort((a,b)=>{
    if(orden==="comision") return b.comision-a.comision;
    if(orden==="antiguos") return a.fecha<b.fecha?-1:a.fecha>b.fecha?1:0;
    return a.fecha<b.fecha?1:a.fecha>b.fecha?-1:0; // recientes (por defecto)
  });
  const totalPag=Math.max(1,Math.ceil(ordenada.length/POR_PAGINA));
  const pagActual=Math.min(pagina,totalPag);
  const visibles=ordenada.slice((pagActual-1)*POR_PAGINA, pagActual*POR_PAGINA);
  const cambiarPestana=p=>{setPestana(p);setPagina(1);setEstado("Todos");};
  // dictado por voz para el buscador
  const dictar=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ toast&&toast("Tu teléfono no permite dictado por voz."); return; }
    const r=new SR(); r.lang="es-EC"; r.interimResults=false; r.maxAlternatives=1;
    r.onresult=e=>setQ(e.results[0][0].transcript);
    r.start();
  };

  return (<>
    <div className="h1">Mis pedidos</div>

    {/* pestañas Activos · Historial */}
    <div className="eq-tabs" style={{marginBottom:12}}>
      <button className={pestana==="activos"?"on":""} onClick={()=>cambiarPestana("activos")}>En proceso</button>
      <button className={pestana==="historial"?"on":""} onClick={()=>cambiarPestana("historial")}>Historial</button>
    </div>

    <div className="row" style={{gap:10,marginBottom:10,alignItems:"stretch"}}>
      <div className="ss" style={{flex:1,marginBottom:0}}>
        <div className="box"><span className="mag">⌕</span>
          <input value={q} placeholder="Cliente o proveedor…" onChange={e=>{setQ(e.target.value);setPagina(1);}}/>
          <button className="micb" onClick={dictar} title="Dictar por voz" aria-label="Dictar por voz">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--muted)" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">
              <rect x="9" y="2.5" width="6" height="11" rx="3"/><path d="M5.5 11a6.5 6.5 0 0013 0"/><path d="M12 17.5V21M9 21h6"/>
            </svg></button>
          {q && <button className="clr" onClick={()=>setQ("")}>×</button>}</div>
      </div>
    </div>

    {/* selectores: en Activos van Estado·Fecha·Ordenar; en Historial solo Fecha·Ordenar */}
    <div style={{display:"grid",gridTemplateColumns:pestana==="activos"?"1fr 1fr 1fr":"1fr 1fr",gap:7,marginBottom:12}}>
      {pestana==="activos" && (
        <FiltroBuscador estilo={{flex:1,minWidth:110}} items={ESTADOS.filter(e=>e!=="Todos")}
          value={estado} onPick={v=>{setEstado(v);setPagina(1);}}
          todos="Todos" etiquetaTodos="Estado: todos"/>
      )}
