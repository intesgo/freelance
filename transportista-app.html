<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Transportista - Freelance</title>
<style>
  :root{
    --field:#15392B; --field-700:#1E4D3A; --maize:#F2A900; --maize-deep:#C77F00;
    --paper:#F7F5EF; --card:#FFFFFF; --ink:#18211C; --muted:#6F7A6F;
    --line:#E7E1D3; --clay:#B5613C; --ok:#2E7D52; --bad:#C0492F;
    --shadow:0 1px 2px rgba(21,57,43,.06),0 8px 24px rgba(21,57,43,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:#0d2018;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink)}
  #root{height:100%}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:16px}

  .shell{max-width:430px;margin:0 auto;min-height:100dvh;background:var(--paper);
    position:relative;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.4)}
  @media(min-width:480px){.shell{height:100dvh}}

  /* ===== top ===== */
  .top{background:var(--field);color:#EAF0EA;padding:14px 18px 16px;
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .top .who{font-size:12px;color:#9DB6A6;letter-spacing:.04em;text-transform:uppercase}
  .top .name{font-size:16px;font-weight:600;margin-top:2px}
  .topbtn{display:flex;align-items:center;gap:5px;color:#EAF0EA;font-size:13px;font-weight:600;
    background:rgba(255,255,255,.10);border-radius:999px;padding:7px 13px}
  .topbtn:active{background:rgba(255,255,255,.22)}
  .back{color:#EAF0EA;font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}

  .body{flex:1;overflow-y:auto;padding:16px 16px 90px;-webkit-overflow-scrolling:touch}

  /* ===== login ===== */
  .login-wrap{padding:40px 22px}
  .logo-badge{width:64px;height:64px;border-radius:18px;background:var(--maize);color:var(--field);
    display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 18px;box-shadow:var(--shadow)}
  .login-title{text-align:center;color:#EAF0EA;font-size:22px;font-weight:700}
  .login-sub{text-align:center;color:#9DB6A6;font-size:13.5px;margin-top:6px;margin-bottom:26px}
  .chofer-card{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
    border-radius:15px;padding:14px 15px;margin-bottom:11px;box-shadow:var(--shadow)}
  .chofer-card:active{transform:scale(.99)}
  .avatar{width:44px;height:44px;border-radius:12px;background:var(--field);color:#EAF0EA;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;flex-shrink:0}
  .chofer-info{flex:1;min-width:0}
  .chofer-nom{font-size:15.5px;font-weight:600;color:var(--field)}
  .chofer-meta{font-size:12.5px;color:var(--muted);margin-top:2px}
  .chofer-go{font-size:20px;color:var(--maize-deep)}
  .login-back{color:#9DB6A6;font-size:14px;font-weight:600;margin-bottom:14px;display:inline-flex;align-items:center;gap:4px}
  .login-back:active{color:#EAF0EA}
  .ruta-link-card{background:rgba(242,169,0,.12);border:1px solid rgba(242,169,0,.35);border-radius:14px;
    padding:13px 15px;margin-bottom:18px}
  .ruta-link-card .rl-nom{font-size:16px;font-weight:700;color:var(--maize)}
  .ruta-link-card .rl-meta{font-size:12.5px;color:#C9D8CD;margin-top:3px}
  .nuevo-form{background:var(--card);border-radius:16px;padding:16px 16px 18px;box-shadow:var(--shadow)}
  .nuevo-form .field{margin-bottom:13px}
  .nuevo-form .b-confirm{margin-top:4px}
  .login-error{color:var(--bad);font-size:12.5px;font-weight:600;margin:-4px 0 10px;min-height:16px}
  .login-demo{text-align:center;color:#7E9488;font-size:11.5px;margin-top:16px;line-height:1.5}
  .login-demo b{color:#9DB6A6}

  /* ===== fase carga (piladoras) ===== */
  .pil-card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px 14px;
    margin-bottom:11px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .pil-card.salio:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ok)}
  .pil-card.term:before,.pil-card.cargando:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--maize-deep)}
  .pil-top{display:flex;align-items:flex-start;gap:11px}
  .pil-n{width:30px;height:30px;border-radius:9px;background:var(--field);color:#EAF0EA;
    font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .pil-info{flex:1;min-width:0}
  .pil-nom{font-size:15px;font-weight:600;color:var(--field)}
  .pil-dir{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.35}
  .pil-meta{font-size:12px;color:var(--muted);margin-top:3px}
  .pil-card.bloq{opacity:.6}
  .pil-bloq{margin-top:12px;background:#F1ECE0;border:1px dashed var(--line);border-radius:10px;
    padding:11px;text-align:center;font-size:12.5px;color:var(--muted);font-weight:600}
  .pil-prog{margin-top:12px}
  .pil-bar{height:8px;background:var(--paper);border-radius:99px;overflow:hidden}
  .pil-bar i{display:block;height:100%;background:var(--maize);border-radius:99px;transition:width .3s}
  .pil-prog-l{display:flex;justify-content:space-between;font-size:12px;color:var(--field);font-weight:600;margin-top:6px}
  .pil-llegada{font-size:12px;color:var(--muted);margin-top:8px}
  .pil-actions{display:flex;gap:9px;margin-top:12px}
  .b-carga-sec{flex:1;background:#fff;border:1.5px solid var(--line);color:var(--field);font-weight:600;
    font-size:13.5px;border-radius:11px;padding:11px 8px}
  .b-carga-sec:active{background:var(--paper)}
  .b-carga-accion{width:100%;margin-top:12px;background:var(--field);color:#EAF0EA;font-weight:700;
    font-size:14.5px;border-radius:11px;padding:13px}
  .b-carga-accion:active{background:var(--field-700)}
  .b-carga-accion.salir{background:var(--maize);color:var(--field)}
  .b-carga-accion.salir:active{background:var(--maize-deep)}
  .b-nov-carga{width:100%;margin:6px 0 14px;background:#fff;border:1.5px solid var(--clay);color:var(--clay);
    font-weight:700;font-size:14px;border-radius:12px;padding:13px}
  .b-nov-carga:active{background:#FBEFEA}
  .b-ir-entregas{width:100%;background:var(--ok);color:#fff;font-weight:700;font-size:15.5px;border-radius:13px;padding:15px;margin-top:4px}
  .b-ir-entregas:active{background:#256B45}
  .bloqueo-entregas{background:#F1ECE0;border:1px dashed var(--line);border-radius:12px;padding:14px;
    text-align:center;font-size:13px;color:var(--muted);font-weight:600;line-height:1.4}
  .b-ver-carga{width:100%;background:#fff;border:1.5px solid var(--line);color:var(--field);font-weight:600;
    font-size:13.5px;border-radius:11px;padding:11px;margin-bottom:14px}
  .b-ver-carga:active{background:var(--paper)}

  /* ===== resumen ruta ===== */
  .ruta-hero{background:var(--field);border-radius:16px;padding:16px 17px;color:#EAF0EA;margin-bottom:16px}
  .ruta-hero .rh-dest{font-size:18px;font-weight:700}
  .rh-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .ruta-check{font-size:11.5px;font-weight:700;color:var(--field);background:var(--maize);
    border-radius:7px;padding:3px 9px;white-space:nowrap}
  .ruta-hero.done{opacity:.78}

  /* ===== acciones del inicio ===== */
  .acc-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .acc-card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 13px;
    text-align:left;box-shadow:var(--shadow)}
  .acc-card:active{transform:scale(.98)}
  .acc-ico{font-size:26px}
  .acc-tit{font-size:14px;font-weight:700;color:var(--field);margin-top:8px;line-height:1.25}
  .acc-sub{font-size:11.5px;color:var(--muted);margin-top:3px}
  .acc-aviso{background:#FFFBF2;border:1px solid #EAD2A0;border-radius:12px;padding:12px 13px;
    margin-top:13px;font-size:12.5px;color:var(--maize-deep);font-weight:600;line-height:1.4}

  /* filas de pago / solicitud */
  .pago-row{display:flex;align-items:center;justify-content:space-between;gap:11px;background:var(--card);
    border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
  .pago-info{min-width:0}
  .pago-ruta{font-size:14.5px;font-weight:600;color:var(--field)}
  .pago-meta{font-size:12px;color:var(--muted);margin-top:2px}
  .pago-der{text-align:right;flex-shrink:0}
  .pago-monto{font-size:16px;font-weight:700;color:var(--field);margin-bottom:4px}
  .hi-chip{font-size:11px;font-weight:700;border-radius:7px;padding:3px 9px;margin-right:6px;display:inline-block}
  .ruta-hero .rh-veh{font-size:13px;color:#9DB6A6;margin-top:3px}
  .rh-stats{display:flex;gap:10px;margin-top:14px}
  .rh-stat{flex:1;background:rgba(255,255,255,.09);border-radius:11px;padding:9px 11px}
  .rh-stat .v{font-size:19px;font-weight:700}
  .rh-stat .l{font-size:11px;color:#9DB6A6;margin-top:1px}
  .progbar{height:7px;background:rgba(255,255,255,.14);border-radius:99px;margin-top:14px;overflow:hidden}
  .progbar i{display:block;height:100%;background:var(--maize);border-radius:99px;transition:width .3s}
  .prog-label{font-size:12px;color:#9DB6A6;margin-top:7px}

  .sect-h{font-size:12px;font-weight:700;color:var(--field);text-transform:uppercase;letter-spacing:.05em;
    margin:4px 2px 10px}

  /* ===== parada (cliente) ===== */
  .stop{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px 14px;
    margin-bottom:11px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .stop.done{opacity:.92}
  .stop.done:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ok)}
  .stop.parcial:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--maize-deep)}
  .stop.nov:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--clay)}
  .stop-top{display:flex;align-items:flex-start;gap:11px}
  .stop-n{width:30px;height:30px;border-radius:9px;background:var(--maize);color:var(--field);
    font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .stop.done .stop-n{background:var(--ok);color:#fff}
  .stop.parcial .stop-n{background:var(--maize-deep);color:#fff}
  .stop.nov .stop-n{background:var(--clay);color:#fff}
  .stop-cli{flex:1;min-width:0}
  .stop-nom{font-size:15px;font-weight:600;color:var(--field)}
  .stop-dir{font-size:12.5px;color:var(--muted);margin-top:2px;line-height:1.35}
  .stop-ciudad{font-size:11.5px;font-weight:600;color:var(--field);background:var(--paper);
    border-radius:7px;padding:3px 8px;white-space:nowrap;flex-shrink:0}
  .stop-carga{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}
  .stop-tag{font-size:12px;color:var(--ink);background:var(--paper);border-radius:8px;padding:5px 10px}
  .stop-tag b{font-weight:700}
  .stop-actions{display:flex;gap:9px;margin-top:13px}
  .b-entregar{flex:1;background:var(--ok);color:#fff;font-weight:700;font-size:14.5px;border-radius:11px;padding:12px}
  .b-entregar:active{background:#256B45}
  .b-novedad{background:#fff;color:var(--clay);border:1.5px solid var(--clay);font-weight:700;font-size:14px;border-radius:11px;padding:12px 15px}
  .b-novedad:active{background:#FBEFEA}
  .stop-result{margin-top:11px;border-top:1px dashed var(--line);padding-top:10px;font-size:12.5px;color:var(--muted)}
  .stop-result b{color:var(--field)}
  .res-line{display:flex;align-items:center;gap:7px;margin-top:3px}
  .res-ico{font-size:13px}
  .b-ver{margin-top:9px;font-size:13px;font-weight:600;color:var(--maize-deep)}
  .badge-est{font-size:11px;font-weight:700;border-radius:7px;padding:3px 9px;white-space:nowrap}
  .be-ok{background:#E4F2EA;color:var(--ok)} .be-nov{background:#F7E9E2;color:var(--clay)}
  .be-parcial{background:#FCEFD3;color:var(--maize-deep)}
  .stop-tel{font-size:12.5px;color:var(--maize-deep);font-weight:600;margin-top:7px;display:inline-block}
  .res-saldo{margin-top:8px;background:#FCEFD3;border-radius:9px;padding:8px 10px;color:var(--maize-deep);font-size:12px}
  .res-saldo b{color:var(--maize-deep)}

  /* ===== sheet (modal hoja) ===== */
  .scrim{position:fixed;inset:0;background:rgba(15,30,22,.5);z-index:40;display:flex;align-items:flex-end;justify-content:center}
  .sheet{width:100%;max-width:430px;background:var(--paper);border-radius:20px 20px 0 0;
    max-height:92dvh;overflow-y:auto;animation:up .25s ease}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .sheet-h{position:sticky;top:0;background:var(--paper);padding:16px 18px 12px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;z-index:2}
  .sheet-t{font-size:17px;font-weight:700;color:var(--field)}
  .sheet-x{font-size:22px;color:var(--muted);width:34px;height:34px;display:flex;align-items:center;justify-content:center}
  .sheet-b{padding:16px 18px 24px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--field);margin-bottom:6px}
  .field .req{color:var(--clay)}
  .inp{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;background:#fff;color:var(--ink)}
  .inp:focus{outline:none;border-color:var(--maize)}
  textarea.inp{resize:none;min-height:74px}
  .foto-zone{border:2px dashed var(--line);border-radius:13px;padding:22px;text-align:center;background:#fff;width:100%}
  .foto-zone:active{border-color:var(--maize)}
  .foto-demo{width:100%;margin-top:8px;background:transparent;border:1px dashed var(--maize-deep);
    color:var(--maize-deep);font-size:12.5px;font-weight:600;border-radius:10px;padding:9px}
  .foto-demo:active{background:#FCEFD3}
  .foto-ico{font-size:34px}
  .foto-txt{font-size:13.5px;color:var(--muted);margin-top:6px;font-weight:600}
  .foto-prev{position:relative;border-radius:13px;overflow:hidden}
  .foto-prev img{width:100%;display:block}
  .foto-prev .del{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border-radius:99px;width:30px;height:30px;font-size:16px;display:flex;align-items:center;justify-content:center}
  .foto-prev .ok{position:absolute;bottom:8px;left:8px;background:var(--ok);color:#fff;font-size:11.5px;font-weight:700;border-radius:7px;padding:4px 9px}
  .motivos{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .motivo{border:1.5px solid var(--line);border-radius:11px;padding:12px 10px;background:#fff;font-size:13.5px;font-weight:600;color:var(--ink);text-align:center}
  .motivo.sel{border-color:var(--clay);background:#FBEFEA;color:var(--clay)}
  .sheet-foot{position:sticky;bottom:0;background:var(--paper);padding:12px 18px 18px;border-top:1px solid var(--line)}
  .b-confirm{width:100%;background:var(--ok);color:#fff;font-weight:700;font-size:15.5px;border-radius:13px;padding:15px}
  .b-confirm:active{background:#256B45}
  .b-confirm.dis{background:#C7D2C9;color:#fff}
  .b-confirm.nov{background:var(--clay)} .b-confirm.nov:active{background:#A33E27}
  .falta-hint{font-size:12px;color:var(--clay);font-weight:600;text-align:center;margin-bottom:9px}
  .mini-list{font-size:13px;color:var(--ink)}
  .mini-list .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line)}
  .mini-list .row:last-child{border-bottom:none}

  /* ===== stepper de cantidad por item (entrega parcial) ===== */
  .item-row{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:9px}
  .item-row.cero{border-color:#E7C9C0;background:#FCF4F1}
  .item-row.parc{border-color:#EAD2A0;background:#FFFBF2}
  .item-nom{font-size:13.5px;font-weight:600;color:var(--field);line-height:1.3}
  .item-prov{font-size:11.5px;color:var(--muted);margin-top:1px}
  .item-ctl{display:flex;align-items:center;justify-content:space-between;margin-top:9px;gap:10px}
  .item-ped{font-size:11.5px;color:var(--muted)}
  .item-ped b{color:var(--field);font-weight:700}
  .stepper{display:flex;align-items:center;gap:0;border:1.5px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
  .stepper button{width:38px;height:38px;font-size:20px;font-weight:700;color:var(--field);background:#fff}
  .stepper button:active{background:var(--paper)}
  .stepper button.dis{color:#C7D2C9}
  .stepper .val{min-width:46px;text-align:center;font-size:16px;font-weight:700;color:var(--field);border-left:1px solid var(--line);border-right:1px solid var(--line);padding:8px 0}
  .item-flag{font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;margin-left:7px}
  .flag-cero{background:#F7E9E2;color:var(--clay)}
  .flag-parc{background:#FCEFD3;color:var(--maize-deep)}
  .entrega-tot{display:flex;gap:9px;margin:4px 0 14px}
  .et-cell{flex:1;border-radius:11px;padding:10px 11px;text-align:center}
  .et-ok{background:#E4F2EA;color:var(--ok)} .et-dev{background:#FCEFD3;color:var(--maize-deep)}
  .et-cell .v{font-size:18px;font-weight:700} .et-cell .l{font-size:10.5px;margin-top:1px;font-weight:600}
  .aviso-parc{background:#FFFBF2;border:1px solid #EAD2A0;border-radius:11px;padding:11px 12px;margin-bottom:14px;font-size:12.5px;color:var(--maize-deep);line-height:1.4}
  .aviso-parc b{font-weight:700}

  /* cierre / vacío */
  .done-banner{background:#E4F2EA;border:1px solid #Bfe0CC;border-radius:14px;padding:16px;text-align:center;margin-bottom:16px}
  .done-banner .big{font-size:30px} .done-banner .t{font-size:15px;font-weight:700;color:var(--ok);margin-top:5px}
  .done-banner .s{font-size:12.5px;color:#3C6B50;margin-top:3px}
  .cierre-stats{display:flex;gap:9px;margin-top:13px}
  .cierre-stats .c{flex:1;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 8px}
  .cierre-stats .c .v{font-size:18px;font-weight:700;color:var(--field)}
  .cierre-stats .c .l{font-size:10.5px;color:var(--muted);margin-top:2px}
  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty .ico{font-size:42px;opacity:.5} .empty .t{font-size:15px;font-weight:600;margin-top:12px;color:var(--field)}
  .empty .s{font-size:13px;margin-top:5px}

  .net{display:flex;align-items:center;gap:6px;font-size:11.5px;color:#9DB6A6}
  .dot{width:7px;height:7px;border-radius:99px;background:var(--maize)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--field);color:#fff;
    padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:600;z-index:60;box-shadow:0 8px 30px rgba(0,0,0,.3);
    max-width:90%;text-align:center}
  @keyframes fxEntrar{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fx-entrar{animation:fxEntrar .5s cubic-bezier(.2,.8,.2,1) both}
  button:active:not([disabled]){transform:translateY(1px)}
  .chofer-card:active{transform:translateY(1px)}
  @media (prefers-reduced-motion:reduce){.fx-entrar{animation:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";

/* ===========================================================
   DATOS COMPARTIDOS con la app de Logística (mismo modelo).

/* ===================== FASE DE CARGA ===================== */
/* Los puntos de carga los define LOGÍSTICA en r.cargas[] (orden estricto 1,2,3...).
   El estado de cada punto se guarda en r.carga[orden]. */
function puntosDeCarga(r){
  var lista=(r.cargas||[]).slice();
  lista.sort(function(a,b){return a.orden-b.orden;});
  return lista;
}
// Estado de un punto de carga (por su número de orden). Se guarda en r.carga.
function cargaDe(r,orden){
  if(!r.carga) r.carga={};
  if(!r.carga[orden]) r.carga[orden]={ llegada:null, qqCargado:0, terminado:false, salida:false, avances:[] };
  return r.carga[orden];
}
// ¿El punto anterior ya está cerrado (salida)? Para el orden estricto.
function puntoHabilitado(r,orden){
  if(orden<=1) return true;
  return cargaDe(r,orden-1).salida===true;
}
// ¿Ya salió de TODOS los puntos? Solo entonces se habilitan las entregas.
function cargaCompleta(r){
  var pts=puntosDeCarga(r);
  if(pts.length===0) return true;
  return pts.every(function(x){ return cargaDe(r,x.orden).salida; });
}
function qqRutaTotal(r){
  return puntosDeCarga(r).reduce(function(a,x){return a+x.qq;},0);
}
function qqRutaCargado(r){
  return puntosDeCarga(r).reduce(function(a,x){return a+Math.min(cargaDe(r,x.orden).qqCargado,x.qq);},0);
}

function tareasNotif(){
  var t=[];
  if(UI.ruta){
    var r=ruta(UI.ruta);
    if(r){
      var pendCarga=puntosDeCarga(r).filter(function(x){ return !cargaDe(r,x.orden).salida; }).length;
      if(pendCarga>0) t.push({tipo:"carga", icono:"📦", titulo:"Puntos de carga por completar", detalle:"La entrega se habilita al terminar la carga", n:pendCarga, destino:"carga"});
      var pendEnt=r.pedidos.filter(function(id){return ped(id).estadoEntrega==="pendiente";}).length;
      if(pendEnt>0 && cargaCompleta(r)) t.push({tipo:"entregas", icono:"🚚", titulo:"Entregas pendientes del viaje", detalle:"Clientes esperando en la ruta", n:pendEnt, destino:"entrega"});

  return t.filter(function(x){return PREFS_NOTIF[x.tipo];});
}

function render(){

  var r=ruta(UI.ruta);
  // Si la carga aún no termina, forzamos la fase de carga (entregas bloqueadas).
  if(!cargaCompleta(r)) UI.fase="carga";
  if(UI.fase==="carga"){ renderCarga(); }
  else { renderEntrega(); }
  if(UI.sheet) renderSheet();
  renderCampana();
}

      UI.chofer=c.nombre; UI.choferNuevo=null; UI.ruta=null; render();

  var btn=$("#n-entrar");

    var nom=$("#n-nombre"), ced=$("#n-cedula"), tel=$("#n-tel"), pla=$("#n-placa");

        && /^[0-9]{10}$/.test(ced.value.trim())

                  telefono:tel.value.trim(), placas:[pla.value.trim().toUpperCase()],

      r.chofer=datos.nombre; r.placa=datos.placas[0];
      UI.choferNuevo=datos; UI.chofer=datos.nombre; UI.ruta=null;
      render();
      toast("Bienvenido, "+datos.nombre.split(" ")[0]);

/* ---------- Lista de rutas del chofer ---------- */
// Una ruta está CONCLUIDA cuando salió de todos los puntos de carga
// y todas sus paradas están resueltas (entregado/parcial/novedad).
function rutaConcluida(r){
  if(!cargaCompleta(r)) return false;
  if(r.pedidos.length===0) return false;
  return r.pedidos.every(function(id){ return ped(id).estadoEntrega!=="pendiente"; });
}

function tarjetaRuta(r,completada){
  var total=r.pedidos.length;
  var hechos=r.pedidos.filter(function(id){return ped(id).estadoEntrega!=="pendiente";}).length;
  var kg=r.pedidos.reduce(function(a,id){return a+pesoPedido(ped(id));},0);
  var qq=Math.round(qqDeKg(kg));
  var veh=VEHICULOS[r.placa]||{tipo:r.placa};
  var check = completada ? '<span class="ruta-check">✓ Completada</span>' : '';
  return '<div class="ruta-hero'+(completada?' done':'')+'" data-ruta="'+r.id+'" style="cursor:pointer">'
    +'<div class="rh-head"><div class="rh-dest">'+r.nombre+'</div>'+check+'</div>'
    +'<div class="rh-veh">'+r.placa+' · '+veh.tipo+'</div>'
    +'<div class="rh-stats">'
    +'<div class="rh-stat"><div class="v num">'+total+'</div><div class="l">paradas</div></div>'
    +'<div class="rh-stat"><div class="v num">'+qq+'</div><div class="l">quintales</div></div>'
    +'<div class="rh-stat"><div class="v num">'+hechos+'/'+total+'</div><div class="l">entregadas</div></div>'
    +'</div></div>';
}

  var ch=UI.chofer;

  var porCobrar=fl.filter(function(f){return f.estado==="por_cobrar";}).reduce(function(a,f){return a+f.monto;},0);
  var cobrado=fl.filter(function(f){return f.estado==="cobrado";}).reduce(function(a,f){return a+f.monto;},0);

    +'<div class="rh-stat"><div class="v num">'+dineroUSD(porCobrar)+'</div><div class="l">por cobrar</div></div>'
    +'<div class="rh-stat"><div class="v num">'+dineroUSD(cobrado)+'</div><div class="l">ya cobrado</div></div>'
    +'</div></div>';

  var lista=fl.map(function(f){
    var badge = f.estado==="por_cobrar"
      ? '<span class="badge-est be-parcial">Por cobrar</span>'
      : '<span class="badge-est be-ok">Cobrado</span>';

      +'<div class="pago-info"><div class="pago-ruta">'+f.rutaNombre+'</div>'

/* ----- Historial de rutas entregadas ----- */
function secHistorial(){
  var hs=historialDe(UI.chofer);
  if(hs.length===0){
    return '<div class="empty"><div class="ico">📋</div><div class="t">Sin rutas anteriores</div>'
      +'<div class="s">Tus rutas entregadas en días pasados aparecerán aquí.</div></div>';
  }
  var lista=hs.map(function(h){
    var resumen=[];
    resumen.push('<span class="hi-chip be-ok">'+h.entregadas+' entregadas</span>');
    if(h.parciales>0) resumen.push('<span class="hi-chip be-parcial">'+h.parciales+' parcial'+(h.parciales>1?"es":"")+'</span>');
    if(h.novedades>0) resumen.push('<span class="hi-chip be-nov">'+h.novedades+' novedad'+(h.novedades>1?"es":"")+'</span>');
    return '<div class="stop" style="cursor:default">'
      +'<div class="stop-top"><div class="stop-cli">'
      +'<div class="stop-nom">'+h.nombre+'</div>'
      +'<div class="stop-dir">'+h.fecha+' · '+h.placa+' · '+h.qq+' qq · '+h.paradas+' paradas</div></div>'
      +'<span class="stop-ciudad">✓</span></div>'
      +'<div class="stop-carga">'+resumen.join("")+'</div></div>';
  }).join("");
  return '<div class="sect-h">Rutas entregadas</div>'+lista;
}

/* ----- Solicitud de anticipo / reposición ----- */
function secSolicitud(tipo){
  var esAnt = tipo==="anticipo";
  var mias=solicitudesDe(UI.chofer).filter(function(x){return x.tipo===tipo;});
  var intro = esAnt
    ? "Pide por adelantado el dinero para pagar la estibada (carga/descarga). Se envía al área financiera."
    : "¿Pagaste la estibada de tu bolsillo? Pide que te la repongan. Se envía al área financiera.";

  var form='<div class="nuevo-form">'
    +'<div class="aviso-parc" style="color:var(--field);border-color:var(--line);background:var(--paper)">'+intro+'</div>'
    +'<div class="field"><label>Concepto <span class="req">*</span></label>'
    +'<input class="inp" id="s-concepto" placeholder="'+(esAnt?"Ej: Estibada carga Sierra Centro":"Ej: Pagué estibada descarga")+'" /></div>'
    +'<div class="field"><label>Monto (USD) <span class="req">*</span></label>'
    +'<input class="inp" id="s-monto" type="tel" inputmode="decimal" placeholder="0.00" /></div>'
    +'<div class="field"><label>Nota (opcional)</label>'
    +'<textarea class="inp" id="s-nota" placeholder="Detalle para el área financiera"></textarea></div>'
    +(esAnt?"":fotoCampo("Comprobante (opcional)","Adjunta el recibo de lo que pagaste"))
    +'<div id="s-falta" class="falta-hint"></div>'
    +'<button class="b-confirm dis" id="s-enviar">Enviar al área financiera</button>'
    +'</div>';

  var historial="";
  if(mias.length>0){
    historial='<div class="sect-h" style="margin-top:20px">Mis solicitudes</div>'+mias.map(function(x){
      var b = x.estado==="aprobada"?'<span class="badge-est be-ok">Aprobada</span>'
            : x.estado==="rechazada"?'<span class="badge-est be-nov">Rechazada</span>'
            : '<span class="badge-est be-parcial">En revisión</span>';
      return '<div class="pago-row"><div class="pago-info"><div class="pago-ruta">'+x.concepto+'</div>'
        +'<div class="pago-meta">'+x.fecha+'</div></div>'
        +'<div class="pago-der"><div class="pago-monto num">'+dineroUSD(x.monto)+'</div>'+b+'</div></div>';
    }).join("");
  }
  return form+historial;
}

function bindSolicitud(tipo){
  var esAnt = tipo==="anticipo";
  if(!esAnt) bindFoto();
  var con=$("#s-concepto"), mon=$("#s-monto"), btn=$("#s-enviar"), hint=$("#s-falta");
  function chk(){
    var faltan=[];
    if(con.value.trim().length<3) faltan.push("concepto");
    var m=parseFloat(mon.value); if(isNaN(m)||m<=0) faltan.push("monto válido");
    var ok=faltan.length===0;
    btn.className="b-confirm"+(ok?"":" dis");
    if(hint){ hint.textContent= ok?"":("Falta: "+faltan.join(", ")); }
    return ok;
  }
  con.oninput=chk; mon.oninput=chk; chk();
  btn.onclick=function(){
    if(!chk()) return;
    var m=Math.round(parseFloat(mon.value)*100)/100;
    var nueva={ id:"SOL-"+Math.floor(Math.random()*900+100), chofer:UI.chofer, tipo:tipo,
      concepto:con.value.trim(), monto:m, fecha:"hoy", estado:"pendiente",
      nota:($("#s-nota").value||"").trim(), foto:!!UI.foto, fechaISO:(new Date()).toISOString() };
    SOLICITUDES.push(nueva);
    REGISTROS.push({ tipo:"solicitud_"+tipo, destino:"financiero", chofer:UI.chofer,
      concepto:nueva.concepto, monto:m, hora:ahora(), fechaISO:nueva.fechaISO });
    UI.foto=null;
    toast("Solicitud enviada al área financiera");
    render(); window.scrollTo(0,0);
  };
}

/* ---------- FASE CARGA (puntos de recogida definidos por logística) ---------- */
function renderCarga(){
  var r = ruta(UI.ruta);
  var pts = puntosDeCarga(r);
  var totalQq = qqRutaTotal(r);
  var cargadoQq = qqRutaCargado(r);
  var pct = totalQq? Math.round(cargadoQq/totalQq*100):0;
  var veh=VEHICULOS[r.placa]||{tipo:r.placa};
  var listos = pts.filter(function(x){return cargaDe(r,x.orden).salida;}).length;

  var hero='<div class="ruta-hero">'
    +'<div class="rh-dest">'+r.nombre+'</div>'
    +'<div class="rh-veh">'+r.placa+' · '+veh.tipo+'</div>'
    +'<div class="progbar"><i style="width:'+pct+'%"></i></div>'
    +'<div class="prog-label">Cargados '+cargadoQq+' de '+totalQq+' qq · '+listos+'/'+pts.length+' puntos listos</div>'
    +'</div>';

  var cards = pts.map(function(x){
    var c=cargaDe(r,x.orden);
    var hab=puntoHabilitado(r,x.orden);
    var ppct = x.qq? Math.round(Math.min(c.qqCargado,x.qq)/x.qq*100):0;
    var estado = c.salida ? "salio" : c.terminado ? "term" : c.llegada ? "cargando" : (hab?"porllegar":"bloq");
    var estTxt = c.salida ? "Salió del punto" : c.terminado ? "Carga terminada" : c.llegada ? "Cargando" : (hab?"Por llegar":"Bloqueado");
    var estCls = c.salida ? "be-ok" : (c.terminado||c.llegada) ? "be-parcial" : "";

    var inner='<div class="pil-top">'
      +'<div class="pil-n">'+x.orden+'</div>'
      +'<div class="pil-info"><div class="pil-nom">'+x.piladora+'</div>'
      +'<div class="pil-dir">📍 '+x.dir+'</div>'
      +'<div class="pil-meta">'+x.prov+' · meta <b class="num">'+x.qq+'</b> qq</div></div>'
      +'<span class="badge-est '+estCls+'">'+estTxt+'</span></div>';

    if(!hab && !c.salida){
      inner+='<div class="pil-bloq">🔒 Primero debes salir del punto '+(x.orden-1)+'.</div>';
    } else if(!c.llegada){
      inner+='<button class="b-carga-accion" data-llegada="'+x.orden+'">📍 Registrar llegada</button>';
    } else {
      inner+='<div class="pil-prog"><div class="pil-bar"><i style="width:'+ppct+'%"></i></div>'
        +'<div class="pil-prog-l"><span><b class="num">'+Math.min(c.qqCargado,x.qq)+'</b> / '+x.qq+' qq</span><span>'+ppct+'%</span></div></div>';
      inner+='<div class="pil-llegada">🕒 Llegada: '+c.llegada+(c.avances.length?(' · '+c.avances.length+' avance'+(c.avances.length>1?'s':'')):'')+'</div>';
      if(!c.salida){
        if(!c.terminado){
          inner+='<div class="pil-actions">'
            +'<button class="b-carga-sec" data-avance="'+x.orden+'">+ Avance de carga</button>'
            +'<button class="b-carga-sec" data-termina="'+x.orden+'">✓ Terminé de cargar</button>'
            +'</div>';
        } else {
          inner+='<button class="b-carga-accion salir" data-salir-punto="'+x.orden+'">🚚 Salir del punto</button>';
        }
      }
    }
    return '<div class="pil-card '+estado+'">'+inner+'</div>';
  }).join("");

  var pieEntregas;
  if(cargaCompleta(r)){
    pieEntregas='<button class="b-ir-entregas" data-ir-entregas>Ir a las entregas →</button>';
  } else {
    pieEntregas='<div class="bloqueo-entregas">🔒 Las entregas se habilitan cuando salgas de todos los puntos de carga.</div>';
  }

  $("#root").innerHTML = shell(
    '<button class="back" data-volver>‹ Mis rutas</button>',
    '<span class="badge-est" style="background:rgba(255,255,255,.12);color:#EAF0EA">Carga</span>',
    hero
    +'<div class="sect-h">Recogida de mercadería (en orden)</div>'+cards
    +'<button class="b-nov-carga" data-nov-carga>⚠️ Reportar novedad de carga</button>'
    +pieEntregas);

  bindTop();
  $("[data-volver]").onclick=function(){ UI.ruta=null; render(); window.scrollTo(0,0); };
  $all("[data-llegada]").forEach(function(b){ b.onclick=function(){ abrirCarga("llegada", +b.getAttribute("data-llegada")); }; });
  $all("[data-avance]").forEach(function(b){ b.onclick=function(){ abrirCarga("avance", +b.getAttribute("data-avance")); }; });
  $all("[data-termina]").forEach(function(b){ b.onclick=function(){ abrirCarga("termina", +b.getAttribute("data-termina")); }; });
  $all("[data-salir-punto]").forEach(function(b){ b.onclick=function(){ salirDelPunto(+b.getAttribute("data-salir-punto")); }; });
  var nc=$("[data-nov-carga]"); if(nc) nc.onclick=function(){ abrirCarga("novedad", null); };
  var ie=$("[data-ir-entregas]"); if(ie) ie.onclick=function(){ UI.fase="entregas"; render(); window.scrollTo(0,0); };
}

/* ---------- Entrega (paradas de la ruta) ---------- */
function renderEntrega(){
  var r = ruta(UI.ruta);
  var total=r.pedidos.length;
  var hechos=r.pedidos.filter(function(id){return ped(id).estadoEntrega!=="pendiente";}).length;
  var pct = total? Math.round(hechos/total*100):0;
  var veh=VEHICULOS[r.placa]||{tipo:r.placa};
  var kg=r.pedidos.reduce(function(a,id){return a+pesoPedido(ped(id));},0);

  var hero='<div class="ruta-hero">'
    +'<div class="rh-dest">'+r.nombre+'</div>'
    +'<div class="rh-veh">'+r.placa+' · '+veh.tipo+'</div>'
    +'<div class="progbar"><i style="width:'+pct+'%"></i></div>'
    +'<div class="prog-label">'+hechos+' de '+total+' entregas · '+Math.round(qqDeKg(kg))+' qq</div>'
    +'</div>';

  var banner = "";
  if(hechos===total && total>0){
    var nEnt=r.pedidos.filter(function(id){return ped(id).estadoEntrega==="entregado";}).length;
    var nParc=r.pedidos.filter(function(id){return ped(id).estadoEntrega==="parcial";}).length;
    var nNov=r.pedidos.filter(function(id){return ped(id).estadoEntrega==="novedad";}).length;
    banner = '<div class="done-banner"><div class="big">✅</div><div class="t">Ruta completada</div>'
      +'<div class="s">Todas las paradas quedaron registradas. Logística ya ve el cierre.</div>'
      +'<div class="cierre-stats">'
      +'<div class="c"><div class="v num">'+nEnt+'</div><div class="l">completas</div></div>'
      +'<div class="c"><div class="v num">'+nParc+'</div><div class="l">parciales</div></div>'
      +'<div class="c"><div class="v num">'+nNov+'</div><div class="l">novedades</div></div>'
      +'</div></div>';
  }

  var stops = r.pedidos.map(function(id,idx){
    var p=ped(id); var n=idx+1;
    var est=p.estadoEntrega;
    var cls = est==="entregado"?"stop done":est==="parcial"?"stop parcial":est==="novedad"?"stop nov":"stop";
    var icoN = est==="entregado"?"✓":est==="parcial"?"≈":est==="novedad"?"!":n;
    var tags = '<span class="stop-tag"><b class="num">'+bultos(p)+'</b> bultos</span>'
             +'<span class="stop-tag"><b class="num">'+Math.round(qqDeKg(pesoPedido(p)))+'</b> qq</span>'
             +'<span class="stop-tag">Guía <b>'+p.guia+'</b></span>';
    var html='<div class="'+cls+'">'
      +'<div class="stop-top">'
      +'<div class="stop-n">'+icoN+'</div>'
      +'<div class="stop-cli"><div class="stop-nom">'+p.cli+'</div>'
      +'<div class="stop-dir">'+p.dir+(p.ref?' · '+p.ref:'')+'</div></div>'
      +'<div class="stop-ciudad">'+p.ciudad+'</div></div>'
      +'<div class="stop-carga">'+tags+'</div>';

    if(est==="pendiente"){
      html+='<a class="stop-tel" href="tel:'+p.tel+'">📞 '+p.tel+'</a>'
        +'<div class="stop-actions">'
        +'<button class="b-entregar" data-entregar="'+p.id+'">Entregado</button>'
        +'<button class="b-novedad" data-novedad="'+p.id+'">Novedad</button>'
        +'</div>';
    } else if(est==="entregado" || est==="parcial"){
      var e=p.entrega||{};
      var badge = est==="parcial"
        ? '<div class="res-line"><span class="badge-est be-parcial">Entrega parcial</span></div>'
        : '<div class="res-line"><span class="badge-est be-ok">Entrega completa</span></div>';
      html+='<div class="stop-result">'
        +badge
        +'<div class="res-line"><span class="res-ico">👤</span> Recibió: <b>'+(e.recibe||"—")+'</b></div>'
        +'<div class="res-line"><span class="res-ico">🪪</span> CI: <b>'+(e.cedula||"—")+'</b></div>'
        +'<div class="res-line"><span class="res-ico">🕒</span> '+(e.hora||"—")+'</div>'
        +'<div class="res-line"><span class="res-ico">📄</span> Guía firmada adjunta</div>';
      if(est==="parcial" && e.devoluciones && e.devoluciones.length){
        var ld = e.devoluciones.map(function(d){
          return d.p.split("·")[0].trim()+' (<b class="num">'+d.q+'</b>)';
        }).join(", ");
        html+='<div class="res-saldo">↩️ Devolución: '+ld+'<br>El saldo regresa a logística.</div>';
      }
      html+='</div>';
    } else {
      var nv=p.entrega||{};
      html+='<div class="stop-result">'
        +'<div class="res-line"><span class="badge-est be-nov">'+(nv.motivo||"Novedad")+'</span></div>'
        +(nv.nota?'<div class="res-line" style="margin-top:6px">'+nv.nota+'</div>':'')
        +'<div class="res-line"><span class="res-ico">🕒</span> '+(nv.hora||"—")+'</div>'
        +'</div>';
    }
    html+='</div>';
    return html;
  }).join("");

  $("#root").innerHTML = shell(
    '<button class="back" data-volver>‹ Mis rutas</button>',
    '<span class="badge-est '+(hechos===total?'be-ok':'')+'" style="background:rgba(255,255,255,.12);color:#EAF0EA">'+hechos+'/'+total+'</span>',
    hero
    +'<button class="b-ver-carga" data-ver-carga>📦 Ver resumen de carga</button>'
    +banner+'<div class="sect-h">Paradas (en orden de entrega)</div>'+stops);

  bindTop();
  $("[data-volver]").onclick=function(){ UI.ruta=null; render(); window.scrollTo(0,0); };
  var vc=$("[data-ver-carga]"); if(vc) vc.onclick=function(){ UI.fase="carga"; render(); window.scrollTo(0,0); };
  $all("[data-entregar]").forEach(function(b){ b.onclick=function(){ abrirSheet("entregar", b.getAttribute("data-entregar")); }; });
  $all("[data-novedad]").forEach(function(b){ b.onclick=function(){ abrirSheet("novedad", b.getAttribute("data-novedad")); }; });
}

/* ---------- Acciones de carga (hoja) ---------- */
function abrirCarga(tipo,orden){
  UI.sheet={modo:"carga", tipo:tipo, orden:orden}; UI.foto=null; UI.motivo=null;
  render();
}
function puntoPorOrden(r,orden){ return puntosDeCarga(r).find(function(x){return x.orden===orden;}); }

function salirDelPunto(orden){
  var r=ruta(UI.ruta); var c=cargaDe(r,orden); var x=puntoPorOrden(r,orden);
  c.salida=true;
  if(UI.recordatorios[orden]){ clearTimeout(UI.recordatorios[orden]); delete UI.recordatorios[orden]; }
  REGISTROS.push({ tipo:"carga_salida", ruta:r.id, rutaNombre:r.nombre, chofer:UI.chofer,
    placa:r.placa, orden:orden, piladora:x.piladora, proveedor:x.prov, qqCargado:c.qqCargado,
    hora:ahora(), fechaISO:(new Date()).toISOString() });
  render();
  toast("Salida registrada · punto "+orden);
}
function programarRecordatorio(orden){
  if(UI.recordatorios[orden]) clearTimeout(UI.recordatorios[orden]);
  UI.recordatorios[orden]=setTimeout(function(){
    var r=ruta(UI.ruta); if(!r) return;
    var c=cargaDe(r,orden); var x=puntoPorOrden(r,orden);
    if(c && c.llegada && !c.terminado && !c.salida && UI.fase==="carga"){
      toast("⏰ Recuerda registrar el avance de carga en "+(x?x.piladora.split(" ")[0]:"el punto "+orden));
      programarRecordatorio(orden);
    }
  }, MIN_RECORDATORIO*60*1000);
}

function renderSheetCarga(){
  var s=UI.sheet; var r=ruta(UI.ruta);
  var old=$(".scrim"); if(old) old.remove();
  var div=document.createElement("div"); div.className="scrim";
  var orden=s.orden;
  var x = orden ? puntoPorOrden(r,orden) : null;
  var c = orden ? cargaDe(r,orden) : null;
  var inner;

  if(s.tipo==="llegada"){
    inner='<div class="sheet-h"><div class="sheet-t">Llegada al punto '+orden+'</div><button class="sheet-x" data-x>×</button></div>'
      +'<div class="sheet-b">'
      +'<div class="field"><label>'+x.piladora+'</label>'
      +'<div class="mini-list"><div class="row"><span>'+x.dir+'</span></div>'
      +'<div class="row"><span>'+x.prov+'</span><b class="num">'+x.qq+' qq</b></div></div></div>'
      +'<div class="aviso-parc" style="color:var(--field);border-color:var(--line);background:var(--paper)">Se registrará tu hora de llegada y empezará el control de carga. La app te recordará el avance cada '+MIN_RECORDATORIO+' minutos.</div>'
      +'</div>'
      +'<div class="sheet-foot"><button class="b-confirm" id="c-confirm">Confirmar llegada ('+ahora().replace("hoy · ","")+')</button></div>';
  } else if(s.tipo==="avance"){
    inner='<div class="sheet-h"><div class="sheet-t">Avance de carga</div><button class="sheet-x" data-x>×</button></div>'
      +'<div class="sheet-b">'
      +'<div class="field"><label>'+x.piladora+'</label></div>'
      +'<div class="entrega-tot"><div class="et-cell et-ok"><div class="v num" id="c-prev">'+Math.min(c.qqCargado,x.qq)+'</div><div class="l">qq ya cargados</div></div>'
      +'<div class="et-cell et-dev"><div class="v num">'+x.qq+'</div><div class="l">meta total</div></div></div>'
      +'<div class="field"><label>¿Cuántos qq llevas cargados en total? <span class="req">*</span></label>'
      +'<input class="inp" id="c-qq" type="tel" inputmode="numeric" placeholder="Ej: '+x.qq+'" value="'+(c.qqCargado||"")+'" /></div>'
      +'</div>'
      +'<div class="sheet-foot"><button class="b-confirm dis" id="c-confirm">Guardar avance</button></div>';
  } else if(s.tipo==="termina"){
    inner='<div class="sheet-h"><div class="sheet-t">Terminé de cargar</div><button class="sheet-x" data-x>×</button></div>'
      +'<div class="sheet-b">'
      +'<div class="field"><label>'+x.piladora+'</label></div>'
      +'<div class="field"><label>Total cargado (qq) <span class="req">*</span></label>'
      +'<input class="inp" id="c-qq" type="tel" inputmode="numeric" placeholder="Ej: '+x.qq+'" value="'+(c.qqCargado||x.qq)+'" /></div>'
      +'<div class="aviso-parc">Al terminar, el siguiente paso será <b>salir del punto</b>. Recuerda: la salida del camión es el punto de no retorno.</div>'
      +'</div>'
      +'<div class="sheet-foot"><button class="b-confirm" id="c-confirm">Marcar carga terminada</button></div>';
  } else { // novedad de carga
    var motivos=["Falta producto","Demora en piladora","Producto en mal estado","Documentación","Otro"];
    inner='<div class="sheet-h"><div class="sheet-t">Novedad de carga</div><button class="sheet-x" data-x>×</button></div>'
      +'<div class="sheet-b">'
      +'<div class="field"><label>Motivo <span class="req">*</span></label>'
      +'<div class="motivos">'+motivos.map(function(m){return '<button class="motivo" data-motivo="'+m+'">'+m+'</button>';}).join("")+'</div></div>'
      +'<div class="field"><label>Detalle (opcional)</label>'
      +'<textarea class="inp" id="c-nota" placeholder="Describe el imprevisto para logística"></textarea></div>'
      +fotoCampo("Foto (opcional)","Adjunta una foto si ayuda a explicar la novedad")
      +'</div>'
      +'<div class="sheet-foot"><button class="b-confirm nov dis" id="c-confirm">Enviar a logística</button></div>';
  }

  div.innerHTML='<div class="sheet">'+inner+'</div>';
  $("#root").appendChild(div);
  div.onclick=function(e){ if(e.target===div) cerrarSheet(); };
  $("[data-x]").onclick=cerrarSheet;

  if(s.tipo==="llegada"){
    $("#c-confirm").onclick=function(){
      c.llegada=ahora();
      REGISTROS.push({ tipo:"carga_llegada", ruta:r.id, rutaNombre:r.nombre, chofer:UI.chofer,
        placa:r.placa, orden:orden, piladora:x.piladora, proveedor:x.prov, hora:c.llegada, fechaISO:(new Date()).toISOString() });
      programarRecordatorio(orden);
      cerrarSheet(); toast("Llegada registrada");
    };
  } else if(s.tipo==="avance"){
    var qq=$("#c-qq");
    function chkA(){ var v=parseInt(qq.value,10); $("#c-confirm").className="b-confirm"+((v>=0&&!isNaN(v))?"":" dis"); }
    qq.oninput=chkA; chkA();
    $("#c-confirm").onclick=function(){
      if($("#c-confirm").classList.contains("dis")) return;
      var v=Math.max(0,parseInt(qq.value,10)||0);
      c.qqCargado=v; c.avances.push({qq:v,hora:ahora()});
      REGISTROS.push({ tipo:"carga_avance", ruta:r.id, rutaNombre:r.nombre, chofer:UI.chofer,
        placa:r.placa, orden:orden, piladora:x.piladora, proveedor:x.prov, qqCargado:v, meta:x.qq, hora:ahora(), fechaISO:(new Date()).toISOString() });
      programarRecordatorio(orden);
      cerrarSheet(); toast("Avance guardado: "+v+" qq");
    };
  } else if(s.tipo==="termina"){
    $("#c-confirm").onclick=function(){
      var v=Math.max(0,parseInt($("#c-qq").value,10)||c.qqCargado||0);
      c.qqCargado=v; c.terminado=true;
      if(UI.recordatorios[orden]){ clearTimeout(UI.recordatorios[orden]); delete UI.recordatorios[orden]; }
      REGISTROS.push({ tipo:"carga_fin", ruta:r.id, rutaNombre:r.nombre, chofer:UI.chofer,
        placa:r.placa, orden:orden, piladora:x.piladora, proveedor:x.prov, qqCargado:v, meta:x.qq, hora:ahora(), fechaISO:(new Date()).toISOString() });
      cerrarSheet(); toast("Carga terminada");
    };
  } else { // novedad de carga
    $all("[data-motivo]").forEach(function(b){
      b.onclick=function(){
        UI.motivo=b.getAttribute("data-motivo");
        $all("[data-motivo]").forEach(function(z){z.classList.remove("sel");});
        b.classList.add("sel");
        $("#c-confirm").className="b-confirm nov";
      };
    });
    bindFoto();
    $("#c-confirm").onclick=function(){
      if(!UI.motivo) return;
      REGISTROS.push({ tipo:"novedad_carga", ruta:r.id, rutaNombre:r.nombre, chofer:UI.chofer,
        placa:r.placa, orden:UI.sheet.orden||null, motivo:UI.motivo,
        nota:($("#c-nota").value||"").trim(), foto:!!UI.foto, hora:ahora(), fechaISO:(new Date()).toISOString() });
      cerrarSheet(); toast("Novedad enviada a logística");
    };
  }
}

/* ---------- Sheet de entrega / novedad ---------- */
function abrirSheet(tipo,pid){
  UI.sheet={tipo:tipo,pid:pid}; UI.foto=null; UI.motivo=null;
  if(tipo==="entregar"){
    // arranca con TODO entregado (cantidad pedida); el chofer baja lo que falte
    var p=ped(pid);
    UI.entregaItems = p.items.map(function(it){ return { p:it.p, q:it.q, qEntregada:it.q, prov:it.prov }; });
  } else {
    UI.entregaItems=null;
  }
  render();
}
function cerrarSheet(){ UI.sheet=null; UI.foto=null; UI.motivo=null; UI.entregaItems=null; render(); }

function renderSheet(){
  var s=UI.sheet;
  if(s.modo==="carga"){ renderSheetCarga(); return; }
  var p=ped(s.pid);
  var old=$(".scrim"); if(old) old.remove();
  var div=document.createElement("div"); div.className="scrim";

  var inner;
  if(s.tipo==="entregar"){
    inner='<div class="sheet-h"><div class="sheet-t">Confirmar entrega</div><button class="sheet-x" data-x>×</button></div>'
      +'<div class="sheet-b">'
      +'<div class="field"><label>'+p.cli+' · '+p.ciudad+'</label></div>'
      +'<div class="field"><label>Cantidad entregada por producto</label>'
      +'<div id="items-host"></div></div>'
      +'<div id="tot-host"></div>'
      +'<div id="aviso-host"></div>'
      +fotoCampo("Guía firmada","Toma la foto de la guía firmada por quien recibe")
      +'<div class="field"><label>Nombre de quien recibe <span class="req">*</span></label>'
      +'<input class="inp" id="f-recibe" placeholder="Nombre y apellido" /></div>'
      +'<div class="field"><label>Cédula de quien recibe <span class="req">*</span></label>'
      +'<input class="inp" id="f-cedula" type="tel" inputmode="numeric" maxlength="10" placeholder="10 dígitos" /></div>'
      +'</div>'
      +'<div class="sheet-foot"><div id="f-falta" class="falta-hint"></div><button class="b-confirm dis" id="f-confirm">Registrar entrega</button></div>';
  } else {
    var motivos=["Rechazo del cliente","Producto dañado","Cliente ausente","Local cerrado","Dirección errada","Otro"];
    inner='<div class="sheet-h"><div class="sheet-t">Reportar novedad</div><button class="sheet-x" data-x>×</button></div>'
      +'<div class="sheet-b">'
      +'<div class="field"><label>'+p.cli+' · '+p.ciudad+'</label></div>'
      +'<div class="field"><label>Motivo <span class="req">*</span></label>'
      +'<div class="motivos">'+motivos.map(function(m){return '<button class="motivo" data-motivo="'+m+'">'+m+'</button>';}).join("")+'</div></div>'
      +'<div class="field"><label>Detalle (opcional)</label>'
      +'<textarea class="inp" id="f-nota" placeholder="Describe qué pasó"></textarea></div>'
      +fotoCampo("Foto (opcional)","Adjunta una foto si ayuda a explicar la novedad")
      +'</div>'
      +'<div class="sheet-foot"><button class="b-confirm nov dis" id="f-confirm">Guardar novedad</button></div>';
  }

  div.innerHTML='<div class="sheet">'+inner+'</div>';
  $("#root").appendChild(div);

  div.onclick=function(e){ if(e.target===div) cerrarSheet(); };
  $("[data-x]").onclick=cerrarSheet;
  bindFoto();

  if(s.tipo==="entregar"){
    pintarItems();
    var rec=$("#f-recibe"), ced=$("#f-cedula");
    rec.oninput=recalcEntregar; ced.oninput=recalcEntregar;
    $("#f-confirm").onclick=confirmarEntrega;
    recalcEntregar();
  } else {
    $all("[data-motivo]").forEach(function(b){
      b.onclick=function(){
        UI.motivo=b.getAttribute("data-motivo");
        $all("[data-motivo]").forEach(function(x){x.classList.remove("sel");});
        b.classList.add("sel");
        $("#f-confirm").className="b-confirm nov";
      };
    });
    $("#f-confirm").onclick=function(){
      if(!UI.motivo) return;
      var r=rutaDePedido(p.id)||{};
      p.estadoEntrega="novedad";
      if(UI.motivo==="Producto dañado" && !UI.foto){ toast("Producto dañado exige foto de evidencia."); return; }
      p.entrega={
        tipo:"novedad", pedidoId:p.id, guia:p.guia, factura:p.factura,
        viaje:r.viaje||null, quien:"App Transportista",
        ruta:r.id, rutaNombre:r.nombre, chofer:UI.chofer, placa:r.placa,
        motivo:UI.motivo, nota:($("#f-nota").value||"").trim(),
        foto:!!UI.foto, hora:ahora(), fechaISO:(new Date()).toISOString()
      };
      REGISTROS.push(p.entrega);
      cerrarSheet(); toast("Novedad guardada");
      finSiRutaCompleta();
    };
  }
}

/* ----- items con stepper (entrega parcial) ----- */
function pintarItems(){
  var host=$("#items-host"); if(!host) return;
  host.innerHTML = UI.entregaItems.map(function(it,i){
    var falta = it.q - it.qEntregada;
    var rcls = it.qEntregada===0 ? "item-row cero" : (falta>0 ? "item-row parc" : "item-row");
    var flag = it.qEntregada===0
        ? '<span class="item-flag flag-cero">No entregado</span>'
        : (falta>0 ? '<span class="item-flag flag-parc">Faltan '+falta+'</span>' : '');
    var nom=it.p.split("·")[0].trim();
    var pres=(it.p.split("·")[1]||"").trim();
    var menosDis = it.qEntregada<=0 ? " dis" : "";
    var masDis = it.qEntregada>=it.q ? " dis" : "";
    return '<div class="'+rcls+'">'
      +'<div class="item-nom">'+nom+(pres?' · '+pres:'')+flag+'</div>'
      +'<div class="item-prov">'+it.prov+'</div>'
      +'<div class="item-ctl">'
      +'<div class="item-ped">Pedido: <b class="num">'+it.q+'</b></div>'
      +'<div class="stepper">'
      +'<button class="menos'+menosDis+'" data-menos="'+i+'">−</button>'
      +'<div class="val num">'+it.qEntregada+'</div>'
      +'<button class="mas'+masDis+'" data-mas="'+i+'">+</button>'
      +'</div></div></div>';
  }).join("");

  $all("[data-menos]").forEach(function(b){
    b.onclick=function(){
      var i=+b.getAttribute("data-menos");
      if(UI.entregaItems[i].qEntregada>0){ UI.entregaItems[i].qEntregada--; pintarItems(); pintarTotales(); recalcEntregar(); }
    };
  });
  $all("[data-mas]").forEach(function(b){
    b.onclick=function(){
      var i=+b.getAttribute("data-mas");
      if(UI.entregaItems[i].qEntregada<UI.entregaItems[i].q){ UI.entregaItems[i].qEntregada++; pintarItems(); pintarTotales(); recalcEntregar(); }
    };
  });
  pintarTotales();
}

function pintarTotales(){
  var host=$("#tot-host"); if(!host) return;
  var pedidoTot=0, entTot=0;
  UI.entregaItems.forEach(function(it){ pedidoTot+=it.q; entTot+=it.qEntregada; });
  var dev=pedidoTot-entTot;
  host.innerHTML='<div class="entrega-tot">'
    +'<div class="et-cell et-ok"><div class="v num">'+entTot+'</div><div class="l">se entrega</div></div>'
    +'<div class="et-cell et-dev"><div class="v num">'+dev+'</div><div class="l">devolución</div></div>'
    +'</div>';
  var aviso=$("#aviso-host"); if(aviso){
    aviso.innerHTML = dev>0
      ? '<div class="aviso-parc"><b>Entrega parcial.</b> El saldo de <b class="num">'+dev+'</b> bulto(s) regresa a logística como devolución. La factura y la comisión se ajustan sobre lo realmente entregado.</div>'
      : '';
  }
}

function confirmarEntrega(){
  if($("#f-confirm").classList.contains("dis")) return;
  var p=ped(UI.sheet.pid);
  var rec=$("#f-recibe").value.trim(), ced=$("#f-cedula").value.trim();
  var r=rutaDePedido(p.id)||{};

  var entTot=0, pedidoTot=0, devs=[];
  var itemsReg = UI.entregaItems.map(function(it){
    entTot+=it.qEntregada; pedidoTot+=it.q;
    if(it.qEntregada<it.q){ devs.push({ p:it.p, q:it.q-it.qEntregada, prov:it.prov }); }
    return { p:it.p, q:it.q, qEntregada:it.qEntregada, ok:(it.qEntregada>0), prov:it.prov };
  });
  var esParcial = entTot<pedidoTot;
  p.estadoEntrega = esParcial ? "parcial" : "entregado";

  p.entrega={
    tipo:"entrega", pedidoId:p.id, guia:p.guia, factura:p.factura,
    viaje:r.viaje||null, quien:"App Transportista",
    ruta:r.id, rutaNombre:r.nombre, chofer:UI.chofer, placa:r.placa,
    recibe:rec, cedula:ced, foto:true,
    items:itemsReg, parcial:esParcial, devoluciones:devs,
    hora:ahora(), fechaISO:(new Date()).toISOString()
  };
  REGISTROS.push(p.entrega);
  // Documentos firmados que el chofer trae de vuelta → cadena de custodia
  DOCS_RETORNO.push(
    { tipo:"Guía de remisión firmada", numero:p.guia, cliente:p.cli, viaje:r.viaje||r.id, hora:ahora(), entregadoOficina:false },
    { tipo:"Factura firmada", numero:p.factura, cliente:p.cli, viaje:r.viaje||r.id, hora:ahora(), entregadoOficina:false }
  );
  if(devs.length){
    DEVOLUCIONES.push({ pedidoId:p.id, cli:p.cli, ciudad:p.ciudad, ruta:r.id, chofer:UI.chofer,
      items:devs, hora:ahora(), fechaISO:(new Date()).toISOString() });
  }

  cerrarSheet();
  toast(esParcial ? "Entrega parcial registrada" : "Entrega registrada ✓");
  finSiRutaCompleta();
}

// Si ya no quedan paradas pendientes en la ruta, vuelve a la ventana de inicio.
function finSiRutaCompleta(){
  var r=ruta(UI.ruta);
  if(r && rutaConcluida(r)){
    setTimeout(function(){
      UI.ruta=null; UI.fase="carga"; render(); window.scrollTo(0,0);
      toast("Ruta completada ✓");
    }, 900);
  }
}

function recalcEntregar(){
  if(!UI.sheet||UI.sheet.tipo!=="entregar") return;
  var rec=$("#f-recibe"), ced=$("#f-cedula"); if(!rec||!ced) return;
  var entTot=0; UI.entregaItems.forEach(function(it){ entTot+=it.qEntregada; });

  var faltan=[];
  if(!UI.foto) faltan.push("foto de la guía");
  if(rec.value.trim().length<3) faltan.push("nombre de quien recibe");
  if(!/^[0-9]{10}$/.test(ced.value.trim())) faltan.push("cédula de 10 dígitos");
  if(entTot<=0) faltan.push("cantidad entregada (no puede ser 0)");

  var ok = faltan.length===0;
  $("#f-confirm").className="b-confirm"+(ok?"":" dis");
  $("#f-confirm").textContent = (entTot>0 && entTot<sumaPedida()) ? "Registrar entrega parcial" : "Registrar entrega";

  var hint=$("#f-falta");
  if(hint){
    hint.textContent = ok ? "" : ("Falta: "+faltan.join(", "));
    hint.style.display = ok ? "none" : "block";
  }
}
function sumaPedida(){ var t=0; (UI.entregaItems||[]).forEach(function(it){t+=it.q;}); return t; }

/* ----- foto ----- */
// Imagen de ejemplo (solo para pruebas en el visor): una "guía" simulada.
var FOTO_DEMO = "data:image/svg+xml;base64,"+btoa(
  '<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200">'
  +'<rect width="320" height="200" fill="#F2A900"/>'
  +'<rect x="14" y="14" width="292" height="172" rx="10" fill="#FFFFFF"/>'
  +'<text x="160" y="70" font-family="sans-serif" font-size="20" font-weight="700" fill="#15392B" text-anchor="middle">GUIA FIRMADA</text>'
  +'<text x="160" y="100" font-family="sans-serif" font-size="13" fill="#6F7A6F" text-anchor="middle">(foto simulada de prueba)</text>'
  +'<path d="M70 150 q20 -25 40 0 t40 0 t40 0" stroke="#15392B" stroke-width="3" fill="none"/>'
  +'</svg>');

function fotoCampo(label,hint){
  return '<div class="field"><label>'+label+(label==="Guía firmada"?' <span class="req">*</span>':'')+'</label>'
    +'<div id="foto-host"></div>'
    +'<input type="file" id="f-foto" accept="image/*" style="display:none" />'
    +'<div style="font-size:11.5px;color:var(--muted);margin-top:6px">'+hint+'</div></div>';
}
function bindFoto(){
  pintarFoto();
  $("#f-foto").onchange=function(e){
    var file=e.target.files&&e.target.files[0]; if(!file) return;
    var rd=new FileReader();
    rd.onload=function(){ UI.foto=rd.result; pintarFoto(); recalcEntregar(); };
    rd.readAsDataURL(file);
  };
}
function pintarFoto(){
  var host=$("#foto-host"); if(!host) return;
  if(UI.foto){
    host.innerHTML='<div class="foto-prev"><img src="'+UI.foto+'"/>'
      +'<button class="del" data-delfoto>×</button><span class="ok">Adjuntada ✓</span></div>';
    $("[data-delfoto]").onclick=function(){ UI.foto=null; $("#f-foto").value=""; pintarFoto(); recalcEntregar(); };
  } else {
    host.innerHTML='<button class="foto-zone" data-pick><div class="foto-ico">📷</div>'
      +'<div class="foto-txt">Tomar foto o elegir de galería</div></button>'
      +'<button class="foto-demo" data-demo>Usar foto de prueba (para el visor)</button>';
    $("[data-pick]").onclick=function(){ $("#f-foto").click(); };
    var d=$("[data-demo]"); if(d) d.onclick=function(){ UI.foto=FOTO_DEMO; pintarFoto(); recalcEntregar(); };
  }
}

/* ===================== HELPERS UI ===================== */
function shell(topLeft,topRight,body){
  return '<div class="shell">'
    +'<div class="top"><div>'+topLeft+'</div><div style="display:flex;align-items:center;gap:10px">'
    +'<span class="net"><span class="dot"></span>'+(UI.online?'En línea':'Sin red')+'</span>'+topRight+'</div></div>'
    +'<div class="body">'+body+'</div></div>';
}
function bindTop(){
  var s=$("[data-salir]"); if(s) s.onclick=function(){
    UI.chofer=null; UI.ruta=null; UI.choferNuevo=null; UI.vista="menu"; render();
  };
}
function ahora(){
  var d=new Date(); var h=d.getHours(), m=d.getMinutes();
  return "hoy · "+(h<10?"0":"")+h+":"+(m<10?"0":"")+m;
}
function toast(msg){
  var t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(function(){ t.remove(); },2200);
}
function $(s){ return document.querySelector(s); }
function $all(s){ return Array.prototype.slice.call(document.querySelectorAll(s)); }

render();

</script>

/* ═ Nivel 2 de notificaciones: el service worker se registra SOLO al vivir en HTTPS (GitHub Pages).
   Abriendo el archivo local no hace nada (ni molesta): el candado espera su momento. ═ */
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("./sw.js").catch(function(){ /* sin permiso o sin red: la app sigue normal */ });
}
