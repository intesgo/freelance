    </Hoja>
  );
}

/* ---------- Hoja de ENTREGA (stepper de parciales + guía firmada) ---------- */
function HojaEntregar({ p, chofer, onCerrar, refrescar, onRutaCompleta }){
  const [items, setItems] = useState(p.items.map((it)=>({ p:it.p, q:it.q, qEntregada:it.q, prov:it.prov })));
  const [foto, setFoto] = useState(null);
  const [rec, setRec] = useState("");
  const [ced, setCed] = useState("");

  const pedidoTot = items.reduce((a,it)=>a+it.q, 0);
  const entTot = items.reduce((a,it)=>a+it.qEntregada, 0);
  const dev = pedidoTot - entTot;
  const cambiar = (i, d) => setItems(items.map((it,ix)=> ix===i ? { ...it, qEntregada: Math.max(0, Math.min(it.q, it.qEntregada + d)) } : it));

  const faltan = [];
  if (!foto) faltan.push("foto de la guía");
  if (rec.trim().length < 3) faltan.push("nombre de quien recibe");
  if (!/^[0-9]{10}$/.test(ced.trim())) faltan.push("cédula de 10 dígitos");
  if (entTot <= 0) faltan.push("cantidad entregada (no puede ser 0)");
  const ok = faltan.length === 0;

  const confirmar = () => {
    if(!ok) return;
    const r = rutaDePedido(p.id) || {};
    const devs = [];
    const itemsReg = items.map((it)=>{
      if (it.qEntregada < it.q) devs.push({ p:it.p, q:it.q-it.qEntregada, prov:it.prov });
      return { p:it.p, q:it.q, qEntregada:it.qEntregada, ok:(it.qEntregada>0), prov:it.prov };
    });
    const esParcial = entTot < pedidoTot;
    p.estadoEntrega = esParcial ? "parcial" : "entregado";
    p.entrega = {
      tipo:"entrega", pedidoId:p.id, guia:p.guia, factura:p.factura,
      viaje:r.viaje||null, quien:"App Transportista",
      ruta:r.id, rutaNombre:r.nombre, chofer:chofer, placa:r.placa,
      recibe:rec.trim(), cedula:ced.trim(), foto:true,
      items:itemsReg, parcial:esParcial, devoluciones:devs,
      hora:ahora(), fechaISO:(new Date()).toISOString()
    };
    REGISTROS.push(p.entrega);
    DOCS_RETORNO.push(
      { tipo:"Guía de remisión firmada", numero:p.guia, cliente:p.cli, viaje:r.viaje||r.id, hora:ahora(), entregadoOficina:false },
      { tipo:"Factura firmada", numero:p.factura, cliente:p.cli, viaje:r.viaje||r.id, hora:ahora(), entregadoOficina:false }
    );
    if (devs.length){
      DEVOLUCIONES.push({ pedidoId:p.id, cli:p.cli, ciudad:p.ciudad, ruta:r.id, chofer:chofer,
        items:devs, hora:ahora(), fechaISO:(new Date()).toISOString() });
    }
    onCerrar(); refrescar();
    toast(esParcial ? "Entrega parcial registrada" : "Entrega registrada ✓");
    onRutaCompleta();
  };

  return (
    <Hoja titulo="Confirmar entrega" onCerrar={onCerrar}
      pie={<div className="sheet-foot">
        <div className="falta-hint" style={{ display: ok ? "none" : "block" }}>{ok ? "" : ("Falta: "+faltan.join(", "))}</div>
        <button className={"b-confirm"+(ok?"":" dis")} onClick={confirmar}>{(entTot>0 && entTot<pedidoTot) ? "Registrar entrega parcial" : "Registrar entrega"}</button>
      </div>}>
      <div className="field"><label>{p.cli} · {p.ciudad}</label></div>
      <div className="field"><label>Cantidad entregada por producto</label>
        {items.map((it, i)=>{
          const falta = it.q - it.qEntregada;
          const rcls = it.qEntregada===0 ? "item-row cero" : (falta>0 ? "item-row parc" : "item-row");
          const nom = it.p.split("·")[0].trim();
          const pres = (it.p.split("·")[1]||"").trim();
          return (
            <div key={i} className={rcls}>
              <div className="item-nom">{nom}{pres ? " · "+pres : ""}
                {it.qEntregada===0 ? <span className="item-flag flag-cero">No entregado</span>
                 : falta>0 ? <span className="item-flag flag-parc">Faltan {falta}</span> : null}</div>
              <div className="item-prov">{it.prov}</div>
              <div className="item-ctl">
                <div className="item-ped">Pedido: <b className="num">{it.q}</b></div>
                <div className="stepper">
                  <button className={"menos"+(it.qEntregada<=0?" dis":"")} onClick={()=>cambiar(i,-1)}>−</button>
                  <div className="val num">{it.qEntregada}</div>
                  <button className={"mas"+(it.qEntregada>=it.q?" dis":"")} onClick={()=>cambiar(i,+1)}>+</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div className="entrega-tot">
        <div className="et-cell et-ok"><div className="v num">{entTot}</div><div className="l">se entrega</div></div>
        <div className="et-cell et-dev"><div className="v num">{dev}</div><div className="l">devolución</div></div>
      </div>
      {dev>0 && <div className="aviso-parc"><b>Entrega parcial.</b> El saldo de <b className="num">{dev}</b> bulto(s) regresa a logística como devolución. La factura y la comisión se ajustan sobre lo realmente entregado.</div>}
      <CampoFoto label="Guía firmada" hint="Toma la foto de la guía firmada por quien recibe" requerida foto={foto} setFoto={setFoto} />
      <div className="field"><label>Nombre de quien recibe <span className="req">*</span></label>
        <input className="inp" value={rec} placeholder="Nombre y apellido" onChange={(e)=>setRec(e.target.value)} /></div>
      <div className="field"><label>Cédula de quien recibe <span className="req">*</span></label>
        <input className="inp" value={ced} type="tel" inputMode="numeric" maxLength={10} placeholder="10 dígitos" onChange={(e)=>setCed(e.target.value)} /></div>
    </Hoja>
  );
}

/* ---------- Hoja de NOVEDAD de entrega ---------- */
function HojaNovedad({ p, chofer, onCerrar, refrescar, onRutaCompleta }){
  const [motivo, setMotivo] = useState(null);
  const [nota, setNota] = useState("");
  const [foto, setFoto] = useState(null);
  const motivos = ["Rechazo del cliente","Producto dañado","Cliente ausente","Local cerrado","Dirección errada","Otro"];

  const guardar = () => {
    if(!motivo) return;
    if (motivo==="Producto dañado" && !foto){ toast("Producto dañado exige foto de evidencia."); return; }
    const r = rutaDePedido(p.id) || {};
    p.estadoEntrega = "novedad";
    p.entrega = {
      tipo:"novedad", pedidoId:p.id, guia:p.guia, factura:p.factura,
      viaje:r.viaje||null, quien:"App Transportista",
      ruta:r.id, rutaNombre:r.nombre, chofer:chofer, placa:r.placa,
      motivo:motivo, nota:nota.trim(),
      foto:!!foto, hora:ahora(), fechaISO:(new Date()).toISOString()
    };
    REGISTROS.push(p.entrega);
    onCerrar(); refrescar(); toast("Novedad guardada");
    onRutaCompleta();
  };

  return (
    <Hoja titulo="Reportar novedad" onCerrar={onCerrar}
      pie={<div className="sheet-foot"><button className={"b-confirm nov"+(motivo?"":" dis")} onClick={guardar}>Guardar novedad</button></div>}>
      <div className="field"><label>{p.cli} · {p.ciudad}</label></div>
      <div className="field"><label>Motivo <span className="req">*</span></label>
        <Motivos lista={motivos} motivo={motivo} setMotivo={setMotivo} /></div>
      <div className="field"><label>Detalle (opcional)</label>
        <textarea className="inp" value={nota} placeholder="Describe qué pasó" onChange={(e)=>setNota(e.target.value)}></textarea></div>
      <CampoFoto label="Foto (opcional)" hint="Adjunta una foto si ayuda a explicar la novedad" foto={foto} setFoto={setFoto} />
    </Hoja>
  );
}

/* ---------- FASE ENTREGAS (paradas en orden) ---------- */
function PantallaEntrega({ r, chofer, onVolver, onSalir, onVerCarga, onRutaCompleta, refrescar }){
  const [hoja, setHoja] = useState(null);   /* {tipo:'entregar'|'novedad', pid} */
  const total = r.pedidos.length;
  const hechos = r.pedidos.filter((id)=>ped(id).estadoEntrega!=="pendiente").length;
  const pct = total ? Math.round(hechos/total*100) : 0;
  const veh = VEHICULOS[r.placa] || { tipo: r.placa };
  const kg = r.pedidos.reduce((a,id)=>a+pesoPedido(ped(id)),0);
  const nEnt = r.pedidos.filter((id)=>ped(id).estadoEntrega==="entregado").length;
  const nParc = r.pedidos.filter((id)=>ped(id).estadoEntrega==="parcial").length;
  const nNov = r.pedidos.filter((id)=>ped(id).estadoEntrega==="novedad").length;

  return (
    <Shell who={<button className="back" onClick={onVolver}>‹ Mis rutas</button>} name="" onSalir={onSalir}
      extraDer={<span className={"badge-est "+(hechos===total?"be-ok":"")} style={{ background:"rgba(255,255,255,.12)", color:"#EAF0EA" }}>{hechos}/{total}</span>}>
      <div className="ruta-hero">
        <div className="rh-dest">{r.nombre}</div>
        <div className="rh-veh">{r.placa} · {veh.tipo}</div>
        <div className="progbar"><i style={{ width: pct+"%" }}></i></div>
        <div className="prog-label">{hechos} de {total} entregas · {Math.round(qqDeKg(kg))} qq</div>
      </div>

      <button className="b-ver-carga" onClick={onVerCarga}>📦 Ver resumen de carga</button>

      {hechos===total && total>0 && (
        <div className="done-banner"><div className="big">✅</div><div className="t">Ruta completada</div>
          <div className="s">Todas las paradas quedaron registradas. Logística ya ve el cierre.</div>
          <div className="cierre-stats">
            <div className="c"><div className="v num">{nEnt}</div><div className="l">completas</div></div>
            <div className="c"><div className="v num">{nParc}</div><div className="l">parciales</div></div>
            <div className="c"><div className="v num">{nNov}</div><div className="l">novedades</div></div>
          </div>
        </div>
      )}

      <div className="sect-h">Paradas (en orden de entrega)</div>
      {r.pedidos.map((id, idx)=>{
        const p = ped(id); const n = idx+1;
        const est = p.estadoEntrega;
        const cls = est==="entregado" ? "stop done" : est==="parcial" ? "stop parcial" : est==="novedad" ? "stop nov" : "stop";
        const icoN = est==="entregado" ? "✓" : est==="parcial" ? "≈" : est==="novedad" ? "!" : n;
        const e = p.entrega || {};
        return (
          <div key={p.id} className={cls}>
            <div className="stop-top">
              <div className="stop-n">{icoN}</div>

/* ---------- Pantalla de la RUTA: decide fase carga/entregas ---------- */
function PantallaRuta({ rutaId, chofer, onVolver, onSalir, faseInicial }){
  const [, tick] = useState(0);
  const refrescar = () => tick((x)=>x+1);
  const r = ruta(rutaId);
  const [fase, setFase] = useState(faseInicial || (cargaCompleta(r) ? "entregas" : "carga"));
  const faseReal = cargaCompleta(r) ? fase : "carga";   /* la carga incompleta bloquea las entregas */

  const rutaCompletaQuiza = () => {
    if (r && rutaConcluida(r)){
      setTimeout(()=>{ onVolver(); toast("Ruta completada ✓"); }, 900);
    }
  };

  if (faseReal === "carga"){
    return <PantallaCarga r={r} chofer={chofer} onVolver={onVolver} onSalir={onSalir}
      onIrEntregas={()=>{ setFase("entregas"); window.scrollTo(0,0); }} refrescar={refrescar} />;
  }
  return <PantallaEntrega r={r} chofer={chofer} onVolver={onVolver} onSalir={onSalir}
    onVerCarga={()=>{ setFase("carga"); window.scrollTo(0,0); }}
    onRutaCompleta={rutaCompletaQuiza} refrescar={refrescar} />;
}

/* ---------- Solicitud de anticipo / reposición de estibada ---------- */
function SecSolicitud({ tipo, chofer, refrescar }){
  const esAnt = tipo==="anticipo";
  const [concepto, setConcepto] = useState("");
  const [monto, setMonto] = useState("");
  const [nota, setNota] = useState("");
  const [foto, setFoto] = useState(null);
  const mias = solicitudesDe(chofer).filter((x)=>x.tipo===tipo);
  const intro = esAnt
    ? "Pide por adelantado el dinero para pagar la estibada (carga/descarga). Se envía al área financiera."
    : "¿Pagaste la estibada de tu bolsillo? Pide que te la repongan. Se envía al área financiera.";

  const faltan = [];
  if (concepto.trim().length < 3) faltan.push("concepto");
  const m = parseFloat(monto); if (isNaN(m) || m <= 0) faltan.push("monto válido");
  const ok = faltan.length === 0;

  const enviar = () => {
    if(!ok) return;
    const val = Math.round(parseFloat(monto)*100)/100;
    const nueva = { id:"SOL-"+Math.floor(Math.random()*900+100), chofer:chofer, tipo:tipo,
      concepto:concepto.trim(), monto:val, fecha:"hoy", estado:"pendiente",
      nota:nota.trim(), foto:!!foto, fechaISO:(new Date()).toISOString() };
    SOLICITUDES.push(nueva);
    REGISTROS.push({ tipo:"solicitud_"+tipo, destino:"financiero", chofer:chofer,
      concepto:nueva.concepto, monto:val, hora:ahora(), fechaISO:nueva.fechaISO });
    setConcepto(""); setMonto(""); setNota(""); setFoto(null);
    toast("Solicitud enviada al área financiera");
    refrescar(); window.scrollTo(0,0);
  };

  return (<>
    <div className="nuevo-form">
      <div className="aviso-parc" style={{ color:"var(--field)", borderColor:"var(--line)", background:"var(--paper)" }}>{intro}</div>
      <div className="field"><label>Concepto <span className="req">*</span></label>
        <input className="inp" value={concepto} placeholder={esAnt ? "Ej: Estibada carga Sierra Centro" : "Ej: Pagué estibada descarga"} onChange={(e)=>setConcepto(e.target.value)} /></div>
      <div className="field"><label>Monto (USD) <span className="req">*</span></label>
        <input className="inp" value={monto} type="tel" inputMode="decimal" placeholder="0.00" onChange={(e)=>setMonto(e.target.value)} /></div>
      <div className="field"><label>Nota (opcional)</label>
        <textarea className="inp" value={nota} placeholder="Detalle para el área financiera" onChange={(e)=>setNota(e.target.value)}></textarea></div>
      {!esAnt && <CampoFoto label="Comprobante (opcional)" hint="Adjunta el recibo de lo que pagaste" foto={foto} setFoto={setFoto} />}
      <div className="falta-hint">{ok ? "" : ("Falta: "+faltan.join(", "))}</div>
      <button className={"b-confirm"+(ok?"":" dis")} onClick={enviar}>Enviar al área financiera</button>
    </div>
    {mias.length>0 && (<>
      <div className="sect-h" style={{ marginTop:20 }}>Mis solicitudes</div>
      {mias.map((x,i)=>(
        <div key={x.id||i} className="pago-row">
          <div className="pago-info"><div className="pago-ruta">{x.concepto}</div>
            <div className="pago-meta">{x.fecha}</div></div>
          <div className="pago-der"><div className="pago-monto num">{dineroUSD(x.monto)}</div>
            {x.estado==="aprobada" ? <span className="badge-est be-ok">Aprobada</span>
             : x.estado==="rechazada" ? <span className="badge-est be-nov">Rechazada</span>
             : <span className="badge-est be-parcial">En revisión</span>}</div>
        </div>
      ))}
    </>)}
  </>);
}

/* ---------- Campana de tareas (flotante) ---------- */
function tareasNotifDe(rutaId){
  const t = [];
  if (rutaId){
    const r = ruta(rutaId);
    if (r){
      const pendCarga = puntosDeCarga(r).filter((x)=>!cargaDe(r,x.orden).salida).length;
      if (pendCarga>0) t.push({ tipo:"carga", icono:"📦", titulo:"Puntos de carga por completar", detalle:"La entrega se habilita al terminar la carga", n:pendCarga, destino:"carga" });
      const pendEnt = r.pedidos.filter((id)=>ped(id).estadoEntrega==="pendiente").length;
      if (pendEnt>0 && cargaCompleta(r)) t.push({ tipo:"entregas", icono:"🚚", titulo:"Entregas pendientes del viaje", detalle:"Clientes esperando en la ruta", n:pendEnt, destino:"entrega" });
    }
  }
  const docs = DOCS_RETORNO.filter((d)=>!d.entregadoOficina).length;
  if (docs>0) t.push({ tipo:"documentos", icono:"🧾", titulo:"Documentos por devolver a oficina", detalle:"Firmados en ruta · inician la custodia", n:docs, destino:null });
  return t.filter((x)=>PREFS_NOTIF[x.tipo]);
}

  {mod:"Ingreso", ic:"🔒", t:"Entrar con huella",
   d:"Actívala y la próxima vez entras con un toque. Tu biometría nunca sale del teléfono: el sistema solo recibe un sí o un no."},
];

function Campana({ rutaId, onIr }){
  const [abierta, setAbierta] = useState(false);
  const [tab, setTab] = useState("tareas");   // tareas | ayuda
  const tareas = tareasNotifDe(rutaId);
  const total = tareas.reduce((a,x)=>a+x.n,0);
  const menuAbierto = useDrawerAbierto();
  if (menuAbierto) return null;    /* con el menu abierto, la campanilla estorba */
  return (<>
    <button onClick={()=>setAbierta(true)}
      style={{ position:"fixed", top:"calc(env(safe-area-inset-top,0px) + 58px)", right:12, zIndex:1200, width:42, height:42, borderRadius:21, background:"#fff", border:"1px solid #E2E8E2", boxShadow:"0 4px 14px rgba(0,0,0,.18)", fontSize:17, cursor:"pointer" }}>🔔
      {total>0 && <span style={{ position:"absolute", top:-4, right:-4, minWidth:18, height:18, borderRadius:9, background:"#C0392B", color:"#fff", fontSize:10.5, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", padding:"0 4px" }}>{total}</span>}
    </button>
    {abierta && (
      <div onClick={(e)=>{ if(e.target===e.currentTarget) setAbierta(false); }}
        style={{ position:"fixed", inset:0, background:"rgba(10,20,15,.45)", zIndex:1300, display:"flex", alignItems:"flex-start", justifyContent:"flex-end", padding:"calc(env(safe-area-inset-top,0px) + 104px) 12px 0" }}>
        <div style={{ width:"min(340px,92vw)", maxHeight:"70vh", overflowY:"auto", background:"#fff", borderRadius:16, boxShadow:"0 18px 50px rgba(0,0,0,.3)" }}>
          <div style={{ padding:"14px 16px 10px", borderBottom:"1px solid #EEF2EE", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ display:"flex", gap:6 }}>
              <button onClick={()=>setTab("tareas")}
                style={{ border:"none", cursor:"pointer", borderRadius:99, padding:"7px 14px",
                  fontSize:12.5, fontWeight:700,
                  background: tab==="tareas"?"#1E4D3A":"#F3F6F3",
                  color: tab==="tareas"?"#fff":"#5C6B60" }}>🔔 Tus tareas</button>
              <button onClick={()=>setTab("ayuda")}
                style={{ border:"none", cursor:"pointer", borderRadius:99, padding:"7px 14px",
                  fontSize:12.5, fontWeight:700,
                  background: tab==="ayuda"?"#1E4D3A":"#F3F6F3",
                  color: tab==="ayuda"?"#fff":"#5C6B60" }}>Cómo funciona</button>
            </div></div>
          {tab==="ayuda" ? COMO_FUNCIONA.map((h,i)=>(
            <div key={i} style={{ display:"flex", gap:12, alignItems:"flex-start",
              borderBottom:"1px solid #F3F6F3", padding:"12px 16px" }}>
              <span style={{ fontSize:18, marginTop:1 }}>{h.ic}</span>
              <span style={{ flex:1, minWidth:0 }}>
                <span style={{ display:"block", fontSize:10.5, fontWeight:700, color:"#1E4D3A",
                  textTransform:"uppercase", letterSpacing:".03em" }}>{h.mod}</span>
                <span style={{ display:"block", fontSize:13.5, fontWeight:700, color:"#123B2C",
                  marginTop:2 }}>{h.t}</span>
                <span style={{ display:"block", fontSize:11.5, color:"#5C6B60",
                  marginTop:3, lineHeight:1.45 }}>{h.d}</span>
              </span>
            </div>
          )) : tareas.length===0 ? (
            <p style={{ fontSize:13, color:"#5C6B60", padding:"18px 16px", margin:0 }}>Todo al día ✨ Nada espera tu acción.</p>
          ) : tareas.map((t,i)=>(
            <button key={i} onClick={()=>{ setAbierta(false); if(t.destino && rutaId) onIr(t.destino); }}
              style={{ display:"flex", gap:12, alignItems:"center", width:"100%", textAlign:"left", background:"none", border:"none", borderBottom:"1px solid #F3F6F3", padding:"12px 16px", cursor:"pointer" }}>
              <span style={{ fontSize:20 }}>{t.icono}</span>
              <span style={{ flex:1, minWidth:0 }}><span style={{ display:"block", fontSize:13.5, fontWeight:700, color:"#123B2C" }}>{t.titulo}</span>
                <span style={{ display:"block", fontSize:11.5, color:"#5C6B60" }}>{t.detalle}</span></span>
              <span style={{ minWidth:22, height:22, borderRadius:11, background:"#2E7D52", color:"#fff", fontSize:11.5, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", padding:"0 6px" }}>{t.n}</span>
            </button>
          ))}
        </div>
      </div>
    )}
  </>);
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
/* ═ Nivel 2 de notificaciones + modo offline + aviso de versión nueva ═
   El service worker se registra SOLO en HTTPS (GitHub Pages); abriendo el archivo
   local no hace nada ni molesta.

   AVISO DE VERSIÓN NUEVA (patrón único de las 5 apps): cuando hay una versión
   publicada, el service worker nuevo queda ESPERANDO en segundo plano y aquí se
   muestra una barra abajo. La app NO se recarga sola: si el usuario está a mitad
   de un pedido o un cobro, perdería el trabajo. Él decide, y puede posponerlo. ═ */
if ("serviceWorker" in navigator && location.protocol === "https:") {
  var mostrarAvisoActualizar = function(reg){
    if (document.getElementById("aviso-actualizar")) return;
    var barra = document.createElement("div");
    barra.id = "aviso-actualizar";
    barra.style.cssText = "position:fixed;left:12px;right:12px;z-index:99999;"+
      "bottom:calc(78px + env(safe-area-inset-bottom,0px));"+
      "background:#15392B;color:#EAF0EA;border-radius:14px;padding:12px 14px;"+
      "display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.28);"+
      "font-family:inherit;font-size:13.5px";
    barra.innerHTML =
      '<span style="flex:1;min-width:0;line-height:1.3">Hay una versión nueva disponible.</span>'+
      '<button id="btn-actualizar" style="flex-shrink:0;background:#F2A900;color:#15392B;'+
      'border:none;border-radius:10px;padding:8px 15px;font-weight:800;font-size:13px;'+
      'font-family:inherit;cursor:pointer">Actualizar</button>'+
      '<button id="btn-despues" style="flex-shrink:0;background:transparent;'+
      'color:rgba(234,240,234,.72);border:none;font-size:12.5px;font-family:inherit;'+
      'cursor:pointer;padding:8px 2px">Después</button>';
    document.body.appendChild(barra);
    document.getElementById("btn-despues").onclick = function(){ barra.remove(); };
    document.getElementById("btn-actualizar").onclick = function(){
      var b = document.getElementById("btn-actualizar");
      b.textContent = "Actualizando…"; b.disabled = true;
      var esperando = reg.waiting;
      if (esperando) { esperando.postMessage({ tipo: "activar-ya" }); }
      /* 900 ms: le da tiempo al service worker nuevo a tomar el control. Con menos,
         a veces recarga con el viejo y el aviso vuelve a salir. */
      setTimeout(function(){ location.reload(); }, 900);
    };
  };
  navigator.serviceWorker.register("./sw.js").then(function(reg){
    /* ya había una versión esperando al abrir */
    if (reg.waiting && navigator.serviceWorker.controller) mostrarAvisoActualizar(reg);
    /* llegó una versión nueva mientras la app estaba abierta */
    reg.addEventListener("updatefound", function(){
      var nuevo = reg.installing;
      if (!nuevo) return;
      nuevo.addEventListener("statechange", function(){
        /* controller existe = no es la primera instalación, es una actualización */
        if (nuevo.state === "installed" && navigator.serviceWorker.controller) {
          mostrarAvisoActualizar(reg);
        }
      });
    });
    /* revisa al abrir y cada vez que se vuelve a la app */
    reg.update();
    document.addEventListener("visibilitychange", function(){
      if (document.visibilityState === "visible") reg.update();
    });
  }).catch(function(){ /* sin permiso o sin red: la app sigue normal */ });
  /* NO se recarga solo al cambiar el service worker: puede entrar en bucle y dejar
     la app cargando para siempre. El usuario decide con el botón. */
}
</script>
