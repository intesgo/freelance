<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Transportista - Freelance</title>
<style>
  :root{
    --field:#15392B; --field-700:#1E4D3A; --maize:#F2A900; --maize-deep:#C77F00;
    --paper:#F7F5EF; --card:#FFFFFF; --ink:#18211C; --muted:#6F7A6F;
    --line:#E7E1D3; --clay:#B5613C; --ok:#2E7D52; --bad:#C0492F;
    --shadow:0 1px 2px rgba(21,57,43,.06),0 8px 24px rgba(21,57,43,.06);
  }
  /* ═══ TEMAS (Ajustes) ═══
     Solo se redefinen variables que ESTA app usa; las de Comisionista que no
     existen aqui (--field-soft, etc.) se omiten a proposito. */
  /* Sol · alto contraste para leer bajo sol directo */
  [data-tema="sol"]{
    --field:#0B2A1E; --field-700:#123B2A; --maize:#F59E00; --maize-deep:#B36B00;
    --paper:#FFFFFF; --card:#FFFFFF; --ink:#0A0F0C; --muted:#4A554C;
    --line:#D6D2C4; --clay:#A34A28; --ok:#1F6B41; --bad:#B5432E;
    --shadow:0 1px 2px rgba(0,0,0,.10),0 6px 18px rgba(0,0,0,.08);
  }
  /* Noche · oscuro, para madrugada y poca luz */
  [data-tema="noche"]{
    --field:#0E1A14; --field-700:#16261D; --maize:#E9B44C; --maize-deep:#C08F2E;
    --paper:#111A15; --card:#182420; --ink:#E6EDE8; --muted:#93A399;
    --line:#26332C; --clay:#D08160; --ok:#57A773; --bad:#D4674F;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.35);
  }
  /* Arena · calido, menos fatiga en jornadas largas */
  [data-tema="arena"]{
    --field:#4A3B22; --field-700:#5E4B2C; --maize:#E0A82E; --maize-deep:#B4801C;
    --paper:#FAF4E8; --card:#FFFDF8; --ink:#241C0E; --muted:#6E6250;
    --line:#E4DAC6; --clay:#A85B36; --ok:#2E7D52; --bad:#B5432E;
    --shadow:0 1px 2px rgba(74,59,34,.07),0 8px 22px rgba(74,59,34,.07);
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:#0d2018;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--ink)}
  #root{height:100%}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:16px}

  .shell{max-width:430px;margin:0 auto;min-height:100dvh;background:var(--paper);
    position:relative;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.4)}
  @media(min-width:480px){.shell{height:100dvh}}

  /* ===== Guías de remisión ===== */
  .guia-btn{width:100%;display:flex;align-items:center;gap:11px;background:var(--card);
    border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:14px;
    font-family:inherit;box-shadow:var(--shadow)}
  .guia-btn:active{background:var(--paper)}
  .guia-alerta{display:flex;align-items:flex-start;gap:10px;background:#FCEBE7;
    border:1px solid #E8B4A6;border-left:4px solid var(--bad,#B5432E);border-radius:12px;
    padding:11px 13px;margin-bottom:10px;color:#8C2E1E}
  .guia-intro{font-size:12px;color:var(--muted);line-height:1.5;margin:0 2px 14px}
  .guia-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:12px;box-shadow:var(--shadow)}
  .guia-card.mala{border-color:#E8B4A6;border-left:4px solid var(--bad,#B5432E)}
  .guia-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px}
  .guia-num{font-family:inherit;font-size:14px;font-weight:700;color:var(--ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .guia-emi{font-size:11.5px;color:var(--muted);margin-top:1px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .guia-placa{flex-shrink:0;background:var(--paper);border:1px solid var(--line);
    border-radius:8px;padding:5px 9px;font-size:12px;font-weight:700;color:var(--field)}
  .guia-placa.mala{background:#FCEBE7;border-color:#E8B4A6;color:#8C2E1E}
  .guia-warn{background:#FCEBE7;border-radius:9px;padding:8px 10px;margin-bottom:9px;
    font-size:11.5px;font-weight:600;color:#8C2E1E;line-height:1.4}
  .guia-fila{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
    padding:4px 0;min-width:0}
  .guia-fila>span{font-size:11.5px;color:var(--muted);flex-shrink:0}
  .guia-fila b{font-size:12.5px;color:var(--ink);text-align:right;min-width:0;line-height:1.35}
  .guia-item{display:flex;align-items:center;padding:6px 0;border-top:1px solid var(--line);
    margin-top:6px;font-size:12.5px;color:var(--ink)}

  /* ===== Ajustes ===== */
  .pest-aj{display:flex;gap:7px;overflow-x:auto;padding:2px 0 10px;-ms-overflow-style:none;scrollbar-width:none}
  .pest-aj::-webkit-scrollbar{display:none}
  .pest-aj button{flex-shrink:0;background:#fff;border:1px solid var(--line);border-radius:999px;
    padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--muted);font-family:inherit;white-space:nowrap}
  .pest-aj button.on{background:var(--field);border-color:var(--field);color:#EAF0EA}
  .aj-card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px 14px;
    box-shadow:var(--shadow)}
  .aj-fila{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 0;min-width:0}
  .aj-fila>span:first-child{font-size:13px;color:var(--muted);flex-shrink:0}
  .aj-fila b{font-size:13px;color:var(--ink);text-align:right;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .aj-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .aj-nota{font-size:11px;color:var(--muted);line-height:1.5;margin:10px 2px 0}
  .aj-pal{width:100%;display:flex;align-items:center;gap:11px;background:var(--card);
    border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:8px;
    font-family:inherit;text-align:left}
  .aj-pal.on{border-color:var(--field);background:var(--paper)}
  .aj-pal-m{display:flex;border-radius:9px;overflow:hidden;flex-shrink:0;border:1px solid var(--line)}
  .aj-pal-m span{width:19px;height:34px;display:block}
  .aj-pal-n{display:block;font-size:13.5px;font-weight:700;color:var(--ink)}
  .aj-pal-d{display:block;font-size:11px;color:var(--muted);margin-top:1px}
  .aj-sw{width:46px;height:27px;border-radius:99px;background:var(--line);position:relative;
    flex-shrink:0;border:none;transition:background .2s}
  .aj-sw.on{background:var(--ok)}
  .aj-kn{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;
    background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .aj-sw.on .aj-kn{transform:translateX(19px)}
  .aj-btn{background:var(--paper);border:1px solid var(--line);border-radius:10px;
    padding:8px 14px;font-size:12.5px;font-weight:700;color:var(--field);font-family:inherit;flex-shrink:0}
  .cl-l{font-size:11.5px;font-weight:600;color:var(--muted);margin:10px 0 5px 2px}
  .cl-i{width:100%;padding:11px 40px 11px 13px;border:1px solid var(--line);border-radius:11px;
    font-family:inherit;font-size:14.5px;background:var(--card);color:var(--ink)}
  .cl-ojo{position:absolute;right:5px;top:50%;transform:translateY(-50%);width:31px;height:31px;
    border:none;background:transparent;font-size:15px;opacity:.6}
  .cl-bar{height:5px;border-radius:99px;background:var(--line);overflow:hidden;margin:7px 0 4px}
  .cl-bar i{display:block;height:100%;border-radius:99px;transition:width .25s ease}
  .cl-n{font-size:11px;font-weight:600;line-height:1.4;margin:0 2px}

  /* ===== menu lateral (drawer) ===== */
  .ham{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.10);color:#EAF0EA;
    display:grid;place-items:center;font-size:19px;line-height:1;flex-shrink:0;font-weight:700;border:none}
  .ham:active{background:rgba(255,255,255,.22)}
  .drawer-ov{position:fixed;inset:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
    background:rgba(0,0,0,0);visibility:hidden;z-index:60;transition:background .25s}
  .drawer-ov.on{background:rgba(0,0,0,.45);visibility:visible}
  .drawer{position:absolute;top:0;bottom:0;left:0;width:82%;max-width:330px;background:var(--paper);
    transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;
    box-shadow:2px 0 22px rgba(0,0,0,.22)}
  .drawer.on{transform:translateX(0)}
  .drawer-head{background:var(--field);padding:18px 16px 16px;display:flex;align-items:flex-start;
    justify-content:space-between;gap:10px}
  .drawer-x{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;
    border-radius:8px;font-size:17px;flex-shrink:0}
  .drawer-body{flex:1;overflow-y:auto;padding:14px 13px 20px}
  .drawer-it{width:100%;display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);
    border-radius:13px;padding:11px 13px;margin-bottom:8px;font-family:inherit;text-align:left}
  .drawer-it:active{background:var(--paper)}
  .di-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:16px;flex-shrink:0}
  .di-t{font-size:13.5px;font-weight:700;color:var(--ink)}
  .di-s{font-size:11px;color:var(--muted);margin-top:1px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .di-a{color:var(--muted);font-size:15px;flex-shrink:0}
  .drawer-salir{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:14px;
    background:#FBE9E4;color:#B5613C;border:1px solid #E8C0B0;border-radius:13px;padding:13px;
    font-size:13.5px;font-weight:700;font-family:inherit}

  /* ===== top ===== */
  .top{background:var(--field);color:#EAF0EA;padding:14px 18px 16px;
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .top .who{font-size:12px;color:#9DB6A6;letter-spacing:.04em;text-transform:uppercase}
  .top .name{font-size:16px;font-weight:600;margin-top:2px}
  .topbtn{display:flex;align-items:center;gap:5px;color:#EAF0EA;font-size:13px;font-weight:600;
    background:rgba(255,255,255,.10);border-radius:999px;padding:7px 13px}
  .topbtn:active{background:rgba(255,255,255,.22)}
  .back{color:#EAF0EA;font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}

  .body{flex:1;overflow-y:auto;padding:16px 16px 90px;-webkit-overflow-scrolling:touch}

  /* ===== login ===== */
  .login-wrap{padding:40px 22px}
  .logo-badge{width:64px;height:64px;border-radius:18px;background:var(--maize);color:var(--field);
    display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 18px;box-shadow:var(--shadow)}
  .login-title{text-align:center;color:#EAF0EA;font-size:22px;font-weight:700}
  .login-sub{text-align:center;color:#9DB6A6;font-size:13.5px;margin-top:6px;margin-bottom:26px}
  .chofer-card{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
    border-radius:15px;padding:14px 15px;margin-bottom:11px;box-shadow:var(--shadow)}
  .chofer-card:active{transform:scale(.99)}
  .avatar{width:44px;height:44px;border-radius:12px;background:var(--field);color:#EAF0EA;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;flex-shrink:0}
  .chofer-info{flex:1;min-width:0}
  .chofer-nom{font-size:15.5px;font-weight:600;color:var(--field)}
  .chofer-meta{font-size:12.5px;color:var(--muted);margin-top:2px}
  .chofer-go{font-size:20px;color:var(--maize-deep)}
  .login-back{color:#9DB6A6;font-size:14px;font-weight:600;margin-bottom:14px;display:inline-flex;align-items:center;gap:4px}
  .login-back:active{color:#EAF0EA}
  .ruta-link-card{background:rgba(242,169,0,.12);border:1px solid rgba(242,169,0,.35);border-radius:14px;
    padding:13px 15px;margin-bottom:18px}
  .ruta-link-card .rl-nom{font-size:16px;font-weight:700;color:var(--maize)}
  .ruta-link-card .rl-meta{font-size:12.5px;color:#C9D8CD;margin-top:3px}
  .nuevo-form{background:var(--card);border-radius:16px;padding:16px 16px 18px;box-shadow:var(--shadow)}
  .nuevo-form .field{margin-bottom:13px}
  .nuevo-form .b-confirm{margin-top:4px}
  .login-error{color:var(--bad);font-size:12.5px;font-weight:600;margin:-4px 0 10px;min-height:16px}
  .login-demo{text-align:center;color:#7E9488;font-size:11.5px;margin-top:16px;line-height:1.5}
  .login-demo b{color:#9DB6A6}

  /* ===== fase carga (piladoras) ===== */
  .pil-card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px 14px;
    margin-bottom:11px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .pil-card.salio:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ok)}
  .pil-card.term:before,.pil-card.cargando:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--maize-deep)}
  .pil-top{display:flex;align-items:flex-start;gap:11px}
  .pil-n{width:30px;height:30px;border-radius:9px;background:var(--field);color:#EAF0EA;
    font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .pil-info{flex:1;min-width:0}
  .pil-nom{font-size:15px;font-weight:600;color:var(--field)}
  .pil-dir{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.35}
  .pil-meta{font-size:12px;color:var(--muted);margin-top:3px}
  .pil-card.bloq{opacity:.6}
  .pil-bloq{margin-top:12px;background:#F1ECE0;border:1px dashed var(--line);border-radius:10px;
    padding:11px;text-align:center;font-size:12.5px;color:var(--muted);font-weight:600}
  .pil-prog{margin-top:12px}
  .pil-bar{height:8px;background:var(--paper);border-radius:99px;overflow:hidden}
  .pil-bar i{display:block;height:100%;background:var(--maize);border-radius:99px;transition:width .3s}
  .pil-prog-l{display:flex;justify-content:space-between;font-size:12px;color:var(--field);font-weight:600;margin-top:6px}
  .pil-llegada{font-size:12px;color:var(--muted);margin-top:8px}
  .pil-actions{display:flex;gap:9px;margin-top:12px}
  .b-carga-sec{flex:1;background:#fff;border:1.5px solid var(--line);color:var(--field);font-weight:600;
    font-size:13.5px;border-radius:11px;padding:11px 8px}
  .b-carga-sec:active{background:var(--paper)}
  .b-carga-accion{width:100%;margin-top:12px;background:var(--field);color:#EAF0EA;font-weight:700;
    font-size:14.5px;border-radius:11px;padding:13px}
  .b-carga-accion:active{background:var(--field-700)}
  .b-carga-accion.salir{background:var(--maize);color:var(--field)}
  .b-carga-accion.salir:active{background:var(--maize-deep)}
  .b-nov-carga{width:100%;margin:6px 0 14px;background:#fff;border:1.5px solid var(--clay);color:var(--clay);
    font-weight:700;font-size:14px;border-radius:12px;padding:13px}
  .b-nov-carga:active{background:#FBEFEA}
  .b-ir-entregas{width:100%;background:var(--ok);color:#fff;font-weight:700;font-size:15.5px;border-radius:13px;padding:15px;margin-top:4px}
  .b-ir-entregas:active{background:#256B45}
  .bloqueo-entregas{background:#F1ECE0;border:1px dashed var(--line);border-radius:12px;padding:14px;
    text-align:center;font-size:13px;color:var(--muted);font-weight:600;line-height:1.4}
  .b-ver-carga{width:100%;background:#fff;border:1.5px solid var(--line);color:var(--field);font-weight:600;
    font-size:13.5px;border-radius:11px;padding:11px;margin-bottom:14px}
  .b-ver-carga:active{background:var(--paper)}

  /* ===== resumen ruta ===== */
  .ruta-hero{background:var(--field);border-radius:16px;padding:16px 17px;color:#EAF0EA;margin-bottom:16px}
  .ruta-hero .rh-dest{font-size:18px;font-weight:700}
  .rh-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .ruta-check{font-size:11.5px;font-weight:700;color:var(--field);background:var(--maize);
    border-radius:7px;padding:3px 9px;white-space:nowrap}
  .ruta-hero.done{opacity:.78}

  /* ===== acciones del inicio ===== */
  .acc-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .acc-card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 13px;
    text-align:left;box-shadow:var(--shadow)}
  .acc-card:active{transform:scale(.98)}
  .acc-ico{font-size:26px}
  .acc-tit{font-size:14px;font-weight:700;color:var(--field);margin-top:8px;line-height:1.25}
  .acc-sub{font-size:11.5px;color:var(--muted);margin-top:3px}
  .acc-aviso{background:#FFFBF2;border:1px solid #EAD2A0;border-radius:12px;padding:12px 13px;
    margin-top:13px;font-size:12.5px;color:var(--maize-deep);font-weight:600;line-height:1.4}

  /* filas de pago / solicitud */
  .pago-row{display:flex;align-items:center;justify-content:space-between;gap:11px;background:var(--card);
    border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
  .pago-info{min-width:0}
  .pago-ruta{font-size:14.5px;font-weight:600;color:var(--field)}
  .pago-meta{font-size:12px;color:var(--muted);margin-top:2px}
  .pago-der{text-align:right;flex-shrink:0}
  .pago-monto{font-size:16px;font-weight:700;color:var(--field);margin-bottom:4px}
  .hi-chip{font-size:11px;font-weight:700;border-radius:7px;padding:3px 9px;margin-right:6px;display:inline-block}
  .ruta-hero .rh-veh{font-size:13px;color:#9DB6A6;margin-top:3px}
  .rh-stats{display:flex;gap:10px;margin-top:14px}
  .rh-stat{flex:1;background:rgba(255,255,255,.09);border-radius:11px;padding:9px 11px}
  .rh-stat .v{font-size:19px;font-weight:700}
  .rh-stat .l{font-size:11px;color:#9DB6A6;margin-top:1px}
  .progbar{height:7px;background:rgba(255,255,255,.14);border-radius:99px;margin-top:14px;overflow:hidden}
  .progbar i{display:block;height:100%;background:var(--maize);border-radius:99px;transition:width .3s}
  .prog-label{font-size:12px;color:#9DB6A6;margin-top:7px}

  .sect-h{font-size:12px;font-weight:700;color:var(--field);text-transform:uppercase;letter-spacing:.05em;
    margin:4px 2px 10px}

  /* ===== parada (cliente) ===== */
  .stop{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px 14px;
    margin-bottom:11px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .stop.done{opacity:.92}
  .stop.done:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ok)}
  .stop.parcial:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--maize-deep)}
  .stop.nov:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--clay)}
  .stop-top{display:flex;align-items:flex-start;gap:11px}
  .stop-n{width:30px;height:30px;border-radius:9px;background:var(--maize);color:var(--field);
    font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .stop.done .stop-n{background:var(--ok);color:#fff}
  .stop.parcial .stop-n{background:var(--maize-deep);color:#fff}
  .stop.nov .stop-n{background:var(--clay);color:#fff}
  .stop-cli{flex:1;min-width:0}
  .stop-nom{font-size:15px;font-weight:600;color:var(--field)}
  .stop-dir{font-size:12.5px;color:var(--muted);margin-top:2px;line-height:1.35}
  .stop-ciudad{font-size:11.5px;font-weight:600;color:var(--field);background:var(--paper);

/* ══ CLAVE (modo demo) ══
   Regla sellada: la clave NUNCA se guarda en texto plano, solo su hash. Nadie puede
   verla. Historial anti-repeticion por hash. FNV-1a no es criptografico: sirve para
   comparar sin guardar el texto. En Fase 4 lo reemplaza el hash del servidor. */
const CLAVE_KEY_T = "freelance_clave_transp_v1";
function hashClaveT(txt){
  let h = 2166136261; const t = String(txt||"");
  for(let i=0;i<t.length;i++){ h ^= t.charCodeAt(i); h = Math.imul(h,16777619); }
  return (h>>>0).toString(16).padStart(8,"0");
}
function historialClavesT(){
  try{ return JSON.parse(localStorage.getItem(CLAVE_KEY_T)||"[]"); }catch(e){ return []; }
}
function guardarClaveT(hash){
  const l = historialClavesT(); l.unshift(hash);
  try{ localStorage.setItem(CLAVE_KEY_T, JSON.stringify(l.slice(0,3))); }catch(e){}
}
function claveRepetidaT(txt){ return historialClavesT().indexOf(hashClaveT(txt)) >= 0; }
function fuerzaClaveT(txt){
  const t = String(txt||"");
  const largo=t.length>=8, letra=/[a-zA-Z]/.test(t), num=/[0-9]/.test(t);
  const extra = t.length>=12 && /[^a-zA-Z0-9]/.test(t);
  const falta=[];
  if(!largo) falta.push("8 caracteres");
  if(!letra) falta.push("una letra");
  if(!num)   falta.push("un número");
  const valida = largo && letra && num;
  let nivel = 0;
  if(valida) nivel = extra ? 3 : (t.length>=10 ? 2 : 1);
  return { valida, nivel, falta,
    texto:["Muy débil","Aceptable","Buena","Fuerte"][nivel],
    color:["#B5613C","#C9A227","#3F8F63","#2E7D52"][nivel] };
}
const puedeHuellaRealT = () => location.protocol==="https:" && !!window.PublicKeyCredential;

/* ══ TEMAS DE COLOR (Ajustes) ══
   Norma sellada: 4 temas. Campo es el de fabrica (sin atributo); los otros 3 se
   aplican poniendo data-tema en el <html> y el CSS hace el resto.
   La eleccion se guarda en el telefono: si el chofer elige Noche porque maneja de
   madrugada, no tiene por que volver a elegirlo cada vez que abre la app. */
const TEMA_KEY = "freelance_tema_transportista_v1";
const PALETAS = {
  campo: {nombre:"Campo", desc:"Verde institucional",        muestra:["#15392B","#F2A900"]},
  sol:   {nombre:"Sol",   desc:"Alto contraste bajo el sol", muestra:["#0B2A1E","#FFFFFF"]},
  noche: {nombre:"Noche", desc:"Oscuro, para poca luz",      muestra:["#0E1A14","#E9B44C"]},
  arena: {nombre:"Arena", desc:"Cálido, menos fatiga",       muestra:["#4A3B22","#E0A82E"]},
};
function aplicarTema(clave){
  const k = PALETAS[clave] ? clave : "campo";
  const raiz = document.documentElement;
  if(k==="campo") raiz.removeAttribute("data-tema");
  else raiz.setAttribute("data-tema", k);
  try{ localStorage.setItem(TEMA_KEY, k); }catch(e){}
}
function temaGuardado(){
  try{ const g=localStorage.getItem(TEMA_KEY); return PALETAS[g] ? g : "campo"; }
  catch(e){ return "campo"; }
}
/* al abrir la app, recupera el tema elegido antes de pintar */
try{
  const g = temaGuardado();
  if(g!=="campo") document.documentElement.setAttribute("data-tema", g);
}catch(e){}

/* ═══════════ HUELLA REAL (WebAuthn) · el sensor del teléfono, como en la banca ═══════════
   En HTTPS (app publicada): biometría verdadera del chofer recurrente. En archivo local: demo. */
var HUELLA_KEY = "freelance_huella_v1";
function puedeHuellaReal(){ return location.protocol === "https:" && !!window.PublicKeyCredential; }
function huellaGuardada(){ try { return JSON.parse(localStorage.getItem(HUELLA_KEY) || "null"); } catch(e){ return null; } }
function guardarHuella(d){ try { localStorage.setItem(HUELLA_KEY, JSON.stringify(d)); } catch(e){} }
function b64h(buf){ return btoa(String.fromCharCode.apply(null, Array.prototype.slice.call(new Uint8Array(buf)))); }
function deB64h(str){ return Uint8Array.from(atob(str), function(ch){ return ch.charCodeAt(0); }); }
function retoAleatorio(){ var a = new Uint8Array(32); crypto.getRandomValues(a); return a; }
function crearHuella(usuario, nombre){
  return navigator.credentials.create({ publicKey: {
    challenge: retoAleatorio(),
    rp: { name: "FREELANCE", id: location.hostname },
    user: { id: new TextEncoder().encode(usuario), name: usuario, displayName: nombre || usuario },
    pubKeyCredParams: [{ alg:-7, type:"public-key" }, { alg:-257, type:"public-key" }],
    authenticatorSelection: { authenticatorAttachment:"platform", userVerification:"required", residentKey:"preferred" },
    timeout: 60000, attestation: "none",
  }}).then(function(cred){ return cred ? b64h(cred.rawId) : null; }).catch(function(){ return null; });
}
function verificarHuella(credId){
  return navigator.credentials.get({ publicKey: {
    challenge: retoAleatorio(),
    allowCredentials: [{ id: deB64h(credId), type:"public-key", transports:["internal"] }],
    userVerification:"required", timeout:60000, rpId: location.hostname,
  }}).then(function(r){ return !!r; }).catch(function(){ return false; });
}

/* ===================== FASE DE CARGA ===================== */
/* Los puntos de carga los define LOGÍSTICA en r.cargas[] (orden estricto 1,2,3...).
   El estado de cada punto se guarda en r.carga[orden]. */
function puntosDeCarga(r){
  var lista=(r.cargas||[]).slice();
  lista.sort(function(a,b){return a.orden-b.orden;});
  return lista;
}
// Estado de un punto de carga (por su número de orden). Se guarda en r.carga.
function cargaDe(r,orden){
  if(!r.carga) r.carga={};
  if(!r.carga[orden]) r.carga[orden]={ llegada:null, qqCargado:0, terminado:false, salida:false, avances:[] };
  return r.carga[orden];
}
// ¿El punto anterior ya está cerrado (salida)? Para el orden estricto.
function puntoHabilitado(r,orden){
  if(orden<=1) return true;
  return cargaDe(r,orden-1).salida===true;
}
// ¿Ya salió de TODOS los puntos? Solo entonces se habilitan las entregas.
function cargaCompleta(r){
  var pts=puntosDeCarga(r);
  if(pts.length===0) return true;
  return pts.every(function(x){ return cargaDe(r,x.orden).salida; });
}
function qqRutaTotal(r){
  return puntosDeCarga(r).reduce(function(a,x){return a+x.qq;},0);
}
function qqRutaCargado(r){
  return puntosDeCarga(r).reduce(function(a,x){return a+Math.min(cargaDe(r,x.orden).qqCargado,x.qq);},0);
}

/* ---------- Cascarón interior (barra superior + cuerpo) ---------- */
/* La campanilla flota por encima de todo (zIndex 1200) y vive fuera del Shell.
   Para que no quede encima del menu abierto, el drawer avisa por aqui. */
const AVISO_DRAWER = { abierto:false, oyentes:[] };
function setDrawerAbierto(v){
  AVISO_DRAWER.abierto = v;
  AVISO_DRAWER.oyentes.forEach((f)=>{ try{ f(v); }catch(e){} });
}
function useDrawerAbierto(){
  const [ab, setAb] = useState(AVISO_DRAWER.abierto);
  React.useEffect(()=>{
    AVISO_DRAWER.oyentes.push(setAb);
    setAb(AVISO_DRAWER.abierto);
    return ()=>{ const i=AVISO_DRAWER.oyentes.indexOf(setAb); if(i>=0) AVISO_DRAWER.oyentes.splice(i,1); };
  },[]);
  return ab;
}

/* ── Abrir el menu lateral deslizando desde el borde izquierdo ── */
function useGestoDrawer(abrir, activo){
  React.useEffect(()=>{
    if(!activo) return;
    const BORDE=20, MINIMO=60;
    let x0=0, y0=0, valido=false;
    const inicio=(e)=>{
      const t=e.touches&&e.touches[0]; if(!t) return;
      const caja=document.querySelector(".shell");
      const izq=caja ? caja.getBoundingClientRect().left : 0;
      valido = (t.clientX - izq) <= BORDE;
      x0=t.clientX; y0=t.clientY;
    };
    const mover=(e)=>{
      if(!valido) return;
      const t=e.touches&&e.touches[0]; if(!t) return;
      const dx=t.clientX-x0, dy=Math.abs(t.clientY-y0);
      if(dx>MINIMO && dx>dy*2){ valido=false; abrir(); }
      if(dy>28) valido=false;
    };
    const fin=()=>{ valido=false; };
    document.addEventListener("touchstart", inicio, {passive:true});
    document.addEventListener("touchmove", mover, {passive:true});
    document.addEventListener("touchend", fin, {passive:true});
    document.addEventListener("touchcancel", fin, {passive:true});
    return ()=>{
      document.removeEventListener("touchstart", inicio);
      document.removeEventListener("touchmove", mover);
      document.removeEventListener("touchend", fin);
      document.removeEventListener("touchcancel", fin);
    };
  },[abrir,activo]);
}

/* ── Menu lateral del transportista: sus gestiones, fuera de la pantalla de ruta ── */
function MenuLateral({ abierto, cerrar, chofer, irSeccion, pedirSalir }){
  const ITEMS = [
    ["pagos","💵","#E5F0EA","Pagos por transporte","Lo que te deben"],
    ["anticipo","🧾","#EDEAE0","Anticipo de estibada","Pedir por adelantado"],
    ["reposicion","↩️","#F7EFE6","Reposición de estibada","Ya pagué, me devuelven"],
    ["historial","📋","#E8F0F7","Historial de rutas","Viajes entregados"],
    ["ajustes","⚙️","#EEF1F5","Ajustes","Colores, clave e impresora"],
  ];
  return (
    <div className={"drawer-ov"+(abierto?" on":"")} onClick={cerrar}>
      <div className={"drawer"+(abierto?" on":"")} onClick={(e)=>e.stopPropagation()}
        onTouchStart={(e)=>{ const t=e.touches[0]; e.currentTarget.dataset.x0=t.clientX; e.currentTarget.dataset.y0=t.clientY; }}
        onTouchMove={(e)=>{
          const t=e.touches[0], d=e.currentTarget.dataset;
          if(d.x0===undefined) return;
          const dx=t.clientX-Number(d.x0), dy=Math.abs(t.clientY-Number(d.y0));
          if(dx < -60 && Math.abs(dx) > dy*2){ d.x0=undefined; cerrar(); }
        }}>
        <div className="drawer-head">
          <div style={{ minWidth:0 }}>
            <div style={{ fontSize:11.5, color:"#9DB6A6", fontWeight:600 }}>Transportista</div>
            <div style={{ fontSize:16, color:"#fff", fontWeight:700, marginTop:1,
              overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{chofer||""}</div>
          </div>
          <button className="drawer-x" onClick={cerrar}>×</button>
        </div>
        <div className="drawer-body">
          {ITEMS.map(([k,ic,bg,t,sub])=>(
            <button key={k} className="drawer-it" onClick={()=>{ cerrar(); irSeccion(k); }}>
              <span className="di-ic" style={{ background:bg }}>{ic}</span>
              <div style={{ flex:1, minWidth:0 }}>
                <div className="di-t">{t}</div>
                <div className="di-s">{sub}</div>
              </div>

          <div style={{ textAlign:"center", fontSize:10.5, color:"var(--muted)", padding:"12px 0 2px", opacity:.8 }}>
            Versión {VERSION.fecha} b{VERSION.n}</div>
        </div>
      </div>
    </div>
  );
}

function Shell({ who, name, onSalir, extraDer, children, menu, chofer, irSeccion }){
  /* menu=true solo en Inicio y secciones: en carga/entrega el chofer esta trabajando
     y el gesto de deslizar estorbaria. */
  const [abierto, setAbierto] = useState(false);
  const [confirmarSalir, setConfirmarSalir] = useState(false);
  const abrir = React.useCallback(()=>setAbierto(true), []);
  useGestoDrawer(abrir, !!menu && !abierto);
  React.useEffect(()=>{ setDrawerAbierto(abierto); }, [abierto]);
  React.useEffect(()=>()=>setDrawerAbierto(false), []);   /* si la pantalla se cierra, se limpia */
  return (
    <div className="shell">
      <div className="top">
        <div style={{ display:"flex", alignItems:"center", gap:11, minWidth:0 }}>
          {menu && <button className="ham" onClick={()=>setAbierto(true)} aria-label="Menú">☰</button>}
          <div style={{ minWidth:0 }}>
            {typeof who === "string" ? <div className="who">{who}</div> : who}
            {name ? <div className="name">{name}</div> : null}
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10, flexShrink:0 }}>
          <span className="net"><span className="dot"></span>En línea</span>
          {extraDer ? extraDer : (!menu && <button className="topbtn" onClick={onSalir}>Salir</button>)}
        </div>
      </div>
      <div className="body">{children}</div>
      {menu && (
        <MenuLateral abierto={abierto} cerrar={()=>setAbierto(false)} chofer={chofer}
          irSeccion={irSeccion} pedirSalir={()=>setConfirmarSalir(true)} />
      )}
      {confirmarSalir && (
        <Hoja titulo="¿Cerrar sesión?" onCerrar={()=>setConfirmarSalir(false)}>
          <div style={{ padding:"4px 2px 6px", fontSize:13.5, color:"var(--muted)", lineHeight:1.5 }}>
            Saldrás de la app y volverás a la pantalla de ingreso.</div>
          <button className="b-carga-accion salir" onClick={()=>{ setConfirmarSalir(false); onSalir(); }}>
            Sí, cerrar sesión</button>

  );

function TarjetaRuta({ r, completada, onAbrir }){
  const total = r.pedidos.length;
  const hechos = r.pedidos.filter((id)=>ped(id).estadoEntrega!=="pendiente").length;
  const qq = Math.round(qqDeKg(r.pedidos.reduce((a,id)=>a+pesoPedido(ped(id)),0)));
  const veh = VEHICULOS[r.placa] || { tipo: r.placa };
  return (
    <div className={"ruta-hero"+(completada?" done":"")} style={{ cursor:"pointer" }} onClick={onAbrir}>
      <div className="rh-head"><div className="rh-dest">{r.nombre}</div>{completada && <span className="ruta-check">✓ Completada</span>}</div>
      <div className="rh-veh">{r.placa} · {veh.tipo}</div>
      <div className="rh-stats">
        <div className="rh-stat"><div className="v num">{total}</div><div className="l">paradas</div></div>
        <div className="rh-stat"><div className="v num">{qq}</div><div className="l">quintales</div></div>
        <div className="rh-stat"><div className="v num">{hechos}/{total}</div><div className="l">entregadas</div></div>
      </div>
    </div>
  );
}

   Motor de reglas: los datos ya están en la app, solo se buscan y devuelven.
   Molde de freelance-completo/Comisionista, con el catálogo propio del transportista

/* Chofer activo: lo fija App al entrar. Las respuestas usan "mi ruta / mis entregas". */
var CHOFER_ACTIVO = null;

function MicBtn({onTexto, toast}){
  const [rec,setRec]=useState(false);
  const refRec=React.useRef(null);
  const Reconocedor = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!Reconocedor) return null; /* navegador sin dictado: el botón no aparece */
  const dictar=()=>{
    if(rec){ try{ refRec.current && refRec.current.stop(); }catch(e){} setRec(false); return; }
    const r=new Reconocedor();
    r.lang="es-EC"; r.interimResults=false; r.maxAlternatives=1;
    r.onresult=ev=>{ const t=ev.results[0][0].transcript.trim(); if(t) onTexto(t); };
    r.onerror=ev=>{ setRec(false); if(ev.error==="not-allowed" && toast) toast("Permite el micrófono en el navegador para dictar"); };
    r.onend=()=>setRec(false);
    refRec.current=r; setRec(true);
    try{ r.start(); }catch(e){ setRec(false); }
  };
  return (
    <button type="button" className={"micb"+(rec?" rec":"")} onClick={dictar} aria-label="Buscar por voz">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
        stroke={rec?"#C2603A":"var(--muted)"} strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">
        <rect x="9" y="2.5" width="6" height="11" rx="3"/>
        <path d="M5.5 11a6.5 6.5 0 0013 0"/><path d="M12 17.5V21M9 21h6"/>
      </svg>
    </button>
  );
}

/* Lee en voz alta con la voz del navegador (gratis, sin internet). */
function hablarTexto(txt){
  try{
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(txt);
    u.lang = "es-EC"; u.rate = 1; u.pitch = 1;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
const normAsist = s => String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();

/* ── Helpers de datos del transportista para el asistente ── */
/* Ruta activa del chofer logueado (la de hoy; la primera de sus rutas). */
function rutaActivaAsist(){
  if(!CHOFER_ACTIVO) return null;
  const rs = rutasDe(CHOFER_ACTIVO);
  return rs.length ? rs[0] : null;
}
/* Pedidos de la ruta activa, en orden de entrega. */
function pedidosRutaAsist(){
  const r = rutaActivaAsist();
  if(!r) return [];
  return r.pedidos.map(id=>ped(id)).filter(Boolean);
}
/* Cliente escrito/dictado -> pedido de mi ruta. */
function pedidoDeClienteAsist(cli){
  const ps = pedidosRutaAsist();
  const n = normAsist(cli);
  return ps.find(p=>normAsist(p.cli)===n)
      || ps.find(p=>{ const parts=normAsist(p.cli).split(/\s+/).filter(w=>w.length>=3); return parts.some(w=>n.includes(w)); })
      || null;
}

/* ══ CLAVES para reconocer la frase dictada (habla natural) ══ */
const CLAVES_ASIST = {
  faltanHoy:        ["entregas me faltan","cuantas entregas faltan","me faltan entregas","cuantas faltan","entregas pendientes","faltan por entregar"],
  proximaEntrega:   ["proxima entrega","siguiente entrega","cual es mi proxima","a donde voy","cual sigue"],
  completadas:      ["ya complete","entregas complete","cuantas complete","ya entregue","entregas hechas","cuantas hechas"],
  conNovedad:       ["novedad","con problema","entregas con novedad","rechazada","tengo novedades"],
  dondeCliente:     ["donde queda","direccion de","como llego a","ubicacion de"],
  queEntrego:       ["que le entrego","que entrego a","que lleva","que pedido","que productos entrego"],
  telCliente:       ["telefono de","numero de","celular de","contacto de"],
  ciudadesRuta:     ["que ciudades","ciudades cubre","ciudades de mi ruta","por que ciudades"],
  quintales:        ["cuantos quintales","quintales llevo","cuanta carga","quintales en total","cuanto peso"],
  proxCarga:        ["proximo punto de carga","siguiente carga","donde cargo","proxima carga","siguiente piladora"],
  puntosCarga:      ["cuantos puntos de carga","puntos de carga","cuantas piladoras","donde tengo que cargar"],
  placaHoy:         ["que placa","mi placa","placa asignada","que camion","que vehiculo"],
  guiasRuta:        ["cuantas guias","que guias","guias llevo","guias de remision","guias tengo"],
  pagosTransporte:  ["cuanto me deben","me deben por transporte","fletes por cobrar","cuanto por cobrar","pago de transporte","mi flete"],
  solicitudesRevision:["anticipo en revision","reposicion en revision","solicitud en revision","anticipos pendientes","mis solicitudes","reposicion pendiente"],
};

function interpretarAsist(frase){
  const f = normAsist(frase);
  if(!f) return null;
  let mejor = null, mejorLargo = 0;
  PREGUNTAS_ASIST.forEach(p=>{
    (CLAVES_ASIST[p.id]||[]).forEach(clave=>{
      const c = normAsist(clave);
      if(f.includes(c) && c.length > mejorLargo){ mejor = p; mejorLargo = c.length; }
    });
  });
  if(!mejor) return null;
  const GENERICAS = ["comercial","distribuidora","tienda","almacen","almacenes","bodega","abarrotes","despensa","comisariato","mayorista","super","mini","market","el","la","los","las","de","del","y","don","doña","sr","sra"];
  const calzaNombre = (nombre)=>{
    const n = normAsist(nombre);
    if(f.includes(n)) return true;
    const parts = n.split(/\s+/).filter(w => w.length>=3 && !GENERICAS.includes(w));
    return parts.some(w => f.includes(w));
  };
  let dato = null;
  if(mejor.pide === "cliente"){
    const ps = pedidosRutaAsist();
    const p = ps.find(x=>calzaNombre(x.cli));
    dato = p ? p.cli : null;
  }
  return { pregunta: mejor, dato };
}

/* ══ MOTOR DE VOZ GLOBAL (autónomo) ══ */
const MotorVoz = {
  rec: null, intentos: 0, watchdog: null, topeGlobal: null, activo: false, cb: {},
  soportado(){ return !!(window.SpeechRecognition || window.webkitSpeechRecognition); },
  config(cb){ this.cb = cb || {}; },
  _estado(v){ this.activo = v; if(this.cb.onEstado) this.cb.onEstado(v); },
  _limpiarTimers(){
    if(this.watchdog){ clearTimeout(this.watchdog); this.watchdog = null; }
    if(this.topeGlobal){ clearTimeout(this.topeGlobal); this.topeGlobal = null; }
  },
  apagar(){
    this._limpiarTimers();
    if(this.rec){
      try{ this.rec.onresult=null; this.rec.onerror=null; this.rec.onend=null; this.rec.abort(); }catch(e){}
      this.rec = null;
    }
    this._estado(false);
  },
  iniciar(){
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!Rec){ if(this.cb.toast) this.cb.toast("Tu navegador no permite dictado por voz"); return; }
    if(this.rec){ try{ this.rec.onresult=null; this.rec.onerror=null; this.rec.onend=null; this.rec.abort(); }catch(e){} this.rec=null; }
    if(this.watchdog){ clearTimeout(this.watchdog); this.watchdog=null; }
    if(!this.topeGlobal){ this.topeGlobal = setTimeout(()=>{ this.apagar(); }, 22000); }
    const r = new Rec();
    r.lang="es-EC"; r.interimResults=false; r.maxAlternatives=1;
    let resuelto = false;
    this.watchdog = setTimeout(()=>{ if(!resuelto) this.apagar(); }, 8000);
    r.onresult = (ev)=>{
      resuelto = true;
      if(this.watchdog){ clearTimeout(this.watchdog); this.watchdog=null; }
      const frase = ev.results[0][0].transcript.trim();
      const res = interpretarAsist(frase);
      if(!res){
        this.intentos += 1;
        if(this.intentos < 3){
          hablarTexto("No te entendí, por favor repite");
          setTimeout(()=>{ this.iniciar(); }, 1700);
        } else {
          hablarTexto("No te entendí. Toca el botón para ver las preguntas.");
          this.apagar();
        }
        return;
      }
      const p = res.pregunta;
      if(p.pide && !res.dato){
        this.intentos += 1;
        const que = p.pide==="cliente"?"¿De qué cliente?":"¿De qué dato?";
        if(this.intentos < 3){
          hablarTexto(que);
          setTimeout(()=>{ this.iniciar(); }, 1700);
        } else {
          hablarTexto("No capté el nombre. Toca el botón para escribirlo.");
          if(this.cb.onPedirDato) this.cb.onPedirDato(p);
          this.apagar();
        }
        return;
      }
      const texto = p.responder(res.dato || null);
      hablarTexto(texto);
      if(p.ir && this.cb.onIr) this.cb.onIr(p.ir, null);
      this.apagar();
    };
    r.onerror = (ev)=>{
      resuelto = true;
      if(ev.error==="not-allowed" && this.cb.toast) this.cb.toast("Permite el micrófono para hablar");
      this.apagar();
    };
    r.onend = ()=>{ if(!resuelto && this.intentos === 0){ this.apagar(); } };
    this.rec = r;
    this._estado(true);
    try{ r.start(); }catch(e){ this.apagar(); }
  },
  alternar(){
    if(this.activo){ this.apagar(); return; }
    this.intentos = 0;
    if(this.topeGlobal){ clearTimeout(this.topeGlobal); this.topeGlobal=null; }
    this.iniciar();
  }
};

/* ── Burbuja flotante movible del asistente ── */
function BurbujaAsistente({ onEscuchar, escuchando }){
  const [pos, setPos] = useState({ x: (window.innerWidth||400) - 74, y: (window.innerHeight||700) - 150 });
  const ref = React.useRef({ arrastrando:false, movio:false, ini:null });
  const iniciar = (e) => {
    const t = e.touches ? e.touches[0] : e;
    const s = ref.current;
    s.arrastrando = true; s.movio = false;
    s.ini = { x: t.clientX, y: t.clientY, px: pos.x, py: pos.y };
  };
  const mover = (e) => {
    const s = ref.current;
    if(!s.arrastrando || !s.ini) return;
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - s.ini.x, dy = t.clientY - s.ini.y;
    if(Math.abs(dx) > 6 || Math.abs(dy) > 6){ s.movio = true; }
    if(s.movio){
      const nx = Math.max(6, Math.min((window.innerWidth||400)-62, s.ini.px + dx));
      const ny = Math.max(60, Math.min((window.innerHeight||700)-120, s.ini.py + dy));
      setPos({ x:nx, y:ny });
    }
  };
  const soltar = (e) => {
    const s = ref.current;
    if(e && e.type === "touchend" && e.cancelable){ try{ e.preventDefault(); }catch(_){} }
    if(s.arrastrando){
      if(!s.movio){
        const ahora = Date.now();
        if(!s.ultimoTap || ahora - s.ultimoTap > 400){ s.ultimoTap = ahora; onEscuchar(); }
      } else {
        const ancho = window.innerWidth||400;
        setPos(p=>({ ...p, x: p.x < ancho/2 ? 6 : ancho-62 }));
      }
    }
    s.arrastrando = false; s.movio = false; s.ini = null;
  };
  return (
    <button
      onMouseDown={iniciar} onMouseMove={mover} onMouseUp={soltar} onMouseLeave={soltar}
      onTouchStart={iniciar} onTouchMove={mover} onTouchEnd={soltar}
      aria-label="Asistente de voz"
      style={{position:"fixed", left:pos.x, top:pos.y, zIndex:95, width:56, height:56, borderRadius:"50%",
        border:"none", background: escuchando ? "var(--clay, #B5613C)" : "var(--maize-deep, #C77F00)", color:"#fff", fontSize:24, cursor:"grab",
        boxShadow: escuchando ? "0 0 0 6px rgba(181,97,60,.25), 0 6px 20px rgba(0,0,0,.28)" : "0 6px 20px rgba(0,0,0,.28)",
        display:"flex", alignItems:"center", justifyContent:"center",
        touchAction:"none", userSelect:"none",
        animation: escuchando ? "burbujaLatido 1s ease-in-out infinite" : "none"}}>
      {escuchando ? "●" : "🎙️"}
    </button>
  );
}

function AsistenteVoz({ abierto, panelVisible=true, modoLista=false, onCerrar, onFinVoz, onNecesitaPanel, toast, onIr, escuchaInicial }){

  const [mostrarTodas, setMostrarTodas] = useState(false);
  const refRec = React.useRef(null);
  const refIntentos = React.useRef(0);
  const refWatchdog = React.useRef(null);
  const refReintProg = React.useRef(false);
  const refTopeGlobal = React.useRef(null);

  const escucharNatural = React.useCallback(()=>{
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!Rec){
      if(toast) toast("Tu navegador no permite dictado por voz");
      if(!panelVisible && onFinVoz) onFinVoz();
      return;
    }
    try{ if(refRec.current){ refRec.current.onend=null; refRec.current.onerror=null; refRec.current.onresult=null; refRec.current.abort(); } }catch(e){}
    const r = new Rec();
    r.lang="es-EC"; r.interimResults=false; r.maxAlternatives=1;
    let resuelto = false;
    const marcar = ()=>{ resuelto = true; };
    const apagarVoz = ()=>{
      if(refWatchdog.current){ clearTimeout(refWatchdog.current); refWatchdog.current=null; }
      if(refTopeGlobal.current){ clearTimeout(refTopeGlobal.current); refTopeGlobal.current=null; }
      try{ if(refRec.current){ refRec.current.onend=null; refRec.current.abort(); } }catch(e){}
      setEscuchando(false);
      if(!panelVisible && onFinVoz) onFinVoz();
    };
    refReintProg.current = false;
    if(!refTopeGlobal.current){ refTopeGlobal.current = setTimeout(()=>{ apagarVoz(); }, 22000); }
    if(refWatchdog.current){ clearTimeout(refWatchdog.current); }
    refWatchdog.current = setTimeout(()=>{ if(!resuelto && !refReintProg.current){ apagarVoz(); } }, 8000);
    setNoEntendi(""); setEscuchando(true);
    r.onresult = ev=>{
      const frase = ev.results[0][0].transcript.trim();
      const res = interpretarAsist(frase);
      if(!res){
        marcar();
        setNoEntendi("No entendí \""+frase+"\". Toca una pregunta o inténtalo de nuevo.");
        if(!panelVisible){
          refIntentos.current += 1;
          if(refIntentos.current < 3){
            refReintProg.current = true;
            hablarTexto("No te entendí, por favor repite");
            setTimeout(()=>{ if(reintentarVoz.current) reintentarVoz.current(); }, 1700);
          } else {
            hablarTexto("No te entendí. Toca el botón para ver las preguntas.");
            apagarVoz();
          }
        }
        return;
      }
      const p = res.pregunta;
      setPreg(p);
      if(p.pide && !res.dato){
        marcar();
        setDato(""); setResp("");
        setNoEntendi("Entendí que preguntas sobre "+p.label.toLowerCase()+", pero no capté el nombre. Escríbelo o dícelo abajo.");
        if(!panelVisible){
          refIntentos.current += 1;
          const que = p.pide==="cliente"?"¿De qué cliente?":"¿De qué dato?";
          if(refIntentos.current < 3){
            refReintProg.current = true;
            hablarTexto(que);
            setTimeout(()=>{ if(reintentarVoz.current) reintentarVoz.current(); }, 1700);
          } else {
            hablarTexto("No capté el nombre. Toca el botón para escribirlo.");
            apagarVoz();
          }
        }
        return;
      }
      marcar();
      responderYsaltar(p, res.dato || null);
      if(refWatchdog.current){ clearTimeout(refWatchdog.current); refWatchdog.current=null; }
      if(refTopeGlobal.current){ clearTimeout(refTopeGlobal.current); refTopeGlobal.current=null; }
      setEscuchando(false);
      if(!panelVisible && onFinVoz) onFinVoz();
    };
    r.onerror = ev=>{ marcar(); if(ev.error==="not-allowed" && toast) toast("Permite el micrófono para hablar"); apagarVoz(); };
    r.onend = ()=>{ setEscuchando(false); if(!resuelto && !refReintProg.current) apagarVoz(); };
    refRec.current = r;
    try{ r.start(); }catch(e){ apagarVoz(); }
  },[toast, panelVisible, onFinVoz]);
  const reintentarVoz = React.useRef(null);
  reintentarVoz.current = escucharNatural;

  React.useEffect(()=>{
    if(abierto){
      setPreg(null); setDato(""); setResp(""); setNoEntendi("");
      refIntentos.current = 0;
      if(modoLista){ setMostrarTodas(true); } else { setMostrarTodas(false); }
    }
    // eslint-disable-next-line
  },[abierto, escuchaInicial, panelVisible, modoLista]);

  React.useEffect(()=>{
    if(!abierto){
      if(refWatchdog.current){ clearTimeout(refWatchdog.current); refWatchdog.current=null; }
      if(refTopeGlobal.current){ clearTimeout(refTopeGlobal.current); refTopeGlobal.current=null; }
      try{ if(refRec.current){ refRec.current.onend=null; refRec.current.onerror=null; refRec.current.onresult=null; refRec.current.abort(); } }catch(e){}
      refReintProg.current = false;
    }
  },[abierto]);

  if(!abierto) return null;
  if(!panelVisible) return null;

  const responder = (p, valorDato) => {
    const texto = p.responder(valorDato);
    setResp(texto); setNoEntendi("");
    hablarTexto(texto);
  };
  const responderYsaltar = (p, valorDato) => {
    const texto = p.responder(valorDato);
    hablarTexto(texto);
    if(p.ir && onIr){ onIr(p.ir, null); return true; }
    responder(p, valorDato);
    return false;
  };
  const elegir = (p) => {
    setPreg(p); setDato(""); setResp(""); setNoEntendi("");
    if(!p.pide) responder(p, null);
  };
  const confirmarDato = () => {
    if(!preg || !dato.trim()) return;
    responder(preg, dato.trim());
  };

  const sugerencias = preg && preg.pide === "cliente"
    ? pedidosRutaAsist().map(p=>p.cli)
    : [];
  const filtradas = dato.trim()
    ? sugerencias.filter(s => normAsist(s).includes(normAsist(dato))).slice(0,5)
    : [];

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,25,20,.5)",zIndex:120,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={onCerrar}>
      <div style={{width:"100%",maxWidth:520,margin:0,background:"var(--card)",borderRadius:"18px 18px 0 0",padding:"18px 18px 26px",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 -8px 30px rgba(0,0,0,.2)"}}
        onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontWeight:800,fontSize:16,color:"var(--ink)"}}>🎙️ Preguntar al sistema</div>
          <button className="micb" onClick={onCerrar} aria-label="Cerrar" style={{fontSize:18,color:"var(--muted)"}}>✕</button>
        </div>

        <button onClick={escucharNatural} disabled={escuchando}
          style={{width:"100%",padding:"16px",borderRadius:12,border:"none",marginBottom:12,cursor:"pointer",
            background: escuchando?"var(--clay, #B5613C)":"var(--field-700, #1E4D3A)",color:"#fff",
            fontSize:15.5,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
          <span style={{fontSize:22}}>{escuchando?"●":"🎤"}</span>
          {escuchando ? "Escuchando… habla ahora" : "Habla: dime tu pregunta"}
        </button>
        {noEntendi && (
          <div style={{background:"var(--paper)",borderRadius:10,padding:"10px 13px",marginBottom:12,fontSize:12.5,color:"var(--ink)",lineHeight:1.45}}>
            {noEntendi}
          </div>
        )}

        {!mostrarTodas && !resp && !(preg&&preg.pide) && (
          <div style={{textAlign:"center",marginBottom:8}}>
            <button onClick={()=>setMostrarTodas(true)}
              style={{background:"none",border:"none",color:"var(--field-700, #1E4D3A)",fontSize:12.5,fontWeight:700,cursor:"pointer",textDecoration:"underline"}}>
              Ver todas las preguntas
            </button>
          </div>
        )}

        {mostrarTodas && (
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:12.5,fontWeight:800,color:"var(--ink)"}}>Todas las preguntas</div>
            <button onClick={()=>setMostrarTodas(false)}
              style={{background:"none",border:"none",color:"var(--muted)",fontSize:12.5,fontWeight:700,cursor:"pointer"}}>‹ Ocultar</button>
          </div>
          {[...new Set(PREGUNTAS_ASIST.map(p=>p.cat))].map(cat=>(
            <div key={cat} style={{marginBottom:10}}>
              <div style={{fontSize:11.5,fontWeight:800,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".04em",marginBottom:6}}>{cat}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                {PREGUNTAS_ASIST.filter(p=>p.cat===cat).map(p=>(
                  <button key={p.id} onClick={()=>{ elegir(p); if(p.pide) setMostrarTodas(false); }}
                    style={{padding:"8px 12px",borderRadius:999,border:"1px solid "+(preg&&preg.id===p.id?"var(--maize-deep)":"var(--line)"),
                      background:preg&&preg.id===p.id?"var(--paper)":"var(--card)",fontSize:12,fontWeight:700,cursor:"pointer",color:"var(--ink)"}}>
                    {p.ic} {p.label}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
        )}

        {preg && preg.pide && (
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <input value={dato} onChange={e=>setDato(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&confirmarDato()}
                placeholder="Nombre del cliente…"
                style={{flex:1,minWidth:0,padding:"11px 13px",borderRadius:10,border:"1px solid var(--line)",fontSize:14,background:"var(--card)",color:"var(--ink)"}} />
              <MicBtn onTexto={t=>{ setDato(t); }} toast={toast} />
              <button onClick={confirmarDato}
                style={{padding:"11px 15px",borderRadius:10,border:"none",background:"var(--maize-deep)",color:"#fff",fontSize:13.5,fontWeight:700,cursor:"pointer",flexShrink:0}}>
                Consultar
              </button>
            </div>
            {filtradas.length>0 && (
              <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:4}}>
                {filtradas.map(s=>(
                  <button key={s} onClick={()=>{ setDato(s); responder(preg, s); }}
                    style={{textAlign:"left",padding:"8px 12px",borderRadius:8,border:"1px solid var(--line)",background:"var(--card)",fontSize:13,cursor:"pointer",color:"var(--ink)"}}>
                    {s}
                  </button>
                ))}
              </div>
            )}
          </div>
        )}

        {resp && (
          <div style={{background:"var(--paper)",padding:"14px 16px",borderRadius:12}}>
            <div style={{fontSize:14.5,fontWeight:600,lineHeight:1.5,color:"var(--ink)"}}>{resp}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:10}}>
              {preg && preg.ir && onIr && (
                <button onClick={()=>onIr(preg.ir, null)}
                  style={{padding:"9px 15px",borderRadius:8,border:"none",background:"var(--field-700, #1E4D3A)",color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer"}}>
                  Ir a {ETIQUETA_IR[preg.ir] || "la pantalla"} ›
                </button>
              )}
              <button onClick={()=>hablarTexto(resp)}
                style={{padding:"9px 12px",borderRadius:8,border:"1px solid var(--line)",background:"var(--card)",fontSize:12.5,fontWeight:700,cursor:"pointer",color:"var(--ink)"}}>
                🔊 Escuchar
              </button>
              <button onClick={()=>{ setPreg(null); setDato(""); setResp(""); setNoEntendi(""); setMostrarTodas(false); }}
                style={{padding:"9px 12px",borderRadius:8,border:"1px solid var(--line)",background:"var(--card)",fontSize:12.5,fontWeight:700,cursor:"pointer",color:"var(--ink)"}}>
                Preguntar otra
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
/* ═══════════════ FIN ASISTENTE DE VOZ ═══════════════ */


function App(){
  const [chofer, setChofer] = useState(null);
  const [choferNuevo, setChoferNuevo] = useState(null);
  const [rutaId, setRutaId] = useState(null);
  const [seccion, setSeccion] = useState(null);
  const [faseCampana, setFaseCampana] = useState(null);   /* la campana puede pedir carga/entregas */

  /* Asistente de voz */
  const [asistAbierto, setAsistAbierto] = useState(false);
  const [asistVozBurbuja, setAsistVozBurbuja] = useState(false);
  const [asistLista, setAsistLista] = useState(false);
  const [asistEscuchando, setAsistEscuchando] = useState(false);

  /* El motor necesita saber quién está logueado para "mi ruta / mis entregas". */
  React.useEffect(()=>{ CHOFER_ACTIVO = chofer || null; }, [chofer]);

  const salir = () => { setChofer(null); setChoferNuevo(null); setRutaId(null); setSeccion(null); };
  /* onIr del asistente: solo navega a la sección del drawer. */
  const irDesdeAsist = (destino) => {
    setAsistAbierto(false); setAsistVozBurbuja(false); setAsistLista(false);
    if(destino){ setSeccion(destino); window.scrollTo(0,0); }
  };
  React.useEffect(()=>{
    MotorVoz.config({
      onEstado:(v)=>setAsistEscuchando(v),
      onIr:(dest)=>irDesdeAsist(dest),
      onPedirDato:(p)=>{ setAsistVozBurbuja(false); setAsistAbierto(true); },
      toast:(m)=>{ try{ alert(m); }catch(e){} }
    });
  }, []);
  const irDesdeCampana = (destino) => {
    setSeccion(null);
    setFaseCampana(destino === "entrega" ? "entregas" : "carga");
    window.scrollTo(0,0);
  };

  if (!chofer) return <PantallaLogin onEntrar={(nombre, nuevo)=>{ setChofer(nombre); setChoferNuevo(nuevo); setRutaId(null); setSeccion(null); }} />;

  let pantalla;
  if (seccion) pantalla = <PantallaSeccion seccion={seccion} chofer={chofer}
    irSeccion={(x)=>{ setSeccion(x); window.scrollTo(0,0); }}
    onVolver={()=>{ setSeccion(null); window.scrollTo(0,0); }} onSalir={salir} />;
  else if (rutaId) pantalla = <PantallaRuta key={rutaId+":"+(faseCampana||"auto")} rutaId={rutaId} chofer={chofer}
    faseInicial={faseCampana}
    onVolver={()=>{ setRutaId(null); setFaseCampana(null); window.scrollTo(0,0); }} onSalir={salir} />;
  else pantalla = <PantallaRutas chofer={chofer} choferNuevo={choferNuevo}
    onAbrirRuta={(id)=>{ setRutaId(id); setFaseCampana(null); window.scrollTo(0,0); }}
    onSeccion={(s)=>{ setSeccion(s); window.scrollTo(0,0); }}
    onSalir={salir} />;

  return (<>
    {pantalla}
    <Campana rutaId={rutaId} onIr={irDesdeCampana} />
    {MotorVoz.soportado() && (
      <BurbujaAsistente
        escuchando={asistEscuchando}
        onEscuchar={()=>{ setAsistVozBurbuja(true); MotorVoz.alternar(); }} />
    )}
    <AsistenteVoz
      abierto={asistAbierto || asistVozBurbuja}
      panelVisible={asistAbierto}
      modoLista={asistLista}
      onCerrar={()=>{ setAsistAbierto(false); setAsistVozBurbuja(false); setAsistLista(false); MotorVoz.apagar(); }}
      onFinVoz={()=>{ setAsistVozBurbuja(false); }}
      toast={(m)=>{ try{ alert(m); }catch(e){} }}
      onIr={irDesdeAsist} />
  </>);
}

  '<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200">'
  +'<rect width="320" height="200" fill="#F2A900"/>'
  +'<rect x="14" y="14" width="292" height="172" rx="10" fill="#FFFFFF"/>'
  +'<text x="160" y="70" font-family="sans-serif" font-size="20" font-weight="700" fill="#15392B" text-anchor="middle">GUIA FIRMADA</text>'
  +'<text x="160" y="100" font-family="sans-serif" font-size="13" fill="#6F7A6F" text-anchor="middle">(foto simulada de prueba)</text>'
  +'<path d="M70 150 q20 -25 40 0 t40 0 t40 0" stroke="#15392B" stroke-width="3" fill="none"/>'
  +'</svg>');

/* Recordatorios de avance de carga (temporizadores por punto) */
var RECORDATORIOS = {};
function programarRecordatorioR(rutaId, orden){
  if (RECORDATORIOS[orden]) clearTimeout(RECORDATORIOS[orden]);
  RECORDATORIOS[orden] = setTimeout(function(){
    var r = ruta(rutaId); if(!r) return;
    var c = cargaDe(r, orden); var x = puntosDeCarga(r).find(function(z){ return z.orden===orden; });
    if (c && c.llegada && !c.terminado && !c.salida){
      toast("⏰ Recuerda registrar el avance de carga en "+(x ? x.piladora.split(" ")[0] : ("el punto "+orden)));
      programarRecordatorioR(rutaId, orden);
    }
  }, MIN_RECORDATORIO*60*1000);
}
function cancelarRecordatorio(orden){
  if (RECORDATORIOS[orden]){ clearTimeout(RECORDATORIOS[orden]); delete RECORDATORIOS[orden]; }
}

/* ---------- Campo de foto (tomar / galería / demo del visor) ---------- */
function CampoFoto({ label, hint, requerida, foto, setFoto }){
  const inputRef = useRef(null);
  const elegir = (e) => {
    const file = e.target.files && e.target.files[0]; if(!file) return;
    const rd = new FileReader();
    rd.onload = () => setFoto(rd.result);
    rd.readAsDataURL(file);
  };
  return (
    <div className="field">
      <label>{label}{requerida && <span className="req"> *</span>}</label>
      {foto ? (
        <div className="foto-prev">
          <img src={foto} alt="" />
          <button className="del" onClick={()=>{ setFoto(null); if(inputRef.current) inputRef.current.value=""; }}>×</button>
          <span className="ok">Adjuntada ✓</span>
        </div>
      ) : (<>
        <button className="foto-zone" onClick={()=>inputRef.current && inputRef.current.click()}>
          <div className="foto-ico">📷</div>
          <div className="foto-txt">Tomar foto o elegir de galería</div>
        </button>
        <button className="foto-demo" onClick={()=>setFoto(FOTO_DEMO)}>Usar foto de prueba (para el visor)</button>
      </>)}
      <input type="file" ref={inputRef} accept="image/*" style={{ display:"none" }} onChange={elegir} />
      <div style={{ fontSize:11.5, color:"var(--muted)", marginTop:6 }}>{hint}</div>
    </div>
  );
}

/* ---------- Hoja emergente genérica ---------- */
function Hoja({ titulo, onCerrar, children, pie }){
  return (
    <div className="scrim" onClick={(e)=>{ if(e.target.classList.contains("scrim")) onCerrar(); }}>
      <div className="sheet">
        <div className="sheet-h"><div className="sheet-t">{titulo}</div><button className="sheet-x" onClick={onCerrar}>×</button></div>
        <div className="sheet-b">{children}</div>
        {pie}
      </div>
    </div>
  );
}

/* ---------- Botones de motivo ---------- */
function Motivos({ lista, motivo, setMotivo }){
  return (
    <div className="motivos">
      {lista.map((m)=>(
        <button key={m} className={"motivo"+(motivo===m?" sel":"")} onClick={()=>setMotivo(m)}>{m}</button>
      ))}
    </div>
  );
}

/* ---------- Hojas de CARGA (llegada / avance / termina / novedad) ---------- */
function HojaCarga({ r, tipo, orden, chofer, onCerrar, refrescar }){
  const x = orden ? puntosDeCarga(r).find((z)=>z.orden===orden) : null;
  const c = orden ? cargaDe(r, orden) : null;
  const [qq, setQq] = useState(tipo==="termina" ? String(c && (c.qqCargado || x.qq)) : (c && c.qqCargado ? String(c.qqCargado) : ""));
  const [motivo, setMotivo] = useState(null);
  const [nota, setNota] = useState("");
  const [foto, setFoto] = useState(null);

  if (tipo === "llegada") {
    const confirmar = () => {
      c.llegada = ahora();
      REGISTROS.push({ tipo:"carga_llegada", ruta:r.id, rutaNombre:r.nombre, chofer:chofer,
        placa:r.placa, orden:orden, piladora:x.piladora, proveedor:x.prov, hora:c.llegada, fechaISO:(new Date()).toISOString() });
      programarRecordatorioR(r.id, orden);
      onCerrar(); refrescar(); toast("Llegada registrada");
    };
    return (
      <Hoja titulo={"Llegada al punto "+orden} onCerrar={onCerrar}
        pie={<div className="sheet-foot"><button className="b-confirm" onClick={confirmar}>Confirmar llegada ({ahora().replace("hoy · ","")})</button></div>}>
        <div className="field"><label>{x.piladora}</label>
          <div className="mini-list">
            <div className="row"><span>{x.dir}</span></div>
            <div className="row"><span>{x.prov}</span><b className="num">{x.qq} qq</b></div>
          </div>
        </div>
        <div className="aviso-parc" style={{ color:"var(--field)", borderColor:"var(--line)", background:"var(--paper)" }}>
          Se registrará tu hora de llegada y empezará el control de carga. La app te recordará el avance cada {MIN_RECORDATORIO} minutos.</div>
      </Hoja>
    );
  }

  if (tipo === "avance") {
    const v = parseInt(qq, 10);
    const ok = !isNaN(v) && v >= 0;
    const confirmar = () => {
      if(!ok) return;
      const val = Math.max(0, v);
      c.qqCargado = val; c.avances.push({ qq: val, hora: ahora() });
      REGISTROS.push({ tipo:"carga_avance", ruta:r.id, rutaNombre:r.nombre, chofer:chofer,
        placa:r.placa, orden:orden, piladora:x.piladora, proveedor:x.prov, qqCargado:val, meta:x.qq, hora:ahora(), fechaISO:(new Date()).toISOString() });
      programarRecordatorioR(r.id, orden);
      onCerrar(); refrescar(); toast("Avance guardado: "+val+" qq");
    };
    return (
      <Hoja titulo="Avance de carga" onCerrar={onCerrar}
        pie={<div className="sheet-foot"><button className={"b-confirm"+(ok?"":" dis")} onClick={confirmar}>Guardar avance</button></div>}>
        <div className="field"><label>{x.piladora}</label></div>
        <div className="entrega-tot">
          <div className="et-cell et-ok"><div className="v num">{Math.min(c.qqCargado, x.qq)}</div><div className="l">qq ya cargados</div></div>
          <div className="et-cell et-dev"><div className="v num">{x.qq}</div><div className="l">meta total</div></div>
        </div>
        <div className="field"><label>¿Cuántos qq llevas cargados en total? <span className="req">*</span></label>
          <input className="inp" value={qq} type="tel" inputMode="numeric" placeholder={"Ej: "+x.qq} onChange={(e)=>setQq(e.target.value)} /></div>
      </Hoja>
    );
  }

  if (tipo === "termina") {
    const confirmar = () => {
      const val = Math.max(0, parseInt(qq, 10) || c.qqCargado || 0);
      c.qqCargado = val; c.terminado = true;
      cancelarRecordatorio(orden);
      REGISTROS.push({ tipo:"carga_fin", ruta:r.id, rutaNombre:r.nombre, chofer:chofer,
        placa:r.placa, orden:orden, piladora:x.piladora, proveedor:x.prov, qqCargado:val, meta:x.qq, hora:ahora(), fechaISO:(new Date()).toISOString() });
      onCerrar(); refrescar(); toast("Carga terminada");
    };
    return (
      <Hoja titulo="Terminé de cargar" onCerrar={onCerrar}
        pie={<div className="sheet-foot"><button className="b-confirm" onClick={confirmar}>Marcar carga terminada</button></div>}>
        <div className="field"><label>{x.piladora}</label></div>
        <div className="field"><label>Total cargado (qq) <span className="req">*</span></label>
          <input className="inp" value={qq} type="tel" inputMode="numeric" placeholder={"Ej: "+x.qq} onChange={(e)=>setQq(e.target.value)} /></div>
        <div className="aviso-parc">Al terminar, el siguiente paso será <b>salir del punto</b>. Recuerda: la salida del camión es el punto de no retorno.</div>
      </Hoja>
    );
  }

  /* novedad de carga */
  const motivosCarga = ["Falta producto","Demora en piladora","Producto en mal estado","Documentación","Otro"];
  const enviar = () => {
    if(!motivo) return;
    REGISTROS.push({ tipo:"novedad_carga", ruta:r.id, rutaNombre:r.nombre, chofer:chofer,
      placa:r.placa, orden:orden||null, motivo:motivo,
      nota:nota.trim(), foto:!!foto, hora:ahora(), fechaISO:(new Date()).toISOString() });
    onCerrar(); refrescar(); toast("Novedad enviada a logística");
  };
  return (
    <Hoja titulo="Novedad de carga" onCerrar={onCerrar}
      pie={<div className="sheet-foot"><button className={"b-confirm nov"+(motivo?"":" dis")} onClick={enviar}>Enviar a logística</button></div>}>
      <div className="field"><label>Motivo <span className="req">*</span></label>
        <Motivos lista={motivosCarga} motivo={motivo} setMotivo={setMotivo} /></div>
      <div className="field"><label>Detalle (opcional)</label>
        <textarea className="inp" value={nota} placeholder="Describe el imprevisto para logística" onChange={(e)=>setNota(e.target.value)}></textarea></div>
      <CampoFoto label="Foto (opcional)" hint="Adjunta una foto si ayuda a explicar la novedad" foto={foto} setFoto={setFoto} />
    </Hoja>
  );
}

/* ---------- FASE CARGA (puntos de recogida definidos por logística) ---------- */
function PantallaCarga({ r, chofer, onVolver, onSalir, onIrEntregas, refrescar }){
  const [hoja, setHoja] = useState(null);   /* {tipo, orden} */
  const pts = puntosDeCarga(r);
  const totalQq = qqRutaTotal(r);
  const cargadoQq = qqRutaCargado(r);
  const pct = totalQq ? Math.round(cargadoQq/totalQq*100) : 0;
  const veh = VEHICULOS[r.placa] || { tipo: r.placa };
  const listos = pts.filter((x)=>cargaDe(r,x.orden).salida).length;

  const salirDelPuntoR = (orden) => {
    const c = cargaDe(r, orden); const x = pts.find((z)=>z.orden===orden);
    c.salida = true;
    cancelarRecordatorio(orden);
    REGISTROS.push({ tipo:"carga_salida", ruta:r.id, rutaNombre:r.nombre, chofer:chofer,
      placa:r.placa, orden:orden, piladora:x.piladora, proveedor:x.prov, qqCargado:c.qqCargado,
      hora:ahora(), fechaISO:(new Date()).toISOString() });
    refrescar(); toast("Salida registrada · punto "+orden);
  };

  return (
    <Shell who={<button className="back" onClick={onVolver}>‹ Mis rutas</button>} name="" onSalir={onSalir}
      extraDer={<span className="badge-est" style={{ background:"rgba(255,255,255,.12)", color:"#EAF0EA" }}>Carga</span>}>
      <div className="ruta-hero">
        <div className="rh-dest">{r.nombre}</div>
        <div className="rh-veh">{r.placa} · {veh.tipo}</div>
        <div className="progbar"><i style={{ width: pct+"%" }}></i></div>
        <div className="prog-label">Cargados {cargadoQq} de {totalQq} qq · {listos}/{pts.length} puntos listos</div>
      </div>

      {/* Guías de remisión del viaje: amparan la carga ante un control del SRI.
          Una por proveedor emisor — este viaje puede llevar varias. */}
      {(()=>{
        const gs = guiasDeRuta(r.id);
        if(gs.length===0) return null;
        const malas = guiasConPlacaDistinta(r);
        return (<>
          {malas.length>0 && (
            <div className="guia-alerta">
              <span style={{fontSize:17,flexShrink:0}}>⚠</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:13}}>
                  {malas.length===1 ? "Una guía va a otra placa" : malas.length+" guías van a otra placa"}</div>
                <div style={{fontSize:11.5,marginTop:2,lineHeight:1.4}}>
                  Tu camión es {r.placa}. Avisa a logística antes de salir.</div>
              </div>
            </div>
          )}
          <button className="guia-btn" onClick={()=>setHoja({tipo:"guias"})}>
            <span style={{fontSize:20,flexShrink:0}}>📋</span>
            <div style={{flex:1,minWidth:0,textAlign:"left"}}>
              <div style={{fontWeight:700,fontSize:13.5,color:"var(--field)"}}>
                {gs.length===1 ? "1 guía de remisión" : gs.length+" guías de remisión"}</div>
              <div style={{fontSize:11.5,color:"var(--muted)",marginTop:1,
                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {gs.map(g=>g.emisor.split(" ")[0]).join(" · ")}</div>
            </div>
            <span style={{color:"var(--muted)",fontSize:17,flexShrink:0}}>›</span>
          </button>
        </>);
      })()}

      <div className="sect-h">Recogida de mercadería (en orden)</div>
      {pts.map((x)=>{
        const c = cargaDe(r, x.orden);
        const hab = puntoHabilitado(r, x.orden);
        const ppct = x.qq ? Math.round(Math.min(c.qqCargado, x.qq)/x.qq*100) : 0;
        const estado = c.salida ? "salio" : c.terminado ? "term" : c.llegada ? "cargando" : (hab ? "porllegar" : "bloq");
        const estTxt = c.salida ? "Salió del punto" : c.terminado ? "Carga terminada" : c.llegada ? "Cargando" : (hab ? "Por llegar" : "Bloqueado");
        const estCls = c.salida ? "be-ok" : (c.terminado || c.llegada) ? "be-parcial" : "";
        return (
          <div key={x.orden} className={"pil-card "+estado}>
            <div className="pil-top">
              <div className="pil-n">{x.orden}</div>
              <div className="pil-info">
                <div className="pil-nom">{x.piladora}</div>
                <div className="pil-dir">📍 {x.dir}</div>
                <div className="pil-meta">{x.prov} · meta <b className="num">{x.qq}</b> qq</div>
              </div>
              <span className={"badge-est "+estCls}>{estTxt}</span>
            </div>
            {(!hab && !c.salida) ? (
              <div className="pil-bloq">🔒 Primero debes salir del punto {x.orden-1}.</div>
            ) : !c.llegada ? (
              <button className="b-carga-accion" onClick={()=>setHoja({ tipo:"llegada", orden:x.orden })}>📍 Registrar llegada</button>
            ) : (<>
              <div className="pil-prog">
                <div className="pil-bar"><i style={{ width: ppct+"%" }}></i></div>
                <div className="pil-prog-l"><span><b className="num">{Math.min(c.qqCargado, x.qq)}</b> / {x.qq} qq</span><span>{ppct}%</span></div>
              </div>
              <div className="pil-llegada">🕒 Llegada: {c.llegada}{c.avances.length ? (" · "+c.avances.length+" avance"+(c.avances.length>1?"s":"")) : ""}</div>
              {!c.salida && (!c.terminado ? (
                <div className="pil-actions">
                  <button className="b-carga-sec" onClick={()=>setHoja({ tipo:"avance", orden:x.orden })}>+ Avance de carga</button>
                  <button className="b-carga-sec" onClick={()=>setHoja({ tipo:"termina", orden:x.orden })}>✓ Terminé de cargar</button>
                </div>
              ) : (
                <button className="b-carga-accion salir" onClick={()=>salirDelPuntoR(x.orden)}>🚚 Salir del punto</button>
              ))}
            </>)}
          </div>
        );
      })}

      <button className="b-nov-carga" onClick={()=>setHoja({ tipo:"novedad", orden:null })}>⚠️ Reportar novedad de carga</button>
      {cargaCompleta(r) ? (
        <button className="b-ir-entregas" onClick={onIrEntregas}>Ir a las entregas →</button>
      ) : (
        <div className="bloqueo-entregas">🔒 Las entregas se habilitan cuando salgas de todos los puntos de carga.</div>
      )}

      {hoja && hoja.tipo==="guias" && <HojaGuias r={r} onCerrar={()=>setHoja(null)} />}
      {hoja && hoja.tipo!=="guias" && <HojaCarga r={r} tipo={hoja.tipo} orden={hoja.orden} chofer={chofer}
        onCerrar={()=>setHoja(null)} refrescar={refrescar} />}
    </Shell>
  );
}

/* ---------- Hoja de GUÍAS DE REMISIÓN (solo lectura) ---------- */

    <Hoja titulo={"Guías de remisión · "+gs.length} onCerrar={onCerrar}>

        Estos documentos amparan tu carga. Si el SRI para el camión, muéstralos.
